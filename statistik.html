<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 16px; color: #333; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .filter-group { margin-bottom: 15px; }
        .filter-group label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 5px; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: #fff; font-size: 14px; outline: none; }
        
        /* Table Style untuk Golongan Darah */
        .blood-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .blood-table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
        .blood-type-label { font-weight: bold; color: #dc3545; width: 40px; }
        .blood-count { text-align: right; font-weight: bold; color: #007bff; }
        
        .btn-back { display: flex; align-items: center; justify-content: center; text-decoration: none; color: #007bff; font-weight: bold; padding: 15px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header">
            <h3><i class="fa-solid fa-droplet"></i> DATA GOLONGAN DARAH</h3>
        </div>
        <div class="filter-group">
            <label>Lihat Distribusi Per Komsel</label>
            <select id="select-gol-darah" onchange="loadDistribusiDarah()">
                <option value="" disabled selected>Pilih Komsel...</option>
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <table class="blood-table">
            <tr>
                <td class="blood-type-label">A</td>
                <td id="count-A" class="blood-count">0 Orang</td>
            </tr>
            <tr>
                <td class="blood-type-label">B</td>
                <td id="count-B" class="blood-count">0 Orang</td>
            </tr>
            <tr>
                <td class="blood-type-label">O</td>
                <td id="count-O" class="blood-count">0 Orang</td>
            </tr>
            <tr>
                <td class="blood-type-label">AB</td>
                <td id="count-AB" class="blood-count">0 Orang</td>
            </tr>
        </table>
    </div>

    <a href="menu.html" class="btn-back">
        <i class="fa-solid fa-arrow-left"></i> &nbsp; Kembali ke Menu Utama
    </a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadDistribusiDarah() {
        const jcSelected = document.getElementById('select-gol-darah').value;
        if (!jcSelected) return;

        // Reset hitungan
        const counts = { 'A': 0, 'B': 0, 'O': 0, 'AB': 0 };

        try {
            // Ambil semua user yang berada di Komsel yang dipilih
            const snapshot = await db.collection("users").where("komsel", "==", jcSelected).get();
            
            snapshot.forEach(doc => {
                const data = doc.data();
                const golDarah = data.golongan_darah ? data.golongan_darah.toUpperCase() : null;
                if (counts.hasOwnProperty(golDarah)) {
                    counts[golDarah]++;
                }
            });

            // Update UI
            document.getElementById('count-A').innerText = counts['A'] + " Orang";
            document.getElementById('count-B').innerText = counts['B'] + " Orang";
            document.getElementById('count-O').innerText = counts['O'] + " Orang";
            document.getElementById('count-AB').innerText = counts['AB'] + " Orang";

        } catch (error) {
            console.error("Gagal memuat data golongan darah:", error);
        }
    }
</script>
</body>
</html>
