<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Statistics - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --dark: #343a40; --light: #f8f9fa;
            --gold: #D4AF37; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eaeff2; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 500px; margin: auto; }
        
        .header { text-align: center; margin-bottom: 20px; }
        .header h2 { color: var(--dark); font-size: 1.5rem; margin-bottom: 5px; }
        
        .card { background: var(--white); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card-title { font-weight: 700; font-size: 14px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; color: var(--dark); border-bottom: 2px solid #eee; padding-bottom: 10px; }

        .chart-container { position: relative; height: 250px; width: 100%; margin-bottom: 15px; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--light); padding: 12px; border-radius: 10px; text-align: center; border-left: 4px solid var(--primary); }
        .stat-box.red { border-left-color: var(--danger); }
        .stat-box span { display: block; font-size: 10px; font-weight: bold; color: #888; }
        .stat-box b { font-size: 16px; color: #333; }

        .btn-back { display: block; text-align: center; padding: 15px; background: var(--white); color: var(--primary); text-decoration: none; font-weight: bold; border-radius: 12px; border: 2px solid var(--primary); margin-top: 10px; }
        
        select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Dashboard Statistik</h2>
        <p style="font-size: 12px; color: #666;">Data Terintegrasi & Real-time</p>
    </div>

    <div class="card">
        <label style="font-size: 11px; font-weight: bold;">PILIH PERIODE ANALISIS</label>
        <select id="global-periode" onchange="refreshAllStats()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
            <option value="12">1 Tahun Terakhir</option>
        </select>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-check-circle style="color: var(--success)"></i> Progres Kehadiran</div>
        <div class="chart-container">
            <canvas id="chartKehadiran"></canvas>
        </div>
        <div class="grid-stats" id="info-kehadiran">
            </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-times-circle" style="color: var(--danger)"></i> Analisis Ketidakhadiran</div>
        <div class="chart-container">
            <canvas id="chartAbsensi"></canvas>
        </div>
        <p style="font-size: 10px; color: #999; text-align: center;">*Menampilkan persentase alasan ketidakhadiran di semua lini pelayanan.</p>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-heartbeat" style="color: var(--danger)"></i> Profil Golongan Darah</div>
        <div class="chart-container">
            <canvas id="chartDarah"></canvas>
        </div>
        <div id="darah-legend" style="font-size: 12px;"></div>
    </div>

    <a href="menu.html" class="btn-back">KEMBALI KE MENU UTAMA</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let charts = {};

    // Fungsi Pembantu
    const getLimitDate = (m) => {
        let d = new Date(); d.setMonth(d.getMonth() - m);
        return d;
    };

    // --- 1. LOGIKA GRAFIK KEHADIRAN ---
    async function initChartKehadiran() {
        const ctx = document.getElementById('chartKehadiran').getContext('2d');
        charts.kehadiran = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Komsel', 'Ibadah', 'Gabungan', 'Doa', 'KD', 'Alkitab'],
                datasets: [{
                    label: 'Persentase Hadir (%)',
                    data: [0, 0, 0, 0, 0, 0],
                    backgroundColor: ['#007bff', '#28a745', '#6f42c1', '#fd7e14', '#20c997', '#ffc107']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    // --- 2. LOGIKA GRAFIK ABSENSI ---
    function initChartAbsensi() {
        const ctx = document.getElementById('chartAbsensi').getContext('2d');
        charts.absensi = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Reguler', 'Gabungan', 'Ibadah', 'Doa', 'KD'],
                datasets: [{
                    data: [1, 1, 1, 1, 1],
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff']
                }]
            }
        });
    }

    // --- 3. LOGIKA GRAFIK GOLONGAN DARAH ---
    function initChartDarah() {
        const ctx = document.getElementById('chartDarah').getContext('2d');
        charts.darah = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['O', 'A', 'B', 'AB', 'AB+'],
                datasets: [{
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: ['#e74c3c', '#3498db', '#f1c40f', '#9b59b6', '#2ecc71']
                }]
            }
        });
    }

    // FUNGSI SYNC DATA DARI FIREBASE
    async function refreshAllStats() {
        const bln = parseInt(document.getElementById('global-periode').value);
        const limitDate = getLimitDate(bln);

        // 1. Sync Kehadiran & Laporan Alkitab
        // (Contoh logika: Anda perlu menyesuaikan query 'kategori' di Firestore)
        db.collection("kehadiran").where("tanggal", ">=", limitDate).onSnapshot(snap => {
            let counts = { 'Reguler': 0, 'Ibadah': 0, 'Gabungan': 0, 'Doa': 0, 'KD': 0 };
            let totalPerKat = 50; // Asumsi target per kategori
            
            snap.forEach(doc => {
                const d = doc.data();
                if(d.status === "HADIR") counts[d.tipe_kegiatan || 'Reguler']++;
            });

            // Update Chart
            charts.kehadiran.data.datasets[0].data = [
                (counts['Reguler']/totalPerKat)*100,
                (counts['Ibadah']/totalPerKat)*100,
                (counts['Gabungan']/totalPerKat)*100,
                (counts['Doa']/totalPerKat)*100,
                (counts['KD']/totalPerKat)*100,
                75 // Contoh statis untuk Alkitab
            ];
            charts.kehadiran.update();
        });

        // 2. Sync Golongan Darah (Global)
        db.collection("users").onSnapshot(snap => {
            let goldar = { 'O': 0, 'A': 0, 'B': 0, 'AB': 0, 'AB+': 0 };
            snap.forEach(doc => {
                let g = (doc.data().goldarah || doc.data().darah || "").toUpperCase().trim();
                if(goldar.hasOwnProperty(g)) goldar[g]++;
            });
            charts.darah.data.datasets[0].data = Object.values(goldar);
            charts.darah.update();
        });
    }

    window.onload = () => {
        initChartKehadiran();
        initChartAbsensi();
        initChartDarah();
        refreshAllStats();
    };
</script>
</body>
</html>
