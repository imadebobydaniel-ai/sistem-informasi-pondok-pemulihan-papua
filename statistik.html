<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Lengkap JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; font-weight: bold; border-bottom: 2px solid #007bff; padding-bottom: 8px; margin-bottom: 15px; text-transform: uppercase; }
        
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-item { flex: 1; }
        .filter-item label { font-size: 9px; font-weight: bold; color: #bbb; display: block; margin-bottom: 4px; text-transform: uppercase; }
        select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; font-size: 12px; font-weight: bold; outline: none; }

        .stat-line { display: flex; justify-content: space-between; align-items: center; margin: 10px 0 5px 0; font-size: 13px; font-weight: bold; }
        .val-txt { color: #007bff; }
        .progress-bg { background: #eee; height: 10px; border-radius: 10px; width: 100%; overflow: hidden; margin-bottom: 15px; }
        .progress-fill { height: 100%; transition: 0.5s; border-radius: 10px; }

        .blood-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .blood-type { font-weight: bold; color: #333; }
        .blood-count { color: #007bff; font-weight: bold; }

        .btn-footer { display: block; width: 100%; padding: 12px; background: white; border-radius: 12px; text-align: center; text-decoration: none; color: #007bff; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="container">
    
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-earth-asia"></i> Capaian Baca Alkitab</div>
        <div class="filter-row">
            <div class="filter-item">
                <label>Pilih Komsel</label>
                <select id="jc-alkitab" onchange="loadAlkitab()">
                    <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option>
                    <option value="JC 4">JC 4</option><option value="JC 5" selected>JC 5</option><option value="JC 6">JC 6</option>
                    <option value="JC 10">JC 10</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Periode</label>
                <select id="per-alkitab" onchange="loadAlkitab()">
                    <option value="1">1 Bulan Terakhir</option><option value="3">3 Bulan Terakhir</option>
                </select>
            </div>
        </div>
        <div class="stat-line"><span>Capaian <span id="label-jc-baca">JC 5</span></span><span class="val-txt" id="txt-baca-jc">0.0%</span></div>
        <div class="progress-bg"><div id="bar-baca-jc" class="progress-fill" style="background: #00c6ff; width: 0%;"></div></div>
        <div class="stat-line"><span>Seluruh Komsel (Global)</span><span class="val-txt" style="color: #6c5ce7;" id="txt-baca-global">0.0%</span></div>
        <div class="progress-bg"><div id="bar-baca-global" class="progress-fill" style="background: #a29bfe; width: 0%;"></div></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fa-solid fa-calendar-check"></i> Statistik Kehadiran</div>
        <div class="filter-row">
            <div class="filter-item">
                <label>Pilih Komsel</label>
                <select id="jc-hadir" onchange="loadKehadiran()">
                    <option value="JC 5" selected>JC 5</option><option value="Semua">Semua</option>
                </select>
            </div>
            <div class="filter-item">
                <label>Periode</label>
                <select id="per-hadir" onchange="loadKehadiran()">
                    <option value="1">1 Bulan Terakhir</option>
                </select>
            </div>
        </div>
        <div class="stat-line"><span>Kehadiran <span id="label-jc-hadir">JC 5</span></span><span class="val-txt" id="txt-hadir-jc">0%</span></div>
        <div class="progress-bg"><div id="bar-hadir-jc" class="progress-fill" style="background: #ddd; width: 0%;"></div></div>
        <div class="stat-line"><span>Seluruh Komsel (Global)</span><span class="val-txt" id="txt-hadir-global">0%</span></div>
        <div class="progress-bg"><div id="bar-hadir-global" class="progress-fill" style="background: #ddd; width: 0%;"></div></div>
    </div>

    <div class="card">
        <div class="card-title" style="border-bottom-color: #ff4757;"><i class="fa-solid fa-circle-dot" style="color: #ff4757;"></i> Ketidak Hadiran</div>
        <div class="filter-row">
            <div class="filter-item"><label>Pilih Komsel</label><select id="jc-absen" onchange="loadKehadiran()"><option value="JC 5">JC 5</option></select></div>
            <div class="filter-item"><label>Periode</label><select id="per-absen"><option value="1">1 Bulan Terakhir</option></select></div>
        </div>
        <div class="stat-line"><span>Ketidak Hadiran JC 5</span><span class="val-txt" style="color: #ff4757;" id="txt-absen-jc">0%</span></div>
        <div class="progress-bg"><div id="bar-absen-jc" class="progress-fill" style="background: #ddd; width: 0%;"></div></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fa-solid fa-droplet"></i> Data Golongan Darah</div>
        <label style="font-size: 9px; font-weight: bold; color: #bbb;">LIHAT DISTRIBUSI PER KOMSEL</label>
        <select id="jc-darah" style="margin-top: 5px;" onchange="loadDarah()">
            <option value="Semua">Semua Komsel</option><option value="5">JC 5</option>
        </select>
        <div style="margin-top: 15px;">
            <div class="blood-row"><span class="blood-type">A</span><span class="blood-count" id="count-A">0 Orang</span></div>
            <div class="blood-row"><span class="blood-type">B</span><span class="blood-count" id="count-B">0 Orang</span></div>
            <div class="blood-row"><span class="blood-type">O</span><span class="blood-count" id="count-O">0 Orang</span></div>
            <div class="blood-row" style="border:none;"><span class="blood-type">AB</span><span class="blood-count" id="count-AB">0 Orang</span></div>
        </div>
    </div>

    <a href="menu.html" class="btn-footer"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu Utama</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function loadAlkitab() {
        const jc = document.getElementById('jc-alkitab').value;
        document.getElementById('label-jc-baca').innerText = jc;
        const snap = await db.collection("laporan_bacaan").get();
        let total = 0, jcCount = 0;
        snap.forEach(doc => {
            total++;
            if(doc.data().komsel === jc.replace("JC ","")) jcCount++;
        });
        const pJC = total > 0 ? ((jcCount/total)*100).toFixed(1) : 0;
        document.getElementById('txt-baca-jc').innerText = pJC + "%";
        document.getElementById('bar-baca-jc').style.width = pJC + "%";
        document.getElementById('txt-baca-global').innerText = (total > 0 ? "100.0%" : "0.0%");
        document.getElementById('bar-baca-global').style.width = (total > 0 ? "100%" : "0%");
    }

    async function loadKehadiran() {
        // Simulasi hitung sederhana karena data kehadiran butuh field status
        document.getElementById('txt-hadir-jc').innerText = "0%";
        document.getElementById('txt-absen-jc').innerText = "0%";
    }

    async function loadDarah() {
        const jc = document.getElementById('jc-darah').value;
        let q = db.collection("users");
        if(jc !== "Semua") q = q.where("komsel", "==", jc);
        const snap = await q.get();
        let counts = { "A": 0, "B": 0, "O": 0, "AB": 0 };
        snap.forEach(doc => { 
            const d = doc.data().golongan_darah;
            if(counts.hasOwnProperty(d)) counts[d]++;
        });
        for(let t in counts) { document.getElementById('count-'+t).innerText = counts[t] + " Orang"; }
    }

    window.onload = () => { loadAlkitab(); loadDarah(); loadKehadiran(); };
</script>
</body>
</html>
