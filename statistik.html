<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Saya</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; text-align: center; }
        .card i { font-size: 30px; margin-bottom: 10px; }
        .title { font-size: 16px; color: #666; font-weight: bold; }
        .value { font-size: 24px; font-weight: bold; color: #333; margin: 5px 0; }
        .desc { font-size: 13px; color: #888; }
        .progress-container { background: #eee; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; transition: 0.5s; }
        .btn-back { margin-top: 10px; display: inline-block; text-decoration: none; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h3 style="text-align: center;"><i class="fa-solid fa-chart-line"></i> STATISTIK PRIBADI</h3>

    <div class="card">
        <i class="fa-solid fa-book-bible" style="color: #007bff;"></i>
        <div class="title">Laporan Baca Alkitab</div>
        <div class="value" id="val-alkitab">0</div>
        <div class="desc">Total laporan Anda bulan ini</div>
        <div class="progress-container">
            <div id="bar-alkitab" class="progress-bar" style="background: #007bff; width: 0%;"></div>
        </div>
    </div>

    <div class="card">
        <i class="fa-solid fa-calendar-check" style="color: #2ecc71;"></i>
        <div class="title">Kehadiran Ibadah</div>
        <div class="value" id="val-hadir">0</div>
        <div class="desc">Jumlah kehadiran bulan ini</div>
    </div>

    <div class="card">
        <i class="fa-solid fa-calendar-xmark" style="color: #e74c3c;"></i>
        <div class="title">Ketidakhadiran</div>
        <div class="value" id="val-absen">0</div>
        <div class="desc">Total absen bulan ini</div>
    </div>

    <div class="card">
        <i class="fa-solid fa-droplet" style="color: #d63031;"></i>
        <div class="title">Golongan Darah</div>
        <div class="value" id="val-darah">-</div>
        <div class="desc">Data identitas medis Anda</div>
    </div>

    <center><a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a></center>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    async function loadStatistik() {
        if (!userEmail) return;

        const sekarang = new Date();
        const awalBulan = new Date(sekarang.getFullYear(), sekarang.getMonth(), 1);
        const tsAwalBulan = firebase.firestore.Timestamp.fromDate(awalBulan);

        try {
            // 1. Ambil Data Profil (Golongan Darah)
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            if (!snapUser.empty) {
                const u = snapUser.docs[0].data();
                document.getElementById('val-darah').innerText = u.golongan_darah || "-";
            }

            // 2. Ambil Laporan Alkitab
            const snapAlkitab = await db.collection("laporan_bacaan")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsAwalBulan)
                .get();
            
            const jmlLapor = snapAlkitab.size;
            document.getElementById('val-alkitab').innerText = jmlLapor;
            // Progress bar (asumsi 30 hari dalam sebulan)
            const persen = (jmlLapor / 30) * 100;
            document.getElementById('bar-alkitab').style.width = persen + "%";

            // 3. Ambil Kehadiran
            const snapHadir = await db.collection("kehadiran")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsAwalBulan)
                .where("status", "==", "Hadir")
                .get();
            document.getElementById('val-hadir').innerText = snapHadir.size;

            // 4. Ambil Ketidakhadiran
            const snapAbsen = await db.collection("kehadiran")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsAwalBulan)
                .where("status", "==", "Absen")
                .get();
            document.getElementById('val-absen').innerText = snapAbsen.size;

        } catch (e) { console.error(e); }
    }

    window.onload = loadStatistik;
</script>
</body>
</html>
