<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistik Real-time - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-header { text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .card-header h3 { margin: 0; font-size: 16px; color: #333; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .filter-row .filter-group { flex: 1; margin-bottom: 0; }
        .filter-group label { display: block; font-size: 11px; font-weight: bold; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #eee; background: #fafafa; font-size: 13px; outline: none; transition: 0.3s; }
        select:focus { border-color: #007bff; background: #fff; }
        .stat-row { margin-bottom: 15px; }
        .stat-label-container { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .label-pct { color: #007bff; }
        .progress-container { background: #eee; border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .bar-jc { background: #00a8ff; }
        .bar-global { background: #6c5ce7; }
        .bar-tidak-hadir { background: #e91e63; }
        .blood-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .blood-table td { padding: 12px 10px; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
        .blood-count { text-align: right; font-weight: bold; color: #007bff; }
        .btn-back { display: flex; align-items: center; justify-content: center; text-decoration: none; color: #007bff; font-weight: bold; padding: 15px; background: white; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-chart-pie"></i> CAPAIAN BACA ALKITAB</h3></div>
        <div class="filter-row">
            <div class="filter-group">
                <label>Pilih Komsel</label>
                <select id="sel-alkitab"><option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5" selected>JC 5</option></select>
            </div>
            <div class="filter-group">
                <label>Periode</label>
                <select id="month-alkitab">
                    <option value="1">1 Bulan Terakhir</option><option value="2">2 Bulan Terakhir</option>
                    <option value="3">3 Bulan Terakhir</option><option value="4">4 Bulan Terakhir</option>
                    <option value="5">5 Bulan Terakhir</option><option value="6">6 Bulan Terakhir</option>
                </select>
            </div>
        </div>
        <div class="stat-row">
            <div class="stat-label-container"><span id="lbl-alkitab">Capaian JC 5</span><span class="label-pct" id="val-alkitab">0%</span></div>
            <div class="progress-container"><div class="progress-bar bar-jc" id="bar-alkitab"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label-container"><span>Seluruh Komsel (Global)</span><span class="label-pct" id="val-alkitab-global" style="color:#6c5ce7">0%</span></div>
            <div class="progress-container"><div class="progress-bar bar-global" id="bar-alkitab-global"></div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-calendar-check"></i> STATISTIK KEHADIRAN</h3></div>
        <div class="filter-row">
            <div class="filter-group">
                <label>Pilih Komsel</label>
                <select id="sel-hadir"><option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5" selected>JC 5</option></select>
            </div>
            <div class="filter-group">
                <label>Periode</label>
                <select id="month-hadir">
                    <option value="1">1 Bulan Terakhir</option><option value="2">2 Bulan Terakhir</option><option value="3">3 Bulan Terakhir</option><option value="4">4 Bulan Terakhir</option><option value="5">5 Bulan Terakhir</option><option value="6">6 Bulan Terakhir</option>
                </select>
            </div>
        </div>
        <div class="stat-row">
            <div class="stat-label-container"><span id="lbl-hadir">Kehadiran JC 5</span><span class="label-pct" id="val-hadir">0%</span></div>
            <div class="progress-container"><div class="progress-bar bar-jc" id="bar-hadir"></div></div>
        </div>
        <div class="stat-row">
            <div class="stat-label-container"><span>Seluruh Komsel (Global)</span><span class="label-pct" id="val-hadir-global" style="color:#6c5ce7">0%</span></div>
            <div class="progress-container"><div class="progress-bar bar-global" id="bar-hadir-global"></div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-circle-xmark" style="color: #e91e63;"></i> KETIDAK HADIRAN</h3></div>
        <div class="filter-row">
            <div class="filter-group">
                <label>Pilih Komsel</label>
                <select id="sel-tidak-hadir"><option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5" selected>JC 5</option></select>
            </div>
            <div class="filter-group">
                <label>Periode</label>
                <select id="month-tidak-hadir">
                    <option value="1">1 Bulan Terakhir</option><option value="2">2 Bulan Terakhir</option>
                    <option value="3">3 Bulan Terakhir</option><option value="6">6 Bulan Terakhir</option>
                </select>
            </div>
        </div>
        <div class="stat-row">
            <div class="stat-label-container"><span id="lbl-tidak-hadir">Ketidak Hadiran JC 5</span><span class="label-pct" id="val-tidak-hadir" style="color:#e91e63">0%</span></div>
            <div class="progress-container"><div class="progress-bar bar-tidak-hadir" id="bar-tidak-hadir"></div></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header"><h3><i class="fa-solid fa-droplet"></i> DATA GOLONGAN DARAH</h3></div>
        <div class="filter-group">
            <label>Lihat Distribusi Per Komsel</label>
            <select id="sel-darah">
                <option value="">Semua Komsel</option>
                <option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5">JC 5</option>
            </select>
        </div>
        <table class="blood-table">
            <tr><td>A</td><td id="c-A" class="blood-count">0 Orang</td></tr>
            <tr><td>B</td><td id="c-B" class="blood-count">0 Orang</td></tr>
            <tr><td>O</td><td id="c-O" class="blood-count">0 Orang</td></tr>
            <tr><td>AB</td><td id="c-AB" class="blood-count">0 Orang</td></tr>
        </table>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> &nbsp; Kembali ke Menu Utama</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let cachedUsers = [];

    // FUNGSI PENGAMAN PERSENTASE (Mencegah NaN dan 600%)
    function calculateSafePct(reports, users) {
        if (!users || users === 0) return 0;
        let pct = (reports / users) * 100;
        return pct > 100 ? 100 : pct.toFixed(1);
    }

    function setupRealtimeListener(collectionName, jcId, monthId, labelId, valId, barId, valGlobalId, barGlobalId, labelText) {
        const jcSelect = document.getElementById(jcId);
        const monthSelect = document.getElementById(monthId);

        const updateData = () => {
            const selectedJC = jcSelect.value;
            const months = parseInt(monthSelect.value);
            const dateLimit = new Date();
            dateLimit.setMonth(dateLimit.getMonth() - months);
            const timestampLimit = firebase.firestore.Timestamp.fromDate(dateLimit);

            db.collection(collectionName)
                .where("tanggal", ">=", timestampLimit)
                .onSnapshot(snapshot => {
                    let totalGlobalReports = snapshot.size;
                    let totalJCReports = 0;
                    snapshot.forEach(doc => { if (doc.data().komsel == selectedJC) totalJCReports++; });

                    const totalGlobalUsers = cachedUsers.length;
                    const totalJCUsers = cachedUsers.filter(u => u.komsel == selectedJC).length;

                    const pctJC = calculateSafePct(totalJCReports, totalJCUsers);
                    document.getElementById(valId).innerText = pctJC + "%";
                    document.getElementById(barId).style.width = pctJC + "%";
                    document.getElementById(labelId).innerText = `${labelText} JC ${selectedJC}`;

                    if (valGlobalId) {
                        const pctGlobal = calculateSafePct(totalGlobalReports, totalGlobalUsers);
                        document.getElementById(valGlobalId).innerText = pctGlobal + "%";
                        document.getElementById(barGlobalId).style.width = pctGlobal + "%";
                    }
                });
        };
        jcSelect.addEventListener('change', updateData);
        monthSelect.addEventListener('change', updateData);
        updateData();
    }

    function setupBloodRealtime() {
        const selDarah = document.getElementById('sel-darah');
        const renderBlood = () => {
            const filterJC = selDarah.value;
            let counts = { "A": 0, "B": 0, "O": 0, "AB": 0 };
            cachedUsers.forEach(user => {
                if (filterJC === "" || user.komsel == filterJC) {
                    if (counts.hasOwnProperty(user.golongan_darah)) counts[user.golongan_darah]++;
                }
            });
            for (let type in counts) { document.getElementById(`c-${type}`).innerText = counts[type] + " Orang"; }
        };
        selDarah.addEventListener('change', renderBlood);
        renderBlood();
    }

    db.collection("users").onSnapshot(snapshot => {
        cachedUsers = snapshot.docs.map(doc => doc.data());
        setupRealtimeListener("laporan_bacaan", "sel-alkitab", "month-alkitab", "lbl-alkitab", "val-alkitab", "bar-alkitab", "val-alkitab-global", "bar-alkitab-global", "Capaian");
        setupRealtimeListener("kehadiran", "sel-hadir", "month-hadir", "lbl-hadir", "val-hadir", "bar-hadir", "val-hadir-global", "bar-hadir-global", "Kehadiran");
        setupTidakHadirListener();
        setupBloodRealtime();
    });

    function setupTidakHadirListener() {
        const jcSelect = document.getElementById("sel-tidak-hadir");
        const monthSelect = document.getElementById("month-tidak-hadir");
        const update = () => {
            const dateLimit = new Date();
            dateLimit.setMonth(dateLimit.getMonth() - parseInt(monthSelect.value));
            db.collection("kehadiran")
                .where("status", "==", "Tidak Hadir")
                .where("tanggal", ">=", firebase.firestore.Timestamp.fromDate(dateLimit))
                .onSnapshot(snapshot => {
                    let jcCount = 0;
                    snapshot.forEach(doc => { if(doc.data().komsel == jcSelect.value) jcCount++; });
                    const totalJCUsers = cachedUsers.filter(u => u.komsel == jcSelect.value).length;
                    const pct = calculateSafePct(jcCount, totalJCUsers);
                    document.getElementById("val-tidak-hadir").innerText = pct + "%";
                    document.getElementById("bar-tidak-hadir").style.width = pct + "%";
                    document.getElementById("lbl-tidak-hadir").innerText = `Ketidak Hadiran JC ${jcSelect.value}`;
                });
        };
        jcSelect.onchange = update;
        monthSelect.onchange = update;
        update();
    }
</script>
</body>
</html>
