<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator</title>
    <style>
        /* DESAIN DASHBOARD ASLI */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-back { background: #6c757d; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }

        /* TABEL LENGKAP */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1000px; }
        th { background: #0084ff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .btn-edit { background: #ffc107; color: #000; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .btn-hapus { background: #dc3545; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* DESAIN MODAL FORM EDIT YANG RAPI */
        .modal { 
            display: none; position: fixed; z-index: 9999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; padding: 25px; border-radius: 15px; 
            width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; 
        }
        .modal-content label { 
            display: block; text-align: left; font-size: 13px; font-weight: bold; 
            margin-top: 15px; margin-bottom: 5px; color: #333; 
        }
        .modal-content input, .modal-content select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }
        .btn-group-modal { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { flex: 1; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-close { flex: 1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>

    <div class="header-tools">
        <button class="btn btn-back" onclick="window.location.href='index.html'">← Kembali</button>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf">Export PDF</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                    <td>
                        <button class="btn-edit" onclick="bukaModalEdit('123', {nama_lengkap:'Imade boby', email:'imade.bobydaniel@gmail.com', password:'Bukadong821', no_hp:'081283393576', gol_darah:'AB', jabatan:'Anggota Komsel', komsel_jc:'JC 5'})">Edit</button>
                        <button class="btn-hapus">Hapus</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3 style="color: #0084ff; text-align: center; border-bottom: 2px solid #0084ff; padding-bottom: 10px; margin-top: 0;">Edit Data Anggota</h3>
        
        <form id="formEdit">
            <label>Nama Lengkap:</label>
            <input type="text" id="editNama" required>

            <label>Alamat Email:</label>
            <input type="email" id="editEmail">

            <label>Password:</label>
            <input type="text" id="editPassword">

            <label>Nomor HP / WhatsApp:</label>
            <input type="text" id="editNoHP">

            <label>Golongan Darah:</label>
            <select id="editGolDarah">
                <option value="">-- Pilih --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>

            <label>Jabatan:</label>
            <select id="editJabatan">
                <option value="">-- Pilih --</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengurus">Pengurus</option>
            </select>

            <label>Komsel JC:</label>
            <input type="text" id="editKomsel">

            <div class="btn-group-modal">
                <button type="submit" class="btn-save">Simpan Perubahan</button>
                <button type="button" onclick="tutupModal()" class="btn-close">Batal</button>
            </div>
        </form>
    </div>
</div>

<script>
    function bukaModalEdit(id, data) {
        document.getElementById('editNama').value = data.nama_lengkap || '';
        document.getElementById('editEmail').value = data.email || '';
        document.getElementById('editPassword').value = data.password || '';
        document.getElementById('editNoHP').value = data.no_hp || '';
        document.getElementById('editGolDarah').value = data.gol_darah || '';
        document.getElementById('editJabatan').value = data.jabatan || '';
        document.getElementById('editKomsel').value = data.komsel_jc || '';

        document.getElementById('modalEdit').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
    }
</script>

</body>
</html>
