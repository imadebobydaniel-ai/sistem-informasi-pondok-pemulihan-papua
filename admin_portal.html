<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Admin Final - Pondok Pemulihan</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #0084ff; padding-bottom: 15px; margin-bottom: 25px; }
        .btn-logout { background: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-logout:hover { background: #444; }
        
        .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #e74c3c; }
        .btn-edit { background: #f1c40f; color: #333; }
        .btn-delete { background: #34495e; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .table-container { width: 100%; overflow-x: auto; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; background: #fff; }
        th { background: #0084ff; color: white; padding: 15px; text-align: left; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background: #f9f9f9; }

        /* MODAL */
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 450px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 6px; color: #666; }
        .field input, .field select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;"><i class="fas fa-database"></i> Database Anggota</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="toolbar">
        <button class="btn btn-refresh" onclick="window.location.reload()"><i class="fas fa-sync-alt"></i> Refresh</button>
        <button class="btn btn-pdf" onclick="eksporPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
        <button class="btn btn-edit" onclick="bukaEdit()"><i class="fas fa-edit"></i> Edit</button>
        <button class="btn btn-delete" onclick="hapusData()"><i class="fas fa-trash-alt"></i> Hapus</button>
    </div>

    <div class="table-container">
        <table id="tabelUtama">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="pilihSemua(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>No HP / WhatsApp</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; border-bottom: 2px solid #0084ff; padding-bottom:10px;">Edit Data Anggota</h3>
        <div class="field"><label>Nama Lengkap:</label><input type="text" id="edNama"></div>
        <div class="field"><label>Email:</label><input type="text" id="edEmail"></div>
        <div class="field"><label>No HP:</label><input type="text" id="edHP"></div>
        <div class="field">
            <label>Gol. Darah:</label>
            <select id="edGol"><option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option></select>
        </div>
        <div class="field">
            <label>Jabatan:</label>
            <select id="edJab">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengerja">Pengerja</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
            </select>
        </div>
        <div class="field">
            <label>Komsel JC:</label>
            <select id="edJC">
                <option value="JC 1">JC 1</option><option value="JC 5">JC 5</option>
            </select>
        </div>
        <button class="btn btn-refresh" style="width:100%; justify-content:center; margin-bottom:10px;" onclick="simpanEdit()">Update Data</button>
        <button class="btn btn-logout" style="width:100%; justify-content:center;" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script>
    let targetBaris = null;

    function pilihSemua(master) {
        document.querySelectorAll('.pilih-item').forEach(cb => cb.checked = master.checked);
    }

    function bukaEdit() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length !== 1) return alert("Silakan pilih 1 data saja!");
        
        targetBaris = terpilih[0].closest('tr');
        document.getElementById('edNama').value = targetBaris.cells[1].innerText;
        document.getElementById('edEmail').value = targetBaris.cells[2].innerText;
        document.getElementById('edHP').value = targetBaris.cells[3].innerText;
        document.getElementById('edGol').value = targetBaris.cells[4].innerText;
        document.getElementById('edJab').value = targetBaris.cells[5].innerText;
        document.getElementById('edJC').value = targetBaris.cells[6].innerText;
        
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function simpanEdit() {
        targetBaris.cells[1].innerText = document.getElementById('edNama').value;
        targetBaris.cells[2].innerText = document.getElementById('edEmail').value;
        targetBaris.cells[3].innerText = document.getElementById('edHP').value;
        targetBaris.cells[4].innerText = document.getElementById('edGol').value;
        targetBaris.cells[5].innerText = document.getElementById('edJab').value;
        targetBaris.cells[6].innerText = document.getElementById('edJC').value;
        tutupModal();
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
        document.querySelectorAll('.pilih-item').forEach(c => c.checked = false);
    }

    function hapusData() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length === 0) return alert("Pilih data yang akan dihapus!");
        if (confirm("Hapus data ini secara permanen?")) terpilih.forEach(c => c.closest('tr').remove());
    }

    // FUNGSI PDF ANTI-ERROR
    function eksporPDF() {
        if (typeof window.jspdf === 'undefined') {
            alert("Maaf, Library PDF masih memuat. Pastikan Anda terhubung ke internet sejenak dan coba lagi.");
            return;
        }

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        
        doc.setFontSize(18);
        doc.text("LAPORAN DATA ANGGOTA PONDOK PEMULIHAN", 14, 20);
        doc.setFontSize(10);
        doc.text("Dicetak pada: " + new Date().toLocaleString(), 14, 28);

        doc.autoTable({
            html: '#tabelUtama',
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [0, 132, 255] },
            columns: [
                { header: 'Nama', dataKey: '1' },
                { header: 'Email', dataKey: '2' },
                { header: 'No HP', dataKey: '3' },
                { header: 'Gol', dataKey: '4' },
                { header: 'Jabatan', dataKey: '5' },
                { header: 'Komsel', dataKey: '6' }
            ]
        });

        doc.save("Data_Anggota_Papua.pdf");
    }
</script>

</body>
</html>
