<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akses Admin - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        img { width: 80px; margin-bottom: 20px; border-radius: 50%; }
        h2 { color: #333; margin: 0 0 10px 0; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; background: #ff003c; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .back-link { display: block; margin-top: 20px; color: #0084ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="logo_pondok.png" alt="Logo">
    <h2>Portal Admin</h2>
    <p>Masukkan password administrator</p>
    
    <input type="password" id="adminPass" placeholder="Password Admin">
    <button onclick="cekLoginAdmin()">Masuk Sekarang</button>
    
    <a href="index.html" class="back-link">← Kembali ke Halaman Login</a>
</div>

<script>
    function cekLoginAdmin() {
        const pass = document.getElementById('adminPass').value;
        if (pass === "admin123") { 
            alert("Akses Diterima!");
            // Mengarah ke admin_portal.html
            window.location.href = 'admin_portal.html';
        } else {
            alert("Password Salah!");
        }
    }
</script>

</body>
</html>
