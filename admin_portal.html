<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid red; padding-bottom: 15px; margin-bottom: 20px; }
        .header-title { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: bold; }
        .btn-keluar { background: #666; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-wrapper { position: relative; flex: 1; max-width: 350px; }
        .search-input { width: 100%; padding: 10px 12px 10px 35px; border: 2px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888; }
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1000px; }
        thead { background: red; color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; }
        tr:hover { background-color: #f9f9f9; }
        .password-cell { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div class="header-title"><i class="fa-solid fa-database"></i> Database Administrator</div>
        <button class="btn-keluar" id="btnKeluar"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        
        <div class="search-wrapper">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Cari Nama atau No HP...">
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 30px;"><input type="checkbox" id="checkAll"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat Tempat Tinggal</th>
                    <th>Jabatan Komsel</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="dataTable">
                <tr>
                    <td><input type="checkbox" class="user-checkbox"></td>
                    <td contenteditable="false">Boby Daniel</td>
                    <td contenteditable="false">boby.daniel4@gmail.com</td>
                    <td class="password-cell" contenteditable="false">Bukadong821</td>
                    <td contenteditable="false">081283393576</td>
                    <td contenteditable="false">Jl. tanah Hitam Abe pantai</td>
                    <td contenteditable="false">Ketua Komsel</td>
                    <td contenteditable="false">JC 5</td>
                    <td contenteditable="false">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // DATA LOGIN ADMIN: admin@pondok.com | papua123

    // 1. FUNGSI EDIT DATA (DIPERBAIKI)
    document.getElementById('btnEdit').onclick = function() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length === 0) {
            alert("Pilih data yang ingin diedit terlebih dahulu dengan mencentang checkbox!");
            return;
        }
        
        alert("Mode Edit Aktif. Silakan langsung ubah data pada baris yang dicentang.");
        selected.forEach(cb => {
            const row = cb.closest('tr');
            const cells = row.querySelectorAll('td');
            // Aktifkan mode edit pada kolom (indeks 1 sampai 8)
            for (let i = 1; i <= 8; i++) {
                cells[i].contentEditable = "true";
                cells[i].style.backgroundColor = "#fffde7"; // Tandai area yang bisa diedit
                cells[i].style.border = "1px dashed orange";
            }
        });
    };

    // 2. FUNGSI REFRESH
    document.getElementById('btnRefresh').onclick = function() {
        location.reload();
    };

    // 3. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length > 0) {
            if (confirm("Hapus " + selected.length + " data?")) {
                selected.forEach(cb => cb.closest('tr').remove());
            }
        } else {
            alert("Pilih data yang akan dihapus!");
        }
    };

    // 4. FUNGSI CHECKALL
    document.getElementById('checkAll').onclick = function() {
        const checkboxes = document.querySelectorAll('.user-checkbox');
        checkboxes.forEach(cb => cb.checked = this.checked);
    };

    // 5. FUNGSI SEARCH
    document.getElementById('searchInput').onkeyup = function() {
        const filter = this.value.toLowerCase();
        const rows = document.querySelectorAll('#dataTable tr');
        rows.forEach(row => {
            const nama = row.cells[1].innerText.toLowerCase();
            const hp = row.cells[4].innerText.toLowerCase();
            row.style.display = (nama.includes(filter) || hp.includes(filter)) ? "" : "none";
        });
    };

    // 6. FUNGSI KELUAR
    document.getElementById('btnKeluar').onclick = function() {
        window.location.href = 'index.html';
    };
</script>
</body>
</html>
