<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; margin-top: 0; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; font-size: 14px; text-decoration: none; display: flex; align-items: center; }
        .btn-back { background: #6c757d; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }
        .btn-edit-top { background: #ffc107; color: #000; } /* Tombol Edit Kuning */
        .btn-danger { background: #ff4757; }

        .table-responsive { width: 100%; overflow-x: auto; margin-top: 10px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        th { background: #0084ff; color: white; padding: 15px 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        /* Modal Edit */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 500px; }
        .modal-content h3 { margin-top: 0; color: #1c1e21; }
        .modal-content label { display: block; margin-top: 10px; font-weight: bold; font-size: 13px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: #0084ff; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>
    
    <div class="header-tools">
        <a href="index.html" class="btn btn-back">← Kembali</a>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="eksporPDF()">Export Terpilih (PDF)</button>
        <button class="btn btn-edit-top" onclick="bukaEditTerpilih()">Edit Terpilih</button>
        <button class="btn btn-danger" onclick="hapusTerpilih()">Hapus Terpilih</button>
    </div>

    <div class="table-responsive">
        <table id="tabelData">
            <thead>
                <tr>
                    <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="toggleSemua(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                </tr>
                <tr>
                    <td><input type="checkbox" class="pilih-item"></td>
                    <td>Budi Santoso</td>
                    <td>budi@gmail.com</td>
                    <td>User123</td>
                    <td>08123456789</td>
                    <td>O</td>
                    <td>Ketua Komsel</td>
                    <td>JC 1</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        <label>Nama Lengkap:</label>
        <input type="text" id="editNama">
        
        <label>Nomor HP / WhatsApp:</label>
        <input type="text" id="editHP">
        
        <label>Jabatan:</label>
        <select id="editJabatan">
            <option value="Ketua Komsel">Ketua Komsel</option>
            <option value="Wakil Ketua">Wakil Ketua</option>
            <option value="Anggota Komsel">Anggota Komsel</option>
        </select>

        <label>Komsel JC:</label>
        <select id="editKomsel">
            <option value="JC 1">JC 1</option>
            <option value="JC 2">JC 2</option>
            <option value="JC 3">JC 3</option>
            <option value="JC 4">JC 4</option>
            <option value="JC 5">JC 5</option>
        </select>

        <button class="btn-save" onclick="simpanPerubahan()">Simpan Perubahan</button>
        <button class="btn-back" style="width: 100%; margin-top: 10px; border:none; padding:10px; border-radius:8px;" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script>
    // 1. Logika Checkbox
    function toggleSemua(source) {
        document.querySelectorAll('.pilih-item').forEach(cb => cb.checked = source.checked);
    }

    // 2. Logika EDIT TERPILIH (Syarat: Harus tepat 1)
    function bukaEditTerpilih() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        
        if (terpilih.length === 0) {
            alert("Pilih satu data yang ingin diedit, Bang!");
        } else if (terpilih.length > 1) {
            alert("Maaf, edit tidak bisa masal. Centang satu data saja ya.");
        } else {
            // Ambil baris yang dicentang
            const row = terpilih[0].closest('tr');
            
            // Masukkan data lama ke dalam input modal
            document.getElementById('editNama').value = row.cells[1].innerText;
            document.getElementById('editHP').value = row.cells[4].innerText;
            document.getElementById('editJabatan').value = row.cells[6].innerText;
            document.getElementById('editKomsel').value = row.cells[7].innerText;
            
            // Simpan referensi baris yang sedang diedit agar bisa diupdate nanti
            window.rowSedangDiedit = row;
            
            document.getElementById('modalEdit').style.display = 'flex';
        }
    }

    function tutupModal() { document.getElementById('modalEdit').style.display = 'none'; }

    function simpanPerubahan() {
        if (window.rowSedangDiedit) {
            const row = window.rowSedangDiedit;
            // Update data di tabel secara langsung
            row.cells[1].innerText = document.getElementById('editNama').value;
            row.cells[4].innerText = document.getElementById('editHP').value;
            row.cells[6].innerText = document.getElementById('editJabatan').value;
            row.cells[7].innerText = document.getElementById('editKomsel').value;
            
            alert("Data berhasil diperbarui!");
            tutupModal();
            // Hilangkan centang setelah edit selesai
            document.querySelectorAll('.pilih-item').forEach(cb => cb.checked = false);
            document.getElementById('checkAll').checked = false;
        }
    }

    // 3. Logika Hapus
    function hapusTerpilih() {
        const terpilih = document.querySelectorAll('.pilih-item:checked');
        if (terpilih.length === 0) return alert("Pilih data yang mau dihapus!");
        if (confirm(`Yakin mau hapus ${terpilih.length} data ini?`)) {
            terpilih.forEach(cb => cb.closest('tr').remove());
        }
    }

    // 4. Logika PDF (Sesuai yang sudah berhasil)
    function eksporPDF() {
        const selected = document.querySelectorAll('.pilih-item:checked');
        if (selected.length === 0) return alert("Centang dulu datanya!");

        try {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const rows = [];

            selected.forEach(cb => {
                const tr = cb.closest('tr');
                rows.push([tr.cells[1].innerText, tr.cells[2].innerText, tr.cells[3].innerText, tr.cells[4].innerText, tr.cells[5].innerText, tr.cells[6].innerText, tr.cells[7].innerText]);
            });

            doc.text("LAPORAN ANGGOTA TERPILIH", 14, 15);
            doc.autoTable({
                head: [['Nama', 'Email', 'Password', 'No HP', 'Gol', 'Jabatan', 'Komsel']],
                body: rows,
                startY: 20,
                theme: 'grid',
                headStyles: { fillColor: [0, 132, 255] }
            });
            doc.save("Laporan_Admin.pdf");
        } catch (e) {
            alert("Error PDF: " + e.message);
        }
    }
</script>

</body>
</html>
