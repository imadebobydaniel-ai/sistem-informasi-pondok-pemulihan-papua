<div id="modalEdit" class="modal">
    <style>
        label {
            display: block;
            text-align: left;
            font-size: 13px;
            font-weight: bold;
            color: #333;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        #modalEdit input, #modalEdit select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        
        /* Memastikan modal muncul di tengah layar */
        .modal {
            display: none; 
            position: fixed;
            z-index: 999;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>

    <div class="modal-content">
        <h3 style="color: #0084ff; text-align: center; border-bottom: 2px solid #0084ff; padding-bottom: 10px;">Edit Data Anggota</h3>
        
        <form id="formEdit">
            <label>Nama Lengkap:</label>
            <input type="text" id="editNama" placeholder="Masukkan Nama Lengkap" required>

            <label>Alamat Email:</label>
            <input type="email" id="editEmail" placeholder="contoh@gmail.com">

            <label>Password:</label>
            <input type="text" id="editPassword" placeholder="Masukkan Password Baru">

            <label>Nomor HP / WhatsApp:</label>
            <input type="text" id="editNoHP" placeholder="0812xxxxxx">

            <label>Golongan Darah:</label>
            <select id="editGolDarah">
                <option value="">-- Pilih Gol. Darah --</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>

            <label>Jabatan:</label>
            <select id="editJabatan">
                <option value="">-- Pilih Jabatan --</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengurus">Pengurus</option>
            </select>

            <label>Komsel JC:</label>
            <input type="text" id="editKomsel" placeholder="Contoh: JC 5">

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-masuk" style="flex: 1; background: #0084ff; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;">Simpan Perubahan</button>
                <button type="button" onclick="tutupModal()" class="btn-kembali" style="flex: 1; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer;">Batal</button>
            </div>
        </form>
    </div>
</div>

<script>
    function bukaModalEdit(id, data) {
        // Memasukkan data dari tabel ke dalam form edit
        document.getElementById('editNama').value = data.nama_lengkap || '';
        document.getElementById('editEmail').value = data.email || '';
        document.getElementById('editPassword').value = data.password || '';
        document.getElementById('editNoHP').value = data.no_hp || '';
        document.getElementById('editGolDarah').value = data.gol_darah || '';
        document.getElementById('editJabatan').value = data.jabatan || '';
        document.getElementById('editKomsel').value = data.komsel_jc || '';

        // Simpan ID dokumen di atribut form untuk proses update nanti
        document.getElementById('formEdit').setAttribute('data-id', id);
        
        // Tampilkan modal
        document.getElementById('modalEdit').style.display = 'flex';
    }

    function tutupModal() {
        document.getElementById('modalEdit').style.display = 'none';
    }
</script>
