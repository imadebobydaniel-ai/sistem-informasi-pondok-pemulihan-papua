<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1250px; margin: auto; }
        h2 { color: #1c1e21; border-bottom: 2px solid #0084ff; padding-bottom: 10px; margin-top: 0; }
        .action-buttons { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .btn-refresh { background-color: #28a745; }
        .btn-pdf { background-color: #dc3545; }
        .btn-back { background-color: #6c757d; }

        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { background-color: #0084ff; color: white; padding: 12px; text-align: left; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #ddd; font-size: 13px; color: #333; }
        tr:hover { background-color: #f8f9fa; }
        
        .btn-edit { background-color: #ffc107; color: #212529; padding: 5px 10px; border-radius: 4px; font-size: 11px; margin-right: 5px; }
        .btn-hapus { background-color: #dc3545; color: white; padding: 5px 10px; border-radius: 4px; font-size: 11px; }

        /* Modal Style untuk Edit */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Dashboard Administrator</h2>
    <p>Data Lengkap Anggota Pondok Pemulihan Papua</p>

    <div class="action-buttons">
        <button class="btn-back" onclick="window.location.href='index.html'">⬅ Kembali</button>
        <button class="btn-refresh" onclick="loadUsers()">🔄 Refresh Data</button>
        <button class="btn-pdf" onclick="exportKePDF()">📄 Export PDF</button>
    </div>

    <div class="table-responsive">
        <table id="userTable">
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Alamat</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Status</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="userList">
                <tr><td colspan="7" style="text-align:center;">Memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        <input type="hidden" id="edit-id">
        <label>Nama Lengkap:</label>
        <input type="text" id="edit-nama">
        <label>Alamat:</label>
        <input type="text" id="edit-alamat">
        <label>No HP:</label>
        <input type="text" id="edit-nohp">
        <label>Golongan Darah:</label>
        <input type="text" id="edit-goldar">
        <label>Status:</label>
        <input type="text" id="edit-status">
        <label>Komsel JC:</label>
        <input type="text" id="edit-komsel">
        
        <div class="modal-footer">
            <button style="background:#6c757d;" onclick="tutupModal()">Batal</button>
            <button style="background:#28a745;" onclick="simpanPerubahan()">Simpan Perubahan</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadUsers() {
        const userList = document.getElementById("userList");
        userList.innerHTML = "<tr><td colspan='7' style='text-align:center;'>Memuat...</td></tr>";
        try {
            const snapshot = await db.collection("users").get();
            userList.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                userList.innerHTML += `
                    <tr>
                        <td>${data.nama || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                        <td>${data.no_hp || '-'}</td>
                        <td>${data.gol_darah || '-'}</td>
                        <td>${data.status_nikah || '-'}</td>
                        <td>${data.komsel || '-'}</td>
                        <td style="display:flex;">
                            <button class="btn-edit" onclick="bukaEdit('${doc.id}', '${data.nama}', '${data.alamat}', '${data.no_hp}', '${data.gol_darah}', '${data.status_nikah}', '${data.komsel}')">Edit</button>
                            <button class="btn-hapus" onclick="hapusUser('${doc.id}')">Hapus</button>
                        </td>
                    </tr>`;
            });
        } catch (e) { alert(e.message); }
    }

    function bukaEdit(id, nama, alamat, nohp, goldar, status, komsel) {
        document.getElementById("edit-id").value = id;
        document.getElementById("edit-nama").value = nama !== 'undefined' ? nama : '';
        document.getElementById("edit-alamat").value = alamat !== 'undefined' ? alamat : '';
        document.getElementById("edit-nohp").value = nohp !== 'undefined' ? nohp : '';
        document.getElementById("edit-goldar").value = goldar !== 'undefined' ? goldar : '';
        document.getElementById("edit-status").value = status !== 'undefined' ? status : '';
        document.getElementById("edit-komsel").value = komsel !== 'undefined' ? komsel : '';
        document.getElementById("editModal").style.display = "block";
    }

    function tutupModal() { document.getElementById("editModal").style.display = "none"; }

    async function simpanPerubahan() {
        const id = document.getElementById("edit-id").value;
        const updatedData = {
            nama: document.getElementById("edit-nama").value,
            alamat: document.getElementById("edit-alamat").value,
            no_hp: document.getElementById("edit-nohp").value,
            gol_darah: document.getElementById("edit-goldar").value,
            status_nikah: document.getElementById("edit-status").value,
            komsel: document.getElementById("edit-komsel").value
        };

        try {
            await db.collection("users").doc(id).update(updatedData);
            alert("Data Berhasil Diperbarui!");
            tutupModal();
            loadUsers();
        } catch (e) { alert("Gagal: " + e.message); }
    }

    async function hapusUser(id) {
        if (confirm("Hapus data ini?")) {
            await db.collection("users").doc(id).delete();
            loadUsers();
        }
    }

    function exportKePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape');
        doc.text("Daftar Anggota Pondok Pemulihan Papua", 14, 15);
        doc.autoTable({ html: '#userTable', startY: 25, columns: [0, 1, 2, 3, 4, 5] });
        doc.save("Data_Anggota.pdf");
    }

    window.onload = loadUsers;
</script>
</body>
</html>
