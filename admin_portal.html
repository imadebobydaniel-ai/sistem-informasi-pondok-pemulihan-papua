<div style="display: flex; gap: 10px; align-items: center; margin-bottom: 20px;">
    <button class="btn-refresh"><i class="fa-solid fa-rotate"></i> Refresh</button>
    <button class="btn-edit"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
    <button class="btn-hapus"><i class="fa-solid fa-trash"></i> Hapus</button>
    
    <div style="position: relative; flex: 1; max-width: 300px;">
        <input type="text" id="searchData" placeholder="Cari Nama atau No HP..." 
            style="width: 100%; padding: 8px 12px 8px 35px; border: 2px solid #ccc; border-radius: 6px; box-sizing: border-box;">
        <i class="fa-solid fa-magnifying-glass" 
            style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888;"></i>
    </div>
</div>

<script>
    // Fungsi Search Otomatis
    document.getElementById('searchData').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('table tbody tr');

        rows.forEach(row => {
            // Kolom Nama (indeks 1) dan Nomor HP (indeks 4)
            let nama = row.cells[1].textContent.toLowerCase();
            let noHp = row.cells[4].textContent.toLowerCase();
            
            if (nama.indexOf(filter) > -1 || noHp.indexOf(filter) > -1) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    });
</script>
