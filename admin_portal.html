<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Administrator - Pondok Pemulihan Papua</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf-plugin-autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; }
        h2 { border-bottom: 3px solid #0084ff; padding-bottom: 10px; color: #1c1e21; }
        
        .header-tools { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; gap: 5px; }
        .btn-back { background: #6c757d; }
        .btn-refresh { background: #28a745; }
        .btn-pdf { background: #dc3545; }

        /* TABEL */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 1000px; }
        th { background: #0084ff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        /* MODAL EDIT */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .modal-content label { display: block; font-size: 13px; font-weight: bold; margin-top: 15px; margin-bottom: 5px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-group-modal { display: flex; gap: 10px; margin-top: 25px; }
        .btn-save { flex: 1; padding: 12px; background: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dashboard Administrator</h2>

    <div class="header-tools">
        <button class="btn btn-back" onclick="window.location.href='index.html'">← Kembali</button>
        <button class="btn btn-refresh" onclick="location.reload()">Refresh Data</button>
        <button class="btn btn-pdf" onclick="generatePDF()">Export PDF</button>
    </div>

    <div class="table-responsive">
        <table id="tabelAnggota">
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td>Imade boby</td>
                    <td>imade.bobydaniel@gmail.com</td>
                    <td>Bukadong821</td>
                    <td>081283393576</td>
                    <td>AB</td>
                    <td>Anggota Komsel</td>
                    <td>JC 5</td>
                    <td><button onclick="bukaModalEdit()">Edit</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3>Edit Data Anggota</h3>
        <label>Nama Lengkap:</label>
        <input type="text" id="editNama">
        <label>Nomor HP:</label>
        <input type="text" id="editNoHP">
        <div class="btn-group-modal">
            <button class="btn-save" onclick="tutupModal()">Simpan</button>
            <button style="flex:1" onclick="tutupModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    // FUNGSI EXPORT PDF DENGAN PROTEKSI ERROR
    function generatePDF() {
        try {
            // Cek apakah library sudah terpasang
            if (!window.jspdf) {
                alert("Maaf, Library PDF belum siap. Pastikan internet aktif atau coba refresh halaman.");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');

            // 1. Teks Kop Surat Langsung (Tanpa nunggu Gambar agar tidak macet)
            doc.setFontSize(22);
            doc.setTextColor(0, 132, 255);
            doc.text("PONDOK PEMULIHAN PAPUA", 15, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text("Laporan Data Anggota Terdaftar", 15, 28);
            
            doc.setLineWidth(0.5);
            doc.line(15, 32, 280, 32);

            // 2. Ambil Data Tabel
            // Kita pakai cara manual ambil ID agar lebih 'galak' ke browser
            doc.autoTable({
                html: '#tabelAnggota',
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [0, 132, 255] },
                styles: { fontSize: 8 },
                // Ambil kolom 0 sampai 6 saja (Aksi di kolom 7 dibuang)
                columns: [
                    { header: 'Nama' },
                    { header: 'Email' },
                    { header: 'Pass' },
                    { header: 'WhatsApp' },
                    { header: 'Gol' },
                    { header: 'Jabatan' },
                    { header: 'Komsel' }
                ]
            });

            // 3. Simpan
            doc.save("Data_Anggota_PPP.pdf");
            alert("PDF Berhasil Dibuat!");

        } catch (error) {
            console.error(error);
            alert("Terjadi kesalahan teknis: " + error.message);
        }
    }

    // Fungsi pendukung lainnya tetap ada
    function bukaModalEdit() { document.getElementById('modalEdit').style.display = 'flex'; }
    function tutupModal() { document.getElementById('modalEdit').style.display = 'none'; }
</script>
</body>
</html>
