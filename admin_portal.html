<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1400px; margin: auto; }
        h2 { color: #1c1e21; border-bottom: 3px solid #0084ff; padding-bottom: 12px; margin-top: 0; }
        .toolbar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-refresh { background-color: #28a745; }
        .btn-pdf { background-color: #dc3545; }
        .btn-back { background-color: #6c757d; }
        
        .table-container { overflow-x: auto; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; background: white; }
        th { background-color: #0084ff; color: white; padding: 15px; text-align: left; font-size: 14px; white-space: nowrap; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; }
        tr:hover { background-color: #f8f9fa; }

        .btn-edit { background-color: #ffc107; color: #212529; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
        .btn-hapus { background-color: #dc3545; color: white; padding: 6px 10px; border-radius: 4px; font-size: 12px; }
        .action-cell { display: flex; gap: 5px; }

        /* Modal Edit */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; border-radius: 10px; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>Dashboard Administrator</h2>
    <p>Manajemen Database Anggota Pondok Pemulihan Papua</p>

    <div class="toolbar">
        <button class="btn-back" onclick="window.location.href='index.html'">⬅ Kembali</button>
        <button class="btn-refresh" onclick="loadUsers()">🔄 Refresh Data</button>
        <button class="btn-pdf" onclick="exportKePDF()">📄 Export PDF</button>
    </div>

    <div class="table-container">
        <table id="userTable">
            <thead>
                <tr>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No HP</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>Komsel JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="userList">
                <tr><td colspan="8" style="text-align:center;">Memuat data dari Firebase...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <h3>Update Data Anggota</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="edit-nama" placeholder="Nama Lengkap">
        <input type="email" id="edit-email" placeholder="Email">
        <input type="text" id="edit-password" placeholder="Password">
        <input type="text" id="edit-nohp" placeholder="No HP">
        <select id="edit-goldar">
            <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
        </select>
        <select id="edit-jabatan">
            <option value="Anggota Komsel">Anggota Komsel</option>
            <option value="Ketua Komsel">Ketua Komsel</option>
        </select>
        <select id="edit-komsel">
            <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option>
            <option value="JC 4">JC 4</option><option value="JC 5">JC 5</option>
        </select>
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button style="background:#28a745; flex:1;" onclick="simpanEdit()">Simpan</button>
            <button style="background:#6c757d; flex:1;" onclick="tutupModal()">Batal</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function loadUsers() {
        const userList = document.getElementById("userList");
        userList.innerHTML = "<tr><td colspan='8' style='text-align:center;'>Menyinkronkan data...</td></tr>";
        
        try {
            const snapshot = await db.collection("users").get();
            userList.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                userList.innerHTML += `
                    <tr>
                        <td>${d.nama || '-'}</td>
                        <td>${d.email || '-'}</td>
                        <td>${d.password || '******'}</td>
                        <td>${d.no_hp || '-'}</td>
                        <td>${d.gol_darah || '-'}</td>
                        <td>${d.jabatan || 'Anggota'}</td>
                        <td>${d.komsel || '-'}</td>
                        <td class="action-cell">
                            <button class="btn-edit" onclick="bukaEdit('${doc.id}', ${JSON.stringify(d).replace(/"/g, '&quot;')})">Edit</button>
                            <button class="btn-hapus" onclick="hapusUser('${doc.id}')">Hapus</button>
                        </td>
                    </tr>`;
            });
        } catch (e) { alert("Error: " + e.message); }
    }

    function bukaEdit(id, data) {
        document.getElementById("edit-id").value = id;
        document.getElementById("edit-nama").value = data.nama || '';
        document.getElementById("edit-email").value = data.email || '';
        document.getElementById("edit-password").value = data.password || '';
        document.getElementById("edit-nohp").value = data.no_hp || '';
        document.getElementById("edit-goldar").value = data.gol_darah || 'A';
        document.getElementById("edit-jabatan").value = data.jabatan || 'Anggota Komsel';
        document.getElementById("edit-komsel").value = data.komsel || 'JC 1';
        document.getElementById("editModal").style.display = "block";
    }

    function tutupModal() { document.getElementById("editModal").style.display = "none"; }

    async function simpanEdit() {
        const id = document.getElementById("edit-id").value;
        const up = {
            nama: document.getElementById("edit-nama").value,
            email: document.getElementById("edit-email").value,
            password: document.getElementById("edit-password").value,
            no_hp: document.getElementById("edit-nohp").value,
            gol_darah: document.getElementById("edit-goldar").value,
            jabatan: document.getElementById("edit-jabatan").value,
            komsel: document.getElementById("edit-komsel").value
        };
        await db.collection("users").doc(id).update(up);
        alert("Data diperbarui!");
        tutupModal();
        loadUsers();
    }

    async function hapusUser(id) {
        if(confirm("Hapus anggota ini?")) {
            await db.collection("users").doc(id).delete();
            loadUsers();
        }
    }

    function exportKePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('landscape');
        doc.text("Laporan Database Anggota - Pondok Pemulihan Papua", 14, 15);
        doc.autoTable({ html: '#userTable', startY: 25, columns: [0, 1, 3, 4, 5, 6] });
        doc.save("Database_Papua.pdf");
    }

    window.onload = loadUsers;
</script>
</body>
</html>
