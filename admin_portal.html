<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --red: #ff003c; --green: #2ed573; --orange: #ffa502; --dark: #2f3542; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 100%; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--red); padding-bottom: 15px; margin-bottom: 20px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; color: white; font-weight: bold; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-refresh { background: var(--green); }
        .btn-edit { background: var(--orange); }
        .btn-delete { background: var(--dark); }
        .btn-logout { background: #666; text-decoration: none; }
        .table-wrap { overflow-x: auto; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1600px; }
        th { background: var(--red); color: white; padding: 15px; text-align: left; font-size: 13px; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 13px; }
        .status-aktif { color: var(--green); font-weight: bold; }
        
        /* Modal Style */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 95%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .readonly-field { background-color: #f8f9fa; cursor: not-allowed; color: #888; border: 1px dashed #ccc !important; }
        .modal-footer { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;"><i class="fas fa-database"></i> Database Administrator</h2>
        <a href="index.html" class="btn btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="toolbar">
        <button class="btn btn-refresh" onclick="muatData()"><i class="fas fa-sync"></i> Refresh</button>
        <button class="btn btn-edit" onclick="bukaModalEdit()"><i class="fas fa-edit"></i> Edit Data</button>
        <button class="btn btn-delete" onclick="hapusTerpilih()"><i class="fas fa-trash"></i> Hapus</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th style="width:20px;"><input type="checkbox" id="checkAll" onclick="pilihSemua(this)"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat Tinggal</th>
                    <th>Jabatan Komsel</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                    <th>Status Pernikahan</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="dataBody"></tbody>
        </table>
    </div>
</div>

<div id="modalEdit" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-user-edit"></i> Edit Data Anggota</h3>
        <input type="hidden" id="editId">
        
        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="editNama"></div>
        <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
        <div class="form-group">
            <label>Password (Hanya User yang bisa ubah di Profil)</label>
            <input type="text" id="editPassword" class="readonly-field" readonly>
        </div>
        <div class="form-group"><label>Nomor HP</label><input type="text" id="editHP"></div>
        <div class="form-group"><label>Alamat Tempat Tinggal</label><input type="text" id="editAlamat"></div>
        <div class="form-group">
            <label>Jabatan Komsel</label>
            <select id="editJabatan">
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
                <option value="Anggota Komsel">Anggota Komsel</option>
            </select>
        </div>
        <div class="form-group">
            <label>Lokasi JC</label>
            <select id="editJC">
                <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option><option value="JC 3">JC 3</option><option value="JC 4">JC 4</option><option value="JC 5">JC 5</option><option value="Sentani">Sentani</option>
            </select>
        </div>
        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="editDarah">
                <option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option>
            </select>
        </div>
        <div class="form-group">
            <label>Status Pernikahan</label>
            <select id="editNikah">
                <option value="Single">Single</option><option value="Relationship">Relationship</option><option value="Menikah">Menikah</option><option value="Cerai Hidup">Cerai Hidup</option><option value="Cerai Mati">Cerai Mati</option>
            </select>
        </div>
        <div class="modal-footer">
            <button class="btn btn-refresh" style="flex:1; justify-content:center;" onclick="simpanEdit()">Update Data</button>
            <button class="btn btn-delete" style="flex:1; justify-content:center;" onclick="tutupModal()">Batal</button>
        </div>
    </div>
</div>

<script>
    // Konfigurasi
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. Muat Data
    async function muatData() {
        const tbody = document.getElementById('dataBody');
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;">Memperbarui Data...</td></tr>';
        try {
            const snapshot = await db.collection("users").get();
            tbody.innerHTML = "";
            snapshot.forEach((doc) => {
                const v = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="userCheck" value="${doc.id}"></td>
                        <td>${v.nama || '-'}</td>
                        <td>${v.email || '-'}</td>
                        <td style="font-family: monospace; color: #d63031;">${v.password || '-'}</td>
                        <td>${v.no_hp || '-'}</td>
                        <td>${v.alamat || '-'}</td>
                        <td>${v.jabatan || '-'}</td>
                        <td>${v.komsel || '-'}</td>
                        <td>${v.gol_darah || '-'}</td>
                        <td>${v.status_nikah || '-'}</td>
                        <td class="status-aktif">Aktif</td>
                    </tr>`;
            });
        } catch (e) { alert("Error: " + e.message); }
    }

    // 2. Pilih Semua
    function pilihSemua(src) {
        document.querySelectorAll('.userCheck').forEach(cb => cb.checked = src.checked);
    }

    // 3. Buka Modal Edit
    async function bukaModalEdit() {
        const sel = document.querySelector('.userCheck:checked');
        if(!sel) return alert("Pilih satu jemaat!");
        const d = (await db.collection("users").doc(sel.value).get()).data();
        document.getElementById('editId').value = sel.value;
        document.getElementById('editNama').value = d.nama || "";
        document.getElementById('editEmail').value = d.email || "";
        document.getElementById('editPassword').value = d.password || "";
        document.getElementById('editHP').value = d.no_hp || "";
        document.getElementById('editAlamat').value = d.alamat || "";
        document.getElementById('editJabatan').value = d.jabatan || "";
        document.getElementById('editJC').value = d.komsel || "";
        document.getElementById('editDarah').value = d.gol_darah || "";
        document.getElementById('editNikah').value = d.status_nikah || "";
        document.getElementById('modalEdit').style.display = 'flex';
    }

    // 4. Simpan Update (SINKRON KE FIREBASE)
    async function simpanEdit() {
        const id = document.getElementById('editId').value;
        try {
            await db.collection("users").doc(id).update({
                nama: document.getElementById('editNama').value,
                email: document.getElementById('editEmail').value,
                no_hp: document.getElementById('editHP').value,
                alamat: document.getElementById('editAlamat').value,
                jabatan: document.getElementById('editJabatan').value,
                komsel: document.getElementById('editJC').value,
                gol_darah: document.getElementById('editDarah').value,
                status_nikah: document.getElementById('editNikah').value
            });
            alert("Data Berhasil Diperbarui!");
            tutupModal(); muatData();
        } catch (e) { alert("Gagal Update: " + e.message); }
    }

    // 5. Hapus Data (SINKRON KE FIREBASE)
    async function hapusTerpilih() {
        const sel = document.querySelectorAll('.userCheck:checked');
        if(sel.length === 0) return alert("Pilih data jemaat!");
        if(confirm(`Hapus ${sel.length} data secara permanen dari Firebase?`)) {
            for(let cb of sel) { await db.collection("users").doc(cb.value).delete(); }
            alert("Data berhasil dihapus!");
            muatData();
        }
    }

    function tutupModal() { document.getElementById('modalEdit').style.display = 'none'; }
    
    // Jalankan saat load
    document.addEventListener('DOMContentLoaded', muatData);
</script>
</body>
</html>
