<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-container">
        <div class="contact-header">
            <h3>Daftar Kontak</h3>
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Cari nama kontak...">
            </div>
        </div>

        <div class="action-bar">
            <label class="check-all-label">
                <input type="checkbox" id="checkAll"> Pilih Semua
            </label>
            <div class="action-buttons">
                <button id="deleteSelected" class="btn-delete"><i class="fas fa-trash"></i> Hapus</button>
            </div>
        </div>

        <div id="contactList" class="contact-list">
            </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h4>Edit Kontak</h4>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Nama">
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">Batal</button>
                <button onclick="saveEdit()" class="btn-save">Simpan</button>
            </div>
        </div>
    </div>

</body>
</html>
