<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .profile-container { background: white; width: 100%; max-width: 400px; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding-bottom: 25px; }
        .profile-header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        
        /* Area Foto Profil */
        .photo-section { text-align: center; padding: 30px 0; position: relative; }
        .photo-circle { width: 160px; height: 160px; border-radius: 50%; border: 4px solid #00ff88; margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8f9fa; cursor: pointer; position: relative; }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .edit-icon { position: absolute; bottom: 35px; right: 130px; background: #007bff; color: white; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white; cursor: pointer; z-index: 10; }

        .info-section { padding: 0 25px 15px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; border: none; border-bottom: 1px solid #ddd; padding: 8px 0; font-size: 15px; color: #333; outline: none; background: transparent; }

        /* Tombol Aksi */
        .action-area { padding: 0 25px; display: flex; flex-direction: column; gap: 12px; }
        .btn-save { background: #007bff; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; width: 100%; }
        .btn-back { background: #333; color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">Biodata & Kelengkapan Profil</div>
    
    <div class="photo-section">
        <div class="photo-circle" onclick="document.getElementById('fileInput').click()">
            <img id="profile-img" src="https://via.placeholder.com/150?text=Foto+Profil" alt="Foto Profil">
        </div>
        <div class="edit-icon" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-pen"></i>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="previewAndUpload(this)">
    </div>

    <div class="info-section">
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="prof-nama">
        </div>
        <div class="input-group">
            <label>Jabatan / Peran</label>
            <select id="prof-jabatan">
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>
        <div class="input-group">
            <label>Email Aktif</label>
            <input type="email" id="prof-email" readonly>
        </div>
        <div class="input-group">
            <label>Nomor HP (WhatsApp)</label>
            <input type="text" id="prof-hp">
        </div>
        <div class="input-group">
            <label>Lokasi Komsel JC</label>
            <select id="prof-jc">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>
        <div class="input-group">
            <label>Golongan Darah</label>
            <select id="prof-goldar">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>
    </div>

    <div class="action-area">
        <button class="btn-save" onclick="updateProfil()">SIMPAN PERUBAHAN</button>
        <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const userEmail = localStorage.getItem("userEmail");

    // Load Data Otomatis dari Firebase
    async function loadProfile() {
        if (!userEmail) return;
        const snap = await db.collection("users").where("email", "==", userEmail).get();
        if (!snap.empty) {
            const d = snap.docs[0].data();
            document.getElementById('prof-nama').value = d.nama || "";
            document.getElementById('prof-email').value = d.email || "";
            document.getElementById('prof-hp').value = d.no_hp || "";
            document.getElementById('prof-jabatan').value = d.jabatan || "Anggota Komsel";
            document.getElementById('prof-jc').value = d.komsel || "JC 1";
            document.getElementById('prof-goldar').value = d.goldar || "A";
            if (d.fotoUrl) document.getElementById('profile-img').src = d.fotoUrl;
        }
    }

    // Fungsi Upload Foto ke Storage
    async function previewAndUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const storageRef = storage.ref('users_photo/' + userEmail);
        try {
            const task = await storageRef.put(file);
            const url = await task.ref.getDownloadURL();
            document.getElementById('profile-img').src = url;
            alert("Foto berhasil diunggah!");
        } catch (err) { alert("Gagal upload: " + err.message); }
    }

    // Update Data ke Firestore
    async function updateProfil() {
        const snap = await db.collection("users").where("email", "==", userEmail).get();
        if (!snap.empty) {
            const id = snap.docs[0].id;
            await db.collection("users").doc(id).update({
                nama: document.getElementById('prof-nama').value,
                no_hp: document.getElementById('prof-hp').value,
                jabatan: document.getElementById('prof-jabatan').value,
                komsel: document.getElementById('prof-jc').value,
                goldar: document.getElementById('prof-goldar').value,
                fotoUrl: document.getElementById('profile-img').src
            });
            alert("Profil berhasil diperbarui!");
        }
    }

    loadProfile();
</script>
</body>
</html>
