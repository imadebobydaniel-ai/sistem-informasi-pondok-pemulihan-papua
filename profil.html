<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .profile-card { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .header { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 18px; }
        .photo-section { text-align: center; padding: 30px 20px; position: relative; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; border: 5px solid #00e676; object-fit: cover; background: #eee; }
        .progress-circle { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        
        .form-body { padding: 0 25px 25px; }
        .input-group { margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; }
        .input-group input, .input-group select { width: 100%; border: none; padding: 8px 0; font-size: 15px; font-weight: 500; outline: none; background: transparent; }
        
        .btn-save { width: 100%; background: #007bff; color: white; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-menu { width: 100%; background: white; color: #007bff; border: 2px solid #007bff; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header">Biodata & Kelengkapan Profil</div>
    
    <div class="photo-section">
        <img src="https://via.placeholder.com/150" id="display_foto" class="profile-img">
        <div class="progress-circle" id="prog_text">100%</div>
        <p style="font-size: 12px; color: #999; margin-top: 10px;">Klik foto untuk ganti, isi data di bawah</p>
    </div>

    <div class="form-body">
        <input type="hidden" id="user_doc_id">
        
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="p_nama" placeholder="Masukkan Nama">
        </div>

        <div class="input-group">
            <label>Jabatan / Peran</label>
            <select id="p_jabatan">
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Wakil ketua Komsel">Wakil ketua Komsel</option>
            </select>
        </div>

        <div class="input-group">
            <label>Email Aktif</label>
            <input type="email" id="p_email" placeholder="nama@email.com">
        </div>

        <div class="input-group">
            <label>Nomor HP (WhatsApp)</label>
            <input type="number" id="p_hp" placeholder="0812...">
        </div>

        <div class="input-group">
            <label>Lokasi Komsel JC</label>
            <select id="p_jc">
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <div class="input-group">
            <label>Golongan Darah</label>
            <select id="p_goldar">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <button class="btn-save" onclick="updateProfil()">
            <i class="fa-solid fa-circle-check"></i> SIMPAN PERUBAHAN
        </button>

       <a href="menu.html" class="btn-menu">← Kembali ke Menu</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const storage = firebase.storage();

    // 1. FUNGSI AMBIL DATA OTOMATIS (Mencegah isi berulang-ulang)
    function muatDataProfilOtomatis() {
        const userEmail = localStorage.getItem('userEmail');
        
        if (!userEmail) {
            console.log("Sesi email tidak ditemukan di localStorage");
            return;
        }

        db.collection("users").where("email", "==", userEmail).get().then((querySnapshot) => {
            if (!querySnapshot.empty) {
                const doc = querySnapshot.docs[0];
                const data = doc.data();
                
                // Isi form otomatis dari database
                document.getElementById('user_doc_id').value = doc.id;
                document.getElementById('p_nama').value = data.nama || "";
                document.getElementById('p_jabatan').value = data.jabatan || "";
                document.getElementById('p_email').value = data.email || "";
                document.getElementById('p_hp').value = data.nomor_hp || data.no_hp || "";
                document.getElementById('p_jc').value = data.komsel || "";
                document.getElementById('p_goldar').value = data.gol_darah || "";
                
                // Muat foto profil jika sudah pernah upload
                if (data.fotoUrl) {
                    document.getElementById('display_foto').src = data.fotoUrl;
                }
            }
        }).catch((error) => {
            console.error("Gagal mengambil data database:", error);
        });
    }

    // 2. FUNGSI UPLOAD FOTO MANUAL
    function uploadFotoManual() {
        const fileInput = document.getElementById('input_file');
        const file = fileInput.files[0];
        const docId = document.getElementById('user_doc_id').value;

        if (!file || !docId) return;

        const storageRef = storage.ref('profil/' + docId);
        storageRef.put(file).then(() => {
            storageRef.getDownloadURL().then((url) => {
                db.collection("users").doc(docId).update({ fotoUrl: url }).then(() => {
                    document.getElementById('display_foto').src = url;
                    alert("Foto Berhasil Diupload!");
                });
            });
        });
    }

    // 3. FUNGSI UPDATE DATA (Jika user ingin ubah biodata)
    function simpanPerubahanProfil() {
        const docId = document.getElementById('user_doc_id').value;
        if (!docId) return alert("Data belum dimuat sempurna.");

        const dataUpdate = {
            nama: document.getElementById('p_nama').value,
            jabatan: document.getElementById('p_jabatan').value,
            email: document.getElementById('p_email').value,
            nomor_hp: document.getElementById('p_hp').value,
            komsel: document.getElementById('p_jc').value,
            gol_darah: document.getElementById('p_goldar').value
        };

        db.collection("users").doc(docId).update(dataUpdate).then(() => {
            localStorage.setItem('userEmail', dataUpdate.email);
            alert("Biodata Berhasil Diperbarui di Database!");
        });
    }

    // JALANKAN FUNGSI MUAT DATA SAAT HALAMAN DIBUKA
    window.onload = muatDataProfilOtomatis;
</script>

</body>
</html>
