<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio Profil - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --biru-muda: #00e6e6;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            color: #333;
        }

        .profile-container { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 25px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding-bottom: 25px;
            border-top: 6px solid var(--biru-safir);
        }

        .profile-header { 
            background: var(--biru-tua); 
            color: white; 
            padding: 25px; 
            text-align: center; 
            font-weight: 900; 
            font-size: 18px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--emas-lux);
        }

        .photo-section { 
            text-align: center; 
            padding: 35px 0 20px; 
            position: relative; 
            background: linear-gradient(180deg, var(--biru-tua) 0%, white 100%);
            margin-bottom: 10px;
        }

        .photo-circle { 
            width: 150px; 
            height: 150px; 
            border-radius: 50%; 
            border: 4px solid var(--emas-lux); 
            margin: 0 auto; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: white; 
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: 0.3s;
        }

        .photo-circle:active { transform: scale(0.95); }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .edit-badge { 
            position: absolute; 
            bottom: 25px; 
            right: calc(50% - 70px); 
            background: var(--hijau-zamrud); 
            color: white; 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 3px solid white; 
            cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .info-section { padding: 10px 25px 20px; }

        .data-box { 
            margin-bottom: 15px; 
            padding: 12px 15px; 
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid var(--biru-safir);
            transition: 0.3s;
        }

        .data-box:hover { background: #f1f3f5; border-left-color: var(--hijau-zamrud); }

        .data-label { 
            font-size: 10px; 
            font-weight: 800; 
            color: var(--biru-safir); 
            text-transform: uppercase; 
            margin-bottom: 4px; 
            letter-spacing: 0.5px;
        }

        .data-value { 
            font-size: 15px; 
            color: var(--biru-tua); 
            font-weight: 700; 
        }

        .action-area { padding: 0 25px; }

        .btn-back { 
            background: var(--biru-tua); 
            color: white; 
            border: 2px solid var(--emas-lux); 
            padding: 15px; 
            border-radius: 50px; 
            font-weight: 800; 
            cursor: pointer; 
            text-align: center; 
            text-decoration: none; 
            font-size: 14px; 
            display: block; 
            width: 100%; 
            box-sizing: border-box; 
            box-shadow: 0 5px 15px rgba(0,51,102,0.2);
            transition: 0.3s;
        }

        .btn-back:active { transform: scale(0.95); background: #000; }
        
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">Biodata Anggota Komsel</div>
    
    <div class="photo-section">
        <div class="photo-circle" onclick="document.getElementById('fileInput').click()">
            <img id="view-foto" src="https://via.placeholder.com/150?text=Upload+Foto" alt="Foto Profil">
        </div>
        <div class="edit-badge" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-camera"></i>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="uploadFoto(this)">
    </div>

    <div class="info-section">
        <div class="data-box">
            <div class="data-label">Nomor Komsel (NK)</div>
            <div id="nomor_komsel" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Nama Lengkap</div>
            <div id="nama_lengkap" class="data-value">Memuat data...</div>
        </div>
        <div class="data-box">
            <div class="data-label">Jabatan / Peran</div>
            <div id="jabatan" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Email Aktif</div>
            <div id="email_aktif" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Nomor HP (WhatsApp)</div>
            <div id="no_hp" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Lokasi Komsel JC</div>
            <div id="lokasi_komsel" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Golongan Darah</div>
            <div id="gol_darah" class="data-value">-</div>
        </div>
        <div class="data-box">
            <div class="data-label">Alamat</div>
            <div id="alamat" class="data-value">-</div>
        </div>
    </div>

    <div class="action-area">
        <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.firestore();
    const storage = firebase.storage();
    const userEmail = localStorage.getItem("userEmail");

    // Validasi Sesi
    if (!userEmail) {
        window.location.replace("index.html");
    } else {
        // Load Data Profil & Foto secara Real-time
        db.collection("users").where("email", "==", userEmail)
            .onSnapshot((querySnapshot) => {
                if (!querySnapshot.empty) {
                    const data = querySnapshot.docs[0].data();
                    
                    // Update Foto jika ada URL di database
                    if (data.fotoUrl) {
                        document.getElementById('view-foto').src = data.fotoUrl;
                    }

                    document.getElementById("nomor_komsel").innerText = data.nomor_komsel || "-";
                    document.getElementById("nama_lengkap").innerText = data.nama || "-";
                    document.getElementById("jabatan").innerText = data.jabatan || "-";
                    document.getElementById("email_aktif").innerText = data.email || "-";
                    document.getElementById("no_hp").innerText = data.no_hp || "-";
                    document.getElementById("alamat").innerText = data.alamat || "-";
                    document.getElementById("gol_darah").innerText = data.golongan_darah || "-";
                    document.getElementById("lokasi_komsel").innerText = data.komsel ? "JC " + data.komsel : "-";
                }
            });
    }

    // Fungsi Upload Foto ke Storage & Update Link ke Firestore
    async function uploadFoto(input) {
        const file = input.files[0];
        if (!file || !userEmail) return;

        const viewFoto = document.getElementById('view-foto');
        viewFoto.style.opacity = "0.5"; // Indikator loading visual
        
        // Simpan di folder 'users_photo' dengan nama file = email user
        const storageRef = storage.ref('users_photo/' + userEmail);
        
        try {
            // 1. Upload ke Storage
            const uploadTask = await storageRef.put(file);
            
            // 2. Ambil Link Download
            const downloadURL = await uploadTask.ref.getDownloadURL();
            
            // 3. Cari ID dokumen user di Firestore dan update field 'fotoUrl'
            const snap = await db.collection("users").where("email", "==", userEmail).get();
            if (!snap.empty) {
                await db.collection("users").doc(snap.docs[0].id).update({
                    fotoUrl: downloadURL
                });
            }
            async function uploadFoto(input) {
    const file = input.files[0];
    if (!file || !userEmail) return;

    // Supaya database tidak keberatan, batasi ukuran foto (Max 1MB)
    if (file.size > 1024 * 1024) { 
        alert("Foto terlalu besar, Pak. Silakan gunakan foto di bawah 1MB.");
        return;
    }

    const reader = new FileReader();
    reader.onload = async function(e) {
        const teksGambar = e.target.result; // Ini adalah foto yang sudah jadi teks
        const viewFoto = document.getElementById('view-foto');

        try {
            // Cari data Bapak di database berdasarkan email
            const snap = await db.collection("users").where("email", "==", userEmail).get();
            if (!snap.empty) {
                const docId = snap.docs[0].id;
                
                // Simpan teks foto langsung ke Firestore
                await db.collection("users").doc(docId).update({
                    fotoUrl: teksGambar
                });
                
                viewFoto.src = teksGambar;
                alert("Puji Tuhan! Foto sudah berhasil diganti.");
            }
        } catch (error) {
            alert("Ada kendala: " + error.message);
        }
    };
    reader.readAsDataURL(file);
}
            
            alert("Puji Tuhan! Foto Profil Berhasil Diperbarui.");
        } catch (error) {
            console.error(error);
            alert("Gagal upload: " + error.message);
        } finally {
            viewFoto.style.opacity = "1";
        }
    }
</script>
</body>
</html>
