<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio Profil - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center; 
            color: #333;
        }

        .profile-container { 
            background: white; width: 100%; max-width: 400px; 
            border-radius: 25px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            padding-bottom: 25px; border-top: 6px solid var(--biru-safir);
        }

        .profile-header { 
            background: var(--biru-tua); color: white; 
            padding: 25px; text-align: center; 
            font-weight: 900; text-transform: uppercase;
            border-bottom: 3px solid var(--emas-lux);
        }

        .photo-section { 
            text-align: center; padding: 35px 0 20px; 
            position: relative; 
            background: linear-gradient(180deg, var(--biru-tua) 0%, white 100%);
        }

        .photo-circle { 
            width: 150px; height: 150px; 
            border-radius: 50%; border: 4px solid var(--emas-lux); 
            margin: 0 auto; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: white; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .edit-badge { 
            position: absolute; bottom: 25px; right: calc(50% - 70px); 
            background: var(--hijau-zamrud); color: white; 
            width: 42px; height: 42px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 3px solid white; cursor: pointer;
        }

        .info-section { padding: 10px 25px 20px; }

        .data-box { 
            margin-bottom: 15px; padding: 12px 15px; 
            background: #f8f9fa; border-radius: 12px;
            border-left: 4px solid var(--biru-safir);
        }

        .data-label { font-size: 10px; font-weight: 800; color: var(--biru-safir); text-transform: uppercase; margin-bottom: 4px; }
        .data-value { font-size: 14px; color: var(--biru-tua); font-weight: 700; }

        .btn-back { 
            background: var(--biru-tua); color: white; 
            border: 2px solid var(--emas-lux); padding: 15px; 
            border-radius: 50px; font-weight: 800; 
            cursor: pointer; text-align: center; 
            text-decoration: none; display: block; 
            width: 85%; margin: 0 auto;
        }
        
        #fileInput { display: none; }

        /* Gaya Kotak Notifikasi Block */
        #notif-block {
            position: fixed; top: 20px; left: 50%; 
            transform: translateX(-50%); 
            background: #2ecc71; color: white; 
            padding: 15px 25px; border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            z-index: 9999; font-weight: bold; 
            text-align: center; border: 2px solid white;
            display: none; /* Sembunyi dulu */
        }
    </style>
</head>
<body>

<div id="notif-block">Puji Tuhan! Foto berhasil diperbarui.</div>

<div class="profile-container">
    <div class="profile-header">Biodata Anggota Komsel</div>
    
    <div class="photo-section">
        <div class="photo-circle" onclick="document.getElementById('fileInput').click()">
            <img id="view-foto" src="https://via.placeholder.com/150?text=Pilih+Foto" alt="Foto Profil">
        </div>
        <div class="edit-badge" onclick="document.getElementById('fileInput').click()">
            <i class="fa-solid fa-camera"></i>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="prosesSimpanFoto(this)">
    </div>

    <div class="info-section">
        <div class="data-box"><div class="data-label">Nama Lengkap</div><div id="nama_lengkap" class="data-value">Memuat...</div></div>
        <div class="data-box"><div class="data-label">Email Aktif</div><div id="email_aktif" class="data-value">-</div></div>
        <div class="data-box"><div class="data-label">Nomor HP</div><div id="no_hp" class="data-value">-</div></div>
        <div class="data-box"><div class="data-label">Lokasi Komsel</div><div id="lokasi_komsel" class="data-value">-</div></div>
    </div>

    <div class="action-area">
        <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    // Tampilkan Data
    if (!userEmail) {
        window.location.replace("index.html");
    } else {
        db.collection("users").where("email", "==", userEmail)
            .onSnapshot((querySnapshot) => {
                if (!querySnapshot.empty) {
                    const data = querySnapshot.docs[0].data();
                    if (data.fotoUrl) {
                        document.getElementById('view-foto').src = data.fotoUrl;
                    }
                    document.getElementById("nama_lengkap").innerText = data.nama || "-";
                    document.getElementById("email_aktif").innerText = data.email || "-";
                    document.getElementById("no_hp").innerText = data.no_hp || "-";
                    document.getElementById("lokasi_komsel").innerText = data.komsel ? "JC " + data.komsel : "-";
                }
            });
    }

    // Fungsi Ganti Foto & Notifikasi
    async function prosesSimpanFoto(input) {
        const file = input.files[0];
        if (!file || !userEmail) return;

        // Cek ukuran
        if (file.size > 1024 * 1024) { 
            alert("Maaf Pak, ukuran foto terlalu besar (Maksimal 1MB).");
            return;
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Image = e.target.result;
            const viewFoto = document.getElementById('view-foto');
            viewFoto.style.opacity = "0.5";

            try {
                const snap = await db.collection("users").where("email", "==", userEmail).get();
                if (!snap.empty) {
                    const docId = snap.docs[0].id;
                    await db.collection("users").doc(docId).update({
                        fotoUrl: base64Image
                    });
                    
                    // Tampilkan Notifikasi Block
                    const boxNotif = document.getElementById('notif-block');
                    boxNotif.style.display = "block";
                    
                    // Hilang otomatis setelah 3 detik
                    setTimeout(() => {
                        boxNotif.style.display = "none";
                    }, 3000);
                }
            } catch (error) {
                alert("Gagal simpan: " + error.message);
            } finally {
                viewFoto.style.opacity = "1";
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
