<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .profile-card { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .header-blue { background: #007bff; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.2em; }
        
        .photo-section { text-align: center; padding: 30px 20px; position: relative; background: #fff; }
        .profile-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 5px solid #f8f9fa; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-upload { position: absolute; bottom: 95px; right: 36%; background: #007bff; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; transition: 0.3s; }
        
        .info-container { padding: 0 25px 30px; }
        .info-item { border-bottom: 1px solid #f1f1f1; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .label { color: #888; font-size: 10px; text-transform: uppercase; font-weight: 800; }
        .value { color: #333; font-weight: 600; font-size: 14px; }
        .status-aktif { color: #28a745; font-weight: bold; }

        .btn-footer { display: block; width: 85%; margin: 0 auto 25px; padding: 13px; text-align: center; border: 2px solid #007bff; color: #007bff; text-decoration: none; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header-blue">Profil Saya</div>
    
    <div class="photo-section">
        <img src="https://via.placeholder.com/120" id="displayPhoto" class="profile-img">
        <label for="fileInput" class="btn-upload"><i class="fa-solid fa-pencil"></i></label>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
        
        <h3 id="p_nama" style="margin: 15px 0 5px; color: #2c3e50;">Memuat Nama...</h3>
        <p id="p_jabatan" style="color: #7f8c8d; font-size: 14px; margin: 0;">Memuat Jabatan...</p>
    </div>

    <div class="info-container">
        <div class="info-item"><span class="label">Email</span><span class="value" id="p_email">-</span></div>
        <div class="info-item"><span class="label">Nomor HP</span><span class="value" id="p_hp">-</span></div>
        <div class="info-item"><span class="label">Lokasi JC</span><span class="value" id="p_jc">-</span></div>
        <div class="info-item"><span class="label">Gol. Darah</span><span class="value" id="p_goldar">-</span></div>
        <div class="info-item"><span class="label">Status</span><span class="value status-aktif">Aktif</span></div>
    </div>

    <a href="main_menu.html" class="btn-footer">← Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389",
        measurementId: "G-X14300RJL4",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com"
    };
    
    // Inisialisasi Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function muatDataProfil() {
        // Ambil email user yang login (Default ke Boby jika belum login)
        let userEmail = localStorage.getItem('loggedUserEmail') || "boby.daniel4@gmail.com"; 
        const userKey = userEmail.replace(/\./g, ',');

        // Tarik data dari Firebase di node 'users'
        database.ref('users/' + userKey).once('value').then((snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('p_nama').innerText = data.nama || "User";
                document.getElementById('p_jabatan').innerText = data.jabatan || "Anggota";
                document.getElementById('p_email').innerText = data.email || userEmail;
                document.getElementById('p_hp').innerText = data.nomorHp || "-";
                document.getElementById('p_jc').innerText = data.lokasiJc || "-";
                document.getElementById('p_goldar').innerText = data.golDarah || "-";
                
                if (data.fotoProfil) {
                    document.getElementById('displayPhoto').src = data.fotoProfil;
                }
            } else {
                document.getElementById('p_nama').innerText = "Data Tidak Ditemukan";
                console.log("Cek Firebase Abang, pastikan ada folder 'users' lalu di dalamnya ada email '" + userKey + "'");
            }
        }).catch((err) => {
            console.error(err);
            document.getElementById('p_nama').innerText = "Gagal Koneksi";
        });
    }

    // Fungsi Upload Foto Khusus HP
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                document.getElementById('displayPhoto').src = base64Image;

                let userEmail = localStorage.getItem('loggedUserEmail') || "boby.daniel4@gmail.com";
                const userKey = userEmail.replace(/\./g, ',');
                
                // Simpan foto permanen ke Firebase
                database.ref('users/' + userKey).update({
                    fotoProfil: base64Image
                }).then(() => {
                    alert("Foto Berhasil Disimpan!");
                });
            };
            reader.readAsDataURL(file);
        }
    });

    window.onload = muatDataProfil;
</script>

</body>
</html>
