<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        
        .profile-card { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; position: relative; padding-bottom: 20px; }
        .header-blue { background: var(--primary); color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.1em; }

        /* Area Foto dengan Scoring & Pensil */
        .photo-wrapper { position: relative; width: 160px; height: 160px; margin: 30px auto 10px; display: flex; align-items: center; justify-content: center; }
        
        .progress-ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
        .progress-ring__circle { 
            stroke-dasharray: 440; 
            stroke-dashoffset: 440; 
            transition: stroke-dashoffset 0.8s ease-in-out, stroke 0.5s; 
            stroke: #e6e6e6; 
            stroke-width: 8; 
            fill: transparent; 
            stroke-linecap: round; 
        }

        .profile-img { width: 125px; height: 125px; border-radius: 50%; object-fit: cover; background: #f8f9fa; position: relative; z-index: 2; border: 4px solid white; cursor: pointer; }
        
        /* Tombol Pensil */
        .btn-edit-photo { 
            position: absolute; bottom: 15px; right: 15px; 
            background: var(--primary); color: white; 
            width: 35px; height: 35px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 10; border: 3px solid white; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-edit-photo:hover { transform: scale(1.1); }

        .score-badge { position: absolute; bottom: -5px; background: #333; color: white; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; z-index: 11; }

        /* Form Input */
        .info-container { padding: 0 25px; }
        .input-group { margin-bottom: 18px; border-bottom: 1.5px solid #eee; padding-bottom: 5px; transition: 0.3s; }
        .input-group:focus-within { border-bottom-color: var(--primary); }
        
        .input-group label { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: 800; margin-bottom: 2px; }
        .input-group input, .input-group select { 
            width: 100%; border: none; outline: none; 
            font-size: 14px; font-weight: 600; color: var(--text); 
            background: transparent; padding: 5px 0;
        }

        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(0,123,255,0.3); }
        .btn-back { display: block; text-align: center; color: #888; text-decoration: none; font-size: 13px; margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>

<div class="profile-card">
    <div class="header-blue">Biodata & Kelengkapan Profil</div>
    
    <div class="photo-wrapper">
        <svg class="progress-ring" width="160" height="160">
            <circle class="progress-ring__circle" id="circle" r="70" cx="80" cy="80"/>
        </svg>
        <img src="https://via.placeholder.com/125" id="displayPhoto" class="profile-img" onclick="document.getElementById('fileInput').click();">
        
        <div class="btn-edit-photo" onclick="document.getElementById('fileInput').click();">
            <i class="fas fa-pencil-alt"></i>
        </div>

        <div class="score-badge" id="scoreText">0%</div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div class="info-container">
        <div class="input-group">
            <label>Nama Lengkap</label>
            <input type="text" id="in_nama" placeholder="Ketik nama Abang..." oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Jabatan / Peran</label>
            <input type="text" id="in_jabatan" placeholder="Contoh: Koordinator" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Email Aktif</label>
            <input type="email" id="in_email" placeholder="email@contoh.com" oninput="hitungSkor()">
        </div>
        <div class="input-group">
            <label>Nomor HP (WhatsApp)</label>
            <input type="number" id="in_hp" placeholder="08..." oninput="hitungSkor()">
        </div>
        
        <div class="input-group">
            <label>Lokasi Komsel JC</label>
            <select id="in_jc" onchange="hitungSkor()">
                <option value="">-- Pilih Lokasi JC --</option>
                <option value="JC 1">JC 1</option>
                <option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option>
                <option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <div class="input-group">
            <label>Golongan Darah</label>
            <select id="in_goldar" onchange="hitungSkor()">
                <option value="">Pilih</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <button class="btn-save" onclick="simpanData()"><i class="fas fa-check-circle"></i> SIMPAN PERUBAHAN</button>
        <a href="main_menu.html" class="btn-back">← Kembali ke Menu</a>
    </div>
</div>

<script>
    function hitungSkor() {
        const fields = ['in_nama', 'in_jabatan', 'in_email', 'in_hp', 'in_jc', 'in_goldar'];
        let terisi = 0;
        
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (el.value.trim() !== "") {
                terisi++;
            }
        });

        // Tambah poin jika foto bukan placeholder
        const fotoSrc = document.getElementById('displayPhoto').src;
        if (!fotoSrc.includes('placeholder')) {
            terisi++;
        }

        const totalField = fields.length + 1; // +1 untuk foto
        const persen = Math.round((terisi / totalField) * 100);
        updateAnimasi(persen);
    }

    function updateAnimasi(percent) {
        const circle = document.getElementById('circle');
        const radius = circle.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        
        circle.style.strokeDasharray = `${circumference} ${circumference}`;
        const offset = circumference - (percent / 100 * circumference);
        circle.style.strokeDashoffset = offset;
        
        document.getElementById('scoreText').innerText = percent + "%";
        
        // Warna berubah sesuai progres
        if(percent < 40) circle.style.stroke = "#ff4757"; // Merah
        else if(percent < 80) circle.style.stroke = "#ffa502"; // Oranye
        else circle.style.stroke = "#2ed573"; // Hijau
    }

    function simpanData() {
        const profil = {
            nama: document.getElementById('in_nama').value,
            jabatan: document.getElementById('in_jabatan').value,
            email: document.getElementById('in_email').value,
            hp: document.getElementById('in_hp').value,
            jc: document.getElementById('in_jc').value,
            goldar: document.getElementById('in_goldar').value,
            foto: document.getElementById('displayPhoto').src
        };
        localStorage.setItem('user_profil_data', JSON.stringify(profil));
        alert("Profil Berhasil Diperbarui!");
    }

    window.onload = () => {
        const saved = localStorage.getItem('user_profil_data');
        if (saved) {
            const d = JSON.parse(saved);
            document.getElementById('in_nama').value = d.nama || "";
            document.getElementById('in_jabatan').value = d.jabatan || "";
            document.getElementById('in_email').value = d.email || "";
            document.getElementById('in_hp').value = d.hp || "";
            document.getElementById('in_jc').value = d.jc || "";
            document.getElementById('in_goldar').value = d.goldar || "";
            if(d.foto) document.getElementById('displayPhoto').src = d.foto;
        }
        hitungSkor();
    };

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('displayPhoto').src = event.target.result;
                hitungSkor(); // Hitung ulang setelah foto masuk
            };
            reader.readAsDataURL(file);
        }
    });
</script>

</body>
</html>
