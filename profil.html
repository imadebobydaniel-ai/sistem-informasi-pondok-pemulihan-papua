<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio Profil - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --biru-safir: #0056b3; --hijau-zamrud: #2ecc71; --emas-lux: #D4AF37; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; color: #333; }
        .profile-container { background: white; width: 100%; max-width: 400px; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding-bottom: 25px; border-top: 6px solid var(--biru-safir); position: relative; }
        .profile-header { background: var(--biru-tua); color: white; padding: 25px; text-align: center; font-weight: 900; text-transform: uppercase; border-bottom: 3px solid var(--emas-lux); }
        .photo-section { text-align: center; padding: 35px 0 20px; position: relative; background: linear-gradient(180deg, var(--biru-tua) 0%, white 100%); }
        .btn-setting { position: absolute; top: 15px; right: 15px; z-index: 100; color: white; text-decoration: none; transition: 0.3s; }
        .photo-circle { width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--emas-lux); margin: 0 auto; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #eee; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }
        .info-section { padding: 10px 25px 20px; }
        .data-box { margin-bottom: 12px; padding: 12px 15px; background: #f8f9fa; border-radius: 12px; border-left: 4px solid var(--biru-safir); transition: 0.3s; }
        .data-label { font-size: 10px; font-weight: 800; color: var(--biru-safir); text-transform: uppercase; margin-bottom: 4px; }
        .data-value { font-size: 15px; color: var(--biru-tua); font-weight: 700; }
        .btn-back { background: var(--biru-tua); color: white; border: 2px solid var(--emas-lux); padding: 15px; border-radius: 50px; font-weight: 800; cursor: pointer; text-align: center; text-decoration: none; display: block; width: 85%; margin: 10px auto 0; }
        #debug-msg { font-size: 12px; text-align: center; padding: 5px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-header">Biodata Anggota Jemaat</div>
    
    <div class="photo-section">
        <a href="setting.html" class="btn-setting"><i class="fas fa-cog" style="font-size: 22px;"></i></a>
        <div class="photo-circle" onclick="document.getElementById('inputFoto').click()">
            <img id="view-foto" src="https://via.placeholder.com/150" alt="Foto Profil">
        </div>
        <input type="file" id="inputFoto" hidden accept="image/*" onchange="uploadFoto(this)">
    </div>

    <div id="debug-msg"></div>

    <div class="info-section">
        <div class="data-box"><div class="data-label">Nomor Induk Jemaat (NIJ)</div><div id="no_komsel" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Nama Lengkap</div><div id="nama_lengkap" class="data-value">Memuat...</div></div>
        <div class="data-box"><div class="data-label">Jabatan / Peran</div><div id="jabatan" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Email Aktif</div><div id="email_aktif" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Nomor HP (WhatsApp)</div><div id="no_hp" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Lokasi Berjemaat</div><div id="lokasi_berjemaat" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Lokasi Komsel</div><div id="lokasi_komsel" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Golongan Darah</div><div id="gol_darah" class="data-value">...</div></div>
        <div class="data-box"><div class="data-label">Alamat</div><div id="alamat" class="data-value">...</div></div>
    </div>
    
    <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    
    const rawEmail = localStorage.getItem("userEmail");
    const userEmail = rawEmail ? rawEmail.toLowerCase().trim() : null;
    const debug = document.getElementById("debug-msg");

    // --- LOGIKA APRIL ---
    const skrg = new Date();
    const bulanIni = skrg.getMonth(); 
    const tahunIni = skrg.getFullYear();
    if (bulanIni === 3 && tahunIni === 2026) {
        document.querySelectorAll(".persentase-box").forEach(el => {
            el.innerText = "0%";
            el.style.backgroundColor = "#e0e0e0"; 
        });
    }

    if (!userEmail) {
        debug.innerHTML = "<span style='color:red'>⚠️ Sesi Habis. Silakan Login Kembali.</span>";
    } else {
        debug.innerText = "⌛ Menghubungkan ke database...";

        db.collection("users").where("email", "==", userEmail)
        .onSnapshot((querySnapshot) => {
            if (!querySnapshot.empty) {
                const d = querySnapshot.docs[0].data();
                console.log("Data ditemukan:", d);

                // 1. Foto Profil (Mengambil dari field 'foto_profil' atau 'url_berkas')
                document.getElementById('view-foto').src = d.foto_profil || d.url_berkas || "https://via.placeholder.com/150";

                // 2. Sinkronisasi Field (Disesuaikan dengan database Anda)
                document.getElementById("nama_lengkap").innerText = d.nama_lengkap || "Tanpa Nama";
                document.getElementById("no_komsel").innerText = d.nij || "-";
                document.getElementById("jabatan").innerText = d.jabatan || "-";
                document.getElementById("email_aktif").innerText = d.email || "-";
                
                // Perhatikan pemanggilan di bawah ini:
                document.getElementById("no_hp").innerText = d.whatsapp || "-"; 
                document.getElementById("lokasi_berjemaat").innerText = d.lokasi_berjemaat || "-";
                document.getElementById("lokasi_komsel").innerText = d.komsel || "-";
                document.getElementById("gol_darah").innerText = d.darah || "-";
                document.getElementById("alamat").innerText = d.alamat || "-";

                debug.innerText = ""; // Hilangkan pesan loading
            } else {
                debug.innerHTML = `<span style='color:orange'>ℹ️ Akun '${userEmail}' tidak terdaftar.</span>`;
            }
        }, (error) => {
            console.error("Error Firestore:", error);
            debug.innerHTML = `<span style='color:red'>❌ Error: ${error.message}</span>`;
        });
    }

    async function uploadFoto(input) {
        const file = input.files[0];
        if (!file || !userEmail) return;
        debug.innerText = "⌛ Memproses foto...";
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                let width = img.width, height = img.height, max_size = 400;
                if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64 = canvas.toDataURL('image/jpeg', 0.8);
                try {
                    const snap = await db.collection("users").where("email", "==", userEmail).get();
                    if (!snap.empty) {
                        await db.collection("users").doc(snap.docs[0].id).update({ foto_profil: base64 });
                        debug.innerHTML = "<span style='color:green'>✅ Berhasil!</span>";
                        setTimeout(() => { debug.innerText = ""; }, 2000);
                    }
                } catch (err) {
                    debug.innerText = "Gagal: " + err.message;
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
