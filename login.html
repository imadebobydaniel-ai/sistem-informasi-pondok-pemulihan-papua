<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .header-section { margin-bottom: 25px; }
        .logo-main { width: 90px; height: auto; margin-bottom: 15px; }
        #text-org { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; text-transform: uppercase; display: block; }
        #text-system { margin: 8px 0; font-size: 18px; color: #FFD700; font-weight: bold; display: block; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        #text-status { margin: 10px 0; font-size: 16px; color: #555; font-weight: normal; display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .btn-blue { background: #007bff; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* Tambahan Style untuk Link Bawah */
        .footer-links { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .link-regis { display: block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .link-admin { display: block; color: #888; text-decoration: none; font-size: 12px; }
        .link-admin:hover { color: #333; }

        #error-block {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 20px;
        }
        .error-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .btn-close-error { background: #dc3545; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="header-section">
        <img src="logo_pondok.png" alt="Logo" class="logo-main">
        <span id="text-org">PONDOK PEMULIHAN PAPUA</span>
        <span id="text-system">Sistem Informasi Komsel JC</span>
        <span id="text-status">Login Anggota Komsel</span>
    </div>

    <input type="email" id="email" placeholder="Email Anggota">
    <input type="password" id="pass" placeholder="Password">
    <button class="btn-blue" onclick="prosesLogin()">MASUK</button>

    <div class="footer-links">
        <a href="registrasi.html" class="link-regis">BELUM PUNYA AKUN? DAFTAR SEKARANG</a>
        <a href="login_admin.html" class="link-admin">
            <i class="fa-solid fa-user-shield"></i> LOGIN ADMINISTRATOR
        </a>
    </div>
</div>

<div id="error-block">
    <div class="error-card">
        <i class="fa-solid fa-circle-exclamation" style="font-size: 50px; color: #dc3545;"></i>
        <h4 id="error-title">Gagal Masuk</h4>
        <p id="error-text">Terjadi kendala teknis.</p>
        <button class="btn-close-error" onclick="hideError()">COBA LAGI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function showError(t, m) {
        document.getElementById("error-title").innerText = t;
        document.getElementById("error-text").innerText = m;
        document.getElementById("error-block").style.display = "flex";
    }

    function hideError() {
        document.getElementById("error-block").style.display = "none";
    }

    async function prosesLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passInput = document.getElementById('pass').value;

        if(!emailInput || !passInput) {
            showError("Data Kosong", "Isi email dan password.");
            return;
        }

        try {
            // Gunakan satu Query saja untuk email (Case Sensitive)
            const snapshot = await db.collection("users").where("email", "==", emailInput).get();

            if (snapshot.empty) {
                showError("User Tidak Ada", "Email tidak terdaftar.");
                return;
            }

            const userDoc = snapshot.docs[0].data();

            if (userDoc.password === passInput) {
                // SIMPAN DATA KE STORAGE
                localStorage.setItem("userEmail", emailInput);
                localStorage.setItem("userName", userDoc.nama);
                localStorage.setItem("userKomsel", String(userDoc.komsel));
                
                window.location.href = "menu.html";
            } else {
                showError("Password Salah", "Periksa kembali password Anda.");
            }
        } catch (e) {
            showError("Database Error", e.message);
        }
    }
</script>
</body>
</html>
