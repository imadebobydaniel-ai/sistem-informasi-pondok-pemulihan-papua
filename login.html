<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        .logo-container { margin-bottom: 10px; }
        .logo-container img { width: 100px; height: auto; }
        h2 { font-weight: bold; font-size: 18px; color: #333; margin-bottom: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .btn-red { background: #ff0000; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; transition: 0.3s; }
        .btn-red:hover { background: #cc0000; }
        .footer-links { text-align: left; margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo-container">
        <img src="logo_pondok.png" alt="Logo">
    </div>
    
    <h2>MASUK ADMINISTRATOR</h2>
    
    <input type="email" id="adminEmail" placeholder="Email Admin">
    <input type="password" id="adminPass" placeholder="Password Admin">
    
    <button class="btn-red" onclick="checkAdmin()">MASUK SEKARANG</button>
    
    <div class="footer-links">
        <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Kembali ke login page</a>
    </div>
</div>

<script>
    function checkAdmin() {
        const email = document.getElementById('adminEmail').value;
        const pass = document.getElementById('adminPass').value;

        // Validasi Email & Password Admin sesuai standar Abang
        if (email === "admin@pondok.com" && pass === "papua123") {
            alert("Akses Administrator Diterima!");
            window.location.href = "admin.html";
        } else {
            alert("Email atau Password Admin Salah!");
        }
    }
</script>

</body>
</html>
