<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emas-lux: #D4AF37; --grey-bg: #2c2c2c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--grey-bg); display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 0.8s; }
        .logo-wrapper { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; }
        .splash-logo { width: 120px; z-index: 2; animation: pulse 2s infinite ease-in-out; }
        .gold-loader { position: absolute; width: 160px; height: 160px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid var(--emas-lux); border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-hidden { opacity: 0; visibility: hidden; }

        /* LOGIN CARD */
        .login-card { background: #ffffff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; border-top: 5px solid #007bff; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 80px; }
        .header h2 { margin: 10px 0 0; color: #333; font-size: 18px; }
        .header span { color: #ffcc00; font-size: 12px; background: #2c3e50; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 5px; }

        /* NOTIFIKASI */
        #login-msg { display: none; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; }
        .msg-error { display: block !important; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .msg-success { display: block !important; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .toggle-password { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; }
        .btn-login { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div style="text-align: center;">
            <div class="logo-wrapper">
                <img src="logo_pondok.png" alt="Logo" class="splash-logo">
                <div class="gold-loader"></div>
            </div>
            <p style="color: var(--emas-lux); font-weight: bold; letter-spacing: 2px;">PONDOK PEMULIHAN PAPUA</p>
        </div>
    </div>

    <div class="login-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
            <h2>Pondok Pemulihan Papua</h2>
            <span>SISTEM INFORMASI JEMAAT</span>
        </div>

        <div id="login-msg"></div>

        <form id="userLoginForm">
            <div class="form-group">
                <label>Email Anggota</label>
                <input type="email" id="user_email" required placeholder="Masukkan email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="user_pass" required placeholder="Masukkan password">
                <i class="fa-solid fa-eye toggle-password" id="toggleEye"></i>
            </div>
            <button type="submit" id="btnMasuk" class="btn-login">MASUK</button>
        </form>

        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <a href="login_cyber.html" style="color: #888; font-size: 11px;">Masuk sebagai Admin</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // CONFIG & INITIALIZE
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 1. SPLASH SCREEN LOGIC
        window.addEventListener("load", () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('splash-hidden');
                document.body.style.overflow = "auto";
            }, 2000);
        });

        // 2. TOGGLE PASSWORD
        document.getElementById('toggleEye').addEventListener('click', function() {
            const passField = document.getElementById('user_pass');
            const type = passField.type === 'password' ? 'text' : 'password';
            passField.type = type;
            this.classList.toggle('fa-eye-slash');
        });

        // 3. LOGIN LOGIC (OPTIMIZED & SECURED)
        let isProcessing = false; // Kunci utama anti-dobel klik

        document.getElementById('userLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Jika sedang memproses, hentikan eksekusi tambahan
            if (isProcessing) return; 

            const email = document.getElementById('user_email').value.trim().toLowerCase();
            const pass = document.getElementById('user_pass').value;
            const msgBox = document.getElementById('login-msg');
            const btn = document.getElementById('btnMasuk');

            // Kunci proses & Update UI
            isProcessing = true;
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;
            msgBox.className = "";
            msgBox.style.display = "none";

            try {
                // Mencari di koleksi "users" sesuai database Anda
                const snap = await db.collection("users")
                    .where("email", "==", email)
                    .where("password", "==", pass)
                    .get();

                if (!snap.empty) {
                    msgBox.innerText = "Login Berhasil!";
                    msgBox.className = "msg-success";
                    
                    // Gunakan REPLACE agar history login hilang (mencegah klik back kembali login)
                    setTimeout(() => { 
                        window.location.replace("menu.html"); 
                    }, 1000);
                } else {
                    throw new Error("Email atau Password salah!");
                }
            } catch (err) {
                msgBox.innerText = err.message;
                msgBox.className = "msg-error";
                
                // Reset UI & Buka kunci kembali jika gagal
                btn.innerText = "MASUK";
                btn.disabled = false;
                isProcessing = false; 
            }
        });
    </script>
</body>
</html>
