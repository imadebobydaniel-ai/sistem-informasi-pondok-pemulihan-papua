<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
</head>
<body style="margin:0; background:#f0f2f5; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif;">

    <div style="background:white; width:320px; padding:30px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1); text-align:center;">
        
        <div style="width:100%; margin-bottom:15px;">
            <img src="logo_pondok.png?v=1.1" alt="Logo" style="width:80px; height:auto;">
        </div>

        <h2 style="margin:0 0 10px 0; display:block; width:100%; color:#333;">Masuk Aplikasi</h2>
        
        <p style="font-size:13px; color:#777; margin-bottom:20px;">Gunakan Nomor KTP Anda</p>

        <input type="text" id="loginKtp" placeholder="Masukkan Nomor KTP" style="width:100%; padding:12px; margin-bottom:10px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box;">
        
        <div id="errorMessage" style="color:red; font-size:12px; display:none; margin-bottom:10px;">Data tidak ditemukan!</div>

        <button onclick="prosesLogin()" style="width:100%; padding:12px; background:#007bff; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Masuk Sekarang</button>
        
        <div style="margin-top:20px; border-top:1px solid #eee; padding-top:15px;">
            <a href="profile.html" style="color:#007bff; text-decoration:none; font-size:14px;">Daftar Anggota Baru</a>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        function prosesLogin() {
            const ktp = document.getElementById("loginKtp").value;
            const err = document.getElementById("errorMessage");
            if(!ktp) return alert("Isi KTP!");
            db.collection("users").where("no_ktp", "==", ktp).get().then(s => {
                if(!s.empty) window.location.href="main.menu.html";
                else err.style.display="block";
            });
        }
    </script>
</body>
</html>
