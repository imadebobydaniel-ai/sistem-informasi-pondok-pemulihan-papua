<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* Struktur asli sesuai yang Abang bangun */
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .field { margin-bottom: 15px; }
        .field label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        /* CSS Perbaikan: Mengunci posisi mata agar tidak lari */
        .password-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        .password-wrapper input { 
            padding-right: 40px; 
        }
        .eye-icon { 
            position: absolute; 
            right: 10px; 
            cursor: pointer; 
            font-size: 20px; 
            color: #333; /* Warna dipertegas agar kontras */
            user-select: none;
            -webkit-user-select: none;
            padding: 5px;
            z-index: 999; /* Memastikan di lapisan paling atas */
        }

        .btn-login { width: 100%; padding: 12px; background: #ff003c; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .link-reg { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Masuk</h2>
    
    <div class="field">
        <label>Email Anggota</label>
        <input type="email" id="login_email" placeholder="Masukkan email">
    </div>

    <div class="field">
        <label>Password</label>
        <div class="password-wrapper">
            <input type="password" id="login_password" placeholder="Masukkan password">
            <span class="eye-icon" 
                  onmousedown="intip(true)" 
                  onmouseup="intip(false)" 
                  onmouseleave="intip(false)"
                  ontouchstart="intip(true)" 
                  ontouchend="intip(false)">
                &#128065;
            </span>
        </div>
    </div>

    <button class="btn-login" onclick="prosesLogin()">Masuk Sekarang</button>
    <a href="daftar.html" class="link-reg">Belum punya akun? Daftar</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function intip(lihat) {
        const pInput = document.getElementById('login_password');
        if(lihat) {
            pInput.type = 'text';
        } else {
            pInput.type = 'password';
        }
    }

  async function prosesLogin() {
    const email = document.getElementById('login_email').value.trim();
    const pass = document.getElementById('login_password').value.trim();

    if (!email || !pass) {
        return alert("Harap isi email dan password!");
    }

    try {
        const querySnapshot = await db.collection("users")
            .where("email", "==", email)
            .where("password", "==", pass)
            .get();

      if (!querySnapshot.empty) {
    alert("Login Berhasil!");
    // Gunakan URL lengkap jika file berada di folder yang sama
    // Ini akan memaksa browser mengabaikan cache lama
    window.location.href = "main.menu.html";
}else {
            alert("Data tidak ditemukan.");
        }
    } catch (error) {
        alert("Error: " + error.message);
    }
}
</script>

</body>
</html>
