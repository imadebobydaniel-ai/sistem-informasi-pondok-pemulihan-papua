<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .header-section { margin-bottom: 25px; }
        .logo-main { width: 90px; height: auto; margin-bottom: 15px; }
        #text-org { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; text-transform: uppercase; display: block; }
        #text-system { margin: 8px 0; font-size: 18px; color: #FFD700; font-weight: bold; display: block; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        #text-status { margin: 10px 0; font-size: 16px; color: #555; font-weight: normal; display: block; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        
        .password-container { position: relative; width: 100%; }
        .password-container input { width: 100%; padding-right: 40px; box-sizing: border-box; }

        .toggle-password {
            position: absolute;
            right: 15px; 
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #888; 
            font-size: 18px;
            z-index: 10; 
            transition: color 0.2s;
        }

        @keyframes eyeBlink {
            0%, 100% { opacity: 1; }  
            20% { opacity: 0; }       
            40% { opacity: 1; }       
        }

        .eye-blinking { animation: eyeBlink 3s infinite; }

        .btn-blue { background: #007bff; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-blue:disabled { background: #ccc; cursor: not-allowed; }
        .footer-links { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; }
        .link-regis { display: block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        .link-admin { display: block; color: #888; text-decoration: none; font-size: 12px; }

        #error-block { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .error-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .btn-close-error { background: #dc3545; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="header-section">
        <img src="logo_pondok.png" alt="Logo" class="logo-main">
        <span id="text-org">PONDOK PEMULIHAN PAPUA</span>
        <span id="text-system">Sistem Informasi Komsel JC</span>
        <span id="text-status">Login Administrator / Anggota</span>
    </div>

    <input type="email" id="email" placeholder="Email Terdaftar">

    <div class="password-container">
        <input type="password" id="pass" placeholder="Password">
        <i class="fa-solid fa-eye toggle-password" id="toggle-icon"></i>
    </div>

    <button id="btn-login" class="btn-blue" onclick="prosesLogin()">MASUK</button>

    <div class="footer-links">
        <a href="registrasi.html" class="link-regis">BELUM PUNYA AKUN? DAFTAR SEKARANG</a>
        <a href="login_cyber.html" class="link-admin">
            <i class="fa-solid fa-user-shield"></i> LOGIN KHUSUS CYBER
        </a>
    </div>
</div>

<div id="error-block">
    <div class="error-card">
        <i class="fa-solid fa-circle-exclamation" style="font-size: 50px; color: #dc3545; margin-bottom: 15px;"></i>
        <h3 style="margin:0; color:#333;">Login Gagal</h3>
        <p id="error-text" style="font-size: 13px; color: #666; line-height: 1.5; margin: 10px 0; word-break: break-word;"></p>
        <button class="btn-close-error" onclick="hideError()">COBA LAGI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Toggle Password Visibility
    document.addEventListener("DOMContentLoaded", function() {
        const passwordInput = document.getElementById('pass');
        const toggleIcon = document.getElementById('toggle-icon');
        if (passwordInput && toggleIcon) {
            toggleIcon.classList.add('eye-blinking');
            toggleIcon.addEventListener('click', function() {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    toggleIcon.classList.replace('fa-eye', 'fa-eye-slash');
                    toggleIcon.classList.remove('eye-blinking'); 
                } else {
                    passwordInput.type = 'password';
                    toggleIcon.classList.replace('fa-eye-slash', 'fa-eye');
                    toggleIcon.classList.add('eye-blinking');
                }
            });
        }
    });

    // FUNGSI LOGIN UTAMA
    async function prosesLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passInput = document.getElementById('pass').value;
        const btn = document.getElementById('btn-login');

        if(!emailInput || !passInput) {
            showError("Harap isi email dan password.");
            return;
        }

        btn.innerText = "MENGECEK AKSES...";
        btn.disabled = true;

        try {
            // 1. CEK DI KOLEKSI ADMIN TERLEBIH DAHULU
            const adminSnapshot = await db.collection("admin_users")
                .where("email", "==", emailInput)
                .where("password", "==", passInput)
                .get();

            if (!adminSnapshot.empty) {
                const adminData = adminSnapshot.docs[0].data();
                // Simpan Log Login (Optional)
                saveLoginLog(adminData.nama, emailInput);
                
                alert("Login Administrator Berhasil!");
                window.location.href = "admin.html"; // Arahkan ke Dashboard Admin
                return;
            }

            // 2. JIKA BUKAN ADMIN, CEK DI KOLEKSI USER BIASA (ANGGOTA)
            const userSnapshot = await db.collection("users")
                .where("email", "==", emailInput)
                .where("password", "==", passInput)
                .get();

            if (!userSnapshot.empty) {
                const userData = userSnapshot.docs[0].data();
                localStorage.setItem("userId", userSnapshot.docs[0].id);
                localStorage.setItem("userName", userData.nama);
                
                alert("Login Anggota Berhasil!");
                window.location.href = "menu.html"; // Arahkan ke Menu Anggota
            } else {
                throw new Error("Email atau Password salah.");
            }

        } catch (e) {
            showError(e.message);
            btn.innerText = "MASUK";
            btn.disabled = false;
        }
    }

    // Fungsi mencatat log login ke Firestore
    function saveLoginLog(nama, email) {
        db.collection("login_logs").add({
            userName: nama,
            userEmail: email,
            loginTime: new Date(),
            logoutTime: null,
            duration: "Masih Aktif"
        });
    }

    function showError(pesan) {
        document.getElementById("error-text").innerText = pesan;
        document.getElementById("error-block").style.display = "flex";
    }

    function hideError() {
        document.getElementById("error-block").style.display = "none";
    }
</script>

</body>
</html>
