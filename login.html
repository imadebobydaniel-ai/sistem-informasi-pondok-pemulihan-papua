<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --biru-tua: #003366; 
            --emas-lux: #D4AF37; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #003366;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animasi Logo */
        .splash-logo {
            width: 150px; 
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
            animation: pulse 2s infinite ease-in-out;
            display: block;
        }

        /* Lingkaran Emas Bercahaya */
        .gold-loader {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid var(--emas-lux);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .splash-hidden { opacity: 0; visibility: hidden; }

        /* LOGIN CARD */
        .login-card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
        }
        .logo-login { width: 80px; margin-bottom: 10px; }
        .btn-login { 
            width: 100%; padding: 12px; 
            background-color: #007bff; color: white; 
            border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; 
            margin-top: 15px; 
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="logo_pondok.png" alt="PONDOK PEMULIHAN" class="splash-logo" onerror="this.style.display='none'">
            
            <div class="gold-loader"></div>
            
            <p style="color: var(--emas-lux); font-weight: bold; font-size: 14px; letter-spacing: 2px; margin-top: 20px; text-transform: uppercase;">
                Pondok Pemulihan Papua
            </p>
        </div>
    </div>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo-login">
        <h2 style="font-size: 18px; margin-bottom: 5px;">PONDOK PEMULIHAN PAPUA</h2>
        <h3 style="font-size: 14px; color: #D4AF37; background: #2c3e50; padding: 5px 15px; border-radius: 20px; display: inline-block;">Sistem Informasi Komsel JC</h3>

        <form id="loginForm" style="margin-top: 20px;">
            <input type="email" id="email" placeholder="Email Anggota" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;">
            <input type="password" id="pass" placeholder="Password" required style="width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box;">
            <button type="submit" class="btn-login">MASUK</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // Paksa Splash Screen Hilang setelah 3 detik
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash-screen');
                if (splash) {
                    splash.classList.add('splash-hidden');
                    document.body.style.overflow = "auto";
                }
            }, 3000); 
        });

        // Firebase & Login (Pastikan Config ini benar)
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // Login Logic singkat
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // ... (logika login kamu) ...
            alert("Mencoba Login...");
        });
    </script>
</body>
</html>
