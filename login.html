<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 85%; max-width: 350px; 
            text-align: center;
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }
        .btn-login { 
            width: 100%; padding: 12px; background-color: #007bff; 
            color: white; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        .btn-register {
            display: block; margin-top: 20px; color: #007bff;
            text-decoration: none; font-size: 14px; font-weight: 500;
        }
        .error { color: red; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <img src="https://ui-avatars.com/api/?name=PPP&background=007bff&color=fff" alt="Logo" style="border-radius: 50%; margin-bottom: 10px;">
    <h2>Masuk Aplikasi</h2>
    <p style="color: #666; font-size: 13px;">Gunakan Nomor KTP Anda untuk masuk</p>
    
    <input type="text" id="loginKtp" placeholder="Masukkan Nomor KTP">
    <div id="errorMessage" class="error">Nomor KTP tidak ditemukan!</div>
    
    <button class="btn-login" onclick="prosesLogin()">Masuk Sekarang</button>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
  <p style="font-size: 13px; color: #666;">Belum punya akun?</p>
<a href="profile.html" class="btn-register">Daftar Anggota Baru</a>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    function prosesLogin() {
        const ktpInput = document.getElementById("loginKtp").value;
        const errorMsg = document.getElementById("errorMessage");

        if (ktpInput === "") {
            alert("Silakan masukkan nomor KTP!");
            return;
        }

        // Mencari user di Firestore berdasarkan nomor KTP
        db.collection("users").where("no_ktp", "==", ktpInput).get()
        .then((querySnapshot) => {
            if (!querySnapshot.empty) {
                // Login Berhasil
                alert("Selamat Datang!");
                window.location.href = "main.menu.html"; 
            } else {
                // Jika data tidak ada
                errorMsg.style.display = "block";
            }
        })
        .catch((error) => {
            console.error("Error login: ", error);
        });
    }
</script>

</body>
</html>
