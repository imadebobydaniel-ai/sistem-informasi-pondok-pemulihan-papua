<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; }
        .card { background: white; padding: 20px 15px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 85%; max-width: 300px; text-align: center; }
        img.logo { width: 60px; margin-bottom: 5px; } 
        h2 { color: #333; margin: 0; font-size: 20px; }
        p.subtitle { color: #666; font-size: 11px; margin: 2px 0 10px 0; }
        
        .password-container { 
            position: relative; 
            width: 100%; 
            margin: 5px 0; 
            display: flex;
            align-items: center;
        }
        
        input { 
            width: 100%; 
            padding: 10px 40px 10px 12px;
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fafafa; 
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            z-index: 10;
            padding: 5px;
            font-size: 16px;
            user-select: none;
        }

        .btn-masuk { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 10px; }
        .footer-link { margin-top: 12px; font-size: 13px; color: #666; }
        .admin-area { margin-top: 15px; padding: 10px; cursor: pointer; display: inline-block; }
        .btn-admin { color: #ccc; font-size: 10px; text-decoration: underline; }
        #loading { display: none; margin-top: 5px; color: #007bff; font-size: 11px; font-weight: bold; }

        #adminModal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; width: 250px; text-align: center; }
        .btn-batal { background: #6c757d; color: white; margin-top: 8px; width: 100%; border: none; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

<div class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Login</h2>
    <p class="subtitle">Pondok Pemulihan Papua</p>
    
    <input type="email" id="email" placeholder="Email Terdaftar" style="margin-bottom: 5px;">
    
    <div class="password-container">
        <input type="password" id="pass" placeholder="Password">
        <span class="toggle-password" onclick="togglePass('pass', this)">👁️</span>
    </div>
    
    <div id="loading">MENGHUBUNGKAN...</div>
    <button class="btn-masuk" onclick="cekLogin()">MASUK</button>

    <div class="footer-link">Baru? <a href="index.html">Daftar</a></div>

    <div class="admin-area" onclick="openAdminModal()">
        <span class="btn-admin">[ Admin Portal ]</span>
    </div>
</div>

<div id="adminModal">
    <div class="modal-content">
        <h4 style="margin:0 0 10px 0">Akses Admin</h4>
        <div class="password-container">
            <input type="password" id="adminPass" placeholder="Password Admin">
            <span class="toggle-password" onclick="togglePass('adminPass', this)">👁️</span>
        </div>
        <button class="btn-masuk" onclick="validasiAdmin()">KONFIRMASI</button>
        <button class="btn-batal" onclick="closeAdminModal()">BATAL</button>
    </div>
</div>

<script>
    function togglePass(inputId, iconElement) {
        const x = document.getElementById(inputId);
        if (x.type === "password") {
            x.type = "text";
            iconElement.innerText = "🔒"; 
        } else {
            x.type = "password";
            iconElement.innerText = "👁️";
        }
    }

    function openAdminModal() { document.getElementById("adminModal").style.display = "flex"; }
    function closeAdminModal() { document.getElementById("adminModal").style.display = "none"; document.getElementById("adminPass").value = ""; }

    function validasiAdmin() {
        const p = document.getElementById("adminPass").value.trim();
        if (p === "admin2026") {
            window.location.href = "admin_portal.html";
        } else {
            alert("Password Admin Salah!");
        }
    }

    async function cekLogin() {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('pass').value.trim();
        const btn = document.querySelector('.btn-masuk');
        const loader = document.getElementById('loading');

        if (!email || !pass) { alert("Email dan Password harus diisi!"); return; }

        if(loader) loader.style.display = "block";
        btn.disabled = true;
        btn.innerText = "MEMPROSES...";

        const urlServer = "https://script.google.com/macros/s/AKfycbzJLuAAvAPa97uw6lVUs2Dvrj0Jq1SU2Opwj6_7oAM9D7K0QTLiOdF6hUif1OxQDdQiBA/exec
";

        try {
            // Kita tambahkan action=login agar Apps Script tahu apa yang harus dilakukan
            const response = await fetch(`${urlServer}?action=login&email=${encodeURIComponent(email)}&pass=${encodeURIComponent(pass)}&_cache=${new Date().getTime()}`);
            const result = await response.json();

            if (result.status === "Aktif") {
                // SIMPAN DATA KE MEMORI BROWSER
                localStorage.setItem("namaUser", result.nama);
                localStorage.setItem("jabatanUser", result.jabatan);
                localStorage.setItem("wilayahUser", result.wilayah);

                alert("Login Berhasil! Selamat Datang, " + result.nama);
                window.location.href = "main_menu.html";
            } else if (result.status === "Pending") {
                alert("Akun belum AKTIF. Silakan hubungi Admin atau cek email.");
            } else if (result.status === "Nonaktif") {
                alert("Akun Anda telah dinonaktifkan.");
            } else {
                alert("Email atau Password salah! (Status: " + result.status + ")");
            }
        } catch (err) {
            console.error(err);
            alert("Gagal terhubung ke server. Pastikan internet aktif.");
        } finally {
            if(loader) loader.style.display = "none";
            btn.disabled = false;
            btn.innerText = "MASUK";
        }
    }
</script>

</body>
</html>
