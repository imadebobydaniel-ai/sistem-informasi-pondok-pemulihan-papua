<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Pondok Pemulihan</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 360px; text-align: center; }
        .logo-placeholder { font-weight: bold; font-size: 24px; color: #0084ff; margin-bottom: 20px; display: block; }
        h2 { margin: 0 0 10px; color: #333; }
        p { color: #777; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #0084ff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0073e6; }
        .back-link { margin-top: 20px; display: block; color: #0084ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-card">
    <span class="logo-placeholder">Pondok Pemulihan</span>
    <h2>Portal Admin</h2>
    <p>Masukkan password untuk masuk</p>
    
    <input type="password" id="adminPass" placeholder="Password Administrator" autofocus>
    <button onclick="cekLogin()">Masuk Sekarang</button>
    
    <a href="index.html" class="back-link">← Kembali ke Beranda</a>
</div>

<script>
    function cekLogin() {
        const input = document.getElementById('adminPass').value;
        // Password sesuai permintaan Abang
        if (input === "admin 2026") {
            window.location.href = "admin_portal.html";
        } else {
            alert("Password Salah! Gunakan: admin 2026");
        }
    }

    // Bisa tekan Enter untuk login
    document.getElementById("adminPass").addEventListener("keyup", function(event) {
        if (event.key === "Enter") { cekLogin(); }
    });
</script>

</body>
</html>
