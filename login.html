<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Pondok Pemulihan Papua</title>
    <style>
        /* Memastikan konten berada di tengah tapi tetap punya ruang napas */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', sans-serif;
        }
        
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        .card { 
            background: white; 
            padding: 20px 15px; 
            border-radius: 20px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); 
            width: 85%; 
            max-width: 300px; 
            text-align: center; 
            position: relative; /* Menjaga konteks elemen di dalamnya */
            z-index: 1;
        }

        img.logo { width: 60px; margin-bottom: 5px; } 
        h2 { color: #333; margin: 0; font-size: 20px; }
        p.subtitle { color: #666; font-size: 11px; margin: 2px 0 10px 0; }
        
        input { 
            width: 100%; 
            padding: 10px 12px; 
            margin: 5px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 14px; 
            background: #fafafa; 
        }
        
        .btn-masuk { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px; 
            margin-top: 10px; 
        }

        .footer-link { margin-top: 12px; font-size: 13px; color: #666; }
        .footer-link a { color: #007bff; font-weight: bold; text-decoration: none; }

        /* PERBAIKAN TOMBOL ADMIN: Area klik lebih besar dan posisi jelas */
        .admin-area {
            margin-top: 15px;
            padding: 10px; /* Memberikan ruang klik ekstra */
            display: inline-block;
            cursor: pointer;
        }
        
        .btn-admin { 
            background: none; 
            border: none; 
            color: #ccc; 
            font-size: 10px; 
            text-decoration: none;
            pointer-events: auto; /* Memastikan bisa diklik */
        }
    </style>
</head>
<body>

<div class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Login</h2>
    <p class="subtitle">Layanan Pondok Pemulihan Papua</p>
    
    <input type="email" id="email" placeholder="Email Terdaftar">
    <input type="password" id="pass" placeholder="Password">
    
    <button class="btn-masuk" onclick="cekLogin()">MASUK</button>

    <div class="footer-link">
        Baru? <a href="index.html">Daftar</a>
    </div>

    <div class="admin-area" onclick="loginAdmin()">
        <span class="btn-admin">[ Admin Portal ]</span>
    </div>
</div>

<script>
    function loginAdmin() {
        const p = prompt("Password Admin:");
        if (p === "admin2026") {
            window.location.href = "admin_portal.html";
        } else if (p !== null) {
            alert("Password Salah!");
        }
    }

    async function cekLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const urlServer = "https://script.google.com/macros/s/AKfycbykw5ra1tq4mJ5JQZm-uumsZLnTnpdcCOGGPa_GlTWK5Xqt0U51pa2aytduIE3Y-VSeIA/exec";

        if (!email || !pass) { alert("Isi data!"); return; }

        try {
            const response = await fetch(`${urlServer}?action=login&email=${email}&pass=${pass}`);
            const result = await response.json();
            if (result.status === "Aktif") window.location.href = "main_menu.html";
            else alert("Status: " + result.status);
        } catch (err) { alert("Gagal koneksi ke server."); }
    }
</script>
</body>
</html>
