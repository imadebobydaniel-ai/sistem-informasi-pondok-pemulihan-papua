<div id="form-tiket-doa" style="max-height: 90vh; display: flex; flex-direction: column;">
    <h3 style="color: #003366; font-size: 16px; margin-bottom: 10px;">Form Tiket Doa</h3>
    
    <input type="text" id="nama-otomatis" readonly 
           style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #f9f9f9; margin-bottom: 10px;" 
           value="Memuat Nama...">

    <select id="komsel-pilihan" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px;">
        <option value="">-- Pilih Komsel --</option>
        <option value="JC1">JC1</option>
        <option value="JC2">JC2</option>
        <option value="JC3">JC3</option>
        <option value="JC4">JC4</option>
        <option value="JC5">JC5</option>
    </select>

    <textarea id="isi-pergumulan" placeholder="Isi Pergumulan Doa..." 
              style="width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ddd; resize: none; margin-bottom: 15px;"></textarea>

    <button onclick="kirimTiketSLA()" 
            style="width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        KIRIM TIKET
    </button>

    <button onclick="tutupForm()" style="background: none; border: none; color: #888; margin-top: 10px; font-size: 13px; cursor: pointer;">
        Batal
    </button>
</div>

<script>
    // Fungsi untuk mengisi Nama Otomatis agar tidak "Nama tidak ditemukan"
    window.onload = function() {
        const userEmail = localStorage.getItem("userEmail");
        if (userEmail) {
            db.collection("users").where("email", "==", userEmail).get().then((querySnapshot) => {
                querySnapshot.forEach((doc) => {
                    document.getElementById("nama-otomatis").value = doc.data().nama;
                });
            });
        }
    };

    // Fungsi Kirim sesuai Konsep Gambar 2 & SLA
    async function kirimTiketSLA() {
        const nama = document.getElementById("nama-otomatis").value;
        const komsel = document.getElementById("komsel-pilihan").value;
        const pesan = document.getElementById("isi-pergumulan").value;
        const now = new Date();

        if(!komsel || !pesan) return alert("Lengkapi data!");

        try {
            await db.collection("saran_masukan").add({
                nomor_tiket: `NK-DOA-${Math.floor(100+Math.random()*900)}-${now.getFullYear()}`,
                nama: nama,
                jc: komsel,
                isi_saran: pesan,
                status: "proses",
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                sla_days: 0
            });
            alert("Tiket Doa Berhasil Dikirim!");
            location.reload();
        } catch (error) {
            alert("Gagal mengirim: " + error.message);
        }
    }
</script>
