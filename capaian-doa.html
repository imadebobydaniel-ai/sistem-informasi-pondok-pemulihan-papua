<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Capaian Doa Komsel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru: #003366; --emas: #D4AF37; --bg: #f4f7fa; --merah: #d32f2f; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* Judul Tetap di Atas */
        header { 
            background: var(--biru); 
            color: white; 
            padding: calc(env(safe-area-inset-top) + 15px) 15px 15px; 
            text-align: center; 
            font-weight: bold; 
            border-bottom: 3px solid var(--emas); 
            flex-shrink: 0; 
        }
        
        /* Area List Doa */
        .container { 
            flex-grow: 1; 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 100px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .btn-tambah { 
            background: var(--emas); 
            color: var(--biru); 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            font-size: 14px;
        }
        
        .card-doa { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 12px; 
            border-left: 5px solid var(--emas); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        .card-doa h4 { margin: 0 0 5px; font-size: 14px; color: var(--biru); text-transform: uppercase; }
        .card-doa p { margin: 0; font-size: 13px; color: #444; line-height: 1.5; font-style: italic; }

        /* Tombol Back Merah di Bawah (Sesuai Coretan Anda) */
        .nav-bawah { 
            position: fixed; 
            bottom: 0; 
            width: 100%; 
            background: white; 
            padding: 15px 0 calc(env(safe-area-inset-bottom) + 15px); 
            display: flex; 
            justify-content: center; 
            box-shadow: 0 -3px 10px rgba(0,0,0,0.1); 
            z-index: 100;
        }
        .btn-kembali { 
            background: var(--merah); 
            color: white; 
            text-decoration: none; 
            padding: 12px 60px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 14px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Modal Input (Pengganti file yang 404) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); 
            z-index: 1000; 
            align-items: flex-end; 
        }
        .modal-content { 
            background: white; 
            width: 100%; 
            padding: 25px; 
            border-radius: 25px 25px 0 0; 
            box-sizing: border-box; 
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        textarea { 
            width: 100%; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            margin: 15px 0; 
            font-family: inherit; 
            box-sizing: border-box; 
            font-size: 14px;
            background: #f9f9f9;
        }
    </style>
</head>
<body>

<header>CAPAIAN DOA KOMSEL</header>

<div class="container">
    <div id="labelJC" style="font-size: 12px; font-weight: bold; color: var(--biru); margin-bottom: 10px;">LIST DOA KELOMPOK...</div>
    
    <button class="btn-tambah" onclick="bukaModal()">
        <i class="fa-solid fa-plus-circle"></i> TAMBAH DOA BARU
    </button>
    
    <div id="listDoa">
        <p style="text-align: center; color: #999; padding: 20px;">Menghubungkan ke database...</p>
    </div>
</div>

<div class="nav-bawah">
    <a href="menu.html" class="btn-kembali">
        <i class="fa-solid fa-arrow-left"></i> KEMBALI
    </a>
</div>

<div id="modalInput" class="modal">
    <div class="modal-content">
        <h3 style="margin: 0; color: var(--biru);">Input Doa Baru</h3>
        <textarea id="isiDoa" rows="4" placeholder="Tuliskan pokok doa Anda di sini..."></textarea>
        <button onclick="simpanDoa()" style="width: 100%; background: var(--biru); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold;">KIRIM KE DATABASE</button>
        <button onclick="tutupModal()" style="width: 100%; background: none; border: none; color: #999; margin-top: 10px; cursor: pointer;">Batal</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userJC = localStorage.getItem("userJC") || "5";
    const userName = localStorage.getItem("userName") || "Anggota";
    document.getElementById('labelJC').innerText = "LIST DOA KELOMPOK JC-" + userJC;

    function bukaModal() { document.getElementById('modalInput').style.display = 'flex'; }
    function tutupModal() { document.getElementById('modalInput').style.display = 'none'; }

    async function simpanDoa() {
        const text = document.getElementById('isiDoa').value;
        if (!text) return alert("Mohon isi pokok doa Anda.");
        
        try {
            await db.collection("laporan_doa").add({
                nama: userName,
                jc: userJC,
                pokokDoa: text,
                tglInput: firebase.firestore.FieldValue.serverTimestamp()
            });
            document.getElementById('isiDoa').value = "";
            tutupModal();
        } catch (e) { alert("Gagal kirim: " + e.message); }
    }

    // Load Data Realtime
    db.collection("laporan_doa")
      .where("jc", "==", userJC)
      .orderBy("tglInput", "desc")
      .onSnapshot((snapshot) => {
        const listDiv = document.getElementById('listDoa');
        listDiv.innerHTML = "";
        if (snapshot.empty) {
            listDiv.innerHTML = '<p style="text-align: center; color: #999;">Belum ada doa di kelompok ini.</p>';
            return;
        }
        snapshot.forEach((doc) => {
            const data = doc.data();
            listDiv.innerHTML += `
                <div class="card-doa">
                    <h4>${data.nama}</h4>
                    <p>"${data.pokokDoa}"</p>
                </div>`;
        });
    }, (err) => {
        document.getElementById('listDoa').innerHTML = `<p style="color:red; text-align:center;">Koneksi Terputus: ${err.message}</p>`;
    });
</script>
</body>
</html>
