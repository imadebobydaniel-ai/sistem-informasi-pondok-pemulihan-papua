<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Capaian Doa Komsel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #f4f7f9; --putih: #ffffff; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

        /* Header & Control Panel */
        .header-fixed { background: var(--putih); z-index: 1000; position: sticky; top: 0; }
        .control-panel { display: flex; justify-content: space-around; padding: 10px; border-bottom: 2px solid var(--emas); }
        
        .btn-action { border: none; background: none; color: #bbb; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; transition: 0.3s; pointer-events: none; }
        .btn-action.active { color: var(--biru-tua); font-weight: bold; cursor: pointer; pointer-events: auto; }
        .btn-action i { font-size: 18px; }

        /* Statistik Summary Card (Penambahan Baru agar tidak 0) */
        .stat-summary { background: var(--biru-tua); color: white; margin: 15px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-around; text-align: center; }
        .stat-item { flex: 1; border-right: 1px solid rgba(255,255,255,0.2); }
        .stat-item:last-child { border-right: none; }
        .stat-value { display: block; font-size: 18px; font-weight: bold; color: var(--emas); }
        .stat-label { font-size: 10px; text-transform: uppercase; opacity: 0.8; }

        /* Bar Gold (Freeze/Sticky) */
        .sticky-add-bar { 
            background: var(--emas); 
            display: flex; 
            align-items: center; 
            padding: 8px 15px; 
            position: sticky;
            top: 0; 
            z-index: 900;
            min-height: 50px;
        }

        .check-all-box { width: 20px; height: 20px; margin-right: 15px; accent-color: var(--biru-tua); cursor: pointer; }

        .btn-add-doa { 
            flex: 1; background: none; border: none; color: var(--biru-tua); 
            font-weight: bold; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; gap: 10px; font-size: 14px;
        }

        /* Konten */
        .main-content { flex: 1; padding: 15px; }
        .doa-card { background: var(--putih); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; gap: 12px; border-left: 5px solid var(--emas); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .doa-checkbox { width: 20px; height: 20px; accent-color: var(--biru-tua); margin-top: 5px; }
        .doa-info { flex: 1; }
        .user-label { font-weight: bold; color: var(--biru-tua); margin-bottom: 4px; display: block; }
        .text-label { font-size: 13px; color: #555; line-height: 1.4; }

        .card-header-detail { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .ticket-no { background: #eef2f7; color: var(--biru-tua); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid #d1d9e6; }
        .status-tag { color: #d68910; font-size: 11px; font-weight: bold; font-style: italic; }
        .date-label { font-size: 11px; color: #888; margin-top: 8px; display: block; }
        .duration-label { background: #f9f9f9; padding: 5px 10px; border-radius: 6px; font-size: 11px; color: #666; display: block; margin-top: 8px; border: 1px solid #eee; }

        /* Popups & Modals */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .popup { background: var(--putih); width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; border-top: 6px solid var(--emas); }
        
        .modal-notif { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 320px; border-radius: 15px; text-align: center; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-content i { font-size: 50px; margin-bottom: 15px; }
        .icon-success { color: #28a745; }
        .icon-error { color: #dc3545; }
        .icon-confirm { color: var(--emas); }
        .modal-title { font-weight: bold; font-size: 18px; margin-bottom: 10px; color: var(--biru-tua); }
        .modal-text { font-size: 14px; color: #666; margin-bottom: 20px; }
        .modal-buttons { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-confirm { background: var(--biru-tua); color: white; }
        .btn-cancel { background: #eee; color: #666; }

        .bottom-nav { width: 100%; background: var(--bg); padding: 15px 15px 40px 15px; display: flex; justify-content: center; margin-top: auto; }
        .btn-back { width: 100%; max-width: 600px; background: var(--biru-tua); color: white; text-decoration: none; font-size: 14px; font-weight: bold; padding: 15px; border-radius: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="header-fixed">
    <div class="control-panel">
        <button class="btn-action" id="act-terjawab" onclick="prosesTerjawab()"><i class="fa-solid fa-circle-check"></i>TERJAWAB</button>
        <button class="btn-action" id="act-edit" onclick="prosesEdit()"><i class="fa-solid fa-pen-to-square"></i>EDIT</button>
        <button class="btn-action" id="act-hapus" onclick="prosesHapus()"><i class="fa-solid fa-trash"></i>HAPUS</button>
    </div>

    <div class="stat-summary">
        <div class="stat-item">
            <span class="stat-value" id="stat-total-doa">0</span>
            <span class="stat-label">Total Doa</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-persen-terjawab">0%</span>
            <span class="stat-label">Dijawab</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="stat-sla-rata">0</span>
            <span class="stat-label">SLA (Hari)</span>
        </div>
    </div>

    <div class="sticky-add-bar">
        <input type="checkbox" id="check-all" class="check-all-box" onchange="toggleCheckAll(this)">
        <button class="btn-add-doa" onclick="bukaAdd()"><i class="fa-solid fa-plus-circle"></i> ADD DOA BARU</button>
    </div>
</div>

<div class="main-content">
    <div id="list-doa"></div>
</div>

<div class="bottom-nav">
    <a href="menu.html" class="btn-back"><i class="fa-solid fa-house"></i> KEMBALI KE MENU UTAMA</a>
</div>

<div id="custom-modal" class="modal-notif">
    <div class="modal-content">
        <div id="modal-icon"></div>
        <div class="modal-title" id="modal-title">Konfirmasi</div>
        <div class="modal-text" id="modal-text">Apakah Anda yakin?</div>
        <div class="modal-buttons" id="modal-footer"></div>
    </div>
</div>

<div id="pop-add" class="overlay">
    <div class="popup">
        <h3 style="text-align:center; color:var(--biru-tua)">Form Tiket Doa</h3>
        <input type="text" id="add-nama" readonly style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <textarea id="add-doa" placeholder="Isi Pergumulan Doa..." style="width:100%; height:120px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <button onclick="simpanBaru()" style="width:100%; padding:15px; background:var(--biru-tua); color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">KIRIM TIKET</button>
        <p onclick="tutupPop()" style="text-align:center; cursor:pointer; color:#999; margin-top:10px;">Batal</p>
    </div>
</div>

<div id="pop-edit" class="overlay">
    <div class="popup">
        <h3 style="text-align:center;">Edit Doa</h3>
        <textarea id="ed-doa" style="width:100%; height:120px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        <button onclick="simpanEdit()" style="width:100%; padding:15px; background:var(--biru-tua); color:white; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">SIMPAN PERUBAHAN</button>
        <p onclick="tutupPop()" style="text-align:center; cursor:pointer; color:#999; margin-top:10px;">Batal</p>
    </div>
</div>
