<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Capaian Doa Komsel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #f4f7f9; --putih: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; height: 100vh; display: flex; flex-direction: column; }

        /* Header & Control Panel sticky di atas */
        .header-app { background: var(--biru-tua); color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 1px; }
        
        .control-panel { display: flex; justify-content: space-around; background: var(--putih); padding: 10px 5px; border-bottom: 2px solid var(--emas); position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn-action { border: none; background: none; color: #bbb; font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.3s; flex: 1; pointer-events: none; }
        .btn-action.active { color: var(--biru-tua); pointer-events: auto; font-weight: bold; }
        .btn-action i { font-size: 18px; }

        /* Area List Doa - Scrollable */
        .main-content { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; } /* padding bawah agar tidak tertutup tombol menu */
        
        .btn-add { width: 100%; background: var(--emas); color: var(--biru-tua); border: none; padding: 14px; border-radius: 10px; font-weight: bold; margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 10px rgba(212, 175, 55, 0.3); }

        .doa-card { background: var(--putih); border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; gap: 12px; align-items: flex-start; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--emas); }
        .doa-checkbox { width: 22px; height: 22px; accent-color: var(--biru-tua); margin-top: 2px; }
        .doa-info { flex: 1; }
        .tiket-no { font-size: 10px; font-weight: bold; color: #888; background: #eee; padding: 2px 6px; border-radius: 4px; }
        .status-txt { float: right; font-size: 10px; color: var(--emas); font-weight: bold; text-transform: uppercase; }
        .doa-user { font-weight: bold; font-size: 14px; margin: 8px 0 5px 0; color: var(--biru-tua); }
        .doa-desc { font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 10px; }
        .doa-sla { font-size: 11px; color: #999; font-style: italic; }

        /* Popup Block Display */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .popup { background: var(--putih); width: 100%; max-width: 380px; border-radius: 20px; padding: 20px; border-top: 6px solid var(--emas); position: relative; max-height: 90vh; overflow-y: auto; }
        .popup h3 { color: var(--biru-tua); margin: 0 0 20px 0; text-align: center; font-size: 18px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; padding-left: 5px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; }
        .form-group input[readonly] { background: #f8f8f8; color: #777; border-color: #eee; }
        textarea { height: 90px; resize: none; background: #fff; }

        .btn-submit { width: 100%; background: var(--biru-tua); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; margin-top: 10px; }
        .btn-close { display: block; text-align: center; margin-top: 15px; color: #999; font-size: 13px; text-decoration: none; }

        /* Tombol Back Ke Menu (Fix Frame HP) */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--biru-tua); padding: 15px 15px calc(15px + env(safe-area-inset-bottom)); text-align: center; z-index: 100; }
        .btn-back-menu { color: white; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<div class="header-app">CAPAIAN DOA KOMSEL</div>

<div class="control-panel">
    <button class="btn-action" id="act-check" onclick="doaTerjawab()"><i class="fa-solid fa-circle-check"></i>TERJAWAB</button>
    <button class="btn-action" id="act-edit" onclick="bukaEdit()"><i class="fa-solid fa-pen-to-square"></i>EDIT</button>
    <button class="btn-action" id="act-del" onclick="hapusDoa()"><i class="fa-solid fa-trash"></i>HAPUS</button>
</div>

<div class="main-content">
    <button class="btn-add" onclick="bukaAdd()"><i class="fa-solid fa-plus-circle"></i> ADD DOA BARU</button>
    <div id="list-doa">
        </div>
</div>

<div class="bottom-nav">
    <a href="menu.html" class="btn-back-menu"><i class="fa-solid fa-house"></i> KEMBALI KE MENU UTAMA</a>
</div>

<div id="pop-add" class="overlay">
    <div class="popup">
        <h3>Form Tiket Doa</h3>
        <div class="form-group">
            <label>Nomor Tiket (Otomatis)</label>
            <input type="text" id="in-tiket" readonly>
        </div>
        <div class="form-group">
            <label>Nama Lengkap (Paten)</label>
            <input type="text" id="in-nama" readonly>
        </div>
        <div class="form-group">
            <label>JC (Paten)</label>
            <input type="text" id="in-jc" readonly>
        </div>
        <div class="form-group">
            <label>Tanggal Input</label>
            <input type="text" id="in-tgl" readonly>
        </div>
        <div class="form-group">
            <label>Isi Pergumulan Doa</label>
            <textarea id="in-doa" placeholder="Tuliskan permohonan doa Anda..."></textarea>
        </div>
        <button class="btn-submit" onclick="simpanDoa()">KIRIM TIKET</button>
        <a href="#" class="btn-close" onclick="tutupPop()">Batal</a>
    </div>
</div>

<div id="pop-edit" class="overlay">
    <div class="popup">
        <h3>Edit Doa</h3>
        <div class="form-group">
            <label>Perubahan Isi Doa</label>
            <textarea id="ed-doa" style="height: 150px;"></textarea>
        </div>
        <button class="btn-submit" onclick="simpanEdit()">SIMPAN PERUBAHAN</button>
        <a href="#" class="btn-close" onclick="tutupPop()">Batal</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let curNama = "", curJC = "", selectedID = null;

    window.onload = function() {
        const email = localStorage.getItem("userEmail");
        if(!email) { window.location.href="index.html"; return; }

        db.collection("users").where("email", "==", email).get().then(snap => {
            if(!snap.empty) {
                const u = snap.docs[0].data();
                curNama = u.nama;
                curJC = u.komsel || "JC5";
                loadDoa();
            }
        });
    };

   function loadDoa() {
    // Pastikan variabel curNama sudah terisi sebelum query
    if (!curNama) {
        console.log("Menunggu identitas user...");
        return;
    }

    db.collection("saran_masukan")
        .where("nama", "==", curNama)
        .orderBy("timestamp", "desc")
        .onSnapshot(snap => {
            let html = "";
            if (snap.empty) {
                document.getElementById("list-doa").innerHTML = "<p style='text-align:center; color:#999; margin-top:20px;'>Belum ada daftar doa.</p>";
                return;
            }
            snap.forEach(doc => {
                const d = doc.data();
                const tgl = d.timestamp ? d.timestamp.toDate() : new Date();
                const sla = Math.floor((new Date() - tgl) / (1000*60*60*24));
                html += `
                <div class="doa-card">
                    <input type="checkbox" class="doa-checkbox" value="${doc.id}" onchange="cekPilih()">
                    <div class="doa-info">
                        <span class="status-txt">${d.status || 'proses'}</span>
                        <span class="tiket-no">${d.nomor_tiket || '-'}</span>
                        <div class="doa-user">${d.nama} (${d.jc})</div>
                        <div class="doa-desc" id="txt-${doc.id}">${d.isi_saran}</div>
                        <div class="doa-sla">SLA: ${sla} Hari sejak diinput</div>
                        <input type="hidden" id="tgl-${doc.id}" value="${tgl.toISOString()}">
                    </div>
                </div>`;
            });
            document.getElementById("list-doa").innerHTML = html;
        }, err => {
            console.error("Error pada list doa: ", err);
            // Jika index belum dibuat, pesan error akan muncul di sini juga
        });
}}

    function cekPilih() {
        const boxes = document.querySelectorAll(".doa-checkbox:checked");
        const acts = document.querySelectorAll(".btn-action");
        if(boxes.length === 1) {
            acts.forEach(a => a.classList.add("active"));
            selectedID = boxes[0].value;
        } else {
            acts.forEach(a => a.classList.remove("active"));
            selectedID = null;
        }
    }

    function bukaAdd() {
        document.getElementById("pop-add").style.display = "flex";
        document.getElementById("in-nama").value = curNama;
        document.getElementById("in-jc").value = curJC;
        document.getElementById("in-tgl").value = new Date().toLocaleDateString('id-ID');
        
        db.collection("saran_masukan").get().then(s => {
            const urut = (s.size + 1).toString().padStart(3, '0');
            document.getElementById("in-tiket").value = `NK-DOA-${curJC}-${urut}-${new Date().getFullYear()}`;
        });
    }

    async function simpanDoa() {
        const doa = document.getElementById("in-doa").value;
        if(!doa) return alert("Isi doa!");
        await db.collection("saran_masukan").add({
            nomor_tiket: document.getElementById("in-tiket").value,
            nama: curNama, jc: curJC, isi_saran: doa, status: "proses",
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        tutupPop();
    }

    function doaTerjawab() {
        const tglIn = new Date(document.getElementById(`tgl-${selectedID}`).value);
        const selisih = Math.ceil(Math.abs(new Date() - tglIn) / (1000 * 60 * 60 * 24));
        alert("Puji Tuhan Doa anda terjawab dalam kurun waktu " + selisih + " hari");
        db.collection("saran_masukan").doc(selectedID).update({ status: "Terjawab" });
    }

    function bukaEdit() {
        document.getElementById("pop-edit").style.display = "flex";
        document.getElementById("ed-doa").value = document.getElementById(`txt-${selectedID}`).innerText;
    }

    async function simpanEdit() {
        await db.collection("saran_masukan").doc(selectedID).update({ isi_saran: document.getElementById("ed-doa").value });
        alert("Doa Telah disimpan");
        tutupPop();
    }

    async function hapusDoa() {
        if(confirm("Hapus doa ini?")) { await db.collection("saran_masukan").doc(selectedID).delete(); }
    }

    function tutupPop() { document.querySelectorAll(".overlay").forEach(o => o.style.display="none"); }
</script>
</body>
</html>
