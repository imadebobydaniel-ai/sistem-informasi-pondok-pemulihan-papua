<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Virtual - SIPAPUA</title>

    <style>
        body {
            margin: 0;
            background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* CONTAINER */
        .assistant {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 2s ease-in-out;
        }

        /* GAMBAR */
        .assistant img {
            width: 280px;
            height: auto;
            margin-bottom: 20px;
            animation: idleMove 3s infinite ease-in-out;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.1));
        }

        /* BOX TEKS */
        .text-container {
            min-height: 120px; /* Menjaga posisi tetap stabil saat teks ganti */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text {
            color: white;
            font-size: 20px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: opacity 0.8s ease-in-out;
            opacity: 1;
        }

        .fade-out {
            opacity: 0;
        }

        /* ANIMASI GERAK (STOP MOTION STYLE) */
        @keyframes idleMove {
            0% { transform: translateY(0px) scale(1); }
            25% { transform: translateY(-8px) scale(1.01); }
            50% { transform: translateY(0px) scale(1); }
            75% { transform: translateY(-4px) scale(1.005); }
            100% { transform: translateY(0px) scale(1); }
        }

        /* FADE */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="assistant">
    <img src="asisten_papua.jpg" alt="Asisten Virtual">
    <div class="text-container">
        <div id="message" class="text">Memulai asisten...</div>
    </div>
</div>

<script>
    const messages = [
        "Selamat Datang di <b>SIPAPUA</b> (Sistem Informasi Pondok Pemulihan Papua). Aplikasi ini adalah sebuah terobosan untuk membantu Anda dalam menjalankan penilaian dari segi level pelayanan yang Anda lakukan.",
        "Aplikasi ini sangat membantu saudara mempermudah melakukan kontrol terhadap penilaian disetiap bidang pelayanan yang Anda lakukan.",
        "Kami percaya dengan pertumbuhan Rohani dapat diukur melalui sebuah tindakan positif dan bukti nyata serta dibantu dengan penilaian yang tepat, untuk menjadikan kita sebagai pelayan-pelayan yang baik.",
        "Selamat datang, Tuhan memberkati."
    ];

    let currentStep = 0;
    const messageEl = document.getElementById('message');

    function changeText() {
        if (currentStep < messages.length) {
            // Efek Fade Out
            messageEl.classList.add('fade-out');

            setTimeout(() => {
                // Ganti Teks
                messageEl.innerHTML = messages[currentStep];
                // Efek Fade In
                messageEl.classList.remove('fade-out');
                currentStep++;
                
                // Durasi tampil per slide (5 detik, kecuali slide terakhir 3 detik)
                let displayTime = (currentStep === messages.length) ? 3000 : 5000;
                
                setTimeout(changeText, displayTime);
            }, 800); // Waktu transisi fade out
        } else {
            // Selesai semua slide, pindah ke halaman login
            // Ganti 'index.html' dengan nama file login Anda jika berbeda
            window.location.href = "index.html"; 
        }
    }

    // Mulai animasi setelah jeda singkat
    setTimeout(changeText, 1000);
</script>

</body>
</html>
