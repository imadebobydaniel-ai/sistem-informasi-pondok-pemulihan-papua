<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* CSS ASLI ANDA TETAP DIJAGA */
    * { box-sizing: border-box; } 
    :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #001f3f; --putih: #ffffff; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow: hidden; height: 100vh; width: 100vw; }
    
    .header-game { background: var(--biru-tua); padding: 10px; display: flex; align-items: center; border-bottom: 3px solid var(--emas); height: 50px; }
    .btn-back { color: white; font-size: 18px; text-decoration: none; z-index: 10; }
    .header-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; letter-spacing: 1px; }

    /* PENYESUAIAN CONTAINER AGAR SCROLLABLE DI HP */
    .game-container { 
        padding: 15px; 
        text-align: center; 
        max-width: 500px; 
        margin: auto; 
        height: calc(100vh - 50px); 
        display: flex; 
        flex-direction: column; 
        justify-content: flex-start; /* Mengubah dari space-between agar konten tidak terdorong keluar frame */
        overflow-y: auto; 
    }

    .timer-container { position: relative; width: 80px; height: 80px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }
    .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
    .timer-circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
    .timer-circle-progress { fill: none; stroke: #ff4d4d; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 251; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
    .timer-text { position: absolute; font-size: 20px; font-weight: bold; color: #ff4d4d; }
    
    .prize-level { color: var(--emas); font-weight: bold; font-size: 14px; margin: 10px 0; }
    .question-box { background: rgba(0, 51, 102, 0.8); border: 2px solid var(--emas); padding: 15px; border-radius: 30px 0 30px 0; font-size: 15px; min-height: 70px; display: flex; align-items: center; justify-content: center; margin-top: 5px; }
    
    .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-top: 10px; }
    .btn-answer { background: transparent; border: 1px solid var(--emas); color: white; padding: 12px 8px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: 0.3s; text-align: left; min-height: 45px; line-height: 1.2; }
    .btn-answer.correct { background: #28a745 !important; border-color: white; }
    .btn-answer.wrong { background: #d9534f !important; border-color: white; }
    
    .lifelines-container { display: flex; justify-content: center; gap: 15px; margin: 15px 0; }
    .btn-lifeline { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--emas); background: var(--biru-tua); color: var(--emas); font-size: 11px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; padding: 0; }
    .btn-lifeline.used { opacity: 0.3; cursor: default; }

    /* NOTIFIKASI & OVERLAY */
    .notif-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; padding: 20px; }
    .notif-box, .start-box { background: var(--biru-tua); border: 2px solid var(--emas); padding: 25px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
    .btn-notif-ok { background: var(--emas); color: var(--biru-tua); padding: 12px 30px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; width: 100%; }
    
    #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 6000; display: flex; align-items: center; justify-content: center; padding: 20px; }
    @keyframes pulse { 0% { transform: scale(1); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }
    #start-btn-container button { animation: pulse 1.5s infinite; }

    /* CSS LEADERBOARD YANG DIUBAH (LEBIH TINGGI & TIDAK TERPOTONG FRAME HP) */
    .leaderboard-section {
        display: none;
        height: 50vh; /* Menaikkan area scroll agar teks tidak terpotong */
        margin-top: 15px;
        margin-bottom: 30px; /* Jarak aman dari navigasi bawah HP */
        background: rgba(0, 20, 40, 0.95);
        border-top: 2px solid var(--emas);
        overflow-y: auto;
        border-radius: 15px 15px 0 0;
        padding: 15px;
        position: relative;
        z-index: 5000;
    }

    .lb-title { color: var(--emas); font-size: 14px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
    .lb-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .lb-table tr { border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
    .lb-table th { color: var(--emas); text-align: left; padding: 5px; }
    .lb-table td { padding: 8px 5px; text-align: left; }
    .rank-gold { color: #FFD700; font-weight: bold; }
    .rank-silver { color: #C0C0C0; font-weight: bold; }
    .rank-bronze { color: #CD7F32; font-weight: bold; }
</style>
</head>
<body>

    <audio id="backsound" loop preload="auto">
        <source src="endgame.mp3" type="audio/mpeg">
    </audio>
 
    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
               <img src="logo_pondok.png" alt="Logo" class="splash-logo">
               <div class="gold-loader"></div>
           </div>
            <p class="sipapua-text">SIPAPUA</p>
            <p class="subtitle-text">Sistem Informasi Pondok Pemulihan Papua</p>
            <button class="btn-enter-splash" id="btn-enter" onclick="enterSystem()">MASUK SISTEM</button>
        </div>
    </div>
 
    <div id="assistant-container">
        <div class="mute-toggle" onclick="toggleMute()">
            <i id="mute-icon" class="fa-solid fa-volume-high"></i>
        </div>

        <img src="asisten_virtual.png" class="assistant-img">
        <div class="text-box-asisten">
            <span id="typing"></span><span class="cursor-asisten"></span>
        </div>
        <button id="next-btn" onclick="nextMessage()">Lanjut <i class="fa-solid fa-arrow-right"></i></button>
        
        <div class="skip-btn" onclick="skipAssistant()">Skip Intro <i class="fa-solid fa-forward"></i></div>
    </div>
 
    <div class="login-card" id="main-login-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
           <h2>Pondok Pemulihan Papua</h2>
           <span>SISTEM INFORMASI JEMAAT</span>
        </div>
        <div id="login-msg"></div>
        <form id="userLoginForm">
            <div class="form-group">
               <label>Email Anggota</label>
               <input type="email" id="user_email" required placeholder="Masukkan email">
           </div>
            <div class="form-group">
               <label>Password</label>
               <input type="password" id="user_pass" required placeholder="Masukkan password">
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
           </div>
            <button type="submit" id="btnMasuk" class="btn-login">MASUK</button>
        </form>
        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html" style="font-weight: bold;">Daftar Sekarang</a>
            <span class="forgot-pass" id="btnForgot">Lupa Password Ya ?? ?? ??</span>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <a href="login_cyber.html" class="admin-link">Masuk sebagai Admin</a>
        </div>
    </div>
 
    <div id="forgotModal" class="modal-overlay">
        <div class="modal-content">
           <h3>Pulihkan Akun</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Masukkan email anda untuk menerima link reset.</p>
            <input type="email" id="forgotEmail" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;" placeholder="contoh@email.com">
            <div style="display: flex; gap: 10px;">
               <button id="sendReset" style="flex: 1; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">KIRIM</button>
               <button id="closeModal" style="flex: 1; padding: 10px; background: #eee; border: none; border-radius: 5px; cursor: pointer;">BATAL</button>
           </div>
        </div>
    </div>
 
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
 
    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
 
        // DOM ELEMENTS
        const backsound = document.getElementById('backsound');
        const typingEl = document.getElementById('typing');
        const assistantContainer = document.getElementById('assistant-container');
        const loginCard = document.getElementById('main-login-card');
        const nextBtn = document.getElementById('next-btn');

        const messages = [
           "Shalom! Selamat Datang di SIPAPUA.<br><br>Aplikasi ini hadir sebagai terobosan digital untuk membantu Anda mengelola pelayanan di Pondok Pemulihan Papua secara efektif.",
           "Dengan sistem ini, Saudara dapat memantau penilaian setiap bidang pelayanan kapan saja dan di mana saja.",
            "Mari bersama menjadi pelayan yang lebih baik melalui penilaian yang objektif dan terukur.",
           "Silahkan Login untuk melanjutkan.<br><br>Tuhan Yesus Memberkati."
        ];
 
        let msgIndex = 0;
        let charIndex = 0;
        let isTyping = false;
 
        auth.onAuthStateChanged((user) => {
            if (user && user.emailVerified) {
               localStorage.setItem("userEmail", user.email);
               window.location.replace("menu.html");
            }
        });

        // AUDIO FUNCTIONS
        function toggleMute() {
            const muteIcon = document.getElementById('mute-icon');
            if (backsound.muted) {
                backsound.muted = false;
                muteIcon.className = "fa-solid fa-volume-high";
            } else {
                backsound.muted = true;
                muteIcon.className = "fa-solid fa-volume-xmark";
            }
        }

        function stopAudioGracefully() {
            if (!backsound.paused) {
                let fadeOut = setInterval(() => {
                    if (backsound.volume > 0.1) {
                        backsound.volume -= 0.1;
                    } else {
                        clearInterval(fadeOut);
                        backsound.pause();
                        backsound.currentTime = 0;
                        backsound.volume = 1.0;
                    }
                }, 50);
            }
        }

        // NAVIGATION FUNCTIONS
        function enterSystem() {
            // Play audio
            backsound.play().catch(e => console.log("Audio ditahan browser:", e));
            
            const splash = document.getElementById('splash-screen');
            splash.classList.add('splash-hidden');
            setTimeout(() => {
                splash.style.display = 'none';
                assistantContainer.style.display = 'flex';
                setTimeout(() => { assistantContainer.style.opacity = '1'; }, 50);
                startTyping();
            }, 1200);
        }
 
        function startTyping() {
            if (msgIndex < messages.length) {
               isTyping = true;
               nextBtn.style.display = 'none';
                let currentText = messages[msgIndex];
                
                if (currentText.slice(charIndex, charIndex + 4) === "<br>") {
                   typingEl.innerHTML += "<br>";
                   charIndex += 4;
                   setTimeout(startTyping, 30);
                } else if (charIndex < currentText.length) {
                   typingEl.innerHTML += currentText.charAt(charIndex);
                   charIndex++;
                   setTimeout(startTyping, 30);
                } else {
                   isTyping = false;
                   nextBtn.style.display = 'block'; 
                    if (msgIndex === messages.length - 1) {
                       nextBtn.innerHTML = 'Buka Login <i class="fa-solid fa-unlock"></i>';
                    }
                }
            }
        }
 
        function nextMessage() {
            if (isTyping) return;
            msgIndex++;
            if (msgIndex < messages.length) {
               charIndex = 0;
               typingEl.innerHTML = "";
               startTyping();
            } else {
                showLogin();
            }
        }

        function skipAssistant() {
            showLogin();
        }

        function showLogin() {
            stopAudioGracefully();
            assistantContainer.style.opacity = '0';
            setTimeout(() => {
                assistantContainer.style.display = 'none';
                loginCard.style.display = 'block';
                setTimeout(() => { loginCard.style.opacity = '1'; }, 50);
            }, 1000);
        }
 
        // LOGIN LOGIC
        document.getElementById('eyeIcon').onclick = function() {
            const pass = document.getElementById('user_pass');
            const isPass = pass.type === 'password';
            pass.type = isPass ? 'text' : 'password';
            this.classList.toggle('fa-eye-slash');
        };
 
        document.getElementById('userLoginForm').onsubmit = async (e) => {
           e.preventDefault();
            const btn = document.getElementById('btnMasuk');
            const msg = document.getElementById('login-msg');
            const email = document.getElementById('user_email').value.trim();
            const pass = document.getElementById('user_pass').value;
 
           btn.innerText = "Memverifikasi...";
           btn.disabled = true;
 
            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, pass);
                if (userCredential.user.emailVerified) {
                   localStorage.setItem("userEmail", email);
                   msg.innerText = "Berhasil! Mengalihkan...";
                   msg.className = "msg-success";
                   setTimeout(() => window.location.replace("menu.html"), 1000);
                } else {
                   msg.innerText = "Email belum diverifikasi!";
                   msg.className = "msg-error";
                   btn.innerText = "MASUK";
                   btn.disabled = false;
                  auth.signOut();
                }
            } catch (err) {
               msg.innerText = "Gagal Login! Periksa kembali email & password.";
               msg.className = "msg-error";
               btn.innerText = "MASUK";
               btn.disabled = false;
            }
        };
 
        // FORGOT PASSWORD
        document.getElementById('btnForgot').onclick = () => document.getElementById('forgotModal').style.display = 'flex';
        document.getElementById('closeModal').onclick = () => document.getElementById('forgotModal').style.display = 'none';
        document.getElementById('sendReset').onclick = async () => {
            const email = document.getElementById('forgotEmail').value.trim();
            if (!email) return alert("Masukkan email!");
            try {
                await auth.sendPasswordResetEmail(email);
               alert("Link reset password telah dikirim ke email Anda.");
               document.getElementById('forgotModal').style.display = 'none';
            } catch (err) {
               alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
