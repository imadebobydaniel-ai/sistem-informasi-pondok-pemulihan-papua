<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px; text-align: center; box-sizing: border-box; }
        .logo-container { margin-bottom: 5px; }
        .logo-container img { width: 100px; height: auto; }
        .title-main { font-weight: bold; font-size: 18px; color: #333; margin: 0; text-transform: uppercase; line-height: 1.2; }
        .title-sub { font-weight: bold; font-size: 15px; color: #FFD700; margin: 0 0 20px 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .pass-wrapper { position: relative; }
        .pass-wrapper i { position: absolute; right: 12px; top: 22px; cursor: pointer; color: #888; }
        .btn-red { background: #ff0000; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
        
        .footer-links { 
            margin-top: 20px; 
            border-top: 1px solid #eee; 
            padding-top: 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
        }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .btn-admin { color: #555 !important; font-size: 12px !important; opacity: 0.7; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="logo-container"><img src="logo_pondok.png"></div>
    <div class="title-main">PONDOK PEMULIHAN PAPUA</div>
    <div class="title-sub">Sistem Informasi Komsel JC</div>
    <input type="email" id="email" placeholder="Email">
    <div class="pass-wrapper">
        <input type="password" id="pass" placeholder="Password">
        <i class="fa-solid fa-eye" id="toggleIcon" onclick="togglePass()"></i>
    </div>
    <button class="btn-red" id="btnMasuk" onclick="loginUser()">MASUK</button>
    <div class="footer-links">
        <a href="registrasi.html"><i class="fa-solid fa-user-plus"></i> DAFTAR BARU</a>
        <a href="login.html" class="btn-admin"><i class="fa-solid fa-user-shield"></i> Login Administrator</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function togglePass() {
        const passInput = document.getElementById('pass');
        const icon = document.getElementById('toggleIcon');
        if (passInput.type === "password") {
            passInput.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            passInput.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    function loginUser() {
        const emailInput = document.getElementById('email').value.trim();
        const passwordInput = document.getElementById('pass').value.trim();
        const btn = document.getElementById('btnMasuk');

        if (!emailInput || !passwordInput) {
            return alert("Isi email dan password dulu, Bang!");
        }

        btn.innerText = "Memverifikasi...";
        btn.disabled = true;

        db.collection("users").where("email", "==", emailInput).get()
        .then((querySnapshot) => {
            if (querySnapshot.empty) {
                alert("Email tidak terdaftar!");
                resetBtn();
                return;
            }

            let loginBerhasil = false;
            querySnapshot.forEach((doc) => {
                const userData = doc.data();
                if (userData.password === passwordInput) {
                    loginBerhasil = true;

                    // SIMPAN DATA AGAR MUNCUL DI MAIN MENU
                    localStorage.setItem('nama_login', userData.nama);
                    localStorage.setItem('jc_login', userData.komsel || "-");

                    alert("Login Berhasil! Selamat Datang " + userData.nama);
                    
                    // TUJUAN PENGALIHAN SESUAI PERINTAH
                    window.location.href = "main_menu.html"; 
                }
            });

            if (!loginBerhasil) {
                alert("Password salah, Bang!");
                resetBtn();
            }
        })
        .catch((error) => {
            alert("Error: " + error.message);
            resetBtn();
        });

        function resetBtn() {
            btn.innerText = "MASUK";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
