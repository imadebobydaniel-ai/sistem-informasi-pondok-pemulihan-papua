<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .logo-container img { width: 80px; margin-bottom: 10px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-login:hover { background: #0056b3; }
        .admin-link { margin-top: 15px; display: block; font-size: 12px; color: #666; text-decoration: none; }
        .reg-link { margin-top: 10px; display: block; font-size: 13px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo-container">
        <img src="logo_pondok.png" alt="Logo">
    </div>
    <h2>LOGIN ANGGOTA</h2>
    <input type="email" id="userEmail" placeholder="Email Anggota">
    <input type="password" id="userPass" placeholder="Password">
    <button class="btn-login" onclick="loginUser()">MASUK</button>
    
    <a href="registrasi.html" class="reg-link">Belum punya akun? Daftar Sekarang</a>
    
    <a href="login_admin.html" class="admin-link">Masuk sebagai Admin</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Masukkan ke dalam fungsi loginUser()
db.collection("users").where("email", "==", email).get()
.then((querySnapshot) => {
    if (querySnapshot.empty) {
        alert("❌ LOGIN GAGAL: Email tidak terdaftar di database!"); // Popup email salah
    } else {
        let userDitemukan = false;
        querySnapshot.forEach((doc) => {
            if (doc.data().password === pass) {
                userDitemukan = true;
                alert("✅ LOGIN BERHASIL! Selamat datang " + doc.data().nama); // Popup login sukses
                window.location.href = "menu.html";
            }
        });
        if (!userDitemukan) {
            alert("⚠️ PASSWORD SALAH: Silakan periksa kembali kata sandi Anda!"); // Popup password salah
        }
    }
})
.catch((error) => {
    alert("🚨 KENDALA SISTEM: " + error.message); // Popup gangguan koneksi/server
});
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loginUser() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;

        if (email === "" || pass === "") {
            return alert("Email dan Password harus diisi!");
        }

        // Cek data di koleksi 'users'
        db.collection("users").where("email", "==", email).where("password", "==", pass).get()
        .then((querySnapshot) => {
            if (!querySnapshot.empty) {
                querySnapshot.forEach((doc) => {
                    const user = doc.data();
                    // Simpan data ke session sementara
                    localStorage.setItem('email_login', user.email);
                    localStorage.setItem('nama_login', user.nama);
                    localStorage.setItem('jc_login', user.komsel);

                    alert("Selamat Datang, " + user.nama);
                    
                    // SINKRONISASI: Mengarah ke menu.html sesuai daftar file
                    window.location.href = "menu.html"; 
                });
            } else {
                alert("Email atau Password salah!");
            }
        })
        .catch((error) => {
            console.error("Error login: ", error);
        });
    }
</script>

</body>
</html>
