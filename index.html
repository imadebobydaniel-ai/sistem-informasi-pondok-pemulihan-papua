<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px; text-align: center; }
        
        .header-logo { width: 90px; margin-bottom: 10px; }
        .title-org { margin: 5px 0; font-size: 18px; color: #333; font-weight: bold; text-transform: uppercase; }
        .title-system { 
            margin: 5px 0; font-size: 16px; color: #FFD700; font-weight: bold;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; 
        }
        .title-status { margin: 5px 0 20px 0; font-size: 14px; color: #444; font-weight: normal; }

        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-login:hover { background: #0056b3; }
        .admin-link { margin-top: 15px; display: block; font-size: 12px; color: #666; text-decoration: none; }
        .reg-link { margin-top: 10px; display: block; font-size: 13px; color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo_pondok.png" alt="Logo" class="header-logo">
    <h2 class="title-org">PONDOK PEMULIHAN PAPUA</h2>
    <h3 class="title-system">Sistem Informasi Komsel JC</h3>
    <h4 class="title-status">Login Anggota Komsel</h4>

    <input type="email" id="userEmail" placeholder="Email Anggota">
    <input type="password" id="userPass" placeholder="Password">
    <button class="btn-login" onclick="loginUser()">MASUK</button>
    
    <a href="registrasi.html" class="reg-link">Belum punya akun? Daftar Sekarang</a>
    <a href="admin.html" class="admin-link">Masuk sebagai Admin</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase Abang
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function loginUser() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;

        if (email === "" || pass === "") {
            return alert("⚠️ PERINGATAN: Email dan Password harus diisi!");
        }

        db.collection("users").where("email", "==", email).get()
        .then((querySnapshot) => {
            if (querySnapshot.empty) {
                alert("❌ LOGIN GAGAL: Email tidak terdaftar!");
            } else {
                let loginSukses = false;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.password === pass) {
                        loginSukses = true;
                        localStorage.setItem('email_login', data.email);
                        localStorage.setItem('nama_login', data.nama);
                        alert("✅ LOGIN BERHASIL! Selamat Datang, " + data.nama);
                        window.location.href = "menu.html"; 
                    }
                });
                if (!loginSukses) {
                    alert("⚠️ PASSWORD SALAH!");
                }
            }
        })
        .catch((error) => {
            alert("🚨 KENDALA SISTEM: " + error.message);
        });
    }
</script>

</body>
</html>
