<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pondok Pemulihan Papua</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        img.logo { width: 120px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .strength { font-size: 12px; margin-bottom: 10px; text-align: left; font-weight: bold; }
        .weak { color: #dc3545; }
        .strong { color: #28a745; }
        
        /* Layar Loading */
        #loading-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 999; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #ffd700; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Halaman Laporan (Awalnya Tersembunyi) */
        #halaman-laporan { display: none; width: 90%; max-width: 600px; background: white; padding: 20px; border-radius: 15px; margin: 20px auto; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #28a745; color: white; }
    </style>
</head>
<body>

<div id="loading-screen">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <div class="spinner"></div>
    <p id="loading-text">Memproses Data...</p>
</div>

<div id="auth-form" class="card">
    <img src="logo_pondok.png" alt="Logo" class="logo">
    <h2>Pendaftaran</h2>
    <p style="color: #777;">Pondok Pemulihan Papua</p>
    
    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="text" id="nohp" placeholder="Nomor HP">
    <input type="email" id="email" placeholder="Email Aktif">
    <input type="password" id="pass" placeholder="Password" oninput="validatePassword(this.value)">
    <div id="strength-text" class="strength">Kekuatan: -</div>
    
    <button onclick="prosesLogin()">MASUK / DAFTAR</button>
</div>

<div id="halaman-laporan">
    <img src="logo_pondok.png" alt="Logo" style="width: 80px;">
    <h2>Laporan Pembacaan Alkitab</h2>
    <hr>
    <p>Selamat datang di sistem informasi laporan.</p>
    
    <table>
        <tr>
            <th>Hari/Tanggal</th>
            <th>Jadwal Bacaan</th>
        </tr>
        <tr>
            <td>Senin, 12 Maret</td>
            <td>Kejadian 1-3</td>
        </tr>
    </table>
    <br>
    <button onclick="location.reload()" style="background:#666;">Log Out</button>
</div>

<script>
    function validatePassword(pass) {
        let text = document.getElementById('strength-text');
        let regex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        if (pass.length === 0) { text.innerHTML = "Kekuatan: -"; text.className = "strength"; }
        else if (regex.test(pass)) { text.innerHTML = "Kekuatan: **STRONG**"; text.className = "strength strong"; }
        else { text.innerHTML = "Kekuatan: **WEAK**"; text.className = "strength weak"; }
    }

    function prosesLogin() {
        const nama = document.getElementById('nama').value;
        const nohp = document.getElementById('nohp').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        const urlServer = "https://script.google.com/macros/s/AKfycbz2lNjzbAuUxxCE0vQpjUr8TvWFx20EtUHgQvg5i5APUhHjy8Iw-rHJpXtqJIm7te6M1Q/exec";

        if (email === "admin@mail.com" && pass === "admin2026") {
            bukaLaporan("Selamat Datang Admin!");
            return;
        }

        if (nama && email && pass) {
            tampilkanLoading("Mendaftarkan...");
            
            fetch(urlServer, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ "nama": nama, "nohp": nohp, "email": email, "password": pass })
            }).then(() => {
                bukaLaporan("Pendaftaran Berhasil!");
            }).catch(() => alert("Gagal koneksi server"));
        } else {
            alert("Isi data dengan lengkap!");
        }
    }

    function tampilkanLoading(pesan) {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        document.getElementById('loading-text').innerText = pesan;
    }

    function bukaLaporan(pesan) {
        tampilkanLoading("Membuka Laporan...");
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('halaman-laporan').style.display = 'block';
            document.body.style.alignItems = 'flex-start'; // Agar scroll enak
            if(pesan) alert(pesan);
        }, 3000);
    }
</script>
</body>
</html>
