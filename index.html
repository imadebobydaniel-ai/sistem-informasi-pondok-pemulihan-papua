<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --emas-lux: #D4AF37; 
            --grey-bg: #2c2c2c; /* Konsisten dengan halaman Admin */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        /* --- CSS STARTUP LOGO (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--grey-bg); /* Background Grey */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container utama agar loader membungkus logo */
        .logo-wrapper {
            position: relative;
            width: 180px; 
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .splash-logo {
            width: 110px; /* Ukuran logo di tengah */
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            animation: pulse 2s infinite ease-in-out;
        }

        .gold-loader {
            position: absolute;
            width: 160px; /* Lingkaran melingkari logo */
            height: 160px;
            border: 5px solid rgba(212, 175, 55, 0.1);
            border-top: 5px solid var(--emas-lux);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3);
            z-index: 1;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* --- UI LOGIN CARD --- */
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            position: relative; 
            z-index: 1; 
        }
        .logo-login { width: 80px; margin-bottom: 15px; }
        h2 { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; }
        h3 { 
            color: #ffcc00; 
            margin-bottom: 25px; 
            font-size: 16px; 
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5); 
            background: #2c3e50; 
            display: inline-block; 
            padding: 5px 15px; 
            border-radius: 20px; 
        }
        .form-group { margin-bottom: 15px; position: relative; text-align: left; }
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 14px; 
            outline: none; 
            transition: 0.3s; 
            box-sizing: border-box; 
        }
        .btn-login { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
                <img src="logo_pondok.png" alt="Logo" class="splash-logo">
                <div class="gold-loader"></div>
            </div>
            <p style="color: var(--emas-lux); font-weight: bold; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">
                Pondok Pemulihan Papua
            </p>
        </div>
    </div>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo-login">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Jemaat</h3>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Silahkan Login Anggota</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Anggota" required>
            </div>
            <div class="form-group">
                <input type="password" id="pass" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>

        <div style="margin-top: 25px; font-size: 14px; color: #666;">
            Belum punya akun? <a href="registrasi.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Daftar Sekarang</a>
        </div>
        <a href="login_cyber.html" style="display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 12px;">Masuk sebagai Admin</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                if (splash) {
                    splash.classList.add('splash-hidden');
                    document.body.style.overflow = "auto";
                }
            }, 3000); 
        });

        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
    </script>
</body>
</html>
