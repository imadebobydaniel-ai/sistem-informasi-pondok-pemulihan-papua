<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #007bff; --biru-tua: #003366; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .login-card { background: white; padding: 40px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo-img { width: 100px; margin-bottom: 15px; }
        h2 { color: var(--biru-tua); margin: 10px 0; font-size: 20px; font-weight: bold; text-transform: uppercase; }
        h4 { color: #555; margin-bottom: 25px; font-weight: normal; }
        .input-group { margin-bottom: 15px; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        button { width: 100%; padding: 14px; background: var(--biru-utama); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .footer-links { margin-top: 25px; font-size: 13px; }
        .footer-links a { color: var(--biru-utama); text-decoration: none; font-weight: bold; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT78Z0M-B4CjR6iF9xX0D0M5_B_m9FfXW9vDw&s" class="logo-img" alt="Logo">
    <h2>PONDOK PEMULIHAN PAPUA</h2>
    <p style="color: #d4af37; font-weight: bold; margin: 0;">Sistem Informasi Komsel JC</p>
    <p style="color: #777; font-size: 14px; margin-bottom: 25px;">Login Anggota Komsel</p>
    
    <div class="input-group">
        <input type="email" id="email" placeholder="Email Anggota">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>
    
    <button onclick="prosesLogin()">MASUK</button>
    
    <div class="footer-links">
        <a href="registrasi.html">BELUM PUNYA AKUN? DAFTAR SEKARANG</a>
        <a href="login_admin.html" style="color: #888; font-weight: normal; margin-top: 20px;">
            <i class="fa-solid fa-user-shield"></i> LOGIN ADMINISTRATOR
        </a>
    </div>
</div>

<script>
    function prosesLogin() {
        // Logika login Bapak tetap sama di sini
        window.location.href = "menu.html";
    }
</script>

</body>
</html>
