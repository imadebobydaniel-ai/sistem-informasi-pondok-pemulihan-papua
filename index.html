<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --biru-tua: #003366; 
            --emas-lux: #D4AF37; 
        }

        /* RESET & BASE */
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* --- CSS SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #003366;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-content {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .splash-logo {
            width: 120px; 
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
            animation: pulse 2s infinite ease-in-out;
        }

        .gold-loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.1);
            border-top: 4px solid #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* UI LOGIN CARD */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; }
        h3 { color: #ffcc00; margin-bottom: 25px; font-size: 16px; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); background: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .form-group { margin-bottom: 15px; position: relative; text-align: left; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; transition: 0.3s; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #999; }
        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-login:disabled { background-color: #cccccc; cursor: not-allowed; }
        
        /* MODAL */
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
        .btn-ok { background-color: #003366; color: white; border: none; padding: 12px 30px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <img src="logo_pondok.png" alt="Logo" class="splash-logo">
            <div class="gold-loader"></div>
            <p style="color: #D4AF37; font-weight: bold; font-size: 14px; letter-spacing: 1px; margin: 0;">PONDOK PEMULIHAN PAPUA</p>
        </div>
    </div>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Komsel JC</h3>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Silahkan Login Anggota</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Anggota" required>
            </div>
            <div class="form-group">
                <input type="password" id="pass" placeholder="Password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIconLogin" onclick="togglePassLogin()"></i>
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>

        <div style="margin-top: 25px; font-size: 14px; color: #666;">
            Belum punya akun? <a href="registrasi.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Daftar Sekarang</a>
        </div>
        <a href="login_cyber.html" style="display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 12px;">Masuk sebagai Admin</a>
        
        <a href="#" onclick="location.replace('index.html');" style="text-decoration:none;">
            <p style="text-align:center; color:#003366; font-size:14px; margin-top:15px;">
                <i class="fa-solid fa-circle-left"></i> Kembali ke Menu Utama
            </p>
        </a>
    </div>

    <div id="loginAlertModal" class="modal-overlay">
        <div class="modal-content">
            <i class="fa-solid fa-circle-exclamation" style="font-size: 40px; color: #e11d48; margin-bottom: 15px;"></i>
            <h3 style="background: none; color: #333; text-shadow: none; padding: 0;">Pesan Sistem</h3>
            <p id="alertMessage" style="color: #666; font-size: 14px; margin-top: 10px;">Email atau Password Salah!</p>
            <button id="closeAlert" class="btn-ok">OK</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // --- SPLASH SCREEN LOGIC ---
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                if (splash) {
                    splash.classList.add('splash-hidden');
                    setTimeout(() => {
                        document.body.style.overflow = "auto";
                    }, 800); 
                }
            }, 3000); 
        });

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // --- UI UTILITY ---
        const alertModal = document.getElementById('loginAlertModal');
        const alertText = document.getElementById('alertMessage');
        const closeBtn = document.getElementById('closeAlert');

        function tampilkanPesan(pesan) {
            alertText.innerText = pesan;
            alertModal.style.display = 'flex';
        }
        closeBtn.onclick = () => alertModal.style.display = 'none';

        function togglePassLogin() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eyeIconLogin');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        // --- LOGIN LOGIC (IMPROVED) ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('pass').value;

            // Efek loading
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;

            try {
                const snapshot = await db.collection("users")
                    .where("email", "==", email)
                    .where("password", "==", password)
                    .get();

                if (!snapshot.empty) {
                    const userData = snapshot.docs[0].data();
                    
                    // Simpan Sesi
                    localStorage.setItem("userEmail", email);
                    localStorage.setItem("userName", userData.nama || "Anggota");
                    localStorage.setItem("isLoggedIn", "true");

                    // Redirect hanya jika login sukses
                    window.location.replace("menu.html"); 
                } else {
                    tampilkanPesan("Email atau Password Salah!");
                    btn.innerText = "MASUK";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                tampilkanPesan("Gagal terhubung ke database.");
                btn.innerText = "MASUK";
                btn.disabled = false;
            }
        });

        // Pencegah Back ke halaman login setelah masuk
        (function () {
            history.pushState(null, null, location.href);
            window.onpopstate = function () {
                history.pushState(null, null, location.href);
            };
        })();
    </script>
</body>
</html>
