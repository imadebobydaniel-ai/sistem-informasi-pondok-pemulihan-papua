<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 380px; text-align: center; }
        .header-section { margin-bottom: 25px; }
        .logo-main { width: 90px; height: auto; margin-bottom: 15px; }
        #text-org { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; text-transform: uppercase; display: block; }
        #text-system { margin: 8px 0; font-size: 18px; color: #FFD700; font-weight: bold; display: block; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        #text-status { margin: 10px 0; font-size: 16px; color: #555; font-weight: normal; display: block; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: #007bff; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .footer-links { margin-top: 20px; font-size: 14px; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="header-section">
        <img src="https://imadebobydaniel-ai.github.io/laporan-pembacaan-alkitab-/logo_pondok.png" alt="Logo" class="logo-main">
        <span id="text-org">PONDOK PEMULIHAN PAPUA</span>
        <span id="text-system">Sistem Informasi Komsel JC</span>
        <span id="text-status">Login Anggota Komsel</span>
    </div>

    <input type="email" id="email" placeholder="Email Anggota">
    <input type="password" id="pass" placeholder="Password">
    
    <button class="btn-blue" onclick="prosesLogin()">MASUK</button>
    
    <div class="footer-links">
        <p>Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a></p>
        <a href="admin.html" style="color: #888; font-weight: normal;">Masuk sebagai Admin</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function prosesLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;

        try {
            const snapshot = await db.collection("users")
                .where("email", "==", email)
                .where("password", "==", pass)
                .get();

            if (!snapshot.empty) {
                const user = snapshot.docs[0].data();
                // Simpan data agar Main Menu langsung kenal
                localStorage.setItem("userEmail", email);
                localStorage.setItem("userName", user.nama);
                localStorage.setItem("userKomsel", user.komsel);
                
                // Navigasi ke Main Menu
                window.location.href = "mainmenu.html";
            } else {
                alert("Email atau Password Salah!");
            }
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
