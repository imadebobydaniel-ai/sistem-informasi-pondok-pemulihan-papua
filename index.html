<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .logo-container img { width: 80px; margin-bottom: 10px; }
        h2 { font-size: 18px; color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-login:hover { background: #0056b3; }
        .admin-link { margin-top: 15px; display: block; font-size: 12px; color: #666; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo-container">
        <img src="logo_pondok.png" alt="Logo">
    </div>
    <h2>LOGIN ANGGOTA</h2>
    <input type="email" id="userEmail" placeholder="Email Anggota">
    <input type="password" id="userPass" placeholder="Password">
    <button class="btn-login" onclick="loginUser()">MASUK</button>
    <a href="login_admin.html" class="admin-link">Masuk sebagai Admin</a>
</div>

<script>
    function loginUser() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;

        // Validasi sederhana (Sesuaikan dengan data Abang)
        if (email !== "" && pass !== "") {
            // SIMPAN DATA KE STORAGE
            localStorage.setItem('email_login', email);
            localStorage.setItem('nama_login', "Anggota Komsel"); // Nama sementara
            localStorage.setItem('jc_login', "1"); // JC sementara

            alert("Login Berhasil!");

            // --- BAGIAN KRUSIAL (Penyebab Error 404) ---
            // Pastikan mengarah ke 'menu.html', BUKAN 'main_menu.html'
            window.location.href = "menu.html"; 
        } else {
            alert("Email dan Password harus diisi!");
        }
    }

    // Cek jika sudah login, langsung lempar ke menu
    window.onload = function() {
        if (localStorage.getItem('email_login')) {
            window.location.href = "menu.html";
        }
    }
</script>

</body>
</html>
