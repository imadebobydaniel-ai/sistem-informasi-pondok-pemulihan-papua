<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emas-lux: #D4AF37; --grey-bg: #2c2c2c; --biru-aksen: #007bff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* SPLASH SCREEN */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--grey-bg); display: flex; justify-content: center; align-items: center; z-index: 999999; transition: opacity 0.8s ease, visibility 0.8s; }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }
        .gold-loader { position: absolute; width: 160px; height: 160px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid var(--emas-lux); border-radius: 50%; animation: spin 1.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* LOGIN CARD */
        .login-card { background: #ffffff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; box-sizing: border-box; border-top: 5px solid var(--biru-aksen); text-align: center; }
        .header img { width: 80px; }
        .header h2 { margin: 10px 0 0; color: #333; font-size: 18px; text-transform: uppercase; }

        /* --- SISTEM NOTIFIKASI BLOCK DISPLAY --- */
        #login-msg { 
            display: none; /* Sembunyi secara default */
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: bold; 
            text-align: center;
        }
        
        /* Class pemicu untuk menampilkan block */
        .show-block { display: block !important; }
        
        .msg-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .msg-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .msg-process { background: #e3f2fd; color: #0d47a1; border: 1px solid #bbdefb; }
        /* ---------------------------------------- */

        .form-group { margin-bottom: 20px; position: relative; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; }
        .toggle-password { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; }
        .eye-active { color: var(--biru-aksen) !important; }

        .btn-login { width: 100%; padding: 14px; background-color: var(--biru-aksen); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-login:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-links { margin-top: 20px; font-size: 13px; color: #666; }
        .footer-links a { color: var(--biru-aksen); text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="gold-loader"></div>
        <img src="logo_pondok.png" alt="Logo" style="width:120px; position:relative; z-index:2;">
    </div>

    <div class="login-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
            <h2>PONDOK PEMULIHAN PAPUA</h2>
            <div style="background:#2c3e50; color:#ffcc00; font-size:12px; padding:4px 12px; border-radius:20px; display:inline-block; margin-top:8px;">SISTEM INFORMASI ANGGOTA</div>
        </div>

        <div id="login-msg"></div>

        <form id="userLoginForm">
            <div class="form-group">
                <label>Email Anggota</label>
                <input type="email" id="user_email" required placeholder="Email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="user_pass" required placeholder="Password">
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
            </div>
            <button type="submit" id="btnMasuk" class="btn-login">MASUK</button>
        </form>

        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <a href="login_cyber.html" style="color:#888; font-size:11px;">Masuk sebagai Admin</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // Cek Session
        document.addEventListener("DOMContentLoaded", function() {
            if (sessionStorage.getItem("userLoggedIn") === "true") {
                window.location.replace("menu.html");
                return;
            }
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('splash-hidden');
            }, 2000);
        });

        // Toggle Password
        const eyeIcon = document.getElementById('eyeIcon');
        const passInput = document.getElementById('user_pass');
        eyeIcon.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.classList.toggle('fa-eye-slash');
            eyeIcon.classList.toggle('eye-active');
        });

        // Proses Login
        const loginForm = document.getElementById('userLoginForm');
        const msgBox = document.getElementById('login-msg');
        const btn = document.getElementById('btnMasuk');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('user_email').value.trim();
            const pass = document.getElementById('user_pass').value;

            // 1. Tampilkan NOTIF PROSES (Block Display)
            msgBox.innerText = "Memverifikasi...";
            msgBox.className = "msg-process show-block"; 
            btn.disabled = true;

            try {
                const snap = await db.collection("jemaat")
                    .where("email", "==", email)
                    .where("password", "==", pass)
                    .get();

                if (!snap.empty) {
                    // 2. Tampilkan NOTIF BERHASIL (Block Display)
                    msgBox.innerText = "Login Berhasil!";
                    msgBox.className = "msg-success show-block";
                    sessionStorage.setItem("userLoggedIn", "true");
                    
                    const userData = snap.docs[0].data();
                    sessionStorage.setItem("userName", userData.nama || "User");

                    setTimeout(() => { window.location.replace("menu.html"); }, 1200);
                } else {
                    // 3. Tampilkan NOTIF ERROR (Block Display)
                    msgBox.innerText = "Email atau Password Salah!";
                    msgBox.className = "msg-error show-block";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Error Detail:", err);
                // 4. Tampilkan NOTIF KONEKSI (Block Display)
                msgBox.innerText = "Koneksi Bermasalah!";
                msgBox.className = "msg-error show-block";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
