<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --emas-lux: #D4AF37; --grey-bg: #2c2c2c; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #1a1a1a; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }

        /* --- SPLASH SCREEN --- */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--grey-bg); display: flex; justify-content: center; align-items: center; z-index: 999999; transition: opacity 0.8s ease, visibility 0.8s; }
        .logo-wrapper { position: relative; width: 180px; height: 180px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .splash-logo { width: 120px; z-index: 2; animation: pulse 2s infinite ease-in-out; }
        .gold-loader { position: absolute; width: 160px; height: 160px; border: 5px solid rgba(212, 175, 55, 0.1); border-top: 5px solid var(--emas-lux); border-radius: 50%; animation: spin 1.5s linear infinite; box-shadow: 0 0 25px rgba(212, 175, 55, 0.3); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* --- LOGIN CARD --- */
        .login-card { background: #ffffff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; box-sizing: border-box; border-top: 5px solid #007bff; position: relative; z-index: 1; }
        .header { text-align: center; margin-bottom: 30px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 20px; text-transform: uppercase; }
        .header span { color: #ffcc00; font-size: 14px; background: #2c3e50; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 10px; }

        #login-msg { display: none; padding: 12px; margin-bottom: 15px; border-radius: 8px; font-size: 13px; font-weight: bold; text-align: center; }
        .msg-error { display: block !important; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .msg-success { display: block !important; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        .toggle-password { position: absolute; right: 15px; top: 38px; cursor: pointer; color: #888; }
        .eye-active { color: #007bff !important; text-shadow: 0 0 8px rgba(0,123,255,0.5); }

        .btn-login { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-login:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .footer-links a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-wrapper">
                <img src="logo_pondok.png" alt="Logo" class="splash-logo">
                <div class="gold-loader"></div>
            </div>
            <p style="color: var(--emas-lux); font-weight: bold; font-size: 15px; letter-spacing: 2px; text-transform: uppercase;">Pondok Pemulihan Papua</p>
        </div>
    </div>

    <div class="login-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
            <h2>Pondok Pemulihan Papua</h2>
            <span>SISTEM INFORMASI JEMAAT</span>
        </div>

        <div id="login-msg"></div>

        <form id="userLoginForm" onsubmit="event.preventDefault(); handleLogin();">
            <div class="form-group">
                <label>Email Anggota</label>
                <input type="email" id="user_email" required placeholder="Masukkan email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="user_pass" required placeholder="Masukkan password">
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
            </div>
            <button type="button" id="btnMasuk" class="btn-login" onclick="handleLogin()">MASUK</button>
        </form>

        <div class="footer-links">
            Belum punya akun? <a href="registrasi.html">Daftar Sekarang</a>
            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
            <a href="login_cyber.html" style="color: #888; font-size: 11px;">Masuk sebagai Admin</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // 1. Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if (splash) splash.classList.add('splash-hidden');
                document.body.style.overflow = "auto";
            }, 2000);
        });

        // 2. Firebase Init
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 3. Password Toggle
        const eyeIcon = document.getElementById('eyeIcon');
        const passInput = document.getElementById('user_pass');
        eyeIcon.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeIcon.classList.toggle('fa-eye-slash');
            eyeIcon.classList.toggle('eye-active');
        });

        // 4. Logic Login (VERSI AGRESIF & ANTI-DOBEL)
        let isLoggingIn = false;

        async function handleLogin() {
            // Blokir jika sedang proses
            if (isLoggingIn) return;

            const email = document.getElementById('user_email').value.trim().toLowerCase();
            const pass = document.getElementById('user_pass').value;
            const msgBox = document.getElementById('login-msg');
            const btn = document.getElementById('btnMasuk');

            if (!email || !pass) {
                msgBox.innerText = "Email dan Password harus diisi!";
                msgBox.className = "msg-error";
                return;
            }

            // Kunci proses
            isLoggingIn = true;
            btn.innerText = "Memverifikasi...";
            btn.disabled = true;
            msgBox.style.display = "none";

            try {
                const snap = await db.collection("users")
                    .where("email", "==", email)
                    .where("password", "==", pass)
                    .get();

                if (!snap.empty) {
                    msgBox.innerText = "Login Berhasil! Mengalihkan...";
                    msgBox.className = "msg-success";
                    
                    // STOP semua proses background agar tidak terjadi request ganda
                    window.stop(); 
                    
                    // Redirect menggunakan replace agar history bersih
                    setTimeout(() => {
                        window.location.replace("menu.html");
                    }, 800);
                } else {
                    throw new Error("Email atau Password salah!");
                }
            } catch (err) {
                msgBox.innerText = err.message;
                msgBox.className = "msg-error";
                
                // Reset state hanya jika gagal
                isLoggingIn = false;
                btn.innerText = "MASUK";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
