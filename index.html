<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --biru-tua: #003366; 
            --emas-lux: #D4AF37; 
            --grey-bg: #4a4a4a; /* Warna abu-abu latar belakang */
        }

        /* RESET & BASE */
        body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* --- CSS SPLASH SCREEN --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--grey-bg); /* Berubah menjadi Grey */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .splash-content {
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container untuk Logo dan Loader agar menumpuk */
        .logo-container {
            position: relative;
            width: 160px; /* Sesuaikan dengan ukuran loader */
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .splash-logo {
            width: 100px; /* Sedikit lebih kecil dari loader agar berada di dalam */
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 0 10px rgba(0, 0, 0, 0.3));
        }

        /* Buffering melingkari logo */
        .gold-loader {
            position: absolute;
            width: 150px; 
            height: 150px;
            border: 5px solid rgba(212, 175, 55, 0.1);
            border-top: 5px solid var(--emas-lux);
            border-radius: 50%;
            animation: spin 1.5s linear infinite;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            z-index: 1;
        }

        .splash-text {
            color: var(--emas-lux);
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 2px;
            margin-top: 10px;
            text-align: center;
            text-transform: uppercase;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .splash-hidden { opacity: 0 !important; visibility: hidden !important; }

        /* UI LOGIN CARD (Tetap sama) */
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { margin: 5px 0; font-size: 20px; color: #333; font-weight: bold; }
        h3 { color: #ffcc00; margin-bottom: 25px; font-size: 16px; text-shadow: 1px 1px 1px rgba(0,0,0,0.5); background: #2c3e50; display: inline-block; padding: 5px 15px; border-radius: 20px; }
        .form-group { margin-bottom: 15px; position: relative; text-align: left; }
        input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        .btn-login { width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center; }
        .modal-content { background-color: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 350px; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-content">
            <div class="logo-container">
                <div class="gold-loader"></div>
                <img src="logo_pondok.png" alt="Logo" class="splash-logo">
            </div>
            <div class="splash-text">PONDOK PEMULIHAN PAPUA</div>
        </div>
    </div>

    <div class="login-card">
        <img src="logo_pondok.png" alt="Logo" class="logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <h3>Sistem Informasi Komsel JC</h3>
        <p style="color: #666; margin-bottom: 20px; font-size: 14px;">Silahkan Login Anggota</p>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Anggota" required>
            </div>
            <div class="form-group">
                <input type="password" id="pass" placeholder="Password" required>
            </div>
            <button type="submit" class="btn-login">MASUK</button>
        </form>

        <div style="margin-top: 25px; font-size: 14px; color: #666;">
            Belum punya akun? <a href="registrasi.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Daftar Sekarang</a>
        </div>
    </div>

    <script>
        // --- SPLASH SCREEN LOGIC ---
        document.addEventListener("DOMContentLoaded", function() {
            const splash = document.getElementById('splash-screen');
            setTimeout(() => {
                if (splash) {
                    splash.classList.add('splash-hidden');
                    setTimeout(() => {
                        document.body.style.overflow = "auto";
                    }, 800); 
                }
            }, 3000); 
        });

        // Script Firebase & Login tetap sama seperti sebelumnya...
    </script>
</body>
</html>
