<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru: #003366; --emas: #D4AF37; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; border-top: 5px solid var(--biru); }
        img { width: 80px; margin-bottom: 15px; border-radius: 50%; }
        h2 { color: var(--biru); margin-bottom: 20px; font-size: 20px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--biru); }
        button { width: 100%; padding: 12px; background: var(--biru); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; border: 2px solid var(--emas); transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .error { color: #e74c3c; font-size: 13px; margin-top: 10px; display: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT78Z0M-B4CjR6iF9xX0D0M5_B_m9FfXW9vDw&s" alt="Logo">
    <h2>PORTAL KOMSEL JC</h2>
    <input type="email" id="email" placeholder="Email Terdaftar">
    <input type="password" id="password" placeholder="Password">
    <button onclick="prosesLogin()">MASUK SISTEM</button>
    <div id="error-msg" class="error"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function prosesLogin() {
        const emailInput = document.getElementById('email').value.trim();
        const passInput = document.getElementById('password').value.trim();
        const errorDiv = document.getElementById('error-msg');

        if(!emailInput || !passInput) {
            errorDiv.innerText = "Email dan Password wajib diisi!";
            errorDiv.style.display = "block";
            return;
        }

        try {
            // Langsung cek email dan password tanpa filter Device ID
            const userRef = db.collection("users").where("email", "==", emailInput).where("password", "==", passInput);
            const snapshot = await userRef.get();

            if (snapshot.empty) {
                errorDiv.innerText = "Akun tidak ditemukan atau Password salah!";
                errorDiv.style.display = "block";
                return;
            }

            // Ambil data user yang berhasil login
            const userDoc = snapshot.docs[0];
            const userData = userDoc.data();

            // Simpan nama & email ke LocalStorage agar menu.html bisa mengenali siapa yang login
            localStorage.setItem("userEmail", userData.email);
            localStorage.setItem("userName", userData.nama);
            
            // Pindah ke menu utama
            window.location.href = "menu.html";

        } catch (e) {
            console.error(e);
            errorDiv.innerText = "Gagal login. Periksa koneksi internet Anda.";
            errorDiv.style.display = "block";
        }
    }
</script>
</body>
</html>
