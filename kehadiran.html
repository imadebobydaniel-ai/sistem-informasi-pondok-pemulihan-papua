<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Kehadiran</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { margin-bottom: 10px; color: #333; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-hadir { background-color: #00a14b; color: white; }
        .btn-tidak { background-color: #e91e63; color: white; }
        
        .form-alasan { background: #fff5f5; padding: 15px; border-radius: 12px; border: 1px solid #ffcccc; display: none; margin-top: 10px; }
        .form-alasan label { display: block; text-align: left; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        textarea { width: 100%; height: 80px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        
        .btn-group-action { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-kirim { background-color: #333; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-batal { background-color: #bbb; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .btn-home { display: inline-block; margin-top: 25px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Lapor Kehadiran</h2>
    <p>Silakan pilih status kehadiran Anda hari ini.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="pilihHadir()">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-tidak" id="btnTidakHadir" onclick="tampilAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="boxAlasan" class="form-alasan">
        <label>Alasan Tidak Hadir:</label>
        <textarea id="keterangan" placeholder="Isi alasan..."></textarea>
        
        <div class="btn-group-action">
            <button class="btn-kirim" onclick="kirimAlasan()">Kirim</button>
            <button class="btn-batal" onclick="batalProses()">Batal</button>
        </div>
    </div>

    <a href="menu.html" class="btn-home">
        <i class="fa-solid fa-house"></i> Back Home
    </a>
</div>

<script>
    function pilihHadir() {
        alert("Kehadiran dicatat.");
    }

    function tampilAlasan() {
        document.getElementById('btnHadir').style.display = 'none';
        document.getElementById('btnTidakHadir').style.display = 'none';
        document.getElementById('boxAlasan').style.display = 'block';
    }

    function batalProses() {
        // Mengosongkan tulisan
        document.getElementById('keterangan').value = "";
        // Menyembunyikan form alasan
        document.getElementById('boxAlasan').style.display = 'none';
        // Mengembalikan tampilan default
        document.getElementById('btnHadir').style.display = 'flex';
        document.getElementById('btnTidakHadir').style.display = 'flex';
    }

    function kirimAlasan() {
        const teks = document.getElementById('keterangan').value;
        if(teks !== "") {
            alert("Keterangan dikirim.");
            batalProses();
        }
    }
</script>

</body>
</html>
