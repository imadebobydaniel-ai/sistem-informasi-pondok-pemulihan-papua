<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran JC - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
        }
        .icon-header { 
            font-size: 60px; 
            color: #00a884; 
            margin-bottom: 20px; 
        }
        h2 { 
            color: #003366; 
            margin: 0 0 10px 0; 
            font-size: 24px;
            font-weight: bold;
        }
        p { 
            color: #777; 
            font-size: 14px; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }
        .btn { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            transition: 0.3s; 
            color: white;
        }
        .btn-hadir { background: #00c853; }
        .btn-hadir:hover { background: #00a846; }
        .btn-absen { background: #d81b60; }
        .btn-absen:hover { background: #b0154d; }
        
        #reason-container { display: none; margin-top: 15px; animation: fadeIn 0.3s; }
        textarea { 
            width: 100%; 
            border-radius: 10px; 
            border: 1px solid #ddd; 
            padding: 12px; 
            box-sizing: border-box; 
            font-family: inherit; 
            margin-bottom: 10px; 
            resize: none;
        }
        
        #status-display { 
            display: none; 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 10px; 
            background: #f8f9fa; 
            border: 1px solid #eee; 
        }
        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 25px; 
            color: #003366; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 13px; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-header">
        <i class="fa-solid fa-location-dot"></i>
    </div>
    <h2>KEHADIRAN JC</h2>
    <p>Shalom! Silakan pilih status kehadiran Anda hari ini untuk laporan Komsel.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="prosesLapor('HADIR')">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-absen" id="btnAbsen" onclick="tampilkanInputAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="reason-container">
        <textarea id="alasan" rows="3" placeholder="Tulis alasan tidak hadir..."></textarea>
        <button class="btn btn-absen" onclick="prosesLapor('TIDAK HADIR')">KIRIM LAPORAN</button>
    </div>

    <div id="status-display">
        <strong id="status-title" style="color: #00a884; display: block; margin-bottom: 5px;"></strong>
        <span id="status-desc" style="font-size: 12px; color: #888;"></span>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userEmail = localStorage.getItem("userEmail") || "guest@gmail.com";
    const userName = localStorage.getItem("userName") || "User";

    function updateUIStatus(judul, deskripsi) {
        document.getElementById("status-display").style.display = "block";
        document.getElementById("status-title").innerText = judul;
        document.getElementById("status-desc").innerText = deskripsi;
        
        document.getElementById("btnHadir").disabled = true;
        document.getElementById("btnAbsen").disabled = true;
        document.getElementById("btnHadir").style.opacity = "0.5";
        document.getElementById("btnAbsen").style.opacity = "0.5";
        document.getElementById("reason-container").style.display = "none";
    }

    function tampilkanInputAlasan() {
        document.getElementById("btnHadir").style.display = "none";
        document.getElementById("btnAbsen").style.display = "none";
        document.getElementById("reason-container").style.display = "block";
    }

    async function prosesLapor(tipe) {
        const todayStr = new Date().toISOString().split('T')[0];
        const alasanVal = document.getElementById("alasan").value;

        if (tipe === 'TIDAK HADIR' && !alasanVal) {
            alert("Harap isi alasan ketidakhadiran.");
            return;
        }

        updateUIStatus("Sedang Melapor...", "Mengambil lokasi GPS...");

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                try {
                    await db.collection("kehadiran").add({
                        nama: userName,
                        email: userEmail,
                        status: tipe,
                        alasan: tipe === 'TIDAK HADIR' ? alasanVal : "",
                        koordinat: `${lat}, ${lon}`,
                        tanggal: firebase.firestore.FieldValue.serverTimestamp(),
                        tanggal_str: todayStr
                    });

                    localStorage.setItem("lapor_" + todayStr, "true");
                    
                    const pesan = tipe === 'HADIR' ? "Terimakasih Atas Kehadiran Anda" : "Laporan anda Sudah di Input";
                    updateUIStatus(pesan, "Lokasi tercatat: " + lat.toFixed(4) + ", " + lon.toFixed(4));
                    alert(pesan);

                } catch (e) {
                    alert("Gagal mengirim laporan: " + e.message);
                }
            }, () => {
                alert("Gagal mengambil lokasi. Pastikan GPS aktif.");
            });
        }
    }

    window.onload = () => {
        const todayStr = new Date().toISOString().split('T')[0];
        if (localStorage.getItem("lapor_" + todayStr)) {
            updateUIStatus("Anda Tadi Sudah Melapor", "Laporan hari ini sudah masuk.");
        }
    };
</script>
</body>
</html>
