<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lapor Kehadiran - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --biru-muda: #00e6e6;
            --hijau-zamrud: #2ecc71;
            --merah-lux: #e91e63;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .card { 
            background: white; 
            padding: 35px 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border-top: 6px solid var(--biru-safir);
            position: relative;
        }

        .card i.main-icon {
            font-size: 50px;
            background: linear-gradient(135deg, var(--biru-safir), var(--hijau-zamrud));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        h2 { margin: 10px 0; color: var(--biru-tua); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }

        /* Tombol Utama */
        .btn { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 15px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-bottom: 15px; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 12px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.95); }

        .btn-hadir { 
            background: linear-gradient(135deg, var(--hijau-zamrud), #27ae60); 
            color: white; 
            border-bottom: 4px solid #1e8449;
        }
        .btn-tidak { 
            background: linear-gradient(135deg, var(--merah-lux), #c2185b); 
            color: white; 
            border-bottom: 4px solid #880e4f;
        }

        /* Form Alasan */
        .form-alasan { 
            background: #fffafa; 
            padding: 20px; 
            border-radius: 18px; 
            border: 2px dashed #ffcccc; 
            display: none; 
            margin-top: 10px; 
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        textarea { 
            width: 100%; 
            height: 90px; 
            padding: 12px; 
            border-radius: 12px; 
            border: 1.5px solid #ddd; 
            box-sizing: border-box; 
            resize: none; 
            font-family: inherit;
            margin-bottom: 15px;
        }
        textarea:focus { border-color: var(--merah-lux); outline: none; }

        .btn-group-action { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-kirim { background-color: var(--biru-tua); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-batal { background-color: #ddd; color: #555; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .btn-home { 
            display: inline-block; 
            margin-top: 30px; 
            color: var(--biru-safir); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 800; 
            transition: 0.3s;
        }
        .btn-home:hover { color: var(--emas-lux); }
        
        /* Overlay Blokir & Modal */
        #block-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 51, 102, 0.95); color: white; z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 30px; 
        }
        
        #modal-notif { 
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 25px; width: 85%; max-width: 350px; 
            text-align: center; border-bottom: 6px solid var(--emas-lux);
        }
    </style>
</head>
<body>

<div id="block-screen">
    <div style="background: white; padding: 30px; border-radius: 50%; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 0 20px var(--emas-lux);">
        <i class="fa-solid fa-check-double" style="font-size: 45px; color: var(--hijau-zamrud);"></i>
    </div>
    <h2 id="block-title" style="color: white;">TERIMA KASIH!</h2>
    <p id="block-message" style="font-size: 18px; color: var(--biru-muda); margin-top: 10px; font-weight: bold;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 30px; padding: 15px 40px; border-radius: 50px; border: 2px solid var(--emas-lux); background: transparent; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase;">Kembali Ke Menu</button>
</div>

<div class="card">
    <i class="fa-solid fa-location-dot main-icon"></i>
    <h2>Kehadiran JC</h2>
    <p>Shalom! Silakan pilih status kehadiran Anda hari ini untuk laporan Komsel.</p>

    <button class="btn btn-hadir" id="btnHadir" onclick="laporHadir()">
        SAYA HADIR <i class="fa-solid fa-circle-check"></i>
    </button>

    <button class="btn btn-tidak" id="btnTidakHadir" onclick="tampilAlasan()">
        TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i>
    </button>

    <div id="boxAlasan" class="form-alasan">
        <textarea id="keterangan" placeholder="Berikan alasan singkat Anda (Sakit/Izin/Pekerjaan)..."></textarea>
        <div class="btn-group-action">
            <button class="btn-kirim" id="btnKirimAlasan" onclick="kirimAlasan()">KIRIM</button>
            <button class="btn-batal" onclick="batalProses()">BATAL</button>
        </div>
    </div>

    <a href="menu.html" class="btn-home"><i class="fa-solid fa-house-chimney"></i> KEMBALI KE MENU</a>
</div>

<div id="modal-notif">
    <div class="modal-content">
        <i id="modal-icon" class="fa-solid" style="font-size: 50px; margin-bottom: 20px;"></i>
        <h3 id="modal-title" style="margin: 0 0 10px; color: var(--biru-tua);"></h3>
        <p id="modal-text" style="font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 25px;"></p>
        <button onclick="tutupModal()" style="background: var(--biru-safir); color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">OKE</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    async function cekSudahLapor() {
        if (!userEmail) return;
        const hariIni = new Date();
        hariIni.setHours(0,0,0,0);
        const tsHariIni = firebase.firestore.Timestamp.fromDate(hariIni);

        try {
            const snap = await db.collection("kehadiran")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsHariIni)
                .get();

            if (!snap.empty) {
                const statusData = snap.docs[0].data().status;
                tampilkanPesanBlokir(`Anda sudah melapor ${statusData.toUpperCase()} hari ini.`);
            }
        } catch (e) { console.error(e); }
    }

    function tampilkanPesanBlokir(pesan) {
        document.getElementById('block-message').innerText = pesan;
        document.getElementById('block-screen').style.display = 'flex';
    }

    function tampilAlasan() {
        document.getElementById('btnHadir').style.display = 'none';
        document.getElementById('btnTidakHadir').style.display = 'none';
        document.getElementById('boxAlasan').style.display = 'block';
    }

    function batalProses() {
        document.getElementById('keterangan').value = "";
        document.getElementById('boxAlasan').style.display = 'none';
        document.getElementById('btnHadir').style.display = 'flex';
        document.getElementById('btnTidakHadir').style.display = 'flex';
    }

    async function laporHadir() {
        if (!userEmail) return;
        const btn = document.getElementById('btnHadir');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mencari Lokasi...";
        btn.disabled = true;

        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const dataLoc = await response.json();
                const alamat = dataLoc.display_name || "Lokasi terdeteksi (Koordinat)";

                const snapUser = await db.collection("users").where("email", "==", userEmail).get();
                if (snapUser.empty) return;
                const u = snapUser.docs[0].data();

                await db.collection("kehadiran").add({
                    nama: u.nama,
                    email: userEmail,
                    komsel: String(u.komsel),
                    status: "Hadir",
                    alamat_hadir: alamat,
                    tanggal: firebase.firestore.Timestamp.now()
                });

                tampilkanPesanBlokir("Terima kasih, laporan HADIR Anda telah tersimpan.");
            } catch (e) { alert("Gagal koneksi!"); btn.disabled = false; btn.innerText = "SAYA HADIR"; }
        }, () => { 
            alert("Harap aktifkan GPS untuk melaporkan kehadiran!"); 
            btn.disabled = false; 
            btn.innerText = "SAYA HADIR"; 
        });
    }

    async function kirimAlasan() {
        const alasan = document.getElementById('keterangan').value;
        if (!alasan) return alert("Alasan wajib diisi!");
        
        const btnKirim = document.getElementById('btnKirimAlasan');
        btnKirim.innerText = "Mengirim...";
        btnKirim.disabled = true;

        try {
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            const u = snapUser.docs[0].data();

            await db.collection("kehadiran").add({
                nama: u.nama,
                email: userEmail,
                komsel: String(u.komsel),
                status: "Tidak Hadir",
                alasan: alasan,
                tanggal: firebase.firestore.Timestamp.now()
            });

            tampilkanPesanBlokir("Laporan TIDAK HADIR telah kami terima.");
        } catch (e) { alert("Gagal!"); btnKirim.disabled = false; btnKirim.innerText = "Kirim"; }
    }

    window.onload = cekSudahLapor;
</script>
</body>
</html>
