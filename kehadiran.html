<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kehadiran JC - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .icon-header { font-size: 50px; color: #00a884; margin-bottom: 15px; }
        h2 { color: #003366; margin: 0 0 5px 0; font-size: 22px; font-weight: bold; }
        p.subtitle { color: #777; font-size: 13px; margin-bottom: 25px; }
        .menu-selector, .extention-form { text-align: left; margin-bottom: 20px; }
        label { font-size: 12px; font-weight: bold; color: #555; margin-left: 5px; display: block; margin-top: 10px; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e0e0e0; font-size: 15px; margin-top: 5px; outline: none; transition: 0.3s; background: #f9f9f9; box-sizing: border-box; }
        select:focus, input:focus { border-color: #00a884; background: #fff; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; color: white; }
        .btn-hadir { background: #00c853; }
        .btn-hadir:hover { background: #00a846; transform: translateY(-2px); }
        .btn-absen { background: #d81b60; }
        .btn-absen:hover { background: #b0154d; transform: translateY(-2px); }
        #extention-container, #reason-container { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <div class="icon-header"><i class="fa-solid fa-location-dot"></i></div>
    <h2>KEHADIRAN JC</h2>
    <p class="subtitle">Shalom! Silakan pilih jenis absen untuk melapor.</p>

    <div class="menu-selector">
        <label><i class="fa-solid fa-list-check"></i> PILIH JENIS KEGIATAN:</label>
        <select id="jenis-kegiatan" onchange="cekJenisMenu()">
            <option value="Absen Kehadiran Ibadah Raya">Absen Kehadiran Ibadah Raya</option>
            <option value="Absen Kehadiran Doa">Absen Kehadiran Doa</option>
            <option value="Absen Kehadiran KD">Absen Kehadiran KD</option>
            <option value="Absen Kehadiran Pelayanan di Arso 1">Absen Kehadiran Pelayanan di Arso 1</option>
            <option value="Absen Extention">Absen Extention (Bantu Anggota)</option>
        </select>
    </div>

    <div id="extention-container" class="extention-form">
        <label>NAMA ANGGOTA KOMSEL:</label>
        <input type="text" id="ext-nama" placeholder="Nama anggota yang dibantu...">
        <label>JC BERAPA:</label>
        <input type="text" id="ext-jc" placeholder="Contoh: JC 01">
        <label>ABSEN UNTUK KEGIATAN:</label>
        <select id="ext-kegiatan-target">
            <option value="Ibadah Raya">Ibadah Raya</option>
            <option value="Doa">Doa</option>
            <option value="KD">KD</option>
            <option value="Pelayanan Arso 1">Pelayanan Arso 1</option>
        </select>
    </div>

    <div id="main-buttons">
        <button class="btn btn-hadir" onclick="prosesLapor('HADIR')">SAYA HADIR <i class="fa-solid fa-circle-check"></i></button>
        <button class="btn btn-absen" onclick="tampilkanInputAlasan()">TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i></button>
    </div>

    <div id="reason-container">
        <textarea id="alasan" rows="3" placeholder="Tulis alasan tidak hadir..."></textarea>
        <button class="btn btn-absen" onclick="prosesLapor('TIDAK HADIR')">KIRIM LAPORAN</button>
        <button style="background:none; border:none; color:#777; cursor:pointer; font-size:12px;" onclick="batalAbsen()">Kembali</button>
    </div>

    <div id="status-display" style="display:none; margin-top:15px; font-size:13px; color:#00a884;"></div>
    <a href="menu.html" style="display:block; margin-top:20px; color:#003366; text-decoration:none; font-weight:bold; font-size:13px;"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</a>
</div>

<div id="modal-global" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;">
    <div style="background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%;">
        <i id="icon-modal" class="fa-solid fa-circle-check" style="font-size: 50px; color: #28a745; margin-bottom: 15px;"></i>
        <h3 id="judul-modal" style="color: #333; margin-top: 0;">Terimakasih</h3>
        <p id="kegiatan-modal" style="font-size: 13px; color: #003366; font-weight: bold;"></p>
        <p id="helper-modal" style="font-size: 11px; color: #777; margin: 5px 0;"></p>
        <p id="status-laporan" style="font-weight: bold; color: #28a745; margin-bottom: 15px; font-size: 18px;"></p>
        <div style="background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 20px;">
            <p id="display-alamat-global" style="font-size: 11px; color: #444; margin-bottom: 5px;"></p>
            <p id="display-gps-global" style="font-size: 9px; color: #999; font-family: monospace;"></p>
        </div>
        <button onclick="location.reload()" style="width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", authDomain: "boby-apps-project.firebaseapp.com", projectId: "boby-apps-project", storageBucket: "boby-apps-project.appspot.com", messagingSenderId: "125984859692", appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const leaderName = localStorage.getItem("userName") || "Leader Tidak Terdeteksi";
    const leaderEmail = localStorage.getItem("userEmail") || "guest@gmail.com";

    function cekJenisMenu() {
        const menu = document.getElementById("jenis-kegiatan").value;
        document.getElementById("extention-container").style.display = (menu === "Absen Extention") ? "block" : "none";
    }

    function tampilkanInputAlasan() { document.getElementById("main-buttons").style.display = "none"; document.getElementById("reason-container").style.display = "block"; }
    function batalAbsen() { document.getElementById("main-buttons").style.display = "block"; document.getElementById("reason-container").style.display = "none"; }

    async function prosesLapor(tipe) {
        const menu = document.getElementById("jenis-kegiatan").value;
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const tglLengkap = now.toLocaleDateString('id-ID', options);
        
        let dataLaporan = {
            status: tipe,
            tanggal_lengkap: tglLengkap,
            waktu: now.toLocaleTimeString('id-ID'),
            tanggal_db: firebase.firestore.FieldValue.serverTimestamp()
        };

        if (menu === "Absen Extention") {
            const namaAnggota = document.getElementById("ext-nama").value;
            const jcLevel = document.getElementById("ext-jc").value;
            const kegTarget = document.getElementById("ext-kegiatan-target").value;
            
            if (!namaAnggota || !jcLevel) return alert("Mohon isi Nama Anggota dan JC.");
            
            dataLaporan.nama = namaAnggota;
            dataLaporan.jc = jcLevel;
            dataLaporan.kegiatan = "Absen Extention: " + kegTarget;
            dataLaporan.absensi_helper = leaderName;
        } else {
            dataLaporan.nama = leaderName;
            dataLaporan.kegiatan = menu;
            dataLaporan.email = leaderEmail;
        }

        if (tipe === 'TIDAK HADIR') dataLaporan.alasan = document.getElementById("alasan").value;

        // Proses GPS
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lon } = pos.coords;
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
                const locData = await response.json();
                const alamat = locData.display_name || "Alamat tidak ditemukan";

                dataLaporan.koordinat = `${lat}, ${lon}`;
                dataLaporan.alamat = alamat;

                await db.collection("kehadiran").add(dataLaporan);
                
                // Tampilkan Modal
                document.getElementById("modal-global").style.display = "flex";
                document.getElementById("kegiatan-modal").innerText = dataLaporan.kegiatan;
                document.getElementById("status-laporan").innerText = "SAYA " + tipe;
                document.getElementById("status-laporan").style.color = tipe === 'HADIR' ? "#28a745" : "#dc3545";
                document.getElementById("helper-modal").innerText = menu === "Absen Extention" ? "Dibantu oleh: " + leaderName : "";
                document.getElementById("display-alamat-global").innerText = alamat;
                document.getElementById("display-gps-global").innerText = `Waktu: ${tglLengkap}`;
            });
        }
    }
</script>
</body>
</html>
