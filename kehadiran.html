<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Kehadiran - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; position: relative; }
        .icon-header { font-size: 50px; color: #00a884; margin-bottom: 15px; }
        h2 { color: #003366; margin: 0 0 5px 0; font-size: 22px; font-weight: bold; }
        p.subtitle { color: #777; font-size: 13px; margin-bottom: 25px; }
        .menu-selector, .extra-form { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-left: 5px; display: block; margin-top: 10px; text-transform: uppercase; }
        select, input, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e0e0e0; font-size: 14px; margin-top: 5px; outline: none; transition: 0.3s; background: #f9f9f9; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; color: white; }
        .btn-hadir { background: #00c853; }
        .btn-absen { background: #d81b60; }
        
        #lock-display { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.95); z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; box-sizing: border-box;
        }
        #lock-display i { font-size: 80px; margin-bottom: 20px; }
        
        #extention-container, #reason-container { display: none; background: #fdfdfd; padding: 15px; border-radius: 15px; border: 1px dashed #ccc; margin-top: 10px; }
    </style>
</head>
<body>

<div id="lock-display">
    <i id="lock-icon"></i>
    <h1 id="lock-title"></h1>
    <p id="lock-msg"></p>
    <button style="margin-top:25px; padding:12px 30px; background:#003366; color:white; border-radius:10px; border:none; font-weight:bold;" onclick="closeLockDisplay()">OKE, MENGERTI</button>
</div>

<div class="card">
    <div class="icon-header"><i class="fa-solid fa-location-dot"></i></div>
    <h2>LAPORAN KEHADIRAN</h2>
    <p class="subtitle">Shalom! Silakan pilih jenis kegiatan jemaat.</p>

    <div class="menu-selector">
        <label><i class="fa-solid fa-list-check"></i> Pilih Jenis Kegiatan:</label>
        <select id="jenis-kegiatan" onchange="cekJenisMenu()">
            <option value="Absen Ibadah Raya">Ibadah Raya</option>
            <option value="Absen Doa">Absen Doa</option>
            <option value="Absen KD">Absen KD</option>
            <option value="Absen Latihan">Latihan (Musik/Multimedia/Sound/Dll)</option>
            <option value="Absen Pelayanan">Pelayanan (Worship/Choirs/Dll)</option>
            <option value="Absen Extention">KEGIATAN EXTENTION (Lainnya)</option>
        </select>
    </div>

    <div id="extention-container">
        <label>Nama Kegiatan :</label>
        <input type="text" id="ext-nama-kegiatan" placeholder="Contoh: Kunjungan Jemaat">
        
        <label>Lokasi Kegiatan :</label>
        <input type="text" id="ext-lokasi" placeholder="Alamat / Tempat">

        <label>Tanggal Kegiatan :</label>
        <input type="date" id="ext-tanggal">
    </div>

    <div id="main-buttons" style="margin-top: 20px;">
        <button class="btn btn-hadir" onclick="handleProses('HADIR')">SAYA HADIR <i class="fa-solid fa-circle-check"></i></button>
        <button class="btn btn-absen" onclick="tampilkanInputAlasan()">TIDAK HADIR <i class="fa-solid fa-circle-xmark"></i></button>
    </div>

    <div id="reason-container">
        <textarea id="alasan" rows="3" placeholder="Tulis alasan tidak hadir..."></textarea>
        <button class="btn btn-absen" onclick="handleProses('TIDAK HADIR')">KIRIM LAPORAN</button>
        <button style="background:none; border:none; color:#777; margin-top:10px;" onclick="batalAbsen()">Kembali</button>
    </div>

    <a href="menu.html" style="display:block; margin-top:20px; color:#003366; text-decoration:none; font-weight:bold; font-size:13px;"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userName = localStorage.getItem("userName") || "Jemaat";

    function showLockDisplay(type, title, msg) {
        const lock = document.getElementById('lock-display');
        const icon = document.getElementById('lock-icon');
        lock.style.display = 'flex';
        document.getElementById('lock-title').innerText = title;
        document.getElementById('lock-msg').innerText = msg;
        icon.className = (type === 'success') ? 'fa-solid fa-circle-check' : (type === 'loading' ? 'fa-solid fa-spinner fa-spin' : 'fa-solid fa-circle-xmark');
        icon.style.color = (type === 'success') ? '#00c853' : (type === 'loading' ? '#007bff' : '#d81b60');
    }

    function closeLockDisplay() {
        document.getElementById('lock-display').style.display = 'none';
        if(document.getElementById('lock-title').innerText.includes("Terimakasih")) location.reload();
    }

    function cekJenisMenu() {
        const menu = document.getElementById("jenis-kegiatan").value;
        document.getElementById("extention-container").style.display = (menu === "Absen Extention") ? "block" : "none";
    }

    function tampilkanInputAlasan() { 
        document.getElementById("main-buttons").style.display = "none"; 
        document.getElementById("reason-container").style.display = "block"; 
    }
    
    function batalAbsen() { 
        document.getElementById("main-buttons").style.display = "block"; 
        document.getElementById("reason-container").style.display = "none"; 
    }

    async function handleProses(tipe) {
        const menu = document.getElementById("jenis-kegiatan").value;
        const today = new Date().toISOString().split('T')[0];

        if(menu === "Absen Extention") {
            if(!document.getElementById("ext-nama-kegiatan").value || !document.getElementById("ext-tanggal").value) {
                alert("Mohon isi Nama dan Tanggal Kegiatan!");
                return;
            }
        }

        let targetColl = "kehadiran_jemaat";
        if (menu === "Absen Doa") targetColl = "laporan_doa_umum";
        else if (menu === "Absen Pelayanan") targetColl = "laporan_pelayanan_umum";

        const check = await db.collection(targetColl).where("nama", "==", userName).where("tanggal", "==", today).where("kegiatan", "==", menu).get();
        if (!check.empty) {
            showLockDisplay('error', 'Ditolak', 'Laporan sudah dikirim hari ini.');
            return;
        }

        if (navigator.geolocation) {
            showLockDisplay('loading', 'Verifikasi...', 'Mencari lokasi presisi...');
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const loc = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                saveData(tipe, loc, targetColl);
            }, () => saveData(tipe, "GPS Off", targetColl));
        } else {
            saveData(tipe, "No GPS", targetColl);
        }
    }

    async function saveData(tipe, koordinat, collection) {
        const menu = document.getElementById("jenis-kegiatan").value;
        const now = new Date();
        
        let payload = {
            status: tipe,
            nama: userName,
            tanggal: now.toISOString().split('T')[0],
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            kegiatan: menu,
            lokasi_koordinat: koordinat,
            keterangan: (tipe === 'TIDAK HADIR') ? document.getElementById("alasan").value : "Hadir di Lokasi"
        };

        if (menu === "Absen Extention") {
            payload.extension_nama_kegiatan = document.getElementById("ext-nama-kegiatan").value;
            payload.extension_lokasi = document.getElementById("ext-lokasi").value;
            payload.extension_tanggal_pelaksanaan = document.getElementById("ext-tanggal").value;
        }

        try {
            await db.collection(collection).add(payload);
            await db.collection("statistik_jemaat_pusat").add({...payload, type: "Umum_Entry"});
            showLockDisplay('success', 'Terimakasih', 'Laporan kehadiran jemaat berhasil terkirim.');
        } catch (err) {
            showLockDisplay('error', 'Gagal', err.message);
        }
    }
</script>
</body>
</html>
