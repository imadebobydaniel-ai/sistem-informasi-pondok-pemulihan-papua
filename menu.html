<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; padding: 0;
        }

        /* --- STICKY HEADER (Hanya Bar Atas & Running Text) --- */
        /* Kita buat yang membeku hanya bar waktu dan running text agar profil aman */
        .top-freeze-area {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: white;
        }

        .top-info-bar { 
            background: var(--biru-tua); 
            display: flex; justify-content: space-between; 
            padding: 8px 15px; font-weight: bold; font-size: 11px; 
            border-bottom: 2px solid var(--emas-lux); color: white;
        }

        header { 
            background: white; border-bottom: 3px solid var(--hijau-zamrud); 
            padding: 12px 0; overflow: hidden; white-space: nowrap; 
        }

        .running-content { 
            display: inline-block; white-space: nowrap; padding-left: 100%;
            animation: marquee 20s linear infinite; 
            font-weight: 900; font-size: 13px; color: var(--biru-tua);
            text-transform: uppercase;
        }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        /* --- CONTENT AREA --- */
        .container { padding: 20px; max-width: 450px; margin: auto; text-align: center; }

        .org-title { margin: 10px 0 20px 0; font-weight: 900; color: var(--biru-tua); text-transform: uppercase; font-size: 18px; }

        .profile-section { 
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            padding: 25px; border-radius: 25px; 
            box-shadow: 10px 10px 20px #d1d1d1, -10px -10px 20px #ffffff;
            margin-bottom: 30px; position: relative;
            border-top: 4px solid var(--biru-safir);
        }

        .setting-icon-profile { position: absolute; top: 18px; right: 18px; color: var(--biru-tua); font-size: 22px; }

        .profile-img-container { 
            width: 90px; height: 90px; border-radius: 50%; 
            margin: 0 auto 12px auto; overflow: hidden; 
            display: flex; align-items: center; justify-content: center; 
            background: white; border: 3px solid var(--emas-lux);
        }

        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        i.fa-circle-user { font-size: 85px; color: var(--biru-safir); }

        #disp_nama { margin: 8px 0 2px 0; font-size: 24px; color: var(--biru-tua); font-weight: 800; }
        #disp_komsel { margin: 0; color: var(--hijau-zamrud); font-weight: bold; font-size: 14px; text-transform: uppercase; }

        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .menu-box { 
            background: white; padding: 22px 10px; border-radius: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: var(--biru-tua); font-weight: 800; font-size: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .menu-box i { font-size: 30px; margin-bottom: 12px; color: var(--biru-safir); }

        .btn-logout { 
            background: var(--biru-tua); color: #fff; padding: 14px 40px; 
            border-radius: 50px; text-decoration: none; font-size: 14px; font-weight: bold; 
            display: inline-block; margin: 40px 0; border: 2px solid var(--emas-lux);
            cursor: pointer;
        }

        /* --- MODAL --- */
        .modal-overlay { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; }
    </style>
</head>
<body>

    <div class="top-freeze-area">
        <div class="top-info-bar">
            <div id="display-tanggal">Memuat...</div>
            <div id="digital-clock">00:00:00 WIT</div>
        </div>
        <header>
            <div id="running-text" class="running-content"></div>
        </header>
    </div>

    <div class="container">
        <h3 class="org-title">Portal Komsel JC</h3>

        <div class="profile-section">
            <a href="setting.html" class="setting-icon-profile"><i class="fa-solid fa-gear"></i></a>
            <div class="profile-img-container">
                <i class="fa-solid fa-circle-user" id="default-icon"></i>
                <img id="user-photo" src="" style="display: none;">
            </div>
            <h2 id="disp_nama">Memuat...</h2>
            <p id="disp_komsel">KOMSEL JC</p>
        </div>

        <div class="menu-grid">
            <a href="profil.html" class="menu-box"><i class="fa-solid fa-user-shield"></i>Profil Saya</a>
            <a href="kehadiran.html" class="menu-box"><i class="fa-solid fa-calendar-check"></i>Kehadiran</a>
            <a href="baca-alkitab.html" class="menu-box"><i class="fa-solid fa-book-bible"></i>Laporan Baca</a>
            <a href="statistik.html" class="menu-box"><i class="fa-solid fa-chart-pie"></i>Statistik</a>
            <a href="leaderboard.html" class="menu-box"><i class="fa-solid fa-crown" style="color:var(--emas-lux)"></i>Peringkat JC</a>
            <a href="laporan-komsel.html" class="menu-box"><i class="fa-solid fa-file-signature"></i>Laporan Komsel</a>
            <a href="lacak-domba.html" class="menu-box"><i class="fa-solid fa-map-location-dot" style="color: #e11d48"></i>Lacak Domba</a>
            <a href="capaian-doa.html" class="menu-box"><i class="fa-solid fa-hands-praying"></i>Capaian DOA</a>
            <a href="javascript:location.reload()" class="menu-box" style="color: #28a745;"><i class="fa-solid fa-arrows-rotate"></i>Refresh</a>
            <a href="saran.html" class="menu-box"><i class="fa-solid fa-comment-dots"></i>Saran</a>
        </div>

        <div class="btn-logout" onclick="logoutDanHapusDevice()">KELUAR SISTEM</div>
    </div>

    <div id="logoutModal" class="modal-overlay">
        <div class="modal-content">
            <i class="fa-solid fa-right-from-bracket" style="font-size: 50px; color: #003366; margin-bottom: 15px;"></i>
            <h3>Konfirmasi Keluar</h3>
            <p>Apakah Anda yakin ingin keluar?</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="cancelLogout" style="flex:1; padding:12px; border-radius:8px;">Batal</button>
                <button id="confirmLogout" style="flex:1; padding:12px; border-radius:8px; background:#e11d48; color:white; border:none;">Keluar</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</body>
</html>
