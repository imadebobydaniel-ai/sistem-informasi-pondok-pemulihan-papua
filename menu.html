<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* HEADER ATAS DENGAN JAM AKTIF */
        .top-bar { 
            background: #fff; padding: 10px 20px; display: flex; 
            justify-content: space-between; align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold;
        }
        #digital-clock { color: #007bff; font-size: 14px; }

        .container { padding: 20px; max-width: 500px; margin: auto; text-align: center; }
        
        /* KOTAK PROFIL (SINKRON DATA) */
        .profile-card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px;
        }
        .profile-card h2 { margin: 5px 0; color: #333; font-size: 22px; }
        .profile-card p { margin: 0; color: #666; font-size: 14px; font-weight: 500; }

        /* GRID MENU */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { 
            background: white; padding: 20px; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; 
            text-decoration: none; color: #333; font-weight: bold; font-size: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .menu-item i { font-size: 28px; margin-bottom: 10px; color: #007bff; }
        .menu-item:active { transform: scale(0.95); background: #f0f7ff; }
        
        .btn-logout { 
            margin-top: 25px; padding: 12px 30px; background: #222; 
            color: white; border-radius: 50px; text-decoration: none; 
            display: inline-flex; align-items: center; gap: 10px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div id="digital-clock">Memuat Jam...</div>
        <div style="color: #333; font-size: 12px;">Sistem Informasi Komsel</div>
    </div>

    <div class="container">
        <h3 style="color: #222; letter-spacing: 1px;">PONDOK PEMULIHAN PAPUA</h3>
        
        <div class="profile-card">
            <i class="fa-solid fa-circle-user" style="font-size: 50px; color: #ddd; margin-bottom: 10px;"></i>
            <h2 id="user-nama">Memuat Nama...</h2>
            <p id="user-komsel">Memuat Data Komsel...</p>
        </div>

        <div class="menu-grid">
            <a href="#" class="menu-item"><i class="fa-solid fa-user-gear"></i>Profil Saya</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-calendar-check"></i>Kehadiran</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-book-bible"></i>Baca Alkitab</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-chart-line"></i>Statistik</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-calendar-day"></i>Kegiatan</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-file-lines"></i>Laporan</a>
            <a href="#" class="menu-item"><i class="fa-solid fa-location-dot"></i>Lacak Domba</a>
            <a href="javascript:location.reload()" class="menu-item" style="color: #28a745;"><i class="fa-solid fa-rotate"></i>Refresh</a>
        </div>

        <a href="index.html" class="btn-logout">
            <i class="fa-solid fa-right-from-bracket"></i> KEMBALI KE LOGIN
        </a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 1. FUNGSI JAM DIGITAL AKTIF
        function updateClock() {
            const now = new Date();
            const jam = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const det = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${jam}:${min}:${det} WIT`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. AMBIL DATA DARI SESSION LOGIN
        const userEmail = localStorage.getItem("userEmail"); // Pastikan saat login, email disimpan di localStorage

        async function loadUserData() {
            if (!userEmail) {
                window.location.href = "index.html"; // Jika tidak ada session, lempar ke login
                return;
            }

            try {
                const snapshot = await db.collection("users").where("email", "==", userEmail).get();
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    document.getElementById('user-nama').innerText = data.nama;
                    document.getElementById('user-komsel').innerText = "Sistem Informasi " + data.komsel;
                } else {
                    document.getElementById('user-nama').innerText = "Tamu";
                    document.getElementById('user-komsel').innerText = "Data Tidak Ditemukan";
                }
            } catch (error) {
                console.error("Error ambil data:", error);
            }
        }
        loadUserData();
    </script>
</body>
</html>
