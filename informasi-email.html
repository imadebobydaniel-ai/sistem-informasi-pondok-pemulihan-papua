<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Informasi Email - Komsel JC</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { 
            --primary: #003366; 
            --bg: #f4f7f6; 
        }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { 
            width: 90%; 
            max-width: 500px; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            border-top: 6px solid var(--primary); 
        }
        h1 { 
            color: var(--primary); 
            font-size: 20px; 
            margin-bottom: 5px; 
        }
        .date { 
            font-size: 12px; 
            color: #888; 
            margin-bottom: 20px; 
        }
        .content { 
            line-height: 1.6; 
            color: #444; 
            font-size: 15px; 
            white-space: pre-wrap; 
        }
        .attachment { 
            margin-top: 20px; 
            padding: 10px; 
            background: #eef2f7; 
            border-radius: 8px; 
            font-size: 13px; 
        }
        .attachment a { 
            color: var(--primary); 
            font-weight: bold; 
            text-decoration: none; 
        }
        .btn-back { 
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            padding: 12px; 
            background: var(--primary); 
            color: white; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-back:hover { background: #002244; }
        .loading { text-align: center; color: #666; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="loader" class="loading">Menghubungkan ke sistem informasi-email...</div>
    
    <div id="display-area" style="display:none;">
        <h1 id="view-judul"></h1>
        <div class="date" id="view-tanggal"></div>
        <div class="content" id="view-isi"></div>
        
        <div id="view-file" class="attachment" style="display:none;">
            📎 Lampiran: <a id="file-link" target="_blank">Lihat File Lampiran</a>
        </div>
        
        <a href="menu.html" class="btn-back">Tutup Informasi</a>
    </div>
</div>

<script>
    // 1. Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 2. Fungsi Mengambil Data
    async function loadInformasiEmail() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            document.getElementById('loader').innerText = "Error: ID Informasi tidak ditemukan.";
            return;
        }

        try {
            const doc = await db.collection("pengumuman_komsel").doc(id).get();
            
            if (doc.exists) {
                const data = doc.data();
                
                document.getElementById('view-judul').innerText = data.judul || "Tanpa Judul";
                document.getElementById('view-tanggal').innerText = data.timestamp ? 
                    data.timestamp.toDate().toLocaleString('id-ID', { 
                        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    }) : '-';
                
                // Menggunakan data.detail atau data.isi (sesuaikan field di Firebase Anda)
                document.getElementById('view-isi').innerText = data.detail || data.isi || "Tidak ada detail konten.";
                
                if (data.fileUrl) {
                    document.getElementById('view-file').style.display = 'block';
                    document.getElementById('file-link').href = data.fileUrl;
                }

                document.getElementById('loader').style.display = 'none';
                document.getElementById('display-area').style.display = 'block';
            } else {
                document.getElementById('loader').innerText = "Informasi tidak ditemukan di database.";
            }
        } catch (error) {
            console.error("Kesalahan Firebase:", error);
            document.getElementById('loader').innerText = "Gagal memuat data dari Firebase.";
        }
    }

    // 3. Jalankan fungsi saat halaman dimuat
    window.onload = loadInformasiEmail;
</script>

</body>
</html>
