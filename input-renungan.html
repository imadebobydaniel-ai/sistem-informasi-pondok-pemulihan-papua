<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Renungan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--biru-safir); }
        
        h2 { color: var(--biru-tua); text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: var(--biru-tua); }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 120px; resize: vertical; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; text-align: center; text-decoration: none; }
        .btn-save { background: var(--hijau-zamrud); }
        .btn-update { background: var(--biru-safir); display: none; }
        .btn-back { background: var(--biru-tua); }

        hr { border: 0; border-top: 2px solid #eee; margin: 30px 0; }

        .list-container { margin-top: 20px; }
        .renungan-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; border-left: 4px solid var(--emas-lux); position: relative; }
        .renungan-item h4 { margin: 0 0 5px 0; color: var(--biru-tua); }
        .renungan-item p { margin: 0; font-size: 12px; color: #666; }
        .action-icons { margin-top: 10px; display: flex; gap: 15px; }
        .action-icons i { cursor: pointer; font-size: 18px; transition: 0.2s; }
        .fa-edit { color: var(--biru-safir); }
        .fa-trash { color: #e11d48; }
        .fa-file-pdf { color: #f43f5e; }

        #pdf-template { position: absolute; left: -9999px; width: 500px; padding: 40px; background: white; }
    </style>
</head>
<body>

<div id="custom-notification" style="display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; border-left: 5px solid #ff0040; text-align: center;">
    <p id="notif-message" style="margin: 0; font-weight: bold; color: #333;"></p>
    <button onclick="closeNotif()" style="margin-top: 10px; background: var(--biru-tua); color: white; border: none; padding: 8px 25px; border-radius: 50px; cursor: pointer; font-weight: bold;">OK</button>
</div>

<div class="container">
    <h2 id="form-title"><i class="fa-solid fa-pen-to-square"></i> Renungan Komsel JC</h2>
    
    <div id="form-input">
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Tanggal Renungan</label>
            <input type="date" id="tgl-renungan">
        </div>
        <div class="form-group">
            <label>Judul Renungan</label>
            <input type="text" id="judul" placeholder="Contoh: Kasih Kristus">
        </div>
        <div class="form-group">
            <label>Nas Alkitab</label>
            <input type="text" id="ayat" placeholder="Contoh: Yohanes 3:16">
        </div>
        <div class="form-group">
            <label>Isi Renungan</label>
            <textarea id="isi" placeholder="Tuliskan isi renungan di sini..."></textarea>
        </div>
        
        <div class="btn-group">
            <button onclick="simpanRenungan()" id="btn-save" class="btn btn-save">SIMPAN</button>
            <button onclick="updateRenungan()" id="btn-update" class="btn btn-update">UPDATE DATA</button>
            <a href="menu.html" class="btn btn-back">KEMBALI</a>
        </div>
    </div>

    <hr>
    <h3><i class="fa-solid fa-list-check"></i> Daftar Renungan</h3>
    <div id="list-renungan" class="list-container">
        <p style="color: #999;">Memuat data...</p>
    </div>
</div>

<div id="pdf-template">
    <div style="text-align:center; border-bottom: 2px solid #003366; padding-bottom: 10px;">
        <h1 style="color:#003366; margin:0;">E-BOOK RENUNGAN</h1>
        <p style="color:#D4AF37; font-weight:bold; margin:5px 0;">KOMSEL JC - PONDOK PEMULIHAN PAPUA</p>
    </div>
    <div style="margin-top:20px;">
        <h2 id="pdf-judul" style="color:#003366;"></h2>
        <p><strong id="pdf-tgl"></strong></p>
        <p><em id="pdf-ayat" style="color:#2ecc71;"></em></p>
        <div id="pdf-isi" style="line-height:1.6; text-align:justify; margin-top:20px;"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- FUNGSI NOTIFIKASI (BLOCK DISPLAY) ---
    function tampilNotif(pesan, warna = "#ff0040") {
        const notifBox = document.getElementById('custom-notification');
        const notifText = document.getElementById('notif-message');
        notifText.innerText = pesan;
        notifBox.style.borderLeftColor = warna;
        notifBox.style.display = "block";
        setTimeout(() => { closeNotif(); }, 5000);
    }

    function closeNotif() {
        document.getElementById('custom-notification').style.display = "none";
    }

    // --- FUNGSI SIMPAN ---
    async function simpanRenungan() {
        const tgl = document.getElementById('tgl-renungan').value;
        const judul = document.getElementById('judul').value;
        const ayat = document.getElementById('ayat').value;
        const isi = document.getElementById('isi').value;

        if(!tgl || !judul || !isi) { 
            tampilNotif("⚠️ Mohon lengkapi semua data!", "#D4AF37"); 
            return; 
        }

        try {
            await db.collection("renungan_harian").add({
                tanggal: tgl, judul: judul, ayat: ayat, isi: isi,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            tampilNotif("✅ Renungan berhasil diposting!", "#2ecc71");
            resetForm();
        } catch (e) { 
            tampilNotif("❌ Gagal menyimpan!", "#ff0040"); 
        }
    }

    // --- FUNGSI TAMPIL LIST ---
    function loadRenungan() {
        db.collection("renungan_harian").orderBy("tanggal", "desc").onSnapshot((querySnapshot) => {
            const listDiv = document.getElementById('list-renungan');
            listDiv.innerHTML = "";
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                listDiv.innerHTML += `
                    <div class="renungan-item">
                        <h4>${data.judul}</h4>
                        <p><i class="fa-regular fa-calendar"></i> ${data.tanggal} | <i class="fa-solid fa-book-bible"></i> ${data.ayat}</p>
                        <div class="action-icons">
                            <i class="fa-solid fa-pen-to-square" onclick="prepareEdit('${doc.id}', '${data.tanggal}', \`${data.judul}\`, \`${data.ayat}\`, \`${data.isi}\`)"></i>
                            <i class="fa-solid fa-trash" onclick="hapusRenungan('${doc.id}')"></i>
                            <i class="fa-solid fa-file-pdf" onclick="downloadEbook(\`${data.judul}\`, '${data.tanggal}', \`${data.ayat}\`, \`${data.isi}\`)"></i>
                        </div>
                    </div>`;
            });
        });
    }

    // --- FUNGSI EDIT ---
    function prepareEdit(id, tgl, judul, ayat, isi) {
        document.getElementById('edit-id').value = id;
        document.getElementById('tgl-renungan').value = tgl;
        document.getElementById('judul').value = judul;
        document.getElementById('ayat').value = ayat;
        document.getElementById('isi').value = isi;
        document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-edit"></i> Edit Renungan';
        document.getElementById('btn-save').style.display = "none";
        document.getElementById('btn-update').style.display = "inline-block";
        window.scrollTo(0,0);
    }

    async function updateRenungan() {
        const id = document.getElementById('edit-id').value;
        const dataUpdate = {
            tanggal: document.getElementById('tgl-renungan').value,
            judul: document.getElementById('judul').value,
            ayat: document.getElementById('ayat').value,
            isi: document.getElementById('isi').value
        };
        try {
            await db.collection("renungan_harian").doc(id).update(dataUpdate);
            tampilNotif("✅ Data berhasil diperbarui!", "#2ecc71");
            resetForm();
        } catch (e) { tampilNotif("❌ Gagal update!", "#ff0040"); }
    }

    // --- FUNGSI HAPUS ---
    async function hapusRenungan(id) {
        if(confirm("Hapus renungan ini?")) {
            await db.collection("renungan_harian").doc(id).delete();
            tampilNotif("🗑️ Renungan telah dihapus", "#666");
        }
    }

    // --- FUNGSI PDF ---
    async function downloadEbook(judul, tgl, ayat, isi) {
        tampilNotif("⏳ Menyiapkan PDF...", "#0056b3");
        document.getElementById('pdf-judul').innerText = judul;
        document.getElementById('pdf-tgl').innerText = "Tanggal: " + tgl;
        document.getElementById('pdf-ayat').innerText = "Nas: " + ayat;
        document.getElementById('pdf-isi').innerText = isi;

        const element = document.getElementById('pdf-template');
        const canvas = await html2canvas(element, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = (canvas.height * pdfWidth) / canvas.width;

        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        pdf.save(`Renungan_${tgl}.pdf`);
        tampilNotif("✅ PDF Berhasil diunduh!", "#2ecc71");
    }

    function resetForm() {
        document.getElementById('edit-id').value = "";
        document.getElementById('tgl-renungan').value = "";
        document.getElementById('judul').value = "";
        document.getElementById('ayat').value = "";
        document.getElementById('isi').value = "";
        document.getElementById('btn-save').style.display = "inline-block";
        document.getElementById('btn-update').style.display = "none";
        document.getElementById('form-title').innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Renungan Komsel JC';
    }

    loadRenungan();
</script>
</body>
</html>
