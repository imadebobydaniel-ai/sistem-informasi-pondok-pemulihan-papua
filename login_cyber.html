<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://www.gstatic.com https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval';">
    <title>Admin Secure Access - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --cyan-neon: #00ffff;
            --dark-bg: #000000; 
            --panel-bg: rgba(10, 10, 10, 0.5); 
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg); color: #fff; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        .bg-watermark {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('logo_pondok.png'); 
            background-size: contain; background-position: center; background-repeat: no-repeat;
            z-index: -100;
            filter: brightness(0.3) opacity(0.3) saturate(0.7); 
        }

        .login-panel {
            background-color: var(--panel-bg); padding: 40px; border-radius: 20px;
            width: 90%; max-width: 400px; text-align: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.1), 0 0 10px rgba(0, 255, 255, 0.2) inset;
            border: 1px solid rgba(0, 255, 255, 0.3);
            position: relative;
        }

        .header-icon { font-size: 60px; color: var(--cyan-neon); text-shadow: 0 0 15px var(--cyan-neon); margin-bottom: 10px; }
        h2 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 2px; color: var(--cyan-neon); text-transform: uppercase; text-shadow: 0 0 10px var(--cyan-neon); }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; }

        .form-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 10px; font-size: 10px; font-weight: bold; color: var(--cyan-neon); text-transform: uppercase; letter-spacing: 1px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.field-icon { position: absolute; left: 15px; color: #555; font-size: 16px; transition: 0.3s; }
        
        input { 
            width: 100%; padding: 15px 15px 15px 45px; 
            background-color: var(--input-bg); border: 1px solid #222; 
            border-radius: 10px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box; 
            font-size: 14px;
        }
        input::placeholder { color: #444; }
        input:focus { border-color: var(--cyan-neon); box-shadow: 0 0 12px rgba(0, 255, 255, 0.3); }
        input:focus + i.field-icon { color: var(--cyan-neon); text-shadow: 0 0 5px var(--cyan-neon); }
        
        .toggle-password { position: absolute; right: 15px; cursor: pointer; color: #555; transition: 0.3s; }
        .toggle-password:hover { color: var(--cyan-neon); }

        .btn-cyber { 
            width: 100%; padding: 16px; background: transparent; 
            color: var(--cyan-neon); border: 2px solid var(--cyan-neon); 
            border-radius: 10px; font-weight: 900; letter-spacing: 2px; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s; 
            margin-top: 10px; font-size: 14px;
        }
        .btn-cyber:hover { background: var(--cyan-neon); color: #000; box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); }

        .back-link { display: inline-block; margin-top: 30px; color: #555; text-decoration: none; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .back-link:hover { color: #999; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: #0a0a0a; padding: 30px; border-radius: 15px; width: 85%; max-width: 320px; border: 1px solid var(--cyan-neon); text-align: center; box-shadow: 0 0 20px rgba(0, 255, 255, 0.4); animation: modalIn 0.3s ease; }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .btn-modal-action { width: 100%; padding: 12px; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; letter-spacing: 1px; background: var(--cyan-neon); color: #000; }
    </style>
</head>
<body>

    <div class="bg-watermark"></div>

    <div class="login-panel">
        <div class="header-icon"><i class="fa-solid fa-user-shield"></i></div>
        <h2>Admin Portal</h2>
        <p class="subtitle">Secure Area - Authorized Access Only</p>

        <form id="cyberLoginForm">
            <div class="form-group">
                <label>Admin ID / Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-badge field-icon"></i>
                    <input type="text" id="cyberUser" placeholder="admin" required>
                </div>
            </div>
            <div class="form-group">
                <label>Access Key</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock-keyhole field-icon"></i>
                    <input type="password" id="cyberPass" placeholder="•••••" required>
                    <i class="fa-solid fa-eye toggle-password" id="toggleEye" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            <button type="submit" class="btn-cyber" id="btnLogin">Verify & Log In</button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Login</a>
    </div>

    <div id="cyberModal" class="modal-overlay">
        <div class="modal-content">
            <i id="modalIcon" class="fa-solid" style="font-size: 50px; margin-bottom: 20px;"></i>
            <h3 id="modalTitle">Status</h3>
            <p id="modalMsg"></p>
            <button id="closeModal" class="btn-modal-action">Acknowledge</button>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // AKUN MASTER (Tetap dipertahankan sebagai backdoor)
    const MASTER_USER = "admin";
    const MASTER_PASS = "bukadong821";

    function togglePasswordVisibility() {
        const passInput = document.getElementById('cyberPass');
        const eyeIcon = document.getElementById('toggleEye');
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function showCyberNotification(type, title, message) {
        const modal = document.getElementById('cyberModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = message;
        const icon = document.getElementById('modalIcon');
        
        if (type === 'success') {
            icon.className = "fa-solid fa-shield-check"; icon.style.color = "#2ecc71";
            icon.style.textShadow = "0 0 15px #2ecc71";
        } else {
            icon.className = "fa-solid fa-user-slash"; icon.style.color = "#e74c3c";
            icon.style.textShadow = "0 0 15px #e74c3c";
        }
        modal.style.display = 'flex';
    }

    document.getElementById('closeModal').onclick = () => document.getElementById('cyberModal').style.display = 'none';

    document.getElementById('cyberLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('cyberUser').value.trim();
        const pass = document.getElementById('cyberPass').value.trim();
        const btn = document.getElementById('btnLogin');

        btn.innerText = "VERIFYING...";
        btn.disabled = true;

        const handleSuccess = (msg) => {
            localStorage.setItem("adminLoggedIn", "true");
            localStorage.setItem("adminUser", user);
            showCyberNotification('success', 'Access Granted', msg);
            setTimeout(() => { window.location.href = "admin.html"; }, 1500);
        };

        // 1. CEK AKUN MASTER
        if (user === MASTER_USER && pass === MASTER_PASS) {
            handleSuccess('Master Administrator Verified. Loading Secure Environment...');
            return;
        }

        try {
            // 2. CEK DATABASE (Koleksi: admin_users atau admins)
            // Kita cek di admin_users terlebih dahulu
            let snapshot = await db.collection("admin_users")
                .where("email", "==", user)
                .where("password", "==", pass)
                .get();

            // Jika kosong di admin_users, coba cek di koleksi admins (fallback)
            if (snapshot.empty) {
                snapshot = await db.collection("admins")
                    .where("username", "==", user)
                    .where("password", "==", pass)
                    .get();
            }

            if (!snapshot.empty) {
                handleSuccess('Administrator Access Verified. Loading Secure Environment...');
            } else {
                showCyberNotification('error', 'Access Denied', 'Username/Email atau Password tidak valid.');
                document.getElementById('cyberPass').value = ''; 
                btn.innerText = "VERIFY & LOG IN";
                btn.disabled = false;
            }
        } catch (error) {
            console.error("Database Error:", error);
            showCyberNotification('error', 'System Error', 'Gagal terhubung ke Database. Cek koneksi Anda.');
            btn.innerText = "VERIFY & LOG IN";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
