<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --purple-neon: #a020f0;
            --purple-light: #d8b4fe;
            --dark-overlay: rgba(20, 10, 30, 0.75);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body, html {
            height: 100%; margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Background Image ala Gambar yang Anda kirim */
        .bg-image {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://w0.peakpx.com/wallpaper/403/17/HD-wallpaper-mt-fuji-night-mountain-fuji-night-purple.jpg'); /* Estimasi gambar serupa */
            background-size: cover; background-position: center;
            z-index: -1; filter: brightness(0.7);
        }

        .login-card {
            background: var(--dark-overlay);
            padding: 40px; border-radius: 8px;
            width: 100%; max-width: 380px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(160, 32, 240, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h2 {
            color: #fff; text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 30px;
            font-weight: 600; font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px; text-align: left;
            border-bottom: 2px solid var(--purple-neon);
        }

        label {
            display: block; font-size: 11px;
            color: var(--purple-light); text-transform: capitalize;
            margin-bottom: 5px; opacity: 0.8;
        }

        input {
            width: 100%; background: transparent;
            border: none; padding: 10px 0;
            color: #fff; font-size: 16px; outline: none;
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        .btn-login {
            width: 100%; padding: 14px;
            background: var(--purple-neon);
            color: #fff; border: none; border-radius: 25px;
            font-weight: bold; cursor: pointer;
            margin-top: 25px; transition: 0.3s;
            text-transform: capitalize; font-size: 15px;
        }

        .btn-login:hover {
            background: #8214c4;
            box-shadow: 0 0 20px rgba(160, 32, 240, 0.6);
        }

        .footer-links {
            margin-top: 20px; font-size: 12px; color: #ccc;
        }

        .footer-links a {
            color: var(--purple-light); text-decoration: none;
        }

        /* Modal Simple */
        .modal {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1a1a1a; padding: 25px; border-radius: 10px;
            border: 1px solid var(--purple-neon); text-align: center;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="login-card">
        <h2>LOGIN</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="user" placeholder="admin" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="pass" placeholder="•••••" required>
            </div>

            <button type="submit" class="btn-login">Log in</button>
        </form>

        <div class="footer-links">
            <p>Belum punya akun? <a href="#">Register di sini</a></p>
        </div>
    </div>

    <div id="msgModal" class="modal">
        <div class="modal-content">
            <p id="msgText" style="color: white;"></p>
            <button onclick="closeModal()" style="padding: 8px 20px; cursor: pointer;">OK</button>
        </div>
    </div>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSy...", // Masukkan API Key asli Anda
        authDomain: "komsel-jc.firebaseapp.com",
        projectId: "komsel-jc",
        storageBucket: "komsel-jc.appspot.com",
        messagingSenderId: "...",
        appId: "..."
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const MASTER_USER = "admin";
    const MASTER_PASS = "bukadong821";

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value.trim();

        // 1. Cek Master Account
        if (user === MASTER_USER && pass === MASTER_PASS) {
            loginSuccess("Master Admin Verified");
            return;
        }

        // 2. Cek Database
        try {
            const snap = await db.collection("admins")
                .where("username", "==", user)
                .where("password", "==", pass)
                .get();

            if (!snap.empty) {
                loginSuccess("Access Granted");
            } else {
                showMsg("Username atau Password Salah!");
            }
        } catch (err) {
            showMsg("Error Koneksi Database");
        }
    });

    function loginSuccess(msg) {
        localStorage.setItem("adminLoggedIn", "true");
        localStorage.setItem("adminUser", document.getElementById('user').value);
        showMsg(msg);
        setTimeout(() => { window.location.href = "admin.html"; }, 1200);
    }

    function showMsg(txt) {
        document.getElementById('msgText').innerText = txt;
        document.getElementById('msgModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('msgModal').style.display = 'none';
    }
</script>
</body>
</html>
