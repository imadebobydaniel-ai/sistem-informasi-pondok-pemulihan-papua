<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybernet Admin Access - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- STYLING UTAMA & CYBERNET ELEMENTS --- */
        :root {
            --cyan-neon: #00ffff;
            --blue-neon: #007bff;
            --dark-bg: #050505;
            --panel-bg: rgba(10, 10, 10, 0.85); 
            --glow-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            overflow: hidden; 
        }

        /* --- BACKGROUND VIDEO --- */
        #bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -100;
            filter: brightness(0.4) saturate(1.2) contrast(1.1);
            object-fit: cover;
        }

        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 255, 255, .05) 25%, rgba(0, 255, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 255, 255, .05) 75%, rgba(0, 255, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            z-index: -50;
            pointer-events: none;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1000px;
        }

        .cyber-panel {
            background-color: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), 0 0 5px rgba(0, 255, 255, 0.4) inset;
            border: 2px solid var(--cyan-neon);
            position: relative;
            backdrop-filter: blur(10px);
        }

        .header-icon { font-size: 60px; color: var(--cyan-neon); text-shadow: 0 0 15px var(--cyan-neon); margin-bottom: 15px; }
        h2 { margin: 0; font-size: 26px; font-weight: 900; letter-spacing: 2px; color: var(--cyan-neon); text-transform: uppercase; text-shadow: 0 0 10px var(--cyan-neon); }
        .subtitle { color: #aaa; margin-bottom: 40px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- FORM STYLING --- */
        .form-group { margin-bottom: 25px; text-align: left; position: relative; }
        label { display: block; margin-bottom: 10px; font-size: 11px; font-weight: bold; color: var(--cyan-neon); text-transform: uppercase; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.fa-solid { position: absolute; left: 15px; color: #555; font-size: 16px; transition: 0.3s; }
        input { width: 100%; padding: 15px 15px 15px 45px; background-color: rgba(0, 0, 0, 0.5); border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--cyan-neon); box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); }
        input:focus + i.fa-solid { color: var(--cyan-neon); }
        .toggle-password { position: absolute; right: 15px; cursor: pointer; color: #555; }

        /* --- BUTTONS --- */
        .btn-cyber { width: 100%; padding: 16px; background: transparent; color: var(--cyan-neon); border: 2px solid var(--cyan-neon); border-radius: 10px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 15px; }
        .btn-cyber:hover { background: var(--cyan-neon); color: #000; box-shadow: 0 0 30px rgba(0, 255, 255, 0.6); }

        .btn-generate { background: transparent; color: #888; border: 1px solid #444; padding: 10px; border-radius: 8px; width: 100%; margin-top: 20px; font-size: 12px; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-generate:hover { border-color: var(--cyan-neon); color: var(--cyan-neon); background: rgba(0, 255, 255, 0.05); }

        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 11px; text-transform: uppercase; }

        /* --- MODAL GENERATE ADMIN --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: var(--panel-bg); padding: 30px; border-radius: 20px; width: 85%; max-width: 380px; border: 2px solid var(--cyan-neon); text-align: center; box-shadow: 0 0 20px var(--cyan-neon); }
        .btn-modal-action { width: 100%; padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; letter-spacing: 1px; }

        /* --- LOG BOX --- */
        #resultLog { display: none; margin-top: 20px; padding: 15px; background: rgba(0, 255, 255, 0.1); border: 1px dashed var(--cyan-neon); border-radius: 10px; text-align: left; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://files.catbox.moe/oasbvw.mp4" type="video/mp4">
    </video>

    <div class="cyber-grid"></div>

    <div class="login-container">
        <div class="cyber-panel">
            <div class="header-icon"><i class="fa-solid fa-server"></i></div>
            <h2>Cybernet Access</h2>
            <p class="subtitle">Secure Administrator Portal</p>

            <form id="cyberLoginForm">
                <div class="form-group">
                    <label>Admin Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-id-card-clip"></i>
                        <input type="text" id="cyberUser" placeholder="ENTER USERNAME" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="cyberPass" placeholder="ENTER PASSWORD" required>
                        <i class="fa-solid fa-eye toggle-password" id="toggleEye" onclick="togglePasswordVisibility('cyberPass', 'toggleEye')"></i>
                    </div>
                </div>
                <button type="submit" class="btn-cyber">Verify Access</button>
            </form>

            <button class="btn-generate" onclick="openGenModal()">
                <i class="fa-solid fa-user-plus"></i> Create New Admin Account
            </button>

            <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Return to Member Login</a>
        </div>
    </div>

    <div id="genModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="color: var(--cyan-neon); margin-top: 0; letter-spacing: 2px;">ADMIN GENERATOR</h3>
            <p style="font-size: 11px; color: #888; margin-bottom: 20px;">Lengkapi data di bawah untuk membuat akses admin baru.</p>
            
            <div class="form-group">
                <input type="text" id="newName" placeholder="NAMA LENGKAP" style="padding-left: 15px;">
            </div>
            <div class="form-group">
                <input type="text" id="newAdminUser" placeholder="USERNAME" style="padding-left: 15px;">
            </div>
            <div class="form-group">
                <input type="password" id="newAdminPass" placeholder="PASSWORD" style="padding-left: 15px;">
            </div>
            <div class="form-group">
                <input type="password" id="confirmPass" placeholder="MASUKAN PASSWORD YANG SAMA" style="padding-left: 15px;">
            </div>

            <button class="btn-modal-action" onclick="generateSimpel()" style="background: var(--cyan-neon); color: #000;">GENERATE ACCESS</button>
            
            <div id="resultLog">
                <p style="color: #2ecc71; font-weight: bold; font-size: 12px; margin: 0 0 10px 0;">✔ Selamat! User dan Password Anda telah jadi:</p>
                <div style="font-family: monospace; font-size: 12px; color: #fff; line-height: 1.6;">
                    <div>NAME: <span id="logName" style="color: var(--cyan-neon);"></span></div>
                    <div>USER: <span id="logUser" style="color: var(--cyan-neon);"></span></div>
                    <div>PASS: <span id="logPass" style="color: var(--cyan-neon);"></span></div>
                </div>
            </div>

            <button class="btn-modal-action" onclick="closeGenModal()" style="background: transparent; color: #666; font-size: 11px; border: 1px solid #333;">CLOSE</button>
        </div>
    </div>

    <div id="cyberModal" class="modal-overlay">
        <div class="modal-content" id="modalBorder">
            <i id="modalIcon" class="fa-solid" style="font-size: 50px; margin-bottom: 20px;"></i>
            <h3 id="modalTitle" style="margin: 0; color: #fff;">Status</h3>
            <p id="modalMsg" style="color: #aaa; font-size: 14px; margin-top: 10px;"></p>
            <button id="closeModal" class="btn-modal-action" style="color:white">Acknowledge</button>
        </div>
    </div>

<script>
    // 1. Akun Master Tetap Berfungsi
    const VALID_USERNAME = "admin";
    const VALID_PASSWORD = "bukadong821";

    // 2. Toggle Password
    function togglePasswordVisibility(inputId, eyeId) {
        const passInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(eyeId);
        if (passInput.type === 'password') {
            passInput.type = 'text';
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = 'password';
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    // 3. Fungsi Modal
    function openGenModal() { document.getElementById('genModal').style.display = 'flex'; }
    function closeGenModal() { 
        document.getElementById('genModal').style.display = 'none';
        document.getElementById('resultLog').style.display = 'none';
    }

    // 4. GENERATE ADMIN (Simpan ke Firebase)
    async function generateSimpel() {
        const nama = document.getElementById('newName').value;
        const user = document.getElementById('newAdminUser').value;
        const pass = document.getElementById('newAdminPass').value;
        const confirm = document.getElementById('confirmPass').value;

        if (!nama || !user || !pass) { alert("Mohon lengkapi semua kolom!"); return; }
        if (pass !== confirm) { alert("Password tidak cocok!"); return; }

        try {
            await db.collection("admin_users").add({
                nama: nama,
                username: user,
                password: pass,
                createdAt: new Date()
            });

            document.getElementById('logName').innerText = nama;
            document.getElementById('logUser').innerText = user;
            document.getElementById('logPass').innerText = pass;
            document.getElementById('resultLog').style.display = 'block';
        } catch (error) {
            console.error(error);
            alert("Gagal koneksi ke database!");
        }
    }

    // 5. Notifikasi Visual
    function showCyberNotification(type, title, message) {
        const modal = document.getElementById('cyberModal');
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = message;
        
        const icon = document.getElementById('modalIcon');
        const btn = document.getElementById('closeModal');
        const border = document.getElementById('modalBorder');

        if (type === 'success') {
            icon.className = "fa-solid fa-shield-check";
            icon.style.color = "#2ecc71";
            btn.style.backgroundColor = "#2ecc71";
            border.style.borderColor = "#2ecc71";
        } else {
            icon.className = "fa-solid fa-bug";
            icon.style.color = "#e74c3c";
            btn.style.backgroundColor = "#e74c3c";
            border.style.borderColor = "#e74c3c";
        }
        modal.style.display = 'flex';
    }

    document.getElementById('closeModal').onclick = () => document.getElementById('cyberModal').style.display = 'none';

    // 6. LOGIN SUBMIT (Fix Looping & Fix Database Check)
    document.getElementById('cyberLoginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const user = document.getElementById('cyberUser').value.trim();
        const pass = document.getElementById('cyberPass').value.trim();

        try {
            // Cek ke Database Firestore
            const snapshot = await db.collection("admin_users")
                                     .where("username", "==", user)
                                     .where("password", "==", pass)
                                     .get();

            // Verifikasi Login (Master Account ATAU Database Account)
            if (!snapshot.empty || (user === VALID_USERNAME && pass === VALID_PASSWORD)) {
                
                // PENTING: Simpan session agar tidak looping di menu.html
                localStorage.setItem("adminLoggedIn", "true");
                
                showCyberNotification('success', 'Access Granted', 'Administrator verified. Redirecting...');
                setTimeout(() => { window.location.href = "menu.html"; }, 2000);
            } else {
                showCyberNotification('error', 'Access Denied', 'Authentication failed. Incorrect credentials.');
            }
        } catch (error) {
            console.error(error);
            showCyberNotification('error', 'System Error', 'Database connection failed.');
        }
    });
</script>
</body>
</html>
