<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; background-color: #f4f7f6; 
            display: flex; flex-direction: column; align-items: center;
        }
        .header { 
            width: 100%; background: #007bff; color: white; 
            padding: 15px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .profile-card {
            background: white; width: 85%; max-width: 350px; 
            margin-top: 30px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            padding-bottom: 20px;
        }
        .card-header { background: #0056b3; height: 80px; }
        .avatar { 
            width: 100px; height: 100px; background-color: #ddd; 
            border-radius: 50%; border: 5px solid white; 
            margin-top: -50px; display: inline-block;
            background-size: cover; background-position: center;
        }
        .info h2 { margin: 10px 0 5px 0; color: #333; font-size: 22px; }
        .info p { margin: 2px 0; color: #666; font-size: 14px; }
        .status-badge { 
            display: inline-block; background: #28a745; color: white; 
            padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 10px;
        }
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 85%; max-width: 350px; margin-top: 25px;
        }
        .menu-item {
            background: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item span { font-size: 28px; display: block; margin-bottom: 8px; }
        .btn-logout {
            margin-top: 30px; color: #dc3545; font-weight: bold;
            cursor: pointer; text-decoration: none; font-size: 14px; padding: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <strong>Pondok Pemulihan Papua</strong>
</div>

<div class="profile-card">
    <div class="card-header"></div>
    <div class="avatar" id="userAvatar"></div>
    
    <div class="info">
        <h2 id="userName">Memuat Nama...</h2>
        <p id="userJabatan">Memuat Jabatan...</p>
        <p id="userWilayah">Memuat Wilayah...</p>
        <div class="status-badge">Anggota Aktif</div>
    </div>
</div>

<div class="menu-grid">
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📢</span>Informasi
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📅</span>Kegiatan
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📂</span>Dokumen
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>💬</span>Chat Grup
    </div>
</div>

<div class="btn-logout" onclick="logout()">Keluar Aplikasi</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // 2. Konfigurasi Firebase Anda (Sudah diperbarui)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389",
        measurementId: "G-X14300RJL4"
    };

    // 3. Inisialisasi Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 4. Ambil data dari Firestore secara otomatis
    window.onload = function() {
        // Mengambil data dari koleksi 'users' dengan ID dokumen 'user_test'
        db.collection("users").doc("user_test").get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                
                // Menampilkan data ke elemen HTML
                document.getElementById("userName").innerText = data.nama;
                document.getElementById("userJabatan").innerText = "KTP: " + data.no_ktp;
                document.getElementById("userWilayah").innerText = data.alamat;
                
                // Membuat foto profil (avatar) otomatis berdasarkan nama
                const avatarUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(data.nama) + "&background=random&color=fff";
                document.getElementById("userAvatar").style.backgroundImage = "url('" + avatarUrl + "')";
            } else {
                console.log("Data tidak ditemukan!");
                // Jika data tidak ada di database, arahkan ke halaman profil untuk mengisi
                window.location.href = "profil.html";
            }
        }).catch((error) => {
            console.error("Gagal mengambil data dari Firebase:", error);
            alert("Gagal memuat profil. Pastikan koneksi internet aktif.");
        });
    };

    function logout() {
        if(confirm("Apakah Anda ingin keluar?")) {
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
