<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pengaturan Akun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; flex-direction: column; min-height: 100vh; }
        .container { max-width: 400px; margin: auto; width: 100%; flex: 1; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { font-size: 18px; text-align: center; color: #333; margin-bottom: 20px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #666; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; background-color: white; }
        
        .btn-save { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-delete { width: 100%; padding: 12px; background: #ff4757; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #007bff; font-weight: bold; font-size: 14px; }
        
        .footer-padding { background: #007bff; height: 50px; width: 100%; position: fixed; bottom: 0; left: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fa-solid fa-gear"></i> Pengaturan Akun</h2>
        
        <div class="form-group">
            <label>Email Baru</label>
            <input type="email" id="newEmail" placeholder="Masukkan email baru">
        </div>

        <div class="form-group">
            <label>Password Baru</label>
            <input type="password" id="newPass" placeholder="Masukkan password baru">
        </div>

        <div class="form-group">
            <label>Lokasi Komsel</label>
            <select id="newJC">
                <option value="1">JC 1</option>
                <option value="2">JC 2</option>
                <option value="3">JC 3</option>
                <option value="4">JC 4</option>
                <option value="5">JC 5</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lokasi Ibadah</label>
            <select id="newLoc">
                <option value="Abepura">Abepura</option>
                <option value="Sentani">Sentani</option>
                <option value="Doyo">Doyo</option>
                <option value="Arso 1">Arso 1</option>
                <option value="Arso 2">Arso 2</option>
            </select>
        </div>

        <button class="btn-save" onclick="updateProfile()">Simpan Perubahan</button>
        <button class="btn-delete" onclick="hapusAkun()">Hapus Akun Permanen</button>
        
        <a href="main_menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
    </div>
</div>

<div class="footer-padding"></div>

<script>
    window.onload = function() {
        document.getElementById('newJC').value = localStorage.getItem('jc_login') || "1";
        document.getElementById('newLoc').value = localStorage.getItem('lokasi_ibadah') || "Abepura";
    };

    function updateProfile() {
        const email = document.getElementById('newEmail').value;
        const pass = document.getElementById('newPass').value;
        const jc = document.getElementById('newJC').value;
        const loc = document.getElementById('newLoc').value;

        if(email) localStorage.setItem('email_login', email);
        if(pass) localStorage.setItem('pass_login', pass);
        localStorage.setItem('jc_login', jc);
        localStorage.setItem('lokasi_ibadah', loc);

        alert("Data berhasil diperbarui!");
        window.location.href = "main_menu.html";
    }

    function hapusAkun() {
        if(confirm("Apakah Anda yakin ingin menghapus akun?")) {
            localStorage.clear();
            alert("Akun telah dihapus.");
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
