<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #0056b3; --putih-bg: #f4f7fa; --merah-bahaya: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .setting-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--biru-utama); }
        .header { text-align: center; margin-bottom: 25px; color: var(--biru-utama); font-weight: bold; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        /* Area Fitur Tambahan */
        .fitur-tambahan { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #eee; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        
        /* Gaya Switch Toggle */
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--biru-utama); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-save { background: var(--biru-utama); color: white; width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* Tombol WhatsApp Desktop Baru */
        .btn-wa-new { background-color: #2ecc71; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; transition: 0.3s; }
        .btn-wa-new:active { transform: scale(0.98); background-color: #27ae60; }

        /* Tombol Hapus Akun */
        .btn-delete { background: none; color: var(--merah-bahaya); width: 100%; padding: 12px; border: 1px solid var(--merah-bahaya); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; transition: 0.3s; }
        .btn-delete:hover { background: #fff5f5; }
        .btn-delete:active { background: var(--merah-bahaya); color: white; }

        #notif-block {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 10000; width: 80%; max-width: 300px; border: 2px solid var(--biru-utama);
        }
    </style>
</head>
<body>

<div id="notif-block">
    <i id="notif-icon" class="fa-solid fa-circle-check" style="font-size: 40px; color: #2ecc71; margin-bottom: 15px;"></i>
    <p id="notif-text" style="margin: 0; font-weight: bold;">Berhasil diupdate</p>
    <p id="notif-subtext" style="font-size: 12px; margin-top: 10px; color: #ccc;">Silakan login ulang...</p>
</div>

<div class="setting-container">
    <div class="header"><i class="fa-solid fa-user-gear"></i> PENGATURAN AKUN</div>
    
    <div class="form-group">
        <label>Email Baru</label>
        <input type="email" id="newEmail" placeholder="Masukkan email baru">
    </div>
    <div class="form-group">
        <label>Password Baru</label>
        <input type="password" id="newPassword" placeholder="Masukkan password baru">
    </div>

    <button class="btn-save" onclick="updateAkun()">SIMPAN PERUBAHAN</button>

    <div class="fitur-tambahan">
        <div class="flex-row">
            <label style="margin: 0;">Suara Notifikasi Alkitab (22:00 WIT)</label>
            <label class="switch">
                <input type="checkbox" id="notifSound" onchange="updateMemory()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Masa Waktu Aktif Aplikasi (Otomatis Logout)</label>
            <select id="timerLogout" onchange="updateMemory()">
                <option value="0">Selalu Aktif</option>
                <option value="30">30 Menit</option>
                <option value="60">60 Menit</option>
            </select>
        </div>

        <button class="btn-wa-new" onclick="kirimLinkDesktop()">
            <i class="fab fa-whatsapp"></i> KIRIM LINK DESKTOP
        </button>

        <button class="btn-delete" onclick="hapusAkunPermanen()">
            <i class="fa-solid fa-trash-can"></i> HAPUS AKUN PERMANEN
        </button>
    </div>

    <a href="menu.html" style="display: block; text-align: center; margin-top: 25px; text-decoration: none; color: var(--biru-utama); font-weight: bold;">← Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    window.onload = function() {
        document.getElementById("notifSound").checked = localStorage.getItem("setSuara") === "true";
        document.getElementById("timerLogout").value = localStorage.getItem("setTimer") || "0";
    };

    function updateMemory() {
        localStorage.setItem("setSuara", document.getElementById("notifSound").checked);
        localStorage.setItem("setTimer", document.getElementById("timerLogout").value);
    }

    // FUNGSI KIRIM LINK TERBARU (Sesuai Rename Repositori)
    function kirimLinkDesktop() {
        const urlBaru = "https://imadebobydaniel-ai.github.io/sistem-informasi-komsel-jc-/";
        const pesan = encodeURIComponent("Shalom! Ini adalah link Sistem Informasi Komsel JC untuk dibuka di Desktop/Laptop: " + urlBaru);
        window.open("https://wa.me/?text=" + pesan, "_blank");
    }

    async function hapusAkunPermanen() {
        if (confirm("⚠️ PERINGATAN: Menghapus akun akan menghilangkan seluruh data laporan Anda secara permanen. Apakah Anda yakin?")) {
            const konfirmasi2 = prompt("Untuk memverifikasi, ketik kata 'HAPUS' di bawah ini:");
            if (konfirmasi2 === "HAPUS") {
                try {
                    const snap = await db.collection("users").where("email", "==", userEmail).get();
                    if (!snap.empty) {
                        await db.collection("users").doc(snap.docs[0].id).delete();
                        document.getElementById("notif-icon").className = "fa-solid fa-trash-check";
                        document.getElementById("notif-icon").style.color = "#dc3545";
                        document.getElementById("notif-text").innerText = "Akun Telah Dihapus";
                        document.getElementById("notif-subtext").innerText = "Data Anda telah dibersihkan.";
                        document.getElementById("notif-block").style.display = "block";
                        setTimeout(() => { localStorage.clear(); window.location.replace("index.html"); }, 3000);
                    }
                } catch (e) { alert("Gagal: " + e.message); }
            }
        }
    }

    async function updateAkun() {
        const nEmail = document.getElementById("newEmail").value;
        const nPass = document.getElementById("newPassword").value;
        if (!nEmail || !nPass) { alert("Harap isi Email dan Password!"); return; }
        try {
            const snap = await db.collection("users").where("email", "==", userEmail).get();
            if (!snap.empty) {
                await db.collection("users").doc(snap.docs[0].id).update({ email: nEmail, password: nPass });
                document.getElementById("notif-block").style.display = "block";
                setTimeout(() => { localStorage.clear(); window.location.replace("index.html"); }, 3500);
            }
        } catch (e) { alert("Gagal: " + e.message); }
    }
</script>
</body>
</html>
