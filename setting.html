<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan Akun - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-utama: #0056b3; --putih-bg: #f4f7fa; --merah-bahaya: #dc3545; --hijau-wa: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--putih-bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .setting-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 25px; border-top: 5px solid var(--biru-utama); }
        .header { text-align: center; margin-bottom: 25px; color: var(--biru-utama); font-weight: bold; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #444; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }
        
        .fitur-tambahan { margin-top: 25px; padding-top: 20px; border-top: 2px dashed #eee; }
        .flex-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--biru-utama); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-save { background: var(--biru-utama); color: white; width: 100%; padding: 15px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:active { transform: scale(0.98); }

        .btn-pref-save { background: white; color: var(--biru-utama); width: 100%; padding: 12px; border: 2px solid var(--biru-utama); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-pref-save:hover { background: var(--biru-utama); color: white; }
        
        .btn-wa-new { background-color: var(--hijau-wa); color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; transition: 0.3s; }
        
        .btn-delete { background: none; color: var(--merah-bahaya); width: 100%; padding: 12px; border: 1px solid var(--merah-bahaya); border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; transition: 0.3s; }
        .btn-delete:hover { background: #fff5f5; }

        #notif-block {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); color: white; padding: 30px; border-radius: 15px;
            text-align: center; z-index: 10000; width: 85%; max-width: 320px; border: 2px solid var(--biru-utama);
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        .confirm-actions { display: none; margin-top: 20px; gap: 10px; }
        .btn-confirm-yes { background: var(--merah-bahaya); color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
        .btn-confirm-no { background: #555; color: white; border: none; padding: 10px; border-radius: 8px; flex: 1; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="notif-block">
    <i id="notif-icon" class="fa-solid fa-circle-check" style="font-size: 45px; color: #2ecc71; margin-bottom: 15px;"></i>
    <p id="notif-text" style="margin: 0; font-weight: bold; font-size: 1.1rem;">Berhasil</p>
    <p id="notif-subtext" style="font-size: 13px; margin-top: 10px; color: #ccc;">Deskripsi pesan.</p>
    
    <div id="confirm-actions" class="confirm-actions">
        <button class="btn-confirm-yes" onclick="eksekusiHapus()">Ya, Hapus</button>
        <button class="btn-confirm-no" onclick="tutupNotif()">Tidak</button>
    </div>
</div>

<div class="setting-container">
    <div class="header"><i class="fa-solid fa-user-gear"></i> PENGATURAN AKUN</div>
    
    <div class="form-group">
        <label>Email Baru</label>
        <input type="email" id="newEmail" placeholder="Masukkan email baru">
    </div>
    <div class="form-group">
        <label>Password Baru</label>
        <input type="password" id="newPassword" placeholder="Masukkan password baru">
    </div>
    <button class="btn-save" onclick="updateAkun()">SIMPAN PERUBAHAN AKUN</button>

    <div class="fitur-tambahan">
        <div class="flex-row">
            <label style="margin: 0;">Suara Notifikasi Alkitab (22:00 WIT)</label>
            <label class="switch">
                <input type="checkbox" id="notifSound">
                <span class="slider"></span>
            </label>
        </div>

        <div class="form-group" style="margin-top: 15px;">
            <label>Masa Waktu Aktif Aplikasi (Otomatis Logout)</label>
            <select id="timerLogout">
                <option value="0">Selalu Aktif</option>
                <option value="30">30 Menit</option>
                <option value="60">60 Menit</option>
            </select>
        </div>

        <button class="btn-pref-save" onclick="updatePreferensi()">
            <i class="fa-solid fa-floppy-disk"></i> SIMPAN PREFERENSI
        </button>

        <button class="btn-wa-new" onclick="kirimLinkDesktop()">
            <i class="fab fa-whatsapp"></i> KIRIM LINK DESKTOP
        </button>

        <button class="btn-delete" onclick="konfirmasiHapus()">
            <i class="fa-solid fa-trash-can"></i> HAPUS AKUN PERMANEN
        </button>
    </div>

    <div style="margin-top: 25px;">
        <a href="profil.html" class="btn-back" style="text-decoration: none;">
            <button style="width: 100%; padding: 10px; background: white; border: 2px solid red; color: red; border-radius: 8px; font-weight: bold; cursor: pointer;">
                ← Kembali ke Profil
            </button>
        </a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    window.onload = function() {
        document.getElementById("notifSound").checked = localStorage.getItem("setSuara") === "true";
        document.getElementById("timerLogout").value = localStorage.getItem("setTimer") || "0";
    };

    function jalankanNotif(icon, warna, judul, sub, modeConfirm = false) {
        document.getElementById("notif-icon").className = "fa-solid " + icon;
        document.getElementById("notif-icon").style.color = warna;
        document.getElementById("notif-text").innerText = judul;
        document.getElementById("notif-subtext").innerText = sub;
        
        document.getElementById("confirm-actions").style.display = modeConfirm ? "flex" : "none";
        document.getElementById("notif-block").style.display = "block";

        if (!modeConfirm) {
            setTimeout(() => { tutupNotif(); }, 2500);
        }
    }

    function tutupNotif() {
        document.getElementById("notif-block").style.display = "none";
    }

    function updatePreferensi() {
        localStorage.setItem("setSuara", document.getElementById("notifSound").checked);
        localStorage.setItem("setTimer", document.getElementById("timerLogout").value);
        jalankanNotif("fa-sliders", "#2ecc71", "Preferensi Disimpan", "Pengaturan suara & waktu logout berhasil diperbarui.");
    }

    async function updateAkun() {
        const nEmail = document.getElementById("newEmail").value;
        const nPass = document.getElementById("newPassword").value;
        if (!nEmail || !nPass) { 
            jalankanNotif("fa-circle-exclamation", "#f1c40f", "Data Kosong", "Harap isi Email dan Password!"); 
            return; 
        }
        
        try {
            const snap = await db.collection("users").where("email", "==", userEmail).get();
            if (!snap.empty) {
                await db.collection("users").doc(snap.docs[0].id).update({ email: nEmail, password: nPass });
                jalankanNotif("fa-user-check", "#2ecc71", "Update Berhasil", "Silakan login ulang dengan data baru.");
                setTimeout(() => { localStorage.clear(); window.location.replace("index.html"); }, 3000);
            }
        } catch (e) { jalankanNotif("fa-circle-xmark", "#dc3545", "Gagal", e.message); }
    }

    function konfirmasiHapus() {
        jalankanNotif("fa-triangle-exclamation", "#dc3545", "Hapus Akun?", "Apakah anda yakin akan menghapus akun secara permanen?", true);
    }

    async function eksekusiHapus() {
        const inputVerif = prompt("Untuk memverifikasi, ketik kata 'HAPUS':");
        if (inputVerif === "HAPUS") {
            try {
                const snap = await db.collection("users").where("email", "==", userEmail).get();
                if (!snap.empty) {
                    await db.collection("users").doc(snap.docs[0].id).delete();
                    tutupNotif();
                    jalankanNotif("fa-trash-can", "#dc3545", "Akun Dihapus", "Seluruh data Anda telah dihapus.");
                    setTimeout(() => { localStorage.clear(); window.location.replace("index.html"); }, 3000);
                }
            } catch (e) { alert("Gagal: " + e.message); }
        } else {
            alert("Verifikasi gagal.");
            tutupNotif();
        }
    }

    // SCRIPT TERBARU UNTUK SHARE LINK DESKTOP
    function kirimLinkDesktop() {
        // 1. URL tujuan akurat sesuai repositori GitHub Pages
        const urlBaru = "https://imadebobydaniel-ai.github.io/sistem-informasi-komsel-jc/";
        
        // 2. Menyusun pesan teks
        const pesan = encodeURIComponent("Shalom! Link Sistem Informasi Komsel JC: " + urlBaru);
        
        // 3. Menggunakan endpoint api.whatsapp.com agar Webview Android tidak bingung
        const linkWA = "https://api.whatsapp.com/send?text=" + pesan;
        
        // 4. Menggunakan window.location.href agar lebih mudah dipicu oleh sistem Android
        window.location.href = linkWA;
    }
</script>
</body>
</html>
