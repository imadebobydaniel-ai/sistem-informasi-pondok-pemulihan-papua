<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f0f2f5; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .navbar { 
            background: #007bff; 
            color: white; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: flex-end; 
            align-items: center; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            height: 50px;
            gap: 10px;
        }

        .datetime-container {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            text-align: left;
            line-height: 1.2;
            position: absolute;
            left: 10px;
        }

        .footer-padding {
            background: #007bff;
            height: 50px;
            width: 100%;
            margin-top: auto;
        }

        .btn-setting {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        
        .btn-logout { 
            background: #ff4757; 
            color: white; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 14px;
        }

        .container { 
            padding: 15px; 
            max-width: 100%; 
            margin: 0 auto; 
            text-align: center; 
            box-sizing: border-box;
            flex: 1;
        }

        .main-title {
            font-weight: bold; 
            font-size: 20px;
            color: #333;
            margin: 10px 0;
        }

        .welcome-card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
        }

        .welcome-card h2 { font-size: 16px; margin: 0; }
        .welcome-card p { font-size: 12px; margin: 5px 0 0 0; color: #666; }
        
        .menu-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            margin-bottom: 20px;
        }

        .menu-item { 
            background: white; 
            padding: 15px 5px; 
            border-radius: 12px; 
            text-align: center; 
            text-decoration: none; 
            color: #333; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        
        .menu-item i { font-size: 24px; margin-bottom: 8px; color: #007bff; }
        .menu-item h3 { margin: 0; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="datetime-container" id="displayClock">
        <div id="datePart">Memuat...</div>
        <div id="timePart">00:00:00</div>
    </div>
    
    <button class="btn-setting" onclick="location.href='setting.html'"><i class="fa-solid fa-gear"></i></button>
    <button class="btn-logout" onclick="location.href='index.html'">Keluar</button>
</div>

<div class="container">
    <div class="main-title">PONDOK PEMULIHAN PAPUA</div>

    <div class="welcome-card">
        <h2 id="userGreeting">Memuat data...</h2>
        <p>Sistem Informasi Komsel JC</p>
    </div>

    <div class="menu-grid">
        <a href="profil.html" class="menu-item">
            <i class="fa-solid fa-user-gear"></i>
            <h3>Profil Saya</h3>
        </a>
        <a href="kehadiran.html" class="menu-item">
            <i class="fa-solid fa-calendar-check"></i>
            <h3>Kehadiran</h3>
        </a>
        <a href="alkitab.html" class="menu-item">
            <i class="fa-solid fa-book-bible"></i>
            <h3>Baca Alkitab</h3>
        </a>
        <a href="statistik.html" class="menu-item">
            <i class="fa-solid fa-chart-line"></i>
            <h3>Statistik Komsel</h3>
        </a>
        <a href="kegiatan.html" class="menu-item">
            <i class="fa-solid fa-calendar-days"></i>
            <h3>Kegiatan Tahunan</h3>
        </a>
        <a href="laporan.html" class="menu-item">
            <i class="fa-solid fa-file-invoice"></i>
            <h3>Laporan Bulanan</h3>
        </a>
        <a href="lacak.html" class="menu-item">
            <i class="fa-solid fa-location-dot"></i>
            <h3>Lacak Domba</h3>
        </a>
    </div>
</div>

<div class="footer-padding"></div>

<script>
    // Fungsi Jam dan Tanggal Otomatis
    function updateClock() {
        const now = new Date();
        const days = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        
        const dayName = days[now.getDay()];
        const date = now.getDate();
        const monthName = months[now.getMonth()];
        const year = now.getFullYear();
        
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('datePart').innerText = `${dayName}, ${date} ${monthName} ${year}`;
        document.getElementById('timePart').innerText = `${hours}:${minutes}:${seconds}`;
    }

    // Fungsi Otomatis Nama & JC
   function loadUserData() {
    // Mengambil data yang tadi dikirim dari index.html
    const namaUser = localStorage.getItem('nama_login') || "Pengguna"; 
    const nomorJC = localStorage.getItem('jc_login') || "-"; 
    const greetingElement = document.getElementById('userGreeting');
    
    if(nomorJC !== "-") {
        greetingElement.innerText = "Selamat Datang " + namaUser + " Komsel JC " + nomorJC;
    } else {
        greetingElement.innerText = "Selamat Datang " + namaUser;
    }
}

    // Swipe to Refresh
    let startY = 0;
    window.addEventListener('touchstart', (e) => {
        startY = e.touches[0].pageY;
    }, {passive: true});

    window.addEventListener('touchmove', (e) => {
        const currentY = e.touches[0].pageY;
        const diff = currentY - startY;
        if (diff > 100 && window.scrollY === 0) {
            location.reload();
        }
    }, {passive: true});

    // Jalankan semua fungsi saat halaman dimuat
    window.onload = function() {
        updateClock();
        setInterval(updateClock, 1000);
        loadUserData();
    };
</script>

</body>
</html>
