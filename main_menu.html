<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Utama - Pondok Pemulihan Papua</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0; background-color: #f4f7f6; 
            display: flex; flex-direction: column; align-items: center;
        }
        
        /* Header Navigasi */
        .header { 
            width: 100%; background: #007bff; color: white; 
            padding: 15px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Kartu Profil Anggota */
        .profile-card {
            background: white; width: 85%; max-width: 350px; 
            margin-top: 30px; border-radius: 20px; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            padding-bottom: 20px;
        }

        .card-header { background: #0056b3; height: 80px; }
        .avatar { 
            width: 100px; height: 100px; background: #ddd; 
            border-radius: 50%; border: 5px solid white; 
            margin-top: -50px; display: inline-block;
            object-fit: cover;
        }

        .info h2 { margin: 10px 0 5px 0; color: #333; }
        .info p { margin: 2px 0; color: #666; font-size: 14px; }
        .status-badge { 
            display: inline-block; background: #28a745; color: white; 
            padding: 5px 15px; border-radius: 20px; font-size: 12px; margin-top: 10px;
        }

        /* Menu Navigasi */
        .menu-grid {
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 15px; width: 85%; max-width: 350px; margin-top: 25px;
        }

        .menu-item {
            background: white; padding: 20px; border-radius: 15px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.3s;
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 24px; display: block; margin-bottom: 10px; }

        .btn-logout {
            margin-top: 30px; color: #dc3545; font-weight: bold;
            cursor: pointer; text-decoration: none; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="header">
    <strong>Pondok Pemulihan Papua</strong>
</div>

<div class="profile-card">
    <div class="card-header"></div>
    <div class="avatar" style="background-image: url('https://ui-avatars.com/api/?name=Member&background=random'); background-size: cover;"></div>
    
    <div class="info">
        <h2 id="userName">Memuat Nama...</h2>
        <p id="userJabatan">Jabatan</p>
        <p id="userWilayah">Wilayah</p>
        <div class="status-badge">Anggota Aktif</div>
    </div>
</div>

<div class="menu-grid">
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📢</span><br>Informasi
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📅</span><br>Kegiatan
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>📂</span><br>Dokumen
    </div>
    <div class="menu-item" onclick="alert('Fitur segera hadir!')">
        <span>💬</span><br>Chat Grup
    </div>
</div>

<a class="btn-logout" onclick="logout()">Keluar Aplikasi</a>

<script>
    // Ambil data dari penyimpanan lokal (Opsional jika ingin simpan sesi)
    // Untuk saat ini, kita biarkan statis atau ambil dari parameter URL jika perlu.
    
    function logout() {
        if(confirm("Apakah Anda ingin keluar?")) {
            window.location.href = "login.html";
        }
    }

   <script>
    // FUNGSI MEMUAT DATA SAAT HALAMAN DIBUKA
    window.onload = function() {
        const nama = localStorage.getItem("namaUser");
        const jabatan = localStorage.getItem("jabatanUser");
        const wilayah = localStorage.getItem("wilayahUser");

        // Jika tidak ada data (belum login), tendang balik ke halaman login
        if (!nama) {
            alert("Silakan login terlebih dahulu!");
            window.location.href = "login.html";
            return;
        }

        // Tampilkan data ke layar
        document.getElementById("userName").innerText = nama;
        document.getElementById("userJabatan").innerText = jabatan;
        document.getElementById("userWilayah").innerText = wilayah;
        
        // Update Avatar Inisial berdasarkan nama
        const avatarUrl = "https://ui-avatars.com/api/?name=" + encodeURIComponent(nama) + "&background=random&color=fff&size=128";
        document.querySelector(".avatar").style.backgroundImage = "url('" + avatarUrl + "')";
    };

    // FUNGSI LOGOUT
    function logout() {
        if(confirm("Apakah Anda ingin keluar?")) {
            localStorage.clear(); // Hapus semua data sesi
            window.location.href = "login.html";
        }
    }
</script>

</body>
</html>
