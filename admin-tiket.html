<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tiket - Dashboard Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .card-stats { border-left: 5px solid #0d6efd; }
        @media print { .no-print { display: none; } }
        
        .btn-delete { background: #dc3545; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .btn-view { background: #0dcaf0; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        .badge-proses { background-color: #fd7e14; }
        .badge-selesai { background-color: #198754; }

        /* Style Modal Detail */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-card {
            background: white; width: 90%; max-width: 450px; border-radius: 15px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .ticket-header { background: #0d6efd; color: white; padding: 20px; text-align: center; border-bottom: 3px solid #0a58ca; }
        .ticket-body { padding: 25px; color: #333; position: relative; }
        .ticket-info p { margin-bottom: 8px; font-size: 0.95rem; }
        
        /* Tombol Merah Sesuai Permintaan */
        .btn-action-red { background: #dc3545; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-action-red:hover { background: #a71d2a; color: white; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4 no-print">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1"><i class="fas fa-ticket-alt me-2"></i> Portal Tiket Masuk</span>
        <a href="admin.html" class="btn btn-light btn-sm"><i class="fas fa-arrow-left"></i> Kembali</a>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row mb-4 no-print">
        <div class="col-md-3 mb-3"><div class="card card-stats shadow-sm p-3 h-100"><small class="text-muted">Total Tiket</small><h3 id="totalTiket">0</h3></div></div>
        <div class="col-md-3 mb-3"><div class="card shadow-sm p-3 h-100" style="border-left: 5px solid #ffc107;"><small class="text-muted">Permohonan Doa</small><h3 id="countDoa">0</h3></div></div>
        <div class="col-md-3 mb-3"><div class="card shadow-sm p-3 h-100" style="border-left: 5px solid #dc3545;"><small class="text-muted">Masalah Aplikasi</small><h3 id="countProblem">0</h3></div></div>
        <div class="col-md-3 mb-3"><div class="card shadow-sm p-3 h-100" style="border-left: 5px solid #198754;"><small class="text-muted">Saran & Masukan</small><h3 id="countSaran">0</h3></div></div>
    </div>

    <div class="card shadow-sm mb-4 no-print">
        <div class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3">
            <select class="form-select w-auto" id="filterKategori" onchange="loadTickets()">
                <option value="">Semua Kategori</option>
                <option value="Permohonan Doa">Permohonan Doa</option>
                <option value="Konseling / Keluarga">Konseling / Keluarga</option>
                <option value="Masalah Aplikasi">Masalah Aplikasi</option>
                <option value="Saran & Masukan">Saran & Masukan</option>
            </select>
            <button onclick="window.print()" class="btn btn-dark"><i class="fas fa-print"></i> Print Laporan</button>
        </div>
    </div>

    <div class="card shadow-sm shadow-sm border-0">
        <div class="card-header bg-white fw-bold py-3">Daftar Detail Tiket</div>
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>No Tiket</th>
                        <th>Kategori</th>
                        <th>Tanggal</th>
                        <th>Pengirim</th>
                        <th>Status</th>
                        <th class="no-print">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tiketData"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modalDetail" class="modal-overlay">
    <div class="modal-card">
        <div id="captureArea">
            <div class="ticket-header">
                <h5 class="mb-0">DETAIL TIKET</h5>
                <small id="det-nomor" class="opacity-75"></small>
            </div>
            <div class="ticket-body">
                <div class="ticket-info">
                    <p><strong>Nama:</strong> <span id="det-nama"></span></p>
                    <p><strong>Email:</strong> <span id="det-email"></span></p>
                    <p><strong>Kategori:</strong> <span id="det-kategori"></span></p>
                    <hr>
                    <p><strong>ISI PESAN:</strong></p>
                    <div id="det-pesan" style="white-space: pre-wrap; background: #f8f9fa; padding: 12px; border-radius: 8px; border-left: 4px solid #0d6efd; font-style: italic;"></div>
                </div>
            </div>
        </div>
        
        <div class="p-3 d-flex gap-2 no-print bg-light">
            <button onclick="copyTicketText()" class="btn-action-red flex-grow-1"><i class="fas fa-copy"></i> COPY TEXT</button>
            <button onclick="shareAsImage()" class="btn-action-red flex-grow-1"><i class="fas fa-share-alt"></i> BAGIKAN JPG</button>
            <button onclick="closeModal()" class="btn btn-secondary px-3">TUTUP</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    function loadTickets() {
        const filterVal = document.getElementById('filterKategori').value;
        const userJC = "JC 5"; 
        let query = db.collection("saran_masukan").where("jc", "==", userJC);

        if (filterVal !== "") query = query.where("kategori", "==", filterVal);
        query = query.orderBy("timestamp", "desc");

        query.onSnapshot(snap => {
            const tbody = document.getElementById('tiketData');
            tbody.innerHTML = "";
            let counts = { doa: 0, prob: 0, saran: 0, total: 0 };

            snap.forEach((doc) => {
                const t = doc.data();
                const id = doc.id;
                
                counts.total++;
                if(t.kategori === "Permohonan Doa") counts.doa++;
                else if(t.kategori === "Masalah Aplikasi") counts.prob++;
                else if(t.kategori === "Saran & Masukan") counts.saran++;

                const statusClass = t.status === 'Selesai' ? 'badge-selesai' : 'badge-proses';
                tbody.innerHTML += `
                    <tr>
                        <td><small class="fw-bold">${t.nomor_tiket || '-'}</small></td>
                        <td><span class="badge bg-info text-dark" style="font-size:0.7rem">${t.kategori}</span></td>
                        <td><small>${t.tanggal_kirim}</small></td>
                        <td><b>${t.nama}</b></td>
                        <td><span class="badge ${statusClass}">${(t.status || 'proses').toUpperCase()}</span></td>
                        <td class="no-print">
                            <button class="btn-view" onclick="showDetail('${id}')"><i class="fas fa-eye"></i></button>
                            <button class="btn-delete" onclick="deleteTicket('${id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
            document.getElementById('totalTiket').innerText = counts.total;
            document.getElementById('countDoa').innerText = counts.doa;
            document.getElementById('countProblem').innerText = counts.prob;
            document.getElementById('countSaran').innerText = counts.saran;
        });
    }

    function showDetail(id) {
        db.collection("saran_masukan").doc(id).get().then(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('det-nomor').innerText = d.nomor_tiket || '-';
                document.getElementById('det-nama').innerText = d.nama;
                document.getElementById('det-email').innerText = d.email || '-';
                document.getElementById('det-kategori').innerText = d.kategori;
                document.getElementById('det-pesan').innerText = d.isi_saran;
                document.getElementById('modalDetail').style.display = 'flex';
            }
        });
    }

    function closeModal() { document.getElementById('modalDetail').style.display = 'none'; }

    // FUNGSI COPY TEKS (Untuk Paste ke WA)
    function copyTicketText() {
        const teks = `*DETAIL TIKET [${document.getElementById('det-nomor').innerText}]*\n\n` +
                     `*Pengirim:* ${document.getElementById('det-nama').innerText}\n` +
                     `*Kategori:* ${document.getElementById('det-kategori').innerText}\n` +
                     `*Pesan:* "${document.getElementById('det-pesan').innerText}"`;
        
        navigator.clipboard.writeText(teks).then(() => {
            alert("Teks rapi berhasil disalin!");
        });
    }

    // FUNGSI BAGIKAN SEBAGAI GAMBAR (JPG)
    function shareAsImage() {
        const area = document.getElementById('captureArea');
        html2canvas(area, { 
            backgroundColor: "#ffffff",
            scale: 2 // Agar gambar lebih tajam
        }).then(canvas => {
            canvas.toBlob(blob => {
                const file = new File([blob], "Tiket_Layanan.jpg", { type: "image/jpeg" });
                if (navigator.share) {
                    navigator.share({
                        files: [file],
                        title: 'Tiket Layanan',
                        text: 'Detail tiket dari Sistem Informasi Komsel JC'
                    }).catch(err => console.log("Gagal Share:", err));
                } else {
                    // Fallback jika browser tidak support share (download gambar)
                    const link = document.createElement('a');
                    link.download = 'Tiket.jpg';
                    link.href = canvas.toDataURL("image/jpeg");
                    link.click();
                }
            }, 'image/jpeg');
        });
    }

    function deleteTicket(id) {
        if(confirm("Hapus data tiket ini secara permanen?")) {
            db.collection("saran_masukan").doc(id).delete();
        }
    }

    window.onload = loadTickets;
</script>
</body>
</html>
