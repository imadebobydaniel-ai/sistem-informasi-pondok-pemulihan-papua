<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio Singkat Jemaat</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        body { font-family: sans-serif; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        /* Desain Pop-up Bio */
        .popup-bio { background: white; width: 90%; max-width: 350px; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .header { background: #003366; color: white; padding: 12px; text-align: center; font-weight: bold; }
        .content { padding: 15px; display: flex; align-items: flex-start; gap: 12px; }
        .foto-box { width: 80px; height: 100px; background: #eee; border-radius: 5px; object-fit: cover; }
        .info-box { flex: 1; font-size: 12px; }
        .info-box b { color: #003366; display: block; margin-top: 5px; }
        .footer { display: flex; border-top: 1px solid #eee; }
        .btn { flex: 1; padding: 12px; border: none; font-weight: bold; cursor: pointer; }
        .btn-add { background: #003366; color: white; }
        .btn-cancel { background: #f1f1f1; color: #333; }

        /* Pesan Error */
        #msg-error { background: white; padding: 20px; border-radius: 10px; text-align: center; display: none; max-width: 300px; }
    </style>
</head>
<body>

    <div id="popupBio" class="popup-bio">
        <div class="header">Bio Jemaat</div>
        <div class="content">
            <img id="p-foto" src="https://via.placeholder.com/80x100" class="foto-box">
            <div class="info-box">
                <b>NIJ:</b> <span id="p-nij">-</span>
                <b>NAMA:</b> <span id="p-nama">-</span>
                <b>KOMSEL:</b> <span id="p-komsel">-</span>
                <b>JEMAAT:</b> <span id="p-jemaat">-</span>
            </div>
        </div>
        <div class="footer">
            <button class="btn btn-cancel" onclick="window.location.href='menu.html'">CANCEL</button>
            <button class="btn btn-add" id="btnAdd">ADD</button>
        </div>
    </div>

    <div id="msg-error">
        <p id="errorText" style="font-weight: bold; color: #cc0000;"></p>
        <button onclick="window.location.href='login.html'" style="padding: 10px 20px;">LOG IN</button>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function checkScan() {
        const urlParams = new URLSearchParams(window.location.search);
        const targetEmail = urlParams.get('scan');
        const myEmail = localStorage.getItem("userEmail"); // Cek apakah scanner sudah login

        // LOGIKA: Jika tidak login atau tidak punya aplikasi (data local empty)
        if (!myEmail) {
            document.getElementById('msg-error').style.display = 'block';
            document.getElementById('errorText').innerText = "Anda Sedang Logout dari SIPAPUA / Anda tidak memiliki aplikasi SIPAPUA. Silahkan Hubungi Administartor";
            return;
        }

        try {
            const snap = await db.collection("users").where("email", "==", targetEmail).get();
            if (!snap.empty) {
                const data = snap.docs[0].data();
                document.getElementById('p-nij').innerText = data.nij || "-";
                document.getElementById('p-nama').innerText = data.nama || "-";
                document.getElementById('p-komsel').innerText = data.komsel || "-";
                document.getElementById('p-jemaat').innerText = data.lokasi_berjemaat || "-";
                if(data.fotoUrl) document.getElementById('p-foto').src = data.fotoUrl;
                
                document.getElementById('popupBio').style.display = 'block';

                // Fungsi ADD
                document.getElementById('btnAdd').onclick = async () => {
                    alert("Berhasil Menambahkan Jemaat ke Daftar Anda!");
                    // Tambahkan logika simpan ke koleksi 'teman' jika diperlukan
                };
            }
        } catch (e) { alert("Sistem Error"); }
    }
    window.onload = checkScan;
</script>
</body>
</html>
