<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tahunan - Pondok Pemulihan Papua</title>
    <style>
        /* Import Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary-color: #006666; /* Teal */
            --secondary-color: #d4af37; /* Gold */
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border-top: 5px solid var(--primary-color);
        }

        /* Tombol Kembali Premium */
        .btn-back {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .btn-back:hover {
            transform: translateX(-5px);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        /* Filter Section */
        .filter-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #eef2f1;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
        }

        select {
            padding: 12px 20px;
            border: 2px solid transparent;
            border-radius: 10px;
            background: var(--white);
            font-family: inherit;
            font-weight: 600;
            color: var(--primary-color);
            outline: none;
            transition: 0.3s;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        .btn-cari {
            padding: 12px 25px;
            background: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 102, 102, 0.3);
        }

        .btn-cari:hover {
            background: #004d4d;
            transform: translateY(-2px);
        }

        /* Tabs Cluster (Lokasi) */
        .tabs-cluster {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab-link {
            padding: 12px 25px;
            border: 2px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-link.active, .tab-link:hover {
            background: var(--primary-color);
            color: var(--white);
            box-shadow: 0 5px 15px rgba(0, 102, 102, 0.2);
        }

        /* Sub-Tab Wrapper (Komsel) */
        .sub-tab-wrapper {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 15px;
        }

        .sub-link {
            padding: 8px 18px;
            border: 1px solid #ddd;
            background: var(--white);
            color: #666;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
        }

        .sub-link:hover {
            background: #f0f0f0;
        }

        .sub-link.active {
            background: var(--primary-color) !important;
            color: var(--white) !important;
            border-color: var(--primary-color);
        }

        .sub-link.ext {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }

        .sub-link.ext.active {
            background: var(--secondary-color) !important;
            border-color: var(--secondary-color);
        }

        /* Agenda List Area */
        .agenda-list {
            min-height: 200px;
            padding: 30px;
            background: #ffffff;
            border: 2px dashed #e0e0e0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .agenda-list::before {
            content: '🕊️';
            position: absolute;
            font-size: 100px;
            opacity: 0.03;
            right: -20px;
            bottom: -20px;
        }

        .cluster-content { display: none; }
        .cluster-content.active { display: block; }

        /* Responsive */
        @media (max-width: 768px) {
            .filter-section {
                flex-direction: column;
                width: 100%;
            }
            select, .btn-cari {
                width: 100%;
            }
            .container {
                padding: 20px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="menu.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali ke Menu Utama
    </a>

    <h2>AGENDA TAHUNAN JEMAAT</h2>

    <div class="filter-section">
        <select id="selectBulan">
            <option value="">Pilih Bulan</option>
            <option value="1">Januari</option>
            <option value="2">Februari</option>
            <option value="3">Maret</option>
            <option value="4">April</option>
            <option value="5">Mei</option>
            <option value="6">Juni</option>
            <option value="7">Juli</option>
            <option value="8">Agustus</option>
            <option value="9">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
        </select>

        <select id="selectTahun"></select>
        
        <button class="btn-cari" onclick="cariAgenda()">Cari Agenda</button>
    </div>

    <div class="tabs-cluster">
        <button class="tab-link active" onclick="openCluster(event, 'Abepura')">Abepura</button>
        <button class="tab-link" onclick="openCluster(event, 'Sentani')">Sentani</button>
        <button class="tab-link" onclick="openCluster(event, 'Doyo')">Doyo</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso1')">Arso 1</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso2')">Arso 2</button>
    </div>

    <div id="Abepura" class="cluster-content active">
        <div class="sub-tab-wrapper">
            <button class="sub-link active" onclick="openSubTab(this)">Umum Gereja</button>
            <button class="sub-link" onclick="openSubTab(this)">Komsel Bapak</button>
            <button class="sub-link" onclick="openSubTab(this)">Komsel Ibu</button>
            <button class="sub-link" onclick="openSubTab(this)">Profesi</button>
            <button class="sub-link" onclick="openSubTab(this)">Mahasiswa</button>
            <button class="sub-link" onclick="openSubTab(this)">Pelajar</button>
            <button class="sub-link" onclick="openSubTab(this)">Sekolah Minggu</button>
            <button class="sub-link ext" onclick="openSubTab(this)">Tambahan (Ext)</button>
        </div>
        <div class="agenda-list">
            <p style="text-align:center; color:#888;">Agenda Abepura untuk kategori ini belum tersedia.</p>
        </div>
    </div>

    <div id="Sentani" class="cluster-content">
        <div class="sub-tab-wrapper">
            <button class="sub-link active" onclick="openSubTab(this)">Umum Gereja</button>
            <button class="sub-link" onclick="openSubTab(this)">Komsel Bapak</button>
            <button class="sub-link" onclick="openSubTab(this)">Komsel Ibu</button>
            <button class="sub-link" onclick="openSubTab(this)">Sekolah Minggu</button>
            <button class="sub-link ext" onclick="openSubTab(this)">Tambahan (Ext)</button>
        </div>
        <div class="agenda-list">
            <p style="text-align:center; color:#888;">Agenda Sentani belum tersedia.</p>
        </div>
    </div>

    <div id="Doyo" class="cluster-content">
        <div class="agenda-list"><p style="text-align:center; color:#888;">Agenda Doyo belum tersedia.</p></div>
    </div>
    <div id="Arso1" class="cluster-content">
        <div class="agenda-list"><p style="text-align:center; color:#888;">Agenda Arso 1 belum tersedia.</p></div>
    </div>
    <div id="Arso2" class="cluster-content">
        <div class="agenda-list"><p style="text-align:center; color:#888;">Agenda Arso 2 belum tersedia.</p></div>
    </div>

</div>

<script>
    // 1. Logika Automatisasi Tahun (-5 sampai +20)
    const selectTahun = document.getElementById('selectTahun');
    const tahunSekarang = new Date().getFullYear();
    
    for (let i = tahunSekarang - 5; i <= tahunSekarang + 20; i++) {
        let opt = document.createElement('option');
        opt.value = i;
        opt.innerHTML = i;
        if (i === tahunSekarang) opt.selected = true;
        selectTahun.appendChild(opt);
    }

    // 2. Logika Switch Tab Cluster
    function openCluster(evt, clusterName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("cluster-content");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].classList.remove("active");
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tab-link");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].classList.remove("active");
        }
        const activeContent = document.getElementById(clusterName);
        activeContent.style.display = "block";
        activeContent.classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // 3. Logika Switch Sub-Tab (Komsel)
    function openSubTab(element) {
        let parent = element.parentElement;
        let buttons = parent.getElementsByClassName("sub-link");
        for (let btn of buttons) {
            btn.classList.remove("active");
        }
        element.classList.add("active");
        
        let listArea = parent.nextElementSibling;
        listArea.innerHTML = `<p style="text-align:center; color:#006666;">Menampilkan Agenda untuk <b>${element.innerText}</b>...</p>`;
    }

    function cariAgenda() {
        const bln = document.getElementById('selectBulan').value;
        const thn = document.getElementById('selectTahun').value;
        if(!bln) {
            alert("Silahkan pilih bulan terlebih dahulu.");
            return;
        }
        alert("Mencari agenda untuk Bulan " + bln + " Tahun " + thn);
    }
</script>
</body>
</html>
