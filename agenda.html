<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Tahunan - Pondok Pemulihan Papua</title>
    <style>
        /* CSS PREMIUM (Teal & Gold) */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root {
            --primary-color: #006666;
            --secondary-color: #d4af37;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 20px; 
        }

        .container { 
            max-width: 1100px; 
            margin: 40px auto; 
            background: var(--white); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            border-top: 5px solid var(--primary-color); 
        }

        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            text-decoration: none; 
            color: var(--primary-color); 
            font-weight: 600; 
            margin-bottom: 30px; 
            transition: 0.3s; 
        }

        .btn-back:hover { 
            transform: translateX(-5px); 
        }

        /* Gaya Kontainer Logo */
        .logo-wrapper {
            text-align: center;
            margin-bottom: 15px;
        }

        .logo-wrapper img {
            max-height: 120px; 
            width: auto; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        h2 { 
            color: var(--primary-color); 
            text-align: center; 
            font-weight: 700; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .filter-section { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            background: #eef2f1; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 40px; 
        }

        select { 
            padding: 12px 20px; 
            border-radius: 10px; 
            border: 2px solid transparent; 
            background: var(--white); 
            font-weight: 600; 
            color: var(--primary-color); 
            cursor: pointer; 
            outline: none;
        }

        .btn-cari { 
            padding: 12px 25px; 
            background: var(--primary-color); 
            color: var(--white); 
            border: none; 
            border-radius: 10px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .tabs-cluster { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        .tab-link { 
            padding: 10px 25px; 
            border: 2px solid var(--primary-color); 
            background: transparent; 
            color: var(--primary-color); 
            border-radius: 50px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }

        .tab-link.active { 
            background: var(--primary-color); 
            color: var(--white); 
        }

        .sub-tab-wrapper { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            flex-wrap: wrap; 
            margin-bottom: 30px; 
            padding: 15px; 
            background: #f9f9f9; 
            border-radius: 15px; 
        }

        .sub-link { 
            padding: 8px 18px; 
            border: 1px solid #ddd; 
            background: var(--white); 
            color: #666; 
            border-radius: 8px; 
            font-size: 13px; 
            font-weight: 500; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .sub-link.active { 
            background: var(--primary-color) !important; 
            color: var(--white) !important; 
        }

        .sub-link.ext { 
            border-color: var(--secondary-color); 
            color: var(--secondary-color); 
        }

        .sub-link.ext.active { 
            background: var(--secondary-color) !important; 
            color: var(--white) !important; 
        }

        .agenda-list { 
            min-height: 200px; 
            padding: 30px; 
            background: #ffffff; 
            border: 2px dashed #e0e0e0; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
        }

        .cluster-content { display: none; }
        .cluster-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <a href="menu.html" class="btn-back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Kembali ke Menu Utama
    </a>

    <div class="logo-wrapper">
        <img src="logo_pondok.png" alt="Logo Pondok Pemulihan Papua">
    </div>

    <h2>AGENDA TAHUNAN JEMAAT</h2>

    <div class="filter-section">
        <select id="selectBulan">
            <option value="">Pilih Bulan</option>
            <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
            <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
            <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
            <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
        </select>
        <select id="selectTahun"></select>
        <button class="btn-cari" onclick="cariAgenda()">Cari Agenda</button>
    </div>

    <div class="tabs-cluster">
        <button class="tab-link active" onclick="openCluster(event, 'Abepura')">Abepura</button>
        <button class="tab-link" onclick="openCluster(event, 'Sentani')">Sentani</button>
        <button class="tab-link" onclick="openCluster(event, 'Doyo')">Doyo</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso1')">Arso 1</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso2')">Arso 2</button>
    </div>

    <div id="Abepura" class="cluster-content active"></div>
    <div id="Sentani" class="cluster-content"></div>
    <div id="Doyo" class="cluster-content"></div>
    <div id="Arso1" class="cluster-content"></div>
    <div id="Arso2" class="cluster-content"></div>

</div>

<script>
    // 1. Inisialisasi Pilihan Tahun
    const selectTahun = document.getElementById('selectTahun');
    const thnSekarang = new Date().getFullYear();
    for (let i = thnSekarang - 5; i <= thnSekarang + 20; i++) {
        let opt = document.createElement('option');
        opt.value = i; 
        opt.innerHTML = i;
        if (i === thnSekarang) opt.selected = true;
        selectTahun.appendChild(opt);
    }

    // 2. Inisialisasi Menu Komsel untuk Semua Cluster secara Otomatis
    const clusters = ['Abepura', 'Sentani', 'Doyo', 'Arso1', 'Arso2'];
    const komselList = [
        "Umum Gereja", "Komsel Bapak", "Komsel Ibu", "Profesi", 
        "Mahasiswa", "Pelajar", "Sekolah Minggu", "Tambahan (Ext)"
    ];

    clusters.forEach(id => {
        const div = document.getElementById(id);
        let html = `<div class="sub-tab-wrapper">`;
        komselList.forEach((komsel, index) => {
            const isActive = index === 0 ? 'active' : '';
            const isExt = komsel.includes('Ext') ? 'ext' : '';
            html += `<button class="sub-link ${isActive} ${isExt}" onclick="openSubTab(this, '${id}')">${komsel}</button>`;
        });
        html += `</div><div class="agenda-list"><p style="text-align:center; color:#888;">Agenda ${id} untuk kategori ini belum tersedia.</p></div>`;
        div.innerHTML = html;
    });

    // 3. Logika Navigasi Cluster
    function openCluster(evt, clusterName) {
        document.querySelectorAll(".cluster-content").forEach(c => { 
            c.style.display = "none"; 
            c.classList.remove("active"); 
        });
        document.querySelectorAll(".tab-link").forEach(t => t.classList.remove("active"));
        
        const target = document.getElementById(clusterName);
        target.style.display = "block";
        target.classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // 4. Logika Navigasi Sub-Tab (Komsel)
    function openSubTab(element, clusterId) {
        const parent = element.parentElement;
        parent.querySelectorAll(".sub-link").forEach(b => b.classList.remove("active"));
        element.classList.add("active");
        
        const listArea = parent.nextElementSibling;
        listArea.innerHTML = `<p style="text-align:center; color:#006666;">Menampilkan Agenda <b>${clusterId}</b> - <b>${element.innerText}</b>...</p>`;
    }

    function cariAgenda() {
        const bln = document.getElementById('selectBulan').value;
        const thn = document.getElementById('selectTahun').value;
        if(!bln) {
            alert("Silakan pilih bulan terlebih dahulu.");
            return;
        }
        alert(`Mencari agenda Bulan ${bln} Tahun ${thn}...`);
    }
</script>
</body>
</html>
