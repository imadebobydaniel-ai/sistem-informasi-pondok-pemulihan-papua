<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Agenda Tahunan - Pondok Pemulihan Papua</title>
    <style>
        /* CSS PREMIUM & MOBILE OPTIMIZED */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        :root {
            --primary-color: #006666;
            --secondary-color: #d4af37;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 15px;
            overflow-x: hidden;
        }

        .container { 
            max-width: 1100px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: var(--shadow); 
            border-top: 5px solid var(--primary-color); 
        }

        .btn-back { 
            display: inline-flex; 
            align-items: center; 
            text-decoration: none; 
            color: var(--primary-color); 
            font-weight: 600; 
            margin-bottom: 25px; 
            font-size: 14px;
            transition: 0.3s; 
        }

        .logo-wrapper {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-wrapper img {
            max-height: 80px; 
            width: auto; 
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1));
        }

        h2 { 
            color: var(--primary-color); 
            text-align: center; 
            font-weight: 700; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        /* Filter Section Responsive */
        .filter-section { 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
            background: #eef2f1; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 30px; 
        }

        select, .btn-cari { 
            width: 100%;
            padding: 14px; 
            border-radius: 10px; 
            font-size: 14px;
            font-weight: 600;
        }

        select {
            border: 2px solid #ddd;
            background: var(--white);
            color: var(--text-dark);
            outline: none;
        }

        .btn-cari {
            background: var(--primary-color); 
            color: var(--white); 
            border: none; 
            cursor: pointer;
            transition: background 0.3s;
        }

        /* Tabs Cluster Horizontal Scroll on Mobile */
        .tabs-cluster { 
            display: flex; 
            justify-content: flex-start; 
            gap: 10px; 
            margin-bottom: 25px; 
            overflow-x: auto;
            padding-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-cluster::-webkit-scrollbar { display: none; }

        .tab-link { 
            white-space: nowrap;
            padding: 10px 20px; 
            border: 2px solid var(--primary-color); 
            background: transparent; 
            color: var(--primary-color); 
            border-radius: 50px; 
            font-weight: 600; 
            font-size: 13px;
        }

        .tab-link.active { 
            background: var(--primary-color); 
            color: var(--white); 
        }

        /* Sub Tab Scrollable */
        .sub-tab-wrapper { 
            display: flex; 
            justify-content: flex-start; 
            gap: 8px; 
            overflow-x: auto;
            margin-bottom: 20px; 
            padding: 12px; 
            background: #f9f9f9; 
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .sub-tab-wrapper::-webkit-scrollbar { display: none; }

        .sub-link { 
            white-space: nowrap;
            padding: 8px 16px; 
            border: 1px solid #ddd; 
            background: var(--white); 
            color: #666; 
            border-radius: 8px; 
            font-size: 12px; 
            font-weight: 500;
        }

        .sub-link.active { 
            background: var(--primary-color) !important; 
            color: var(--white) !important; 
            border-color: var(--primary-color);
        }

        .agenda-list { 
            min-height: 180px; 
            padding: 20px; 
            background: #ffffff; 
            border: 2px dashed #e0e0e0; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center;
            font-size: 13px;
        }

        .cluster-content { display: none; will-change: contents; }
        .cluster-content.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tablet & Desktop Adjustments */
        @media (min-width: 768px) {
            .filter-section { flex-direction: row; }
            .tabs-cluster, .sub-tab-wrapper { justify-content: center; overflow-x: visible; }
            h2 { font-size: 1.5rem; }
            .logo-wrapper img { max-height: 110px; }
            .container { padding: 40px; margin: 40px auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="menu.html" class="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Kembali
    </a>

    <div class="logo-wrapper">
        <img src="logo_pondok.png" alt="Logo Pondok Pemulihan Papua">
    </div>

    <h2>AGENDA TAHUNAN JEMAAT</h2>

    <div class="filter-section">
        <select id="selectBulan">
            <option value="">Pilih Bulan</option>
            <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
            <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
            <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
            <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
        </select>
        <select id="selectTahun"></select>
        <button class="btn-cari" onclick="cariAgenda()">Cari Agenda</button>
    </div>

    <div class="tabs-cluster">
        <button class="tab-link active" onclick="openCluster(event, 'Abepura')">Abepura</button>
        <button class="tab-link" onclick="openCluster(event, 'Sentani')">Sentani</button>
        <button class="tab-link" onclick="openCluster(event, 'Doyo')">Doyo</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso1')">Arso 1</button>
        <button class="tab-link" onclick="openCluster(event, 'Arso2')">Arso 2</button>
    </div>

    <div id="Abepura" class="cluster-content active"></div>
    <div id="Sentani" class="cluster-content"></div>
    <div id="Doyo" class="cluster-content"></div>
    <div id="Arso1" class="cluster-content"></div>
    <div id="Arso2" class="cluster-content"></div>
</div>

<script>
    const selectTahun = document.getElementById('selectTahun');
    const thnSekarang = new Date().getFullYear();
    for (let i = thnSekarang - 2; i <= thnSekarang + 5; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.innerHTML = i;
        if (i === thnSekarang) opt.selected = true;
        selectTahun.appendChild(opt);
    }

    const clusters = ['Abepura', 'Sentani', 'Doyo', 'Arso1', 'Arso2'];
    const komselList = ["Umum Gereja", "Komsel Bapak", "Komsel Ibu", "Komsel Profesi", "Komsel Mahasiswa", "Komsel Pelajar", "Komsel Sekolah Minggu", "Agenda Tambahan (Ext)"];

    clusters.forEach(id => {
        const div = document.getElementById(id);
        let html = `<div class="sub-tab-wrapper">`;
        komselList.forEach((komsel, index) => {
            const isActive = index === 0 ? 'active' : '';
            const isExt = komsel.includes('Ext') ? 'ext' : '';
            html += `<button class="sub-link ${isActive} ${isExt}" onclick="openSubTab(this, '${id}')">${komsel}</button>`;
        });
        html += `</div><div class="agenda-list"><p style="color:#888;">Agenda ${id} untuk kategori ini belum tersedia.</p></div>`;
        div.innerHTML = html;
    });

    function openCluster(evt, clusterName) {
        document.querySelectorAll(".cluster-content").forEach(c => { c.style.display = "none"; c.classList.remove("active"); });
        document.querySelectorAll(".tab-link").forEach(t => t.classList.remove("active"));
        const target = document.getElementById(clusterName);
        target.style.display = "block";
        setTimeout(() => target.classList.add("active"), 10);
        evt.currentTarget.classList.add("active");
        evt.currentTarget.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    function openSubTab(element, clusterId) {
        const parent = element.parentElement;
        parent.querySelectorAll(".sub-link").forEach(b => b.classList.remove("active"));
        element.classList.add("active");
        element.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        const listArea = parent.nextElementSibling;
        listArea.innerHTML = `<p style="color:#006666;">Memuat Agenda <b>${element.innerText}</b>...</p>`;
    }

    function cariAgenda() {
        const bln = document.getElementById('selectBulan').value;
        if(!bln) { alert("Pilih bulan!"); return; }
        alert(`Mencari agenda...`);
    }
</script>
</body>
</html>
