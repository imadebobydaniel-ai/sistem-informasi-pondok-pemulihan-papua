<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrator - PPP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .admin-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-top: 5px solid red;
        }
        .admin-icon { font-size: 50px; color: red; margin-bottom: 10px; }
        h2 { margin: 0; font-size: 22px; color: #333; }
        p.subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .form-group { margin-bottom: 20px; text-align: left; position: relative; }
        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: bold; color: #444; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            outline: none;
        }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            color: #999;
        }

        .btn-admin { 
            width: 100%; 
            padding: 14px; 
            background: red; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 16px;
            margin-top: 10px;
        }

        .btn-admin:disabled { background: #ccc; cursor: not-allowed; }

        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 13px; }

        .modal-overlay {
            display: none; 
            position: fixed;
            z-index: 10000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 85%;
            max-width: 320px;
        }
        .btn-modal { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            margin-top: 20px; cursor: pointer; font-weight: bold; color: white;
        }
    </style>
</head>
<body>

    <div class="admin-card">
        <div class="admin-icon"><i class="fa-solid fa-user-shield"></i></div>
        <h2>ADMIN PANEL</h2>
        <p class="subtitle">Pondok Pemulihan Papua</p>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>Username Admin</label>
                <input type="text" id="adminUser" placeholder="Masukkan username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="adminPass" placeholder="Masukkan password" required>
                <i class="fa-solid fa-eye toggle-password" id="toggleEye" onclick="toggleAdminPass()"></i>
            </div>
            <button type="submit" class="btn-admin" id="btnSubmit">MASUK SISTEM</button>
        </form>

        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Kembali ke Login User</a>
    </div>

    <div id="statusModal" class="modal-overlay">
        <div class="modal-content">
            <i id="modalIcon" class="fa-solid" style="font-size: 50px; margin-bottom: 15px;"></i>
            <h3 id="modalTitle" style="margin: 0; color: #333;">Pesan</h3>
            <p id="modalMsg" style="color: #666; font-size: 14px; margin-top: 10px;"></p>
            <button id="closeModal" class="btn-modal">Tutup</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "laporan-pembacaan-alkitab.firebaseapp.com",
            projectId: "laporan-pembacaan-alkitab",
            storageBucket: "laporan-pembacaan-alkitab.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        function toggleAdminPass() {
            const passInput = document.getElementById('adminPass');
            const eyeIcon = document.getElementById('toggleEye');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        const modal = document.getElementById('statusModal');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMsg = document.getElementById('modalMsg');
        const modalBtn = document.getElementById('closeModal');

        function showNotification(type, title, message) {
            modalMsg.innerText = message;
            modalTitle.innerText = title;
            if (type === 'success') {
                modalIcon.className = "fa-solid fa-circle-check";
                modalIcon.style.color = "#2ecc71";
                modalBtn.style.backgroundColor = "#2ecc71";
            } else {
                modalIcon.className = "fa-solid fa-circle-xmark";
                modalIcon.style.color = "#e74c3c";
                modalBtn.style.backgroundColor = "#e74c3c";
            }
            modal.style.display = 'flex';
        }

        modalBtn.onclick = () => modal.style.display = 'none';

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnSubmit = document.getElementById('btnSubmit');
            const userValue = document.getElementById('adminUser').value.trim();
            const passValue = document.getElementById('adminPass').value.trim();

            btnSubmit.disabled = true;
            btnSubmit.innerText = "Memverifikasi...";

            // Mencari di koleksi 'admins'
            db.collection("admins")
                .where("username", "==", userValue)
                .where("password", "==", passValue)
                .get()
                .then((querySnapshot) => {
                    if (!querySnapshot.empty) {
                        showNotification('success', 'Berhasil!', 'Selamat datang, Admin.');
                        setTimeout(() => {
                            window.location.href = "dashboard_admin.html";
                        }, 1500);
                    } else {
                        showNotification('error', 'Gagal Login', 'Username atau Password salah sesuai database.');
                        btnSubmit.disabled = false;
                        btnSubmit.innerText = "MASUK SISTEM";
                    }
                })
                .catch((error) => {
                    console.error("Error:", error);
                    showNotification('error', 'Sistem Error', 'Gagal memproses login.');
                    btnSubmit.disabled = false;
                    btnSubmit.innerText = "MASUK SISTEM";
                });
        });
    </script>
</body>
</html>
