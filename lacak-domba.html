<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Domba - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #1a2a6c;
            --biru-safir: #0056b3;
            --hijau-online: #27ae60;
            --putih-bg: #f4f6f9;
            --merah-error: #e74c3c;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--putih-bg);
            color: #333;
        }

        .mobile-container {
            max-width: 500px; margin: 0 auto;
            background: var(--putih-bg); min-height: 100vh;
            position: relative; padding-bottom: 90px;
        }

        .page-header {
            background: var(--biru-tua); color: white;
            padding: 15px; text-align: center;
            position: sticky; top: 0; z-index: 1000;
        }

        .page-header h2 {
            margin: 0; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
        }

        /* --- Search Area --- */
        .search-wrapper { 
            padding: 12px; background: var(--biru-tua); 
            border-radius: 0 0 20px 20px;
        }
        
        .search-box {
            display: flex; align-items: center;
            background: rgba(255,255,255,0.15); border-radius: 12px;
            padding: 6px 15px; border: 1px solid rgba(255,255,255,0.2);
        }

        .search-box input {
            border: none; background: transparent; outline: none;
            width: 100%; padding: 8px 0; font-size: 14px; color: white;
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.6); }
        .search-box i { color: white; margin-right: 10px; }

        .content-area { padding: 10px; }

        /* --- Card Design --- */
        .card-lacak {
            background: white; border-radius: 15px;
            margin-bottom: 10px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-main-info {
            padding: 15px; display: flex; align-items: center;
            justify-content: space-between; cursor: pointer;
        }

        .user-profile { display: flex; align-items: center; gap: 12px; }
        .user-profile i { font-size: 30px; color: var(--biru-tua); }
        
        .name-stack { display: flex; flex-direction: column; }
        .name-stack .nama { font-weight: 700; font-size: 15px; color: #1a1a1a; }
        .name-stack .status { font-size: 11px; color: var(--hijau-online); font-weight: 600; }

        .btn-expand { color: #ccc; transition: 0.3s; }
        .card-lacak.active .btn-expand { transform: rotate(180deg); color: var(--biru-tua); }

        .card-detail {
            display: none; padding: 0 15px 15px 15px;
            border-top: 1px solid #f0f0f0; background: #fafafa;
        }

        .card-lacak.active .card-detail { display: block; }

        .map-frame {
            width: 100%; height: 180px;
            border-radius: 10px; overflow: hidden;
            border: 1px solid #ddd; margin-bottom: 10px;
            background: #eee; position: relative;
        }

        /* Tombol Navigasi */
        .btn-navigasi {
            background: var(--biru-tua); color: white;
            border: none; width: 100%; padding: 12px;
            border-radius: 8px; font-weight: 700; font-size: 12px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            cursor: pointer;
        }

        /* --- MODAL POPUP (Half Display) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 2000;
            display: none; align-items: flex-end;
        }

        .modal-content {
            background: white; width: 100%; max-width: 500px;
            padding: 25px; border-radius: 25px 25px 0 0;
            box-sizing: border-box; animation: slideUp 0.3s ease-out;
            text-align: center;
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-content h3 { margin-top: 0; color: var(--biru-tua); font-size: 1.1rem; }

        .pass-container {
            position: relative; margin: 20px 0;
        }

        .pass-container input {
            width: 100%; padding: 12px 40px 12px 15px;
            border: 2px solid #ddd; border-radius: 10px;
            font-size: 16px; box-sizing: border-box; outline: none;
        }

        .pass-container .toggle-pass {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); color: #999; cursor: pointer;
        }

        .btn-verifikasi {
            background: var(--biru-tua); color: white;
            border: none; width: 100%; padding: 12px;
            border-radius: 10px; font-weight: bold; margin-bottom: 10px;
        }

        .btn-cancel {
            background: transparent; color: #777; border: none; font-size: 13px;
        }

        .bottom-bar {
            position: fixed; bottom: 0; left: 50%;
            transform: translateX(-50%); width: 100%; max-width: 500px;
            background: white; padding: 10px 0;
            border-top: 1px solid #eee; display: flex; justify-content: center;
        }

        .btn-back {
            text-decoration: none; color: var(--biru-tua);
            display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 800;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <header class="page-header">
        <h2>LACAK DOMBA JC 5</h2>
    </header>

    <div class="search-wrapper">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="memberSearch" placeholder="Cari nama domba..." onkeyup="filterMembers()">
        </div>
    </div>

    <main class="content-area" id="list-lacak">
        <div class="no-data"><i class="fas fa-spinner fa-spin"></i> Sinkronisasi GPS...</div>
    </main>

    <footer class="bottom-bar">
        <a href="menu.html" class="btn-back">
            <i class="fas fa-th-large" style="font-size: 18px; margin-bottom: 4px;"></i>
            <span>MENU UTAMA</span>
        </a>
    </footer>
</div>

<div class="modal-overlay" id="modalPassword">
    <div class="modal-content">
        <i class="fas fa-lock" style="font-size: 30px; color: var(--biru-tua); margin-bottom: 10px;"></i>
        <h3>Masukan Password PKS atau Admin</h3>
        <div class="pass-container">
            <input type="password" id="inputPass" placeholder="Ketik password di sini...">
            <i class="fas fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
        </div>
        <button class="btn-verifikasi" onclick="cekAkses()">BUKA NAVIGASI</button>
        <button class="btn-cancel" onclick="tutupModal()">Batal</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let targetUrl = ""; // Simpan URL maps sementara

    function toggleCard(el) {
        el.parentElement.classList.toggle('active');
    }

    // Fungsi Pop-up
    function mintaAkses(url) {
        targetUrl = url;
        document.getElementById('modalPassword').style.display = 'flex';
        document.getElementById('inputPass').focus();
    }

    function tutupModal() {
        document.getElementById('modalPassword').style.display = 'none';
        document.getElementById('inputPass').value = "";
    }

    function togglePassword() {
        const input = document.getElementById('inputPass');
        const icon = document.getElementById('eyeIcon');
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    function cekAkses() {
        const pass = document.getElementById('inputPass').value;
        // Silakan ganti "admin123" dengan password yang anda inginkan
        if (pass === "admin123" || pass === "pks2026") {
            window.open(targetUrl, '_blank');
            tutupModal();
        } else {
            alert("Password Salah! Akses Ditolak.");
        }
    }

    function listenLocation() {
        db.collection("live_tracking").onSnapshot((querySnapshot) => {
            const listContainer = document.getElementById('list-lacak');
            let htmlContent = "";
            querySnapshot.forEach((doc) => {
                const d = doc.data();
                const timeStr = d.lastSeen ? new Date(d.lastSeen.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Aktif";
                const mapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}`;

                htmlContent += `
                    <div class="card-lacak" data-name="${d.nama}">
                        <div class="card-main-info" onclick="toggleCard(this)">
                            <div class="user-profile">
                                <i class="fas fa-user-circle"></i>
                                <div class="name-stack">
                                    <span class="nama">${d.nama}</span>
                                    <span class="status"><i class="fas fa-map-marker-alt"></i> pkl ${timeStr}</span>
                                </div>
                            </div>
                            <i class="fas fa-chevron-down btn-expand"></i>
                        </div>
                        <div class="card-detail">
                            <div class="map-frame">
                                <iframe style="border:0;width:100%;height:100%" src="https://maps.google.com/maps?q=${d.lat},${d.lng}&z=15&output=embed"></iframe>
                            </div>
                            <button onclick="mintaAkses('${mapsUrl}')" class="btn-navigasi">
                                <i class="fas fa-location-arrow"></i> NAVIGASI GOOGLE MAPS
                            </button>
                        </div>
                    </div>
                `;
            });
            listContainer.innerHTML = htmlContent || "<div class='no-data'>Tidak ada data.</div>";
        });
    }

    listenLocation();
</script>
</body>
</html>
