<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Domba - SIPAPUA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #003366;
            --radar-green: #2ecc71;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 20px;
            text-align: center;
            width: 100%;
            background: linear-gradient(to bottom, #003366, transparent);
        }

        /* --- RADAR CSS --- */
        .radar-box {
            position: relative;
            width: 320px;
            height: 320px;
            margin-top: 50px;
            border: 2px solid var(--radar-green);
            border-radius: 50%;
            background: repeating-radial-gradient(circle, #0b0f19 0%, #0b0f19 15%, rgba(46, 204, 113, 0.2) 15.2%, #0b0f19 15.5%);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
        }

        .radar-sweep {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(46, 204, 113, 0.4) 100%);
            border-radius: 50%;
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .center-dot {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px white;
            z-index: 10;
        }

        /* --- USER DOTS --- */
        .user-dot {
            position: absolute;
            width: 45px;
            height: 45px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 20;
            text-align: center;
            animation: fadeIn 1s;
        }

        .user-dot img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid var(--radar-green);
            background: #fff;
        }

        .user-name {
            font-size: 10px;
            display: block;
            white-space: nowrap;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            border-radius: 4px;
        }

        .status-info {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
        }

        .btn-back {
            position: fixed;
            bottom: 30px;
            padding: 10px 25px;
            background: var(--primary-color);
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            text-decoration: none;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">Cari Domba</h2>
    <p style="font-size: 12px; opacity: 0.8;">Radius Scanning: 5 KM</p>
</div>

<div class="radar-box" id="radarScreen">
    <div class="radar-sweep"></div>
    <div class="center-dot"></div>
    </div>

<div class="status-info" id="statusScan">Mencari domba di sekitar...</div>

<a href="menu.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Menu</a>

<script>
    // 1. Firebase Config (Gunakan config Anda)
    const firebaseConfig = { 
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
        authDomain: "boby-apps-project.firebaseapp.com", 
        projectId: "boby-apps-project", 
        storageBucket: "boby-apps-project.appspot.com", 
        messagingSenderId: "125984859692", 
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const myEmail = localStorage.getItem("userEmail");

    // Fungsi Hitung Jarak (Haversine Formula)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius Bumi dalam KM
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function startScanning() {
        if (!navigator.geolocation) {
            Swal.fire("Error", "GPS tidak didukung di browser ini", "error");
            return;
        }

        navigator.geolocation.watchPosition(async (pos) => {
            const myLat = pos.coords.latitude;
            const myLon = pos.coords.longitude;

            // Update Lokasi Saya di Firebase
            if (myEmail) {
                const userRef = db.collection("users").where("email", "==", myEmail);
                userRef.get().then(s => {
                    if(!s.empty) s.docs[0].ref.update({ lat: myLat, lon: myLon, lastActive: new Date() });
                });
            }

            // Ambil Semua User untuk di-scan
            db.collection("users").onSnapshot(snapshot => {
                // Bersihkan dots lama kecuali sweep & center
                const radar = document.getElementById('radarScreen');
                document.querySelectorAll('.user-dot').forEach(dot => dot.remove());

                let count = 0;

                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data.email !== myEmail && data.lat && data.lon) {
                        const dist = getDistance(myLat, myLon, data.lat, data.lon);

                        if (dist <= 5) { // Radius 5 KM
                            count++;
                            renderUserOnRadar(data, dist, myLat, myLon);
                        }
                    }
                });

                document.getElementById('statusScan').innerText = count + " Domba terdeteksi di sekitar Anda";
            });

        }, (err) => {
            document.getElementById('statusScan').innerText = "Gagal mengakses GPS. Pastikan izin diaktifkan.";
        }, { enableHighAccuracy: true });
    }

    function renderUserOnRadar(userData, dist, myLat, myLon) {
        const radar = document.getElementById('radarScreen');
        const dot = document.createElement('div');
        dot.className = 'user-dot';

        // Kalkulasi posisi dot berdasarkan koordinat (skala radar 320px)
        // Ini adalah simulasi posisi relatif
        const angle = Math.atan2(userData.lon - myLon, userData.lat - myLat);
        const radiusInPx = (dist / 5) * 150; // 150px adalah radius maksimal radar
        
        const x = 160 + radiusInPx * Math.sin(angle);
        const y = 160 - radiusInPx * Math.cos(angle);

        dot.style.left = x + 'px';
        dot.style.top = y + 'px';

        const foto = userData.foto_profil || 'https://via.placeholder.com/50';
        dot.innerHTML = `
            <img src="${foto}">
            <span class="user-name">${userData.nama || 'User'}</span>
        `;

        dot.onclick = () => {
            cekStatusPertemanan(userData);
        };

        radar.appendChild(dot);
    }

    async function cekStatusPertemanan(targetUser) {
        // Logika sederhana: Cek ke koleksi friends
        const friendCheck = await db.collection("friends")
            .where("user_a", "==", myEmail)
            .where("user_b", "==", targetUser.email).get();

        let btnText = "Kirim Permintaan Pertemanan";
        let isFriend = false;

        if (!friendCheck.empty) {
            btnText = "Sudah Teman Anda";
            isFriend = true;
        }

        Swal.fire({
            title: targetUser.nama,
            text: `Berjarak sekitar ${(getDistance(0,0,0,0)).toFixed(2)} km dari lokasi Anda`,
            imageUrl: targetUser.foto_profil || 'https://via.placeholder.com/150',
            imageWidth: 100,
            imageHeight: 100,
            showCancelButton: true,
            confirmButtonText: btnText,
            confirmButtonColor: isFriend ? '#2ecc71' : '#003366',
            cancelButtonText: 'Tutup'
        }).then((result) => {
            if (result.isConfirmed && !isFriend) {
                // Fungsi kirim request pertemanan bisa ditaruh di sini
                Swal.fire("Terkirim!", "Permintaan pertemanan telah dikirim.", "success");
            }
        });
    }

    window.onload = startScanning;
</script>

</body>
</html>
