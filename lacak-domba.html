<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lacak Domba - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --biru-safir: #0056b3; --hijau-zamrud: #2ecc71; --putih-bg: #f4f7fa; --emas: #D4AF37; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 0; color: #333; }
        .header { background: white; padding: 20px; text-align: center; border-bottom: 3px solid var(--biru-safir); }
        .header h2 { margin: 0; color: var(--biru-tua); font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .search-container { padding: 15px; background: white; margin: 10px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .search-box input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        #map-container { width: 92%; height: 180px; background: #e5e3df; margin: auto; border-radius: 20px; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .info-panel { background: #fff9db; border: 1px solid #ffe066; margin: 15px; padding: 12px; border-radius: 10px; font-size: 12px; text-align: center; line-height: 1.5; color: #856404; }
        .friends-list { padding: 0 15px 30px 15px; }
        .section-title { font-size: 13px; color: #666; margin: 15px 0 10px 5px; font-weight: bold; text-transform: uppercase; }
        .friend-item { background: white; padding: 12px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .friend-img { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; cursor: pointer; border: 1px solid #eee; }
        .friend-info { flex: 1; cursor: pointer; }
        .friend-info h4 { margin: 0; font-size: 14px; color: var(--biru-tua); }
        .friend-info p { margin: 2px 0; font-size: 11px; color: #777; }
        .profile-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .profile-card { background: white; width: 85%; max-width: 320px; border-radius: 25px; overflow: hidden; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .card-header { background: var(--biru-tua); height: 80px; position: relative; }
        .card-avatar { width: 100px; height: 100px; border-radius: 50%; border: 5px solid white; margin-top: -50px; background: white; object-fit: cover; position: relative; z-index: 2; }
        .card-body { padding: 20px; }
        .card-body h3 { margin: 10px 0 5px; color: #333; font-size: 18px; }
        .card-body p { margin: 0; color: #777; font-size: 13px; }
        .btn { border: none; padding: 10px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-invite { background: var(--biru-safir); color: white; width: 100%; margin-top: 15px; }
        .btn-track { background: #f0fdfa; color: #0d9488; border: 1px solid #0d9488; padding: 6px 15px; }
        .btn-close { background: #eee; color: #333; width: 100%; margin-top: 8px; }
        .btn-sent { background: #e4e6eb !important; color: #4b4f56 !important; }
        .back-btn { display: block; text-align: center; margin: 20px; color: var(--biru-safir); text-decoration: none; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h2 id="header-title"><i class="fa-solid fa-map-location-dot" style="color: var(--emas);"></i> Lacak Domba</h2>
    </div>

    <div class="info-panel" id="access-text">Memuat informasi...</div>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Cari Nama (Contoh: Boby)...">
        </div>
    </div>

    <div id="map-container">
        <div style="text-align: center; color: #666;">
            <i class="fa-solid fa-location-dot fa-2x" style="color: #ff4757; margin-bottom: 8px;"></i><br>
            <strong id="map-status" style="font-size: 14px;">Peta Siap</strong><br>
            <small id="map-coord" style="font-size: 10px;">Pilih teman untuk melacak</small>
        </div>
    </div>

    <div class="friends-list">
        <div id="search-results-section" style="display:none;">
            <div class="section-title">Hasil Pencarian</div>
            <div id="search-results"></div>
        </div>
        <div class="section-title">Teman Terhubung</div>
        <div id="connected-friends"></div>
    </div>

    <div id="modalProfil" class="profile-modal">
        <div class="profile-card">
            <div class="card-header"></div>
            <img id="p-foto" src="" class="card-avatar">
            <div class="card-body">
                <h3 id="p-nama">Nama Anggota</h3>
                <p id="p-jc">JC Group</p>
                <button id="p-btn-action" class="btn btn-invite">
                    <i class="fa-solid fa-user-plus"></i> ADD FRIEND
                </button>
                <button class="btn btn-close" onclick="tutupProfil()">TUTUP</button>
            </div>
        </div>
    </div>

    <a href="menu.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        // --- 1. KONFIGURASI FIREBASE ---
        // Ganti dengan Config asli dari Firebase Console Bapak
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "pondok-pemulihan.firebaseapp.com",
            projectId: "pondok-pemulihan",
            storageBucket: "pondok-pemulihan.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        const myJC = localStorage.getItem('userJC') || "JC 5"; 
        const currentUserEmail = localStorage.getItem('userEmail');
        const currentUserId = localStorage.getItem('userId');

        document.getElementById('header-title').innerHTML += ` (${myJC})`;
        document.getElementById('access-text').innerText = `Lacak Domba hanya bisa dilakukan sesama anggota ${myJC} dengan saling terhubung masing-masing akun.`;

        // --- 2. FUNGSI HELPER (CAPITALIZE) ---
        // Mengubah "boby daniel" menjadi "Boby Daniel" agar cocok dengan Database
        function capitalizeWords(str) {
            return str.replace(/\b\w/g, l => l.toUpperCase());
        }

        // --- 3. FUNGSI SEARCH ---
        async function renderLists(filter = "") {
            const searchResults = document.getElementById('search-results');
            const searchSection = document.getElementById('search-results-section');
            searchResults.innerHTML = "";

            if (!filter || filter.length < 2) {
                searchSection.style.display = "none";
                return;
            }

            searchSection.style.display = "block";
            
            // Perbaikan di sini: Menyesuaikan input user dengan format database
            let searchTerm = capitalizeWords(filter.trim());

            try {
                const snapshot = await db.collection("users")
                    .where("nama", ">=", searchTerm)
                    .where("nama", "<=", searchTerm + "\uf8ff")
                    .limit(5)
                    .get();

                if (snapshot.empty) {
                    searchResults.innerHTML = "<p style='padding:10px; font-size:12px; color:red;'>Nama tidak ditemukan (Perhatikan Huruf Besar/Kecil).</p>";
                    return;
                }

                snapshot.forEach(doc => {
                    const user = doc.data();
                    const userId = doc.id;
                    
                    // Sembunyikan diri sendiri dari hasil cari
                    if (user.email === currentUserEmail) return;

                    const avatar = user.foto_profil || `https://ui-avatars.com/api/?name=${user.nama}&background=random&bold=true`;
                    
                    searchResults.innerHTML += `
                        <div class="friend-item">
                            <img src="${avatar}" class="friend-img" onclick="bukaProfil('${userId}')">
                            <div class="friend-info" onclick="bukaProfil('${userId}')">
                                <h4>${user.nama}</h4>
                                <p>JC ${user.komsel} • ${user.jabatan || 'Anggota'}</p>
                            </div>
                            <button class="btn btn-invite" id="btn-${userId}" onclick="handleInvite('${userId}', '${user.nama}')">
                                <i class="fa-solid fa-user-plus"></i> ADD
                            </button>
                        </div>
                    `;
                });
            } catch (error) { console.error("Error search:", error); }
        }

        // --- 4. FUNGSI INVITE ---
        async function handleInvite(targetId, targetName) {
            try {
                await db.collection("friend_requests").add({
                    fromId: currentUserId || "ID_ANONIM",
                    fromNama: localStorage.getItem('userName') || "Anggota Baru",
                    toId: targetId,
                    status: "pending",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                const btn = document.getElementById(`btn-${targetId}`);
                btn.innerHTML = "SENT";
                btn.classList.add('btn-sent');
                btn.onclick = null;
                alert("Permintaan terkirim ke " + targetName);
            } catch (e) { alert("Gagal mengirim permintaan."); }
        }

        async function bukaProfil(id) {
            const doc = await db.collection("users").doc(id).get();
            if (doc.exists) {
                const user = doc.data();
                document.getElementById('p-nama').innerText = user.nama;
                document.getElementById('p-jc').innerText = "Grup Komsel: JC " + user.komsel;
                document.getElementById('p-foto').src = user.foto_profil || `https://ui-avatars.com/api/?name=${user.nama}&background=random&size=128`;
                document.getElementById('modalProfil').style.display = 'flex';
            }
        }

        function tutupProfil() { document.getElementById('modalProfil').style.display = 'none'; }

        // Listener Input
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderLists(e.target.value);
        });

    </script>
</body>
</html>
