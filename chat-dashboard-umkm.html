<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Dashboard UMKM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --bg: #f0f2f5; --gold: #d4af37; --accent: #4CAF50; --danger: #e53935; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 340px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: all 0.3s ease; z-index: 20; }
        .sidebar-header { padding: 15px 20px; background: var(--primary); color: white; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
        
        /* Fitur Bulk Action */
        .action-bar { padding: 10px 20px; background: #f8f9fa; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .btn-delete-selected { background: var(--danger); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; display: none; }
        .btn-delete-selected.show { display: block; }

        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; position: relative; }
        .customer-item:hover { background: #f8f9fa; }
        .customer-item.active { background: #e8eaf6; border-left: 5px solid var(--gold); }
        
        /* Checkbox Styles */
        .chat-checkbox { width: 18px; height: 18px; cursor: pointer; }

        .avatar { width: 40px; height: 40px; background: #e0e0e0; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); flex-shrink: 0; }
        .customer-info { flex: 1; overflow: hidden; }
        .p-name { font-weight: bold; font-size: 14px; color: #333; }
        .p-msg { font-size: 12px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Main Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #efe7dd; position: relative; }
        .chat-header { padding: 15px 25px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        
        .messages-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; }
        .bubble-in { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }
        .bubble-out { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 4px; }
        
        .timestamp { font-size: 10px; color: #888; margin-top: 6px; display: block; text-align: right; }
        
        .reply-box { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        .reply-box input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn-send { background: var(--primary); color: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; }
            .sidebar.mobile-hidden { transform: translateX(-100%); }
            #btn-back-list { display: block; margin-right: 10px; background: none; border: none; font-size: 18px; color: var(--primary); cursor: pointer; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="margin:0;"><i class="fa-solid fa-comments"></i> Chat Masuk</h3>
    </div>
    
    <div class="action-bar">
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
            <input type="checkbox" id="check-all" onclick="toggleAllCheckboxes(this)"> Semua
        </label>
        <button id="btn-hapus-massal" class="btn-delete-selected" onclick="hapusChatTerpilih()">
            <i class="fa-solid fa-trash"></i> Hapus
        </button>
    </div>

    <div class="customer-list" id="list-container"></div>
</div>

<div class="chat-main">
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <button id="btn-back-list" onclick="toggleMobileView(true)" style="display:none;"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="target-name" style="font-weight: 800; color: var(--primary);">Pilih percakapan...</div>
        </div>
        <button onclick="window.location.href='dashboard-umkm.html'" style="background:none; border:none; color: #999; cursor:pointer;">
            <i class="fa-solid fa-circle-xmark fa-xl"></i>
        </button>
    </div>
    
    <div class="messages-window" id="chat-body">
        <div style="text-align:center; color:#888; margin-top:50px;">
            <i class="fa-solid fa-message fa-3x" style="opacity:0.3; margin-bottom:15px;"></i>
            <p>Klik salah satu pelanggan di samping<br>untuk mulai membalas pesan.</p>
        </div>
    </div>

    <div class="reply-box">
        <input type="text" id="input-chat" placeholder="Ketik pesan balasan..." disabled>
        <button class="btn-send" id="btn-kirim" onclick="kirimBalasan()" disabled><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let curCustId = null;
    let myId = null;

    auth.onAuthStateChanged(user => {
        if (user) {
            myId = user.uid;
            muatDaftarChat();
        } else {
            window.location.href = "umkm-jemaat.html";
        }
    });

    function toggleMobileView(showList) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar && window.innerWidth <= 768) {
            sidebar.classList.toggle('mobile-hidden', !showList);
        }
    }

    // LOGIKA CHECKBOX
    function toggleAllCheckboxes(source) {
        const checkboxes = document.querySelectorAll('.chat-checkbox');
        checkboxes.forEach(cb => cb.checked = source.checked);
        updateDeleteButtonVisibility();
    }

    function updateDeleteButtonVisibility() {
        const anyChecked = document.querySelectorAll('.chat-checkbox:checked').length > 0;
        document.getElementById('btn-hapus-massal').classList.toggle('show', anyChecked);
    }

    // 1. Muat Daftar Chat
    function muatDaftarChat() {
        db.collection("chats")
          .where("seller_uid", "==", myId)
          .orderBy("timestamp", "desc")
          .onSnapshot(snap => {
            const container = document.getElementById("list-container");
            if (!container) return;
            
            container.innerHTML = "";
            const uniqueCustomers = [];

            snap.forEach(doc => {
                const data = doc.data();
                if (!uniqueCustomers.includes(data.customer_id)) {
                    uniqueCustomers.push(data.customer_id);
                    renderUserItem(data);
                }
            });

            if (uniqueCustomers.length === 0) {
                container.innerHTML = `<div style="padding:20px; text-align:center; color:#999; font-size:13px;">Belum ada pesan masuk.</div>`;
            }
            updateDeleteButtonVisibility();
        });
    }

    // 2. Render Sidebar Item dengan Checkbox
    function renderUserItem(data) {
        const container = document.getElementById("list-container");
        const cName = data.customer_name || "Pembeli Umum";
        const isActive = curCustId === data.customer_id ? 'active' : '';
        
        const item = document.createElement('div');
        item.className = `customer-item ${isActive}`;
        item.innerHTML = `
            <input type="checkbox" class="chat-checkbox" value="${data.customer_id}" onclick="event.stopPropagation(); updateDeleteButtonVisibility();">
            <div style="display:flex; align-items:center; gap:12px; flex:1;" onclick="bukaPercakapan('${data.customer_id}', '${cName}')">
                <div class="avatar">${cName.charAt(0)}</div>
                <div class="customer-info">
                    <div class="p-name">${cName}</div>
                    <div class="p-msg">${data.message || ""}</div>
                </div>
            </div>
        `;
        container.appendChild(item);
    }

    // 3. Hapus Chat Terpilih (Satu Customer Sekaligus)
    async function hapusChatTerpilih() {
        const selected = document.querySelectorAll('.chat-checkbox:checked');
        if (selected.length === 0) return;

        if (!confirm(`Hapus ${selected.length} percakapan terpilih?`)) return;

        for (let cb of selected) {
            const customerId = cb.value;
            // Ambil semua dokumen chat antara seller ini dan customer ini
            const snapshot = await db.collection("chats")
                .where("seller_uid", "==", myId)
                .where("customer_id", "==", customerId)
                .get();
            
            const batch = db.batch();
            snapshot.forEach(doc => batch.delete(doc.ref));
            await batch.commit();
        }

        document.getElementById('check-all').checked = false;
        if (selected.length > 0) {
            document.getElementById("chat-body").innerHTML = '<div style="text-align:center; color:#888; margin-top:50px;"><p>Percakapan dihapus.</p></div>';
            document.getElementById("target-name").innerText = "Pilih percakapan...";
        }
    }

    function bukaPercakapan(cid, cname) {
        curCustId = cid;
        document.getElementById("target-name").innerText = cname;
        document.getElementById("input-chat").disabled = false;
        document.getElementById("btn-kirim").disabled = false;
        document.querySelectorAll('.customer-item').forEach(el => el.classList.remove('active'));
        muatPesan();
        toggleMobileView(false);
    }

    function muatPesan() {
        if (!curCustId) return;
        db.collection("chats")
          .where("seller_uid", "==", myId)
          .where("customer_id", "==", curCustId)
          .orderBy("timestamp", "asc")
          .onSnapshot(snap => {
            const body = document.getElementById("chat-body");
            body.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isOut = m.sender === 'seller';
                const jam = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                body.innerHTML += `
                    <div class="bubble ${isOut ? 'bubble-out' : 'bubble-in'}">
                        ${m.message}
                        <span class="timestamp">${jam}</span>
                    </div>`;
            });
            body.scrollTop = body.scrollHeight;
        });
    }

    async function kirimBalasan() {
        const input = document.getElementById("input-chat");
        const pesan = input.value.trim();
        if (!pesan || !curCustId) return;
        try {
            await db.collection("chats").add({
                seller_uid: myId,
                customer_id: curCustId,
                customer_name: document.getElementById("target-name").innerText,
                sender: 'seller', 
                message: pesan,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        } catch (e) { console.error(e); }
    }

    document.getElementById("input-chat").addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); kirimBalasan(); }
    });
</script>
</body>
</html>
