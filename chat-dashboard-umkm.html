<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Dashboard UMKM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a237e; --bg: #f0f2f5; --gold: #d4af37; --accent: #4CAF50; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; transition: all 0.3s ease; z-index: 20; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; border-bottom: 3px solid var(--gold); flex-shrink: 0; }
        .customer-list { flex: 1; overflow-y: auto; }
        .customer-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .customer-item.active { background: #e8eaf6; border-left: 5px solid var(--gold); }
        .avatar { width: 45px; height: 45px; background: #e0e0e0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #efe7dd; position: relative; }
        .chat-header { padding: 15px 25px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        .messages-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 18px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .bubble-in { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }
        .bubble-out { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 4px; }
        .timestamp { font-size: 10px; color: #888; margin-top: 6px; display: block; }
        .reply-box { padding: 15px; background: #f0f0f0; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        .reply-box input { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ccc; outline: none; }
        .btn-send { background: var(--primary); color: var(--gold); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) {
            .sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 100%; }
            .sidebar.mobile-hidden { transform: translateX(-100%); }
            #btn-back-list { display: block; }
        }
    </style>
</head>
<body>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">
        <h3 style="margin:0;"><i class="fa-solid fa-comments"></i> Chat Masuk</h3>
    </div>
    <div class="customer-list" id="list-container"></div>
</div>

<div class="chat-main">
    <div class="chat-header">
        <div style="display: flex; align-items: center;">
            <button id="btn-back-list" onclick="toggleMobileView(true)" style="display:none;"><i class="fa-solid fa-arrow-left"></i></button>
            <div id="target-name" style="font-weight: 800; color: var(--primary);">Pilih percakapan...</div>
        </div>
        <button onclick="window.location.href='dashboard-umkm.html'" style="background:none; border:none; color: #999; cursor:pointer;">
            <i class="fa-solid fa-circle-xmark fa-xl"></i>
        </button>
    </div>
    <div class="messages-window" id="chat-body"></div>
    <div class="reply-box">
        <input type="text" id="input-chat" placeholder="Ketik pesan balasan...">
        <button class="btn-send" onclick="kirimBalasan()"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    let curCustId = null;
    let myId = null;

    function toggleMobileView(showList) {
        const sidebar = document.getElementById('sidebar');
        if (sidebar && window.innerWidth <= 768) {
            sidebar.classList.toggle('mobile-hidden', !showList);
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            myId = user.uid;
            muatDaftarChat();
        } else {
            window.location.href = "umkm-jemaat.html";
        }
    });

    function muatDaftarChat() {
        db.collection("chats").where("seller_uid", "==", myId).onSnapshot(snap => {
            const container = document.getElementById("list-container");
            if (!container) return;
            const listUnik = {};
            container.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                listUnik[d.customer_id] = d.customer_name || "Pembeli Umum";
            });
            Object.keys(listUnik).forEach(cid => {
                const item = document.createElement("div");
                item.className = `customer-item ${curCustId === cid ? 'active' : ''}`;
                item.onclick = () => {
                    bukaChat(cid, listUnik[cid]);
                    toggleMobileView(false);
                };
                item.innerHTML = `<div class="avatar">${listUnik[cid].charAt(0)}</div><div class="customer-info"><div style="font-weight:bold;">${listUnik[cid]}</div><div style="font-size:11px; color:#999;">Lihat pesan terbaru</div></div>`;
                container.appendChild(item);
            });
        });
    }

    function bukaChat(cid, cname) {
        curCustId = cid;
        document.getElementById("target-name").innerText = cname;
        muatPesan();
    }

    function muatPesan() {
        if (!curCustId) return;
        db.collection("chats")
          .where("seller_uid", "==", myId)
          .where("customer_id", "==", curCustId)
          .orderBy("timestamp", "asc")
          .onSnapshot(snap => {
            const body = document.getElementById("chat-body");
            if (!body) return;
            body.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                const isOut = m.sender === 'seller';
                const jam = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
                body.innerHTML += `<div class="bubble ${isOut ? 'bubble-out' : 'bubble-in'}">${m.message || "Pesan"} <span class="timestamp">${jam}</span></div>`;
            });
            body.scrollTop = body.scrollHeight;
        });
    }

    async function kirimBalasan() {
        const input = document.getElementById("input-chat");
        const pesan = input.value.trim();
        if (!pesan || !curCustId) return;
        try {
            await db.collection("chats").add({
                seller_uid: myId,
                customer_id: curCustId,
                sender: 'seller', 
                message: pesan,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = "";
        } catch (e) { console.error(e); }
    }

    // Perbaikan event listener Enter
    document.getElementById("input-chat").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            kirimBalasan();
        }
    });
</script>
</body>
</html>
