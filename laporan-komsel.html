<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #0056b3;
            --success: #28a745;
            --danger: #dc3545;
            --light-bg: #f8f9fa;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #eef2f7; 
            margin: 0; padding: 12px;
            padding-bottom: 100px;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; padding: 18px; 
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); 
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.03);
        }

        h3 { font-size: 14px; font-weight: 800; color: var(--primary); margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; }

        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; font-size: 14px; box-sizing: border-box; }

        .insight-box { background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%); border-left: 5px solid var(--primary); padding: 15px; border-radius: 12px; }

        /* MODAL HP OPTIMIZED */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 9999;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 92%; max-width: 420px;
            border-radius: 24px; display: flex; flex-direction: column;
            max-height: 80vh; overflow: hidden; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header { padding: 18px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-weight: 800; color: var(--primary); }
        .modal-body { padding: 15px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }

        .btn-export { background: var(--success); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; margin-top: 15px; box-shadow: 0 4px 15px rgba(40,167,69,0.3); }
        .btn-open-log { background: #fff; border: 1.5px solid var(--primary); color: var(--primary); width: 100%; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; }

        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 20px; background: white; border-top: 1px solid #eee; z-index: 1000; box-sizing: border-box; }
        .btn-back { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; }
        
        .mutasi-item { display: flex; padding: 10px; background: #fafafa; border-radius: 10px; margin-bottom: 8px; align-items: center; }
        .mutasi-info { flex: 1; margin-left: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="background: var(--primary); color: white; border: none;">
        <h2 id="label-jc" style="margin: 0; font-size: 20px; font-weight: 900;">ANALISA JC ...</h2>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Rentang Analisis</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
        </select>
    </div>

    <div class="card" id="card-insight" style="display:none;">
        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Pertumbuhan Komsel</h3>
        <div class="insight-box">
            <div id="text-insight" style="font-size: 13px;">Menganalisis...</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-pie"></i> Visualisasi Capaian</h3>
        <div style="height: 200px;">
            <canvas id="performaChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-list-check"></i> Log Aktifitas</h3>
        <button class="btn-open-log" onclick="toggleLogModal(true)">LIHAT DETAIL LOG</button>
    </div>

    <div class="card" style="background: #fffdf5; border: 1.5px dashed #ffd54f;">
        <input type="password" id="pks-password" placeholder="Password PKS">
        <button class="btn-export" onclick="validateAndExport()">GENERATE PDF RESMI</button>
    </div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back">KEMBALI KE PANEL UTAMA</a>
    </div>
</div>

<div id="modal-log" class="modal-overlay" onclick="toggleLogModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span>LOG AKTIFITAS</span>
            <i class="fa-solid fa-times" onclick="toggleLogModal(false)"></i>
        </div>
        <div id="mutasi-list" class="modal-body">
            <p style="text-align:center; color:#999;">Memuat data...</p>
        </div>
    </div>
</div>

<script>
    // Config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";
    let unsub = null;

    // Inisialisasi
    async function init() {
        try {
            const email = (localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com").trim().toLowerCase();
            const snap = await db.collection("users").where("email", "==", email).get();
            
            if(!snap.empty) {
                userJC = String(snap.docs[0].data().komsel);
                document.getElementById("label-jc").innerText = "ANALISA JC " + userJC;
                initChart();
                sinkronisasiRealtime();
            }
        } catch (e) { alert("Gagal memuat data: " + e.message); }
    }

    function toggleLogModal(show) {
        document.getElementById("modal-log").style.display = show ? "flex" : "none";
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir', 'Absen'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#0056b3', '#28a745', '#dc3545'],
                    borderRadius: 8
                }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function sinkronisasiRealtime() {
        if (unsub) unsub();
        const periode = parseInt(document.getElementById("filter-periode").value);
        const batas = new Date();
        batas.setMonth(batas.getMonth() - periode);

        unsub = db.collection("laporan_bacaan")
            .where("komsel", "==", userJC)
            .where("tanggal", ">=", firebase.firestore.Timestamp.fromDate(batas))
            .onSnapshot(snap => {
                let html = "";
                let count = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    count++;
                    html += `<div class="mutasi-item" data-nama="${d.nama}">
                        <div class="mutasi-info"><b>${d.nama}</b><br><small>${d.pasal_utama || 'Baca Firman'}</small></div>
                        <i class="fas fa-check-circle" style="color:var(--success)"></i>
                    </div>`;
                });
                document.getElementById("mutasi-list").innerHTML = html || "Belum ada data.";
                
                const pAlkitab = Math.min(Math.round((count/(20*periode*4))*100), 100);
                myChart.data.datasets[0].data = [pAlkitab, 80, 20];
                myChart.update();
                
                document.getElementById("card-insight").style.display = "block";
                document.getElementById("text-insight").innerText = "Performa JC " + userJC + " saat ini mencapai " + pAlkitab + "%.";
            });
    }

    async function validateAndExport() {
        const pass = document.getElementById("pks-password").value;
        if(pass !== "rahasia123") return alert("Password Salah!");

        const btn = document.querySelector(".btn-export");
        btn.innerHTML = "MEMPROSES...";
        btn.disabled = true;

        setTimeout(() => {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.text("LAPORAN KOMSEL JC " + userJC, 20, 20);
                doc.text("Capaian Alkitab: " + myChart.data.datasets[0].data[0] + "%", 20, 30);
                
                const canvas = document.getElementById('performaChart');
                doc.addImage(canvas.toDataURL('image/jpeg', 0.8), 'JPEG', 20, 40, 100, 60);
                
                doc.save(`Laporan_JC${userJC}.pdf`);
                alert("Berhasil diunduh!");
            } catch (e) { alert("Error: " + e.message); }
            btn.innerHTML = "GENERATE PDF RESMI";
            btn.disabled = false;
        }, 500);
    }

    window.onload = init;
</script>
</body>
</html>
