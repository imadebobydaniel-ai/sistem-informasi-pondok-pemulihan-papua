<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 14px; text-transform: uppercase; margin-top: 0; color: #333; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        
        .realtime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .status-col { padding: 10px; border-radius: 12px; font-size: 11px; min-height: 120px; border: 1px solid #eee; }
        .col-hadir { background: #f0fff4; border-color: #c6f6d5; }
        .col-izin { background: #fff5f5; border-color: #fed7d7; }
        .col-alkitab { background: #ebf8ff; border-color: #bee3f8; }
        
        .status-title { font-weight: bold; margin-bottom: 8px; display: block; font-size: 11px; text-align: center; }
        .name-list { line-height: 1.4; color: #444; word-wrap: break-word; }
        .name-item { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 4px 0; }
        .reason { color: #c53030; font-style: italic; font-size: 9px; display: block; }

        .chart-container { position: relative; height: 220px; margin-bottom: 20px; }
        .btn-export { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-export:active { background: #218838; transform: scale(0.98); }
        .btn-back { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-calendar-check"></i> Periode Laporan</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
        <p id="label-jc" style="color:#007bff; font-weight:bold; margin: 12px 0 0 0; font-size: 15px;">Menghubungkan Database...</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-simple"></i> Performa Real-Time</h3>
        <div class="chart-container">
            <canvas id="performaChart"></canvas>
        </div>

        <div class="realtime-grid">
            <div class="status-col col-hadir">
                <span class="status-title" style="color: #2f855a;"><i class="fa-solid fa-check-double"></i> HADIR</span>
                <div id="list-hadir" class="name-list">...</div>
            </div>
            <div class="status-col col-izin">
                <span class="status-title" style="color: #c53030;"><i class="fa-solid fa-user-clock"></i> IZIN</span>
                <div id="list-izin" class="name-list">...</div>
            </div>
            <div class="status-col col-alkitab">
                <span class="status-title" style="color: #2b6cb0;"><i class="fa-solid fa-book-open"></i> FIRMAN</span>
                <div id="list-alkitab" class="name-list">...</div>
            </div>
        </div>
    </div>

    <div class="card" style="background: #fff3cd; border: 1px solid #ffeeba;">
        <h3 style="border-color: #856404; color: #856404;"><i class="fa-solid fa-shield-halved"></i> Verifikasi PKS</h3>
        <p style="font-size: 11px; margin-bottom: 10px; color: #666;">Hanya Ketua Komsel yang dapat melakukan ekspor data.</p>
        <input type="password" id="pks-password" placeholder="Masukkan Password PKS">
        <button class="btn-export" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> EKSPOR LAPORAN PDF
        </button>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart;
    let userJC = "";

    async function init() {
        // Fallback email jika localStorage kosong (untuk testing)
        const email = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        
        try {
            const snap = await db.collection("users").where("email", "==", email).get();
            if(!snap.empty) {
                userJC = snap.docs[0].data().komsel;
                document.getElementById("label-jc").innerText = "Laporan Khusus: JC " + userJC;
                initChart();
                sinkronisasiRealtime();
            } else {
                document.getElementById("label-jc").innerText = "Sesi Tidak Ditemukan";
            }
        } catch (e) {
            console.error(e);
            document.getElementById("label-jc").innerText = "Gagal Memuat Data";
        }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir', 'Izin'],
                datasets: [{
                    data: [0, 0, 0],
                    backgroundColor: ['#3182ce', '#38a169', '#e53e3e'],
                    borderRadius: 6
                }]
            },
            options: { 
                maintainAspectRatio: false, 
                scales: { 
                    y: { beginAtZero: true, max: 100, ticks: { callback: value => value + "%" } } 
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function sinkronisasiRealtime() {
        const periode = parseInt(document.getElementById("filter-periode").value);
        const batasWaktu = new Date();
        batasWaktu.setMonth(batasWaktu.getMonth() - periode);
        const tsBatas = firebase.firestore.Timestamp.fromDate(batasWaktu);
        const jcString = String(userJC);

        // 1. Sinkronisasi Kehadiran & Izin
        db.collection("kehadiran")
            .where("komsel", "==", jcString)
            .where("tanggal", ">=", tsBatas)
            .onSnapshot(snap => {
                let hCount = 0, iCount = 0;
                let htmlH = "", htmlI = "";
                
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.status === "Hadir") {
                        hCount++;
                        htmlH += `<div class="name-item">${d.nama}</div>`;
                    } else if(d.status === "Tidak Hadir") {
                        iCount++;
                        htmlI += `<div class="name-item">${d.nama}<span class="reason">(${d.alasan || 'Izin'})</span></div>`;
                    }
                });

                document.getElementById("list-hadir").innerHTML = htmlH || "<span style='color:#999'>Kosong</span>";
                document.getElementById("list-izin").innerHTML = htmlI || "<span style='color:#999'>Kosong</span>";
                
                const total = hCount + iCount;
                myChart.data.datasets[0].data[1] = total > 0 ? Math.round((hCount/total)*100) : 0;
                myChart.data.datasets[0].data[2] = total > 0 ? Math.round((iCount/total)*100) : 0;
                myChart.update();
            });

        // 2. Sinkronisasi Baca Alkitab (Firman)
        db.collection("laporan_bacaan")
            .where
