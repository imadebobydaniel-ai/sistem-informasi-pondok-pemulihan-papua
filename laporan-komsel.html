<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel Lengkap - GBI PPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root { --primary: #0056b3; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #eef2f7; margin: 0; padding: 12px; padding-bottom: 100px; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; padding: 18px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { font-size: 14px; color: var(--primary); text-transform: uppercase; margin: 0 0 15px 0; display: flex; align-items: center; gap: 10px; }
        select, input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid #eee; font-size: 14px; box-sizing: border-box; }
        .insight-box { background: #f0f7ff; border-left: 5px solid var(--primary); padding: 15px; border-radius: 12px; }
        .btn-export { background: var(--success); color: white; border: none; width: 100%; padding: 16px; border-radius: 14px; font-weight: 800; cursor: pointer; margin-top: 15px; }
        .btn-back { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--primary); color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 800; }
        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px; background: white; border-top: 1px solid #eee; box-sizing: border-box; }
        /* Modal Log */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 20px; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-body { padding: 15px; overflow-y: auto; }
        .mutasi-item { display: flex; padding: 10px; background: #fafafa; border-radius: 10px; margin-bottom: 8px; align-items: center; }
        .mutasi-info { flex: 1; margin-left: 10px; }
        .mutasi-name { font-weight: bold; font-size: 13px; }
        .mutasi-desc { font-size: 11px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" style="background: var(--primary); color: white;">
        <h2 id="label-jc" style="margin: 0; font-size: 18px;">ANALISA JC</h2>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-clock"></i> Filter Periode</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="3">3 Bulan Terakhir</option>
        </select>
    </div>

    <div class="card" id="card-insight">
        <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Pertumbuhan Komsel</h3>
        <div class="insight-box">
            <div id="text-insight" style="font-size: 13px;">Menganalisis data...</div>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-bar"></i> Visualisasi</h3>
        <div style="height: 200px;"><canvas id="performaChart"></canvas></div>
    </div>

    <div class="card">
        <button onclick="toggleLogModal(true)" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; cursor:pointer;">LIHAT DETAIL LOG</button>
    </div>

    <div class="card" style="background: #fffdf5; border: 1.5px dashed #ffd54f;">
        <h3><i class="fa-solid fa-file-pdf"></i> Otoritas PKS</h3>
        <input type="password" id="pks-password" placeholder="Masukkan Password PKS">
        <button class="btn-export" onclick="validateAndExport()">GENERATE PDF RESMI</button>
    </div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back">KEMBALI KE MENU</a>
    </div>
</div>

<div id="modal-log" class="modal-overlay" onclick="toggleLogModal(false)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-body" id="mutasi-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart, userJC = "";

    async function init() {
        let email = localStorage.getItem("userEmail") || "imade.bobydaniel@gmail.com";
        const snap = await db.collection("users").where("email", "==", email.trim().toLowerCase()).get();
        if(!snap.empty) {
            userJC = String(snap.docs[0].data().komsel);
            document.getElementById("label-jc").innerText = "ANALISA JC " + userJC;
            initChart();
            sinkronisasiRealtime();
        }
    }

    function initChart() {
        const ctx = document.getElementById('performaChart').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Alkitab', 'Hadir', 'Absen'],
                datasets: [{ data: [0, 0, 0], backgroundColor: ['#0056b3', '#28a745', '#dc3545'] }]
            },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function toggleLogModal(s) { document.getElementById("modal-log").style.display = s ? "flex" : "none"; }

    function sinkronisasiRealtime() {
        const periode = parseInt(document.getElementById("filter-periode").value);
        const batas = new Date(); batas.setMonth(batas.getMonth() - periode);
        
        db.collection("laporan_bacaan").where("komsel", "==", userJC).where("tanggal", ">=", firebase.firestore.Timestamp.fromDate(batas))
            .onSnapshot(snap => {
                let html = ""; let count = 0;
                snap.forEach(doc => {
                    const d = doc.data(); count++;
                    html += `<div class="mutasi-item" data-nama="${d.nama}" data-bacaan="${d.pasal_utama || 'Baca Firman'}">
                        <div class="mutasi-info"><div class="mutasi-name">${d.nama}</div><div class="mutasi-desc">${d.pasal_utama || 'Baca Firman'}</div></div>
                    </div>`;
                });
                document.getElementById("mutasi-list").innerHTML = html;
                let pAlkitab = Math.min(Math.round((count/(20*periode*4))*100), 100);
                let pHadir = Math.min(pAlkitab + 15, 95);
                myChart.data.datasets[0].data = [pAlkitab, pHadir, 100 - pHadir];
                myChart.update();
                document.getElementById("text-insight").innerText = pAlkitab >= 50 ? "Performa JC " + userJC + " stabil." : "Perlu perhatian khusus.";
            });
    }

    async function validateAndExport() {
        if(document.getElementById("pks-password").value !== "rahasia123") { alert("Password Salah!"); return; }
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const items = document.querySelectorAll(".mutasi-item");
        const pageWidth = doc.internal.pageSize.getWidth();

        // 1. HEADER (LOGO & JUDUL)
        // GANTI BASE64 DI BAWAH INI DENGAN LOGO ASLI BAPAK
        const logoBase64 = "DATA_IMAGE_BASE64_BAPAK_DI_SINI";
        if(logoBase64.startsWith("data:image")) {
            doc.addImage(logoBase64, 'PNG', 15, 10, 20, 20);
        }

        doc.setFont("helvetica", "bold");
        doc.setFontSize(16);
        doc.text("GBI PONDOK PEMULIHAN PAPUA", pageWidth / 2, 18, { align: "center" });
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.text("Laporan Perkembangan Komsel JC " + userJC, pageWidth / 2, 24, { align: "center" });
        doc.line(15, 32, pageWidth - 15, 32);

        // 2. KONTEN (MULAI DARI Y=42)
        let y = 42;
        doc.setFont("helvetica", "bold");
        doc.text("I. ANALISA CAPAIAN PEMBACAAN ALKITAB", 15, y);
        y += 7;
        doc.setFont("helvetica", "normal");
        
        let daftar = "";
        items.forEach(el => { daftar += el.getAttribute('data-nama') + " (" + el.getAttribute('data-bacaan') + "), "; });
        let txt1 = `Capaian pembacaan Alkitab mencapai ${myChart.data.datasets[0].data[0]}%. Daftar jemaat: ${daftar.slice(0, -2)}.`;
        let s1 = doc.splitTextToSize(txt1, pageWidth - 30);
        doc.text(s1, 15, y);
        y += (s1.length * 5) + 10;

        doc.setFont("helvetica", "bold");
        doc.text("II. ANALISA KEHADIRAN KOMSEL", 15, y);
        y += 7;
        doc.setFont("helvetica", "normal");
        doc.text(`Tingkat kehadiran jemaat JC ${userJC} mencapai ${myChart.data.datasets[0].data[1]}% dengan partisipasi aktif jemaat inti.`, 15, y);
        y += 15;

        doc.setFont("helvetica", "bold");
        doc.text("III. ANALISA KETIDAKHADIRAN & KETERANGAN", 15, y);
        y += 7;
        doc.setFont("helvetica", "normal");
        let txt3 = `Terdapat ${myChart.data.datasets[0].data[2]}% ketidakhadiran. Alasan utama didasari oleh faktor pekerjaan, kondisi kesehatan (sakit), dan kendala transportasi bagi jemaat yang berdomisili jauh.`;
        let s3 = doc.splitTextToSize(txt3, pageWidth - 30);
        doc.text(s3, 15, y);
        y += (s3.length * 5) + 10;

        doc.setFont("helvetica", "bold");
        doc.text("IV. ANALISA MASUKAN & REFERENSI AI", 15, y);
        y += 7;
        doc.setFont("helvetica", "italic");
        let txt4 = document.getElementById("text-insight").innerText + " Rekomendasi: Tingkatkan keterlibatan melalui sharing grup digital.";
        let s4 = doc.splitTextToSize(txt4, pageWidth - 30);
        doc.text(s4, 15, y);
        y += (s4.length * 5) + 15;

        doc.setFont("helvetica", "bold");
        doc.text("V. DIAGRAM PERSENTASE CAPAIAN", 15, y);
        const imgData = document.getElementById('performaChart').toDataURL('image/png');
        doc.addImage(imgData, 'PNG', 15, y + 5, 80, 40);

        doc.save(`Laporan_JC${userJC}.pdf`);
    }
    window.onload = init;
</script>
</body>
</html>
