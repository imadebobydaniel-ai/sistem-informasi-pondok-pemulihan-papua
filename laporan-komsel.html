<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Laporan Komsel - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px; }
        h3 { border-bottom: 2px solid #007bff; padding-bottom: 10px; font-size: 14px; text-transform: uppercase; margin-top: 0; color: #333; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; }
        
        .realtime-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 15px; }
        .status-col { padding: 8px; border-radius: 12px; font-size: 10px; min-height: 120px; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center; text-align: center; background: #fff; }
        .col-hadir { background: #f0fff4; border-color: #c6f6d5; }
        .col-izin { background: #fff5f5; border-color: #fed7d7; }
        .col-alkitab { background: #ebf8ff; border-color: #bee3f8; }
        
        .status-title { font-weight: bold; margin-bottom: 8px; display: block; font-size: 10px; }
        .name-list { width: 100%; margin-top: 5px; line-height: 1.3; color: #444; }
        .name-item { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 4px 0; font-size: 9px; word-break: break-word; }
        .reason { color: #c53030; font-style: italic; font-size: 8px; display: block; }

        .chart-container { position: relative; height: 250px; margin-bottom: 20px; width: 100%; }
        .btn-export { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-back { position: fixed; bottom: 20px; left: 20px; right: 20px; background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-calendar-check"></i> Periode Laporan</h3>
        <select id="filter-periode" onchange="sinkronisasiRealtime()">
            <option value="1">1 Bulan Terakhir</option>
            <option value="2">2 Bulan Terakhir</option>
            <option value="4">4 Bulan Terakhir</option>
            <option value="5">5 Bulan Terakhir</option>
            <option value="6">6 Bulan Terakhir</option>
        </select>
        <p id="label-jc" style="color:#007bff; font-weight:bold; margin-top: 10px;">Menghubungkan Database...</p>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-chart-simple"></i> Performa Real-Time</h3>
        <div class="chart-container">
            <canvas id="performaChart"></canvas>
        </div>

        <div class="realtime-grid">
            <div class="status-col col-hadir">
                <span class="status-title" style="color: #2f855a;"><i class="fa-solid fa-check"></i> HADIR</span>
                <div id="list-hadir" class="name-list">---</div>
            </div>
            <div class="status-col col-izin">
                <span class="status-title" style="color: #c53030;"><i class="fa-solid fa-clock"></i> IZIN</span>
                <div id="list-izin" class="name-list">---</div>
            </div>
            <div class="status-col col-alkitab">
                <span class="status-title" style="color: #2b6cb0;"><i class="fa-solid fa-book"></i> FIRMAN</span>
                <div id="list-alkitab" class="name-list">---</div>
            </div>
        </div>
    </div>

    <div class="card" style="background: #fff3cd;">
        <h3 style="border-color: #856404; color: #856404;"><i class="fa-solid fa-shield-halved"></i> Verifikasi PKS</h3>
        <input type="password" id="pks-password" placeholder="Masukkan Password PKS">
        <button class="btn-export" onclick="validateAndExport()">
            <i class="fa-solid fa-file-pdf"></i> EKSPOR PDF
        </button>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
