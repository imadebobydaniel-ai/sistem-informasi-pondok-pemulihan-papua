<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Pondok Pemulihan Papua</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #status-msg { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <h2 id="title">Memvalidasi...</h2>
        <div id="form-reset" style="display: none;">
            <p>Masukkan password baru Anda</p>
            <input type="password" id="pw1" placeholder="Password Baru">
            <input type="password" id="pw2" placeholder="Ulangi Password Baru">
            <button onclick="prosesReset()" class="btn">Perbarui Password</button>
        </div>
        <div id="status-msg"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project"
        };
        firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const code = urlParams.get('oobCode');

        // Cek apakah mode benar-benar resetPassword
        if (mode === 'resetPassword' && code) {
            auth.verifyPasswordResetCode(code).then((email) => {
                document.getElementById('title').innerText = "Atur Password Baru";
                document.getElementById('form-reset').style.display = "block";
                document.getElementById('status-msg').innerText = "Mereset akun: " + email;
            }).catch(e => {
                document.getElementById('title').innerText = "Link Kadaluwarsa";
                document.getElementById('status-msg').innerHTML = "<span style='color:red'>Tautan sudah tidak valid atau sudah digunakan.</span>";
            });
        } else {
            document.getElementById('title').innerText = "Akses Ditolak";
            document.getElementById('status-msg').innerText = "Tautan tidak dikenali.";
        }

        function prosesReset() {
            const p1 = document.getElementById('pw1').value;
            const p2 = document.getElementById('pw2').value;

            if (p1 !== p2 || p1.length < 6) {
                alert("Password tidak cocok atau kurang dari 6 karakter");
                return;
            }

            auth.confirmPasswordReset(code, p1).then(() => {
                alert("Password berhasil diubah!");
                window.location.href = "index.html"; // Balik ke login
            }).catch(e => {
                alert("Gagal: " + e.message);
            });
        }
    </script>
</body>
</html>
