<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 30px; display: inline-block; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Atur Password Baru</h2>
        <p>Masukkan password baru Anda di bawah ini:</p>
        <input type="password" id="new-password" placeholder="Password Baru">
        <button onclick="handleReset()" class="btn">Simpan Password</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project"
        };
        firebase.initializeApp(firebaseConfig);

        const actionCode = new URLSearchParams(window.location.search).get('oobCode');

        function handleReset() {
            const newPassword = document.getElementById('new-password').value;
            if (newPassword.length < 6) { alert("Minimal 6 karakter!"); return; }

            firebase.auth().confirmPasswordReset(actionCode, newPassword).then(() => {
                alert("Password Berhasil Diubah!");
                window.location.href = "login.html";
            }).catch(error => { alert("Gagal: " + error.message); });
        }
    </script>
</body>
</html>
