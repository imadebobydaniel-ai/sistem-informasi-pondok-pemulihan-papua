<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - Pondok Pemulihan</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 30px; display: inline-block; width: 350px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .error { color: red; font-size: 13px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Atur Password Baru</h2>
        <p>Minimal 6 karakter (huruf, angka, atau simbol)</p>
        
        <input type="password" id="pw1" placeholder="Password Baru">
        <input type="password" id="pw2" placeholder="Ulangi Password Baru">
        <div id="pesan-error" class="error"></div>
        
        <button onclick="simpanPassword()" class="btn">Simpan Password</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project"
        };
        firebase.initializeApp(firebaseConfig);

        // Kode ini akan otomatis menangkap 'oobCode' yang dikirim Firebase
        const code = new URLSearchParams(window.location.search).get('oobCode');

        function simpanPassword() {
            const p1 = document.getElementById('pw1').value;
            const p2 = document.getElementById('pw2').value;
            const err = document.getElementById('pesan-error');

            if (p1.length < 6) {
                err.innerText = "Password minimal 6 karakter!";
                err.style.display = "block";
                return;
            }
            if (p1 !== p2) {
                err.innerText = "Password tidak cocok!";
                err.style.display = "block";
                return;
            }

            if (!code) {
                alert("Kode aksi tidak ditemukan. Silakan gunakan link terbaru dari email.");
                return;
            }

            firebase.auth().confirmPasswordReset(code, p1).then(() => {
                alert("Password Berhasil Diubah!");
                window.location.href = "login.html";
            }).catch(e => {
                alert("Gagal: " + e.message);
            });
        }
    </script>
</body>
</html>
