<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner QR SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2563eb;
            --success-color: #10b981;
            --bg-color: #f8fafc;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            margin: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .scanner-card { 
            width: 100%;
            max-width: 450px; 
            background: white; 
            padding: 24px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            margin: 15px;
        }
        #reader { 
            width: 100%; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #000;
            border: 2px solid #e2e8f0;
        }
        .info-status { 
            margin-top: 20px; 
            padding: 16px; 
            border-radius: 12px; 
            background: #f1f5f9; 
            color: #475569; 
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-close {
            float: left;
            color: #94a3b8;
            text-decoration: none;
            font-size: 1.2rem;
        }
        .header-text h2 { margin: 0; color: #1e293b; font-size: 1.5rem; }
        .header-text p { color: #64748b; font-size: 0.9rem; margin-top: 5px; margin-bottom: 20px; }
        
        /* Animasi saat sukses */
        .status-success { background: #dcfce7; color: #15803d; }
        .status-loading { background: #fef3c7; color: #b45309; }
    </style>
</head>
<body>

    <div class="scanner-card">
        <a href="index.html" class="btn-close"><i class="fas fa-times"></i></a>
        <div class="header-text">
            <h2>Scan QR Code</h2>
            <p>Arahkan ke Kartu Digital SIPAPUA</p>
        </div>

        <div id="reader"></div>

        <div id="info-status" class="info-status">
            <i class="fas fa-camera"></i> Siap Memindai...
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>

    <script>
        // --- KONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const infoBox = document.getElementById('info-status');
        const html5QrCode = new Html5Qrcode("reader");

        // Fungsi saat scan berhasil
        function onScanSuccess(decodedText) {
            html5QrCode.pause(); // Jeda scan agar tidak spam
            
            infoBox.className = "info-status status-loading";
            infoBox.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Memproses Data...";

            prosesDataQR(decodedText);
        }

        async function prosesDataQR(qrContent) {
            try {
                // Kamu bisa sesuaikan nama koleksi (misal: absensi, validasi_kartu, dll)
                await db.collection("absensi_kegiatan").add({
                    id_pengguna: qrContent,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    lokasi: "Sistem SIPAPUA",
                    status: "TERVERIFIKASI"
                });

                infoBox.className = "info-status status-success";
                infoBox.innerHTML = `<i class='fas fa-check-circle'></i> Berhasil: ${qrContent}`;

                // Tunggu 3 detik lalu aktifkan kamera lagi
                setTimeout(() => {
                    infoBox.className = "info-status";
                    infoBox.innerHTML = "<i class='fas fa-camera'></i> Siap Memindai...";
                    html5QrCode.resume();
                }, 3000);

            } catch (error) {
                alert("Error: " + error.message);
                html5QrCode.resume();
            }
        }

        // Jalankan Kamera
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(err => {
                infoBox.innerHTML = "<i class='fas fa-exclamation-triangle'></i> Kamera tidak ditemukan";
                console.error(err);
            });
    </script>
</body>
</html>
