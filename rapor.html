<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor Anda - Sistem Informasi Pondok Pemulihan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .stat-card { padding: 12px; border-radius: 10px; color: white; text-align: center; }
        .bg-sangat-kurang { background: #ff0000 !important; }
        .bg-kurang { background: #ed7d31 !important; }
        .bg-cukup { background: #548235 !important; }
        .bg-sangat-baik { background: #00FF00 !important; color: black !important; }
        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 10px; color: #000; margin-top: 10px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 5px; text-align: center; }
        @media (max-width: 768px) { .chart-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <div>
            <h2 style="margin:0; color: #2c3e50;">REKAPITULASI CAPAIAN PRIBADI</h2>
            <p id="user-info" style="color:#666; font-size: 13px; margin: 5px 0 0 0;">Mengambil data dari sesi aplikasi...</p>
        </div>
        <button onclick="history.back()" style="background:#3498db; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;"><i class="fas fa-arrow-left"></i> Kembali</button>
    </div>

    <div class="header-stats" id="cards-container"></div>

    <div class="chart-section">
        <canvas id="pieChart"></canvas>
        <canvas id="barChart"></canvas>
    </div>

    <div style="overflow-x: auto; border-top: 3px solid #000;">
        <h3 style="font-size:14px; margin: 15px 0 10px 0;">TABEL RINCI (FORMAT REKAPITULASI)</h3>
        <table class="excel-table">
            <thead>
                <tr>
                    <th rowspan="2">NO</th><th rowspan="2">KOMSEL</th><th rowspan="2">NAMA</th>
                    <th colspan="4">JUMLAH (%)</th><th rowspan="2">KETERANGAN</th>
                </tr>
                <tr>
                    <th>PEMBACAAN FT</th><th>KEHADIRAN DOA</th><th>KEHADIRAN KOMSEL</th><th>IBADAH RAYA</th>
                </tr>
            </thead>
            <tbody id="excel-table-body"></tbody>
        </table>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        databaseURL: "https://project-anda-default-rtdb.firebaseio.com",
        projectId: "project-anda",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // LANGSUNG DETEKSI USER DARI SESI APLIKASI
    auth.onAuthStateChanged(user => {
        if (user) {
            // User sudah login di menu.html, langsung ambil datanya berdasarkan UID tersebut
            loadUserReportData(user.uid);
        } else {
            alert("Sesi habis atau belum login di aplikasi utama.");
            window.location.href = "index.html"; // Lempar ke halaman utama jika sesi hilang
        }
    });

    function getKategori(val) {
        if (val >= 90) return { label: "SANGAT BAIK", class: "bg-sangat-baik" };
        if (val >= 75) return { label: "CUKUP", class: "bg-cukup" };
        if (val >= 40) return { label: "KURANG", class: "bg-kurang" };
        return { label: "SANGAT KURANG", class: "bg-sangat-kurang" };
    }

    function loadUserReportData(uid) {
        db.ref('statistik_rapor/' + uid).on('value', snapshot => {
            const data = snapshot.val();
            if (data) {
                renderHalaman(data);
            } else {
                document.getElementById('user-info').innerText = "Data rapor untuk akun Anda belum tersedia.";
            }
        });
    }

    function renderHalaman(data) {
        document.getElementById('user-info').innerText = `Pemilik: ${data.nama} | Periode: Maret 2026`;
        
        const metrics = {
            ft: data["PEMBACAAN FT"] || 0,
            doa: data["KEHADIRAN DOA"] || 0,
            komsel: data["KEHADIRAN KOMSEL"] || 0,
            raya: data["IBADAH RAYA"] || 0
        };

        // 1. Update Kartu Skor
        const cardsCont = document.getElementById('cards-container');
        cardsCont.innerHTML = "";
        Object.entries(metrics).forEach(([key, val]) => {
            let label = key === 'ft' ? 'PEMBACAAN FT' : 'KEHADIRAN ' + key.toUpperCase();
            let kat = getKategori(val);
            cardsCont.innerHTML += `
                <div class="stat-card ${kat.class}">
                    <div style="font-size:9px; font-weight:bold;">${label}</div>
                    <div style="font-size:18px; font-weight:bold;">${val}%</div>
                    <div style="font-size:8px;">${kat.label}</div>
                </div>`;
        });

        // 2. Update Tabel Rinci (Hanya menampilkan baris user tersebut)
        document.getElementById('excel-table-body').innerHTML = `
            <tr>
                <td>1</td>
                <td style="background:#f4cccc; font-weight:bold;">${data.grup_komsel || '-'}</td>
                <td style="text-align:left; font-weight:bold;">${data.nama}</td>
                <td class="${getKategori(metrics.ft).class}">${metrics.ft}%</td>
                <td class="${getKategori(metrics.doa).class}">${metrics.doa}%</td>
                <td class="${getKategori(metrics.komsel).class}">${metrics.komsel}%</td>
                <td class="${getKategori(metrics.raya).class}">${metrics.raya}%</td>
                <td>-</td>
            </tr>`;
        
        updateCharts(metrics);
    }

    function updateCharts(m) {
        // Pie Chart
        new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: ['FT', 'Doa', 'Komsel', 'Raya'],
                datasets: [{ data: [m.ft, m.doa, m.komsel, m.raya], backgroundColor: ['#2ecc71','#e74c3c','#f1c40f','#3498db'] }]
            }
        });
        // Bar Chart
        new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['FT', 'Doa', 'Komsel', 'Raya'],
                datasets: [{ label: '% Capaian', data: [m.ft, m.doa, m.komsel, m.raya], backgroundColor: '#548235' }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }
</script>
</body>
</html>
