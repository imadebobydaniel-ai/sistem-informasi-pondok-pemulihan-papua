<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAPOR ANDA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; margin: 0; padding: 10px; color: #000; }
        .container { max-width: 1000px; margin: auto; }
        
        h2 { text-align: center; text-transform: uppercase; margin-bottom: 5px; font-size: 18px; }
        .sub-header { text-align: center; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }

        .info-table { width: 100%; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        
        table.rapor-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        table.rapor-table th, table.rapor-table td { border: 1px solid #000; padding: 8px; text-align: center; }
        table.rapor-table th { background-color: #fff; text-transform: uppercase; }
        
        .komsel-row { background-color: #fce4d6; font-weight: bold; text-align: left !important; }

        /* Keterangan Warna Sesuai Gambar Excel */
        .sangat-baik { background-color: #00FF00; color: #000; } /* Hijau Terang */
        .cukup { background-color: #548235; color: #fff; }       /* Hijau Tua */
        .kurang { background-color: #ed7d31; color: #000; }      /* Oranye */
        .sangat-kurang { background-color: #ff0000; color: #fff; } /* Merah */

        .btn-keluar { display: block; width: 200px; margin: 30px auto; padding: 10px; background: #004080; color: white; text-align: center; text-decoration: none; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>RAPOR ANDA</h2>
    <div class="sub-header" id="bulan-tahun">MARET 2026</div>

    <table class="info-table">
        <tr>
            <td width="15%">GEREJA</td><td>: <span id="u-gereja">-</span></td>
            <td width="15%">WILAYAH</td><td>: <span id="u-wilayah">-</span></td>
        </tr>
    </table>

    <table class="rapor-table">
        <thead>
            <tr>
                <th rowspan="2">KOMSEL</th>
                <th rowspan="2">NAMA</th>
                <th colspan="4">JUMLAH (%)</th>
                <th rowspan="2">KETERANGAN</th>
            </tr>
            <tr>
                <th>PEMBACAAN FT</th>
                <th>KEHADIRAN DOA</th>
                <th>KEHADIRAN KOMSEL</th>
                <th>IBADAH RAYA</th>
            </tr>
        </thead>
        <tbody id="rapor-content">
            <tr><td colspan="7">Memuat data rapor...</td></tr>
        </tbody>
    </table>

    <a href="menu.html" class="btn-keluar">KEMBALI</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
        if (user) {
            fetchRaporData(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    function getStatusClass(val) {
        if (val >= 95) return 'sangat-baik';
        if (val >= 80) return 'cukup';
        if (val >= 50) return 'kurang';
        return 'sangat-kurang';
    }

    function getKeterangan(val) {
        if (val >= 95) return 'SANGAT BAIK';
        if (val >= 80) return 'CUKUP';
        if (val >= 50) return 'KURANG';
        return 'SANGAT KURANG';
    }

    function fetchRaporData(uid) {
        db.ref('users/' + uid).once('value').then(snapshot => {
            const u = snapshot.val() || {};
            document.getElementById('u-gereja').innerText = u.gereja || "-";
            document.getElementById('u-wilayah').innerText = u.wilayah || "-";

            return db.ref('rapor/' + uid).once('value');
        }).then(snapshot => {
            const r = snapshot.val() || { ft: 0, doa: 0, komsel: 0, ibadah: 0 };
            const userSnap = document.getElementById('u-gereja').innerText; // Dummy check

            // Menghitung rata-rata untuk kolom keterangan
            const avg = (r.ft + r.doa + r.komsel + r.ibadah) / 4;

            const html = `
                <tr class="komsel-row">
                    <td colspan="7">${document.getElementById('u-wilayah').innerText} / ${document.getElementById('u-komsel-info')?.innerText || 'KOMSEL'}</td>
                </tr>
                <tr>
                    <td>-</td>
                    <td style="text-align:left;">${auth.currentUser.displayName || 'Nama User'}</td>
                    <td class="${getStatusClass(r.ft)}">${r.ft}%</td>
                    <td class="${getStatusClass(r.doa)}">${r.doa}%</td>
                    <td class="${getStatusClass(r.komsel)}">${r.komsel}%</td>
                    <td class="${getStatusClass(r.ibadah)}">${r.ibadah}%</td>
                    <td class="${getStatusClass(avg)}">${getKeterangan(avg)}</td>
                </tr>
            `;
            document.getElementById('rapor-content').innerHTML = html;
        });
    }
</script>

</body>
</html>
