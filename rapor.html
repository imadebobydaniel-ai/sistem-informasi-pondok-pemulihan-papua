<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor Anda - Sistem Informasi Pondok Pemulihan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; padding: 20px; display: none; }
        .dashboard-container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Grid Kartu Statistik */
        .header-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .stat-card { padding: 12px; border-radius: 10px; color: white; text-align: center; }
        
        /* Kategori Warna Sesuai Gambar Keterangan */
        .bg-sangat-kurang { background: #ff0000 !important; }
        .bg-kurang { background: #ed7d31 !important; }
        .bg-cukup { background: #548235 !important; }
        .bg-sangat-baik { background: #00FF00 !important; color: black !important; }

        .chart-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        
        /* Tabel Style Excel */
        .excel-table-container { overflow-x: auto; margin-top: 20px; border-top: 3px solid #000; }
        .excel-table { width: 100%; border-collapse: collapse; font-size: 10px; color: #000; margin-top: 10px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 5px; text-align: center; }
        .excel-table th { background: #f2f2f2; }
        .col-komsel { background-color: #f4cccc; font-weight: bold; }
        
        .btn-logout { background:#e74c3c; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight: bold; }
        @media (max-width: 768px) { .chart-section { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px;">
        <div>
            <h2 style="margin:0; color: #2c3e50;">REKAPITULASI CAPAIAN PRIBADI</h2>
            <p id="user-info" style="color:#666; font-size: 13px; margin: 5px 0 0 0;">Memuat data...</p>
        </div>
        <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>

    <div class="header-stats" id="cards-container"></div>

    <div class="chart-section">
        <div>
            <h3 style="font-size:14px; text-align:center;">Proporsi Keaktifan (Pie Chart)</h3>
            <canvas id="pieChart"></canvas>
        </div>
        <div>
            <h3 style="font-size:14px; text-align:center;">Perbandingan Capaian (Bar Chart)</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>

    <div class="excel-table-container">
        <h3 style="font-size:14px; margin: 15px 0 10px 0;">TABEL RINCI (FORMAT REKAPITULASI DATABASE)</h3>
        <table class="excel-table">
            <thead>
                <tr>
                    <th rowspan="2">NO</th>
                    <th rowspan="2">KOMSEL</th>
                    <th rowspan="2">NAMA</th>
                    <th colspan="9">JENIS KEGIATAN (%)</th>
                    <th rowspan="2">KETERANGAN</th>
                </tr>
                <tr>
                    <th>ALKITAB</th>
                    <th>RAYA</th>
                    <th>KOMSEL</th>
                    <th>GABUNGAN</th>
                    <th>PEMIMPIN</th>
                    <th>KD</th>
                    <th>LATIHAN</th>
                    <th>PELAYANAN</th>
                    <th>DOA</th>
                </tr>
            </thead>
            <tbody id="excel-table-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
        // Tempelkan Config Anda di sini (apiKey, authDomain, dll)
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    // Verifikasi Login
    auth.onAuthStateChanged(user => {
        if (user) {
            document.body.style.display = "block";
            loadUserReportData(user.uid, user.email);
        } else {
            window.location.href = "login.html";
        }
    });

    function getKategori(val) {
        if (val >= 90) return { label: "SANGAT BAIK", class: "bg-sangat-baik" };
        if (val >= 75) return { label: "CUKUP", class: "bg-cukup" };
        if (val >= 40) return { label: "KURANG", class: "bg-kurang" };
        return { label: "SANGAT KURANG", class: "bg-sangat-kurang" };
    }

    function loadUserReportData(uid, email) {
        db.ref('statistik_rapor/' + uid).on('value', snapshot => {
            const data = snapshot.val();
            if (data) {
                renderHalaman(data, email);
            } else {
                document.getElementById('user-info').innerText = "Data rapor belum tersedia. Hubungi Admin.";
                document.body.style.display = "block";
            }
        });
    }

    function renderHalaman(data, email) {
        document.getElementById('user-info').innerText = `Pemilik: ${data.nama || email} | Periode: Maret 2026`;
        
        const cardsCont = document.getElementById('cards-container');
        const excelTable = document.getElementById('excel-table-body');
        
        // Pemetaan data dari Firebase (9 Laporan)
        const d = {
            alkitab: data["LAPORAN ALKITAB"] || 0,
            raya: data["LAPORAN IBADAH RAYA"] || 0,
            komsel: data["LAPORAN KOMSEL"] || 0,
            gabungan: data["LAPORAN KOMSEL GABUNGAN"] || 0,
            pemimpin: data["LAPORAN PERTEMUAN PEMIMPIN"] || 0,
            kd: data["LAPORAN KEGIATAN KD"] || 0,
            latihan: data["LAPORAN LATIHAN"] || 0,
            pelayanan: data["LAPORAN PELAYANAN"] || 0,
            doa: data["LAPORAN DOA"] || 0
        };

        // 1. Update Kartu Highlight (Semua 9 Masuk)
        cardsCont.innerHTML = "";
        Object.keys(d).forEach(key => {
            let label = key.toUpperCase();
            let val = d[key];
            cardsCont.innerHTML += `
                <div class="stat-card ${getKategori(val).class}">
                    <div style="font-size:9px; font-weight:bold;">${label}</div>
                    <div style="font-size:18px; font-weight:bold;">${val}%</div>
                    <div style="font-size:8px;">${getKategori(val).label}</div>
                </div>`;
        });

        // 2. Update Tabel Rinci
        excelTable.innerHTML = `
            <tr>
                <td>1</td>
                <td class="col-komsel">${data.grup_komsel || '-'}</td>
                <td style="text-align:left; font-weight:bold;">${data.nama || 'User'}</td>
                <td class="${getKategori(d.alkitab).class}">${d.alkitab}%</td>
                <td class="${getKategori(d.raya).class}">${d.raya}%</td>
                <td class="${getKategori(d.komsel).class}">${d.komsel}%</td>
                <td class="${getKategori(d.gabungan).class}">${d.gabungan}%</td>
                <td class="${getKategori(d.pemimpin).class}">${d.pemimpin}%</td>
                <td class="${getKategori(d.kd).class}">${d.kd}%</td>
                <td class="${getKategori(d.latihan).class}">${d.latihan}%</td>
                <td class="${getKategori(d.pelayanan).class}">${d.pelayanan}%</td>
                <td class="${getKategori(d.doa).class}">${d.doa}%</td>
                <td>-</td>
            </tr>
        `;

        updateCharts(d);
    }

    function updateCharts(d) {
        // Pie Chart: 4 Pilar Utama
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        if (window.myPie) window.myPie.destroy();
        window.myPie = new Chart(ctxPie, {
            type: 'doughnut',
            data: {
                labels: ['Alkitab', 'Raya', 'Komsel', 'Doa'],
                datasets: [{
                    data: [d.alkitab, d.raya, d.komsel, d.doa],
                    backgroundColor: ['#2ecc71','#3498db','#f1c40f','#e74c3c']
                }]
            }
        });

        // Bar Chart: Semua Capaian
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (window.myBar) window.myBar.destroy();
        window.myBar = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Gab', 'Pemimpin', 'KD', 'Latih', 'Layan'],
                datasets: [{
                    label: '% Capaian',
                    data: [d.gabungan, d.pemimpin, d.kd, d.latihan, d.pelayanan],
                    backgroundColor: '#548235'
                }]
            },
            options: { scales: { y: { beginAtZero: true, max: 100 } } }
        });
    }

    function logout() {
        auth.signOut().then(() => { window.location.href = "login.html"; });
    }
</script>

</body>
</html>
