<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapor Anda - Pondok Pemulihan</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px; }
        .user-info { display: flex; justify-content: space-between; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f2f2f2; font-size: 13px; }
        
        /* Indikator Warna sesuai Excel */
        .excel-green { background-color: #00FF00; color: black; font-weight: bold; }
        .excel-yellow { background-color: #FFFF00; color: black; font-weight: bold; }
        .excel-red { background-color: #FF0000; color: white; font-weight: bold; }
        
        .loading { text-align: center; color: #888; font-style: italic; }
        .btn-back { display: block; width: 100%; padding: 10px; margin-top: 20px; background: #007bff; color: white; text-align: center; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>REKAPITULASI PRIBADI</h2>
        <p id="tgl-sekarang"></p>
    </div>

    <div class="user-info" id="info-box">
        <div>
            <strong>Nama:</strong> <span id="u-nama">Memuat...</span><br>
            <strong>Komsel:</strong> <span id="u-komsel">-</span>
        </div>
        <div style="text-align: right;">
            <strong>Wilayah:</strong> <span id="u-wilayah">-</span><br>
            <strong>Gereja:</strong> <span id="u-gereja">-</span>
        </div>
    </div>

    <div id="loading-msg" class="loading">Menghubungkan ke database jemaat...</div>

    <table id="main-table" style="display:none;">
        <thead>
            <tr>
                <th>JENIS LAPORAN</th>
                <th>CAPAIAN</th>
                <th>KETERANGAN</th>
            </tr>
        </thead>
        <tbody id="rapor-body">
            </tbody>
    </table>

    <a href="menu.html" class="btn-back">Kembali ke Menu Utama</a>
</div>

<script>
    // Konfigurasi Firebase Anda
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.database();

    // Set Tanggal Otomatis
    const d = new Date();
    document.getElementById('tgl-sekarang').innerText = d.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

    auth.onAuthStateChanged(user => {
        if (user) {
            loadUserData(user.uid);
        } else {
            window.location.href = "login.html";
        }
    });

    function loadUserData(uid) {
        // 1. Ambil data Profil User (Nama, Komsel, dll)
        db.ref('users/' + uid).once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('u-nama').innerText = data.namaLengkap || "User";
                document.getElementById('u-komsel').innerText = data.komsel || "-";
                document.getElementById('u-wilayah').innerText = data.wilayah || "-";
                document.getElementById('u-gereja').innerText = data.gereja || "-";
            }
            // 2. Ambil data Nilai/Poin
            return db.ref('rapor/' + uid).once('value');
        }).then(snapshot => {
            const poin = snapshot.val() || {};
            tampilkanRapor(poin);
        });
    }

    function tampilkanRapor(data) {
        const categories = [
            { id: 'pembacaan_ft', label: 'Pembacaan Firman Tuhan' },
            { id: 'hadir_doa', label: 'Kehadiran Doa' },
            { id: 'hadir_komsel', label: 'Kehadiran Komsel' },
            { id: 'hadir_ibadah_raya', label: 'Ibadah Raya' },
            { id: 'ibadah_gabungan', label: 'Ibadah Gabungan' }
        ];

        let html = '';
        categories.forEach(cat => {
            const skor = data[cat.id] || 0; // default 0 jika belum ada data
            let warnaClass = 'excel-red';
            if (skor >= 90) warnaClass = 'excel-green';
            else if (skor >= 70) warnaClass = 'excel-yellow';

            html += `
                <tr>
                    <td style="text-align:left;">${cat.label}</td>
                    <td class="${warnaClass}">${skor}%</td>
                    <td>${skor >= 90 ? 'Sangat Baik' : (skor >= 70 ? 'Cukup' : 'Perlu Ditingkatkan')}</td>
                </tr>
            `;
        });

        document.getElementById('rapor-body').innerHTML = html;
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('main-table').style.display = 'table';
    }
</script>

</body>
</html>
