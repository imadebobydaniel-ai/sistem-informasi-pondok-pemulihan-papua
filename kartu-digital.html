<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Jemaat - Kartu Digital</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS TETAP MENGGUNAKAN DESAIN MEWAH ANDA */
        .menu-icons { display: flex; gap: 15px; align-items: center; background: #fff; padding: 10px; }
        .icon-btn { font-size: 24px; color: #555; cursor: pointer; position: relative; }
        .icon-btn:hover { color: #003366; }

        .modal-overlay {
            display: flex; /* Langsung tampilkan saat load */
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            justify-content: center; align-items: center;
        }

        .digital-card {
            width: 380px; height: 230px;
            background: linear-gradient(135deg, #f1c40f 0%, #d4af37 50%, #b8860b 100%);
            border-radius: 15px; position: relative; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #fff;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.3);
            font-family: 'Arial', sans-serif;
        }

        .digital-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/cubes.png');
            opacity: 0.1; pointer-events: none;
        }

        .card-logo { position: absolute; top: 15px; right: 15px; width: 50px; height: 50px; object-fit: contain; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 20px; color: #003366; }
        .card-info { margin-top: 10px; }
        .info-label { font-size: 9px; text-transform: uppercase; color: rgba(255,255,255,0.8); margin-bottom: -2px; }
        .info-value { font-size: 13px; font-weight: bold; margin-bottom: 8px; }
        .card-nij { position: absolute; bottom: 25px; left: 20px; font-family: 'Courier Prime', monospace; font-size: 22px; letter-spacing: 3px; text-shadow: 2px 2px 2px rgba(0,0,0,0.5); }
        .card-qr { position: absolute; bottom: 20px; right: 20px; background: white; padding: 5px; border-radius: 5px; }
        .close-modal { position: absolute; top: -40px; right: 0; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <div id="cardModal" class="modal-overlay">
        <div style="position: relative;">
            <div class="close-modal" onclick="closeDigitalCard()">
                <i class="fas fa-times"></i> Tutup
            </div>
            
            <div class="digital-card" id="digitalCardArea">
                <img src="logo_pondok.png" class="card-logo" onerror="this.src='https://via.placeholder.com/50'">
                <div class="card-title">KARTU DIGITAL ANGGOTA</div>
                <div class="card-info">
                    <div class="info-label">Nama Lengkap</div>
                    <div class="info-value" id="d-nama">MEMUAT...</div>
                    <div class="info-label">Jemaat</div>
                    <div class="info-value" id="d-jemaat">-</div>
                    <div class="info-label">Komsel</div>
                    <div class="info-value" id="d-komsel">-</div>
                </div>
                <div class="card-nij" id="d-nij">0000 0000 0000</div>
                <div class="card-qr" id="qrcode"></div>
            </div>
        </div>
    </div>

    <script>
        // 1. CONFIG FIREBASE
        const firebaseConfig = { 
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM", 
            authDomain: "boby-apps-project.firebaseapp.com", 
            projectId: "boby-apps-project", 
            storageBucket: "boby-apps-project.appspot.com", 
            messagingSenderId: "125984859692", 
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389" 
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();

        // 2. FUNGSI UTAMA TAMPILKAN KARTU
        async function showDigitalCard() {
            const userEmail = localStorage.getItem("userEmail");
            if(!userEmail) {
                alert("Silahkan login terlebih dahulu.");
                return;
            }

            try {
                const snapshot = await db.collection("users").where("email", "==", userEmail).get();
                if(!snapshot.empty) {
                    const data = snapshot.docs[0].data();

                    // Update Tampilan Kartu
                    document.getElementById('d-nama').innerText = data.nama || "No Name";
                    document.getElementById('d-jemaat').innerText = data.lokasi_berjemaat || "-";
                    document.getElementById('d-komsel').innerText = data.komsel || "-";
                    document.getElementById('d-nij').innerText = data.nij || "0000 0000 0000";

                    // Update QR Code dinamis ke bio-singkat-jemaat.html
                    const qrContainer = document.getElementById("qrcode");
                    qrContainer.innerHTML = "";
                    
                    const scanUrl = "https://imadebobydaniel-ai.github.io/sistem-informasi-pondok-pemulihan-papua/bio-singkat-jemaat.html?scan=" + encodeURIComponent(userEmail);
                    
                    new QRCode(qrContainer, {
                        text: scanUrl,
                        width: 70,
                        height: 70,
                        colorDark : "#003366",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });

                    document.getElementById('cardModal').style.display = 'flex';
                } else {
                    alert("Data tidak ditemukan.");
                }
            } catch (e) {
                console.error(e);
                alert("Gagal memuat data.");
            }
        }

        function closeDigitalCard() {
            // Jika ingin kembali ke menu utama
            window.location.href = "menu.html"; 
        }

        // Jalankan otomatis saat halaman dibuka
        window.onload = showDigitalCard;
    </script>
</body>
</html>
