<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Data Jemaat - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #003366; --accent: #007bff; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); padding: 20px; }
        .edit-container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; }
        .btn-back { display: inline-block; margin-bottom: 20px; color: var(--primary); text-decoration: none; font-weight: bold; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay"><p><i class="fas fa-spinner fa-spin"></i> Memuat Data...</p></div>

<div class="edit-container">
    <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
    <h2 style="color: var(--primary); border-bottom: 2px solid #D4AF37; padding-bottom: 10px;">Edit Profil Jemaat</h2>
    
    <form id="editForm">
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama_lengkap" required>
        </div>
        <div class="form-group">
            <label>NIJ (Nomor Induk Jemaat)</label>
            <input type="text" id="nij" readonly style="background: #eee;">
        </div>
        <div class="form-group">
            <label>WhatsApp</label>
            <input type="text" id="whatsapp">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>
        <div class="form-group">
            <label>Alamat</label>
            <textarea id="alamat" rows="3"></textarea>
        </div>
        <div class="form-group">
            <label>Status Akun</label>
            <select id="status_akun">
                <option value="Pending">Pending</option>
                <option value="Aktif">Aktif</option>
            </select>
        </div>

        <button type="submit" class="btn-save"><i class="fas fa-save"></i> Simpan Perubahan</button>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase (Sama dengan admin.html)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // AMBIL ID DARI URL (Mendukung parameter 'edit' dari admin.html)
    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('edit'); 

    if (!userId) {
        alert("ID Jemaat tidak ditemukan!");
        window.location.href = 'admin.html';
    }

    // LOAD DATA SAAT HALAMAN DIBUKA
    window.onload = async function() {
        try {
            const doc = await db.collection("jemaat").doc(userId).get();
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('nama_lengkap').value = data.nama_lengkap || '';
                document.getElementById('nij').value = data.nij || '';
                document.getElementById('whatsapp').value = data.whatsapp || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('alamat').value = data.alamat || '';
                document.getElementById('status_akun').value = data.status_akun || 'Pending';
                
                document.getElementById('loading').style.display = 'none';
            } else {
                alert("Data jemaat tidak ada di database!");
                window.location.href = 'admin.html';
            }
        } catch (error) {
            console.error("Error loading data:", error);
            alert("Gagal mengambil data.");
        }
    };

    // SIMPAN PERUBAHAN KE FIREBASE
    document.getElementById('editForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Menyimpan...';

        try {
            await db.collection("jemaat").doc(userId).update({
                nama_lengkap: document.getElementById('nama_lengkap').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                alamat: document.getElementById('alamat').value,
                status_akun: document.getElementById('status_akun').value,
                last_update_admin: new Date().toISOString()
            });

            alert("Data berhasil diperbarui!");
            window.location.href = 'admin.html';
        } catch (error) {
            alert("Gagal menyimpan: " + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Simpan Perubahan';
        }
    };
</script>
</body>
</html>
