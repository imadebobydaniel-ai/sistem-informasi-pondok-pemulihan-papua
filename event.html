<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Jemaat - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        input, textarea, select {
           box-sizing: border-box; width: 100% !important; max-width: 100%;
           margin-bottom: 12px; padding: 12px; border-radius: 8px;
            border: 1px solid #ddd; font-size: 16px;
        }

        .header { 
            background: var(--primary); color: white; padding: 35px 15px 15px 15px; 
             display: flex; justify-content: center; align-items: center; 
             position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent); 
        }

        .nav-left { position: absolute; left: 15px; bottom: 15px; display: flex; gap: 10px; }
        .nav-admin { position: absolute; right: 15px; bottom: 15px; }
       .btn-toggle-login { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

       .login-dropdown { 
             display: none; position: absolute; top: 50px; right: 0; width: 240px; 
            background: white; padding: 20px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 2000; border: 1px solid #eee; 
        }
        
        .login-logo { display: block; margin: 0 auto 5px auto; max-width: 80px; height: auto; }
        .login-label { text-align: center; font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; }
       .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 12px; top: 13px; color: #888; cursor: pointer; z-index: 10; }
       .btn-masuk-dropdown { width: 100%; height: 42px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* DESAIN NEWS CARD DIGITAL */
        #newsList { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .news-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s ease;
            cursor: pointer; display: flex; flex-direction: column;
        }
        .news-card:hover { transform: translateY(-5px); }
        .news-img { width: 100%; height: 180px; object-fit: cover; }
        .news-body { padding: 15px; flex-grow: 1; }
        .news-category { color: var(--accent); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .news-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--primary); line-height: 1.3; }
        .news-meta { font-size: 0.75rem; color: #7f8c8d; display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }

        /* MODAL & DROPDOWN STYLE */
        .modal-news-img { width: 100%; border-radius: 8px; margin-bottom: 15px; }
        .news-content-text { font-size: 1rem; line-height: 1.6; color: #333; text-align: justify; white-space: pre-line; }
        
        .action-dropdown { position: relative; display: inline-block; }
        .dropbtn { background: #f1f1f1; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .dropdown-content {
            display: none; position: absolute; bottom: 100%; left: 0; background-color: white;
            min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1001; border-radius: 8px; margin-bottom: 5px;
        }
        .dropdown-content button { color: black; padding: 12px 16px; text-decoration: none; display: block; width: 100%; text-align: left; border: none; background: none; cursor: pointer; }
        .dropdown-content button:hover { background-color: #f1f1f1; }
        .show { display: block; }

        #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
        .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; font-size: 14px; }
        
        .extra-tools { display: flex; gap: 10px; margin: 10px 0; }
        .btn-tool { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .absensi-box, .log-activity-box { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .absensi-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .total-counter { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 14px; }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin: 10px 0; display: none; border: 2px dashed var(--accent); }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 13px; }

       .btn-header-back { border:none; background:#555; color:white; height: 38px; padding:0 15px; border-radius:19px; font-weight:bold; cursor:pointer; font-size: 12px; display: flex; align-items: center; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-left">
        <button id="btnPortalBack" class="btn-header-back" onclick="window.history.back()">
            <i class="fas fa-chevron-left"></i> &nbsp;KEMBALI
       </button>
        <button id="btnBack" onclick="location.reload()" style="display:none; border:none; background:#d33; color:white; height: 38px; padding:0 20px; border-radius:19px; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>
    <h1 style="font-size: 1.1rem; margin: 0; letter-spacing: 1px;">EVENT JEMAAT</h1>
    <div class="nav-admin">
        <button id="btnToggle" class="btn-toggle-login" onclick="toggleLoginSlider()"><i class="fas fa-user-shield"></i></button>
        <div id="loginBox" class="login-dropdown">
            <span class="login-label">LOGIN ADMIN</span>
            <input type="text" id="userAdmin" placeholder="Username">
            <div class="pass-container">
               <input type="password" id="passAdmin" placeholder="Password">
                <i class="fas fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
           </div>
            <button class="btn-masuk-dropdown" onclick="loginEvent()">MASUK</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="adminSection">
       <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4"></textarea>
        
        <p style="font-size: 12px; margin: 0;">Upload Foto ke Cloudinary:</p>
        <input type="file" id="fotoEvent" accept="image/*" multiple capture="environment">
        <div id="uploadStatus" style="font-size: 11px; color: var(--primary); margin: 5px 0;"></div>

        <button class="btn-action" style="background:var(--accent)" id="btnSimpan">SIMPAN & SINNKRONKAN</button>

        <div class="absensi-box">
            <div class="absensi-header">
               <span style="font-weight:bold; font-size:13px;"><i class="fas fa-qrcode"></i> ABSENSI</span>
               <span class="total-counter">Total: <span id="totalAbsen">0</span></span>
           </div>
            <button class="btn-action" style="background: var(--primary);" id="btnStartScan" onclick="startScanner()">SCAN QR</button>
            <button class="btn-action" style="background: #d33; display:none;" id="btnStopScan" onclick="stopScanner()">TUTUP KAMERA</button>
            <div id="reader"></div>
        </div>

        <div class="log-activity-box">
            <span style="font-weight:bold; font-size:13px;"><i class="fas fa-history"></i> LOG ACTIVITY (CLOUD)</span>
            <div id="logContent" style="margin-top:10px;"></div>
        </div>
    </div>
    
    <div id="newsList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, get, set, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com/", 
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const eventRef = ref(db, 'events');
    const absenRef = ref(db, 'absensi_event');

    window.cloudinaryImages = [];
    window.currentEvents = [];
    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxzllsbgi/image/upload";
    const CLOUDINARY_PRESET = "sipapua_preset";

    onValue(eventRef, (snapshot) => {
        const data = snapshot.val();
        const list = [];
        for (let id in data) { list.unshift({ id, ...data[id] }); }
        window.currentEvents = list;
        renderList(list);
        updateLogActivity(list);
    });

    onValue(absenRef, (snapshot) => {
        document.getElementById('totalAbsen').innerText = snapshot.numChildren();
    });

    // --- RENDER LIST DIGITAL MODERN ---
    function renderList(list) {
        const container = document.getElementById('newsList');
        if(!container) return;
        container.innerHTML = list.length === 0 ? "<div style='text-align:center;width:100%;padding:20px;'>Belum Ada Berita</div>" : list.map(item => `
            <div class="news-card" onclick="detailEvent('${item.id}')">
                <img src="${item.fotos ? item.fotos[0] : ''}" class="news-img">
                <div class="news-body">
                    <div class="news-category">Warta Jemaat</div>
                    <div class="news-title">${item.nama}</div>
                    <div style="font-size: 0.85rem; color: #555;">${item.isi ? item.isi.substring(0, 70) : ''}...</div>
                    <div class="news-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${item.lokasi}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${item.tgl}</span>
                    </div>
                </div>
            </div>`).join('');
    }
    window.renderList = renderList;

    // --- UPLOAD & SIMPAN ---
    const fileInput = document.getElementById('fotoEvent');
    if(fileInput) {
        fileInput.onchange = async function(e) {
            const files = Array.from(e.target.files);
            const statusLabel = document.getElementById('uploadStatus');
            statusLabel.innerText = "⏳ Mengunggah...";
            try {
                for (let file of files) {
                    const formData = new FormData();
                    formData.append("file", file);
                    formData.append("upload_preset", CLOUDINARY_PRESET);
                    const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
                    const data = await res.json();
                    if(data.secure_url) window.cloudinaryImages.push(data.secure_url);
                }
                statusLabel.innerText = "✅ " + window.cloudinaryImages.length + " Foto siap.";
            } catch (err) { statusLabel.innerText = "❌ Gagal"; }
        };
    }

    document.getElementById('btnSimpan').onclick = function() {
        const nama = document.getElementById('namaEvent').value.trim();
        if(!nama || window.cloudinaryImages.length === 0) {
            return Swal.fire('Peringatan', 'Nama kegiatan dan foto wajib diisi!', 'warning');
        }
        push(eventRef, {
            nama,
            lokasi: document.getElementById('lokasiEvent').value,
            tgl: document.getElementById('tglEvent').value,
            isi: document.getElementById('isiEvent').value,
            fotos: window.cloudinaryImages,
            createdAt: Date.now()
        }).then(() => {
            Swal.fire('Sukses', 'Data tersimpan', 'success');
            location.reload();
        });
    };

    // --- LOGIN & UI ---
    window.toggleLoginSlider = function() {
        const box = document.getElementById('loginBox');
        box.style.display = (box.style.display === "block") ? "none" : "block";
    };

    window.togglePassword = function() {
        const p = document.getElementById('passAdmin');
        const eye = document.getElementById('eyeIcon');
        if(p.type === "password") { p.type = "text"; eye.classList.replace('fa-eye', 'fa-eye-slash'); }
        else { p.type = "password"; eye.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    window.loginEvent = function() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        if(u === "admin" && p === "admin123") {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('newsList').style.display = 'none';
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnBack').style.display = 'block';
            document.getElementById('btnPortalBack').style.display = 'none';
        } else { Swal.fire('Gagal', 'Akses Ditolak', 'error'); }
    };

    // --- SCAN QR & ABSENSI ---
    window.prosesAbsenDigital = async function(decodedText) {
        let namaJemaat = decodedText.trim();
        if(decodedText.includes("email=")) {
            namaJemaat = new URLSearchParams(decodedText.split('?')[1]).get('email');
        }
        const safePath = namaJemaat.replace(/[.#$[\]]/g, "_");
        const userAbsenRef = child(absenRef, safePath);
        const snapshot = await get(userAbsenRef);
        if (snapshot.exists() && (Date.now() - snapshot.val().last_timestamp) / 3600000 < 24) {
            return Swal.fire('Ditolak', 'Sudah absen hari ini', 'error');
        }
        await set(userAbsenRef, { last_timestamp: Date.now(), nama: namaJemaat, date: new Date().toLocaleString() });
        Swal.fire('Berhasil', 'Selamat Datang ' + namaJemaat, 'success');
    };

    // --- DETAIL BERITA MODERN ---
    window.detailEvent = function(id) {
        const item = window.currentEvents.find(x => x.id === id);
        if(!item) return;
        
        Swal.fire({
            title: `<span style="font-size: 1.3rem; font-weight:800;">${item.nama}</span>`,
            html: `
                <div style="text-align:left;">
                    <img src="${item.fotos ? item.fotos[0] : ''}" class="modal-news-img">
                    <div style="margin-bottom: 12px; color: #7f8c8d; font-size: 0.85rem;">
                        <i class="fas fa-map-marker-alt"></i> <b>Lokasi:</b> ${item.lokasi} | 
                        <i class="fas fa-calendar-alt"></i> ${item.tgl}
                    </div>
                    <div class="news-content-text">${item.isi}</div>
                    <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                    <div style="display:flex; justify-content: space-between; align-items:center;">
                        <div class="action-dropdown">
                            <button onclick="event.stopPropagation(); window.toggleActionMenu()" class="dropbtn">
                                <i class="fas fa-share-alt"></i> Opsi <i class="fas fa-caret-up"></i>
                            </button>
                            <div id="myDropdown" class="dropdown-content">
                                <button onclick="window.shareWA('${item.nama}', '${item.lokasi}')"><i class="fab fa-whatsapp" style="color:green;"></i> WhatsApp</button>
                                <button onclick="window.generatePDF('${item.id}')"><i class="fas fa-file-pdf" style="color:red;"></i> Simpan PDF</button>
                            </div>
                        </div>
                        <button onclick="window.hapusBerita('${item.id}')" style="background:var(--danger); color:white; border:none; padding: 10px 18px; border-radius:5px; cursor:pointer; font-weight:bold;">
                            <i class="fas fa-trash"></i> Hapus
                        </button>
                    </div>
                </div>
            `,
            showConfirmButton: false,
            width: '95%',
        });
    };

    window.toggleActionMenu = function() { document.getElementById("myDropdown").classList.toggle("show"); }

    window.shareWA = function(nama, lokasi) {
        const teks = `*WARTA JEMAAT*\n\n*Kegiatan:* ${nama}\n*Lokasi:* ${lokasi}\n\n_Diposting melalui aplikasi SIPAPUA_`;
        window.open(`https://wa.me/?text=${encodeURIComponent(teks)}`, '_blank');
    };

    window.generatePDF = async function(id) {
        const item = window.currentEvents.find(x => x.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("LAPORAN KEGIATAN JEMAAT", 20, 20);
        doc.setFontSize(12); doc.text(`Kegiatan: ${item.nama}`, 20, 35);
        doc.text(`Lokasi: ${item.lokasi}`, 20, 45);
        doc.text(`Tanggal: ${item.tgl}`, 20, 55);
        doc.save(`${item.nama}.pdf`);
    };

    window.hapusBerita = async function(id) {
        const { value: pass } = await Swal.fire({ title: 'Sandi Admin', input: 'password', inputPlaceholder: 'Masukkan Sandi' });
        if (pass === 'admin123') { 
            remove(ref(db, `events/${id}`)).then(() => { Swal.fire('Terhapus', '', 'success'); });
        } else if(pass) { Swal.fire('Gagal', 'Sandi Salah', 'error'); }
    };
    
    function updateLogActivity(list) {
        const logBox = document.getElementById('logContent');
        if(!logBox) return;
        logBox.innerHTML = list.map(item => `<div class="log-item">${item.nama} <button onclick="hapusBerita('${item.id}')" style="border:none;background:none;color:red;"><i class="fas fa-trash"></i></button></div>`).join('');
    }

    // --- QR SCANNER LOGIC ---
    let html5QrCode;
    window.startScanner = function() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnStartScan').style.display = 'none';
        document.getElementById('btnStopScan').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, async (text) => {
            await window.prosesAbsenDigital(text);
            stopScanner();
        });
    }
    window.stopScanner = function() {
        if(html5QrCode) html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('btnStartScan').style.display = 'block';
            document.getElementById('btnStopScan').style.display = 'none';
        });
    }
</script>
</body>
</html>
