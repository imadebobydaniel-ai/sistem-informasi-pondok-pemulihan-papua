<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Jemaat - SIPAPUA</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #003366; --bg: #f8f9fa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #333; }

        .header {
            background: var(--primary); color: white; padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-admin {
            background: rgba(255,255,255,0.2); border: 1px solid white; color: white;
            padding: 5px 15px; border-radius: 20px; cursor: pointer;
        }

        #halaman-depan { padding: 20px; max-width: 800px; margin: auto; }
        .card-berita {
            background: white; border-radius: 12px; display: flex; 
            margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); overflow: hidden;
        }
        .img-area { width: 120px; background: #ddd; display: flex; align-items: center; justify-content: center; }
        .info-berita { padding: 15px; }

        #modal-login {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1100; justify-content: center; align-items: center;
        }
        .box-login { background: white; padding: 30px; border-radius: 15px; width: 300px; }
        .input-login { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }

        #portal-internal { display: none; padding: 20px; max-width: 900px; margin: auto; }
        .list-menu-admin { list-style: none; padding: 0; }
        .list-menu-admin li {
            background: white; padding: 15px; margin-bottom: 10px; 
            border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px;
        }

        #scanner-container { display: none; flex-direction: column; height: 100vh; background: #000; position: fixed; top: 0; left: 0; width: 100%; z-index: 2000; }
    </style>
</head>
<body>

    <div class="header">
        <div><i class="fas fa-church"></i> PORTAL SIPAPUA</div>
        <button class="btn-admin" onclick="bukaLogin()"><i class="fas fa-lock"></i> Admin</button>
    </div>

    <div id="halaman-depan">
        <h3>Berita Jemaat Terbaru</h3>
        <div class="card-berita">
            <div class="img-area"><i class="fas fa-image"></i></div>
            <div class="info-berita">
                <h4 style="margin: 0;">IBADAH ARSO 1</h4>
                <p style="font-size: 13px; color: #666;">20 Apr 2026</p>
            </div>
        </div>
    </div>

    <div id="modal-login">
        <div class="box-login">
            <input type="text" id="user" class="input-login" placeholder="Username">
            <input type="password" id="pass" class="input-login" placeholder="Password">
            <button class="input-login" style="background: var(--primary); color: white; border: none;" onclick="prosesLogin()">MASUK</button>
        </div>
    </div>

    <div id="portal-internal">
        <div style="display: flex; justify-content: space-between;">
            <h3>Portal Admin</h3>
            <button onclick="location.reload()" style="border:none; background:none; color:red;">Logout</button>
        </div>
        <ul class="list-menu-admin">
            <li><i class="fas fa-edit"></i> Input Berita</li>
            <li onclick="bukaScanner()"><i class="fas fa-qrcode"></i> Absensi Jemaat</li>
            <li><i class="fas fa-users"></i> Data Jemaat</li>
            <li><i class="fas fa-file-pdf"></i> Laporan</li>
        </ul>
    </div>

    <div id="scanner-container">
        <div style="padding: 15px; color: white; display: flex; justify-content: space-between; background: var(--primary);">
            <span>Scan QR Kehadiran</span>
            <button onclick="tutupScanner()" style="background:none; border:none; color:white; font-size: 20px;">&times;</button>
        </div>
        <div id="reader" style="flex: 1;"></div>
        <button onclick="simpanLaporan()" style="padding: 15px; background: #e67e22; color: white; border: none;">SIMPAN PDF</button>
    </div>

    <script>
        let html5QrCode;
        let dataScan = [];

        function bukaLogin() { document.getElementById('modal-login').style.display = 'flex'; }
        
        function prosesLogin() {
            document.getElementById('halaman-depan').style.display = 'none';
            document.getElementById('modal-login').style.display = 'none';
            document.getElementById('portal-internal').style.display = 'block';
        }

        function bukaScanner() {
            document.getElementById('scanner-container').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                dataScan.push({ nama: text, waktu: new Date().toLocaleTimeString() });
                Swal.fire({ title: 'Tercatat', timer: 600, showConfirmButton: false });
            });
        }

        function tutupScanner() {
            if(html5QrCode) html5QrCode.stop().then(() => { document.getElementById('scanner-container').style.display = 'none'; });
        }

        function simpanLaporan() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LAPORAN KEHADIRAN", 105, 20, { align: "center" });
            const rows = dataScan.map((item, i) => [i+1, item.nama, item.waktu]);
            doc.autoTable({ head: [['No', 'ID/Nama', 'Waktu']], body: rows, startY: 30 });
            doc.save("Laporan_Absensi.pdf");
        }
    </script>
</body>
</html>
