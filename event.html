<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Jemaat - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
    :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; --danger: #e74c3c; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    input, textarea, select {
        box-sizing: border-box; width: 100% !important; max-width: 100%;
        margin-bottom: 12px; padding: 12px; border-radius: 8px;
        border: 1px solid #ddd; font-size: 16px;
    }

    .header { 
        background: var(--primary); color: white; padding: 35px 15px 15px 15px; 
        display: flex; justify-content: center; align-items: center; 
        position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent); 
    }

    .nav-left { position: absolute; left: 15px; bottom: 15px; display: flex; gap: 10px; }
    .nav-admin { position: absolute; right: 15px; bottom: 15px; }
    .btn-toggle-login { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .login-dropdown { 
        display: none; position: absolute; top: 50px; right: 0; width: 240px; 
        background: white; padding: 20px; border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 2000; border: 1px solid #eee; 
    }
    
    .login-logo { display: block; margin: 0 auto 5px auto; max-width: 80px; height: auto; }
    .login-label { text-align: center; font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; }
    .pass-container { position: relative; width: 100%; }
    .toggle-pass { position: absolute; right: 12px; top: 13px; color: #888; cursor: pointer; z-index: 10; }
    .btn-masuk-dropdown { width: 100%; height: 42px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    .container { padding: 15px; max-width: 1000px; margin: auto; }

    /* PERBAIKAN LIST BERITA AGAR SIMETRIS (FINAL) */
    #newsList { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 320px)); 
        gap: 20px;
        justify-content: center;
        width: 100%;
        margin-top: 20px;
    }
    
    .news-card {
        background: white; border-radius: 12px; overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s ease;
        cursor: pointer; display: flex; flex-direction: column;
        width: 100%; 
        margin: 0;
    }

    .news-card:hover { transform: translateY(-5px); }
    .news-img { width: 100%; height: 200px; object-fit: cover; }
    .news-body { padding: 15px; flex-grow: 1; }
    .news-category { color: var(--accent); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    .news-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--primary); line-height: 1.3; }
    .news-meta { font-size: 0.75rem; color: #7f8c8d; display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }

    .modal-news-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
    .news-content-text { font-size: 1rem; line-height: 1.6; color: #333; text-align: justify; white-space: pre-line; }
    
    .action-dropdown { position: relative; display: inline-block; }
    .dropbtn { background: #f1f1f1; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .dropdown-content {
        display: none; position: absolute; bottom: 100%; left: 0; background-color: white;
        min-width: 180px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1001; border-radius: 8px; margin-bottom: 8px;
    }
    .dropdown-content button { color: black; padding: 12px 16px; text-decoration: none; display: block; width: 100%; text-align: left; border: none; background: none; cursor: pointer; font-size: 14px; }
    .dropdown-content button:hover { background-color: #f1f1f1; }
    .show { display: block; }

    #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
    .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; font-size: 14px; }
    
    .extra-tools { display: flex; gap: 10px; margin: 10px 0; }
    .btn-tool { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    .absensi-box, .log-activity-box { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 15px; }
    .absensi-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    .total-counter { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 14px; }
    
    #reader { width: 100%; border-radius: 10px; overflow: hidden; margin: 10px 0; display: none; border: 2px dashed var(--accent); }
    .log-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 13px; }

    .btn-header-back { border:none; background:#555; color:white; height: 38px; padding:0 15px; border-radius:19px; font-weight:bold; cursor:pointer; font-size: 12px; display: flex; align-items: center; }
</style>
</head>
<body>

<div class="header">
    <div class="nav-left">
        <button id="btnPortalBack" class="btn-header-back" onclick="window.history.back()">
            <i class="fas fa-chevron-left"></i> &nbsp;KEMBALI
       </button>
        <button id="btnBack" onclick="location.reload()" style="display:none; border:none; background:#d33; color:white; height: 38px; padding:0 20px; border-radius:19px; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>
    <h1 style="font-size: 1.1rem; margin: 0; letter-spacing: 1px;">EVENT JEMAAT</h1>
    <div class="nav-admin">
        <button id="btnToggle" class="btn-toggle-login" onclick="toggleLoginSlider()"><i class="fas fa-user-shield"></i></button>
        <div id="loginBox" class="login-dropdown">
            <span class="login-label">LOGIN ADMIN</span>
            <input type="text" id="userAdmin" placeholder="Username">
            <div class="pass-container">
               <input type="password" id="passAdmin" placeholder="Password">
                <i class="fas fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
          </div>
            <button class="btn-masuk-dropdown" onclick="loginEvent()">MASUK</button>
            
            <div style="margin-top: 15px; text-align: center;">
                <a href="javascript:void(0)" onclick="addNewAdmin()" style="font-size: 11px; color: #007bff; text-decoration: none; font-weight: bold;">
                  <i class="fas fa-user-plus"></i> Create New Admin
               </a>
           </div>
        </div>
    </div>
</div>

<div class="container">
    <div id="adminSection">
       <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4"></textarea>
        
        <p style="font-size: 12px; margin: 0;">Upload Foto ke Cloudinary:</p>
        <input type="file" id="fotoEvent" accept="image/*" multiple capture="environment">
        <div id="uploadStatus" style="font-size: 11px; color: var(--primary); margin: 5px 0;"></div>

        <button class="btn-action" style="background:var(--accent)" id="btnSimpan">SIMPAN & SINNKRONKAN</button>

        <div class="absensi-box">
            <div class="absensi-header">
              <span style="font-weight:bold; font-size:13px;"><i class="fas fa-qrcode"></i> ABSENSI</span>
              <span class="total-counter">Total: <span id="totalAbsen">0</span></span>
          </div>
            <button class="btn-action" style="background: var(--primary);" id="btnStartScan" onclick="startScanner()">SCAN QR</button>
            <button class="btn-action" style="background: #d33; display:none;" id="btnStopScan" onclick="stopScanner()">TUTUP KAMERA</button>
            <div id="reader"></div>
        </div>

        <div class="log-activity-box">
            <span style="font-weight:bold; font-size:13px;"><i class="fas fa-history"></i> LOG ACTIVITY (CLOUD)</span>
            <div id="logContent" style="margin-top:10px;"></div>
        </div>
    </div>
    
    <div id="newsList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, get, set, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com/", 
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // --- STATE MANAGEMENT ---
    window.currentAdmin = null; 
    window.selectedEventId = null; 
    window.cloudinaryImages = [];
    window.currentEvents = [];
    let listAbsensi = []; // Variabel penampung nama hasil scan

    const eventRef = ref(db, 'events');
    const adminRef = ref(db, 'admin_users');

    // --- FUNGSI FORMAT TANGGAL INDONESIA ---
    function formatTglIndo(dateString) {
        if (!dateString) return "-";
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        return new Date(dateString).toLocaleDateString('id-ID', options);
    }

    // --- 1. LOG ACTIVITY DROPDOWN SETUP ---
    const setupLogDropdown = () => {
        const logContainer = document.querySelector('.card:last-child'); // Target box LOG ACTIVITY
        if (logContainer && !logContainer.querySelector('details')) {
            const content = logContainer.innerHTML;
            logContainer.innerHTML = `
                <details style="cursor:pointer; border: 1px solid #eee; border-radius: 8px; padding: 5px;">
                    <summary style="font-weight:bold; padding:10px; list-style:none; display:flex; justify-content:space-between; align-items:center;">
                        <span><i class="fas fa-history"></i> LOG ACTIVITY (CLOUD)</span>
                        <i class="fas fa-chevron-down"></i>
                    </summary>
                    <div id="logContent" style="padding:10px; border-top:1px solid #eee; max-height: 200px; overflow-y: auto;">
                        ${content}
                    </div>
                </details>`;
        }
    };

    // --- 2. FUNGSI QR SCANNER & PROSES ABSENSI ---
    let html5QrCode;

    window.startScanner = function() {
        const scannerContainer = document.getElementById('reader');
        if (!scannerContainer) {
            const newReader = document.createElement('div');
            newReader.id = 'reader';
            newReader.style.width = '100%';
            newReader.style.marginTop = '10px';
            document.getElementById('btnScanQR').after(newReader);
        }

        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            prosesAbsensi(decodedText);
            html5QrCode.stop().then(() => {
                document.getElementById('reader').remove();
            });
        }).catch((err) => {
            console.error("Gagal start scanner", err);
        });
    };

    function prosesAbsensi(nama) {
        if (!listAbsensi.includes(nama)) {
            listAbsensi.push(nama);
            
            // Update UI Angka Akumulasi
            const totalElement = document.getElementById('totalAbsen');
            if(totalElement) {
                totalElement.innerText = listAbsensi.length;
                totalElement.style.cursor = 'pointer';
                totalElement.title = "Klik untuk lihat daftar nama";
            }
            
            Swal.fire('Berhasil', `${nama} telah diabsen`, 'success');
        } else {
            Swal.fire('Info', `${nama} sudah diabsen sebelumnya.`, 'warning');
        }
    }

    // --- 3. FUNGSI KLIK ANGKA (TAMPILKAN DAFTAR NAMA) ---
    window.showAbsenList = function() {
        if (listAbsensi.length === 0) {
            return Swal.fire('Info', 'Belum ada jemaat yang absen.', 'info');
        }

        const htmlList = `<div style="text-align:left; max-height:300px; overflow-y:auto;">
            <ol>${listAbsensi.map(n => `<li>${n}</li>`).join('')}</ol>
        </div>`;

        Swal.fire({
            title: 'Daftar Nama Terabsen',
            html: htmlList,
            confirmButtonText: 'Tutup',
            confirmButtonColor: '#003366'
        });
    };

    // --- EVENT LISTENER & INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        setupLogDropdown();
        
        const btnScan = document.getElementById('btnScanQR');
        if(btnScan) btnScan.onclick = window.startScanner;

        const totalClick = document.getElementById('totalAbsen');
        if(totalClick) totalClick.onclick = window.showAbsenList;
    });

    // === FUNGSI DETAIL EVENT ===
    window.detailEvent = function(id) {
        const item = window.currentEvents.find(x => x.id === id);
        if (!item) return;

        Swal.fire({
            title: item.nama,
            html: `
                <div id="detailContent" style="text-align: left; font-size: 14px;">
                    <img src="${item.fotos ? item.fotos[0] : ''}" style="width:100%; border-radius:10px; margin-bottom:15px; border: 1px solid #eee;">
                    <p><strong><i class="fas fa-map-marker-alt"></i> Lokasi:</strong> ${item.lokasi || '-'}</p>
                    <p><strong><i class="fas fa-calendar-alt"></i> Tanggal:</strong> ${formatTglIndo(item.tgl)}</p>
                    <hr style="border: 0; border-top: 1px solid #eee;">
                    <div style="white-space: pre-wrap; max-height: 250px; overflow-y: auto; color: #444; line-height: 1.6;">${item.isi || 'Tidak ada deskripsi.'}</div>
                    <p style="font-size: 11px; color: #888; margin-top: 15px; border-top: 1px dashed #ddd; padding-top: 10px;">Diposting oleh: ${item.createdBy || 'System'}</p>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;">
                    <button onclick="shareWA('${id}')" style="background:#25d366; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; flex: 1; min-width: 100px;">
                        <i class="fab fa-whatsapp"></i> Share WA
                    </button>
                    <button onclick="generatePDF('${id}')" style="background:#e74c3c; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; flex: 1; min-width: 100px;">
                        <i class="fas fa-file-pdf"></i> Download PDF
                    </button>
                    <button onclick="hapusBerita('${id}')" style="background:#333; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; flex: 1; min-width: 100px;">
                        <i class="fas fa-trash"></i> Hapus
                    </button>
                </div>
            `,
            showConfirmButton: false,
            showCloseButton: true,
            width: '95%',
            padding: '1.5em'
        });
    };

    // === FUNGSI SHARE WHATSAPP ===
    window.shareWA = function(id) {
        const item = window.currentEvents.find(x => x.id === id);
        if (!item) return;
        const kop = "*PONDOK PEMULIHAN PAPUA*\n";
        const body = `*Kegiatan:* ${item.nama}\n*Lokasi:* ${item.lokasi}\n*Tanggal:* ${formatTglIndo(item.tgl)}\n\n${item.isi}\n\n`;
        const teksFull = kop + body + "_Informasi dibagikan melalui SIPAPUA_";
        const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(teksFull)}`;
        window.open(url, '_blank');
    };

    // === FUNGSI LOGIN EVENT ===
    window.loginEvent = async function() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        let loggedInUser = "";

        if(u === "admin" && p === "admin123") {
            loggedInUser = "SuperAdmin";
        } else {
            const snapshot = await get(child(ref(db), `admin_users/${u}`));
            if (snapshot.exists() && snapshot.val().password === p) {
                loggedInUser = u;
            }
        }

        if (loggedInUser) {
            window.currentAdmin = loggedInUser;
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('newsList').style.display = 'none'; 
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnBack').style.display = 'inline-block';
            document.getElementById('btnToggle').style.display = 'none';
            Swal.fire('Berhasil', `Selamat datang, ${loggedInUser}`, 'success');
            setupLogDropdown(); // Pastikan dropdown terpasang setelah login
        } else { 
            Swal.fire('Gagal', 'Username atau Password salah', 'error'); 
        }
    };

    // === RENDER & LISTEN DATABASE ===
    window.renderList = function(list) {
        const container = document.getElementById('newsList');
        if(!container) return;
        container.innerHTML = list.map(item => `
            <div class="news-card" onclick="detailEvent('${item.id}')" style="position:relative;">
                <img src="${item.fotos ? item.fotos[0] : ''}" class="news-img" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">
                <div class="news-body">
                    <div class="news-category">Post by: ${item.createdBy || 'System'}</div>
                    <div class="news-title">${item.nama}</div>
                    <div class="news-meta"><span><i class="fas fa-calendar-alt"></i> ${formatTglIndo(item.tgl)}</span></div>
                </div>
            </div>`).join('');
    };

    onValue(eventRef, (snapshot) => {
        const data = snapshot.val();
        const list = [];
        for (let id in data) { list.unshift({ id, ...data[id] }); }
        window.currentEvents = list;
        window.renderList(list);
    });
</script>
</body>
</html>
