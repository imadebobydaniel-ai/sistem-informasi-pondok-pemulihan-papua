<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Jemaat - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .header { 
            background: var(--primary); 
            color: white; 
            padding: 35px 15px 15px 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            border-bottom: 3px solid var(--accent); 
        }

        /* Navigasi Kiri & Kanan */
        .nav-left { position: absolute; left: 15px; bottom: 15px; }
        .nav-admin { position: absolute; right: 15px; bottom: 15px; }
        
        .btn-toggle-login { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .login-dropdown { 
            display: none; 
            position: absolute; 
            top: 50px; 
            right: 0; 
            width: 240px; 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.25); 
            z-index: 2000; 
            border: 1px solid #eee; 
        }
        
        .login-logo { display: block; margin: 0 auto 5px auto; max-width: 80px; height: auto; }
        .login-label { text-align: center; font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; }
        .login-dropdown input { width: 100%; height: 42px; margin-bottom: 12px; padding: 0 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }

        .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 12px; top: 13px; color: #888; cursor: pointer; z-index: 10; }
        .btn-masuk-dropdown { width: 100%; height: 42px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        /* Headline List Unik */
        .event-item { 
            background: white; border-radius: 16px; overflow: hidden; display: flex; margin-bottom: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; cursor: pointer; 
            transition: all 0.3s ease; border: 1px solid rgba(0,0,0,0.03);
        }
        .event-item:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .event-thumb { width: 120px; height: 120px; object-fit: cover; }
        .event-content { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .event-content h3 { margin: 0; font-size: 1.15rem; color: var(--primary); line-height: 1.3; font-weight: 800; }
        
        .date-badge {
            display: inline-block; background: #e8f4fd; color: #0055aa; padding: 4px 10px; 
            border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 8px; align-self: flex-start;
        }

        /* Mosaic Grid untuk Detail Berita */
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .photo-main { grid-column: span 3; width: 100%; border-radius: 12px; object-fit: cover; max-height: 300px; }
        .photo-sub { width: 100%; height: 80px; object-fit: cover; border-radius: 8px; }
        
        #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; }

        .extra-tools { display: flex; gap: 10px; margin: 10px 0; }
        .btn-tool { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .absensi-box, .log-activity-box { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .absensi-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
        .total-counter { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin: 10px 0; display: none; border: 2px dashed var(--accent); }
        .btn-close-scanner { width: 100%; padding: 10px; background: #666; color: white; border: none; border-radius: 8px; margin-top: 5px; display: none; font-weight: bold; }
        .log-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="nav-left">
        <button id="btnLogout" style="display:none; background:#e74c3c; border:none; color:white; height: 38px; padding:0 15px; border-radius:19px; font-weight:bold; cursor:pointer;" onclick="confirmLogout()">LOGOUT</button>
    </div>
    <h1 style="font-size: 1.1rem; margin: 0; letter-spacing: 1px;">EVENT JEMAAT</h1>
    <div class="nav-admin">
        <button id="btnToggle" class="btn-toggle-login" onclick="toggleLoginSlider()"><i class="fas fa-user-shield"></i></button>
        <div id="loginBox" class="login-dropdown">
            <img src="logo_pondok.png" alt="Logo" class="login-logo">
            <span class="login-label">LOGIN EVENT JEMAAT</span>
            <input type="text" id="userAdmin" placeholder="Username">
            <div class="pass-container">
                <input type="password" id="passAdmin" placeholder="Password">
                <i class="fas fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
            </div>
            <button class="btn-masuk-dropdown" onclick="loginEvent()">MASUK</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="adminSection">
        <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; margin-bottom:15px; padding:0; display:flex; align-items:center; gap:5px;">
            <i class="fas fa-arrow-left"></i> KEMBALI
        </button>

        <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="text" id="lokasiEvent" placeholder="Lokasi" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <input type="date" id="tglEvent" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
        
        <p style="font-size: 12px; margin: 0;">Upload Foto ke Cloudinary (Maks 4 untuk layout rapi):</p>
        <input type="file" id="fotoEvent" accept="image/*" multiple onchange="uploadToCloudinary(event)">
        <div id="uploadStatus" style="font-size: 11px; color: var(--primary); margin: 5px 0;"></div>

        <div class="extra-tools">
            <button class="btn-tool" onclick="shareWhatsApp()"><i class="fab fa-whatsapp" style="color:#25D366"></i> SHARE WA</button>
            <button class="btn-tool" onclick="generatePDF()"><i class="fas fa-file-pdf" style="color:#e74c3c"></i> GENERATE PDF</button>
        </div>

        <button class="btn-action" style="background:var(--accent)" id="btnSimpan" onclick="simpanData()">SIMPAN & PUBLIKASIKAN</button>

        <div class="absensi-box">
            <div class="absensi-header">
                <span style="font-weight:bold; font-size:13px;"><i class="fas fa-qrcode"></i> ABSENSI JEMAAT</span>
                <span class="total-counter" onclick="showHistoryAbsen()">Total: <span id="totalAbsen">0</span></span>
            </div>
            <button class="btn-action" style="background: var(--primary); margin-bottom: 10px;" onclick="startScanner()">
                <i class="fas fa-camera"></i> SCAN KARTU DIGITAL
            </button>
            <div id="reader"></div>
            <button id="btnCloseScanner" class="btn-close-scanner" onclick="stopScanner()">MATIKAN KAMERA</button>
        </div>

        <div class="log-activity-box">
            <span style="font-weight:bold; font-size:13px;"><i class="fas fa-history"></i> LOG ACTIVITY</span>
            <div id="logContent" style="margin-top:10px;"></div>
        </div>
    </div>
    <div id="newsList"></div>
</div>

<script>
    const databaseJemaat = {
        "boby.daniel4@gmail.com": "I Made Boby",
        "admin@sipapua.com": "Administrator"
    };

    const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/dxzllsbgi/image/upload";
    const CLOUDINARY_PRESET = "sipapua_preset";
    let cloudinaryImages = [];
    let isAdmin = false;
    let listHadirID = []; 
    let listHadirNames = []; 
    let html5QrCode;

    window.onload = function() { 
        renderList(); 
        updateLogActivity();
    };

    // Formatter Tanggal DD-MM-YYYY
    function formatTglIndo(dateStr) {
        if(!dateStr) return "-";
        const [y, m, d] = dateStr.split('-');
        return `${d}-${m}-${y}`;
    }

    function toggleLoginSlider() {
        const box = document.getElementById('loginBox');
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }

    function togglePassword() {
        const pInput = document.getElementById('passAdmin');
        const icon = document.getElementById('eyeIcon');
        pInput.type = (pInput.type === "password") ? "text" : "password";
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    }

    function loginEvent() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        if(u === "admin" && p === "admin123") {
            isAdmin = true;
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('newsList').style.display = 'none'; // Sembunyikan list berita sesuai instruksi
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnToggle').style.display = 'none';
            document.getElementById('btnLogout').style.display = 'block';
            renderList(); 
        } else {
            Swal.fire('Gagal', 'Akses Ditolak', 'error');
        }
    }

    function confirmLogout() {
        Swal.fire({
            title: 'Konfirmasi Keluar',
            text: "Apakah anda ingin keluar?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'Iya',
            cancelButtonText: 'Tidak'
        }).then((result) => {
            if (result.isConfirmed) { location.reload(); }
        });
    }

    async function uploadToCloudinary(e) {
        const files = Array.from(e.target.files);
        const statusLabel = document.getElementById('uploadStatus');
        if (files.length === 0) return;
        cloudinaryImages = [];
        statusLabel.innerText = "⏳ Sedang mengunggah...";
        document.getElementById('btnSimpan').disabled = true;
        try {
            for (let file of files) {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", CLOUDINARY_PRESET);
                const res = await fetch(CLOUDINARY_URL, { method: "POST", body: formData });
                const data = await res.json();
                cloudinaryImages.push(data.secure_url);
            }
            statusLabel.innerText = "✅ Selesai Mengunggah.";
        } catch (err) {
            statusLabel.innerText = "❌ Gagal mengunggah.";
        } finally {
            document.getElementById('btnSimpan').disabled = false;
        }
    }

    function simpanData() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = document.getElementById('tglEvent').value;
        const isi = document.getElementById('isiEvent').value;
        if(!nama || cloudinaryImages.length === 0) return Swal.fire('Peringatan', 'Nama kegiatan dan foto wajib diisi!', 'warning');
        
        const newEntry = { id: Date.now(), nama, lokasi, tgl, isi, fotos: cloudinaryImages };
        let list = JSON.parse(localStorage.getItem('eventList')) || [];
        list.unshift(newEntry);
        localStorage.setItem('eventList', JSON.stringify(list));
        
        document.getElementById('namaEvent').value = "";
        document.getElementById('lokasiEvent').value = "";
        document.getElementById('isiEvent').value = "";
        cloudinaryImages = [];
        
        renderList();
        updateLogActivity();
        Swal.fire('Berhasil', 'Event telah dipublikasikan', 'success');
    }

    function renderList() {
        const list = JSON.parse(localStorage.getItem('eventList')) || [];
        const container = document.getElementById('newsList');
        container.innerHTML = "";
        list.forEach(item => {
            container.innerHTML += `
                <div class="event-item" onclick="detailEvent(${item.id})">
                    <img src="${item.fotos[0]}" class="event-thumb">
                    <div class="event-content">
                        <h3>${item.nama}</h3>
                        <div class="date-badge"><i class="fas fa-calendar-alt"></i> ${formatTglIndo(item.tgl)}</div>
                    </div>
                </div>`;
        });
    }

    function detailEvent(id) {
        const list = JSON.parse(localStorage.getItem('eventList')) || [];
        const item = list.find(x => x.id === id);
        if(!item) return;

        let photoHtml = `<img src="${item.fotos[0]}" class="photo-main">`;
        if(item.fotos.length > 1) {
            photoHtml = `<div class="photo-grid"><img src="${item.fotos[0]}" class="photo-main">`;
            for(let i=1; i < Math.min(item.fotos.length, 4); i++) {
                photoHtml += `<img src="${item.fotos[i]}" class="photo-sub">`;
            }
            photoHtml += `</div>`;
        }

        Swal.fire({
            title: `<span style="color:#003366; font-size:1.4rem;">${item.nama}</span>`,
            html: `
                <div style="text-align:left; font-size:14px; line-height:1.6;">
                    ${photoHtml}
                    <div style="background:#f8f9fa; padding:10px; border-radius:8px; margin:10px 0;">
                        <p style="margin:2px 0;"><b><i class="fas fa-map-marker-alt" style="color:#e74c3c"></i> Lokasi:</b> ${item.lokasi}</p>
                        <p style="margin:2px 0;"><b><i class="fas fa-calendar-day" style="color:#3498db"></i> Waktu:</b> ${formatTglIndo(item.tgl)}</p>
                    </div>
                    <div style="padding:5px; font-size:15px; color:#333; text-align:justify;">
                        <p style="white-space: pre-line;">${item.isi}</p>
                    </div>
                </div>
            `,
            confirmButtonText: 'Tutup Halaman',
            confirmButtonColor: '#003366',
            width: '95%'
        });
    }

    function shareWhatsApp() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = formatTglIndo(document.getElementById('tglEvent').value);
        const isi = document.getElementById('isiEvent').value;
        
        if(!nama) return Swal.fire('Info', 'Isi data event dulu', 'info');
        const text = encodeURIComponent(`*BERITA EVENT - SIPAPUA*\n\n*Kegiatan:* ${nama}\n*Lokasi:* ${lokasi}\n*Tanggal:* ${tgl}\n\n*Detail:* \n${isi}\n\n_Dibuat via Sistem SIPAPUA_`);
        window.open(`https://wa.me/?text=${text}`, '_blank');
    }

    function generatePDF() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = formatTglIndo(document.getElementById('tglEvent').value);
        const isi = document.getElementById('isiEvent').value;

        if(!nama || cloudinaryImages.length === 0) return Swal.fire('Info', 'Lengkapi data dan foto untuk buat PDF', 'info');

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("LAPORAN EVENT SIPAPUA", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text(`Nama Kegiatan : ${nama}`, 20, 40);
        doc.text(`Lokasi        : ${lokasi}`, 20, 50);
        doc.text(`Tanggal       : ${tgl}`, 20, 60);
        doc.text("Detail Kegiatan:", 20, 80);
        const splitText = doc.splitTextToSize(isi, 170);
        doc.text(splitText, 20, 90);

        const img = new Image();
        img.crossOrigin = "Anonymous"; 
        img.src = cloudinaryImages[0];
        img.onload = function() {
            doc.addImage(img, 'JPEG', 20, 120, 170, 100);
            doc.save(`Event_${nama}.pdf`);
        };
    }

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnCloseScanner').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (decodedText) => {
            if (listHadirID.includes(decodedText)) {
                Swal.fire({ icon: 'error', title: 'Gagal', text: 'Tidak bisa dobel absen' });
            } else {
                const namaLengkap = databaseJemaat[decodedText] || decodedText;
                listHadirID.push(decodedText);
                listHadirNames.push(namaLengkap);
                document.getElementById('totalAbsen').innerText = listHadirID.length;
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Hadir: ' + namaLengkap, showConfirmButton: false, timer: 1500 });
            }
        }).catch(err => { console.log(err); });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('btnCloseScanner').style.display = 'none';
            });
        }
    }

    function showHistoryAbsen() {
        if (listHadirNames.length === 0) return Swal.fire('Info', 'Belum ada jemaat.', 'info');
        let htmlList = '<table style="width:100%; font-size:14px; text-align:left;">';
        listHadirNames.forEach((nama, i) => { htmlList += `<tr><td>${i+1}. ${nama}</td></tr>`; });
        htmlList += '</table>';
        Swal.fire({ title: 'Daftar Hadir', html: htmlList });
    }

    function updateLogActivity() {
        const list = JSON.parse(localStorage.getItem('eventList')) || [];
        const logBox = document.getElementById('logContent');
        logBox.innerHTML = "";
        list.forEach(item => {
            // LOG ACTIVITY DILENGKAPI DENGAN TANGGAL BULAN TAHUN
            logBox.innerHTML += `
                <div class="log-item">
                    <div>
                        <b style="display:block;">${item.nama}</b>
                        <small style="color:#888;">${formatTglIndo(item.tgl)}</small>
                    </div>
                    <button onclick="hapusBerita(${item.id})" style="border:none; color:red; background:none; cursor:pointer;"><i class="fas fa-trash"></i></button>
                </div>`;
        });
    }

    async function hapusBerita(id) {
        const { value: pass } = await Swal.fire({ title: 'Sandi Admin', input: 'password' });
        if (pass === 'admin123') {
            let list = JSON.parse(localStorage.getItem('eventList'));
            list = list.filter(x => x.id !== id);
            localStorage.setItem('eventList', JSON.stringify(list));
            renderList();
            updateLogActivity();
        }
    }
</script>
</body>
</html>
