<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Jemaat - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
    :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; --danger: #e74c3c; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    input, textarea, select {
        box-sizing: border-box; width: 100% !important; max-width: 100%;
        margin-bottom: 12px; padding: 12px; border-radius: 8px;
        border: 1px solid #ddd; font-size: 16px;
    }

    .header { 
        background: var(--primary); color: white; padding: 35px 15px 15px 15px; 
        display: flex; justify-content: center; align-items: center; 
        position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent); 
    }

    .nav-left { position: absolute; left: 15px; bottom: 15px; display: flex; gap: 10px; }
    .nav-admin { position: absolute; right: 15px; bottom: 15px; }
    .btn-toggle-login { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .login-dropdown { 
        display: none; position: absolute; top: 50px; right: 0; width: 240px; 
        background: white; padding: 20px; border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.25); z-index: 2000; border: 1px solid #eee; 
    }
    
    .login-label { text-align: center; font-size: 12px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: block; }
    .pass-container { position: relative; width: 100%; }
    .toggle-pass { position: absolute; right: 12px; top: 13px; color: #888; cursor: pointer; z-index: 10; }
    .btn-masuk-dropdown { width: 100%; height: 42px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

    .container { padding: 15px; max-width: 1000px; margin: auto; }

    #newsList { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 320px)); 
        gap: 20px;
        justify-content: center;
        width: 100%;
        margin-top: 20px;
    }
    
    .news-card {
        background: white; border-radius: 12px; overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: transform 0.3s ease;
        cursor: pointer; display: flex; flex-direction: column;
        width: 100%; margin: 0;
    }

    .news-card:hover { transform: translateY(-5px); }
    .news-img { width: 100%; height: 200px; object-fit: cover; background: #eee; }
    .news-body { padding: 15px; flex-grow: 1; }
    .news-category { color: var(--accent); font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
    .news-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; color: var(--primary); line-height: 1.3; }
    .news-meta { font-size: 0.75rem; color: #7f8c8d; display: flex; justify-content: space-between; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }

    .modal-news-img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
    .news-content-text { font-size: 1rem; line-height: 1.6; color: #333; text-align: justify; white-space: pre-line; }
    
    #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
    #superAdminSection { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed var(--primary); display: none; }
    .btn-action { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; color: white; font-size: 14px; }
    
    .absensi-box, .log-activity-box { background: white; border: 1px solid #ddd; border-radius: 10px; padding: 15px; margin-top: 15px; }
    .absensi-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 10px; }
    .total-counter { background: var(--primary); color: white; padding: 2px 10px; border-radius: 20px; font-size: 14px; }
    
    #reader { width: 100%; border-radius: 10px; overflow: hidden; margin: 10px 0; display: none; border: 2px dashed var(--accent); }
    .btn-header-back { border:none; background:#555; color:white; height: 38px; padding:0 15px; border-radius:19px; font-weight:bold; cursor:pointer; font-size: 12px; display: flex; align-items: center; }
</style>
</head>
<body>

<div class="header">
    <div class="nav-left">
        <button class="btn-header-back" onclick="window.history.back()">
            <i class="fas fa-chevron-left"></i> &nbsp;KEMBALI
       </button>
        <button id="btnBack" onclick="location.reload()" style="display:none; border:none; background:#d33; color:white; height: 38px; padding:0 20px; border-radius:19px; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>
    <h1 style="font-size: 1.1rem; margin: 0; letter-spacing: 1px;">EVENT JEMAAT</h1>
    <div class="nav-admin">
        <button class="btn-toggle-login" onclick="toggleLoginSlider()"><i class="fas fa-user-shield"></i></button>
        <div id="loginBox" class="login-dropdown">
            <span class="login-label">LOGIN ADMIN</span>
            <input type="text" id="userAdmin" placeholder="Username">
            <div class="pass-container">
               <input type="password" id="passAdmin" placeholder="Password">
                <i class="fas fa-eye toggle-pass" id="eyeIcon" onclick="togglePassword()"></i>
          </div>
            <button class="btn-masuk-dropdown" onclick="loginEvent()">MASUK</button>
        </div>
    </div>
</div>

<div class="container">
    <div id="adminSection">
       <h3><i class="fas fa-edit"></i> CMS Input Kegiatan</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Isi detail kegiatan..." rows="4"></textarea>
        
        <p style="font-size: 12px; margin: 0;">Upload Foto ke Cloudinary:</p>
        <input type="file" id="fotoEvent" accept="image/*" multiple capture="environment">
        <div id="uploadStatus" style="font-size: 11px; color: var(--primary); margin: 5px 0;"></div>

        <button class="btn-action" style="background:var(--accent)" id="btnSimpan">SIMPAN & SINNKRONKAN</button>

        <div id="superAdminSection">
            <p style="font-weight:bold; font-size:13px; margin-bottom:10px;"><i class="fas fa-user-plus"></i> TAMBAH ADMIN LITE</p>
            <div style="display: flex; flex-direction: column; gap: 0px;">
                <input type="text" id="newAdminUser" placeholder="Username Baru">
                <input type="password" id="newAdminPass" placeholder="Password Baru">
                <button class="btn-action" style="background:var(--primary); margin-top:0; margin-bottom: 15px;" onclick="createNewAdmin()">DAFTARKAN ADMIN</button>
            </div>

            <div class="absensi-box">
                <div class="absensi-header">
                  <span style="font-weight:bold; font-size:13px;"><i class="fas fa-qrcode"></i> ABSENSI</span>
                  <span class="total-counter" style="cursor:pointer" onclick="showAbsenList()">Total: <span id="totalAbsen">0</span></span>
              </div>
                <button class="btn-action" style="background: var(--primary);" onclick="startScanner()">SCAN QR</button>
                <button class="btn-action" style="background: #d33; display:none;" id="btnStopScan" onclick="stopScanner()">TUTUP KAMERA</button>
                <div id="reader"></div>
            </div>
        </div>
        <div class="log-activity-box">
            <span style="font-weight:bold; font-size:13px;"><i class="fas fa-history"></i> LOG ACTIVITY (CLOUD)</span>
            <div id="logContent" style="margin-top:10px; font-size:11px;"></div>
        </div>
    </div>
    
    <div id="newsList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, get, set, child, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com/", 
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const eventRef = ref(db, 'events');
    const NO_IMG = "https://upload.wikimedia.org/wikipedia/commons/thumb/6/65/No-Image-Placeholder.svg/1665px-No-Image-Placeholder.svg.png";

    window.currentAdmin = null; 
    window.cloudinaryImages = [];
    window.currentEvents = [];
    let listAbsensi = []; 

    function formatTglIndo(dateString) {
        if (!dateString) return "-";
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        return new Date(dateString).toLocaleDateString('id-ID', options);
    }

    window.toggleLoginSlider = () => {
        const box = document.getElementById('loginBox');
        box.style.display = (box.style.display === 'block') ? 'none' : 'block';
    };

    window.togglePassword = () => {
        const p = document.getElementById('passAdmin');
        const icon = document.getElementById('eyeIcon');
        p.type = (p.type === "password") ? "text" : "password";
        icon.className = (p.type === "password") ? "fas fa-eye toggle-pass" : "fas fa-eye-slash toggle-pass";
    };

    window.loginEvent = async function() {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        let loggedInUser = "";
        if(u === "admin" && p === "admin123") { loggedInUser = "SuperAdmin"; }
        else {
            const snap = await get(child(ref(db), `admin_users/${u}`));
            if (snap.exists() && snap.val().password === p) loggedInUser = u;
        }
        if (loggedInUser) {
            window.currentAdmin = loggedInUser;
            document.getElementById('adminSection').style.display = 'block';
            if(loggedInUser === "SuperAdmin") document.getElementById('superAdminSection').style.display = 'block';
            document.getElementById('newsList').style.display = 'none'; 
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnBack').style.display = 'inline-block';
            Swal.fire('Berhasil', `Selamat datang, ${loggedInUser}`, 'success');
        } else { Swal.fire('Gagal', 'Username/Password salah', 'error'); }
    };

    window.createNewAdmin = async function() {
        const nu = document.getElementById('newAdminUser').value;
        const np = document.getElementById('newAdminPass').value;
        if(!nu || !np) return Swal.fire('Error', 'Lengkapi data', 'error');
        await set(ref(db, `admin_users/${nu}`), { password: np });
        Swal.fire('Berhasil', `Admin ${nu} terdaftar!`, 'success');
        document.getElementById('newAdminUser').value = ""; document.getElementById('newAdminPass').value = "";
    };

    // FUNGSI HANDLE FILE UPLOAD (DIPERBARUI DENGAN CLOUD NAME & PRESET YANG BENAR)
    window.handleFileUpload = async (event) => {
        const files = event.target.files;
        window.cloudinaryImages = [];
        Swal.fire({ title: 'Mengunggah...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        
        for (let file of files) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', 'sipapua_preset'); // Menggunakan preset dari panel Cloudinary Anda
            try {
                // Menggunakan Cloud Name 'dxzllsbgi' sesuai identitas akun Anda
                const resp = await fetch('https://api.cloudinary.com/v1_1/dxzllsbgi/image/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                
                if (data.secure_url) {
                    window.cloudinaryImages.push(data.secure_url);
                } else {
                    console.error("Upload gagal:", data.error ? data.error.message : "Unknown error");
                }
            } catch (err) {
                console.error("Fetch error:", err);
            }
        }
        Swal.close();
        document.getElementById('uploadStatus').innerText = window.cloudinaryImages.length + " Foto siap.";
    };

    // FUNGSI SIMPAN BERITA (ANTI-UNDEFINED)
    window.simpanBerita = async function() {
        const nama = document.getElementById('namaEvent').value;
        const lokasi = document.getElementById('lokasiEvent').value;
        const tgl = document.getElementById('tglEvent').value;
        const isi = document.getElementById('isiEvent').value;

        if (!nama || !lokasi || !tgl) {
            return Swal.fire('Error', 'Data wajib diisi!', 'error');
        }

        const daftarFotoValid = (window.cloudinaryImages || []).filter(url => url != null);

        const newEvent = { 
            nama, 
            lokasi, 
            tgl, 
            isi: isi || "", 
            fotos: daftarFotoValid, 
            createdBy: window.currentAdmin || "Admin", 
            createdAt: new Date().toISOString() 
        };

        try {
            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            
            await push(eventRef, newEvent);
            
            await push(ref(db, 'log_activity'), { 
                user: window.currentAdmin || 'Admin', 
                action: `Menerbitkan Berita: ${nama}`, 
                timestamp: new Date().toLocaleString('id-ID') 
            });

            Swal.fire('Berhasil', 'Tersinkron!', 'success').then(() => location.reload());
        } catch (error) {
            console.error("Firebase Push Error:", error);
            Swal.fire('Gagal', 'Terjadi kesalahan: ' + error.message, 'error');
        }
    };

    let html5QrCode;
    window.startScanner = function() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('btnStopScan').style.display = 'block';
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            let displayName = text.includes('@') ? text.split('@')[0].replace(/\./g, ' ').toUpperCase() : text;
            if (!listAbsensi.includes(displayName)) {
                listAbsensi.push(displayName); 
                document.getElementById('totalAbsen').innerText = listAbsensi.length;
                Swal.fire('Berhasil Absen', displayName, 'success');
            }
        });
    };

    window.stopScanner = () => {
        if(html5QrCode) html5QrCode.stop().then(() => {
            document.getElementById('reader').style.display = 'none';
            document.getElementById('btnStopScan').style.display = 'none';
        });
    };

    window.showAbsenList = () => {
        const list = listAbsensi.length ? `<ol>${listAbsensi.map(n => `<li>${n}</li>`).join('')}</ol>` : 'Kosong';
        Swal.fire({ title: 'Daftar Absen', html: list });
    };

    window.detailEvent = (id) => {
        const item = window.currentEvents.find(x => x.id === id);
        const fotoUrl = (item.fotos && item.fotos.length > 0) ? item.fotos[0] : NO_IMG;
        Swal.fire({
            title: item.nama,
            html: `
                <img src="${fotoUrl}" class="modal-news-img" style="width:100%; border-radius:12px; margin-bottom:15px; object-fit:cover; max-height:250px;" onerror="this.src='${NO_IMG}'">
                <div style="text-align:left; font-size:14px">
                    <p><b><i class="fas fa-map-marker-alt"></i> Lokasi:</b> ${item.lokasi}</p>
                    <p><b><i class="fas fa-calendar-day"></i> Tanggal:</b> ${formatTglIndo(item.tgl)}</p>
                    <hr><div class="news-content-text">${item.isi || ''}</div>
                </div>
                <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:20px">
                    <button onclick="shareWA('${id}')" style="flex:1; padding:8px; background:#25d366; color:white; border:none; border-radius:6px; font-size:12px; font-weight:bold;"><i class="fab fa-whatsapp"></i> Whatsapp</button>
                    <button onclick="downloadPDF('${id}')" style="flex:1; padding:8px; background:#e74c3c; color:white; border:none; border-radius:6px; font-size:12px; font-weight:bold;"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button onclick="hapusBerita('${id}')" style="flex:0.5; padding:8px; background:#333; color:white; border:none; border-radius:6px; font-size:12px;"><i class="fas fa-trash"></i></button>
                </div>`,
            showConfirmButton: false, showCloseButton: true, width: '90%'
        });
    };

    window.downloadPDF = async (id) => {
        const { jsPDF } = window.jspdf; const item = window.currentEvents.find(x => x.id === id);
        const doc = new jsPDF();
        Swal.fire({ title: 'PDF...', didOpen: () => Swal.showLoading() });
        doc.text("LAPORAN KEGIATAN", 105, 20, { align: 'center' });
        doc.text(item.nama, 105, 30, { align: 'center' });
        if (item.fotos && item.fotos.length > 0) {
            try {
                const img = new Image(); img.crossOrigin = "Anonymous"; img.src = item.fotos[0];
                await new Promise((res) => { img.onload = () => { doc.addImage(img, 'JPEG', 20, 40, 170, 90); res(); }; img.onerror = () => res(); });
            } catch (e) {}
        }
        doc.save(`Event_${id}.pdf`); Swal.close();
    };

    window.shareWA = (id) => {
        const item = window.currentEvents.find(x => x.id === id);
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(item.nama + '\n' + item.lokasi)}`);
    };

    window.hapusBerita = async (id) => {
        const { value: password } = await Swal.fire({
            title: 'Konfirmasi Keamanan',
            text: 'Masukkan password SuperApps (admin123) untuk menghapus',
            input: 'password',
            inputPlaceholder: 'Password Keamanan',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'Hapus Permanen',
            cancelButtonText: 'Batal',
            inputAttributes: { autocapitalize: 'off', autocorrect: 'off', style: 'text-align:center; letter-spacing: 5px; font-size: 20px;' },
            customClass: { input: 'custom-swal-input' }
        });

        if (password) {
            if (password === "admin123") {
                try {
                    await remove(ref(db, `events/${id}`));
                    await push(ref(db, 'log_activity'), { 
                        user: window.currentAdmin || 'System', 
                        action: `Menghapus Berita ID: ${id}`, 
                        timestamp: new Date().toLocaleString('id-ID') 
                    });
                    Swal.fire({ icon: 'success', title: 'Terhapus!', text: 'Berita telah dihapus dari sistem.', timer: 1500 }).then(() => location.reload());
                } catch (error) {
                    Swal.fire('Error', 'Gagal menghapus: ' + error.message, 'error');
                }
            } else {
                Swal.fire('Gagal', 'Password SuperApps Salah!', 'error');
            }
        }
    };

    onValue(eventRef, (snapshot) => {
        const data = snapshot.val(); const list = [];
        for (let id in data) { list.unshift({ id, ...data[id] }); }
        window.currentEvents = list;
        document.getElementById('newsList').innerHTML = list.map(item => {
            const fotoUrl = (item.fotos && item.fotos.length > 0) ? item.fotos[0] : NO_IMG;
            return `
                <div class="news-card" onclick="detailEvent('${item.id}')">
                    <img src="${fotoUrl}" class="news-img" onerror="this.src='${NO_IMG}'">
                    <div class="news-body">
                        <div class="news-category">BY: ${item.createdBy || 'ADMIN'}</div>
                        <div class="news-title">${item.nama}</div>
                        <div class="news-meta"><span><i class="fas fa-calendar-alt"></i> ${formatTglIndo(item.tgl)}</span></div>
                    </div>
                </div>`;
        }).join('');
    });

    onValue(ref(db, 'log_activity'), (snap) => {
        const data = snap.val(); let h = "";
        for(let id in data) { h = `<div>> ${data[id].timestamp} - ${data[id].action}</div>` + h; }
        document.getElementById('logContent').innerHTML = h;
    });

    document.getElementById('fotoEvent').onchange = window.handleFileUpload;
    document.getElementById('btnSimpan').onclick = window.simpanBerita;
</script></body>
</html>
