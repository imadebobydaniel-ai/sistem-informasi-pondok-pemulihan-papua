<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Jemaat - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --primary: #003366; --accent: #2ecc71; --bg: #f0f2f5; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        /* HEADER - Pastikan tombol kembali dan login tetap terlihat */
        .header { 
            background: var(--primary); color: white; padding: 10px 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 3px solid var(--accent); 
            height: 70px; box-sizing: border-box;
        }

        .btn-header-back { 
            border:none; background: rgba(255,255,255,0.15); color:white; 
            padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer;
            font-size: 11px; display: flex; align-items: center;
        }

        .btn-toggle-login { background: var(--accent); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }

        .login-dropdown { 
            display: none; position: absolute; top: 75px; right: 15px; width: 250px; 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000; color: #333;
        }

        .container { padding: 15px; max-width: 1200px; margin: auto; }

        /* GRID BERITA SIMETRIS - Card diperkecil di desktop */
        #newsList { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 350px)); 
            gap: 20px; padding: 20px 0; justify-content: center;
        }
        
        .news-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); cursor: pointer;
            display: flex; flex-direction: column; width: 100%;
        }
        .news-img { width: 100%; height: 180px; object-fit: cover; background: #ddd; }
        .news-body { padding: 15px; }
        .news-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin: 5px 0; line-height: 1.3; }

        #adminSection { background: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--primary); display: none; }
        
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-wa { background: #25d366; color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
        .btn-pdf { background: var(--danger); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; flex: 1; }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-header-back" onclick="window.history.back()">
        <i class="fas fa-chevron-left"></i> &nbsp;KEMBALI
    </button>
    <h1 style="font-size: 0.9rem; margin: 0; text-align: center;">EVENT JEMAAT</h1>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button id="btnLogout" onclick="location.reload()" style="display:none; background:#d33; color:white; border:none; padding:6px 12px; border-radius:15px; font-weight:bold; cursor:pointer; font-size: 10px;">LOGOUT</button>
        <button id="btnToggle" class="btn-toggle-login" onclick="toggleLoginSlider()">
            <i class="fas fa-user-shield"></i>
        </button>
    </div>

    <div id="loginBox" class="login-dropdown">
        <h4 style="margin:0 0 10px 0; text-align:center; font-size: 14px;">LOGIN ADMIN</h4>
        <input type="text" id="userAdmin" placeholder="Username">
        <input type="password" id="passAdmin" placeholder="Password">
        <button onclick="loginEvent()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">MASUK</button>
    </div>
</div>

<div class="container">
    <div id="adminSection">
        <h3 style="margin-top: 0;"><i class="fas fa-plus-circle"></i> Posting Berita Baru</h3>
        <input type="text" id="namaEvent" placeholder="Nama Kegiatan">
        <input type="text" id="lokasiEvent" placeholder="Lokasi">
        <input type="date" id="tglEvent">
        <textarea id="isiEvent" placeholder="Tulis artikel berita di sini..." rows="5"></textarea>
        <p style="font-size: 11px; color: #666; margin: 0 0 5px 0;">*ID Penulis akan otomatis sesuai login</p>
        <button onclick="simpanEvent()" style="width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">PUBLIKASIKAN BERITA</button>
    </div>
    <div id="newsList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com/", 
        projectId: "boby-apps-project",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const eventRef = ref(db, 'events');

    window.currentAdmin = null;
    window.currentEvents = [];

    // --- FORMAT TANGGAL INDONESIA (Tanggal Bulan Tahun) ---
    const formatTglIndo = (dateStr) => {
        if(!dateStr) return "-";
        const opsi = { day: 'numeric', month: 'long', year: 'numeric' };
        return new Date(dateStr).toLocaleDateString('id-ID', opsi);
    };

    // --- REGISTRASI FUNGSI GLOBAL ---
    window.toggleLoginSlider = () => {
        const box = document.getElementById('loginBox');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    };

    window.loginEvent = async () => {
        const u = document.getElementById('userAdmin').value;
        const p = document.getElementById('passAdmin').value;
        // Logic Login Anda
        if(u === "admin" && p === "admin123") {
            window.currentAdmin = "SuperAdmin";
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('btnLogout').style.display = 'block';
            document.getElementById('btnToggle').style.display = 'none';
            Swal.fire('Berhasil', `Selamat datang, ${u}`, 'success');
        } else {
            Swal.fire('Gagal', 'Username/Password salah', 'error');
        }
    };

    window.simpanEvent = () => {
        const nama = document.getElementById('namaEvent').value.trim();
        if(!nama) return Swal.fire('Peringatan', 'Judul berita wajib diisi', 'warning');

        push(eventRef, {
            nama: nama,
            lokasi: document.getElementById('lokasiEvent').value,
            tgl: document.getElementById('tglEvent').value, // Simpan format standar YYYY-MM-DD
            isi: document.getElementById('isiEvent').value,
            createdBy: window.currentAdmin || "System",
            createdAt: Date.now()
        }).then(() => {
            Swal.fire('Sukses', 'Berita berhasil dipublikasikan', 'success').then(() => location.reload());
        });
    };

    window.detailEvent = (id) => {
        const item = window.currentEvents.find(x => x.id === id);
        if(!item) return;

        Swal.fire({
            title: item.nama,
            html: `
                <div style="text-align:left; font-size:14px;">
                    <p><strong><i class="fas fa-map-marker-alt"></i> Lokasi:</strong> ${item.lokasi || '-'}</p>
                    <p><strong><i class="fas fa-calendar"></i> Waktu:</strong> ${formatTglIndo(item.tgl)}</p>
                    <hr>
                    <div style="white-space:pre-wrap; color: #333; line-height: 1.5;">${item.isi || 'Tidak ada artikel.'}</div>
                    <p style="font-size:10px; color:#888; margin-top:20px; border-top: 1px dashed #ccc; padding-top: 10px;">ID Pemilik: ${item.createdBy}</p>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button class="btn-wa" onclick="window.shareWA('${id}')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                    <button class="btn-pdf" onclick="window.generatePDF('${id}')"><i class="fas fa-file-pdf"></i> PDF</button>
                </div>
            `,
            showConfirmButton: false, showCloseButton: true, width: '95%'
        });
    };

    window.shareWA = (id) => {
        const item = window.currentEvents.find(x => x.id === id);
        const text = `*BERITA EVENT*\n\n*Judul:* ${item.nama}\n*Tanggal:* ${formatTglIndo(item.tgl)}\n*Lokasi:* ${item.lokasi}\n\n*Isi Berita:* \n${item.isi}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    };

    window.generatePDF = (id) => {
        const item = window.currentEvents.find(x => x.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.text("PONDOK PEMULIHAN PAPUA", 105, 20, { align: "center" });
        doc.setFontSize(12);
        doc.text("Laporan Dokumentasi Berita", 105, 28, { align: "center" });
        doc.line(20, 32, 190, 32);

        doc.setFontSize(13);
        doc.text(item.nama, 20, 45);
        doc.setFontSize(10);
        doc.text(`Waktu: ${formatTglIndo(item.tgl)} | Lokasi: ${item.lokasi}`, 20, 52);
        
        doc.setFontSize(11);
        const isiSplit = doc.splitTextToSize(item.isi, 170);
        doc.text(isiSplit, 20, 65);

        doc.setFontSize(8);
        doc.text(`ID Penulis: ${item.createdBy}`, 20, 285);
        
        doc.save(`Berita_${item.nama}.pdf`);
    };

    // --- REALTIME DATA ---
    onValue(eventRef, (snapshot) => {
        const data = snapshot.val();
        const list = [];
        for (let id in data) { list.unshift({ id, ...data[id] }); }
        window.currentEvents = list;
        
        const container = document.getElementById('newsList');
        container.innerHTML = list.map(item => `
            <div class="news-card" onclick="window.detailEvent('${item.id}')">
                <div class="news-body">
                    <div style="font-size:10px; color:var(--accent); font-weight:bold; text-transform:uppercase;">OLEH: ${item.createdBy}</div>
                    <div class="news-title">${item.nama}</div>
                    <div style="font-size:12px; color:#666;"><i class="fas fa-calendar-alt"></i> ${formatTglIndo(item.tgl)}</div>
                </div>
            </div>
        `).join('');
    });
</script>
</body>
</html>
