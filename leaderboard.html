<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peringkat Komsel - Pondok Pemulihan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --emas-lux: #D4AF37;
            --perak: #C0C0C0;
            --perunggu: #CD7F32;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; 
            padding: 15px;
            padding-bottom: 100px;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            text-align: center;
            border-top: 5px solid var(--biru-safir);
            position: relative;
            overflow: hidden;
        }

        /* Animasi Pulse untuk Juara 1 */
        .rank-1 {
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Ikon Info Pojok Kiri */
        .info-icon {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 20px;
            color: var(--biru-safir);
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            z-index: 10;
        }
        .info-icon:hover { opacity: 1; transform: scale(1.1); }

        h2 { color: var(--biru-tua); font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .info-sub { color: #888; font-size: 13px; font-weight: 600; margin-bottom: 25px; }

        /* Podium Visual */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 30px;
            gap: 10px;
            position: relative;
        }
        .podium-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .trophy-box {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }
        .rank-1 .trophy-box { 
            background: linear-gradient(135deg, #FFD700, #FDB931); 
            color: white; width: 65px; height: 65px; font-size: 32px; 
            border: 3px solid white;
        }
        .rank-2 .trophy-box { background: linear-gradient(135deg, #E0E0E0, #BDBDBD); color: white; }
        .rank-3 .trophy-box { background: linear-gradient(135deg, #f0a26d, #CD7F32); color: white; }

        .podium-name { font-weight: 900; font-size: 14px; color: var(--biru-tua); margin-top: 5px; }
        .podium-score { 
            font-size: 11px; 
            background: var(--biru-tua); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 10px; 
            margin-top: 4px;
            font-weight: 700;
        }
        
        .chart-box { 
            height: 200px; 
            width: 100%; 
            margin-top: 15px; 
            padding: 10px;
            background: #fdfdfd;
            border-radius: 15px;
        }

        .rank-list { text-align: left; margin-top: 10px; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-radius: 18px;
            margin-bottom: 10px;
            border: 1.5px solid #f0f0f0;
        }
        .rank-item.top-three { 
            border-left: 5px solid var(--emas-lux); 
            background: linear-gradient(to right, #fffdf5, #ffffff);
        }
        .rank-jc { font-weight: 800; font-size: 15px; color: var(--biru-tua); }
        .rank-val { 
            background: var(--biru-safir); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-size: 12px; 
            font-weight: 900; 
        }

        .btn-back-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            background: white; border-top: 1px solid #eee; z-index: 1000;
        }
        .btn-back { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--biru-tua); color: white; padding: 18px; 
            border-radius: 50px; text-decoration: none; font-weight: 800; 
            box-shadow: 0 8px 25px rgba(0,51,102,0.3);
        }

        #loading-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.8); display: flex; flex-direction:column;
            justify-content: center; align-items: center; z-index: 2000;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 51, 102, 0.4); 
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 20px;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: left;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .btn-close {
            width: 100%;
            background: var(--biru-tua);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: 800;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-sync fa-spin fa-3x" style="color: var(--biru-safir);"></i>
    <p style="margin-top: 15px; font-weight: bold;">Menghitung Skor JC...</p>
</div>

<div id="infoModal" class="modal-overlay" onclick="toggleModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3><i class="fas fa-info-circle" style="color: var(--biru-safir);"></i> Sistem Poin</h3>
        <hr style="border: 0; border-top: 1px solid #eee;">
        <div class="modal-body">
            <p style="font-size: 14px; font-weight: bold; color: var(--biru-tua);">Cara Poin Dihitung:</p>
            <ul style="padding-left: 20px; font-size: 14px;">
                <li><strong>Ibadah Raya / Arso 1:</strong> +10 Poin</li>
                <li><strong>Laporan Komsel / Gabungan / Doa:</strong> +8 Poin</li>
                <li><strong>Kelas Dasar (KD):</strong> +10 Poin</li>
                <li><strong>Laporan Baca Alkitab:</strong> +5 Poin</li>
            </ul>
        </div>
        <button class="btn-close" onclick="toggleModal()">MENGERTI</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="info-icon" onclick="toggleModal()">
            <i class="fas fa-info-circle"></i>
        </div>

        <h2><i class="fas fa-trophy" style="color: var(--emas-lux);"></i> Leaderboard</h2>
        <p class="info-sub" id="current-month">Periode: Memuat...</p>

        <div class="podium-container" id="podium">
            <div class="podium-item rank-2" style="order: 1;">
                <div class="trophy-box"><i class="fas fa-medal"></i></div>
                <div class="podium-name" id="top2-name">JC -</div>
                <div class="podium-score" id="top2-val">0</div>
            </div>
            <div class="podium-item rank-1" style="order: 2;" id="winner-zone">
                <div class="trophy-box"><i class="fas fa-crown"></i></div>
                <div class="podium-name" id="top1-name">JC -</div>
                <div class="podium-score" id="top1-val">0</div>
            </div>
            <div class="podium-item rank-3" style="order: 3;">
                <div class="trophy-box"><i class="fas fa-award"></i></div>
                <div class="podium-name" id="top3-name">JC -</div>
                <div class="podium-score" id="top3-val">0</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="chartJC"></canvas>
        </div>
    </div>

    <div id="rank-list" class="rank-list"></div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back"><i class="fas fa-home"></i> KEMBALI KE MENU</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
    // ... config firebase tetap sama ...

    // 1. PERBAIKAN FUNGSI SELEBRASI
    // Menambahkan zIndex agar confetti muncul di atas overlay/modal
    function selebrasiJuara() {
        const duration = 5 * 1000;
        const animationEnd = Date.now() + duration;
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 5000 }; // zIndex ditingkatkan

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        const interval = setInterval(function() {
            const timeLeft = animationEnd - Date.now();

            if (timeLeft <= 0) {
                return clearInterval(interval);
            }

            const particleCount = 50 * (timeLeft / duration);
            
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                colors: ['#D4AF37', '#FFD700']
            }));

            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                colors: ['#0056b3', '#90e0ef'] 
            }));
        }, 250);

        // Ledakan besar di tengah
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            zIndex: 5000
        });
    }

    async function syncLeaderboard() {
        const loading = document.getElementById('loading-overlay');
        loading.style.display = 'flex';
        
        try {
            let skorJC = {};
            let periodeSekarang = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            
            const koleksiPoin = [
                { nama: "kehadiran", poin: 10 },
                { nama: "kehadiran_arso1", poin: 10 },
                { nama: "laporan_komsel", poin: 8 },
                { nama: "laporan_gabungan", poin: 8 },
                { nama: "laporan_doa", poin: 8 },
                { nama: "kehadiran_kd", poin: 10 },
                { nama: "laporan_bacaan", poin: 5 }
            ];

            // Mengambil data dari semua koleksi
            for (const item of koleksiPoin) {
                const snapshot = await db.collection(item.nama).get();
                snapshot.forEach((doc) => {
                    let d = doc.data();
                    let namaRaw = d.jc || d.komsel || d.nama_jc || "Umum";
                    let namaJC = namaRaw.trim().toUpperCase();
                    
                    if (!namaJC.startsWith("JC") && namaJC !== "UMUM") {
                        namaJC = "JC " + namaJC;
                    }

                    if (!skorJC[namaJC]) skorJC[namaJC] = 0;

                    const status = (d.status || d.status_doa || "HADIR").toUpperCase();
                    if (status === "HADIR" || status === "SELESAI" || item.nama === "laporan_bacaan") {
                        skorJC[namaJC] += item.poin;
                    }
                });
            }

            let urutan = Object.keys(skorJC).map(name => ({
                nama: name,
                poin: skorJC[name]
            })).sort((a, b) => b.poin - a.poin);

            // Tampilkan data ke UI terlebih dahulu
            tampilkanData(urutan);
            document.getElementById('current-month').innerText = `Periode: ${periodeSekarang}`;
            
            // Hapus loading sebelum selebrasi
            loading.style.display = 'none';

            // 2. TRIGGER SELEBRASI (Diberi delay sedikit agar UI render selesai)
            if (urutan.length > 0) {
                setTimeout(() => {
                    selebrasiJuara();
                }, 500);
            }

            // Simpan ke Firestore (Background task)
            const batch = db.batch();
            urutan.forEach((item, index) => {
                let docRef = db.collection("peringkat_jc").doc(item.nama);
                batch.set(docRef, {
                    ranking: index + 1,
                    nama_jc: item.nama,
                    poin: item.poin,
                    periode: periodeSekarang,
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
            await batch.commit();

        } catch (error) {
            console.error("Error Sync:", error);
            loading.style.display = 'none';
        }
    }

    // ... fungsi tampilkanData dan tampilkanGrafik tetap sama ...
</script>
</body>
</html>
