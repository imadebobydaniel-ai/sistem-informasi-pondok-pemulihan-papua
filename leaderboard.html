<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peringkat Komsel - Pondok Pemulihan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --emas-lux: #D4AF37;
            --perak: #C0C0C0;
            --perunggu: #CD7F32;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; 
            padding: 15px;
            padding-bottom: 100px;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            text-align: center;
            border-top: 5px solid var(--biru-safir);
            position: relative;
            overflow: hidden;
        }

        h2 { color: var(--biru-tua); font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .info-sub { color: #888; font-size: 13px; font-weight: 600; margin-bottom: 25px; }

        /* Podium Visual */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 30px;
            gap: 10px;
            position: relative;
        }
        .podium-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .trophy-box {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            z-index: 2;
        }
        .rank-1 .trophy-box { 
            background: linear-gradient(135deg, #FFD700, #FDB931); 
            color: white; width: 65px; height: 65px; font-size: 32px; 
            border: 3px solid white;
        }
        .rank-2 .trophy-box { background: linear-gradient(135deg, #E0E0E0, #BDBDBD); color: white; }
        .rank-3 .trophy-box { background: linear-gradient(135deg, #f0a26d, #CD7F32); color: white; }

        .podium-name { font-weight: 900; font-size: 14px; color: var(--biru-tua); margin-top: 5px; }
        .podium-score { 
            font-size: 11px; 
            background: var(--biru-tua); 
            color: white; 
            padding: 2px 8px; 
            border-radius: 10px; 
            margin-top: 4px;
            font-weight: 700;
        }
        
        .chart-box { 
            height: 200px; 
            width: 100%; 
            margin-top: 15px; 
            padding: 10px;
            background: #fdfdfd;
            border-radius: 15px;
        }

        .rank-list { text-align: left; margin-top: 10px; }
        .rank-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: white;
            border-radius: 18px;
            margin-bottom: 10px;
            border: 1.5px solid #f0f0f0;
        }
        .rank-item.top-three { 
            border-left: 5px solid var(--emas-lux); 
            background: linear-gradient(to right, #fffdf5, #ffffff);
        }
        .rank-jc { font-weight: 800; font-size: 15px; color: var(--biru-tua); }
        .rank-val { 
            background: var(--biru-safir); 
            color: white; 
            padding: 5px 12px; 
            border-radius: 50px; 
            font-size: 12px; 
            font-weight: 900; 
        }

        .btn-back-container {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            padding: 20px; box-sizing: border-box;
            background: white; border-top: 1px solid #eee; z-index: 1000;
        }
        .btn-back { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            background: var(--biru-tua); color: white; padding: 18px; 
            border-radius: 50px; text-decoration: none; font-weight: 800; 
            box-shadow: 0 8px 25px rgba(0,51,102,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-trophy" style="color: var(--emas-lux);"></i> Leaderboard</h2>
        <p class="info-sub" id="current-month">Periode: Memuat...</p>

        <div class="podium-container" id="podium">
            <div class="podium-item rank-2" style="order: 1;">
                <div class="trophy-box"><i class="fas fa-medal"></i></div>
                <div class="podium-name" id="top2-name">JC -</div>
                <div class="podium-score" id="top2-val">0</div>
            </div>
            <div class="podium-item rank-1" style="order: 2;" id="winner-zone">
                <div class="trophy-box"><i class="fas fa-crown"></i></div>
                <div class="podium-name" id="top1-name">JC -</div>
                <div class="podium-score" id="top1-val">0</div>
            </div>
            <div class="podium-item rank-3" style="order: 3;">
                <div class="trophy-box"><i class="fas fa-award"></i></div>
                <div class="podium-name" id="top3-name">JC -</div>
                <div class="podium-score" id="top3-val">0</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="chartJC"></canvas>
        </div>
    </div>

    <div id="rank-list" class="rank-list">
        <p style="text-align:center; color:#ccc; padding: 20px;">Menghitung skor...</p>
    </div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back"><i class="fas fa-home"></i> KEMBALI KE MENU</a>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myChart; // Variabel global untuk chart

    function selebrasiJuara() {
        const durasi = 3 * 1000;
        const akhir = Date.now() + durasi;
        const frame = () => {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.6 }, colors: ['#FFD700', '#FFFFFF', '#FF8C00'], shapes: ['star'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.6 }, colors: ['#FFD700', '#FFFFFF', '#FF8C00'], shapes: ['star'] });
            if (Date.now() < akhir) requestAnimationFrame(frame);
        };
        frame();
    }

    // Fungsi Utama dengan Real-time Listener (.onSnapshot)
    function muatStatistikRealtime() {
        const sekarang = new Date();
        const namaBulan = sekarang.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
        document.getElementById('current-month').innerText = `Update Real-time: ${namaBulan}`;

        const awalBulan = new Date(sekarang.getFullYear(), sekarang.getMonth(), 1);
        const tsAwalBulan = firebase.firestore.Timestamp.fromDate(awalBulan);

        // MENGGUNAKAN onSnapshot UNTUK REAL-TIME
        db.collection("laporan_bacaan")
            .where("tanggal", ">=", tsAwalBulan)
            .onSnapshot((snap) => {
                let rekapJC = {};
                // Inisialisasi default JC 1 - JC 5
                for(let i=1; i<=5; i++) { rekapJC[`JC ${i}`] = 0; }

                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.komsel) {
                        let namaJC = d.komsel.trim();
                        // Standarisasi Nama
                        if (!namaJC.startsWith("JC")) {
                            namaJC = `JC ${namaJC}`;
                        }
                        
                        if (rekapJC.hasOwnProperty(namaJC)) {
                            rekapJC[namaJC]++;
                        } else {
                            rekapJC[namaJC] = 1;
                        }
                    }
                });

                const sortedJC = Object.entries(rekapJC).sort(([,a], [,b]) => b - a);

                // Update Tampilan secara otomatis
                updatePodium(sortedJC);
                tampilkanGrafik(rekapJC);
                tampilkanList(sortedJC);

                // Jalankan selebrasi jika ada perubahan data dan skor > 0
                if (sortedJC.length > 0 && sortedJC[0][1] > 0) {
                    console.log("Data updated: Selebrasi!");
                }
            }, (error) => {
                console.error("Firestore Error:", error);
                document.getElementById('rank-list').innerHTML = `<p style="text-align:center; color:red;">Gagal memuat data real-time.</p>`;
            });
    }

    function updatePodium(sortedData) {
        // Reset tampilan jika data kosong
        document.getElementById('top1-name').innerText = sortedData[0] ? sortedData[0][0] : "JC -";
        document.getElementById('top1-val').innerText = sortedData[0] ? sortedData[0][1] + " Lap" : "0";
        
        document.getElementById('top2-name').innerText = sortedData[1] ? sortedData[1][0] : "JC -";
        document.getElementById('top2-val').innerText = sortedData[1] ? sortedData[1][1] + " Lap" : "0";
        
        document.getElementById('top3-name').innerText = sortedData[2] ? sortedData[2][0] : "JC -";
        document.getElementById('top3-val').innerText = sortedData[2] ? sortedData[2][1] + " Lap" : "0";
    }

    function tampilkanList(sortedData) {
        let html = "";
        sortedData.forEach((item, index) => {
            const isTop = index < 3 ? 'top-three' : '';
            html += `
                <div class="rank-item ${isTop}">
                    <span class="rank-jc">${index + 1}. ${item[0]}</span>
                    <span class="rank-val">${item[1]} LAPORAN</span>
                </div>`;
        });
        document.getElementById('rank-list').innerHTML = html;
    }

    function tampilkanGrafik(dataLaporan) {
        const ctx = document.getElementById('chartJC').getContext('2d');
        
        // Hancurkan chart lama agar tidak tumpang tindih saat update data
        if (myChart) {
            myChart.destroy();
        }
        
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(dataLaporan),
                datasets: [{
                    label: 'Jumlah Laporan',
                    data: Object.values(dataLaporan),
                    backgroundColor: '#0056b3',
                    borderRadius: 10,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 500 }, // Animasi halus saat data berubah
                plugins: { legend: { display: false } },
                scales: { 
                    y: { beginAtZero: true, display: false },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // Ganti pemanggilan fungsi saat window load
    window.onload = muatStatistikRealtime;
</script>
</body>
</html>
