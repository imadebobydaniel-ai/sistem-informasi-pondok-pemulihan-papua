<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Leaderboard Final - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #FFD700, #FFCC00, #FFB900, #FDB931);
            --primary-blue: #0056b3;
            --dark-blue: #003366;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; display: flex; justify-content: center; overflow-x: hidden; }

        .leaderboard-container { 
            background: white; width: 100%; max-width: 450px; border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); padding: 20px; position: relative; 
            overflow: hidden; border-top: 8px solid var(--primary-blue); min-height: 90vh;
            display: flex; flex-direction: column;
        }

        /* --- UI Elements & Stars --- */
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        
        .leaderboard-header { text-align: center; margin-bottom: 20px; position: relative; z-index: 5; }
        .rules-icon { position: absolute; left: 0; top: 5px; color: var(--primary-blue); font-size: 24px; cursor: pointer; }
        .title { color: var(--dark-blue); margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; }

        .filter-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            margin-bottom: 20px; 
            position: relative;
            z-index: 10; /* Pastikan filter di atas bintang */
        }
        .full-width { grid-column: span 2; }
        select { 
            padding: 12px; 
            border-radius: 12px; 
            border: 1px solid #ddd; 
            background: #f9f9f9; 
            font-size: 12px; 
            width: 100%;
            -webkit-appearance: none; /* Hilangkan style default mobile */
        }

        /* --- Podium --- */
        .podium-section { 
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 10px; margin: 20px 0 40px 0; position: relative; z-index: 5; 
        }
        .podium-card { text-align: center; flex: 1; }
        .rank-badge { font-size: 24px; font-weight: 900; display: block; font-style: italic; }
        .gold .rank-badge { color: #FFB900; }
        .silver .rank-badge { color: #A9A9A9; }
        .bronze .rank-badge { color: #CD7F32; }

        .medal-icon { font-size: 45px; margin-bottom: 8px; display: block; animation: float 3s ease-in-out infinite; }
        .gold .medal-icon { color: #FFD700; }
        .silver .medal-icon { color: #C0C0C0; font-size: 38px; }
        .bronze .medal-icon { color: #CD7F32; font-size: 38px; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .podium-name { font-size: 12px; font-weight: bold; color: var(--dark-blue); margin-bottom: 8px; }
        .clickable-pts { 
            background: var(--primary-blue); color: white; border-radius: 20px; 
            padding: 6px 10px; font-size: 11px; font-weight: 800; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .gold .clickable-pts { background: var(--gold-gradient); color: #4d3a00; border: 1px solid #e6ac00; }

        /* --- Ranking List --- */
        .ranking-list { position: relative; z-index: 5; }
        .rank-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fff; border: 1px solid #eee; border-left: 6px solid var(--primary-blue);
            margin-bottom: 10px; padding: 12px; border-radius: 15px; 
        }
        .rank-name { font-weight: bold; color: #333; flex: 1; font-size: 14px; }
        .list-pts { background: var(--primary-blue); color: white; padding: 6px 12px; border-radius: 20px; font-weight: 800; font-size: 11px; cursor: pointer; }

        .btn-back { width: 100%; padding: 18px; background: var(--dark-blue); color: white; border: none; font-weight: bold; border-radius: 0 0 30px 30px; margin-top: auto; position: relative; z-index: 5; }

        /* --- Custom Modal (Block Display) --- */
        #customModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white; width: 100%; max-width: 350px;
            border-radius: 25px; padding: 25px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .modal-header { font-size: 18px; font-weight: 800; color: var(--dark-blue); margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .modal-body { font-size: 14px; color: #555; line-height: 1.6; text-align: left; margin-bottom: 20px; white-space: pre-line; }
        .modal-btn { background: var(--primary-blue); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <canvas id="confetti-canvas"></canvas>
    <div class="stars-container" id="stars-layer"></div>

    <div class="leaderboard-header">
        <div class="rules-icon" onclick="openModal('rules')"><i class="fa-solid fa-circle-question"></i></div>
        <h2 class="title">LEADERBOARD</h2>
        <p style="font-size: 12px; color: #888; margin-top: 5px;">Periode: April 2026</p>
    </div>

    <div class="filter-section">
        <select class="full-width">
            <option>Per Orangan (Jemaat)</option>
            <option>Per Komsel</option>
            <option>Per Wilayah</option>
        </select>
        <select>
            <option>Semua Lokasi</option>
            <option>Abepura</option>
            <option>Sentani</option>
            <option>Doyo</option>
            <option>Arso 1</option>
            <option>Arso 2</option>
        </select>
        <select>
            <option>Semua Kategori</option>
            <option>PW</option>
            <option>Multimedia</option>
            <option>Sound engineer</option>
            <option>Tamborin</option>
            <option>Choirs</option>
            <option>Flag</option>
        </select>
    </div>

    <div class="podium-section">
        <div class="podium-card silver">
            <span class="rank-badge">2</span>
            <i class="fa-solid fa-medal medal-icon"></i>
            <div class="podium-name">UMUM</div>
            <div class="clickable-pts" onclick="openModal('history', 'UMUM')">110 Pts</div>
        </div>
        <div class="podium-card gold">
            <span class="rank-badge">1</span>
            <i class="fa-solid fa-trophy medal-icon"></i>
            <div class="podium-name">JC 5</div>
            <div class="clickable-pts" onclick="openModal('history', 'JC 5')">243 Pts</div>
        </div>
        <div class="podium-card bronze">
            <span class="rank-badge">3</span>
            <i class="fa-solid fa-award medal-icon"></i>
            <div class="podium-name">JC 1</div>
            <div class="clickable-pts" onclick="openModal('history', 'JC 1')">50 Pts</div>
        </div>
    </div>

    <div class="ranking-list">
        <div class="rank-item">
            <span style="width:25px; font-weight:900;">4.</span>
            <span class="rank-name">Boby Daniel</span>
            <div class="list-pts" onclick="openModal('history', 'Boby Daniel')">30 POIN</div>
        </div>
        <div class="rank-item">
            <span style="width:25px; font-weight:900;">5.</span>
            <span class="rank-name">Yohanes</span>
            <div class="list-pts" onclick="openModal('history', 'Yohanes')">25 POIN</div>
        </div>
    </div>

    <button class="btn-back"><i class="fa-solid fa-house"></i> KEMBALI KE MENU</button>
</div>

<div id="customModal">
    <div class="modal-content">
        <div class="modal-header" id="modalTitle"></div>
        <div class="modal-body" id="modalBody"></div>
        <button class="modal-btn" onclick="closeModal()">MENGERTI</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
<script>
    // 1. Logic Modal
    const modal = document.getElementById('customModal');
    const mTitle = document.getElementById('modalTitle');
    const mBody = document.getElementById('modalBody');

    function openModal(type, name = '') {
        if (type === 'rules') {
            mTitle.innerHTML = '<i class="fa-solid fa-scroll"></i> Aturan Poin';
            mBody.innerText = "• Alkitab: 5 Pts\n• Kehadiran: 10 Pts\n• Latihan Bidang: 15 Pts\n• Pelayanan: 25 Pts\n\nSyarat: Poin Pelayanan hanya masuk jika Anda mengikuti latihan.";
        } else {
            mTitle.innerHTML = `<i class="fa-solid fa-user"></i> Riwayat ${name}`;
            mBody.innerText = `Detail Poin ${name}:\n\n- Baca Alkitab: 10x (50 Pts)\n- Ibadah Raya: 4x (40 Pts)\n- Pelayanan: 2x (50 Pts)\n\nData ini sudah tervalidasi admin.`;
        }
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }
    window.onclick = function(event) { if (event.target == modal) closeModal(); }

    // 2. Efek Bintang Kedap-kedip (Dikembalikan)
    const starLayer = document.getElementById('stars-layer');
    for (let i = 0; i < 20; i++) {
        const star = document.createElement('i');
        star.className = 'fa-solid fa-star';
        star.style.position = 'absolute';
        star.style.color = '#FFD700';
        star.style.fontSize = Math.random() * 6 + 4 + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.opacity = Math.random();
        star.style.animation = `twinkle ${Math.random() * 2 + 1}s infinite ease-in-out`;
        starLayer.appendChild(star);
    }

    // 3. Efek Konfeti
    const duration = 5 * 1000;
    const end = Date.now() + duration;
    (function frame() {
        confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD700', '#0056b3'] });
        confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD700', '#0056b3'] });
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
</script>

</body>
</html>
