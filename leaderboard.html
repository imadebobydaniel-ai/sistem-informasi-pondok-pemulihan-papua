<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peringkat Komsel - Pondok Pemulihan</title>
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --emas-lux: #D4AF37;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            margin: 0; 
            padding: 15px;
            padding-bottom: 100px;
        }

        .container { max-width: 500px; margin: auto; }
        
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            margin-bottom: 20px; 
            text-align: center;
            border-top: 5px solid var(--biru-safir);
            position: relative;
            overflow: hidden;
        }

        /* Animasi Juara 1 */
        .rank-1 { animation: celebrate 2s infinite ease-in-out; }
        @keyframes celebrate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .info-icon {
            position: absolute; top: 15px; left: 20px;
            font-size: 20px; color: var(--biru-safir);
            cursor: pointer; opacity: 0.7; z-index: 10;
        }

        h2 { color: var(--biru-tua); font-size: 20px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .info-sub { color: #888; font-size: 13px; font-weight: 600; margin-bottom: 25px; }

        /* Podium */
        .podium-container { display: flex; justify-content: center; align-items: flex-end; margin-bottom: 30px; gap: 10px; }
        .podium-item { flex: 1; display: flex; flex-direction: column; align-items: center; }
        
        .trophy-box {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .rank-1 .trophy-box { background: linear-gradient(135deg, #FFD700, #FDB931); color: white; width: 65px; height: 65px; font-size: 32px; border: 3px solid white; }
        .rank-2 .trophy-box { background: linear-gradient(135deg, #E0E0E0, #BDBDBD); color: white; }
        .rank-3 .trophy-box { background: linear-gradient(135deg, #f0a26d, #CD7F32); color: white; }

        .podium-name { font-weight: 900; font-size: 14px; color: var(--biru-tua); margin-top: 5px;}
        .podium-score { font-size: 11px; background: var(--biru-tua); color: white; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-top: 4px;}
        
        .chart-box { height: 180px; width: 100%; margin-top: 15px; background: #fdfdfd; border-radius: 15px; padding: 10px; box-sizing: border-box;}

        .rank-list { text-align: left; }
        .rank-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: white; border-radius: 18px;
            margin-bottom: 10px; border: 1.5px solid #f0f0f0;
        }
        .rank-item.top-three { border-left: 5px solid var(--emas-lux); background: linear-gradient(to right, #fffdf5, #ffffff); }
        .rank-jc { font-weight: 800; color: var(--biru-tua); font-size: 15px; }
        .rank-val { background: var(--biru-safir); color: white; padding: 5px 12px; border-radius: 50px; font-size: 12px; font-weight: 900; }

        .btn-back-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px; background: white; border-top: 1px solid #eee; z-index: 1000; box-sizing: border-box; }
        .btn-back { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--biru-tua); color: white; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: 800; box-shadow: 0 8px 25px rgba(0,51,102,0.3); }

        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.95); display: flex; flex-direction:column; justify-content: center; align-items: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-sync fa-spin fa-3x" style="color: var(--biru-safir);"></i>
    <p style="margin-top: 15px; font-weight: bold;">Menghitung Skor Terupdate...</p>
</div>

<div class="container">
    <div class="card">
        <div class="info-icon"><i class="fas fa-award"></i></div>
        <h2><i class="fas fa-crown" style="color: var(--emas-lux);"></i> Leaderboard</h2>
        <p class="info-sub" id="current-month">Periode: Memuat...</p>

        <div class="podium-container">
            <div class="podium-item rank-2" style="order: 1;">
                <div class="trophy-box"><i class="fas fa-medal"></i></div>
                <div class="podium-name" id="top2-name">JC -</div>
                <div class="podium-score" id="top2-val">0</div>
            </div>
            <div class="podium-item rank-1" style="order: 2;">
                <div class="trophy-box"><i class="fas fa-trophy"></i></div>
                <div class="podium-name" id="top1-name">JC -</div>
                <div class="podium-score" id="top1-val">0</div>
            </div>
            <div class="podium-item rank-3" style="order: 3;">
                <div class="trophy-box"><i class="fas fa-award"></i></div>
                <div class="podium-name" id="top3-name">JC -</div>
                <div class="podium-score" id="top3-val">0</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="chartJC"></canvas>
        </div>
    </div>

    <div id="rank-list" class="rank-list"></div>

    <div class="btn-back-container">
        <a href="menu.html" class="btn-back"><i class="fas fa-home"></i> KEMBALI KE MENU</a>
    </div>
</div>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let myChart;

    // --- FUNGSI EFEK MERIAH (Bintang & Bunga) ---
    function selebrasiMeriah() {
        const durasi = 4 * 1000;
        const selesai = Date.now() + durasi;

        const interval = setInterval(function() {
            const sisaWaktu = selesai - Date.now();
            if (sisaWaktu <= 0) return clearInterval(interval);

            // 1. Efek Bintang Emas dari Samping
            confetti({
                particleCount: 3,
                angle: 60,
                spread: 55,
                origin: { x: 0 },
                colors: ['#FFD700', '#D4AF37'],
                shapes: ['star']
            });
            confetti({
                particleCount: 3,
                angle: 120,
                spread: 55,
                origin: { x: 1 },
                colors: ['#FFD700', '#D4AF37'],
                shapes: ['star']
            });

            // 2. Efek Bunga & Cahaya (Emoji) Acak
            const scalar = 2;
            const bunga = confetti.shapeFromText({ text: '🌸', scalar });
            const kilau = confetti.shapeFromText({ text: '✨', scalar });

            confetti({
                particleCount: 1,
                shapes: [bunga, kilau],
                origin: {
                    x: Math.random(),
                    y: Math.random() - 0.2
                },
                gravity: 0.6,
                ticks: 300
            });
        }, 150);

        // Ledakan besar di tengah
        confetti({
            particleCount: 150,
            spread: 100,
            origin: { y: 0.6 },
            colors: ['#0056b3', '#FFD700', '#ffffff']
        });
    }

    async function syncLeaderboard() {
        document.getElementById('loading-overlay').style.display = 'flex';
        try {
            let skorJC = {};
            let periode = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
            
            // Definisi Kategori dan Poin sesuai permintaan
            const koleksiPoin = [
                { nama: "kehadiran", poin: 10 },
                { nama: "kehadiran_arso1", poin: 10 },
                { nama: "kehadiran_kd", poin: 10 },
                { nama: "laporan_komsel", poin: 8 },
                { nama: "laporan_gabungan", poin: 8 },
                { nama: "laporan_doa", poin: 8 },
                { nama: "laporan_bacaan", poin: 5 }
            ];

            // Ambil data dari semua koleksi Firebase
            await Promise.all(koleksiPoin.map(async (item) => {
                const snap = await db.collection(item.nama).get();
                snap.forEach(doc => {
                    let d = doc.data();
                    // Deteksi nama JC dari berbagai kemungkinan field
                    let nama = (d.jc || d.komsel || d.nama_jc || "Umum").trim().toUpperCase();
                    
                    // Normalisasi Nama (Tambah "JC " jika belum ada)
                    if (!nama.startsWith("JC") && nama !== "UMUM") nama = "JC " + nama;
                    
                    if (!skorJC[nama]) skorJC[nama] = 0;
                    
                    // Syarat: Status "HADIR", "SELESAI", atau khusus Laporan Bacaan
                    const status = (d.status || d.status_doa || "HADIR").toUpperCase();
                    if (status === "HADIR" || status === "SELESAI" || item.nama === "laporan_bacaan") {
                        skorJC[nama] += item.poin;
                    }
                });
            }));

            // Mengurutkan berdasarkan poin tertinggi
            let urutan = Object.keys(skorJC).map(n => ({ nama: n, poin: skorJC[n] })).sort((a, b) => b.poin - a.poin);
            
            // --- Update UI ---
            document.getElementById('current-month').innerText = `Periode: ${periode}`;
            
            // Update Podium Top 3
            if(urutan[0]) { 
                document.getElementById('top1-name').innerText = urutan[0].nama; 
                document.getElementById('top1-val').innerText = urutan[0].poin + " Pts"; 
            }
            if(urutan[1]) { 
                document.getElementById('top2-name').innerText = urutan[1].nama; 
                document.getElementById('top2-val').innerText = urutan[1].poin + " Pts"; 
            }
            if(urutan[2]) { 
                document.getElementById('top3-name').innerText = urutan[2].nama; 
                document.getElementById('top3-val').innerText = urutan[2].poin + " Pts"; 
            }

            // Update List ke Bawah
            let html = "";
            urutan.forEach((item, i) => {
                html += `<div class="rank-item ${i < 3 ? 'top-three' : ''}">
                    <span class="rank-jc">${i + 1}. ${item.nama}</span>
                    <span class="rank-val">${item.poin} POIN</span>
                </div>`;
            });
            document.getElementById('rank-list').innerHTML = html;

            // Render Grafik Bar
            tampilkanGrafik(urutan.map(i => i.nama), urutan.map(i => i.poin));
            
            // Jalankan Selebrasi
            setTimeout(selebrasiMeriah, 500);

        } catch (e) { 
            console.error("Gagal Sinkronisasi:", e); 
        } finally { 
            document.getElementById('loading-overlay').style.display = 'none'; 
        }
    }

    function tampilkanGrafik(labels, values) {
        const ctx = document.getElementById('chartJC').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ 
                    data: values, 
                    backgroundColor: '#0056b3', 
                    borderRadius: 5 
                }]
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { display: false, beginAtZero: true }, 
                    x: { grid: { display: false } } 
                }
            }
        });
    }

    window.onload = syncLeaderboard;
</script>
</body>
</html>
