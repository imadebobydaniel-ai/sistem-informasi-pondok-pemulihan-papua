<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lapor Baca Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --oranye-hikmat: #d9480f;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 25px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border-top: 6px solid var(--biru-safir);
            position: relative; 
        }

        h3 { 
            margin: 10px 0; 
            color: var(--biru-tua); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h3 i { color: var(--emas-lux); margin-right: 8px; }

        #current-date { 
            font-size: 14px;
            font-weight: 700; 
            color: var(--biru-safir); 
            margin-bottom: 20px;
            display: block;
        }

        /* Styling Dropdown Ala Jam Digital */
        .target-box, .hikmat-box { 
            padding: 15px; 
            border-radius: 18px; 
            margin: 15px 0; 
            text-align: left;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .target-box { background: linear-gradient(135deg, #e7f3ff 0%, #ffffff 100%); border-left: 5px solid var(--biru-safir); }
        .hikmat-box { background: linear-gradient(135deg, #fff4e5 0%, #ffffff 100%); border-left: 5px solid var(--oranye-hikmat); }

        .label-pasal { font-size: 10px; font-weight: 800; color: #888; display: block; text-transform: uppercase; margin-bottom: 8px; }

        .dropdown-container { display: flex; gap: 8px; }

        select {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            font-size: 14px;
            font-weight: 700;
            color: var(--biru-tua);
            cursor: pointer;
            outline: none;
        }

        .check-item { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            border: 1.5px solid #eee; 
            transition: 0.3s;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }
        .check-item:hover { border-color: var(--hijau-zamrud); background: #f0fff4; }
        
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--hijau-zamrud); }

        .btn-kirim { 
            width: 100%; padding: 18px; border: none; border-radius: 50px; 
            font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; 
            transition: 0.4s; text-transform: uppercase;
        }

        .btn-enabled { background: linear-gradient(135deg, var(--biru-tua), var(--biru-safir)); color: white; box-shadow: 0 6px 20px rgba(0,86,179,0.3); }
        .btn-disabled { background-color: #ddd; color: #999; cursor: not-allowed; }

        .btn-home { display: inline-block; margin-top: 25px; color: var(--biru-safir); text-decoration: none; font-size: 14px; font-weight: 800; }

        #block-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 51, 102, 0.98); color: white; z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; 
        }
    </style>
</head>
<body>

<div id="block-screen">
    <div style="background: white; padding: 25px; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px;">
        <i id="block-icon" class="fa-solid" style="font-size: 45px;"></i>
    </div>
    <h2 id="block-title" style="color: white; font-weight: 900;"></h2>
    <p id="block-message" style="font-size: 18px; margin-top: 10px; color: white; font-weight: 600;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 30px; padding: 15px 35px; border-radius: 50px; border: 2px solid var(--emas-lux); background: transparent; color: white; font-weight: 900; cursor: pointer;">Kembali Ke Menu</button>
</div>

<div class="card">
    <h3><i class="fa-solid fa-clock"></i> SET TARGET BACAAN</h3>
    <span id="current-date"></span>

    <div class="target-box">
        <label class="label-pasal">Pasal Utama (4 Pasal):</label>
        <div class="dropdown-container">
            <select id="kitab-utama">
                <option value="Matius">Matius</option>
                <option value="Markus">Markus</option>
                <option value="Lukas">Lukas</option>

                <option value="17 - 20">17 - 20</option>
                <option value="21 - 24">21 - 24</option>
                <option value="25 - 28">25 - 28</option>
            </select>
        </div>
    </div>

    <div class="hikmat-box">
        <label class="label-pasal">Pasal Hikmat (Amsal):</label>

            <select id="kitab-hikmat" disabled>
                <option value="Amsal">Amsal</option>
            </select>
            <select id="nomor-amsal">

    </div>

    <div style="margin-top: 25px;">

    </div>

    <button id="btnKirim" class="btn-kirim btn-disabled" disabled onclick="kirimLaporan()">KIRIM LAPORAN SEKARANG</button>
    <a href="menu.html" class="btn-home"><i class="fa-solid fa-house-user"></i> Kembali ke Menu</a>
</div>
