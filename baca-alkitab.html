<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lapor Baca Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --oranye-hikmat: #d9480f;
            --putih-bg: #f4f7fa;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--putih-bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .card { background: white; padding: 30px 25px; border-radius: 25px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--biru-safir); position: relative; }

        h3 { margin: 10px 0; color: var(--biru-tua); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        h3 i { color: var(--emas-lux); margin-right: 8px; }

        #current-date { font-size: 14px; font-weight: 700; color: var(--biru-safir); margin-bottom: 20px; display: block; }

        .target-box, .hikmat-box { padding: 15px; border-radius: 18px; margin: 15px 0; text-align: left; border: 1px solid rgba(0,0,0,0.05); }
        .target-box { background: linear-gradient(135deg, #e7f3ff 0%, #ffffff 100%); border-left: 5px solid var(--biru-safir); }
        .hikmat-box { background: linear-gradient(135deg, #fff4e5 0%, #ffffff 100%); border-left: 5px solid var(--oranye-hikmat); }

        .label-pasal { font-size: 10px; font-weight: 800; color: #888; display: block; text-transform: uppercase; margin-bottom: 8px; }
        
        .sub-label { font-size: 9px; font-weight: 700; color: #555; margin-bottom: 4px; display: block; }

        .dropdown-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .dropdown-col { flex: 1; }

        select {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            background: white;
            font-size: 14px;
            font-weight: 700;
            color: var(--biru-tua);
            outline: none;
            cursor: pointer;
        }

        .check-item { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1.5px solid #eee; font-weight: 600; font-size: 14px; color: #444; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--hijau-zamrud); }

        .btn-kirim { width: 100%; padding: 18px; border: none; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.4s; text-transform: uppercase; }
        .btn-enabled { background: linear-gradient(135deg, var(--biru-tua), var(--biru-safir)); color: white; box-shadow: 0 6px 20px rgba(0,86,179,0.3); }
        .btn-disabled { background-color: #ddd; color: #999; cursor: not-allowed; }

        .btn-home { display: inline-block; margin-top: 25px; color: var(--biru-safir); text-decoration: none; font-size: 14px; font-weight: 800; }

        #block-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 51, 102, 0.98); color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div id="block-screen">
    <div style="background: white; padding: 25px; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px;">
        <i id="block-icon" class="fa-solid" style="font-size: 45px;"></i>
    </div>
    <h2 id="block-title" style="color: white; font-weight: 900;"></h2>
    <p id="block-message" style="font-size: 18px; margin-top: 10px; color: white; font-weight: 600;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 30px; padding: 15px 35px; border-radius: 50px; border: 2px solid var(--emas-lux); background: transparent; color: white; font-weight: 900; cursor: pointer;">Kembali Ke Menu</button>
</div>

<div class="card">
    <h3><i class="fa-solid fa-book-open"></i> LAPOR BACAAN</h3>
    <span id="current-date"></span>

    <div class="target-box">
        <label class="label-pasal">Pasal Utama (4 Pasal):</label>
        <div style="margin-bottom: 10px;">
            <span class="sub-label">PILIH KITAB:</span>
            <select id="kitab-utama"></select>
        </div>
        
        <div class="dropdown-row">
            <div class="dropdown-col">
                <span class="sub-label">DARI PASAL:</span>
                <select id="pasal-dari"></select>
            </div>
            <div class="dropdown-col">
                <span class="sub-label">SAMPAI PASAL:</span>
                <select id="pasal-sampai"></select>
            </div>
        </div>
    </div>

    <div class="hikmat-box">
        <label class="label-pasal">Pasal Hikmat (Amsal):</label>
        <div class="dropdown-row">
            <div class="dropdown-col" style="flex: 0.5;">
                <span class="sub-label">KITAB:</span>
                <select disabled><option>Amsal</option></select>
            </div>
            <div class="dropdown-col">
                <span class="sub-label">PASAL:</span>
                <select id="pasal-amsal"></select>
            </div>
        </div>
    </div>

    <div style="margin-top: 25px;">
        <label class="check-item">
            <input type="checkbox" id="check1" onchange="validasiTombol()"> 
            <span>Selesai Membaca Pasal Utama</span>
        </label>
        <label class="check-item">
            <input type="checkbox" id="check2" onchange="validasiTombol()"> 
            <span>Selesai Membaca Pasal Amsal</span>
        </label>
    </div>

    <button id="btnKirim" class="btn-kirim btn-disabled" disabled onclick="kirimLaporan()">KIRIM LAPORAN SEKARANG</button>
    <a href="menu.html" class="btn-home"><i class="fa-solid fa-house-user"></i> Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    const daftarKitab = [
        "Kejadian", "Keluaran", "Imamat", "Bilangan", "Ulangan", "Yosua", "Hakim-hakim", "Rut", "1 Samuel", "2 Samuel", "1 Raja-raja", "2 Raja-raja", "1 Tawarikh", "2 Tawarikh", "Ezra", "Nehemia", "Ester", "Ayub", "Mazmur", "Amsal", "Pengkhotbah", "Kidung Agung", "Yesaya", "Yeremia", "Ratapan", "Yehezkiel", "Daniel", "Hosea", "Yoel", "Amos", "Obaja", "Yunus", "Mikha", "Nahum", "Habakuk", "Zefanya", "Hagai", "Zakharia", "Maleakhi",
        "Matius", "Markus", "Lukas", "Yohanes", "Kisah Para Rasul", "Roma", "1 Korintus", "2 Korintus", "Galatia", "Efesus", "Filipi", "Kolose", "1 Tesalonika", "2 Tesalonika", "1 Timotius", "2 Timotius", "Titus", "Filemon", "Ibrani", "Yakobus", "1 Petrus", "2 Petrus", "1 Yohanes", "2 Yohanes", "3 Yohanes", "Yudas", "Wahyu"
    ];

    function initDropdowns() {
        const kitabSelect = document.getElementById('kitab-utama');
        const dariSelect = document.getElementById('pasal-dari');
        const sampaiSelect = document.getElementById('pasal-sampai');
        const amsalSelect = document.getElementById('pasal-amsal');

        // Isi Kitab
        daftarKitab.forEach(k => {
            let opt = document.createElement('option');
            opt.value = k; opt.text = k;
            if(k === "Yohanes") opt.selected = true;
            kitabSelect.add(opt);
        });

        // Isi Pasal 1-150
        for (let i = 1; i <= 150; i++) {
            let optDari = document.createElement('option');
            optDari.value = i; optDari.text = i;
            if(i === 5) optDari.selected = true;
            dariSelect.add(optDari);

            let optSampai = document.createElement('option');
            optSampai.value = i; optSampai.text = i;
            if(i === 8) optSampai.selected = true;
            sampaiSelect.add(optSampai);
        }

        // Isi Amsal 1-31
        for (let i = 1; i <= 31; i++) {
            let opt = document.createElement('option');
            opt.value = i; opt.text = i;
            if(i === 20) opt.selected = true;
            amsalSelect.add(opt);
        }
    }

    function validasiTombol() {
        const c1 = document.getElementById('check1').checked;
        const c2 = document.getElementById('check2').checked;
        const btn = document.getElementById('btnKirim');
        btn.disabled = !(c1 && c2);
        btn.className = (c1 && c2) ? "btn-kirim btn-enabled" : "btn-kirim btn-disabled";
    }

    async function kirimLaporan() {
        const kitab = document.getElementById('kitab-utama').value;
        const dari = document.getElementById('pasal-dari').value;
        const sampai = document.getElementById('pasal-sampai').value;
        const amsal = document.getElementById('pasal-amsal').value;

        const teksUtama = `${kitab} ${dari} - ${sampai}`;
        const teksHikmat = `Amsal ${amsal}`;

        const btn = document.getElementById('btnKirim');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mengirim...";
        btn.disabled = true;

        try {
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            const u = snapUser.docs[0].data();

            await db.collection("laporan_bacaan").add({
                nama: u.nama, email: userEmail, komsel: String(u.komsel),
                pasal_utama: teksUtama, pasal_hikmat: teksHikmat,
                tanggal: firebase.firestore.Timestamp.now()
            });

            document.getElementById('block-title').innerText = "BERHASIL!";
            document.getElementById('block-message').innerText = "Laporan Anda telah diterima. Tuhan Yesus Memberkati!";
            document.getElementById('block-screen').style.display = 'flex';
        } catch (e) {
            alert("Gagal kirim.");
            btn.innerText = "KIRIM LAPORAN SEKARANG";
            btn.disabled = false;
        }
    }

    window.onload = function() {
        initDropdowns();
        const sekarang = new Date();
        document.getElementById('current-date').innerText = sekarang.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    };
</script>
</body>
</html>
