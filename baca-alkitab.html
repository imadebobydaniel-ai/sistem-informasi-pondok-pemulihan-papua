<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Baca Alkitab</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; position: relative; }
        h3 { margin: 10px 0; color: #333; }
        .target-box { background: #e7f3ff; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #cce5ff; }
        .hikmat-box { background: #fff4e5; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #ffeeba; }
        .label-pasal { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
        .nama-pasal { font-size: 18px; font-weight: bold; color: #007bff; }
        .check-item { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; cursor: pointer; border: 1px solid #ddd; transition: 0.3s; }
        .check-item:hover { background: #eee; }
        input[type="checkbox"] { transform: scale(1.3); }
        .btn-kirim { width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-enabled { background-color: #333; color: white; }
        .btn-disabled { background-color: #ccc; color: #666; cursor: not-allowed; }
        .btn-home { display: inline-block; margin-top: 25px; color: #007bff; text-decoration: none; font-size: 14px; font-weight: bold; }
        #block-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; z-index: 9999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="block-screen">
    <i id="block-icon" class="fa-solid fa-circle-check" style="font-size: 60px; color: #2ecc71; margin-bottom: 20px;"></i>
    <h2 id="block-title">TERIMA KASIH!</h2>
    <p id="block-message" style="font-size: 18px; margin-top: 10px;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 20px; padding: 12px 30px; border-radius: 10px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer;">KEMBALI KE MENU</button>
</div>

<div class="card">
    <h3><i class="fa-solid fa-book-bible"></i> TARGET HARI INI</h3>
    <p id="current-date" style="font-weight: bold; color: #007bff;"></p>

    <div class="target-box">
        <span class="label-pasal">Pasal Utama:</span>
        <span class="nama-pasal" id="pasal-utama">Memuat...</span>
    </div>

    <div class="hikmat-box">
        <span class="label-pasal">Pasal Hikmat:</span>
        <span class="nama-pasal" id="pasal-hikmat" style="color: #d9480f;">Memuat...</span>
    </div>

    <label class="check-item">
        <input type="checkbox" id="check1" onchange="validasiTombol()"> Selesai Membaca 4 Pasal Utama
    </label>

    <label class="check-item">
        <input type="checkbox" id="check2" onchange="validasiTombol()"> Selesai Membaca Pasal Amsal
    </label>

    <button id="btnKirim" class="btn-kirim btn-disabled" disabled onclick="kirimLaporan()">KIRIM LAPORAN SEKARANG</button>

    <a href="menu.html" class="btn-home"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    // --- 1. LOGIKA TARGET OTOMATIS (VERSI PERBAIKAN TOTAL) ---
    function updateTargetHarian() {
        const sekarang = new Date();
        // Kita kunci tanggal mulai di 1 Maret 2026
        const tanggalMulai = new Date("2026-03-01"); 
        
        const selisihWaktu = sekarang.getTime() - tanggalMulai.getTime();
        const hariKe = Math.floor(selisihWaktu / (1000 * 3600 * 24)) + 1;

        // Daftar ini harus ada 20 baris supaya hari ke-20 (hari ini) muncul datanya
        const listTarget = [
            { utama: "Matius 1 - 4", hikmat: "Amsal 1" },    // Hari 1
            { utama: "Matius 5 - 8", hikmat: "Amsal 2" },    // Hari 2
            { utama: "Matius 9 - 12", hikmat: "Amsal 3" },   // Hari 3
            { utama: "Matius 13 - 15", hikmat: "Amsal 4" },  // Hari 4
            { utama: "Matius 16 - 18", hikmat: "Amsal 5" },  // Hari 5
            { utama: "Matius 19 - 21", hikmat: "Amsal 6" },  // Hari 6
            { utama: "Matius 22 - 25", hikmat: "Amsal 7" },  // Hari 7
            { utama: "Matius 26 - 28", hikmat: "Amsal 8" },  // Hari 8
            { utama: "Markus 1 - 4", hikmat: "Amsal 9" },    // Hari 9
            { utama: "Markus 5 - 8", hikmat: "Amsal 10" },   // Hari 10
            { utama: "Markus 9 - 12", hikmat: "Amsal 11" },  // Hari 11
            { utama: "Markus 13 - 16", hikmat: "Amsal 12" }, // Hari 12
            { utama: "Lukas 1 - 4", hikmat: "Amsal 13" },    // Hari 13
            { utama: "Lukas 5 - 8", hikmat: "Amsal 14" },    // Hari 14
            { utama: "Lukas 9 - 12", hikmat: "Amsal 15" },   // Hari 15
            { utama: "Lukas 13 - 16", hikmat: "Amsal 16" },  // Hari 16
            { utama: "Lukas 17 - 20", hikmat: "Amsal 17" },  // Hari 17
            { utama: "Lukas 21 - 24", hikmat: "Amsal 18" },  // Hari 18
            { utama: "Matius 19 - 22", hikmat: "Amsal 19" }, // Hari 19 (19 Mar)
            { utama: "Matius 23 - 26", hikmat: "Amsal 20" }, // Hari 20 (HARI INI)
            { utama: "Matius 27 - 28 & Markus 1-2", hikmat: "Amsal 21" } // Hari 21 (Besok)
        ];

        const index = hariKe - 1;
        if (listTarget[index]) {
            document.getElementById("pasal-utama").innerText = listTarget[index].utama;
            document.getElementById("pasal-hikmat").innerText = listTarget[index].hikmat;
        } else {
            // Jika hariKe lebih besar dari jumlah list (Misal hari ke-22)
            document.getElementById("pasal-utama").innerText = "Jadwal Belum Diupdate";
            document.getElementById("pasal-hikmat").innerText = "-";
        }
    }

    // --- 2. CEK LAPORAN HARI INI ---
    async function cekLaporanHariIni() {
        if (!userEmail) return;
        const hariIni = new Date();
        hariIni.setHours(0,0,0,0);
        const tsHariIni = firebase.firestore.Timestamp.fromDate(hariIni);

        try {
            const snap = await db.collection("laporan_bacaan")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsHariIni)
                .get();

            if (!snap.empty) {
                tampilkanPesanBlokir("Anda sudah melaporkan hari ini", "fa-circle-exclamation", "#ffc107");
            }
        } catch (e) { console.error(e); }
    }

    function tampilkanPesanBlokir(pesan, icon, color) {
        document.getElementById('block-title').innerText = pesan.includes("Terimakasih") ? "BERHASIL!" : "MAAF!";
        document.getElementById('block-message').innerText = pesan;
        const iconEl = document.getElementById('block-icon');
        iconEl.className = "fa-solid " + icon;
        iconEl.style.color = color;
        document.getElementById('block-screen').style.display = 'flex';
    }

    function validasiTombol() {
        const c1 = document.getElementById('check1').checked;
        const c2 = document.getElementById('check2').checked;
        const btn = document.getElementById('btnKirim');
        btn.disabled = !(c1 && c2);
        btn.className = (c1 && c2) ? "btn-kirim btn-enabled" : "btn-kirim btn-disabled";
    }

    async function kirimLaporan() {
        const btn = document.getElementById('btnKirim');
        btn.innerText = "Mengirim...";
        btn.disabled = true;

        try {
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            if (snapUser.empty) return alert("Sesi habis.");
            const u = snapUser.docs[0].data();

            await db.collection("laporan_bacaan").add({
                nama: u.nama,
                email: userEmail,
                komsel: String(u.komsel),
                pasal_utama: document.getElementById('pasal-utama').innerText,
                pasal_hikmat: document.getElementById('pasal-hikmat').innerText,
                tanggal: firebase.firestore.Timestamp.now()
            });

            tampilkanPesanBlokir("Terimakasih Atas Laporan Anda", "fa-circle-check", "#2ecc71");
        } catch (e) {
            alert("Terjadi kesalahan.");
            btn.innerText = "KIRIM LAPORAN SEKARANG";
            btn.disabled = false;
        }
    }

    window.onload = function() {
        // Jalankan Urutan Logika
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);
        
        updateTargetHarian();
        cekLaporanHariIni();
    };
</script>
</body>
</html>
