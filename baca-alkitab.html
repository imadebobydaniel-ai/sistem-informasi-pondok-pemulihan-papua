<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baca Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; text-align: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h3 { color: #333; text-transform: uppercase; margin-bottom: 15px; }
        
        .target-box { background: #e7f1ff; padding: 15px; border-radius: 15px; border: 1px solid #b3d7ff; margin-bottom: 20px; }
        .target-box h4 { margin: 5px 0; color: #007bff; font-size: 18px; }
        .target-box p { margin: 0; font-size: 13px; color: #555; }

        .check-item { display: flex; align-items: center; background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; text-align: left; }
        .check-item input { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; }
        .check-item label { font-weight: bold; color: #333; cursor: pointer; flex: 1; }

        .btn-selesai { width: 100%; background: #28a745; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-selesai:disabled { background: #ccc; cursor: not-allowed; }

        .btn-back { display: inline-block; margin-top: 20px; text-decoration: none; color: #007bff; font-weight: bold; font-size: 14px; }

        /* MODAL BLOCKING STYLE */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 400px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .modal-box i { font-size: 50px; margin-bottom: 15px; }
        .modal-box h2 { margin: 0 0 10px 0; font-size: 20px; }
        .modal-box p { color: #666; margin-bottom: 20px; line-height: 1.5; }
        .modal-btn { background: #007bff; color: white; border: none; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3><i class="fa-solid fa-book-bible"></i> Target Hari Ini</h3>
        <p id="tgl-sekarang" style="font-weight: bold; color: #007bff;"></p>
        <hr>
        
        <div class="target-box">
            <p>Pasal Utama:</p>
            <h4 id="display-pasal">Matius --</h4>
        </div>

        <div class="target-box" style="background: #fff4e5; border-color: #ffe5b3;">
            <p>Pasal Hikmat:</p>
            <h4 id="display-amsal">Amsal --</h4>
        </div>

        <div id="checklist-area">
            <div class="check-item">
                <input type="checkbox" id="check-utama">
                <label for="check-utama">Selesai Membaca 4 Pasal Utama</label>
            </div>
            <div class="check-item">
                <input type="checkbox" id="check-amsal">
                <label for="check-amsal">Selesai Membaca Pasal Amsal</label>
            </div>
        </div>

        <button id="btn-submit" class="btn-selesai" onclick="kirimLaporan()" disabled>KIRIM LAPORAN SEKARANG</button>
    </div>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Menu</a>
</div>

<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <i id="modalIcon"></i>
        <h2 id="modalTitle">Judul</h2>
        <p id="modalMsg">Pesan laporan Anda.</p>
        <button class="modal-btn" id="modalAction" onclick="closeModal()">OK</button>
    </div>
</div>

<audio id="alarm-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userEmail = localStorage.getItem("userEmail");
    const today = new Date();
    const dateKey = today.toISOString().split('T')[0];

    // Fungsi Panggil Modal
    function showModal(title, msg, type, redirect = false) {
        const modal = document.getElementById('customModal');
        const icon = document.getElementById('modalIcon');
        const actionBtn = document.getElementById('modalAction');

        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;

        // Atur warna berdasarkan tipe
        if (type === 'success') {
            icon.className = "fa-solid fa-circle-check";
            icon.style.color = "#28a745";
        } else if (type === 'warning') {
            icon.className = "fa-solid fa-triangle-exclamation";
            icon.style.color = "#ffc107";
        } else if (type === 'error') {
            icon.className = "fa-solid fa-circle-xmark";
            icon.style.color = "#dc3545";
        }

        modal.style.display = "flex";

        if (redirect) {
            actionBtn.onclick = function() { window.location.href = "menu.html"; };
        } else {
            actionBtn.onclick = closeModal;
        }
    }

    function closeModal() {
        document.getElementById('customModal').style.display = "none";
    }

    function initHalaman() {
        const opsi = { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' };
        document.getElementById('tgl-sekarang').innerText = today.toLocaleDateString('id-ID', opsi);
        document.getElementById('display-amsal').innerText = "Amsal " + today.getDate();

        const tglMulai = new Date("2026-03-18");
        const selisihHari = Math.floor((today - tglMulai) / (1000 * 60 * 60 * 24));
        const startPasal = 15 + (selisihHari * 4);
        const endPasal = startPasal + 3;
        document.getElementById('display-pasal').innerText = "Matius " + startPasal + " - " + endPasal;
    }

    function cekAlarm() {
        const sekarang = new Date();
        if (sekarang.getHours() === 21 && sekarang.getMinutes() === 30) {
            const sound = document.getElementById('alarm-sound');
            sound.play().catch(() => {});
            showModal("WAKTU PELAPORAN", "Segera kirim laporan bacaan Alkitab Anda sebelum batas waktu 22:30!", "warning");
        }
    }
    setInterval(cekAlarm, 60000);

    const checkUtama = document.getElementById('check-utama');
    const checkAmsal = document.getElementById('check-amsal');
    const btnSubmit = document.getElementById('btn-submit');

    function validateCheck() {
        btnSubmit.disabled = !(checkUtama.checked && checkAmsal.checked);
    }
    checkUtama.addEventListener('change', validateCheck);
    checkAmsal.addEventListener('change', validateCheck);

   async function kirimLaporan() {
    if (!userEmail) {
        showModal("EROR", "Sesi berakhir, silakan login kembali.", "error");
        return;
    }

    const sekarang = new Date();
    const jam = sekarang.getHours();
    const menit = sekarang.getMinutes();

    // 1. Batas waktu laporan (22:30)
    if (jam > 22 || (jam === 22 && menit > 30)) {
        showModal("AKSES DITOLAK", "Maaf, batas waktu pelaporan adalah 22:30.", "error");
        return;
    }

    btnSubmit.innerText = "Memproses...";
    btnSubmit.disabled = true;

    try {
        // A. Ambil Nama & Komsel dari koleksi users secara otomatis
        const userSnap = await db.collection("users").where("email", "==", userEmail).get();
        if (userSnap.empty) {
            showModal("GAGAL", "Data profil Anda tidak ditemukan.", "error");
            return;
        }

        const userData = userSnap.docs[0].data();
        const namaUser = userData.nama;
        const komselUser = userData.komsel; // Ini kunci agar statistik jalan

        // B. Cek agar tidak lapor dua kali di hari yang sama
        const cekLaporan = await db.collection("laporan_bacaan")
            .where("email", "==", userEmail)
            .where("tanggal_str", "==", dateKey)
            .get();

        if (!cekLaporan.empty) {
            showModal("INFO", "Anda sudah melapor hari ini.", "warning", true);
            return;
        }

        // C. Simpan ke Firestore
        await db.collection("laporan_bacaan").add({
            email: userEmail,
            nama: namaUser,
            komsel: String(komselUser), // Disimpan sebagai string agar cocok dengan filter
            tanggal: firebase.firestore.Timestamp.now(), // Digunakan untuk filter periode di statistik
            tanggal_str: dateKey,
            pasal_utama: document.getElementById('display-pasal').innerText,
            pasal_amsal: document.getElementById('display-amsal').innerText,
            bulan: (sekarang.getMonth() + 1),
            tahun: sekarang.getFullYear()
        });

        showModal("BERHASIL", "Laporan berhasil terkirim!", "success", true);

    } catch (error) {
        console.error(error);
        showModal("GAGAL", "Terjadi kesalahan koneksi.", "error");
    } finally {
        btnSubmit.innerText = "KIRIM LAPORAN SEKARANG";
        btnSubmit.disabled = false;
    }
}

    initHalaman();
    cekAlarm();
</script>
</body>
</html>
