<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lapor Baca Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --oranye-hikmat: #d9480f;
            --putih-bg: #f4f7fa;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--putih-bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }

        .card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 25px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            border-top: 6px solid var(--biru-safir);
            position: relative; 
        }

        h3 { 
            margin: 10px 0; 
            color: var(--biru-tua); 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        h3 i { color: var(--emas-lux); margin-right: 8px; }

        #current-date { 
            font-size: 14px;
            font-weight: 700; 
            color: var(--biru-safir); 
            margin-bottom: 20px;
            display: block;
        }

        /* Styling Kotak Target */
        .target-box, .hikmat-box { 
            padding: 18px; 
            border-radius: 18px; 
            margin: 15px 0; 
            position: relative;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .target-box { 
            background: linear-gradient(135deg, #e7f3ff 0%, #ffffff 100%); 
            border-left: 5px solid var(--biru-safir);
        }

        .hikmat-box { 
            background: linear-gradient(135deg, #fff4e5 0%, #ffffff 100%); 
            border-left: 5px solid var(--oranye-hikmat);
        }

        .label-pasal { 
            font-size: 11px; 
            font-weight: 800;
            color: #888; 
            display: block; 
            text-transform: uppercase;
            margin-bottom: 5px; 
        }

        .nama-pasal { 
            font-size: 20px; 
            font-weight: 900; 
            color: var(--biru-tua); 
        }

        /* Checkbox Items */
        .check-item { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            border: 1.5px solid #eee; 
            transition: 0.3s;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            color: #444;
        }
        .check-item:hover { border-color: var(--hijau-zamrud); background: #f0fff4; }
        
        input[type="checkbox"] { 
            width: 20px;
            height: 20px;
            accent-color: var(--hijau-zamrud);
            cursor: pointer; 
        }

        /* Tombol Kirim */
        .btn-kirim { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 50px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-top: 15px; 
            transition: 0.4s; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-enabled { 
            background: linear-gradient(135deg, var(--biru-tua), var(--biru-safir)); 
            color: white; 
            box-shadow: 0 6px 20px rgba(0,86,179,0.3);
        }
        .btn-enabled:active { transform: scale(0.96); }

        .btn-disabled { 
            background-color: #ddd; 
            color: #999; 
            cursor: not-allowed; 
        }

        .btn-home { 
            display: inline-block; 
            margin-top: 25px; 
            color: var(--biru-safir); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 800; 
            transition: 0.3s;
        }
        .btn-home:hover { color: var(--emas-lux); }

        /* Screen Block Styling */
        #block-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 51, 102, 0.98); color: white; z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; 
            text-align: center; padding: 30px; 
        }
    </style>
</head>
<body>

<div id="block-screen">
    <div style="background: white; padding: 25px; border-radius: 50%; width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 0 25px rgba(255,255,255,0.2);">
        <i id="block-icon" class="fa-solid" style="font-size: 45px;"></i>
    </div>
    <h2 id="block-title" style="color: white; font-weight: 900;"></h2>
    <p id="block-message" style="font-size: 18px; margin-top: 10px; color: var(--biru-muda); font-weight: 600;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 30px; padding: 15px 35px; border-radius: 50px; border: 2px solid var(--emas-lux); background: transparent; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase;">Kembali Ke Menu</button>
</div>

<div class="card">
    <h3><i class="fa-solid fa-book-bible"></i> TARGET HARI INI</h3>
    <span id="current-date"></span>

    <div class="target-box">
        <span class="label-pasal">Pasal Utama:</span>
        <span class="nama-pasal" id="pasal-utama">Memuat...</span>
    </div>

    <div class="hikmat-box">
        <span class="label-pasal">Pasal Hikmat:</span>
        <span class="nama-pasal" id="pasal-hikmat" style="color: var(--oranye-hikmat);">Memuat...</span>
    </div>

    <div style="margin-top: 25px;">
        <label class="check-item">
            <input type="checkbox" id="check1" onchange="validasiTombol()"> 
            <span>Selesai Membaca 4 Pasal Utama</span>
        </label>

        <label class="check-item">
            <input type="checkbox" id="check2" onchange="validasiTombol()"> 
            <span>Selesai Membaca Pasal Amsal</span>
        </label>
    </div>

    <button id="btnKirim" class="btn-kirim btn-disabled" disabled onclick="kirimLaporan()">KIRIM LAPORAN SEKARANG</button>

    <a href="menu.html" class="btn-home"><i class="fa-solid fa-house-user"></i> Kembali ke Menu</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    function updateTargetHarian() {
        const sekarang = new Date();
        const tanggalMulai = new Date("2026-03-01"); 
        const selisihWaktu = sekarang.getTime() - tanggalMulai.getTime();
        const hariKe = Math.floor(selisihWaktu / (1000 * 3600 * 24)) + 1;

        const listTarget = [
            { utama: "Matius 1 - 4", hikmat: "Amsal 1" },
            { utama: "Matius 5 - 8", hikmat: "Amsal 2" },
            { utama: "Matius 9 - 12", hikmat: "Amsal 3" },
            { utama: "Matius 13 - 15", hikmat: "Amsal 4" },
            { utama: "Matius 16 - 18", hikmat: "Amsal 5" },
            { utama: "Matius 19 - 21", hikmat: "Amsal 6" },
            { utama: "Matius 22 - 25", hikmat: "Amsal 7" },
            { utama: "Matius 26 - 28", hikmat: "Amsal 8" },
            { utama: "Markus 1 - 4", hikmat: "Amsal 9" },
            { utama: "Markus 5 - 8", hikmat: "Amsal 10" },
            { utama: "Markus 9 - 12", hikmat: "Amsal 11" },
            { utama: "Markus 13 - 16", hikmat: "Amsal 12" },
            { utama: "Lukas 1 - 4", hikmat: "Amsal 13" },
            { utama: "Lukas 5 - 8", hikmat: "Amsal 14" },
            { utama: "Lukas 9 - 12", hikmat: "Amsal 15" },
            { utama: "Lukas 13 - 16", hikmat: "Amsal 16" },
            { utama: "Lukas 17 - 20", hikmat: "Amsal 17" },
            { utama: "Lukas 21 - 24", hikmat: "Amsal 18" },
            { utama: "Matius 19 - 22", hikmat: "Amsal 19" }, 
            { utama: "Matius 23 - 26", hikmat: "Amsal 20" }, 
            { utama: "Matius 27 - 28 & Markus 1-2", hikmat: "Amsal 21" }
        ];

        const index = hariKe - 1;
        if (listTarget[index]) {
            document.getElementById("pasal-utama").innerText = listTarget[index].utama;
            document.getElementById("pasal-hikmat").innerText = listTarget[index].hikmat;
        } else {
            document.getElementById("pasal-utama").innerText = "Selesai Siklus";
            document.getElementById("pasal-hikmat").innerText = "Gbu";
        }
    }

    function isWaktuPelaporanLewat() {
        const sekarang = new Date();
        const jam = sekarang.getHours();
        const menit = sekarang.getMinutes();
        return (jam >= 22 || (jam === 0 && menit < 30));
    }

    function tampilkanPesanBlokir(pesan, icon, color) {
        document.getElementById('block-title').innerText = pesan.includes("Terimakasih") ? "BERHASIL!" : "SHALOM!";
        document.getElementById('block-message').innerText = pesan;
        const iconEl = document.getElementById('block-icon');
        iconEl.className = "fa-solid " + icon;
        iconEl.style.color = color;
        document.getElementById('block-screen').style.display = 'flex';
    }

    async function cekLaporanHariIni() {
        if (!userEmail) return;
        const hariIni = new Date();
        hariIni.setHours(0,0,0,0);
        const tsHariIni = firebase.firestore.Timestamp.fromDate(hariIni);

        try {
            const snap = await db.collection("laporan_bacaan")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", tsHariIni)
                .get();

            if (!snap.empty) {
                tampilkanPesanBlokir("Laporan bacaan Anda hari ini sudah kami terima. Tetap semangat!", "fa-circle-check", "#2ecc71");
            }
        } catch (e) { console.error(e); }
    }

    function validasiTombol() {
        const c1 = document.getElementById('check1').checked;
        const c2 = document.getElementById('check2').checked;
        const btn = document.getElementById('btnKirim');
        btn.disabled = !(c1 && c2);
        btn.className = (c1 && c2) ? "btn-kirim btn-enabled" : "btn-kirim btn-disabled";
    }

    async function kirimLaporan() {
        if (isWaktuPelaporanLewat()) {
            tampilkanPesanBlokir("Waktu Pelaporan Sudah Lewat. Silakan melapor kembali besok pagi.", "fa-clock", "#e74c3c");
            return;
        }

        const btn = document.getElementById('btnKirim');
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mengirim...";
        btn.disabled = true;

        try {
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            const u = snapUser.docs[0].data();

            await db.collection("laporan_bacaan").add({
                nama: u.nama,
                email: userEmail,
                komsel: String(u.komsel),
                pasal_utama: document.getElementById('pasal-utama').innerText,
                pasal_hikmat: document.getElementById('pasal-hikmat').innerText,
                tanggal: firebase.firestore.Timestamp.now()
            });

            tampilkanPesanBlokir("Terimakasih Atas Laporan Anda. Tuhan Yesus Memberkati!", "fa-circle-check", "#2ecc71");
        } catch (e) {
            alert("Koneksi gagal.");
            btn.innerText = "KIRIM LAPORAN SEKARANG";
            btn.disabled = false;
        }
    }

    window.onload = function() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', options);
        updateTargetHarian();
        if (isWaktuPelaporanLewat()) {
            tampilkanPesanBlokir("Sesi Laporan Ditutup (22:00 - 00:30 WIT).", "fa-clock", "#e74c3c");
        } else {
            cekLaporanHariIni();
        }
    };
</script>
</body>
</html>
