<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lapor Baca Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-bca: #0046AD;
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --hijau-zamrud: #2ecc71;
            --emas-lux: #D4AF37;
            --oranye-hikmat: #d9480f;
            --putih-bg: #f4f7fa;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--putih-bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }

        .card { background: white; padding: 30px 25px; border-radius: 25px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid var(--biru-bca); position: relative; }

        h3 { margin: 10px 0; color: var(--biru-tua); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        #current-date { font-size: 14px; font-weight: 700; color: var(--biru-bca); margin-bottom: 20px; display: block; }

        .target-box, .hikmat-box { padding: 15px; border-radius: 18px; margin: 15px 0; text-align: left; border: 1px solid rgba(0,0,0,0.05); }
        .target-box { background: linear-gradient(135deg, #e7f3ff 0%, #ffffff 100%); border-left: 5px solid var(--biru-bca); }
        .hikmat-box { background: linear-gradient(135deg, #fff4e5 0%, #ffffff 100%); border-left: 5px solid var(--oranye-hikmat); }

        .label-pasal { font-size: 10px; font-weight: 800; color: #888; display: block; text-transform: uppercase; margin-bottom: 8px; }
        .sub-label { font-size: 9px; font-weight: 700; color: #555; margin-bottom: 4px; display: block; }

        .dropdown-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .dropdown-col { flex: 1; }

        select { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; background: white; font-size: 14px; font-weight: 700; color: var(--biru-tua); outline: none; }

        .check-item { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1.5px solid #eee; font-weight: 600; font-size: 14px; }
        input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--hijau-zamrud); }

        .btn-kirim { width: 100%; padding: 18px; border: none; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 15px; transition: 0.4s; text-transform: uppercase; }
        .btn-enabled { background: var(--biru-bca); color: white; box-shadow: 0 6px 20px rgba(0,70,173,0.3); }
        .btn-disabled { background-color: #ddd; color: #999; cursor: not-allowed; }

        #block-screen { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--biru-bca); color: white; z-index: 9999; 
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; 
        }
        
        .icon-circle { background: white; padding: 25px; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="block-screen">
    <div class="icon-circle">
        <i id="block-icon" class="fa-solid" style="font-size: 40px;"></i>
    </div>
    <h2 id="block-title" style="font-weight: 900; margin: 10px 0;"></h2>
    <p id="block-message" style="font-size: 18px; font-weight: 600; opacity: 0.9;"></p>
    <button onclick="window.location.href='menu.html'" style="margin-top: 30px; padding: 15px 40px; border-radius: 50px; border: 2px solid white; background: transparent; color: white; font-weight: 900; cursor: pointer;">KEMBALI KE MENU</button>
</div>

<div class="card">
    <h3><i class="fa-solid fa-book-bible" style="color: var(--emas-lux);"></i> LAPOR BACAAN</h3>
    <span id="current-date"></span>

    <div class="target-box">
        <label class="label-pasal">Pasal Utama:</label>
        <div style="margin-bottom: 10px;">
            <span class="sub-label">KITAB:</span>
            <select id="kitab-utama"></select>
        </div>
        <div class="dropdown-row">
            <div class="dropdown-col">
                <span class="sub-label">DARI PASAL:</span>
                <select id="pasal-dari"></select>
            </div>
            <div class="dropdown-col">
                <span class="sub-label">SAMPAI PASAL:</span>
                <select id="pasal-sampai"></select>
            </div>
        </div>
    </div>

    <button type="button" id="btnToggleExt" onclick="toggleExtension()" style="width: 100%; padding: 10px; background: none; border: 2px dashed var(--biru-tua); color: var(--biru-tua); border-radius: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 11px;">
        <i class="fa-solid fa-plus-circle"></i> TAMBAH PASAL EXTENSION (OPSIONAL)
    </button>

    <div id="card-extension" style="display: none; border: 1px solid #eee; border-left: 5px solid var(--biru-safir); padding: 15px; border-radius: 15px; background: #fcfcfc; margin-bottom: 20px; text-align: left; animation: fadeIn 0.4s;">
        <label class="label-pasal" style="color: var(--biru-safir);">Pasal Extension (Tambahan):</label>
        <div style="margin-bottom: 10px;">
            <span class="sub-label">KITAB:</span>
            <select id="kitab-ext"></select>
        </div>
        <div class="dropdown-row">
            <div class="dropdown-col">
                <span class="sub-label">DARI:</span>
                <select id="pasal-dari-ext"></select>
            </div>
            <div class="dropdown-col">
                <span class="sub-label">SAMPAI:</span>
                <select id="pasal-sampai-ext"></select>
            </div>
        </div>
    </div>

    <div class="hikmat-box">
        <label class="label-pasal">Pasal Hikmat:</label>
        <div class="dropdown-row">
            <div class="dropdown-col" style="flex: 0.6;"><span class="sub-label">KITAB:</span><select disabled><option>Amsal</option></select></div>
            <div class="dropdown-col"><span class="sub-label">PASAL:</span><select id="pasal-amsal"></select></div>
        </div>
    </div>

    <div style="margin-top: 25px;">
        <label class="check-item"><input type="checkbox" id="check1" onchange="validasiTombol()"><span>Selesai Membaca Pasal Utama</span></label>
        <label class="check-item"><input type="checkbox" id="check2" onchange="validasiTombol()"><span>Selesai Membaca Pasal Amsal</span></label>
    </div>

    <button id="btnKirim" class="btn-kirim btn-disabled" disabled onclick="prosesLaporan()">KIRIM LAPORAN SEKARANG</button>
    <a href="menu.html" class="btn-home" style="display: block; margin-top: 20px; text-decoration: none; color: var(--biru-bca); font-weight: bold; font-size: 13px;"><i class="fa-solid fa-house"></i> Kembali ke Menu Utama</a>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const userEmail = localStorage.getItem("userEmail");

    const daftarKitab = ["Kejadian", "Keluaran", "Imamat", "Bilangan", "Ulangan", "Yosua", "Hakim-hakim", "Rut", "1 Samuel", "2 Samuel", "1 Raja-raja", "2 Raja-raja", "1 Tawarikh", "2 Tawarikh", "Ezra", "Nehemia", "Ester", "Ayub", "Mazmur", "Amsal", "Pengkhotbah", "Kidung Agung", "Yesaya", "Yeremia", "Ratapan", "Yehezkiel", "Daniel", "Hosea", "Yoel", "Amos", "Obaja", "Yunus", "Mikha", "Nahum", "Habakuk", "Zefanya", "Hagai", "Zakharia", "Maleakhi", "Matius", "Markus", "Lukas", "Yohanes", "Kisah Para Rasul", "Roma", "1 Korintus", "2 Korintus", "Galatia", "Efesus", "Filipi", "Kolose", "1 Tesalonika", "2 Tesalonika", "1 Timotius", "2 Timotius", "Titus", "Filemon", "Ibrani", "Yakobus", "1 Petrus", "2 Petrus", "1 Yohanes", "2 Yohanes", "3 Yohanes", "Yudas", "Wahyu"];

    function init() {
        const kSelect = document.getElementById('kitab-utama');
        const kExt = document.getElementById('kitab-ext');
        const dSelect = document.getElementById('pasal-dari');
        const sSelect = document.getElementById('pasal-sampai');
        const dExt = document.getElementById('pasal-dari-ext');
        const sExt = document.getElementById('pasal-sampai-ext');
        const aSelect = document.getElementById('pasal-amsal');

        daftarKitab.forEach(k => { 
            kSelect.add(new Option(k, k)); 
            kExt.add(new Option(k, k)); 
        });

        for(let i=1; i<=150; i++){ 
            dSelect.add(new Option(i, i)); 
            sSelect.add(new Option(i, i)); 
            dExt.add(new Option(i, i)); 
            sExt.add(new Option(i, i)); 
        }

        for(let i=1; i<=31; i++){ aSelect.add(new Option(i, i)); }
        
        // Default Values
        kSelect.value = "Yohanes";
        dSelect.value = 1; sSelect.value = 1;
        aSelect.value = new Date().getDate(); // Otomatis ke tanggal hari ini
    }

    function toggleExtension() {
        const cardExt = document.getElementById('card-extension');
        const btn = document.getElementById('btnToggleExt');
        if (cardExt.style.display === "none") {
            cardExt.style.display = "block";
            btn.innerHTML = '<i class="fa-solid fa-minus-circle"></i> HAPUS PASAL EXTENSION';
            btn.style.borderColor = "#dc3545";
            btn.style.color = "#dc3545";
        } else {
            cardExt.style.display = "none";
            btn.innerHTML = '<i class="fa-solid fa-plus-circle"></i> TAMBAH PASAL EXTENSION (OPSIONAL)';
            btn.style.borderColor = "var(--biru-tua)";
            btn.style.color = "var(--biru-tua)";
        }
    }

    function validasiTombol() {
        const btn = document.getElementById('btnKirim');
        const ready = document.getElementById('check1').checked && document.getElementById('check2').checked;
        btn.disabled = !ready;
        btn.className = ready ? "btn-kirim btn-enabled" : "btn-kirim btn-disabled";
    }

    async function prosesLaporan() {
        const btn = document.getElementById('btnKirim');
        const originalText = btn.innerHTML;
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mengecek Data...";
        btn.disabled = true;

        const hariIni = new Date();
        hariIni.setHours(0,0,0,0);
        const besok = new Date(hariIni);
        besok.setDate(besok.getDate() + 1);

        try {
            // 1. Cek Double Post hari ini
            const cekDouble = await db.collection("laporan_bacaan")
                .where("email", "==", userEmail)
                .where("tanggal", ">=", hariIni)
                .where("tanggal", "<", besok)
                .get();

            if (!cekDouble.empty) {
                showBlock("GAGAL", "Anda sudah mengirim laporan hari ini.", "fa-circle-xmark", "#e74c3c");
                return;
            }

            // 2. Ambil data user untuk Nama & Komsel
            const snapUser = await db.collection("users").where("email", "==", userEmail).get();
            if (snapUser.empty) throw new Error("Data User tidak ditemukan. Silakan login ulang.");
            const u = snapUser.docs[0].data();

            // 3. Susun Payload (Struktur Baru)
            const payload = {
                nama: u.nama, 
                email: userEmail, 
                jc: String(u.komsel || u.jc).trim(), // Menggunakan 'jc' agar sinkron dengan dashboard
                
                // Format Detail
                kitab: document.getElementById('kitab-utama').value,
                pasal: document.getElementById('pasal-dari').value + "-" + document.getElementById('pasal-sampai').value,
                
                // Format String (untuk riwayat/view)
                pasal_utama: `${document.getElementById('kitab-utama').value} ${document.getElementById('pasal-dari').value} - ${document.getElementById('pasal-sampai').value}`,
                pasal_hikmat: `Amsal ${document.getElementById('pasal-amsal').value}`,
                
                // Timestamp Penting
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                tanggal: firebase.firestore.Timestamp.now()
            };

            // Tambahkan Extension Jika Aktif
            if(document.getElementById('card-extension').style.display === "block") {
                payload.pasal_extension = `${document.getElementById('kitab-ext').value} ${document.getElementById('pasal-dari-ext').value} - ${document.getElementById('pasal-sampai-ext').value}`;
            }

            // 4. Simpan ke Firestore
            await db.collection("laporan_bacaan").add(payload);
            showBlock("BERHASIL", "Terimakasih! Laporan Anda telah tersimpan.", "fa-circle-check", "#2ecc71");

        } catch (e) {
            alert("Error: " + e.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }

    function showBlock(title, msg, icon, iconCol) {
        document.getElementById('block-title').innerText = title;
        document.getElementById('block-message').innerText = msg;
        document.getElementById('block-icon').className = "fa-solid " + icon;
        document.getElementById('block-icon').style.color = iconCol;
        document.getElementById('block-screen').style.display = 'flex';
    }

    window.onload = function() {
        init();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    };
</script>
</body>
</html>
