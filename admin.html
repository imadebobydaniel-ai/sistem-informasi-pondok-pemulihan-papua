<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Edit Data Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .reg-container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; margin-bottom: 20px; }
        .header-logo { text-align: center; margin-bottom: 15px; }
        .header-logo img { width: 60px; height: auto; }
        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h2 { margin: 0; font-size: 18px; color: #333; }
        .header-text p { margin: 5px 0 0; font-size: 13px; color: #666; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #444; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
        .form-group input:focus { border-color: #007bff; background: #fff; }
        .form-group input[readonly] { background-color: #e9ecef; color: #495057; cursor: not-allowed; border: 1px solid #ccc; }
        .btn-submit { width: 100%; padding: 15px; background-color: #007bff; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-back-admin { display: block; text-align: center; text-decoration: none; color: #666; font-size: 14px; font-weight: bold; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
        #blocking-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .modal-box i { font-size: 50px; color: #007bff; margin-bottom: 15px; }
        .modal-box p { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header-logo"><img src="logo_pondok.png" alt="Logo"></div>
    <div class="header-text">
        <h2>EDIT DATA ANGGOTA</h2>
        <p>Perbarui profil anggota secara berkala</p>
    </div>

    <form id="formEdit">
        <div class="form-group">
            <label>Nomor Komsel (NK)</label>
            <input type="text" id="nk" readonly>
        </div>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="namaLengkap" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Nomor HP / WhatsApp</label>
            <input type="tel" id="whatsapp" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-container">
                <input type="password" id="password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
            </div>
        </div>
        <div class="form-group">
            <label>Alamat Lengkap</label>
            <textarea id="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="golDarah" required>
                <option value="">-- Pilih --</option>
                <option value="A">A</option><option value="B">B</option>
                <option value="O">O</option><option value="AB">AB</option>
            </select>
        </div>
        <div class="form-group">
            <label>Jabatan</label>
            <select id="jabatan" required>
                <option value="">-- Pilih Jabatan --</option>
                <option value="Anggota">Anggota</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>
        <div class="form-group">
            <label>Komsel JC</label>
            <select id="komsel" required>
                <option value="">-- Pilih Lokasi JC --</option>
                <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option><option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <button type="button" onclick="handleUpdate()" class="btn-submit">SIMPAN PERUBAHAN</button>
        <a href="admin.html" class="btn-back-admin"><i class="fa-solid fa-arrow-left"></i> Kembali ke Data Admin</a>
    </form>
</div>

<div id="blocking-message">
    <div class="modal-box">
        <i class="fa-solid fa-circle-check"></i>
        <p>Perubahan Berhasil Disimpan!</p>
        <button onclick="redirectBack()" class="btn-submit">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // PENTING: Ambil ID dari memori
    const editID = localStorage.getItem("editMemberID");

    window.onload = async function() {
        if (!editID) {
            alert("Tidak ada data yang dipilih! Klik tombol edit di Tabel Admin.");
            window.location.href = 'admin.html';
            return;
        }

        try {
            const doc = await db.collection("users").doc(editID).get();
            if (doc.exists) {
                const data = doc.data();
                // Mengisi otomatis semua kolom form
                document.getElementById("nk").value = data.nk || "-";
                document.getElementById("namaLengkap").value = data.namaLengkap || "";
                document.getElementById("email").value = data.email || "";
                document.getElementById("whatsapp").value = data.whatsapp || "";
                document.getElementById("password").value = data.password || "";
                document.getElementById("alamat").value = data.alamat || "";
                document.getElementById("golDarah").value = data.golDarah || "";
                document.getElementById("jabatan").value = data.jabatan || "";
                document.getElementById("komsel").value = data.komsel || "";
            }
        } catch (e) { alert("Gagal memuat data: " + e.message); }
    };

    // Fungsi Ikon Mata
    document.getElementById('eyeIcon').addEventListener('click', function() {
        const passInput = document.getElementById('password');
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    async function handleUpdate() {
        const userData = {
            namaLengkap: document.getElementById("namaLengkap").value,
            email: document.getElementById("email").value,
            whatsapp: document.getElementById("whatsapp").value,
            password: document.getElementById("password").value,
            alamat: document.getElementById("alamat").value,
            golDarah: document.getElementById("golDarah").value,
            jabatan: document.getElementById("jabatan").value,
            komsel: document.getElementById("komsel").value
        };

        try {
            await db.collection("users").doc(editID).update(userData);
            document.getElementById('blocking-message').style.display = 'flex';
        } catch (error) { alert("Gagal update: " + error.message); }
        // PASTIKAN FUNGSI INI ADA DI FILE admin.html ANDA
function editMember(id) {
    // 1. Simpan ID ke memori sementara (localStorage)
    localStorage.setItem("editMemberID", id);
    
    // 2. Pindah ke halaman edit (sesuaikan nama filenya, misal: edit_anggota.html)
    window.location.href = 'edit_anggota.html'; 
}
    }

    function redirectBack() {
        localStorage.removeItem("editMemberID");
        window.location.href = 'admin.html';
    }
</script>
</body>
</html>
