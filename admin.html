<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        
        /* TOMBOL KEMBALI */
        .navigation-top { margin-bottom: 20px; }
        .btn-back { 
            background: #222; color: #fff; border: 2px solid #007bff; 
            padding: 10px 20px; border-radius: 50px; cursor: pointer; text-decoration: none; 
            font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .btn-back:hover { background: #007bff; transform: translateX(-5px); }

        /* HEADER & TOOLBAR */
        .header-section { display: flex; align-items: center; gap: 10px; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .btn-tool:hover { opacity: 0.8; }

        /* BOX PENCARIAN */
        .search-group { display: flex; gap: 5px; flex-grow: 1; max-width: 500px; position: relative; }
        .search-input { padding: 10px 40px 10px 15px; width: 100%; border: 2px solid #ddd; border-radius: 6px; outline: none; }
        .search-input:focus { border-color: #ff0000; }
        .btn-cari-klik { position: absolute; right: 5px; top: 5px; background: #ff0000; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }

        /* TABEL */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        thead { background: #ff0000; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        /* EFEK SAAT EDIT */
        .sedang-diedit { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: black !important; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="navigation-top">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN</a>
    </div>

    <div class="header-section">
        <i class="fa-solid fa-database"></i> Database Administrator
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        
        <div class="search-group">
            <input type="text" id="kotakCari" class="search-input" placeholder="Cari berdasarkan Nama atau No HP...">
            <button class="btn-cari-klik" onclick="jalankanCari()"><i class="fa-solid fa-magnifying-glass"></i> Cari</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="pilihSemua"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat</th>
                    <th>Jabatan</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr>
                    <td><input type="checkbox" class="cek-baris"></td>
                    <td class="kolom-data">Boby Daniel</td>
                    <td class="kolom-data">boby.daniel4@gmail.com</td>
                    <td class="kolom-data" style="color:red; font-weight:bold;">Bukadong821</td>
                    <td class="kolom-data">081283393576</td>
                    <td class="kolom-data">Jl. tanah Hitam Abe pantai</td>
                    <td class="kolom-data">Ketua Komsel</td>
                    <td class="kolom-data">JC 5</td>
                    <td class="kolom-data">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. FUNGSI EDIT DATA
    document.getElementById('btnEdit').onclick = function() {
        let terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) {
            alert("Centang kotak di samping nama dulu, Bang!");
            return;
        }
        terpilih.forEach(cb => {
            let row = cb.closest('tr');
            row.querySelectorAll('.kolom-data').forEach(td => {
                td.contentEditable = "true";
                td.classList.add('sedang-diedit');
            });
        });
        alert("Mode Edit Aktif! Silakan ubah data langsung di tabel.");
    };

    // 2. FUNGSI PENCARIAN (BY NAMA ATAU NO HP)
    function jalankanCari() {
        let filter = document.getElementById('kotakCari').value.toLowerCase();
        let baris = document.querySelectorAll('#badanTabel tr');

        baris.forEach(tr => {
            let nama = tr.cells[1].innerText.toLowerCase();
            let nohp = tr.cells[4].innerText.toLowerCase();
            
            if (nama.includes(filter) || nohp.includes(filter)) {
                tr.style.display = "";
            } else {
                tr.style.display = "none";
            }
        });
    }

    // Biar bisa tekan 'Enter' untuk cari
    document.getElementById('kotakCari').addEventListener("keypress", function(e) {
        if (e.key === "Enter") jalankanCari();
    });

    // 3. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) return alert("Pilih data yang mau dihapus!");
        if (confirm("Yakin mau hapus data terpilih?")) {
            terpilih.forEach(cb => cb.closest('tr').remove());
        }
    };

    // 4. SELECT ALL CHECKBOX
    document.getElementById('pilihSemua').onclick = function() {
        document.querySelectorAll('.cek-baris').forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
