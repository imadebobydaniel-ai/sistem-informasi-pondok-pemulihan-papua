<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --dark: #333; --light: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
        
        .search-box { position: relative; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        /* Fitur Table Scroll & Freeze */
        .table-responsive { overflow-x: auto; max-width: 100%; position: relative; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; } /* Lebar minimal agar bisa di-scroll */
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; white-space: nowrap; }
        table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: var(--dark); white-space: nowrap; }
        
        /* Kolom Freeze (Checkbox & NK) */
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }
        th.freeze-col { z-index: 3; background: var(--primary) !important; }

        .password-view { font-family: monospace; background: #f0f0f0; padding: 3px 6px; border-radius: 4px; color: #555; }
        .action-icons { display: flex; gap: 15px; font-size: 18px; }
        .btn-edit { color: #28a745; cursor: pointer; }
        .btn-delete { color: #dc3545; cursor: pointer; }

        #loading-state { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2 style="margin:0;">Dashboard Administrator</h2>
            <p style="margin:5px 0 0; color:#777; font-size: 13px;">Manajemen Data Anggota Pondok Pemulihan Papua</p>
        </div>
        <div class="nav-buttons">
            <a href="login_admin.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama, NK, atau Alamat...">
        <i class="fas fa-search"></i>
    </div>

    <div id="loading-state"><i class="fas fa-spinner fa-spin"></i> Menghubungkan ke Firebase...</div>

    <div class="table-responsive">
        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th class="freeze-col"><input type="checkbox" id="checkAll"></th>
                    <th style="left: 45px;" class="freeze-col">NK</th>
                    <th>Nama Anggota</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Password (View Only)</th>
                    <th>Alamat</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function loadData() {
        const tableBody = document.getElementById("memberData");
        const loading = document.getElementById("loading-state");
        const table = document.getElementById("adminTable");

        try {
            const snapshot = await db.collection("users").get();
            tableBody.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td class="freeze-col"><input type="checkbox" class="user-checkbox"></td>
                        <td style="left: 45px;" class="freeze-col"><b>${data.nomor_komsel || '-'}</b></td>
                        <td>${data.nama || '-'}</td>
                        <td>${data.no_hp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td><span class="password-view">${data.password || '******'}</span></td>
                        <td>${data.alamat || '-'}</td>
                        <td>${data.golongan_darah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td><span style="color:${data.status === 'Aktif' ? 'green' : 'red'}">${data.status || 'Pending'}</span></td>
                        <td class="action-icons">
                            <i class="fas fa-edit btn-edit" onclick="goToEdit('${doc.id}')" title="Edit Data"></i>
                            <i class="fas fa-trash btn-delete" onclick="deleteMember('${doc.id}', '${data.nama}')" title="Hapus Data"></i>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            loading.style.display = "none";
            table.style.display = "table";
        } catch (error) {
            loading.innerHTML = "Gagal memuat data: " + error.message;
        }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.getElementById("memberData").getElementsByTagName("tr");
        for (let i = 0; i < rows.length; i++) {
            let text = rows[i].innerText.toLowerCase();
            rows[i].style.display = text.includes(input) ? "" : "none";
        }
    }

    function goToEdit(id) {
        localStorage.setItem("editMemberID", id);
        window.location.href = 'registrasi.html';
    }

    async function deleteMember(id, nama) {
        if (confirm("Apakah Anda yakin ingin menghapus data " + nama + "?")) {
            try {
                await db.collection("users").doc(id).delete();
                alert("Data berhasil dihapus");
                location.reload();
            } catch (error) {
                alert("Gagal menghapus: " + error.message);
            }
        }
        function goToEdit(id) {
    if (!id) return;
    // Menyimpan ID ke memori sementara browser
    localStorage.setItem("editMemberID", id);
    // Pindah ke halaman edit (registrasi.html)
    window.location.href = 'registrasi.html';
}
    }

    document.getElementById('checkAll').onclick = function() {
        let checkboxes = document.querySelectorAll('.user-checkbox');
        for (let checkbox of checkboxes) { checkbox.checked = this.checked; }
    }

    window.onload = loadData;
</script>
</body>
</html>
