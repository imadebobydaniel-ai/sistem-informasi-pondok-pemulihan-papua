<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
            --teal: #008080;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .stats-grid a { text-decoration: none; color: inherit; }
        .stat-card { 
            padding: 20px 15px; 
            border-radius: 10px; 
            color: white; 
            position: relative; 
            min-height: 60px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            display: flex;
            align-items: center;
        }
        .stat-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .stat-card h4 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; padding-right: 30px; }
        .stat-card i { position: absolute; right: 12px; font-size: 1.3rem; opacity: 0.4; }

        #actionMenu { display: none; gap: 10px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; align-items: center; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-decoration: none; display: inline-block; }
        
        .table-controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }
        
        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 11px; text-align: left; text-transform: uppercase; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: top; }
        
        .nij-col { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 12px; }
        .check-col { width: 40px; text-align: center; }
        
        .badge-pending { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .badge-aktif { background: var(--success); color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .btn-status-toggle { border: none; padding: 4px 10px; border-radius: 4px; color: white; font-size: 14px; cursor: pointer; margin-left: 5px; }

        .file-link { color: var(--accent); text-decoration: none; font-weight: bold; display: block; margin-bottom: 5px; }
        .file-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html"><div class="stat-card" style="background: #007bff;"><h4>Portal Tiket</h4><i class="fas fa-ticket-alt"></i></div></a>
        <a href="#memberData"><div class="stat-card" style="background: #28a745;"><h4>Raport Jemaat</h4><i class="fas fa-check-circle"></i></div></a>
        <a href="portal-media.html"><div class="stat-card" style="background: #6f42c1;"><h4>Portal Media</h4><i class="fas fa-icons"></i></div></a>
        <a href="informasi-kegiatan.html"><div class="stat-card" style="background: #fd7e14;"><h4>Informasi Kegiatan</h4><i class="fas fa-calendar-alt"></i></div></a>
        <a href="admin-bigdata.html"><div class="stat-card" style="background: #17a2b8;"><h4>Big Data</h4><i class="fas fa-chart-line"></i></div></a>
        <a href="agenda-tahunan.html"><div class="stat-card" style="background: var(--teal);"><h4>Agenda Tahunan</h4><i class="fas fa-book-open"></i></div></a>
        <a href="manajemen-user.html"><div class="stat-card" style="background: var(--emas); color: #333;"><h4 style="color: #333;">Manajemen User</h4><i class="fas fa-users-cog" style="color: #333; opacity: 0.6;"></i></div></a>
    </div>

    <div id="actionMenu">
        <span style="font-size: 12px; font-weight: bold; margin-right: 10px;" id="selectedCount">0 Terpilih</span>
        <button class="btn-action" style="background: var(--accent);" onclick="openEditFromSelection()"><i class="fas fa-edit"></i> Edit</button>
        <button class="btn-action" style="background: var(--danger);" onclick="bulkDelete()"><i class="fas fa-trash"></i> Hapus</button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari NIJ, nama, komsel, atau jabatan...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div class="table-responsive">
        <table id="memberTable">
            <thead>
                <tr>
                    <th class="check-col"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>NIJ</th>
                    <th>Nama Lengkap</th>
                    <th>WhatsApp / Email</th>
                    <th>Detail Data Diri</th>
                    <th>Alamat Lengkap</th>
                    <th>Lokasi & Komsel</th>
                    <th>Jabatan & Pelayanan</th>
                    <th>Lampiran File</th>
                    <th>Status Akun</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() { loadMembersRealtime(); };

    function loadMembersRealtime() {
        // Menggunakan collection "jemaat" sesuai database Anda
        db.collection("jemaat").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                
                // DISINKRONKAN DENGAN NAMA FIELD DI FIREBASE ANDA
                const namaTampil = d.nama_lengkap || '-';
                const status = d.status_akun || 'Pending';
                const nij = d.nij || '-';
                const whatsapp = d.whatsapp || '-';
                const email = d.email || '-';
                const lokasi = d.lokasi_berjemaat || '-';
                const komsel = d.komsel || '-';
                const jabatan = d.jabatan || '-';
                const subBidang = d.sub_bidang || '-';
                const pekerjaan = d.pekerjaan || '-';
                const statusNikah = d.status_nikah || '-';

                const statusBadge = status === 'Aktif' ? 'badge-aktif' : 'badge-pending';
                const statusIcon = status === 'Aktif' ? 'fa-check-square' : 'fa-stop-circle';
                const statusBtnColor = status === 'Aktif' ? '#28a745' : '#dc3545';

                let fileHtml = "";
                if (d.urlKtp) fileHtml += `<a href="${d.urlKtp}" target="_blank" class="file-link"><i class="fas fa-id-card"></i> KTP</a>`;
                if (d.urlKk) fileHtml += `<a href="${d.urlKk}" target="_blank" class="file-link"><i class="fas fa-users"></i> KK</a>`;
                if (!fileHtml) fileHtml = "<small style='color:red;'>Tidak ada file</small>";

                tableBody.innerHTML += `
                <tr>
                    <td class="check-col"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${nij}</td>
                    <td><strong>${namaTampil}</strong></td>
                    <td>
                        <i class="fab fa-whatsapp" style="color:green;"></i> ${whatsapp}<br>
                        <small><i class="fas fa-envelope"></i> ${email}</small>
                    </td>
                    <td>
                        <small>
                            Status: ${statusNikah}<br>
                            Pekerjaan: ${pekerjaan}
                        </small>
                    </td>
                    <td><small>${d.alamat || '-'}</small></td>
                    <td>
                        <span style="color:var(--primary); font-weight:bold;">${lokasi}</span><br>
                        <small>Komsel: ${komsel}</small>
                    </td>
                    <td>
                        <strong>${jabatan}</strong><br>
                        <small>Sub: ${subBidang}</small>
                    </td>
                    <td>${fileHtml}</td>
                    <td>
                        <span class="${statusBadge}">${status}</span>
                        <button class="btn-status-toggle" style="background:${statusBtnColor}" onclick="toggleUserStatus('${doc.id}', '${status}')">
                            <i class="fas ${statusIcon}"></i>
                        </button>
                    </td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent); padding:4px 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger); padding:4px 8px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    function openEditModal(uid) {
        window.location.href = `registrasi.html?edit=${uid}`;
    }

    function openEditFromSelection() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length !== 1) return alert("Pilih satu data untuk diedit.");
        openEditModal(selected[0].value);
    }

    function toggleUserStatus(id, current) {
        const next = current === 'Aktif' ? 'Pending' : 'Aktif';
        db.collection("jemaat").doc(id).update({ status_akun: next });
    }

    function deleteUser(id) { 
        if(confirm("Hapus data jemaat ini secara permanen?")) {
            db.collection("jemaat").doc(id).delete(); 
        }
    }

    function bulkDelete() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if(confirm(`Hapus ${selected.length} data terpilih?`)) {
            selected.forEach(cb => db.collection("jemaat").doc(cb.value).delete());
        }
    }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }

    function updateActionMenu() {
        const count = document.querySelectorAll('.user-checkbox:checked').length;
        document.getElementById('actionMenu').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('selectedCount').innerText = `${count} Terpilih`;
    }
</script>
</body>
</html>
