<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-box { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 1300px; margin: auto; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-back { background: #333; color: white; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 13px; }
        table th, table td { border: 1px solid #dee2e6; padding: 10px; text-align: left; }
        table th { background-color: #f8f9fa; color: #495057; }
        .user-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }
        .nk-badge { background: #e7f3ff; color: #007bff; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .action-btns button { border: none; background: none; cursor: pointer; font-size: 18px; margin-right: 5px; }
        .edit-btn { color: #007bff; }
        .delete-btn { color: #dc3545; }

        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 2% auto; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; position: relative; }
        .form-edit-group { margin-bottom: 12px; }
        .form-edit-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-edit-group input, .form-edit-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .form-edit-group input[readonly] { background-color: #f0f0f0; cursor: not-allowed; border: 1px solid #ccc; color: #777; }
        .profile-upload-area { text-align: center; margin-bottom: 15px; }
        #preview-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid #27ae60; }
        .btn-save { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 24px; cursor: pointer; color: #aaa; }
    </style>
</head>
<body>

<div class="admin-box">
    <div class="header-panel">
        <h2 style="margin:0;"><i class="fa-solid fa-users-viewfinder"></i> Database Anggota PPP</h2>
        <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI KE MENU</a>
    </div>

    <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <button onclick="hapusTerpilih()" style="background:#dc3545; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-trash-can"></i> Hapus Terpilih</button>
        <button onclick="loadData()" style="background:#007bff; color:white; border:none; padding:10px 15px; border-radius:6px; cursor:pointer; font-weight:bold;"><i class="fa-solid fa-rotate"></i> Refresh Data</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 30px;"><input type="checkbox" id="selectAll" onclick="toggleAll()"></th>
                <th>Foto</th>
                <th>NK</th>
                <th>Nama Lengkap</th>
                <th>Jabatan</th>
                <th>Gol. Darah</th>
                <th>WhatsApp</th>
                <th>Alamat</th>
                <th>Tgl Daftar</th> 
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h3 style="margin-top:0;"><i class="fa-solid fa-user-pen"></i> Edit Data Anggota</h3>
        <div class="profile-upload-area">
            <img id="preview-img" src="https://via.placeholder.com/100" alt="Profile">
            <br>
            <label style="cursor:pointer; color:#007bff; font-size:12px;" for="file-input"><i class="fa-solid fa-camera"></i> Ganti Foto Profil</label>
            <input type="file" id="file-input" style="display:none;" accept="image/*" onchange="previewFile()">
        </div>
        <input type="hidden" id="edit-id">
        <div class="form-edit-group"><label>Nama Lengkap</label><input type="text" id="edit-nama"></div>
        <div class="form-edit-group"><label>Nomor Komsel (NK)</label><input type="text" id="edit-nk" readonly></div>
        <div class="form-edit-group"><label>Tanggal Daftar</label><input type="text" id="edit-tgl" readonly></div>
        <div class="form-edit-group">
            <label>Jabatan</label>
            <select id="edit-jabatan">
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
                <option value="Pengurus">Pengurus</option>
            </select>
        </div>
        <div class="form-edit-group">
            <label>Golongan Darah</label>
            <select id="edit-goldar">
                <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
            </select>
        </div>
        <div class="form-edit-group"><label>Nomor WhatsApp</label><input type="text" id="edit-wa"></div>
        <div class="form-edit-group"><label>Alamat Lengkap</label><input type="text" id="edit-alamat"></div>
        <button class="btn-save" id="btnUpdate" onclick="updateData()">SIMPAN PERUBAHAN</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let base64Image = "";

    async function loadData() {
        const list = document.getElementById('user-list');
        list.innerHTML = '<tr><td colspan="10" style="text-align:center;">Memuat data...</td></tr>';
        
        // Listener Real-time
        db.collection("users").orderBy("tanggal_daftar", "desc").onSnapshot((snapshot) => {
            list.innerHTML = '';
            snapshot.forEach(doc => {
                const d = doc.data();
                const tgl = d.tanggal_daftar ? new Date(d.tanggal_daftar.seconds * 1000).toLocaleDateString('id-ID') : '-';
                
                list.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="check-item" value="${doc.id}"></td>
                        <td><img src="${d.fotoUrl || 'https://via.placeholder.com/50'}" class="user-img"></td>
                        <td><span class="nk-badge">${d.nomor_komsel || '-'}</span></td>
                        <td><strong>${d.nama}</strong><br><small>${d.email}</small></td>
                        <td>${d.jabatan || '-'}</td>
                        <td style="color:red; font-weight:bold;">${d.golongan_darah || '-'}</td>
                        <td>${d.no_hp || '-'}</td>
                        <td>${d.alamat || '-'}</td>
                        <td>${tgl}</td>
                        <td class="action-btns">
                            <button class="edit-btn" onclick="openEditModal('${doc.id}')"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button class="delete-btn" onclick="hapusSatu('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>`;
            });
        });
    }

    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        const data = doc.data();
        const tgl = data.tanggal_daftar ? new Date(data.tanggal_daftar.seconds * 1000).toLocaleString('id-ID') : '-';

        document.getElementById('edit-id').value = id;
        document.getElementById('edit-nama').value = data.nama || "";
        document.getElementById('edit-nk').value = data.nomor_komsel || "";
        document.getElementById('edit-tgl').value = tgl;
        document.getElementById('edit-jabatan').value = data.jabatan || "Anggota Komsel";
        document.getElementById('edit-goldar').value = data.golongan_darah || "AB";
        document.getElementById('edit-wa').value = data.no_hp || "";
        document.getElementById('edit-alamat').value = data.alamat || "";
        document.getElementById('preview-img').src = data.fotoUrl || 'https://via.placeholder.com/100';
        base64Image = data.fotoUrl || "";
        document.getElementById('editModal').style.display = "block";
    }

    async function updateData() {
        const id = document.getElementById('edit-id').value;
        const btn = document.getElementById('btnUpdate');
        btn.innerText = "Menyimpan...";
        btn.disabled = true;

        try {
            await db.collection("users").doc(id).update({
                nama: document.getElementById('edit-nama').value,
                jabatan: document.getElementById('edit-jabatan').value,
                golongan_darah: document.getElementById('edit-goldar').value,
                no_hp: document.getElementById('edit-wa').value,
                alamat: document.getElementById('edit-alamat').value,
                fotoUrl: base64Image
            });
            alert("Data Berhasil Diperbarui!");
            closeEditModal();
        } catch (e) { alert("Error: " + e.message); }
        btn.innerText = "SIMPAN PERUBAHAN";
        btn.disabled = false;
    }

    function previewFile() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onloadend = function() {
            document.getElementById('preview-img').src = reader.result;
            base64Image = reader.result;
        }
        if (file) { reader.readAsDataURL(file); }
    }

    function closeEditModal() { document.getElementById('editModal').style.display = "none"; }
    
    function toggleAll() {
        const master = document.getElementById('selectAll').checked;
        document.querySelectorAll('.check-item').forEach(i => i.checked = master);
    }

    async function hapusSatu(id) {
        if(confirm("Hapus data ini?")) { await db.collection("users").doc(id).delete(); }
    }

    async function hapusTerpilih() {
        const checked = document.querySelectorAll('.check-item:checked');
        if(checked.length === 0) return alert("Pilih data dulu!");
        if(confirm("Hapus " + checked.length + " data?")) {
            for(let i of checked) { await db.collection("users").doc(i.value).delete(); }
        }
    }

    loadData();
</script>
</body>
</html>
