<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #007bff; --dark: #333; --light: #f4f7f6; --success: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .search-box { position: relative; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }
        
        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 13px; }
        table td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; color: var(--dark); }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }
        th.freeze-col { z-index: 3; background: var(--primary) !important; }
        .action-icons { display: flex; gap: 15px; font-size: 18px; }
        .btn-edit { color: var(--success); cursor: pointer; }
        .btn-delete { color: #dc3545; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); overflow-y: auto; padding: 20px 0; }
        .modal-content { background: white; margin: 20px auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; box-shadow: 0 5px 30px rgba(0,0,0,0.3); }
        .modal-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .readonly-field { background: #f0f0f0; cursor: not-allowed; font-weight: bold; }
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .close-modal { position: absolute; right: 20px; top: 20px; font-size: 20px; cursor: pointer; color: #aaa; }
        #loading-state { text-align: center; padding: 40px; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2 style="margin:0;">Dashboard Administrator</h2>
            <p style="margin:5px 0 0; color:#777; font-size: 13px;">Manajemen Data Anggota Pondok Pemulihan Papua</p>
        </div>
        <a href="login_admin.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama, NK, atau Alamat...">
        <i class="fas fa-search"></i>
    </div>

    <div id="loading-state"><i class="fas fa-spinner fa-spin"></i> Menghubungkan ke Firebase...</div>

    <div class="table-responsive">
        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th class="freeze-col"><input type="checkbox" id="checkAll"></th>
                    <th style="left: 45px;" class="freeze-col">NK</th>
                    <th>Nama Anggota</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Alamat</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <div class="modal-header"><h3>Edit Data Anggota</h3></div>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group">
                <label>Nomor Komsel (NK)</label>
                <input type="text" id="edit_nk" class="readonly-field" readonly>
            </div>
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="edit_nama" required>
            </div>
            <div class="form-group">
                <label>WhatsApp</label>
                <input type="text" id="edit_wa" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="edit_email" required>
            </div>
            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="edit_goldarah">
                    <option value="-">-</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="AB">AB</option>
                    <option value="O">O</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jabatan dalam Komsel</label>
                <select id="edit_jabatan">
                    <option value="Ketua Komsel">Ketua Komsel</option>
                    <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
                    <option value="Anggota Komsel">Anggota Komsel</option>
                    <option value="Anggota">Anggota</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lokasi JC</label>
                <select id="edit_jc">
                    <option value="1">JC 1</option>
                    <option value="2">JC 2</option>
                    <option value="3">JC 3</option>
                    <option value="4">JC 4</option>
                    <option value="5">JC 5</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="text" id="edit_pass" class="readonly-field" readonly>
            </div>
            <div class="form-group">
                <label>Alamat</label>
                <textarea id="edit_alamat" rows="2" required></textarea>
            </div>
            <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function loadData() {
        const tableBody = document.getElementById("memberData");
        try {
            const snapshot = await db.collection("users").get();
            tableBody.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                const row = `
                    <tr>
                        <td class="freeze-col"><input type="checkbox" class="user-checkbox"></td>
                        <td style="left: 45px;" class="freeze-col"><b>${data.nomor_komsel || '-'}</b></td>
                        <td>${data.nama || '-'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td><code>${data.password || '-'}</code></td>
                        <td>${data.alamat || '-'}</td>
                        <td>${data.golDarah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>${data.status || 'Aktif'}</td>
                        <td class="action-icons">
                            <i class="fas fa-edit btn-edit" onclick="openEditModal('${doc.id}')"></i>
                            <i class="fas fa-trash btn-delete" onclick="deleteMember('${doc.id}', '${data.nama}')"></i>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            document.getElementById("loading-state").style.display = "none";
            document.getElementById("adminTable").style.display = "table";
        } catch (e) { alert("Gagal muat: " + e.message); }
    }

    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById("edit_id").value = id;
            document.getElementById("edit_nk").value = data.nomor_komsel || "";
            document.getElementById("edit_nama").value = data.nama || "";
            document.getElementById("edit_wa").value = data.whatsapp || "";
            document.getElementById("edit_email").value = data.email || "";
            document.getElementById("edit_pass").value = data.password || "";
            document.getElementById("edit_alamat").value = data.alamat || "";
            
            // Sync dropdowns
            document.getElementById("edit_goldarah").value = data.golDarah || "-";
            document.getElementById("edit_jabatan").value = data.jabatan || "Anggota";
            document.getElementById("edit_jc").value = data.komsel || "1";
            
            document.getElementById("editModal").style.display = "block";
        }
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    document.getElementById("formUpdate").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        try {
            await db.collection("users").doc(id).update({
                nama: document.getElementById("edit_nama").value,
                whatsapp: document.getElementById("edit_wa").value,
                email: document.getElementById("edit_email").value,
                alamat: document.getElementById("edit_alamat").value,
                golDarah: document.getElementById("edit_goldarah").value,
                jabatan: document.getElementById("edit_jabatan").value,
                komsel: document.getElementById("edit_jc").value
            });
            alert("Berhasil diperbarui!");
            closeEditModal();
            loadData();
        } catch (e) { alert("Gagal: " + e.message); }
    };

    async function deleteMember(id, nama) {
        if (confirm("Hapus " + nama + "?")) {
            await db.collection("users").doc(id).delete();
            loadData();
        }
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#memberData tr");
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
    }

    window.onload = loadData;
</script>
</body>
</html>
