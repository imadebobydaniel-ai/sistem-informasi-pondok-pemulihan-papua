<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
            --teal: #008080;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 12px; 
            margin-bottom: 20px; 
        }
        .stats-grid a { text-decoration: none; color: inherit; }
        .stat-card { 
            padding: 20px 15px; 
            border-radius: 10px; 
            color: white; 
            position: relative; 
            min-height: 60px; 
            cursor: pointer; 
            transition: transform 0.2s; 
            display: flex;
            align-items: center;
        }
        .stat-card:hover { transform: translateY(-5px); filter: brightness(1.1); }
        .stat-card h4 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; line-height: 1.2; padding-right: 30px; }
        .stat-card i { position: absolute; right: 12px; font-size: 1.3rem; opacity: 0.4; }

        #actionMenu { display: none; gap: 10px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; align-items: center; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; font-size: 11px; text-decoration: none; display: inline-block; }
        
        .table-controls { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }
        
        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 11px; text-align: left; text-transform: uppercase; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: top; }
        
        .nij-col { color: var(--accent); font-weight: bold; font-family: monospace; font-size: 12px; }
        .check-col { width: 40px; text-align: center; }
        
        .badge-pending { background: #ffc107; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .badge-aktif { background: var(--success); color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; display: inline-block; }
        .btn-status-toggle { border: none; padding: 4px 10px; border-radius: 4px; color: white; font-size: 14px; cursor: pointer; margin-left: 5px; }

        .file-link { color: var(--accent); text-decoration: none; font-weight: bold; display: block; margin-bottom: 5px; }
        .file-link:hover { text-decoration: underline; }

        /* MODAL EDIT STYLES */
        #editModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center; 
            overflow-y: auto; padding: 20px;
        }
        .reg-container { 
            background: white; width: 100%; max-width: 500px; margin: auto; 
            position: relative; padding: 25px; border-radius: 15px; 
        }
        .step-indicator { display: flex; gap: 5px; margin-bottom: 20px; }
        .step { height: 4px; flex: 1; background: #eee; border-radius: 2px; }
        .step.active { background: var(--primary); }
        .form-step { display: none; }
        .form-step.active { display: block; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-next, .btn-prev { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #ccc; }
        .dynamic-field { display: none; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html"><div class="stat-card" style="background: #007bff;"><h4>Portal Tiket</h4><i class="fas fa-ticket-alt"></i></div></a>
        <a href="#memberData"><div class="stat-card" style="background: #28a745;"><h4>Raport Jemaat</h4><i class="fas fa-check-circle"></i></div></a>
        <a href="portal-media.html"><div class="stat-card" style="background: #6f42c1;"><h4>Portal Media</h4><i class="fas fa-icons"></i></div></a>
        <a href="informasi-kegiatan.html"><div class="stat-card" style="background: #fd7e14;"><h4>Informasi Kegiatan</h4><i class="fas fa-calendar-alt"></i></div></a>
        <a href="admin-bigdata.html"><div class="stat-card" style="background: #17a2b8;"><h4>Big Data</h4><i class="fas fa-chart-line"></i></div></a>
        <a href="agenda-tahunan.html"><div class="stat-card" style="background: var(--teal);"><h4>Agenda Tahunan</h4><i class="fas fa-book-open"></i></div></a>
        <a href="manajemen-user.html"><div class="stat-card" style="background: var(--emas); color: #333;"><h4 style="color: #333;">Manajemen User</h4><i class="fas fa-users-cog" style="color: #333; opacity: 0.6;"></i></div></a>
    </div>

    <div id="actionMenu">
        <span style="font-size: 12px; font-weight: bold; margin-right: 10px;" id="selectedCount">0 Terpilih</span>
        <button class="btn-action" style="background: var(--accent);" onclick="openEditFromSelection()"><i class="fas fa-edit"></i> Edit</button>
        <button class="btn-action" style="background: var(--danger);" onclick="bulkDelete()"><i class="fas fa-trash"></i> Hapus</button>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari NIJ, nama, komsel, atau jabatan...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div class="table-responsive">
        <table id="memberTable">
            <thead>
                <tr>
                    <th class="check-col"><input type="checkbox" id="checkAll" onclick="toggleAll(this)"></th>
                    <th>NIJ</th>
                    <th>Nama Lengkap</th>
                    <th>WhatsApp / Email</th>
                    <th>Detail Data Diri</th>
                    <th>Alamat Lengkap</th>
                    <th>Lokasi & Komsel</th>
                    <th>Jabatan & Pelayanan</th>
                    <th>Lampiran File</th>
                    <th>Status Akun</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<div id="editModal">
    <div class="reg-container">
        <button onclick="closeEditModal()" style="position:absolute; right:15px; top:15px; border:none; background:none; font-size:20px; cursor:pointer;">&times;</button>
        
        <div class="header-text" style="text-align: center; margin-bottom: 20px;">
            <h2 style="color: var(--primary); margin:0;"><i class="fa-solid fa-user-pen"></i> Edit Data Jemaat</h2>
            <p id="edit-nij-title" style="font-weight:bold; color:var(--orange); margin:5px 0;"></p>
        </div>

        <form id="formEditJemaat">
            <input type="hidden" id="edit-uid">
            
            <div class="step-indicator">
                <div class="step active" id="estep-1-bar"></div>
                <div class="step" id="estep-2-bar"></div>
                <div class="step" id="estep-3-bar"></div>
            </div>

            <div class="form-step active" id="estep-1">
                <div class="form-group"><label>Nama Lengkap*</label><input type="text" id="edit-nama"></div>
                <div class="grid-2">
                    <div class="form-group"><label>Email*</label><input type="email" id="edit-email"></div>
                    <div class="form-group"><label>WhatsApp*</label><input type="tel" id="edit-hp"></div>
                </div>
                <div class="form-group">
                    <label>Status Pernikahan*</label>
                    <select id="edit-status_pernikahan" onchange="handleEditStatusNikah()">
                        <option value="Menikah">Menikah</option>
                        <option value="Single">Single</option>
                        <option value="Duda">Duda</option>
                        <option value="Janda">Janda</option>
                    </select>
                </div>

                <div id="eform_menikah" class="dynamic-field">
                    <div class="grid-2">
                        <div class="form-group"><label>Jumlah Anak</label><input type="number" id="edit-jumlah_anak"></div>
                        <div class="form-group"><label>Nama Pasangan</label><input type="text" id="edit-nama_pasangan"></div>
                    </div>
                </div>

                <div id="eform_single" class="dynamic-field">
                    <div class="grid-2">
                        <div class="form-group"><label>Nama Ayah</label><input type="text" id="edit-nama_ayah"></div>
                        <div class="form-group"><label>Nama Ibu</label><input type="text" id="edit-nama_ibu"></div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="button" class="btn-next" onclick="nextEditStep(2)">Lanjut <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="form-step" id="estep-2">
                <div class="form-group">
                    <label>Lokasi Berjemaat*</label>
                    <select id="edit-lokasi" onchange="updateEditKomsel()">
                        <option value="">-- Pilih Lokasi --</option>
                        <option value="Abepura">Abepura</option>
                        <option value="Sentani">Sentani</option>
                        <option value="Doyo">Doyo</option>
                        <option value="Arso 1">Arso 1</option>
                        <option value="Arso 2">Arso 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Komsel*</label>
                    <select id="edit-komsel"></select>
                </div>
                <div class="form-group">
                    <label>Jabatan Utama*</label>
                    <select id="edit-jabatan" onchange="updateEditSubJabatan()">
                        <option value="">-- Pilih Jabatan --</option>
                        <option value="Kependetaan">Kependetaan</option>
                        <option value="Pemimpin / Koordinator">Pemimpin / Koordinator</option>
                        <option value="PKS Komsel">PKS Komsel</option>
                        <option value="Fulltimer">Fulltimer</option>
                        <option value="Anggota Jemaat">Anggota Jemaat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sub Bidang*</label>
                    <select id="edit-sub_jabatan" onchange="updateEditSpesifik()"></select>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-prev" onclick="nextEditStep(1)">Kembali</button>
                    <button type="button" class="btn-next" onclick="nextEditStep(3)">Lanjut <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>

            <div class="form-step" id="estep-3">
                <div class="form-group">
                    <label>Fungsi Pelayanan</label>
                    <select id="edit-pelayanan" onchange="updateEditNonStruktural()"></select>
                </div>
                <div class="form-group">
                    <label>Detail Non-Struktural</label>
                    <select id="edit-pelayanan_non"></select>
                </div>
                <div class="form-group">
                    <label>Status Akun*</label>
                    <select id="edit-status_akun" style="background: #fff3cd; border: 1px solid #ffc107;">
                        <option value="Pending">Pending (Verifikasi)</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Non-Aktif">Non-Aktif</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn-prev" onclick="nextEditStep(2)">Kembali</button>
                    <button type="button" id="btnSaveEdit" class="btn-next" style="background:var(--success);" onclick="saveEditJemaat()">SIMPAN PERUBAHAN</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const dataKomsel = {
        "Abepura": ["Lansia Abepura", "Joseph 1", "Joseph 2", "Joseph 3", "Joseph 4", "Joseph 5", "Esther 1", "Esther 2", "Esther 3", "Esther 4", "Esther 5", "Esther 6", "Esther 7", "esther 8", "esther 9", "Esther 10", "esther 11", "Esther 12", "Komsel Mahasiswa Abe", "Komsel Profesi Abe", "Komsel Pelajar Abe", "Komsel Sekolah Minggu"],
        "Sentani": ["Siloam 1", "Siloam 2", "Siloam 3", "Siloam 4", "Komsel 5", "Siloam 6", "Siloam 8", "Agape 1", "Agape 2", "Agape 3", "Agape 4", "Agape 5", "Komsel Mahasiswa Sentani", "Komsel Profesi Sentani", "Komsel Pelajar Sentani", "Komsel Remaja Sentani", "Komsel Sekolah Minggu Sentani"],
        "Doyo": ["Doyo Baru 1", "Doyo Baru 2"],
        "Arso 1": ["Komsel Arso 1"],
        "Arso 2": ["Komsel Arso 2"]
    };

    const dataSubJabatan = {
        "Pemimpin / Koordinator": ["Koordinator Multimedia", "Koordinator Musik", "Koordinator Usher", "Koordinator Doa", "Koordinator Profesi"],
        "Anggota Jemaat": ["Anggota Jemaat Ordinari", "Jemaat Baru"],
        "Fulltimer": ["Staf Kantor", "Operasional Gereja"],
        "PKS Komsel": ["PKS Senior", "PKS Pratama"]
    };

    const dataSpesifik = {
        "Koordinator Multimedia": ["Video Director", "Operator LCD", "Kameramen"],
        "Koordinator Profesi": ["Kesehatan", "Pendidikan", "Wirausaha"],
        "Anggota Jemaat Ordinari": ["-"]
    };

    const dataNonStruktural = {
        "Video Director": ["Team Leader", "Anggota"],
        "-": ["-"]
    };

    window.onload = function() { loadMembersRealtime(); };

    function loadMembersRealtime() {
        db.collection("users").orderBy("tanggalDaftar", "desc").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                const status = (d.status || 'Pending');
                const statusBadge = status === 'Aktif' ? 'badge-aktif' : 'badge-pending';
                const statusIcon = status === 'Aktif' ? 'fa-check-square' : 'fa-stop-circle';
                const statusBtnColor = status === 'Aktif' ? '#28a745' : '#dc3545';

                let fileHtml = "";
                if (d.urlKtp) fileHtml += `<a href="${d.urlKtp}" target="_blank" class="file-link"><i class="fas fa-id-card"></i> KTP</a>`;
                if (d.urlKk) fileHtml += `<a href="${d.urlKk}" target="_blank" class="file-link"><i class="fas fa-users"></i> KK</a>`;
                if (!fileHtml) fileHtml = "<small style='color:red;'>Tidak ada file</small>";

                tableBody.innerHTML += `
                <tr>
                    <td class="check-col"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${d.nij || '-'}</td>
                    <td><strong>${d.nama || '-'}</strong></td>
                    <td>
                        <i class="fab fa-whatsapp" style="color:green;"></i> ${d.whatsapp || '-'}<br>
                        <small><i class="fas fa-envelope"></i> ${d.email || '-'}</small>
                    </td>
                    <td>
                        <small>
                            Status: ${d.status_pernikahan || '-'}<br>
                            Lahir: ${d.kota_lahir || '-'}, ${d.tgl_lahir || '-'}<br>
                            Pekerjaan: ${d.pekerjaan || '-'}
                        </small>
                    </td>
                    <td><small>${d.alamat || '-'}</small></td>
                    <td>
                        <span style="color:var(--primary); font-weight:bold;">${d.lokasi_berjemaat || '-'}</span><br>
                        <small>Komsel: ${d.wilayah_komsel || '-'}</small>
                    </td>
                    <td>
                        <strong>${d.jabatan_jemaat || '-'}</strong><br>
                        <small>Sub: ${d.sub_bidang || '-'}</small><br>
                        <small>Fungsi: ${d.fungsi_pelayanan || '-'}</small>
                    </td>
                    <td>${fileHtml}</td>
                    <td>
                        <span class="${statusBadge}">${status}</span>
                        <button class="btn-status-toggle" style="background:${statusBtnColor}" onclick="toggleUserStatus('${doc.id}', '${status}')">
                            <i class="fas ${statusIcon}"></i>
                        </button>
                    </td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent); padding:4px 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger); padding:4px 8px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    // MODAL EDIT LOGIC
    function nextEditStep(n) {
        document.querySelectorAll('#editModal .form-step').forEach(s => s.classList.remove('active'));
        document.getElementById('estep-' + n).classList.add('active');
        document.querySelectorAll('#editModal .step').forEach((bar, i) => {
            if (i < n) bar.classList.add('active');
            else bar.classList.remove('active');
        });
    }

    function handleEditStatusNikah() {
        const status = document.getElementById("edit-status_pernikahan").value;
        document.getElementById("eform_menikah").style.display = (status === "Menikah") ? "block" : "none";
        document.getElementById("eform_single").style.display = (status !== "Menikah") ? "block" : "none";
    }

    async function openEditModal(uid) {
        const doc = await db.collection("users").doc(uid).get();
        if (!doc.exists) return;
        const data = doc.data();

        document.getElementById("edit-uid").value = uid;
        document.getElementById("edit-nij-title").innerText = "NIJ: " + (data.nij || 'Belum Ada');
        document.getElementById("edit-nama").value = data.nama || "";
        document.getElementById("edit-email").value = data.email || "";
        document.getElementById("edit-hp").value = data.whatsapp || "";
        document.getElementById("edit-status_pernikahan").value = data.status_pernikahan || "Single";
        handleEditStatusNikah();

        document.getElementById("edit-jumlah_anak").value = data.jumlah_anak || 0;
        document.getElementById("edit-nama_pasangan").value = data.nama_pasangan || "";
        document.getElementById("edit-nama_ayah").value = data.nama_ayah || "";
        document.getElementById("edit-nama_ibu").value = data.nama_ibu || "";

        document.getElementById("edit-lokasi").value = data.lokasi_berjemaat || "";
        updateEditKomsel();
        document.getElementById("edit-komsel").value = data.wilayah_komsel || "";
        
        document.getElementById("edit-jabatan").value = data.jabatan_jemaat || "";
        updateEditSubJabatan();
        document.getElementById("edit-sub_jabatan").value = data.sub_bidang || "";

        updateEditSpesifik();
        document.getElementById("edit-pelayanan").value = data.fungsi_pelayanan || "";
        updateEditNonStruktural();
        document.getElementById("edit-pelayanan_non").value = data.fungsi_non_struktural || "";
        document.getElementById("edit-status_akun").value = data.status || "Pending";

        document.getElementById("editModal").style.display = "flex";
        nextEditStep(1);
    }

    async function saveEditJemaat() {
        const uid = document.getElementById("edit-uid").value;
        const btn = document.getElementById("btnSaveEdit");
        btn.innerText = "Menyimpan...";
        btn.disabled = true;

        const updatedData = {
            nama: document.getElementById("edit-nama").value,
            email: document.getElementById("edit-email").value,
            whatsapp: document.getElementById("edit-hp").value,
            status_pernikahan: document.getElementById("edit-status_pernikahan").value,
            jumlah_anak: document.getElementById("edit-jumlah_anak").value,
            nama_pasangan: document.getElementById("edit-nama_pasangan").value,
            nama_ayah: document.getElementById("edit-nama_ayah").value,
            nama_ibu: document.getElementById("edit-nama_ibu").value,
            lokasi_berjemaat: document.getElementById("edit-lokasi").value,
            wilayah_komsel: document.getElementById("edit-komsel").value,
            jabatan_jemaat: document.getElementById("edit-jabatan").value,
            sub_bidang: document.getElementById("edit-sub_jabatan").value,
            fungsi_pelayanan: document.getElementById("edit-pelayanan").value,
            fungsi_non_struktural: document.getElementById("edit-pelayanan_non").value,
            status: document.getElementById("edit-status_akun").value
        };

        try {
            await db.collection("users").doc(uid).update(updatedData);
            alert("Data berhasil diperbarui!");
            closeEditModal();
        } catch (e) { alert("Error: " + e.message); }
        finally { btn.disabled = false; btn.innerText = "SIMPAN PERUBAHAN"; }
    }

    // Helper functions for dynamic dropdowns
    function updateEditKomsel() {
        const lok = document.getElementById("edit-lokasi").value;
        const sel = document.getElementById("edit-komsel");
        sel.innerHTML = '<option value="">-- Pilih Komsel --</option>';
        if(dataKomsel[lok]) dataKomsel[lok].forEach(i => sel.add(new Option(i, i)));
    }
    function updateEditSubJabatan() {
        const jab = document.getElementById("edit-jabatan").value;
        const sub = document.getElementById("edit-sub_jabatan");
        sub.innerHTML = '<option value="">-- Pilih Sub --</option>';
        if(dataSubJabatan[jab]) dataSubJabatan[jab].forEach(i => sub.add(new Option(i, i)));
    }
    function updateEditSpesifik() {
        const sub = document.getElementById("edit-sub_jabatan").value;
        const pel = document.getElementById("edit-pelayanan");
        pel.innerHTML = '<option value="">-- Pilih Fungsi --</option>';
        if(dataSpesifik[sub]) dataSpesifik[sub].forEach(i => pel.add(new Option(i, i)));
    }
    function updateEditNonStruktural() {
        const pelVal = document.getElementById("edit-pelayanan").value;
        const nonPel = document.getElementById("edit-pelayanan_non");
        nonPel.innerHTML = '<option value="">-- Pilih Detail --</option>';
        if(dataNonStruktural[pelVal]) dataNonStruktural[pelVal].forEach(i => nonPel.add(new Option(i, i)));
    }

    function toggleUserStatus(id, current) {
        const next = current === 'Aktif' ? 'Pending' : 'Aktif';
        db.collection("users").doc(id).update({ status: next });
    }

    function deleteUser(id) { if(confirm("Hapus jemaat ini?")) db.collection("users").doc(id).delete(); }

    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none";
        });
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }
    
    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }

    function updateActionMenu() {
        const count = document.querySelectorAll('.user-checkbox:checked').length;
        document.getElementById('actionMenu').style.display = count > 0 ? 'flex' : 'none';
        document.getElementById('selectedCount').innerText = `${count} Terpilih`;
    }

    function openEditFromSelection() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if (selected.length !== 1) return alert("Pilih satu data untuk diedit.");
        openEditModal(selected[0].value);
    }
</script>
</body>
</html>
