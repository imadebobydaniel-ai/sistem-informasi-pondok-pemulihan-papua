<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Table Styles */
        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 11px; text-align: left; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; margin: auto; padding: 25px; border-radius: 15px; width: 100%; max-width: 800px; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); margin-bottom: 20px; padding-bottom: 10px; }
        
        /* Form Grid - Matching Registration Style */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        .form-group.full { grid-column: span 2; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; background: #fafafa; }
        
        .btn-save { background: var(--success); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }
        
        .badge-pending { background: #ffc107; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h3><i class="fa-solid fa-gauge"></i> Dashboard Admin PPP</h3>
        <a href="#" class="btn-save" style="width: auto; background: var(--danger);">Logout</a>
    </div>

    <div class="table-responsive">
        <table id="tableAnggota">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>NIJ</th>
                    <th>Lokasi</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="dataContainer">
                <tr>
                    <td>Contoh Nama</td>
                    <td>NIJ-PPP-ABE-001</td>
                    <td>Abepura</td>
                    <td><span class="badge-pending">Pending</span></td>
                    <td><button onclick="openEditModal('dummyID')" style="padding: 5px 10px; cursor: pointer;"><i class="fa-solid fa-edit"></i> Edit</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 style="margin:0; font-size: 18px; color: var(--primary);"><i class="fa-solid fa-user-pen"></i> Edit Data Anggota</h2>
            <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>

        <form id="formEdit">
            <input type="hidden" id="edit_doc_id">
            
            <div class="form-grid">
                <div class="form-group full"><label>Nama Lengkap</label><input type="text" id="nama" required></div>
                
                <div class="form-group"><label>Provinsi Kelahiran</label><select id="provinsi_lahir" onchange="loadKota()"></select></div>
                <div class="form-group"><label>Kota Kelahiran</label><select id="kota_lahir"></select></div>

                <div class="form-group"><label>Tanggal Lahir</label><input type="date" id="tgl_lahir"></div>
                <div class="form-group"><label>Gol. Darah</label>
                    <select id="darah">
                        <option value="-">-</option><option value="A">A</option><option value="B">B</option><option value="O">O</option><option value="AB">AB</option>
                    </select>
                </div>

                <div class="form-group"><label>No. KTP</label><input type="number" id="ktp"></div>
                <div class="form-group"><label>No. KK</label><input type="number" id="kk"></div>

                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
                <div class="form-group"><label>WhatsApp</label><input type="tel" id="hp"></div>

                <div class="form-group full"><label>Alamat Tinggal</label><textarea id="alamat" rows="2"></textarea></div>

                <div class="form-group">
                    <label>Status Pernikahan</label>
                    <select id="status_pernikahan">
                        <option value="Menikah">Menikah</option>
                        <option value="Single">Single</option>
                        <option value="Duda">Duda</option>
                        <option value="Janda">Janda</option>
                        <option value="Relationship">Relationship</option>
                    </select>
                </div>
                <div class="form-group"><label>Nama Pasangan</label><input type="text" id="pasangan"></div>

                <div class="form-group">
                    <label>Pekerjaan</label>
                    <select id="pekerjaan">
                        <option value="ASN">ASN</option><option value="Swasta">Swasta</option><option value="Wiraswasta">Wiraswasta</option><option value="Mahasiswa">Mahasiswa</option><option value="Pelajar">Pelajar</option>
                    </select>
                </div>
                <div class="form-group"><label>Jumlah Anak</label><input type="number" id="jml_anak"></div>

                <div class="form-group">
                    <label>Lokasi Berjemaat</label>
                    <select id="lokasi" onchange="updateKomselOptions()">
                        <option value="ABE">Abepura</option>
                        <option value="STN">Sentani</option>
                        <option value="DYO">Doyo</option>
                        <option value="AR1">Arso 1</option>
                        <option value="AR2">Arso 2</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Wilayah Komsel</label>
                    <select id="wilayah_komsel"></select>
                </div>

                <div class="form-group">
                    <label>Jabatan Utama</label>
                    <select id="jabatan_jemaat" onchange="updateSubJabatan()">
                        <option value="Gembala Sidang">Gembala Sidang</option>
                        <option value="Pemimpin / Koordinator">Pemimpin / Koordinator</option>
                        <option value="PKS Komsel">PKS Komsel</option>
                        <option value="Fulltimer">Fulltimer</option>
                        <option value="Anggota Jemaat">Anggota Jemaat</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sub Bidang</label>
                    <select id="sub_jabatan" onchange="updateSpesifikPelayanan()"></select>
                </div>

                <div class="form-group full">
                    <label>Fungsi Spesifik Pelayanan</label>
                    <select id="pelayanan"></select>
                </div>

                <div class="form-group full">
                    <label>Status Akun</label>
                    <select id="status_akun" style="background: #fff3cd; font-weight: bold;">
                        <option value="Pending">Pending (Verifikasi)</option>
                        <option value="Aktif">Aktif</option>
                        <option value="Non-Aktif">Non-Aktif</option>
                    </select>
                </div>
            </div>

            <button type="button" class="btn-save" onclick="saveEdit()">SIMPAN PERUBAHAN DATA</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi Firebase (Gunakan milik Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // DATA MAPPING (Sama dengan Registrasi)
    const dataKomsel = {
        "ABE": ["Lansia Abepura", "Joseph 1", "Joseph 2", "Joseph 3", "Joseph 4", "Joseph 5", "Esther 1", "Esther 2", "Esther 3", "Esther 4", "Komsel Mahasiswa Abe", "Komsel Profesi Abe", "Komsel Pelajar Abe", "Komsel Sekolah Minggu"],
        "STN": ["Komsel Lansia Sentani", "Siloam 1", "Siloam 2", "Siloam 3", "Siloam 4", "Komsel 5", "Siloam 6", "Siloam 8", "Agape 1", "Agape 2", "Agape 3", "Agape 4", "Agape 5", "Komsel Mahasiswa Sentani", "Komsel Profesi Sentani", "Komsel Pelajar Sentani", "Komsel Remaja Sentani", "Komsel Sekolah Minggu Sentani"],
        "DYO": ["Komsel Bapak Doyo", "Komsel Ibu Doyo"],
        "AR1": ["Komsel Keluarga Arso 1"],
        "AR2": ["Komsel Keluarga Arso 2"]
    };

    const dataSubJabatan = {
        "Gembala Sidang": ["Gembala Sidang Jemaat", "Pdt. Pembantu", "Pdt. Muda"],
        "Pemimpin / Koordinator": ["Sekretaris Gereja", "Bendahara Gereja", "Komite Gereja", "Koordinator Lansia", "Koordinator Bapak", "Koordinator Ibu", "Koordinator Profesi", "Koordinator Mahasiswa", "Koordinator Pelajar", "Koordinator Sekolah minggu", "Koordinator Praise & Worship", "Koordinator Tamborin, flag", "Koordinator Multimedia", "Koordinator Sound Engineering & Elektrical", "Koordinator Pelayanan Misi", "Koordinator Pendoa", "Koordinator User", "Koordinator parkir dan keamanan", "Koordinator dekorasi dan event"],
        "PKS Komsel": ["PKS Komsel"],
        "Fulltimer": ["Fulltimer Gereja"],
        "Anggota Jemaat": ["Anggota Jemaat Ordinari"]
    };

    const dataSpesifik = {
        "Koordinator Praise & Worship": ["Drum Player", "Keyboard Player", "Piano Player", "Bass Player", "Guitar Player", "Violin Player", "Saxsophone Player", "Flute player", "Vocal coach", "Worship leader", "Singers", "choirs"],
        "Koordinator Multimedia": ["Director media", "Floor director", "Campers", "Crew equipment", "Streaming operator", "Video switcher operator", "Easy Worshipe / Presenter Operator"],
        "Koordinator Sound Engineering & Elektrical": ["Sound engineering", "Crew equipment", "Elektrical & Peripheral"],
        "Koordinator User": ["Front Desk user", "User direct", "Event organizer", "General Affairs"],
        "Fulltimer Gereja": ["Kepala Sekolah PAUD & PPA", "Sekretaris Operasional Gereja", "Bendahara Operasional gereja", "Guru Paud", "Mentor PPA", "Staff Geraja", "Staff PPA", "Hospitality & Konsumsi", "Driver"]
    };

    // FUNGSI DROPDOWN DINAMIS
    function updateKomselOptions() {
        const lokasi = document.getElementById("lokasi").value;
        const komselSelect = document.getElementById("wilayah_komsel");
        komselSelect.innerHTML = '<option value="">-- Pilih Komsel --</option>';
        if (dataKomsel[lokasi]) {
            dataKomsel[lokasi].forEach(nama => {
                let opt = new Option(nama, nama);
                komselSelect.add(opt);
            });
        }
    }

    function updateSubJabatan() {
        const jabatan = document.getElementById("jabatan_jemaat").value;
        const subSelect = document.getElementById("sub_jabatan");
        subSelect.innerHTML = '<option value="">-- Pilih Sub Bidang --</option>';
        if (dataSubJabatan[jabatan]) {
            dataSubJabatan[jabatan].forEach(item => {
                subSelect.add(new Option(item, item));
            });
        }
        updateSpesifikPelayanan();
    }

    function updateSpesifikPelayanan() {
        const sub = document.getElementById("sub_jabatan").value;
        const specSelect = document.getElementById("pelayanan");
        specSelect.innerHTML = '<option value="">-- Pilih Fungsi Spesifik --</option>';
        if (dataSpesifik[sub]) {
            dataSpesifik[sub].forEach(item => {
                specSelect.add(new Option(item, item));
            });
        }
    }

    // MODAL CONTROL
    function openEditModal(docId) {
        document.getElementById('editModal').style.display = 'block';
        document.getElementById('edit_doc_id').value = docId;
        // Di sini Anda biasanya melakukan db.collection("users").doc(docId).get() 
        // Lalu mengisi field: document.getElementById('nama').value = data.nama;
        // PENTING: Panggil updateKomselOptions() dan updateSubJabatan() setelah data di-load agar dropdown terisi.
    }

    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    async function saveEdit() {
        const docId = document.getElementById('edit_doc_id').value;
        const updatedData = {
            nama: document.getElementById('nama').value,
            lokasi_berjemaat: document.getElementById('lokasi').value,
            wilayah_komsel: document.getElementById('wilayah_komsel').value,
            jabatan_jemaat: document.getElementById('jabatan_jemaat').value,
            sub_jabatan: document.getElementById('sub_jabatan').value,
            pelayanan: document.getElementById('pelayanan').value,
            status: document.getElementById('status_akun').value
        };

        try {
            await db.collection("users").doc(docId).update(updatedData);
            alert("Data Berhasil Diperbarui!");
            location.reload();
        } catch (e) {
            alert("Gagal update: " + e.message);
        }
    }

    // Load Provinsi Awal
    async function loadProvinsi() {
        const resp = await fetch('https://www.emsifa.com/api-wilayah-indonesia/api/provinces.json');
        const data = await resp.json();
        let options = '<option value="">Pilih Provinsi</option>';
        data.forEach(p => options += `<option value="${p.name}" data-id="${p.id}">${p.name}</option>`);
        document.getElementById('provinsi_lahir').innerHTML = options;
    }

    async function loadKota() {
        const provEl = document.getElementById('provinsi_lahir');
        const idProv = provEl.options[provEl.selectedIndex].getAttribute('data-id');
        if (!idProv) return;
        const resp = await fetch(`https://www.emsifa.com/api-wilayah-indonesia/api/regencies/${idProv}.json`);
        const data = await resp.json();
        let options = '<option value="">Pilih Kota</option>';
        data.forEach(k => options += `<option value="${k.name}">${k.name}</option>`);
        document.getElementById('kota_lahir').innerHTML = options;
    }

    loadProvinsi();
</script>

</body>
</html>
