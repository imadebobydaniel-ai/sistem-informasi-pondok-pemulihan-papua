<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; 
            --accent: #007bff; 
            --dark: #333; 
            --light: #f4f7f6; 
            --success: #28a745; 
            --emas: #D4AF37;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1200px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { font-size: 1.2rem; margin: 0; color: var(--primary); }
        .btn-logout { background: #dc3545; color: white; padding: 8px 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .search-box { position: relative; margin-bottom: 15px; width: 100%; }
        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 12px; }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }

        .admin-grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h3 { color: var(--primary); margin: 0 0 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.3s; }
        .btn-save:hover { opacity: 0.8; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 30px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; position: relative; }
        .close-modal { position: absolute; right: 15px; top: 15px; font-size: 24px; cursor: pointer; color: #999; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div>
            <h2>Dashboard Admin</h2>
            <p style="margin:2px 0 0; color:#777; font-size: 11px;">Manajemen Anggota & Konten PPP</p>
        </div>
        <a href="login_admin.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari Nama, NK, atau Email...">
        <i class="fas fa-search"></i>
    </div>
    <div id="loading-state" style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> Memuat Data...</div>
    <div class="table-responsive">
        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <div class="admin-grid-forms">
        
        <div class="admin-card">
            <h3><i class="fas fa-bullhorn"></i> Input Informasi</h3>
            <form id="formInfo">
                <div class="form-group">
                    <label>Judul Informasi</label>
                    <input type="text" id="info_judul" required>
                </div>
                <div class="form-group">
                    <label>Isi Pesan</label>
                    <textarea id="info_pesan" rows="3" required></textarea>
                </div>
                <button type="submit" class="btn-save">KIRIM INFORMASI</button>
            </form>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-play-circle"></i> Portal Media (YouTube/Gambar/Teks)</h3>
            <form id="formMedia">
                <div class="form-group">
                    <label>Judul Media / Konten</label>
                    <input type="text" id="media_judul" required>
                </div>
                <div class="form-group">
                    <label>Tipe Konten</label>
                    <select id="media_tipe" onchange="toggleMediaInput()">
                        <option value="video_youtube">Video (YouTube Embed)</option>
                        <option value="gambar">Gambar (URL Link)</option>
                        <option value="teks">Teks Saja</option>
                    </select>
                </div>
                <div class="form-group" id="input_link_wrapper">
                    <label id="label_link">URL Link (YouTube Embed / Image URL)</label>
                    <input type="text" id="media_url" placeholder="Masukkan link di sini...">
                </div>
                <div class="form-group">
                    <label>Urutan Tampil</label>
                    <input type="number" id="media_urutan" value="1">
                </div>
                <button type="submit" class="btn-save" style="background: #e67e22;">UPDATE PORTAL MEDIA</button>
            </form>
        </div>

        <div class="admin-card" style="display: flex; flex-direction: column; gap: 10px;">
            <h3><i class="fas fa-tools"></i> Navigasi Cepat</h3>
            <a href="statistik_global.html" class="btn-save" style="text-align: center; text-decoration: none; background: #6c757d;"><i class="fas fa-chart-line"></i> STATISTIK</a>
            <a href="rekap_absen.html" class="btn-save" style="text-align: center; text-decoration: none; background: #2c3e50;"><i class="fas fa-user-check"></i> REKAP ABSEN</a>
            <button onclick="resetAbsenHarian()" class="btn-save" style="background: #c0392b;"><i class="fas fa-sync-alt"></i> RESET ABSEN</button>
        </div>

    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h3>Edit Data Anggota</h3>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nama</label><input type="text" id="edit_nama" required></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="edit_wa" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="edit_email" required></div>
            <div class="form-group">
                <label>Jabatan</label>
                <select id="edit_jabatan">
                    <option value="Ketua Komsel">Ketua Komsel</option>
                    <option value="Anggota">Anggota</option>
                </select>
            </div>
            <button type="submit" class="btn-save">SIMPAN</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // Fungsi Toggle Input Media
    function toggleMediaInput() {
        const tipe = document.getElementById("media_tipe").value;
        const wrapper = document.getElementById("input_link_wrapper");
        const label = document.getElementById("label_link");
        const input = document.getElementById("media_url");

        if (tipe === "teks") {
            wrapper.style.display = "none";
            input.required = false;
        } else {
            wrapper.style.display = "block";
            input.required = true;
            label.innerText = (tipe === "video_youtube") ? "URL YouTube Embed" : "URL Link Gambar";
        }
    }

    // LOAD DATA
    window.onload = function() {
        db.collection("users").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                        <td>${data.nomor_komsel || '-'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>
                            <i class="fas fa-edit" style="color:blue;cursor:pointer" onclick="openEditModal('${doc.id}')"></i>
                            <i class="fas fa-trash" style="color:red;cursor:pointer;margin-left:10px" onclick="deleteMember('${doc.id}')"></i>
                        </td>
                    </tr>`;
            });
            document.getElementById("loading-state").style.display = "none";
            document.getElementById("adminTable").style.display = "table";
        });
    };

    // SIMPAN INFORMASI
    document.getElementById("formInfo").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
            await db.collection("pengumuman_komsel").add({
                judul: document.getElementById("info_judul").value,
                isi: document.getElementById("info_pesan").value,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Informasi berhasil dikirim!");
            e.target.reset();
        } catch (err) { alert("Error: " + err.message); }
    });

    // SIMPAN PORTAL MEDIA (FIXED)
    document.getElementById("formMedia").addEventListener("submit", async (e) => {
        e.preventDefault();
        try {
            const tipe = document.getElementById("media_tipe").value;
            const dataObj = {
                judul: document.getElementById("media_judul").value,
                tipe: tipe,
                urutan: parseInt(document.getElementById("media_urutan").value),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (tipe !== "teks") {
                dataObj.url = document.getElementById("media_url").value;
            }

            await db.collection("portal_media").add(dataObj);
            alert("Portal Media Berhasil Diperbarui!");
            e.target.reset();
            toggleMediaInput();
        } catch (err) { alert("Error: " + err.message); }
    });

    // EDIT & DELETE (Fungsi Standar)
    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        const data = doc.data();
        document.getElementById("edit_id").value = id;
        document.getElementById("edit_nama").value = data.nama;
        document.getElementById("edit_wa").value = data.whatsapp;
        document.getElementById("edit_email").value = data.email;
        document.getElementById("editModal").style.display = "block";
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    document.getElementById("formUpdate").onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById("edit_id").value;
        await db.collection("users").doc(id).update({
            nama: document.getElementById("edit_nama").value,
            whatsapp: document.getElementById("edit_wa").value,
            email: document.getElementById("edit_email").value
        });
        alert("Berhasil!");
        closeEditModal();
    };

    async function deleteMember(id) {
        if (confirm("Hapus data ini?")) await db.collection("users").doc(id).delete();
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#memberData tr");
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
    }
</script>
</body>
</html>
