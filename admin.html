<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kelola Agenda Tahunan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #006666; 
            --accent: #d4af37; 
            --bg: #f4f7f6; 
            --white: #ffffff;
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        
        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            background: var(--white); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            border-top: 5px solid var(--primary);
        }
        
        h2 { 
            color: var(--primary); 
            text-transform: uppercase;
            font-size: 1.5rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
        }
        
        .full-width { grid-column: span 2; }

        label { 
            display: block; 
            font-size: 13px; 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: var(--primary); 
        }

        select, input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            font-size: 14px; 
            font-family: inherit;
            transition: 0.3s;
            box-sizing: border-box;
        }

        select:focus, input:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: #fdfdfd;
        }
        
        .btn-save { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: 700; 
            cursor: pointer; 
            margin-top: 25px; 
            transition: 0.3s;
            letter-spacing: 1px;
        }
        
        .btn-save:hover { background: #004d4d; transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .table-container { margin-top: 50px; }
        .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 13px; color: var(--primary); border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; vertical-align: middle; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; display: inline-block; margin-bottom: 4px; }
        .bg-wilayah { background: #e0f2f1; color: #006666; border: 1px solid #b2dfdb; }
        .bg-kategori { background: #fff8e1; color: #f57f17; border: 1px solid #ffecb3; }
        
        .btn-delete { 
            color: #e74c3c; 
            cursor: pointer; 
            border: 2px solid #f9ebed; 
            background: #fff; 
            padding: 8px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-delete:hover { background: #e74c3c; color: white; }

        .btn-back {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <a href="admin.html" class="btn-back">
        <i class="fa-solid fa-arrow-left" style="margin-right: 8px;"></i> Kembali ke Dashboard
    </a>
    
    <h2><i class="fa-solid fa-calendar-check"></i> Management Agenda Jemaat</h2>
    
    <div class="form-grid">
        <div>
            <label>Wilayah (Cluster)</label>
            <select id="wilayah">
                <option value="Abepura">Abepura</option>
                <option value="Sentani">Sentani</option>
                <option value="Doyo">Doyo</option>
                <option value="Arso1">Arso 1</option>
                <option value="Arso2">Arso 2</option>
            </select>
        </div>
        <div>
            <label>Kategori (Sub-Tab)</label>
            <select id="kategori">
                <option value="Umum Gereja">Umum Gereja</option>
                <option value="Komsel Bapak">Komsel Bapak</option>
                <option value="Komsel Ibu">Komsel Ibu</option>
                <option value="Komsel Profesi">Komsel Profesi</option>
                <option value="Komsel Mahasiswa">Komsel Mahasiswa</option>
                <option value="Komsel Pelajar">Komsel Pelajar</option>
                <option value="Komsel Sekolah Minggu">Komsel Sekolah Minggu</option>
                <option value="Agenda Tambahan (Ext)">Agenda Tambahan (Ext)</option>
            </select>
        </div>

        <div>
            <label>Bulan (Filter Cari)</label>
            <select id="bulan">
                <option value="1">Januari</option><option value="2">Februari</option><option value="3">Maret</option>
                <option value="4">April</option><option value="5">Mei</option><option value="6">Juni</option>
                <option value="7">Juli</option><option value="8">Agustus</option><option value="9">September</option>
                <option value="10">Oktober</option><option value="11">November</option><option value="12">Desember</option>
            </select>
        </div>
        <div>
            <label>Tahun</label>
            <input type="number" id="tahun" value="2026">
        </div>

        <div class="full-width">
            <label>Nama Kegiatan</label>
            <input type="text" id="nama_kegiatan" placeholder="Masukkan nama agenda tahunan...">
        </div>
        <div>
            <label>Tanggal Lengkap</label>
            <input type="text" id="tanggal" placeholder="Contoh: Minggu, 05 Juli 2026">
        </div>
        <div>
            <label>Jam / Waktu</label>
            <input type="text" id="jam" placeholder="Contoh: 09:00 WIT - Selesai">
        </div>
        <div class="full-width">
            <label>Lokasi / Deskripsi</label>
            <textarea id="lokasi" rows="3" placeholder="Sebutkan lokasi kegiatan atau instruksi tambahan..."></textarea>
        </div>
    </div>

    <button class="btn-save" onclick="simpanAgenda()" id="btnSimpan">POSTING KE AGENDA TAHUNAN</button>

    <div class="table-container">
        <h3 style="color: var(--primary); font-size: 16px;"><i class="fa-solid fa-list-check"></i> Monitoring Data Terkini</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Target Tampilan</th>
                        <th>Detail Kegiatan</th>
                        <th>Periode</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tabelAgenda">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function simpanAgenda() {
        const btn = document.getElementById('btnSimpan');
        const payload = {
            wilayah: document.getElementById('wilayah').value,
            kategori: document.getElementById('kategori').value,
            bulan: document.getElementById('bulan').value,
            tahun: document.getElementById('tahun').value,
            nama: document.getElementById('nama_kegiatan').value,
            tanggal: document.getElementById('tanggal').value,
            jam: document.getElementById('jam').value,
            lokasi: document.getElementById('lokasi').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        if(!payload.nama || !payload.tanggal) {
            alert("Harap lengkapi Nama Kegiatan dan Tanggal!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "SEDANG MEMPROSES...";

        try {
            await db.collection("agenda_tahunan").add(payload);
            alert("Agenda berhasil dipublikasikan ke portal jemaat!");
            location.reload();
        } catch (e) {
            alert("Kesalahan: " + e.message);
            btn.disabled = false;
            btn.innerText = "POSTING KE AGENDA TAHUNAN";
        }
    }

    function loadMonitoring() {
        db.collection("agenda_tahunan").orderBy("timestamp", "desc").limit(8).onSnapshot(snap => {
            const tbody = document.getElementById('tabelAgenda');
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `
                    <tr>
                        <td>
                            <span class="badge bg-wilayah">${d.wilayah}</span><br>
                            <span class="badge bg-kategori">${d.kategori}</span>
                        </td>
                        <td>
                            <div style="font-weight:700;">${d.nama}</div>
                            <div style="font-size:11px; color:#888;">${d.tanggal}</div>
                        </td>
                        <td>Bulan ${d.bulan}<br>${d.tahun}</td>
                        <td>
                            <button class="btn-delete" onclick="hapus('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    async function hapus(id) {
        if(confirm("Hapus agenda ini dari portal publik?")) {
            await db.collection("agenda_tahunan").doc(id).delete();
        }
    }

    loadMonitoring();
</script>

</body>
</html>
