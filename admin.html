<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14; --cyan: #17a2b8;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1400px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
        
        /* Link wrapper agar tidak ada garis bawah */
        .stats-grid a { text-decoration: none; color: inherit; }

        .stat-card { 
            padding: 15px; 
            border-radius: 10px; 
            color: white; 
            position: relative; 
            min-height: 80px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        /* Animasi saat kursor menyentuh menu */
        .stat-card:hover {
            transform: translateY(-5px);
            filter: brightness(1.1);
        }

        .stat-card h4 { margin: 0; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { margin: 5px 0 0; font-size: 24px; font-weight: bold; }
        .stat-card i { position: absolute; right: 10px; bottom: 10px; font-size: 1.8rem; opacity: 0.3; }

        .table-controls { display: flex; gap: 15px; margin-bottom: 15px; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        .table-responsive { overflow-x: auto; border: 1px solid #eee; border-radius: 10px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table th { background: var(--primary); color: white; padding: 12px; font-size: 12px; text-align: left; }
        table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11.5px; }

        .bottom-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card-box { background: white; padding: 18px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-box h3 { font-size: 14px; color: var(--primary); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2 style="color:var(--primary); margin:0;">Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="tiket.html">
            <div class="stat-card" style="background: #007bff;">
                <h4>Portal Tiket</h4><p id="stat_tiket">0</p><i class="fas fa-ticket-alt"></i>
            </div>
        </a>

        <a href="#absensiData">
            <div class="stat-card" style="background: #28a745;">
                <h4>Hadir Hari Ini</h4><p id="stat_hadir">0</p><i class="fas fa-check-circle"></i>
            </div>
        </a>

        <a href="doa.html">
            <div class="stat-card" style="background: #dc3545;">
                <h4>Pokok Doa</h4><p id="stat_doa">0</p><i class="fas fa-hands-praying"></i>
            </div>
        </a>

        <a href="media.html">
            <div class="stat-card" style="background: #6f42c1;">
                <h4>Portal Media</h4><p id="stat_media">6</p><i class="fas fa-icons"></i>
            </div>
        </a>

        <a href="informasi.html">
            <div class="stat-card" style="background: #fd7e14;">
                <h4>Informasi Kegiatan</h4><p id="stat_info">0</p><i class="fas fa-calendar-alt"></i>
            </div>
        </a>

        <a href="bigdata.html">
            <div class="stat-card" style="background: #17a2b8;">
                <h4>Statistik Big Data</h4><p id="stat_bigdata">10</p><i class="fas fa-chart-line"></i>
            </div>
        </a>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama, email, atau alamat...">
            <i class="fas fa-search"></i>
        </div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Nama Anggota</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <div class="bottom-grid">
        <div class="card-box">
            <h3><i class="fas fa-bullhorn"></i> Kirim Informasi Baru</h3>
            <form id="formInfo">
                <div class="form-group"><label>Judul Kegiatan</label><input type="text" id="info_judul" required></div>
                <div class="form-group"><label>Isi Pengumuman</label><textarea id="info_pesan" rows="3" required></textarea></div>
                <button type="submit" class="btn-submit" style="background: var(--orange);">PUBLIKASIKAN</button>
            </form>
        </div>

        <div class="card-box">
            <h3><i class="fas fa-user-plus"></i> Add New User Admin</h3>
            <form id="formAdd">
                <div class="form-group"><label>Nama Lengkap</label><input type="text" id="add_nama" required></div>
                <div class="form-group"><label>WhatsApp/ID</label><input type="text" id="add_wa" required></div>
                <div class="form-group"><label>Password</label><input type="text" id="add_password" required></div>
                <button type="submit" class="btn-submit" style="background: var(--success);">SIMPAN USER</button>
            </form>
        </div>

        <div class="card-box">
            <h3><i class="fas fa-fingerprint"></i> Log Absensi Hari Ini</h3>
            <div id="absensiData" style="max-height: 150px; overflow-y:auto; font-size: 12px;"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() {
        db.collection("users").onSnapshot(snapshot => {
            const table = document.getElementById("memberData");
            table.innerHTML = "";
            document.getElementById("stat_bigdata").innerText = snapshot.size;
            snapshot.forEach(doc => {
                const d = doc.data();
                table.innerHTML += `<tr>
                    <td><b>${d.nama || '-'}</b></td>
                    <td>${d.whatsapp || '-'}</td>
                    <td>${d.email || '-'}</td>
                    <td>${d.golongan_darah || '-'}</td>
                    <td>${d.jabatan || '-'}</td>
                    <td>JC ${d.komsel || '-'}</td>
                    <td>${d.alamat || '-'}</td>
                </tr>`;
            });
        });

        db.collection("absensi").where("tanggal", "==", new Date().toISOString().split('T')[0])
        .onSnapshot(snap => {
            document.getElementById("stat_hadir").innerText = snap.size;
            const log = document.getElementById("absensiData");
            log.innerHTML = "";
            snap.forEach(doc => { log.innerHTML += `<div style="padding:5px; border-bottom:1px solid #eee;">${doc.data().nama}</div>`; });
        });

        db.collection("doa_global").onSnapshot(snap => { document.getElementById("stat_doa").innerText = snap.size; });
    };

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = document.querySelectorAll("#memberData tr");
        rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none"; });
    }

    document.getElementById("formAdd").onsubmit = async (e) => {
        e.preventDefault();
        try {
            await db.collection("users").add({
                nama: document.getElementById("add_nama").value,
                whatsapp: document.getElementById("add_wa").value,
                password: document.getElementById("add_password").value,
                jabatan: "Anggota", komsel: "1", golongan_darah: "-", alamat: "-"
            });
            alert("User Admin Berhasil Ditambahkan!");
            e.target.reset();
        } catch (err) { alert("Gagal: " + err.message); }
    };
</script>
</body>
</html>
