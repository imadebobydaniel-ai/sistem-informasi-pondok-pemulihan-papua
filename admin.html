<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        .navigation-top { margin-bottom: 20px; }
        .btn-back { background: #222 !important; color: #fff !important; border: 2px solid #007bff; padding: 12px 25px; border-radius: 50px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .btn-back:hover { background: #007bff !important; transform: translateX(-5px); }
        .header-section { display: flex; align-items: center; gap: 10px; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; font-size: 24px; font-weight: bold; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-group { display: flex; gap: 5px; flex-grow: 1; max-width: 500px; position: relative; }
        .search-input { padding: 10px 15px; width: 100%; border: 1px solid #ccc; border-radius: 6px; }
        .btn-cari-red { background: #ff0000; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .table-container { overflow-x: auto; background: white; border-radius: 8px; width: 100%; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; min-width: 1400px; table-layout: auto; }
        thead { background: #ff0000; color: white; position: sticky; top: 0; z-index: 10; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 13px; white-space: nowrap; }
        
        th:first-child, td:first-child { position: sticky; left: 0; z-index: 5; background: #f9f9f9; width: 40px; text-align: center; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 15px; overflow: hidden; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; }
        .modal-body { padding: 20px; max-height: 70vh; overflow-y: auto; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .nk-lock-info { background: #fff3cd; padding: 10px; border-radius: 6px; font-size: 11px; color: #856404; margin-bottom: 15px; border-left: 4px solid #ffeeba; }
        .modal-footer { padding: 15px; display: flex; gap: 10px; border-top: 1px solid #eee; }
        .btn-save { flex: 1; background: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel { flex: 1; background: #dc3545; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>



    <div class="navigation-top">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN</a>
    </div>

    <div class="header-section"><i class="fa-solid fa-database"></i> Database Anggota</div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="muatDataUser()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool" onclick="bukaModeEdit()"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool" onclick="hapusTerpilih()"><i class="fa-solid fa-trash"></i> Hapus</button>
        <div class="search-group">
            <input type="text" id="kotakCari" class="search-input" placeholder="Cari Nama atau Email..." onkeyup="jalankanCari()">
            <button class="btn-cari-red"><i class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="pilihSemua"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>No. HP</th>
                    <th>Alamat</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Gol. Darah</th>
                    <th style="background: #000; color: #fff;">Nomor Komsel (NK)</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr><td colspan="10" style="text-align:center; padding:20px;">Menghubungkan ke database...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">SINKRONISASI DATA ANGGOTA</div>
        <div class="modal-body">
            <div class="nk-lock-info">
                <i class="fa-solid fa-lock"></i> <strong>SISTEM KEAMANAN:</strong> Nomor Komsel (NK) bersifat permanen dan tidak dapat diubah untuk menjaga integritas database.
            </div>

            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="edit_nama"></div>
            <div class="form-group"><label>Email</label><input type="email" id="edit_email"></div>
            <div class="form-group"><label>Password</label><input type="text" id="edit_pass"></div>
            <div class="form-group"><label>Nomor HP / WhatsApp</label><input type="text" id="edit_hp"></div>
            <div class="form-group"><label>Alamat</label><input type="text" id="edit_alamat"></div>
            <div class="form-group">
                <label>Jabatan Komsel</label>
                <select id="edit_jabatan">
                    <option value="Anggota Komsel">Anggota Komsel</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                    <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
                </select>
            </div>
            <div class="form-group">
                <label>Lokasi Komsel JC</label>
                <select id="edit_jc">
                    <option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option><option value="4">JC 4</option><option value="5">JC 5</option>
                </select>
            </div>
            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="edit_goldar">
                    <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-save" onclick="simpanDataUpdate()">SIMPAN PERUBAHAN</button>
            <button class="btn-cancel" onclick="tutupModal()">BATAL</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

    // Letakkan di dalam tag <script> paling atas di file admin.html
if (localStorage.getItem("adminStatus") !== "loggedIn") {
    alert("Akses Terbatas! Silakan login terlebih dahulu.");
    window.location.href = "login_admin.html"; 
}
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function muatDataUser() {
        const badanTabel = document.getElementById('badanTabel');
        badanTabel.innerHTML = `<tr><td colspan="10" style="text-align:center;">Memuat data...</td></tr>`;
        
        db.collection("users").get().then((querySnapshot) => {
            badanTabel.innerHTML = "";
            querySnapshot.forEach((doc) => {
                let user = doc.data();
                let baris = `
                    <tr data-id="${doc.id}">
                        <td><input type="checkbox" class="cek-baris"></td>
                        <td>${user.nama || '-'}</td>
                        <td>${user.email || '-'}</td>
                        <td style="color:red; font-weight:bold;">${user.password || '-'}</td>
                        <td>${user.no_hp || '-'}</td>
                        <td>${user.alamat || '-'}</td>
                        <td>${user.jabatan || '-'}</td>
                        <td>JC ${user.komsel || '-'}</td>
                        <td>${user.gol_darah || '-'}</td>
                        <td style="font-weight:bold; color:blue; background:#f0f8ff;">${user.nomor_komsel || '-'}</td>
                    </tr>`;
                badanTabel.innerHTML += baris;
            });
        }).catch(err => alert("Gagal muat data: " + err.message));
    }

    function bukaModeEdit() {
        const terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length !== 1) return alert("Pilih satu data untuk diedit!");

        const id = terpilih[0].closest('tr').getAttribute('data-id');
        db.collection("users").doc(id).get().then((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById('edit_id').value = id;
                document.getElementById('edit_nama').value = data.nama || "";
                document.getElementById('edit_email').value = data.email || "";
                document.getElementById('edit_pass').value = data.password || "";
                document.getElementById('edit_hp').value = data.no_hp || "";
                document.getElementById('edit_alamat').value = data.alamat || "";
                document.getElementById('edit_jabatan').value = data.jabatan || "Anggota Komsel";
                document.getElementById('edit_jc').value = data.komsel || "1";
                document.getElementById('edit_goldar').value = data.gol_darah || "A";
                document.getElementById('editModal').style.display = 'flex';
            }
        });
    }

    function simpanDataUpdate() {
        const id = document.getElementById('edit_id').value;
        // NK (nomor_komsel) TIDAK dimasukkan di sini agar tidak berubah
        const dataBaru = {
            nama: document.getElementById('edit_nama').value,
            email: document.getElementById('edit_email').value,
            password: document.getElementById('edit_pass').value,
            no_hp: document.getElementById('edit_hp').value,
            alamat: document.getElementById('edit_alamat').value,
            jabatan: document.getElementById('edit_jabatan').value,
            komsel: document.getElementById('edit_jc').value,
            gol_darah: document.getElementById('edit_goldar').value
        };

        db.collection("users").doc(id).update(dataBaru).then(() => {
            alert("✅ UPDATE BERHASIL!");
            tutupModal();
            muatDataUser();
        }).catch(err => alert("❌ GAGAL: " + err.message));
    }

    function hapusTerpilih() {
        const terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) return alert("Pilih data untuk dihapus!");
        if (!confirm("Hapus data yang dipilih secara permanen?")) return;

        const batch = db.batch();
        terpilih.forEach(cb => {
            const id = cb.closest('tr').getAttribute('data-id');
            batch.delete(db.collection("users").doc(id));
        });

        batch.commit().then(() => {
            alert("🗑️ DATA TERHAPUS!");
            muatDataUser();
        }).catch(err => alert("Gagal hapus: " + err.message));
    }

    function tutupModal() { document.getElementById('editModal').style.display = 'none'; }

    function jalankanCari() {
        let input = document.getElementById('kotakCari').value.toLowerCase();
        document.querySelectorAll('#badanTabel tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }

    document.getElementById('pilihSemua').onclick = function() {
        document.querySelectorAll('.cek-baris').forEach(cb => cb.checked = this.checked);
    }

    window.onload = muatDataUser;
</script>
</body>
</html>
