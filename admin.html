<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Regional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14;
            --teal: #20c997; --blue-dark: #0056b3;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1400px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        .table-controls { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 15px; min-height: 45px; }
        .search-box { position: relative; flex: 1; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        #action-bar { display: none; align-items: center; gap: 10px; background: #f8f9fa; padding: 5px 15px; border-radius: 10px; border: 1px solid #eee; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        #selected-count { font-size: 12px; font-weight: bold; color: var(--primary); border-right: 1px solid #ccc; padding-right: 10px; }

        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: middle; }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; position: relative; cursor: pointer; transition: transform 0.2s; height: 100%; box-sizing: border-box; text-decoration: none; display: block; }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .stat-card i { position: absolute; right: 10px; bottom: 10px; font-size: 2rem; opacity: 0.3; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }

        /* Modal styling... */
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2>Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <a href="admin-tiket.html" class="stat-card" style="background: linear-gradient(135deg, var(--accent), var(--blue-dark));">
            <h4 style="margin:0; font-size:11px;">PORTAL TIKET</h4>
            <p id="stat_tiket">0</p>
            <i class="fas fa-ticket-alt"></i>
        </a>

        <div class="stat-card" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
            <h4 style="margin:0; font-size:11px;">HADIR HARI INI</h4><p id="stat_hadir">0</p><i class="fas fa-check-circle"></i>
        </div>

        <div class="stat-card" style="background: linear-gradient(135deg, #dc3545, #a71d2a);">
            <h4 style="margin:0; font-size:11px;">POKOK DOA</h4><p id="stat_doa">0</p><i class="fas fa-hands-praying"></i>
        </div>
        
        <a href="portal-media.html" class="stat-card" style="background: linear-gradient(135deg, var(--purple), #4e2a84);">
            <h4 style="margin:0; font-size:11px;">PORTAL MEDIA</h4><p id="stat_media">0</p><i class="fas fa-photo-video"></i>
        </a>

        <a href="informasi-kegiatan.html" class="stat-card" style="background: linear-gradient(135deg, var(--orange), #c46210);">
            <h4 style="margin:0; font-size:11px;">INFORMASI KEGIATAN</h4><p id="stat_kegiatan">0</p><i class="fas fa-calendar-alt"></i>
        </a>

        <div class="stat-card" id="btn-statistik-bigdata" style="background: linear-gradient(135deg, var(--teal), #178a6b);" onclick="bukaStatistik()">
            <h4 style="margin:0; font-size:11px;">STATISTIK BIG DATA</h4>
            <p id="stat_bigdata">GO</p>
            <i class="fas fa-chart-line"></i>
        </div>
    </div>

    <div class="table-controls">
        <div class="search-box">
            <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama, email, atau alamat...">
            <i class="fas fa-search"></i>
        </div>
        <div id="action-bar">
            <span id="selected-count">0 Terpilih</span>
            <button class="btn-action" style="background:var(--accent)" onclick="editSelected()"><i class="fas fa-edit"></i> Edit</button>
            <button class="btn-action" style="background:var(--danger)" onclick="deleteSelected()"><i class="fas fa-trash"></i> Hapus</button>
        </div>
    </div>

    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th style="width:40px; text-align:center;"><input type="checkbox" id="checkAll" onclick="toggleSelectAll()"></th>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() { 
        loadUsers(); 
        updateStats(); 
    };

    function updateStats() {
        // Mengambil jumlah tiket masuk secara real-time
        db.collection("tiket").onSnapshot(snap => {
            document.getElementById("stat_tiket").innerText = snap.size;
        });

        db.collection("absensi").where("tanggal", "==", new Date().toISOString().split('T')[0])
            .onSnapshot(snap => { document.getElementById("stat_hadir").innerText = snap.size; });
        
        db.collection("doa_global").onSnapshot(snap => { document.getElementById("stat_doa").innerText = snap.size; });
        db.collection("portal_media").onSnapshot(snap => { document.getElementById("stat_media").innerText = snap.size; });
        db.collection("informasi_kegiatan").onSnapshot(snap => { document.getElementById("stat_kegiatan").innerText = snap.size; });
    }

    function loadUsers() {
        db.collection("users").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td style="text-align:center;"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionBar()"></td>
                        <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td style="text-align:center">${data.golongan_darah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                    </tr>`;
            });
        });
    }

    function bukaStatistik() { window.location.href = "admin-bigdata.html"; }
    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
