<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() { loadMembersRealtime(); };

    function loadMembersRealtime() {
        db.collection("users").onSnapshot(snapshot => {
            const tableBody = document.getElementById("memberData");
            if(!tableBody) return;
            tableBody.innerHTML = "";
            
            snapshot.forEach(doc => {
                const d = doc.data();
                const namaTampil = d.nama_lengkap || d.nama || d.Nama || '-';
                const nij = d.nij || '-';
                
                // --- 1. LOGIKA TEMPAT TANGGAL LAHIR (KOLOM KOTA KELAHIRAN) ---
                // Mengambil langsung dari root field sesuai data I Made Boby
                const tempatLahir = d.kota || "-"; 
                const tglLahir = d.tanggal_lahir_murni || d.tanggal_lahir || "-";
                
                let ttl = "-";
                if (tempatLahir !== "-" && tglLahir !== "-") {
                    ttl = `${tempatLahir.toUpperCase()}, ${tglLahir}`;
                } else {
                    ttl = tempatLahir !== "-" ? tempatLahir.toUpperCase() : tglLahir;
                }

                // --- 2. LOGIKA ALAMAT DOMISILI (BERSIH DARI DATA PALU) ---
                const jalanDomisili = d.alamat || '-';
                
                // Prioritas: Jika ada objek 'wilayah', ambil isinya. 
                // Jika tidak ada (seperti data Boby), ambil dari field 'wilayah' string (isinya "Abepura")
                let areaDetail = "";
                if (d.wilayah && typeof d.wilayah === 'object') {
                    areaDetail = `Kel. ${d.wilayah.desa || '-'}, Kec. ${d.wilayah.kec || '-'}`;
                } else {
                    areaDetail = `Wilayah: ${d.wilayah || '-'}`;
                }

                const alamatHtml = `
                    ${jalanDomisili}<br>
                    <small>${areaDetail}</small>
                `;

                // --- DATA LAINNYA ---
                const goldar = d.darah || d.golongan_darah || '-'; 
                const whatsapp = d.whatsapp || d.WhatsApp || d.hp || '-';
                const email = d.email || '-';
                const pasangan = d.nama_suami_istri || d.nama_pasangan || '-';
                const anak = d.jumlah_anak || d.anak || '0';
                
                const wilayahGereja = d.lokasi_berjemaat || d.lokasi || '-';
                const komsel = d.komsel || d.Komsel || '-';
                const jabatan = d.jabatan || '-';
                const fungsi = d.sub_jabatan || d.fungsi_pelayanan || '-';
                
                const linkKtp = d.url_ktp || d.ktp;
                const linkBerkas = d.url_berkas || d.berkas;

                let fileHtml = "";
                if (linkKtp && linkKtp !== "-") fileHtml += `<a href="${linkKtp}" target="_blank" class="file-link"><i class="fas fa-id-card"></i></a> `;
                if (linkBerkas && linkBerkas !== "-") fileHtml += `<a href="${linkBerkas}" target="_blank" class="file-link"><i class="fas fa-file-alt"></i></a>`;
                if (!fileHtml) fileHtml = '<span style="color:#ccc;">-</span>';

                const status = d.status_akun || 'Pending';
                const statusBadge = status === 'Aktif' ? 'badge-aktif' : 'badge-pending';
                const statusIcon = status === 'Aktif' ? 'fa-check-square' : 'fa-stop-circle';
                const statusBtnColor = status === 'Aktif' ? '#28a745' : '#dc3545';

                tableBody.innerHTML += `
                <tr>
                    <td class="check-col"><input type="checkbox" class="user-checkbox" value="${doc.id}" onclick="updateActionMenu()"></td>
                    <td class="nij-col">${nij}</td>
                    <td><strong>${namaTampil}</strong></td>
                    <td>${ttl}</td> 
                    <td style="text-align:center;"><strong>${goldar}</strong></td> 
                    <td>${whatsapp}<br><small>${email}</small></td>
                    <td><small>P: ${pasangan}<br>A: ${anak}</small></td>
                    <td>${alamatHtml}</td>
                    <td><small>${wilayahGereja}<br>K: ${komsel}</small></td>
                    <td><small>${jabatan}<br>F: ${fungsi}</small></td>
                    <td style="text-align:center; font-size:18px;">${fileHtml}</td>
                    <td>
                        <span class="${statusBadge}">${status}</span>
                        <button class="btn-status-toggle" style="background:${statusBtnColor}" onclick="toggleUserStatus('${doc.id}', '${status}')">
                            <i class="fas ${statusIcon}"></i>
                        </button>
                    </td>
                    <td>
                        <button onclick="openEditModal('${doc.id}')" class="btn-action" style="background:var(--accent); padding:4px 8px;"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteUser('${doc.id}')" class="btn-action" style="background:var(--danger); padding:4px 8px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            });
            updateActionMenu();
        });
    }

    // Fungsi utilitas
    function toggleUserStatus(id, current) {
        const next = current === 'Aktif' ? 'Pending' : 'Aktif';
        db.collection("users").doc(id).update({ status_akun: next });
    }
    
    function deleteUser(id) { if(confirm("Hapus data secara permanen?")) { db.collection("users").doc(id).delete(); } }
    
    function bulkDelete() {
        const selected = document.querySelectorAll('.user-checkbox:checked');
        if(confirm(`Hapus ${selected.length} data?`)) { selected.forEach(cb => db.collection("users").doc(cb.value).delete()); }
    }
    
    function openEditModal(uid) { window.location.href = `edit-jemaat-administrator.html?edit=${uid}`; }
    
    function filterTable() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => { row.style.display = row.innerText.toLowerCase().includes(val) ? "" : "none"; });
    }
    
    function toggleAll(source) {
        document.querySelectorAll('.user-checkbox').forEach(cb => cb.checked = source.checked);
        updateActionMenu();
    }
    
    function updateActionMenu() {
        const count = document.querySelectorAll('.user-checkbox:checked').length;
        const menu = document.getElementById('actionMenu');
        if(menu) {
            menu.style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('selectedCount').innerText = `${count} Terpilih`;
        }
    }
</script>
