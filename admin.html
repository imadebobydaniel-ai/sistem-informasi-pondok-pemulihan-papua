<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        
        /* TOMBOL BACK CSS */
        .navigation-top { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .btn-back { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            font-size: 15px; 
            font-weight: bold; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-back:hover { background: #0056b3; transform: translateX(-5px); }

        /* Header Section */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; }
        .btn-keluar { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Toolbar */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-tool { border: none; padding: 10px 18px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-input { padding: 10px; width: 300px; border: 1px solid #ccc; border-radius: 6px; flex-grow: 1; }

        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        thead { background: #ff0000; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; font-size: 14px; }
        
        .sedang-diedit { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: black !important; cursor: text; }
        select.dropdown-darah { padding: 5px; border-radius: 4px; border: 1px solid orange; width: 100%; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="navigation-top">
        <a href="index.html" class="btn-back">
            <i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN
        </a>
    </div>

    <div class="header-section">
        <div style="font-size: 24px; font-weight: bold;"><i class="fa-solid fa-database"></i> Database Administrator</div>
        <button class="btn-keluar" id="logoutSekarang"><i class="fa-solid fa-right-from-bracket"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()"><i class="fa-solid fa-rotate"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-pen-to-square"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        <input type="text" id="kotakCari" class="search-input" placeholder="Cari Nama atau No HP...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="pilihSemuaData"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Password</th>
                    <th>Nomor HP</th>
                    <th>Alamat</th>
                    <th>Jabatan</th>
                    <th>Lokasi JC</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr>
                    <td><input type="checkbox" class="cek-baris"></td>
                    <td class="edit-teks">Boby Daniel</td>
                    <td class="edit-teks">boby.daniel4@gmail.com</td>
                    <td class="edit-teks" style="color:red; font-weight:bold;">Bukadong821</td>
                    <td class="edit-teks">081283393576</td>
                    <td class="edit-teks">Jl. tanah Hitam Abe pantai</td>
                    <td class="edit-teks">Ketua Komsel</td>
                    <td class="edit-teks">JC 5</td>
                    <td class="kolom-darah">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. LOGOUT
    document.getElementById('logoutSekarang').onclick = function() {
        if(confirm("Keluar dari Portal Admin?")) window.location.href = "index.html";
    };

    // 2. EDIT
    document.getElementById('btnEdit').onclick = function() {
        let barisTerpilih = document.querySelectorAll('.cek-baris:checked');
        if (barisTerpilih.length === 0) return alert("Centang dulu kotaknya, Bang!");

        barisTerpilih.forEach(checkbox => {
            let row = checkbox.closest('tr');
            row.querySelectorAll('.edit-teks').forEach(td => {
                td.contentEditable = "true";
                td.classList.add('sedang-diedit');
            });
            let tdDarah = row.querySelector('.kolom-darah');
            if (!tdDarah.querySelector('select')) {
                let nilaiAsli = tdDarah.innerText.trim();
                let listDarah = ['O', 'A', 'B', 'AB', 'AB+'];
                let selectCode = `<select class="dropdown-darah">`;
                listDarah.forEach(d => { selectCode += `<option value="${d}" ${d === nilaiAsli ? 'selected' : ''}>${d}</option>`; });
                tdDarah.innerHTML = selectCode + `</select>`;
            }
        });
        alert("Mode Edit Aktif!");
    };

    // 3. HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let terpilih = document.querySelectorAll('.cek-baris:checked');
        if (terpilih.length === 0) return alert("Pilih data dulu!");
        if (confirm("Hapus data yang dicentang?")) { terpilih.forEach(cb => cb.closest('tr').remove()); }
    };

    // 4. CARI
    document.getElementById('kotakCari').onkeyup = function() {
        let filter = this.value.toLowerCase();
        document.querySelectorAll('#badanTabel tr').forEach(tr => {
            tr.style.display = tr.innerText.toLowerCase().includes(filter) ? "" : "none";
        });
    };

    // 5. SELECT ALL
    document.getElementById('pilihSemuaData').onclick = function() {
        document.querySelectorAll('.cek-baris').forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
