<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1400px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Header */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        /* Statistik Global (New Row) */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; position: relative; }
        .stat-card i { position: absolute; right: 10px; bottom: 10px; font-size: 2rem; opacity: 0.3; }
        .stat-card h4 { margin: 0; font-size: 11px; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }

        /* Search & Table */
        .search-box { position: relative; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; box-sizing: border-box; }
        .search-box i { position: absolute; right: 15px; top: 13px; color: #aaa; }

        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; white-space: nowrap; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: middle; }
        .freeze-col { position: sticky; left: 0; z-index: 2; background: white !important; border-right: 2px solid #eee; }

        /* Layout Grid */
        .admin-grid-forms { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-card h3 { color: var(--primary); margin: 0 0 15px; font-size: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }

        /* Playlist & Media */
        .media-management-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin-top: 20px; }
        .playlist-container { background: #fff; border-radius: 12px; border: 1px solid #eee; padding: 15px; max-height: 500px; overflow-y: auto; }
        .media-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; gap: 10px; }
        .media-info { flex: 1; }
        .media-info h4 { margin: 0; font-size: 13px; color: var(--primary); }
        .media-controls { display: flex; gap: 5px; }
        .btn-control { border: none; background: #eee; color: #555; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        .play-modes { display: flex; justify-content: space-around; background: #f1f3f5; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .mode-btn { background: none; border: none; cursor: pointer; color: #aaa; font-size: 14px; }
        .mode-btn.active { color: var(--accent); font-weight: bold; }

        /* Doa & Absensi Styles */
        .doa-scroll { max-height: 200px; overflow-y: auto; background: #fff5f5; padding: 10px; border-radius: 10px; margin-top: 10px; }
        .absensi-feed { max-height: 200px; overflow-y: auto; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2>Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="background: linear-gradient(135deg, #007bff, #003366);">
            <h4>Total Anggota</h4><p id="stat_total">0</p><i class="fas fa-users"></i>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
            <h4>Hadir Hari Ini</h4><p id="stat_hadir">0</p><i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #dc3545, #a71d2a);">
            <h4>Pokok Doa</h4><p id="stat_doa">0</p><i class="fas fa-hands-praying"></i>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama, email, atau alamat anggota...">
        <i class="fas fa-search"></i>
    </div>

    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                    <th style="text-align:center;">Aksi</th>
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <div class="admin-grid-forms">
        <div class="admin-card">
            <h3><i class="fas fa-bullhorn"></i> Kirim Informasi</h3>
            <form id="formInfo">
                <div class="form-group"><label>Judul</label><input type="text" id="info_judul" required></div>
                <div class="form-group"><label>Pesan</label><textarea id="info_pesan" rows="3" required></textarea></div>
                <button type="submit" class="btn-save">PUBLIKASIKAN</button>
            </form>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-heart" style="color:var(--danger)"></i> Doa Global</h3>
            <form id="formDoa">
                <div class="form-group"><textarea id="doa_isi" rows="2" placeholder="Tulis pokok doa..." required></textarea></div>
                <button type="submit" class="btn-save" style="background:var(--danger)">KIRIM DOA</button>
            </form>
            <div class="doa-scroll" id="doaData"></div>
        </div>

        <div class="admin-card">
            <h3><i class="fas fa-fingerprint" style="color:var(--success)"></i> Absensi Global</h3>
            <div class="absensi-feed" id="absensiData">
                <p style="text-align:center; color:#999; font-size:12px;">Memuat absensi...</p>
            </div>
        </div>
    </div>

    <div class="media-management-grid">
        <div class="admin-card">
            <h3><i class="fas fa-plus-circle"></i> Tambah Media Baru</h3>
            <form id="formAddMedia">
                <div class="form-group"><label>Judul Media</label><input type="text" id="m_judul" required></div>
                <div class="form-group">
                    <label>Tipe Konten</label>
                    <select id="m_tipe">
                        <option value="video">Video YouTube (Link)</option>
                        <option value="gambar">Gambar (Link URL)</option>
                        <option value="teks">Pesan Teks / Pengumuman</option>
                    </select>
                </div>
                <div class="form-group"><label>URL Link / Isi Teks</label><textarea id="m_isi" rows="3" required></textarea></div>
                <button type="submit" class="btn-save" style="background: #e67e22;">TAMBAHKAN KE PLAYLIST</button>
            </form>
        </div>

        <div class="playlist-container">
            <h3><i class="fas fa-list-ul"></i> Playlist & Urutan Tampil</h3>
            <div class="play-modes">
                <button class="mode-btn active" onclick="setMode('repeat')" id="m_repeat" title="Repeat All"><i class="fas fa-redo"></i> Repeat</button>
                <button class="mode-btn" onclick="setMode('shuffle')" id="m_shuffle" title="Shuffle Play"><i class="fas fa-random"></i> Shuffle</button>
                <button class="mode-btn" onclick="setMode('single')" id="m_single" title="Play Single"><i class="fas fa-minus"></i> Single</button>
            </div>
            <div id="playlistData"></div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h3><i class="fas fa-user-edit"></i> Edit Profil</h3>
        <form id="formUpdate">
            <input type="hidden" id="edit_id">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="edit_nama" required></div>
            <div class="form-group"><label>WhatsApp</label><input type="text" id="edit_wa" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="edit_email" required></div>
            <div class="form-group"><label>Jabatan</label>
                <select id="edit_jabatan">
                    <option value="Anggota">Anggota</option><option value="Ketua Komsel">Ketua Komsel</option><option value="Pengurus">Pengurus</option>
                </select>
            </div>
            <button type="submit" class="btn-save">SIMPAN PERUBAHAN</button>
        </form>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() {
        loadUsers();
        loadPlaylist();
        loadAbsensi();
        loadDoa();
    };

    // --- MANAJEMEN USER (DENGAN IKON EDIT & HAPUS ASLI) ---
    function loadUsers() {
        db.collection("users").onSnapshot((snapshot) => {
            const tableBody = document.getElementById("memberData");
            tableBody.innerHTML = "";
            document.getElementById("stat_total").innerText = snapshot.size;
            snapshot.forEach((doc) => {
                const data = doc.data();
                tableBody.innerHTML += `
                    <tr>
                        <td class="freeze-col"><b>${data.nama || '-'}</b></td>
                        <td>${data.nomor_komsel || '-'}</td>
                        <td>${data.whatsapp || '-'}</td>
                        <td>${data.email || '-'}</td>
                        <td style="text-align:center">${data.golongan_darah || '-'}</td>
                        <td>${data.jabatan || '-'}</td>
                        <td>JC ${data.komsel || '-'}</td>
                        <td>${data.alamat || '-'}</td>
                        <td style="text-align:center;">
                            <i class="fas fa-edit" style="color:blue;cursor:pointer;margin-right:10px" onclick="openEditModal('${doc.id}')"></i>
                            <i class="fas fa-trash" style="color:red;cursor:pointer" onclick="deleteMember('${doc.id}')"></i>
                        </td>
                    </tr>`;
            });
        });
    }

    async function openEditModal(id) {
        const doc = await db.collection("users").doc(id).get();
        const data = doc.data();
        document.getElementById("edit_id").value = id;
        document.getElementById("edit_nama").value = data.nama || "";
        document.getElementById("edit_wa").value = data.whatsapp || "";
        document.getElementById("edit_email").value = data.email || "";
        document.getElementById("edit_jabatan").value = data.jabatan || "Anggota";
        document.getElementById("editModal").style.display = "block";
    }

    function closeEditModal() { document.getElementById("editModal").style.display = "none"; }

    // --- MANAJEMEN PLAYLIST (DENGAN URUTAN ASLI) ---
    function loadPlaylist() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot((snapshot) => {
            const container = document.getElementById("playlistData");
            container.innerHTML = "";
            snapshot.forEach((doc) => {
                const m = doc.data();
                container.innerHTML += `
                    <div class="media-item">
                        <div class="media-info">
                            <span>${m.tipe}</span>
                            <h4>${m.judul}</h4>
                        </div>
                        <div class="media-controls">
                            <button class="btn-control" onclick="moveOrder('${doc.id}', -1)"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-control" onclick="moveOrder('${doc.id}', 1)"><i class="fas fa-arrow-down"></i></button>
                            <button class="btn-control" style="color:red" onclick="deleteMedia('${doc.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    }

    // --- FUNGSI DOA & ABSENSI (ADDITIONAL) ---
    function loadDoa() {
        db.collection("doa_global").orderBy("timestamp", "desc").onSnapshot(snap => {
            const div = document.getElementById("doaData");
            div.innerHTML = "";
            document.getElementById("stat_doa").innerText = snap.size;
            snap.forEach(doc => {
                div.innerHTML += `<div style="padding:5px; border-bottom:1px solid #ddd; font-size:11px;"><b>${doc.data().pengirim || 'Anonim'}:</b> ${doc.data().isi}</div>`;
            });
        });
    }

    function loadAbsensi() {
        db.collection("absensi").where("tanggal", "==", new Date().toISOString().split('T')[0]).onSnapshot(snap => {
            const div = document.getElementById("absensiData");
            div.innerHTML = "";
            document.getElementById("stat_hadir").innerText = snap.size;
            snap.forEach(doc => {
                div.innerHTML += `<div style="padding:8px; border-bottom:1px solid #eee; font-size:12px;"><i class="fas fa-user-check"></i> ${doc.data().nama} (JC ${doc.data().komsel})</div>`;
            });
        });
    }

    // Helper Functions
    function deleteMember(id) { if(confirm("Hapus anggota?")) db.collection("users").doc(id).delete(); }
    function deleteMedia(id) { if(confirm("Hapus media?")) db.collection("portal_media").doc(id).delete(); }
    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#memberData tr").forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        });
    }
</script>
</body>
</html>
