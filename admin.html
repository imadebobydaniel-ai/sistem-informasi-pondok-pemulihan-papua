<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 95%; margin: auto; }
        
        /* Header */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff0000; padding-bottom: 15px; margin-bottom: 25px; }
        .header-title { font-size: 24px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 10px; }
        .btn-keluar { background: #555; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-keluar:hover { background: #222; }

        /* Toolbar */
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
        .btn-tool { border: none; padding: 10px 20px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        #btnRefresh { background: #00e676; }
        #btnEdit { background: #ffa000; }
        #btnHapus { background: #37474f; }
        .search-box { flex-grow: 1; min-width: 250px; position: relative; }
        .search-input { width: 100%; padding: 11px 15px 11px 40px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 12px; color: #888; }

        /* Tabel */
        .table-container { overflow-x: auto; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; background: #fff; }
        thead { background: #ff0000; color: white; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #fefefe; }

        /* Mode Edit */
        .edit-aktif { background-color: #fffde7 !important; border: 2px solid orange !important; outline: none; color: #000; font-weight: 500; }
        .select-darah { padding: 5px; border: 1px solid orange; border-radius: 4px; background: white; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <div class="header-title"><i class="fa-solid fa-database"></i> Database Administrator</div>
        <button class="btn-keluar" id="keluarSistem"><i class="fa-solid fa-power-off"></i> Keluar</button>
    </div>

    <div class="toolbar">
        <button id="btnRefresh" class="btn-tool" onclick="location.reload()"><i class="fa-solid fa-sync"></i> Refresh</button>
        <button id="btnEdit" class="btn-tool"><i class="fa-solid fa-edit"></i> Edit Data</button>
        <button id="btnHapus" class="btn-tool"><i class="fa-solid fa-trash"></i> Hapus</button>
        
        <div class="search-box">
            <i class="fa-solid fa-search search-icon"></i>
            <input type="text" id="cariData" class="search-input" placeholder="Cari Nama, No HP, atau Alamat...">
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 20px;"><input type="checkbox" id="pilihSemua"></th>
                    <th>Nama Lengkap</th>
                    <th>Email</th>
                    <th>Nomor HP</th>
                    <th>Alamat Lengkap</th>
                    <th>Jabatan</th>
                    <th>Gol. Darah</th>
                </tr>
            </thead>
            <tbody id="badanTabel">
                <tr>
                    <td><input type="checkbox" class="pilih-baris"></td>
                    <td class="kolom-teks">Boby Daniel</td>
                    <td class="kolom-teks">boby.daniel4@gmail.com</td>
                    <td class="kolom-teks">081283393576</td>
                    <td class="kolom-teks">Jl. Tanah Hitam, Abe Pantai</td>
                    <td class="kolom-teks">Ketua Komsel</td>
                    <td class="kolom-darah">AB</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. FUNGSI KELUAR (LOGOUT)
    document.getElementById('keluarSistem').onclick = function() {
        if(confirm("Keluar dari halaman administrator?")) {
            window.location.href = "index.html";
        }
    };

    // 2. FUNGSI EDIT (TEKS + DROPDOWN GOL DARAH)
    document.getElementById('btnEdit').onclick = function() {
        let rowsSelected = document.querySelectorAll('.pilih-baris:checked');
        
        if (rowsSelected.length === 0) {
            alert("Harap centang (checkbox) data yang ingin di-edit!");
            return;
        }

        rowsSelected.forEach(cb => {
            let tr = cb.closest('tr');
            
            // Mengaktifkan edit pada kolom teks
            let textCells = tr.querySelectorAll('.kolom-teks');
            textCells.forEach(td => {
                td.contentEditable = "true";
                td.classList.add('edit-aktif');
            });

            // Mengubah Golongan Darah menjadi Dropdown
            let darahCell = tr.querySelector('.kolom-darah');
            if (!darahCell.querySelector('select')) {
                let valSekarang = darahCell.innerText.trim();
                let listDarah = ['O', 'A', 'B', 'AB', 'AB+'];
                let htmlSelect = `<select class="select-darah">`;
                listDarah.forEach(d => {
                    htmlSelect += `<option value="${d}" ${d === valSekarang ? 'selected' : ''}>${d}</option>`;
                });
                htmlSelect += `</select>`;
                darahCell.innerHTML = htmlSelect;
            }
        });
        alert("Mode Edit Aktif! Silakan klik pada tulisan atau pilih golongan darah.");
    };

    // 3. FUNGSI HAPUS
    document.getElementById('btnHapus').onclick = function() {
        let rowsSelected = document.querySelectorAll('.pilih-baris:checked');
        if (rowsSelected.length === 0) return alert("Pilih data yang ingin dihapus!");
        
        if (confirm("Hapus " + rowsSelected.length + " data terpilih secara permanen?")) {
            rowsSelected.forEach(cb => cb.closest('tr').remove());
        }
    };

    // 4. FUNGSI CARI (SEARCH)
    document.getElementById('cariData').onkeyup = function() {
        let keyword = this.value.toLowerCase();
        let rows = document.querySelectorAll('#badanTabel tr');
        
        rows.forEach(row => {
            let rowContent = row.innerText.toLowerCase();
            row.style.display = rowContent.includes(keyword) ? "" : "none";
        });
    };

    // 5. PILIH SEMUA (CHECK ALL)
    document.getElementById('pilihSemua').onclick = function() {
        let allCbs = document.querySelectorAll('.pilih-baris');
        allCbs.forEach(cb => cb.checked = this.checked);
    };
</script>

</body>
</html>
