<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrator - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #003366; --accent: #007bff; --dark: #333; 
            --light: #f4f7f6; --success: #28a745; --emas: #D4AF37;
            --danger: #dc3545; --purple: #6f42c1; --orange: #fd7e14;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 0; padding: 10px; }
        .admin-container { max-width: 1400px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Header */
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--emas); padding-bottom: 15px; margin-bottom: 20px; }
        .header-section h2 { margin: 0; color: var(--primary); font-size: 1.4rem; }
        .btn-logout { background: #dc3545; color: white; padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 12px; }

        /* Statistik Global */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { padding: 15px; border-radius: 12px; color: white; display: flex; flex-direction: column; position: relative; }
        .stat-card i { position: absolute; right: 10px; bottom: 10px; font-size: 2rem; opacity: 0.3; }
        .stat-card h4 { margin: 0; font-size: 11px; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0; font-size: 22px; font-weight: bold; }

        /* Table Styles */
        .table-responsive { overflow-x: auto; border-radius: 10px; border: 1px solid #eee; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        table th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 12px; white-space: nowrap; }
        table td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 11.5px; vertical-align: middle; }
        .freeze-col { position: sticky; left: 40px; z-index: 2; background: white !important; border-right: 2px solid #eee; }
        .check-col { position: sticky; left: 0; z-index: 3; background: #f9f9f9 !important; text-align: center; width: 40px; }

        /* --- OPTIMASI INDIKATOR LAMPU --- */
        .status-lamp {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s ease;
        }
        .online { 
            background-color: #28a745; 
            box-shadow: 0 0 10px #28a745; 
            animation: pulse-green 2s infinite;
        }
        .offline { 
            background-color: #bbb; 
            box-shadow: inset 0 0 4px rgba(0,0,0,0.2);
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
        /* ------------------------------- */

        /* Form & Cards */
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; box-sizing: border-box; }
        .btn-save { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* Search & Modal */
        .search-box { position: relative; width: 300px; margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 10px 35px 10px 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        .search-box i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #aaa; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); overflow-y: auto; }
        .modal-content { background: white; margin: 20px auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 600px; position: relative; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="header-section">
        <h2>Dashboard Administrator</h2>
        <a href="login.html" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Keluar</a>
    </div>

    <div class="stats-grid">
        <div class="stat-card" style="background: linear-gradient(135deg, #007bff, #003366);">
            <h4>Total Anggota</h4><p id="stat_total">0</p><i class="fas fa-users"></i>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #28a745, #1e7e34);">
            <h4>Hadir Hari Ini</h4><p id="stat_hadir">0</p><i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-card" style="background: linear-gradient(135deg, #dc3545, #a71d2a);">
            <h4>Pokok Doa</h4><p id="stat_doa">0</p><i class="fas fa-hands-praying"></i>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Cari nama atau JC...">
        <i class="fas fa-search"></i>
    </div>

    <div class="table-responsive">
        <table id="adminTable">
            <thead>
                <tr>
                    <th class="check-col"><input type="checkbox" id="checkAll" onclick="toggleSelectAll()"></th>
                    <th class="freeze-col">Nama Anggota</th>
                    <th>NK</th>
                    <th>WhatsApp</th>
                    <th>Email</th>
                    <th>Gol. Darah</th>
                    <th>Jabatan</th>
                    <th>JC</th>
                    <th>Alamat</th>
                    <th style="text-align:center;">Status</th> 
                </tr>
            </thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    window.onload = function() {
        loadUsers();
    };

    // --- FUNGSI LOAD USERS TEROPTIMASI ---
    function loadUsers() {
        // Menggunakan onSnapshot agar update otomatis saat field 'isOnline' berubah
        db.collection("users").orderBy("nama", "asc").onSnapshot((snapshot) => {
            const tbody = document.getElementById("memberData");
            tbody.innerHTML = "";
            document.getElementById("stat_total").innerText = snapshot.size;
            
            snapshot.forEach((doc) => {
                const d = doc.data();
                
                // LOGIKA: Ambil field isOnline dari Firebase
                // Jika isOnline true -> class 'online' (Hijau + Animasi)
                // Jika isOnline false/null -> class 'offline' (Abu-abu/Merah)
                const isUserOnline = d.isOnline === true;
                const statusClass = isUserOnline ? "online" : "offline";
                const statusTooltip = isUserOnline ? "Sedang Aktif" : "Tidak Aktif";

                tbody.innerHTML += `
                    <tr>
                        <td class="check-col"><input type="checkbox" class="member-checkbox" value="${doc.id}"></td>
                        <td class="freeze-col"><b>${d.nama || '-'}</b></td>
                        <td>${d.nomor_komsel || '-'}</td>
                        <td>${d.whatsapp || '-'}</td>
                        <td>${d.email || '-'}</td>
                        <td style="text-align:center">${d.golongan_darah || '-'}</td>
                        <td>${d.jabatan || '-'}</td>
                        <td>JC ${d.komsel || '-'}</td>
                        <td>${d.alamat || '-'}</td>
                        <td style="text-align:center;">
                            <span class="status-lamp ${statusClass}" title="${statusTooltip}"></span>
                        </td>
                    </tr>`;
            });
        }, (error) => {
            console.error("Error listening to users: ", error);
        });
    }

    function filterTable() {
        let input = document.getElementById("searchInput").value.toLowerCase();
        let rows = Array.from(document.querySelectorAll("#memberData tr"));
        rows.forEach(row => {
            let name = row.cells[1].innerText.toLowerCase();
            row.style.display = name.includes(input) ? "" : "none";
        });
    }

    function toggleSelectAll() {
        const isChecked = document.getElementById("checkAll").checked;
        document.querySelectorAll(".member-checkbox").forEach(cb => cb.checked = isChecked);
    }
</script>
</body>
</html>
