<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Dashboard - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #003366; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --purple: #6f42c1; --dark: #1a1a1a;
            --light: #f8f9fa; --emas: #D4AF37;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7; margin: 0; padding: 20px; color: var(--dark);
        }

        .container { max-width: 1400px; margin: auto; }

        #loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center;
            align-items: center; font-weight: bold; color: var(--primary);
        }

        .tab-menu {
            display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;
            align-items: center; border-bottom: 2px solid #ddd;
        }
        
        .tab-btn {
            padding: 12px 18px; border: none; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }

        .action-btn {
            padding: 10px 15px; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
            display: flex; align-items: center; gap: 8px; color: white; font-size: 12px;
        }
        .btn-pdf { background: var(--danger); }
        .btn-print { background: var(--dark); }

        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 25px;
        }
        .chart-card {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
        }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: var(--dark); width: 100%; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }

        .data-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; }
        
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase;}
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-warning { background: #fff3cd; color: #856404; }

        @media print {
            .tab-menu, #loading, .action-btn, .fas.fa-arrow-left { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loading">Memproses Data Real-time...</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2><i class="fas fa-database"></i> Dashboard Statistik Central</h2>
        <a href="admin.html" style="text-decoration:none; color: var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Kembali</a>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('Ibadah Raya', this)"><i class="fas fa-church"></i> Ibadah Raya</button>
        <button class="tab-btn" onclick="switchTab('Arso 1', this)"><i class="fas fa-map-marker-alt"></i> Ibadah Arso 1</button>
        <button class="tab-btn" onclick="switchTab('Komsel', this)"><i class="fas fa-users"></i> Komsel Reguler</button>
        <button class="tab-btn" onclick="switchTab('Komsel Gabungan', this)"><i class="fas fa-layer-group"></i> Komsel Gabungan</button>
        <button class="tab-btn" onclick="switchTab('KD', this)"><i class="fas fa-graduation-cap"></i> Absen KD</button>
        <button class="tab-btn" onclick="switchTab('Baca Alkitab', this)"><i class="fas fa-bible"></i> Baca Alkitab</button>
        <button class="tab-btn" onclick="switchTab('Permohonan Doa', this)"><i class="fas fa-hands-praying"></i> Doa Komsel</button>
        
        <div style="margin-left: auto; display: flex; gap: 8px;">
            <button class="action-btn btn-pdf" onclick="window.print()"><i class="fas fa-print"></i> Print Laporan</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card">
            <div class="chart-title">Proporsi Kehadiran/Status</div>
            <div style="width: 100%; height: 250px;"><canvas id="pieChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Tren Aktivitas (7 Hari Terakhir)</div>
            <div style="width: 100%; height: 250px;"><canvas id="lineChart"></canvas></div>
        </div>
        <div class="chart-card">
            <div class="chart-title">Distribusi Laporan Per JC</div>
            <div style="width: 100%; height: 250px;"><canvas id="barChart"></canvas></div>
        </div>
    </div>

    <div class="data-section">
        <div class="chart-title" id="table-title" style="text-align: left;">Memuat Data...</div>
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Anggota</th>
                        <th>JC / Komsel</th>
                        <th>Status</th>
                        <th>Detail Aktivitas / Keterangan</th>
                    </tr>
                </thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // Konfigurasi Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let myCharts = { pie: null, line: null, bar: null };
    let currentTab = "Ibadah Raya";

    // Fungsi Ganti Tab
    function switchTab(kategori, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = kategori;
        initRealtimeListener();
    }

    // LISTENER REAL-TIME UTAMA
    function initRealtimeListener() {
        document.getElementById('loading').style.display = 'flex';
        document.getElementById('table-title').innerText = "Detail Aktivitas: " + currentTab;

        // Penentuan koleksi berdasarkan kategori
        let collectionName = "presensi"; // Default untuk ibadah & KD
        if (currentTab === "Permohonan Doa") collectionName = "saran_masukan";
        if (currentTab === "Baca Alkitab") collectionName = "baca_alkitab";
        if (currentTab === "Komsel" || currentTab === "Komsel Gabungan") collectionName = "laporan_komsel";

        db.collection(collectionName)
          .where("kategori", "==", currentTab)
          .orderBy("timestamp", "desc")
          .onSnapshot(snapshot => {
            let listHtml = "";
            let stats = {
                pie: {}, 
                bar: {}, 
                line: {}
            };

            if (snapshot.empty) {
                listHtml = "<tr><td colspan='5' style='text-align:center;'>Tidak ada data untuk kategori ini.</td></tr>";
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                const tglObj = data.timestamp ? data.timestamp.toDate() : new Date();
                const tglString = tglObj.toLocaleDateString('id-ID');
                const tglKey = tglObj.toISOString().split('T')[0]; // Untuk Line Chart
                
                // Normalisasi Data
                const nama = data.nama || "Tanpa Nama";
                const jc = data.jc || data.komsel || "Umum";
                const status = (data.status || "Proses").toUpperCase();
                const detail = data.isi_saran || data.keterangan || data.materi || data.kitab || "-";

                // 1. Isi Tabel
                const badgeClass = status === "HADIR" || status === "TERJAWAB" ? "badge-success" : 
                                   status === "PROSES" ? "badge-warning" : "badge-danger";

                listHtml += `
                    <tr>
                        <td>${tglString}</td>
                        <td><b>${nama}</b></td>
                        <td>${jc}</td>
                        <td><span class="badge ${badgeClass}">${status}</span></td>
                        <td>${detail}</td>
                    </tr>
                `;

                // 2. Olah Statistik untuk Chart
                stats.pie[status] = (stats.pie[status] || 0) + 1;
                stats.bar[jc] = (stats.bar[jc] || 0) + 1;
                stats.line[tglKey] = (stats.line[tglKey] || 0) + 1;
            });

            document.getElementById('data-list').innerHTML = listHtml;
            updateCharts(stats);
            document.getElementById('loading').style.display = 'none';
        }, error => {
            console.error("Error:", error);
            document.getElementById('loading').style.display = 'none';
        });
    }

    // FUNGSI UPDATE GRAFIK
    function updateCharts(stats) {
        // --- Pie Chart ---
        if (myCharts.pie) myCharts.pie.destroy();
        myCharts.pie = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(stats.pie),
                datasets: [{
                    data: Object.values(stats.pie),
                    backgroundColor: ['#28a745', '#dc3545', '#ffc107', '#007bff']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // --- Line Chart (Tren 7 Hari) ---
        const sortedDates = Object.keys(stats.line).sort().slice(-7);
        const lineValues = sortedDates.map(d => stats.line[d]);

        if (myCharts.line) myCharts.line.destroy();
        myCharts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line',
            data: {
                labels: sortedDates,
                datasets: [{
                    label: 'Jumlah Aktivitas',
                    data: lineValues,
                    borderColor: '#003366',
                    backgroundColor: 'rgba(0,51,102,0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // --- Bar Chart (Distribusi JC) ---
        if (myCharts.bar) myCharts.bar.destroy();
        myCharts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: Object.keys(stats.bar),
                datasets: [{
                    label: 'Total Laporan',
                    data: Object.values(stats.bar),
                    backgroundColor: '#D4AF37'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    // Jalankan pertama kali
    window.onload = () => initRealtimeListener();
</script>
</body>
</html>
