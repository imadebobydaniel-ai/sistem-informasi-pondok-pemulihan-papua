<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Dashboard - Pondok Pemulihan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root {
            --primary: #007bff; --success: #28a745; --danger: #dc3545;
            --warning: #ffc107; --purple: #6f42c1; --dark: #1a1a1a;
            --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1400px; margin: auto; }
        #loading {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center;
            align-items: center; font-weight: bold; color: var(--primary); flex-direction: column; gap: 10px;
        }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; align-items: center; border-bottom: 2px solid #ddd; }
        .tab-btn {
            padding: 12px 18px; border: none; border-radius: 12px; background: white;
            cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .tab-btn.active { background: var(--primary); color: white; transform: translateY(-3px); }
        
        .action-group { margin-left: auto; display: flex; gap: 8px; }
        .action-btn { padding: 10px 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; color: white; font-size: 12px; }
        .btn-print { background: var(--dark); }
        .btn-pdf-tab { background: var(--danger); }
        .btn-pdf-all { background: var(--purple); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .chart-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; }
        .chart-title { font-weight: bold; margin-bottom: 15px; color: var(--dark); width: 100%; text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .data-section { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .table-wrapper { overflow-x: auto; margin-top: 15px; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1000px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #eee; position: sticky; top: 0; z-index: 5; }
        td { padding: 12px 15px; border-bottom: 1px solid #f1f1f1; }
        .badge { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; }
        .badge-success { background: #d4edda; color: #155724; }
        @media print { .tab-menu, #loading, .action-group, .fas.fa-arrow-left { display: none !important; } }
    </style>
</head>
<body>

<div id="loading">
    <i class="fas fa-spinner fa-spin fa-2x"></i>
    <span id="loading-text">Sinkronisasi Data Real-time...</span>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2><i class="fas fa-database"></i> Dashboard Statistik Central</h2>
        <a href="admin.html" style="text-decoration:none; color: var(--primary); font-weight:bold;"><i class="fas fa-arrow-left"></i> Kembali</a>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('ibadah', this)"><i class="fas fa-church"></i> Ibadah Raya</button>
        <button class="tab-btn" onclick="switchTab('arso1', this)"><i class="fas fa-map-marker-alt"></i> Arso 1</button>
        <button class="tab-btn" onclick="switchTab('komsel', this)"><i class="fas fa-users"></i> Komsel</button>
        <button class="tab-btn" onclick="switchTab('komsel_gabungan', this)"><i class="fas fa-layer-group"></i> Gabungan</button>
        <button class="tab-btn" onclick="switchTab('absen_kd', this)"><i class="fas fa-graduation-cap"></i> KD</button>
        <button class="tab-btn" onclick="switchTab('bacaan', this)"><i class="fas fa-bible"></i> Bacaan</button>
        <button class="tab-btn" onclick="switchTab('doa_komsel', this)"><i class="fas fa-hands-praying"></i> Doa</button>
        
        <div class="action-group">
            <button class="action-btn btn-pdf-all" onclick="exportMasterPDF()"><i class="fas fa-file-medical"></i> Export Semua Tab</button>
            <button class="action-btn btn-pdf-tab" onclick="exportCurrentTabPDF()"><i class="fas fa-file-pdf"></i> Export Tab Aktif</button>
            <button class="action-btn btn-print" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="chart-card"><div class="chart-title">Proporsi Status</div><div style="width: 100%; height: 250px;"><canvas id="pieChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Tren Aktivitas</div><div style="width: 100%; height: 250px;"><canvas id="lineChart"></canvas></div></div>
        <div class="chart-card"><div class="chart-title">Distribusi Wilayah</div><div style="width: 100%; height: 250px;"><canvas id="barChart"></canvas></div></div>
    </div>

    <div class="data-section">
        <div class="chart-title" id="table-title" style="text-align: left;">Memuat Data...</div>
        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="table-head"></thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let myCharts = { pie: null, line: null, bar: null };
    let currentListener = null;
    let currentActiveTab = 'ibadah';

    const menuConfig = {
        ibadah: { title: 'Ibadah Raya', col: 'kehadiran', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        arso1: { title: 'Kehadiran Arso 1', col: 'kehadiran_arso1', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Keterangan'] },
        komsel: { title: 'Komsel Reguler', col: 'laporan_komsel', fields: ['Nama', 'JC', 'Tanggal', 'Status', 'Materi'] },
        komsel_gabungan: { title: 'Komsel Gabungan', col: 'laporan_gabungan', fields: ['Nama', 'Komsel', 'Tanggal', 'Status', 'Lokasi'] },
        absen_kd: { title: 'Kingdom Discipleship', col: 'kehadiran_kd', fields: ['Nama', 'Kelas', 'Tanggal', 'Status', 'Materi'] },
        bacaan: { title: 'Laporan Baca Alkitab', col: 'laporan_bacaan', fields: ['Nama', 'JC', 'Pasal', 'Tanggal', 'Hikmat'] },
        doa_komsel: { title: 'Hasil Doa Komsel', col: 'laporan_doa', fields: ['Nama', 'JC', 'Tgl Doa', 'Status Doa', 'Pokok Doa'] }
    };

    function switchTab(type, btn) {
        currentActiveTab = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadDataRealtime(type);
    }

    // --- LOGIKA PDF 1: TAB AKTIF ---
    function exportCurrentTabPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        const title = menuConfig[currentActiveTab].title;

        doc.setFontSize(16);
        doc.text(`LAPORAN ${title.toUpperCase()}`, 40, 40);
        doc.setFontSize(10);
        doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 40, 55);

        doc.autoTable({
            html: '#mainTable',
            startY: 75,
            theme: 'grid',
            headStyles: { fillColor: [0, 123, 255] },
            styles: { fontSize: 8 },
        });

        doc.save(`Laporan_${title}_${new Date().toLocaleDateString()}.pdf`);
    }

    // --- LOGIKA PDF 2: SEMUA TAB (MASTER) ---
    async function exportMasterPDF() {
        const loadingEl = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        loadingEl.style.display = 'flex';
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'pt', 'a4');
        let currentY = 60;

        doc.setFontSize(20);
        doc.setTextColor(0, 123, 255);
        doc.text("MASTER REPORT - PONDOK PEMULIHAN", 40, 40);
        doc.setFontSize(10);
        doc.setTextColor(100);
        doc.text(`Gabungan Seluruh Data - Tanggal: ${new Date().toLocaleDateString('id-ID')}`, 40, 55);

        for (const key in menuConfig) {
            const cfg = menuConfig[key];
            loadingText.innerText = `Menarik data: ${cfg.title}...`;
            
            // Ambil data dari Firestore
            const snap = await db.collection(cfg.col).limit(50).get();
            const rows = [];
            
            snap.forEach(docSnap => {
                const d = docSnap.data();
                // Normalisasi baris sesuai pola tabel
                const nama = d.nama || d.pengirim || d.Nama || "-";
                const jc = d.jc || d.komsel || d.nama_jc || d.kelas || d.Komsel || "Umum";
                const status = (d.status || d.status_doa || "HADIR");
                const tgl = d.tanggal || d.timestamp || d.tgl_doa || d.tgl_kirim || d.tanggal_laporan;
                let displayDate = "-";
                if(tgl) {
                    const dt = (typeof tgl.toDate === 'function') ? tgl.toDate() : new Date(tgl);
                    displayDate = dt.toLocaleDateString('id-ID');
                }
                const ket = d.keterangan || d.materi || d.lokasi || d.pokok_doa || d.pasal_utama || "-";
                
                rows.push([nama, jc, displayDate, status, ket]);
            });

            // Judul Sub-Tab
            doc.setFontSize(14);
            doc.setTextColor(0);
            doc.text(cfg.title, 40, doc.lastAutoTable ? doc.lastAutoTable.finalY + 40 : 80);

            doc.autoTable({
                head: [cfg.fields],
                body: rows,
                startY: doc.lastAutoTable ? doc.lastAutoTable.finalY + 50 : 90,
                theme: 'striped',
                headStyles: { fillColor: [40, 40, 40] },
                styles: { fontSize: 7 },
                margin: { top: 60 }
            });
        }

        loadingEl.style.display = 'none';
        doc.save(`MASTER_REPORT_PONDOK_PEMULIHAN.pdf`);
    }

    function loadDataRealtime(type) {
        const loadingEl = document.getElementById('loading');
        loadingEl.style.display = 'flex';
        if (currentListener) currentListener();

        const cfg = menuConfig[type];
        document.getElementById('table-title').innerText = "Detail: " + cfg.title;
        document.getElementById('table-head').innerHTML = `<tr>${cfg.fields.map(f => `<th>${f}</th>`).join('')}</tr>`;

        currentListener = db.collection(cfg.col).limit(50).onSnapshot((snapshot) => {
            let html = "";
            let pieData = {}, barData = {}, lineData = {};

            snapshot.forEach((doc) => {
                const d = doc.data();
                const nama = d.nama || d.pengirim || d.Nama || "-";
                const jc = d.jc || d.komsel || d.nama_jc || d.kelas || d.Komsel || "Umum";
                const status = (d.status || d.status_doa || "HADIR").toUpperCase();
                const rawDate = d.tanggal || d.timestamp || d.tgl_doa || d.tgl_kirim || d.tanggal_laporan;
                let displayDate = "-";
                if (rawDate) {
                    const dateObj = (typeof rawDate.toDate === 'function') ? rawDate.toDate() : new Date(rawDate);
                    displayDate = dateObj.toLocaleDateString('id-ID');
                }

                pieData[status] = (pieData[status] || 0) + 1;
                barData[jc] = (barData[jc] || 0) + 1;
                lineData[displayDate] = (lineData[displayDate] || 0) + 1;

                let colAkhir = d.keterangan || d.materi || d.lokasi || d.pokok_doa || d.pasal_utama || "-";
                html += `<tr><td>${nama}</td><td>${jc}</td><td>${displayDate}</td><td>${status}</td><td>${colAkhir}</td></tr>`;
            });

            document.getElementById('data-list').innerHTML = html;
            updateCharts(pieData, lineData, barData);
            loadingEl.style.display = 'none';
        });
    }

    function updateCharts(pie, line, bar) {
        if (myCharts.pie) myCharts.pie.destroy();
        myCharts.pie = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut', data: { labels: Object.keys(pie), datasets: [{ data: Object.values(pie), backgroundColor: ['#28a745', '#dc3545', '#ffc107'] }] }
        });
        if (myCharts.line) myCharts.line.destroy();
        myCharts.line = new Chart(document.getElementById('lineChart'), {
            type: 'line', data: { labels: Object.keys(line), datasets: [{ label: 'Aktivitas', data: Object.values(line), borderColor: '#007bff' }] }
        });
        if (myCharts.bar) myCharts.bar.destroy();
        myCharts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar', data: { labels: Object.keys(bar), datasets: [{ label: 'Total', data: Object.values(bar), backgroundColor: '#6f42c1' }] }
        });
    }

    window.onload = () => loadDataRealtime('ibadah');
</script>
</body>
</html>
