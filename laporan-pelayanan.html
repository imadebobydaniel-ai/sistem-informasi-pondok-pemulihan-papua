<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Pelayanan - SIPAPUA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0056b3; --secondary: #f8f9fa; --accent: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        /* Header Blue Bar */
        .header-bar {
            background: var(--primary); color: white; padding: 20px;
            text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* Form Card */
        .report-card {
            background: white; border-radius: 15px; padding: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; font-size: 14px; }
        
        .form-group select, .form-group input {
            width: 100%; padding: 12px; border: 2px solid #e1e4e8;
            border-radius: 10px; font-size: 15px; outline: none; transition: 0.3s;
        }

        .form-group select:focus, .form-group input:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%; padding: 15px; background: var(--primary);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }

        .btn-submit:active { transform: scale(0.98); }

        /* Back Button */
        .btn-back {
            display: block; text-align: center; margin-top: 20px;
            color: var(--primary); text-decoration: none; font-weight: bold; font-size: 14px;
        }

        #status-msg {
            display: none; padding: 15px; border-radius: 10px; 
            margin-bottom: 15px; text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <i class="fa-solid fa-file-signature" style="font-size: 30px; margin-bottom: 10px;"></i>
        <h2 style="margin:0;">Laporan Pelayanan</h2>
        <p style="margin:5px 0 0; font-size: 12px; opacity: 0.8;">Pondok Pemulihan Papua</p>
    </div>

    <div class="container">
        <div id="status-msg"></div>

        <div class="report-card">
            <form id="pelayananForm">
                <div class="form-group">
                    <label><i class="fa-solid fa-hands-praying"></i> Bidang Pelayanan</label>
                    <select id="kategori_kegiatan" required>
                        <option value="">-- Pilih Bidang --</option>
                        <optgroup label="Musik & Ibadah">
                            <option value="Musik">Musik</option>
                            <option value="WL">Worship Leader (WL)</option>
                            <option value="Singer">Singer</option>
                            <option value="Choirs">Choirs</option>
                        </optgroup>
                        <optgroup label="Tarian & Kreatif">
                            <option value="Tamborin">Tamborin</option>
                            <option value="Flag">Flag</option>
                        </optgroup>
                        <optgroup label="Teknis & Media">
                            <option value="Multimedia">Multimedia</option>
                            <option value="Sound Engineer">Sound Engineer</option>
                        </optgroup>
                        <optgroup label="Pelayanan Mimbar & Altar">
                            <option value="Kotbah">Kotbah</option>
                            <option value="MC">MC</option>
                            <option value="Pelayanan Altar">Pelayanan Altar</option>
                            <option value="Doa Syafaat">Doa Syafaat</option>
                        </optgroup>
                        <optgroup label="Operasional">
                            <option value="User">User / Usher</option>
                            <option value="Parkir">Parkir</option>
                            <option value="Cleaning Service">Cleaning Service</option>
                            <option value="Extention">Extention</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-star"></i> Nama Kegiatan / Judul Ibadah</label>
                    <input type="text" id="nama_kegiatan" placeholder="Contoh: Ibadah Raya Minggu Pagi" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-location-dot"></i> Lokasi Pelayanan</label>
                    <input type="text" id="lokasi_kegiatan" placeholder="Gedung Pusat / Pos Pelayanan X" required>
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-day"></i> Tanggal Kegiatan</label>
                    <input type="date" id="tanggal_kegiatan" required>
                </div>

                <button type="submit" id="btnKirim" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> KIRIM LAPORAN
                </button>
            </form>
        </div>

        <a href="menu.html" class="btn-back"><i class="fa-solid fa-house"></i> Kembali ke Menu Utama</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('pelayananForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnKirim');
            const msg = document.getElementById('status-msg');
            const userEmail = localStorage.getItem("userEmail");

            btn.disabled = true;
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mengirim...";

            const dataLaporan = {
                email: userEmail,
                kategori: document.getElementById('kategori_kegiatan').value,
                nama_kegiatan: document.getElementById('nama_kegiatan').value,
                lokasi: document.getElementById('lokasi_kegiatan').value,
                tanggal: document.getElementById('tanggal_kegiatan').value,
                created_at: firebase.firestore.FieldValue.serverTimestamp(),
                poin: 10 // Poin standar untuk Big Data/Leaderboard
            };

            try {
                // 1. Simpan ke Big Data (Koleksi Laporan Pelayanan)
                await db.collection("laporan_pelayanan").add(dataLaporan);

                // 2. Update Total Poin User di Firestore (Untuk Leaderboard)
                const userRef = db.collection("users").where("email", "==", userEmail);
                const snapshot = await userRef.get();
                
                if (!snapshot.empty) {
                    const docId = snapshot.docs[0].id;
                    const currentPoints = snapshot.docs[0].data().total_poin || 0;
                    await db.collection("users").doc(docId).update({
                        total_poin: currentPoints + 10
                    });
                }

                msg.style.display = "block";
                msg.style.background = "#d4edda";
                msg.style.color = "#155724";
                msg.innerText = "Berhasil! Laporan telah terarsip di Big Data.";
                document.getElementById('pelayananForm').reset();

            } catch (error) {
                console.error(error);
                msg.style.display = "block";
                msg.style.background = "#f8d7da";
                msg.style.color = "#721c24";
                msg.innerText = "Gagal mengirim laporan. Coba lagi.";
            } finally {
                btn.disabled = false;
                btn.innerHTML = "<i class='fa-solid fa-paper-plane'></i> KIRIM LAPORAN";
            }
        });
    </script>
</body>
</html>
