<!DOCTYPE html>
<html>
<head>
    <title>Auth Handler - SIPAPUA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
    <div id="message">Memproses permintaan Anda...</div>

    <script>
        // Masukkan config Firebase Anda di sini
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            // ... lengkapi config lainnya
        };
        firebase.initializeApp(firebaseConfig);

        // Ambil parameter dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const actionCode = urlParams.get('oobCode');

        if (mode === 'resetPassword') {
            // Arahkan user ke halaman ganti password baru
            window.location.href = "reset-password-baru.html?code=" + actionCode;
        } else if (mode === 'verifyEmail') {
            // Jalankan fungsi verifikasi email
            firebase.auth().applyActionCode(actionCode).then(() => {
                document.getElementById('message').innerText = "Email berhasil diverifikasi! Silakan login.";
            }).catch((error) => {
                document.getElementById('message').innerText = "Error: " + error.message;
            });
        }
    </script>
</body>
</html>
