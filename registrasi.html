<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .reg-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 20px; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .nk-display { background-color: #eefbff; border: 1.5px solid #007bff !important; color: #007bff; font-weight: bold; text-align: center; }
        .btn-submit { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-action { margin-top: 20px; text-align: center; }
        .btn-kembali { 
            background: #222; color: #fff; border: 2px solid #007bff; 
            padding: 10px 25px; border-radius: 50px; cursor: pointer; 
            text-decoration: none; font-size: 14px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
            <h2>PONDOK PEMULIHAN PAPUA</h2>
            <p>Pendaftaran Anggota Komsel JC</p>
        </div>

        <form id="regForm" onsubmit="prosesDaftar(event)">
            <div class="form-group">
                <label>Nomor Komsel (NK) - Otomatis</label>
                <input type="text" id="reg_nk" class="nk-display" placeholder="Pilih JC untuk generate NK..." readonly>
            </div>

            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="reg_nama" placeholder="Masukkan Nama Lengkap" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="reg_email" placeholder="contoh@mail.com" required></div>
            <div class="form-group"><label>Nomor HP / WhatsApp</label><input type="number" id="reg_hp" placeholder="Contoh: 08123456789" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="reg_pass" placeholder="Buat Password" required></div>
            <div class="form-group"><label>Alamat</label><input type="text" id="reg_alamat" placeholder="Masukkan Alamat" required></div>
            
            <div class="form-group">
                <label>Jabatan</label>
                <select id="reg_jabatan" required>
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Anggota Komsel">Anggota Komsel</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Komsel JC</label>
                <select id="reg_jc" required onchange="generateNK()">
                    <option value="">-- Pilih Lokasi JC --</option>
                    <option value="JC1">JC 1</option><option value="JC2">JC 2</option>
                    <option value="JC3">JC 3</option><option value="JC4">JC 4</option>
                    <option value="JC5">JC 5</option>
                </select>
            </div>

            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="reg_goldar" required>
                    <option value="">-- Pilih --</option>
                    <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>

        <div class="footer-action">
            <a href="index.html" class="btn-kembali">
                <i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN
            </a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LOGIKA NK: NK-PPP-[URUT]-[JC]-2026
        async function generateNK() {
            const jcVal = document.getElementById('reg_jc').value;
            if (!jcVal) { document.getElementById('reg_nk').value = ""; return; }
            const snapshot = await db.collection("users").get();
            const urutan = String(snapshot.size + 1).padStart(3, '0');
            document.getElementById('reg_nk').value = `NK-PPP-${urutan}-${jcVal}-2026`;
        }

        async function prosesDaftar(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const nkFinal = document.getElementById('reg_nk').value;
            btn.innerText = "Sinkronisasi...";
            btn.disabled = true;

            try {
                await db.collection("users").add({
                    nama: document.getElementById('reg_nama').value,
                    email: document.getElementById('reg_email').value,
                    no_hp: document.getElementById('reg_hp').value,
                    password: document.getElementById('reg_pass').value,
                    alamat: document.getElementById('reg_alamat').value,
                    jabatan: document.getElementById('reg_jabatan').value,
                    komsel: document.getElementById('reg_jc').value,
                    gol_darah: document.getElementById('reg_goldar').value,
                    nomor_komsel: nkFinal, // DISIMPAN AGAR MUNCUL DI TABEL ADMIN
                    tanggal_daftar: new Date().toISOString()
                });
                alert("BERHASIL! NK: " + nkFinal);
                window.location.href = "index.html";
            } catch (err) { alert("Error: " + err.message); btn.disabled = false; btn.innerText = "DAFTAR SEKARANG"; }
        }
    </script>
</body>
</html>
