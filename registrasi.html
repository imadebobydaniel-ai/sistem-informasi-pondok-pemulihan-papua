<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Anggota Baru</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .reg-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .reg-container h2 { text-align: center; color: #333; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .form-group input[readonly] { background-color: #f9f9f9; color: #555; font-weight: bold; }
        .btn-submit { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

<div class="reg-container">
    <h2>Daftar Anggota Baru</h2>
    
    <form id="regForm">
        <div class="form-group">
            <label>Nomor Komsel (Otomatis)</label>
            <input type="text" id="nomorOtomatis" name="nomor_komsel" readonly>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" name="nama_lengkap" placeholder="Masukkan nama lengkap" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="Masukkan email" required>
        </div>

        <div class="form-group">
            <label>Nomor HP</label>
            <input type="tel" name="nomor_hp" placeholder="Masukkan nomor HP" required>
        </div>

        <div class="form-group">
            <label>Alamat Tempat Tinggal</label>
            <input type="text" name="alamat" placeholder="Masukkan alamat lengkap" required>
        </div>

        <div class="form-group">
            <label>Buat Password</label>
            <input type="password" name="password" placeholder="Masukkan password" required>
        </div>

        <div class="form-group">
            <label>Jabatan Komsel</label>
            <select name="jabatan_komsel">
                <option value="Anggota Komsel">Anggota Komsel</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>

        <div class="form-group">
            <label>Lokasi JC</label>
            <select name="lokasi_jc" id="jcSelect" onchange="generateNomorKomsel()">
                <option value="1">JC 1</option>
                <option value="2">JC 2</option>
                <option value="3">JC 3</option>
                <option value="4">JC 4</option>
                <option value="5">JC 5</option>
            </select>
        </div>

        <div class="form-group">
            <label>Golongan Darah</label>
            <select name="golongan_darah">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="AB">AB</option>
                <option value="O">O</option>
            </select>
        </div>

        <button type="submit" class="btn-submit">Daftar Sekarang</button>
    </form>
</div>

<script>
    function generateNomorKomsel() {
        const jcValue = document.getElementById('jcSelect').value;
        const nomorUrut = "001"; // Simulasi nomor urut
        const tahun = "2026";
        
        // Format: NK-PPP-(Nomor Urut)-(JC)-2026
        const formatNomor = `NK-PPP-${nomorUrut}-${jcValue}-${tahun}`;
        document.getElementById('nomorOtomatis').value = formatNomor;
    }

    // Load nomor otomatis saat pertama kali buka
    window.onload = generateNomorKomsel;
</script>

</body>
</html>
