<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrasi Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .reg-container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; margin-bottom: 20px; }
        .header-logo { text-align: center; margin-bottom: 15px; }
        .header-logo img { width: 60px; height: auto; }
        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h2 { margin: 0; font-size: 18px; color: #333; }
        .header-text p { margin: 5px 0 0; font-size: 13px; color: #666; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #444; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
        .form-group input:focus { border-color: #28a745; background: #fff; }
        .time-info { font-size: 11px; color: #dc3545; text-align: right; margin-bottom: 15px; font-weight: bold; }
        .btn-submit { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-back-login { display: block; text-align: center; text-decoration: none; color: #666; font-size: 14px; font-weight: bold; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        
        #blocking-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .modal-box i { font-size: 50px; color: #28a745; margin-bottom: 15px; }
        .password-container { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; }
        #nk-display { background: #fff3cd !important; border: 2px solid #ffc107 !important; color: #856404; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header-logo"><img src="logo_pondok.png" alt="Logo"></div>
    <div class="header-text">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <p>Formulir Pendaftaran Anggota</p>
    </div>

    <form id="formRegistrasi">
        <div class="time-info" id="current-time"></div>

        <div class="form-group"><label>Nama Lengkap</label><input type="text" id="nama" placeholder="Contoh: Boby Daniel" required></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Nomor HP / WhatsApp</label><input type="tel" id="hp" required></div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-container">
                <input type="password" id="pass" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIcon"></i>
            </div>
        </div>
        <div class="form-group"><label>Alamat Lengkap</label><textarea id="alamat" rows="2" required></textarea></div>
        
        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="darah" required>
                <option value="">-- Pilih --</option>
                <option value="A">A</option><option value="B">B</option>
                <option value="O">O</option><option value="AB">AB</option>
            </select>
        </div>

        <div class="form-group">
            <label>Jabatan</label>
            <select id="jabatan" required>
                <option value="">-- Pilih Jabatan --</option>
                <option value="Anggota">Anggota</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>

        <div class="form-group">
            <label>Komsel JC</label>
            <select id="komsel" required onchange="updateNKPreview()">
                <option value="">-- Pilih Lokasi JC --</option>
                <option value="1">JC 1</option><option value="2">JC 2</option>
                <option value="3">JC 3</option><option value="4">JC 4</option>
                <option value="5">JC 5</option>
            </select>
        </div>

        <div class="form-group" id="group-nk">
            <label>Nomor Komsel (NK) Otomatis</label>
            <input type="text" id="nk-display" readonly placeholder="Pilih Komsel Dahulu">
        </div>

        <button type="button" id="btnSubmit" onclick="handleRegistrasi()" class="btn-submit">DAFTAR SEKARANG</button>
        <a href="login.html" class="btn-back-login"><i class="fa-solid fa-arrow-left"></i> Kembali ke Login Page</a>
    </form>
</div>

<div id="blocking-message">
    <div class="modal-box">
        <i class="fa-solid fa-circle-check"></i>
        <p id="pesan-sukses">Data Berhasil Disimpan!</p>
        <button onclick="window.location.href='login.html'" class="btn-submit" style="background:#007bff">OK / LOGIN</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // 2. Real-time Clock
    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('current-time').innerText = now.toLocaleDateString('id-ID', options) + " WIT";
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 3. Password Toggle
    document.getElementById('eyeIcon').addEventListener('click', function() {
        const passInput = document.getElementById('pass');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // 4. Generate Auto NK
    async function updateNKPreview() {
        const jc = document.getElementById("komsel").value;
        const nkInput = document.getElementById("nk-display");
        if (!jc) return;
        nkInput.value = "Generating...";
        try {
            const snap = await db.collection("users").get();
            const formatUrutan = String(snap.size + 1).padStart(3, '0');
            nkInput.value = `NK-PPP-${formatUrutan}-JC${jc}-${new Date().getFullYear()}`;
        } catch (e) { nkInput.value = "Error koneksi"; }
    }

    // 5. Fungsi Registrasi (Proses Simpan Data)
    async function handleRegistrasi() {
        const btn = document.getElementById("btnSubmit");
        const nama = document.getElementById("nama").value;
        const email = document.getElementById("email").value.trim().toLowerCase();
        const hp = document.getElementById("hp").value;
        const pass = document.getElementById("pass").value;
        const alamat = document.getElementById("alamat").value;
        const darah = document.getElementById("darah").value; 
        const jabatan = document.getElementById("jabatan").value;
        const komsel = document.getElementById("komsel").value;
        const nk = document.getElementById("nk-display").value;

        if(!nama || !email || !hp || !darah || !pass || !komsel) {
            alert("Harap lengkapi semua data termasuk Golongan Darah!");
            return;
        }

        btn.innerText = "Memproses... (Mohon Tunggu)";
        btn.disabled = true;

        try {
            const userData = {
                nama: nama,
                email: email,
                whatsapp: hp,
                password: pass,
                alamat: alamat,
                goldarah: darah,
                jabatan: jabatan,
                komsel: komsel,
                nomor_komsel: nk,
                foto_profil: "", 
                status: "Aktif",
                tanggalDaftar: new Date().toLocaleString('id-ID')
            };

            // Simpan ke 'users'
            const userRef = await db.collection("users").add(userData);
            
            // Simpan ke 'Administrator'
            await db.collection("Administrator").doc("profile biodata")
                    .collection("daftar_anggota").doc(userRef.id).set(userData);
            
            document.getElementById('blocking-message').style.display = 'flex';
            
        } catch (error) { 
            alert("Gagal menyimpan data: " + error.message); 
            btn.innerText = "DAFTAR SEKARANG";
            btn.disabled = false;
        }
    }

    // 6. Fungsi Monitoring Statistik Real-time (DI LUAR handleRegistrasi)
    function monitorProfilDarah() {
        db.collection("users").onSnapshot((snapshot) => {
            let rekapDarah = { 'A': 0, 'B': 0, 'O': 0, 'AB': 0 };

            snapshot.forEach((doc) => {
                const data = doc.data();
                // Filter JC 5 (sesuai target kartu di gambar Anda)
                const jcInput = data.komsel ? data.komsel.toString().replace(/\D/g, "") : "";
                
                if (jcInput === "5") {
                    const gol = (data.goldarah || "").toUpperCase().trim();
                    if (rekapDarah.hasOwnProperty(gol)) {
                        rekapDarah[gol]++;
                    }
                }
            });

            // Update elemen teks di HTML
            updateElemenDarah('A', rekapDarah['A']);
            updateElemenDarah('B', rekapDarah['B']);
            updateElemenDarah('O', rekapDarah['O']);
            updateElemenDarah('AB', rekapDarah['AB']);
        });
    }

    function updateElemenDarah(tipe, jumlah) {
        const el = document.getElementById('count-' + tipe.toLowerCase());
        if (el) { el.innerText = jumlah + " Orang"; }
    }

    // Jalankan monitoring saat halaman terbuka
    monitorProfilDarah();

</script>
</body>
</html>
