<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* TOMBOL KEMBALI KE LOGIN (SESUAI GAMBAR) */
        .nav-container { width: 100%; max-width: 450px; margin-bottom: 20px; text-align: left; }
        .btn-back { 
            background: #222; color: #fff; border: 2px solid #007bff; 
            padding: 10px 20px; border-radius: 50px; cursor: pointer; 
            text-decoration: none; font-size: 14px; font-weight: bold; 
            display: inline-flex; align-items: center; gap: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
        }

        .reg-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 25px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 20px; text-transform: uppercase; }
        .header p { color: #666; font-size: 13px; margin-top: 5px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-text { text-align: center; margin-top: 20px; font-size: 13px; }
        .footer-text a { color: #007bff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN</a>
    </div>

    <div class="reg-card">
        <div class="header">
            <img src="logo_ppp.png" alt="Logo">
            <h2>PONDOK PEMULIHAN PAPUA</h2>
            <p>Pendaftaran Anggota Komsel JC</p>
        </div>

        <form id="regForm" onsubmit="prosesDaftar(event)">
            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="reg_nama" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="reg_email" required></div>
            <div class="form-group"><label>Nomor HP / WhatsApp</label><input type="number" id="reg_hp" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="reg_pass" required></div>
            <div class="form-group"><label>Alamat</label><input type="text" id="reg_alamat" required></div>
            
            <div class="form-group">
                <label>Jabatan</label>
                <select id="reg_jabatan" required>
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Anggota Komsel">Anggota Komsel</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Komsel JC</label>
                <select id="reg_jc" required>
                    <option value="">-- Pilih Lokasi JC --</option>
                    <option value="1">JC 1</option><option value="2">JC 2</option><option value="3">JC 3</option>
                    <option value="4">JC 4</option><option value="5">JC 5</option>
                </select>
            </div>

            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="reg_goldar" required>
                    <option value="">-- Pilih --</option>
                    <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>

        <div class="footer-text">Sudah punya akun? <a href="index.html">Masuk di sini</a></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.firebasestorage.app",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function prosesDaftar(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Memproses...";
            btn.disabled = true;

            const email = document.getElementById('reg_email').value.trim();
            const hp = document.getElementById('reg_hp').value.trim();

            try {
                // 1. Cek Duplikat
                const snapshotEmail = await db.collection("users").where("email", "==", email).get();
                if (!snapshotEmail.empty) { alert("❌ Email sudah terdaftar!"); return resetBtn(); }

                const snapshotHp = await db.collection("users").where("no_hp", "==", hp).get();
                if (!snapshotHp.empty) { alert("❌ Nomor anda sudah pernah didaftarkan pada sistem!"); return resetBtn(); }

                // 2. NOMOR KOMSEL (NK) OTOMATIS
                const jc = document.getElementById('reg_jc').value;
                const total = await db.collection("users").get();
                const urutan = String(total.size + 1).padStart(3, '0');
                const tahun = new Date().getFullYear();
                const nk = `NK-PPP-${urutan}-JC${jc}-${tahun}`;

                // 3. Simpan
                await db.collection("users").add({
                    nama: document.getElementById('reg_nama').value,
                    email: email,
                    no_hp: hp,
                    password: document.getElementById('reg_pass').value,
                    alamat: document.getElementById('reg_alamat').value,
                    jabatan: document.getElementById('reg_jabatan').value,
                    komsel: jc,
                    gol_darah: document.getElementById('reg_goldar').value,
                    nomor_komsel: nk, // NK Tersimpan Otomatis
                    tanggal_daftar: new Date().toISOString()
                });

                alert("✅ BERHASIL!\nNK Anda: " + nk);
                window.location.href = "index.html";

            } catch (err) { alert("🚨 Error: " + err.message); resetBtn(); }
        }

        function resetBtn() {
            const btn = document.getElementById('btnSubmit');
            btn.innerText = "DAFTAR SEKARANG";
            btn.disabled = false;
        }
    </script>
</body>
</html>
