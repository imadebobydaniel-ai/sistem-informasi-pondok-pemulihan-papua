<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .reg-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        .header img { width: 80px; margin-bottom: 10px; }
        .header h2 { margin: 0; color: #333; font-size: 20px; text-transform: uppercase; }
        
        .photo-container { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .photo-circle { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #00ff88; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f8f9fa; cursor: pointer; }
        #img-prev { width: 100%; height: 100%; object-fit: cover; display: none; }
        .photo-circle i { font-size: 40px; color: #ccc; }
        .pencil-icon { position: absolute; bottom: 5px; right: 5px; background: #007bff; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid white; font-size: 14px; cursor: pointer; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .nk-display { background-color: #eefbff; border: 1.5px solid #007bff !important; color: #007bff; font-weight: bold; text-align: center; }
        /* Style tambahan untuk info otomatis agar user tahu waktu dicatat sistem */
        .info-otomatis { font-size: 11px; color: #27ae60; font-style: italic; margin-top: -10px; margin-bottom: 10px; display: block; }
        
        .btn-submit { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-action { margin-top: 20px; text-align: center; }
        .btn-kembali { background: #222; color: #fff; padding: 10px 25px; border-radius: 50px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="header">
            <img src="logo_pondok.png" alt="Logo">
            <h2>PONDOK PEMULIHAN PAPUA</h2>
            <p>Formulir Pendaftaran Anggota Baru</p>
        </div>

        <div class="photo-container" onclick="document.getElementById('inp-foto').click()">
            <div class="photo-circle">
                <i class="fa-solid fa-user" id="icon-user"></i>
                <img id="img-prev" src="" alt="Preview">
            </div>
            <div class="pencil-icon"><i class="fa-solid fa-pencil"></i></div>
            <input type="file" id="inp-foto" accept="image/*" style="display: none;" onchange="previewFoto(this)">
        </div>

        <form id="regForm" onsubmit="prosesDaftar(event)">
            <div class="form-group">
                <label>Nomor Komsel (NK) - Otomatis</label>
                <input type="text" id="reg_nk" class="nk-display" placeholder="Pilih JC untuk generate NK..." readonly>
            </div>

            <span class="info-otomatis"><i class="fa-solid fa-clock"></i> Tanggal & Jam Daftar akan tercatat otomatis saat disimpan</span>

            <div class="form-group"><label>Nama Lengkap</label><input type="text" id="reg_nama" required></div>
            <div class="form-group"><label>Email</label><input type="email" id="reg_email" required></div>
            <div class="form-group"><label>Nomor HP / WhatsApp</label><input type="number" id="reg_hp" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="reg_pass" required></div>
            
            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea id="reg_alamat" rows="2" required placeholder="Jl. Raya Abepura No. 10"></textarea>
            </div>

            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="reg_goldar" required>
                    <option value="">-- Pilih --</option>
                    <option value="A">A</option><option value="B">B</option><option value="AB">AB</option><option value="O">O</option>
                </select>
            </div>

            <div class="form-group">
                <label>Komsel JC</label>
                <select id="reg_jc" required onchange="generateNK()">
                    <option value="">-- Pilih Lokasi JC --</option>
                    <option value="JC1">JC 1</option><option value="JC2">JC 2</option><option value="JC3">JC 3</option><option value="JC4">JC 4</option><option value="JC5">JC 5</option>
                </select>
            </div>

            <div class="form-group">
                <label>Jabatan Komsel</label>
                <select id="reg_jabatan" required>
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                    <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
                    <option value="Anggota Komsel">Anggota Komsel</option>
                </select>
            </div>

            <button type="submit" id="btnSubmit" class="btn-submit">DAFTAR SEKARANG</button>
        </form>

        <div class="footer-action">
            <a href="index.html" class="btn-kembali"><i class="fa-solid fa-circle-arrow-left"></i> KEMBALI KE LOGIN</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
            authDomain: "boby-apps-project.firebaseapp.com",
            projectId: "boby-apps-project",
            storageBucket: "boby-apps-project.appspot.com",
            messagingSenderId: "125984859692",
            appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let fotoData = ""; 

        function previewFoto(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    fotoData = e.target.result;
                    document.getElementById('img-prev').src = fotoData;
                    document.getElementById('img-prev').style.display = "block";
                    document.getElementById('icon-user').style.display = "none";
                }
                reader.readAsDataURL(file);
            }
        }

        async function generateNK() {
            const jc = document.getElementById('reg_jc').value;
            if (!jc) return;
            const snap = await db.collection("users").get();
            const urutan = String(snap.size + 1).padStart(3, '0');
            document.getElementById('reg_nk').value = `NK-PPP-${urutan}-${jc}-2026`;
        }

        async function prosesDaftar(e) {
            e.preventDefault();
            if (!fotoData) { alert("Foto profil wajib diunggah!"); return; }

            const btn = document.getElementById('btnSubmit');
            btn.innerText = "Mendaftarkan...";
            btn.disabled = true;

            try {
                // Sesuai perintah: Menambahkan field tanggal pendaftaran secara otomatis ke Firebase
                await db.collection("users").add({
                    nama: document.getElementById('reg_nama').value,
                    email: document.getElementById('reg_email').value,
                    no_hp: document.getElementById('reg_hp').value,
                    password: document.getElementById('reg_pass').value,
                    alamat: document.getElementById('reg_alamat').value,
                    gol_darah: document.getElementById('reg_goldar').value,
                    komsel: document.getElementById('reg_jc').value,
                    jabatan: document.getElementById('reg_jabatan').value,
                    nomor_komsel: document.getElementById('reg_nk').value,
                    fotoUrl: fotoData,
                    // FIELD OTOMATIS: Tercatat di Firebase tanpa input manual
                    tanggal_daftar: firebase.firestore.FieldValue.serverTimestamp() 
                });

                alert("Pendaftaran Berhasil!");
                window.location.href = "index.html";
            } catch (err) {
                alert("Gagal: " + err.message);
                btn.disabled = false;
                btn.innerText = "DAFTAR SEKARANG";
            }
        }
    </script>
</body>
</html>
