<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrasi Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .reg-container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; margin-bottom: 20px; }
        .header-logo { text-align: center; margin-bottom: 15px; }
        .header-logo img { width: 60px; height: auto; }
        .header-text { text-align: center; margin-bottom: 20px; }
        .header-text h2 { margin: 0; font-size: 18px; color: #333; }
        .header-text p { margin: 5px 0 0; font-size: 13px; color: #666; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; color: #444; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
        .form-group input:focus { border-color: #28a745; background: #fff; }
        .time-info { font-size: 11px; color: #dc3545; text-align: right; margin-bottom: 15px; font-weight: bold; }
        .btn-submit { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        .btn-back-login { display: block; text-align: center; text-decoration: none; color: #666; font-size: 14px; font-weight: bold; padding: 10px; border: 1px solid #ddd; border-radius: 10px; }
        .login-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        #blocking-message { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 100%; }
        .modal-box i { font-size: 50px; color: #28a745; margin-bottom: 15px; }
        .modal-box p { font-size: 16px; font-weight: bold; color: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="reg-container">
    <div class="header-logo"><img src="logo_pondok.png" alt="Logo"></div>
    <div class="header-text">
        <h2 id="form-title">PONDOK PEMULIHAN PAPUA</h2>
        <p id="form-subtitle">Formulir Pendaftaran Anggota</p>
    </div>

    <form id="formRegistrasi">
        <div class="time-info" id="current-time">Rabu, 18 Maret 2026 pukul 16.56.24 WIT</div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Nomor HP / WhatsApp</label>
            <input type="tel" id="hp" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="pass" required>
        </div>
        <div class="form-group">
            <label>Alamat Lengkap</label>
            <textarea id="alamat" rows="3" required></textarea>
        </div>
        <div class="form-group">
            <label>Golongan Darah</label>
            <select id="darah" required>
                <option value="">-- Pilih --</option>
                <option value="A">A</option><option value="B">B</option>
                <option value="O">O</option><option value="AB">AB</option>
            </select>
        </div>
        <div class="form-group">
            <label>Jabatan</label>
            <select id="jabatan" required>
                <option value="">-- Pilih Jabatan --</option>
                <option value="Anggota">Anggota</option>
                <option value="Ketua Komsel">Ketua Komsel</option>
            </select>
        </div>
        <div class="form-group">
            <label>Komsel JC</label>
            <select id="komsel" required>
                <option value="">-- Pilih Lokasi JC --</option>
                <option value="JC 1">JC 1</option><option value="JC 2">JC 2</option>
                <option value="JC 3">JC 3</option><option value="JC 4">JC 4</option>
                <option value="JC 5">JC 5</option>
            </select>
        </div>

        <button type="button" onclick="handleRegistrasi()" id="btn-submit-text" class="btn-submit">DAFTAR SEKARANG</button>
        <a href="login.html" class="btn-back-login" id="btn-back"><i class="fa-solid fa-arrow-left"></i> Kembali ke Login Page</a>
    </form>
</div>

<div id="blocking-message">
    <div class="modal-box">
        <i class="fa-solid fa-circle-check"></i>
        <p id="msg-text">Data Berhasil Disimpan!</p>
        <button onclick="redirectAfterSuccess()" class="btn-submit" style="background:#007bff">OK</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    const editID = localStorage.getItem("editMemberID");

    window.onload = async function() {
        if (editID) {
            document.getElementById("form-title").innerText = "EDIT DATA ANGGOTA";
            document.getElementById("btn-submit-text").innerText = "SIMPAN PERUBAHAN";
            document.getElementById("btn-back").innerHTML = '<i class="fa-solid fa-arrow-left"></i> Kembali ke Data Admin';
            document.getElementById("btn-back").href = "admin.html";
            
            try {
                const doc = await db.collection("users").doc(editID).get();
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById("nama").value = data.namaLengkap || "";
                    document.getElementById("email").value = data.email || "";
                    document.getElementById("hp").value = data.whatsapp || "";
                    document.getElementById("pass").value = data.password || "";
                    document.getElementById("alamat").value = data.alamat || "";
                    document.getElementById("darah").value = data.golDarah || "";
                    document.getElementById("jabatan").value = data.jabatan || "";
                    document.getElementById("komsel").value = data.komsel || "";
                }
            } catch (e) { console.error(e); }
        }
    };

    async function handleRegistrasi() {
        const userData = {
            namaLengkap: document.getElementById("nama").value,
            email: document.getElementById("email").value,
            whatsapp: document.getElementById("hp").value,
            password: document.getElementById("pass").value,
            alamat: document.getElementById("alamat").value,
            golDarah: document.getElementById("darah").value,
            jabatan: document.getElementById("jabatan").value,
            komsel: document.getElementById("komsel").value
        };

        try {
            if (editID) {
                await db.collection("users").doc(editID).update(userData);
            } else {
                await db.collection("users").add({ ...userData, tanggalDaftar: new Date().toLocaleDateString() });
            }
            document.getElementById('blocking-message').style.display = 'flex';
        } catch (error) { alert("Error: " + error.message); }
    }

    function redirectAfterSuccess() {
        if (editID) { localStorage.removeItem("editMemberID"); window.location.href = 'admin.html'; }
        else { window.location.href = 'login.html'; }
    }
</script>
</body>
</html>
