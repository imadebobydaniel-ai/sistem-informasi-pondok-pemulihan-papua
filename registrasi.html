<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Anggota - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .reg-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin: auto; text-align: center; position: relative; }
        .logo { width: 70px; margin-bottom: 10px; }
        h2 { margin: 5px 0; font-size: 18px; color: #333; text-transform: uppercase; }
        
        form { text-align: left; margin-top: 20px; }
        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        /* Tombol Kembali */
        .btn-back { position: absolute; top: 20px; left: 20px; text-decoration: none; color: #333; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        /* Style Simbol Mata */
        .toggle-password { 
            position: absolute; 
            right: 12px; 
            top: 35px; 
            cursor: pointer; 
            color: #999; 
            font-size: 16px;
        }

        .btn-reg { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .footer-link { margin-top: 20px; font-size: 13px; color: #666; display: block; text-decoration: none; }
        .footer-link b { color: #007bff; }
    </style>
</head>
<body>

    <div class="reg-card">
        <a href="index.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> KEMBALI</a>

        <img src="logo_pondok.png" alt="Logo" class="logo">
        <h2>PONDOK PEMULIHAN PAPUA</h2>
        <p style="font-size: 14px; color: #666;">Formulir Pendaftaran Anggota</p>

        <form id="regForm">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="reg_nama" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg_email" required>
            </div>

            <div class="form-group">
                <label>Nomor HP / WhatsApp</label>
                <input type="tel" id="reg_wa" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg_password" required>
                <i class="fa-solid fa-eye toggle-password" id="eyeIconReg" onclick="togglePassReg()"></i>
            </div>

            <div class="form-group">
                <label>Alamat Lengkap</label>
                <textarea id="reg_alamat" rows="2" required></textarea>
            </div>

            <div class="form-group">
                <label>Golongan Darah</label>
                <select id="reg_gol_darah">
                    <option value="">-- Pilih --</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="AB">AB</option>
                    <option value="O">O</option>
                </select>
            </div>

            <div class="form-group">
                <label>Jabatan</label>
                <select id="reg_jabatan" required>
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Anggota Komsel">Anggota Komsel</option>
                    <option value="Wakil Ketua Komsel">Wakil Ketua Komsel</option>
                    <option value="Ketua Komsel">Ketua Komsel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Komsel JC</label>
                <select id="reg_komsel">
                    <option value="">-- Pilih Lokasi JC --</option>
                    <option value="JC1">JC 1</option>
                    <option value="JC2">JC 2</option>
                    <option value="JC3">JC 3</option>
                    <option value="JC4">JC 4</option>
                    <option value="JC5">JC 5</option>
                </select>
            </div>

            <button type="submit" class="btn-reg">DAFTAR SEKARANG</button>
        </form>

        <a href="index.html" class="footer-link">Sudah punya akun? <b>Login Disini</b></a>
    </div>

    <script>
        function togglePassReg() {
            const passInput = document.getElementById('reg_password');
            const eyeIcon = document.getElementById('eyeIconReg');

            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Sistem internal pendaftaran
            console.log("Proses registrasi...");
        });
    </script>
</body>
</html>
