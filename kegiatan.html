<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Under Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        h2 { color: #0d9488; font-weight: 900; margin: 10px 0; }
        p { color: #64748b; font-size: 14px; max-width: 280px; margin-bottom: 20px; }
        .loader-bar { width: 150px; height: 4px; background: #e2e8f0; border-radius: 10px; overflow: hidden; }
        .loader-fill { width: 40%; height: 100%; background: #0d9488; animation: move 2s infinite ease-in-out; }
        @keyframes move { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }
        .btn-back { margin: 20px; background: #1e293b; color: white; padding: 16px; border-radius: 15px; text-decoration: none; text-align: center; font-weight: 800; font-size: 14px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>
    <div class="content">
        <lottie-player src="https://assets2.lottiefiles.com/packages/lf20_at6p77j3.json" background="transparent" speed="1" style="width: 250px; height: 250px;" loop autoplay></lottie-player>
        <h2>UNDER CONSTRUCTION</h2>
        <p>Sistem jadwal kegiatan Tahunan sedang dalam proses pembangunan gedung digital.</p>
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <div style="margin-top: 15px; font-size: 11px; font-weight: bold; color: #0d9488; text-transform: uppercase;">
            <i class="fas fa-hammer"></i> Sedang Membangun Gereja...
        </div>
    </div>
    <a href="menu.html" class="btn-back"><i class="fas fa-arrow-left"></i> KEMBALI KE PANEL UTAMA</a>
</body>
</html>
