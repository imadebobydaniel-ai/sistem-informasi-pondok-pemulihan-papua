<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Pope - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --emas: #D4AF37;
            --putih: #ffffff;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; background: var(--putih); padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--emas); }
        
        h3 { color: var(--biru-tua); margin-bottom: 20px; text-transform: uppercase; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .user-box { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; border: 1px solid #ddd; }
        .user-box div { font-size: 13px; color: #555; margin-bottom: 5px; }
        .user-box b { color: var(--biru-tua); }

        select, textarea { 
            width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; 
            margin-bottom: 15px; font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;
        }
        textarea { height: 160px; resize: none; background: #fafafa; }
        
        .btn-kirim { 
            width: 100%; background: var(--biru-tua); color: white; border: none; 
            padding: 15px; border-radius: 12px; font-weight: bold; font-size: 16px; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-kirim:hover { background: #002244; transform: translateY(-2px); }
        .btn-kirim:disabled { background: #ccc; cursor: not-allowed; }

        .btn-back { display: block; margin-top: 20px; text-decoration: none; color: #888; font-size: 13px; }

        #success-screen { display: none; }
        .icon-check { font-size: 50px; color: #28a745; margin-bottom: 15px; }
        
        .ticket-display {
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            margin: 20px 0; 
            border: 2px dashed var(--emas);
        }
    </style>
</head>
<body>

<div class="container">
    <div id="form-screen">
        <h3><i class="fa-solid fa-laptop-code"></i> Halo Pope</h3>
        
        <div class="user-box">
            <div>Pengirim: <b id="txt-nama">Memuat...</b></div>
            <div>Komsel: <b id="txt-komsel">Memuat...</b></div>
        </div>

        <select id="kategori-tiket">
            <option value="Permohonan Doa">🙏 Permohonan Doa</option>
            <option value="Pelayanan & Kunjungan Pastoral">🏠 Pelayanan & Kunjungan Pastoral</option>
            <option value="Pelayanan Duka">🕊️ Pelayanan Duka</option>
            <option value="Appointment">📅 Appointment</option>
            <option value="Konseling">🤝 Konseling / Keluarga</option>
            <option value="Laporan Masalah">⚠️ Masalah Aplikasi</option>
            <option value="Saran/Masukan">💡 Saran & Masukan</option>
        </select>

        <textarea id="pesan-tiket" placeholder="Sampaikan pesan Anda di sini... &#10;&#10;Contoh: &#10;Perihal: Perlu Konseling Pernikahan&#10;Ditujukan Kepada: Koordinator PKS"></textarea>

        <button class="btn-kirim" onclick="kirimTiket()" id="btn-submit">
            <i class="fa-solid fa-paper-plane"></i> KIRIM KE POPE
        </button>

        <a href="menu.html" class="btn-back"><i class="fa-solid fa-chevron-left"></i> Kembali ke Menu</a>
    </div>

    <div id="success-screen">
        <i class="fa-solid fa-circle-check icon-check"></i>
        <h2 style="color: var(--biru-tua);">Pesan Terkirim!</h2>
        
        <div class="ticket-display">
            <span style="font-size: 12px; color: #666;">Nomor Tiket Halo Pope:</span><br>
            <b id="display-nomor-tiket" style="font-size: 20px; color: var(--biru-tua); letter-spacing: 1px;">-</b>
        </div>

        <p style="color: #666; font-size: 14px; line-height: 1.5;">
            Shalom! Pesan Anda telah kami terima melalui sistem Halo Pope. <br>
            Konfirmasi otomatis akan segera muncul di WhatsApp Anda.
        </p>
        <p style="font-size: 12px; color: var(--emas); font-weight: bold;">Kembali ke menu dalam 5 detik...</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = function() {
        const email = localStorage.getItem("userEmail");
        if (!email) { window.location.href = "index.html"; return; }

        db.collection("users").where("email", "==", email).get().then((snap) => {
            if (!snap.empty) {
                const user = snap.docs[0].data();
                document.getElementById('txt-nama').innerText = user.nama;
                document.getElementById('txt-komsel').innerText = "JC " + (user.komsel || "Pusat");
            }
        });
    };

    async function kirimTiket() {
        const pesan = document.getElementById('pesan-tiket').value.trim();
        const kategori = document.getElementById('kategori-tiket').value;
        const btn = document.getElementById('btn-submit');
        const email = localStorage.getItem("userEmail");
        
        const nama = document.getElementById('txt-nama').innerText;
        const komsel = document.getElementById('txt-komsel').innerText;

        if (!pesan || nama === "Memuat...") {
            return alert("Mohon tuliskan isi pesan atau permohonan Anda!");
        }

        btn.disabled = true;
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Mengirim...";

        try {
            const now = new Date();
            const tahun = now.getFullYear();
            const hariNama = now.toLocaleDateString('id-ID', { weekday: 'long' });
            const tglLengkap = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            const jamLengkap = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            
            const randomNum = Math.floor(100 + Math.random() * 900);
            const nomorTiket = `POPE-${randomNum}-${tahun}`;

            await db.collection("saran_masukan").add({
                nomor_tiket: nomorTiket,         
                nama: nama,                      
                email: email,                    
                jc: komsel,                      
                kategori: kategori,              
                isi_saran: pesan,                
                status: "proses",                
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                tanggal_kirim: `${hariNama}, ${tglLengkap}`,
                jam_kirim: jamLengkap,
                sla_days: 0                      
            });

            document.getElementById('display-nomor-tiket').innerText = nomorTiket;
            document.getElementById('form-screen').style.display = "none";
            document.getElementById('success-screen').style.display = "block";

            const formatPesanWA = `Halo Admin, saya baru saja mengirim pesan melalui *Halo Pope* Pondok Pemulihan Papua.\n\n` +
                                  `📌 *DETAIL LAYANAN*:\n` +
                                  `- Nomor Tiket: *${nomorTiket}*\n` +
                                  `- Kategori: *${kategori}*\n` +
                                  `- Waktu: ${hariNama}, ${tglLengkap} | ${jamLengkap}\n` +
                                  `- Pengirim: ${nama} (${komsel})\n\n` +
                                  `📝 *ISI PESAN*:\n${pesan}\n\n` +
                                  `Mohon bantuan Bapak/Ibu Admin untuk menindaklanjuti. Terima kasih, GBU!`;

            const linkWA = `https://api.whatsapp.com/send?text=${encodeURIComponent(formatPesanWA)}`;
            
            setTimeout(() => {
                window.open(linkWA, '_blank');
                window.location.href = "menu.html"; 
            }, 5000);

        } catch (error) {
            console.error("Gagal:", error);
            alert("Terjadi kesalahan sistem. Mohon coba lagi nanti.");
            btn.disabled = false;
            btn.innerHTML = "<i class='fa-solid fa-paper-plane'></i> KIRIM KE POPE";
        }
    }
</script>
</body>
</html>
