<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366; --biru-safir: #0056b3; --merah-notif: #e11d48;
            --hijau-zamrud: #2ecc71; --putih-bg: #f4f7fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--merah-notif); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-send { background: var(--merah-notif); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Proteksi Overlay */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--biru-tua); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: white; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; }

        /* Notification Modal */
        .notification-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 51, 102, 0.85);
            z-index: 9999; align-items: center; justify-content: center;
        }
        .notification-block { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 320px; width: 90%; }
        
        /* History Accordion */
        .accordion-item { background: white; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
        .accordion-header { padding: 15px; background: #fff5f5; cursor: pointer; display: flex; justify-content: space-between; border-left: 5px solid var(--merah-notif); }
        .accordion-content { padding: 15px; display: none; background: #fff; border-top: 1px solid #eee; font-size: 13px; }
        .accordion-content.active { display: block; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: var(--merah-notif); margin-bottom: 15px;"></i>
        <h3>Akses Terbatas</h3>
        <p style="font-size: 13px; color: #666;">Silakan masukkan password Admin/PKS</p>
        <input type="password" id="pass-input" placeholder="Masukkan Password" style="margin-bottom: 15px; text-align: center;">
        <button class="btn-send" onclick="cekAkses()">MASUK PORTAL</button>
        <a href="menu.html" style="display:block; margin-top:15px; color:#666; text-decoration:none; font-size:13px;">Kembali</a>
    </div>
</div>

<div id="custom-modal" class="notification-overlay">
    <div class="notification-block">
        <i id="modal-icon" class="fa-solid fa-circle-info" style="font-size: 45px; margin-bottom: 15px; display: block;"></i>
        <h3 id="modal-title">Notifikasi</h3>
        <p id="modal-msg">Pesan...</p>
        <div id="modal-buttons" style="display: flex; gap: 10px; justify-content: center;"></div>
    </div>
</div>

<div class="container">
    <h2 id="form-title"><i class="fa-solid fa-bullhorn"></i> Info Kegiatan Baru</h2>
    
    <div class="form-group">
        <label>Kategori</label>
        <select id="kategori">
            <option value="Ibadah">Ibadah Komsel</option>
            <option value="Penting">Pesan Penting</option>
            <option value="Sosialisasi">Sosialisasi</option>
        </select>
    </div>

    <div class="form-group">
        <label>Judul</label>
        <input type="text" id="judul" placeholder="Judul informasi">
    </div>

    <div class="form-group">
        <label>Lokasi</label>
        <input type="text" id="lokasi" placeholder="Lokasi kegiatan">
    </div>

    <div class="form-group">
        <label>Detail</label>
        <textarea id="detail" rows="4" placeholder="Detail pengumuman"></textarea>
    </div>

    <button class="btn-send" id="btn-submit" onclick="prosesData()">
        <i class="fa-solid fa-paper-plane"></i> <span id="btn-text">KIRIM SEKARANG</span>
    </button>
    
    <button id="btn-cancel-edit" style="display:none; background:#666; margin-top:10px;" class="btn-send" onclick="resetForm()">BATAL EDIT</button>

    <div class="history-section" style="margin-top:30px;">
        <h3>Riwayat</h3>
        <div id="list-pengumuman">Memuat...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let editID = null;

    // PASSWORD
    const PASS_ADMIN = "bukadong821";
    const PASS_PKS = "PKS";

    // 1. FUNGSI PROTEKSI UTAMA (Security Guard)
    function proteksiAktif() {
        const status = sessionStorage.getItem("akses_komsel");
        if (status !== "true") {
            document.getElementById('login-overlay').style.display = 'flex';
            return false;
        }
        document.getElementById('login-overlay').style.display = 'none';
        return true;
    }

    // 2. CEK AKSES SAAT LOGIN
    function cekAkses() {
        const input = document.getElementById('pass-input').value;
        if (input === PASS_ADMIN || input === PASS_PKS) {
            sessionStorage.setItem("akses_komsel", "true");
            proteksiAktif(); // Sembunyikan overlay
            showCustomNotif("Berhasil Masuk", "fa-user-check");
        } else {
            sessionStorage.removeItem("akses_komsel"); // Hapus jika salah
            alert("Password Salah!");
        }
    }

    // 3. FUNGSI KIRIM/EDIT DATA
    async function prosesData() {
        if (!proteksiAktif()) return; // CEK SEBELUM KIRIM

        const kategori = document.getElementById('kategori').value;
        const judul = document.getElementById('judul').value;
        const lokasi = document.getElementById('lokasi').value;
        const detail = document.getElementById('detail').value;

        if(!judul || !detail) {
            alert("Harap isi Judul dan Detail!");
            return;
        }

        try {
            const dataObj = { kategori, judul, lokasi, detail, lastUpdate: firebase.firestore.FieldValue.serverTimestamp() };
            if (editID) {
                await db.collection("pengumuman_komsel").doc(editID).update(dataObj);
            } else {
                dataObj.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("pengumuman_komsel").add(dataObj);
            }
            resetForm();
            showCustomNotif("Data Berhasil Disimpan", "fa-check");
        } catch (e) {
            alert("Gagal: " + e.message);
        }
    }

    // 4. FUNGSI HAPUS (DIPROTEKSI)
    async function hapusInfo(id) {
        if (!proteksiAktif()) return;
        if (confirm("Hapus pengumuman ini?")) {
            await db.collection("pengumuman_komsel").doc(id).delete();
            showCustomNotif("Data Dihapus", "fa-trash");
        }
    }

    // 5. FUNGSI LOAD DATA & EDIT
    function loadHistory() {
        db.collection("pengumuman_komsel").orderBy("lastUpdate", "desc").onSnapshot(snap => {
            const listDiv = document.getElementById('list-pengumuman');
            listDiv.innerHTML = "";
            snap.forEach
