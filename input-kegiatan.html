<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --biru-tua: #003366; --merah-notif: #e11d48; --putih-bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--merah-notif); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-send { background: var(--merah-notif); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        /* Riwayat Informasi Styling */
        .history-item { background: #fff; border-left: 5px solid var(--merah-notif); padding: 15px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-item h4 { margin: 0 0 5px 0; color: var(--merah-notif); }
        .history-item p { margin: 5px 0; font-size: 14px; color: #333; }
        .history-item .meta { font-size: 11px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-bullhorn"></i> Info Kegiatan Baru</h2>
    
    <div class="form-group">
        <label>Kategori Kegiatan</label>
        <select id="kategori">
            <option value="Ibadah">Ibadah Komsel</option>
            <option value="Penting">Pesan Penting</option>
            <option value="Sosialisasi">Sosialisasi</option>
        </select>
    </div>

    <div class="form-group">
        <label>Judul Informasi</label>
        <input type="text" id="judul" placeholder="Contoh: Perubahan Jam Ibadah">
    </div>

    <div class="form-group">
        <label>Lokasi (Opsional)</label>
        <input type="text" id="lokasi" placeholder="Contoh: di rumah Boby">
    </div>

    <div class="form-group">
        <label>Detail Informasi</label>
        <textarea id="detail" rows="4" placeholder="Tuliskan detail pengumuman di sini..."></textarea>
    </div>

    <button class="btn-send" onclick="prosesData()">
        <i class="fa-solid fa-paper-plane"></i> KIRIM SEKARANG
    </button>

    <div style="margin-top: 30px;">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Informasi</h3>
        <div id="list-pengumuman">Memuat data...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // 1. CONFIG FIREBASE ANDA
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. FUNGSI KIRIM (PASSWORD BARU MUNCUL DI SINI)
    async function prosesData() {
        const judul = document.getElementById('judul').value;
        const detail = document.getElementById('detail').value;

        if(!judul || !detail) {
            alert("Judul dan Detail tidak boleh kosong!");
            return;
        }

        // MUNCULKAN KOTAK PASSWORD SAAT KLIK KIRIM
        const passwordInput = prompt("Data siap dikirim. Masukkan password Admin/PKS:");

        if (passwordInput === "bukadong821" || passwordInput === "PKS") {
            try {
                await db.collection("pengumuman_komsel").add({
                    kategori: document.getElementById('kategori').value,
                    judul: judul,
                    lokasi: document.getElementById('lokasi').value,
                    detail: detail,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
                });
                alert("✅ Berhasil! Informasi telah diterbitkan.");
                location.reload(); // Refresh halaman agar form bersih
            } catch (error) {
                alert("Gagal mengirim ke database: " + error.message);
            }
        } else if (passwordInput !== null) {
            alert("⚠️ Password SALAH! Akses ditolak.");
        }
    }

    // 3. MENAMPILKAN RIWAYAT
    function loadHistory() {
        db.collection("pengumuman_komsel").orderBy("lastUpdate", "desc").onSnapshot(snap => {
            const listDiv = document.getElementById('list-pengumuman');
            listDiv.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const tgl = d.lastUpdate ? new Date(d.lastUpdate.seconds * 1000).toLocaleString('id-ID') : 'Baru saja';
                
                listDiv.innerHTML += `
                    <div class="history-item">
                        <h4>[${d.kategori}] ${d.judul}</h4>
                        <p><i class="fa-solid fa-location-dot"></i> ${d.lokasi || '-'}</p>
                        <p>${d.detail}</p>
                        <div class="meta">${tgl}</div>
                    </div>`;
            });
        });
    }

    // Jalankan load riwayat saat halaman dibuka
    window.onload = loadHistory;
</script>

</body>
</html>
