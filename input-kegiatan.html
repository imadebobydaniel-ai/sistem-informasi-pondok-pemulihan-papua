<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --merah-notif: #e11d48;
            --hijau-zamrud: #2ecc71;
            --putih-bg: #f4f7fa;
            --emas-lux: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--merah-notif); }
        h2 { color: var(--biru-tua); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        
        .btn-send { background: var(--merah-notif); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-send:active { transform: scale(0.95); }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: var(--biru-tua); text-decoration: none; font-weight: bold; font-size: 14px; }

        .history-section { margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .info-card { background: #fff5f5; border-left: 5px solid var(--merah-notif); padding: 15px; border-radius: 10px; margin-bottom: 15px; position: relative; }
        .info-card h4 { margin: 0; color: var(--merah-notif); padding-right: 60px; font-size: 16px; }
        .info-card p { margin: 5px 0; font-size: 13px; line-height: 1.4; }
        .timestamp { font-size: 11px; color: #999; font-style: italic; display: block; margin-top: 8px; }
        
        .card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 12px; }
        .action-btn { cursor: pointer; font-size: 16px; transition: 0.2s; }
        .edit-btn { color: var(--biru-safir); }
        .delete-btn { color: #ccc; }
        .delete-btn:hover { color: var(--merah-notif); }

        .notification-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 51, 102, 0.8);
            z-index: 9999; align-items: center; justify-content: center;
        }
        .notification-block {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 280px; border-top: 5px solid var(--emas-lux); animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="notif-container" class="notification-overlay">
    <div class="notification-block">
        <i id="notif-icon" class="fa-solid fa-circle-check" style="font-size: 40px; color: var(--hijau-zamrud); margin-bottom: 15px; display: block;"></i>
        <p id="notif-msg">Memproses...</p>
    </div>
</div>

<div class="container">
    <h2 id="form-title"><i class="fa-solid fa-bullhorn"></i> Info Kegiatan Baru</h2>
    
    <div class="form-group">
        <label>Kategori Kegiatan</label>
        <select id="kategori">
            <option value="Ibadah">Ibadah Komsel</option>
            <option value="Penting">Pesan Penting</option>
            <option value="Sosialisasi">Sosialisasi / Kerja Bakti</option>
            <option value="Latihan">Latihan Musik/Worship</option>
        </select>
    </div>

    <div class="form-group">
        <label>Judul Informasi</label>
        <input type="text" id="judul" placeholder="Contoh: Perubahan Jam Ibadah">
    </div>

    <div class="form-group">
        <label>Lokasi (Opsional)</label>
        <input type="text" id="lokasi" placeholder="Contoh: di rumah Boby">
    </div>

    <div class="form-group">
        <label>Detail Informasi</label>
        <textarea id="detail" rows="4" placeholder="Tuliskan detail pengumuman di sini..."></textarea>
    </div>

    <button class="btn-send" id="btn-submit" onclick="prosesData()">
        <i class="fa-solid fa-paper-plane"></i> <span id="btn-text">KIRIM SEKARANG</span>
    </button>
    
    <button id="btn-cancel-edit" style="display:none; background:#666; margin-top:10px;" class="btn-send" onclick="resetForm()">
        BATAL EDIT
    </button>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-circle-arrow-left"></i> Kembali ke Menu Utama</a>

    <div class="history-section">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Informasi</h3>
        <div id="list-pengumuman">Memuat data dari database...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389",
        measurementId: "G-X14300RJL4"
    };

    // INISIALISASI DENGAN PENGECEKAN
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase Berhasil Terhubung");
        }
        var db = firebase.firestore();
    } catch (e) {
        console.error("Gagal Inisialisasi Firebase:", e);
        document.getElementById('list-pengumuman').innerHTML = "Kesalahan Koneksi Database!";
    }

    let editID = null;

    async function prosesData() {
        const kategori = document.getElementById('kategori').value;
        const judul = document.getElementById('judul').value;
        const lokasi = document.getElementById('lokasi').value;
        const detail = document.getElementById('detail').value;

        if(!judul || !detail) { alert("Harap isi Judul dan Detail!"); return; }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;

        try {
            const dataObj = {
                kategori, judul, lokasi, detail,
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (editID) {
                await db.collection("pengumuman_komsel").doc(editID).update(dataObj);
                showCustomNotif("Berhasil Diupdate", "fa-pen-to-square");
            } else {
                dataObj.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("pengumuman_komsel").add(dataObj);
                showCustomNotif("Berhasil Dikirim", "fa-circle-check");
            }
            resetForm();
        } catch (e) {
            alert("Terjadi kesalahan: " + e.message);
            console.error(e);
        } finally {
            btn.disabled = false;
        }
    }

    function loadHistory() {
        console.log("Mulai memuat riwayat...");
        db.collection("pengumuman_komsel").orderBy("lastUpdate", "desc").limit(10).onSnapshot((snap) => {
            const listDiv = document.getElementById('list-pengumuman');
            if (snap.empty) {
                listDiv.innerHTML = "<p style='text-align:center;'>Belum ada riwayat.</p>";
                return;
            }
            listDiv.innerHTML = "";
            snap.forEach((doc) => {
                const d = doc.data();
                const t = d.lastUpdate ? d.lastUpdate.toDate().toLocaleString('id-ID') : 'Baru saja';
                const safeDetail = d.detail.replace(/`/g, '\\`');
                
                listDiv.innerHTML += `
                    <div class="info-card">
                        <div class="card-actions">
                            <i class="fa-solid fa-pen-to-square action-btn edit-btn" onclick="isiDataEdit('${doc.id}', '${d.kategori}', '${d.judul}', '${d.lokasi}', \`${safeDetail}\`)"></i>
                            <i class="fa-solid fa-trash action-btn delete-btn" onclick="hapusInfo('${doc.id}')"></i>
                        </div>
                        <h4>[${d.kategori}] ${d.judul}</h4>
                        <p><strong><i class="fa-solid fa-location-dot"></i></strong> ${d.lokasi || '-'}</p>
                        <p>${d.detail}</p>
                        <span class="timestamp">${t}</span>
                    </div>`;
            });
        }, (err) => {
            console.error("Error Snapshot:", err);
            document.getElementById('list-pengumuman').innerHTML = "Gagal memuat: " + err.message;
        });
    }

    function isiDataEdit(id, kat, jud, lok, det) {
        editID = id;
        document.getElementById('kategori').value = kat;
        document.getElementById('judul').value = jud;
        document.getElementById('lokasi').value = lok;
        document.getElementById('detail').value = det;
        document.getElementById('form-title').innerText = "Edit Informasi";
        document.getElementById('btn-text').innerText = "SIMPAN PERUBAHAN";
        document.getElementById('btn-cancel-edit').style.display = "block";
        window.scrollTo(0,0);
    }

    function resetForm() {
        editID = null;
        document.getElementById('judul').value = "";
        document.getElementById('lokasi').value = "";
        document.getElementById('detail').value = "";
        document.getElementById('form-title').innerText = "Info Kegiatan Baru";
        document.getElementById('btn-text').innerText = "KIRIM SEKARANG";
        document.getElementById('btn-cancel-edit').style.display = "none";
    }

    async function hapusInfo(id) {
        if(confirm("Hapus data ini?")) {
            await db.collection("pengumuman_komsel").doc(id).delete();
            showCustomNotif("Terhapus", "fa-trash");
        }
    }

    function showCustomNotif(m, i) {
        document.getElementById('notif-msg').innerText = m;
        document.getElementById('notif-icon').className = "fa-solid " + i;
        document.getElementById('notif-container').style.display = 'flex';
        setTimeout(() => { document.getElementById('notif-container').style.display = 'none'; }, 2000);
    }

    loadHistory();
</script>
</body>
</html>
