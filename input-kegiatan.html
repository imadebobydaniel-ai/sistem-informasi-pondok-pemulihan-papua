<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Kegiatan - Komsel JC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --biru-tua: #003366;
            --biru-safir: #0056b3;
            --merah-notif: #e11d48;
            --hijau-zamrud: #2ecc71;
            --putih-bg: #f4f7fa;
            --emas-lux: #d4af37;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--putih-bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--merah-notif); }
        h2 { color: var(--biru-tua); text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        
        .btn-send { background: var(--merah-notif); color: white; border: none; padding: 15px; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-send:active { transform: scale(0.95); }
        .btn-back { display: block; text-align: center; margin-top: 15px; color: var(--biru-tua); text-decoration: none; font-weight: bold; font-size: 14px; }

        /* Style untuk proteksi login */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--biru-tua); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 85%; max-width: 350px;
        }

        /* Style untuk Dropdown Riwayat (Accordion) */
        .history-section { margin-top: 30px; border-top: 2px dashed #ddd; padding-top: 20px; }
        .accordion-item {
            background: white; border: 1px solid #ddd;
            border-radius: 10px; margin-bottom: 8px; overflow: hidden;
        }
        .accordion-header {
            padding: 15px; background: #fff5f5; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 5px solid var(--merah-notif);
        }
        .accordion-header h4 { margin: 0; font-size: 14px; color: var(--biru-tua); flex: 1; }
        .accordion-content {
            padding: 15px; display: none; background: #fff;
            border-top: 1px solid #eee; font-size: 13px;
        }
        .accordion-content.active { display: block; }
        .chevron { transition: 0.3s; }
        .rotate { transform: rotate(180deg); }

        .timestamp { font-size: 11px; color: #999; font-style: italic; display: block; margin-top: 8px; }
        
        .notification-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0, 51, 102, 0.85);
            z-index: 9999; align-items: center; justify-content: center;
        }
        .notification-block {
            background: white; padding: 30px; border-radius: 20px; text-align: center;
            max-width: 320px; width: 90%; animation: slideIn 0.3s ease;
        }

        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <i class="fa-solid fa-lock" style="font-size: 40px; color: var(--merah-notif); margin-bottom: 15px;"></i>
        <h3>Akses Terbatas</h3>
        <p style="font-size: 13px; color: #666;">Masukkan Password Ketua Komsel / Admin</p>
        <input type="password" id="pass-input" placeholder="Masukkan Password" style="margin-bottom: 15px; text-align: center;">
        <button class="btn-send" onclick="cekAkses()">MASUK PORTAL</button>
        <a href="menu.html" class="btn-back">Kembali</a>
    </div>
</div>

<div id="custom-modal" class="notification-overlay">
    <div class="notification-block">
        <i id="modal-icon" class="fa-solid fa-circle-info" style="font-size: 45px; color: var(--biru-tua); margin-bottom: 15px; display: block;"></i>
        <h3 id="modal-title" style="margin: 0 0 10px 0; color: var(--biru-tua); font-size: 18px;">Notifikasi</h3>
        <p id="modal-msg" style="font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5;">Pesan di sini...</p>
        <div id="modal-buttons" style="display: flex; gap: 10px; justify-content: center;"></div>
    </div>
</div>

<div class="container">
    <h2 id="form-title"><i class="fa-solid fa-bullhorn"></i> Info Kegiatan Baru</h2>
    
    <div class="form-group">
        <label>Kategori Kegiatan</label>
        <select id="kategori">
            <option value="Ibadah">Ibadah Komsel</option>
            <option value="Penting">Pesan Penting</option>
            <option value="Sosialisasi">Sosialisasi / Kerja Bakti</option>
            <option value="Latihan">Latihan Musik/Worship</option>
        </select>
    </div>

    <div class="form-group">
        <label>Judul Informasi</label>
        <input type="text" id="judul" placeholder="Contoh: Perubahan Jam Ibadah">
    </div>

    <div class="form-group">
        <label>Lokasi (Opsional)</label>
        <input type="text" id="lokasi" placeholder="Contoh: di rumah Boby">
    </div>

    <div class="form-group">
        <label>Detail Informasi</label>
        <textarea id="detail" rows="4" placeholder="Tuliskan detail pengumuman di sini..."></textarea>
    </div>

    <button class="btn-send" id="btn-submit" onclick="prosesData()">
        <i class="fa-solid fa-paper-plane"></i> <span id="btn-text">KIRIM SEKARANG</span>
    </button>
    
    <button id="btn-cancel-edit" style="display:none; background:#666; margin-top:10px;" class="btn-send" onclick="resetForm()">
        BATAL EDIT
    </button>

    <a href="menu.html" class="btn-back"><i class="fa-solid fa-circle-arrow-left"></i> Kembali ke Menu Utama</a>

    <div class="history-section">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Riwayat Informasi</h3>
        <div id="list-pengumuman">Memuat data dari database...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script>
    // 1. KONFIGURASI FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        databaseURL: "https://boby-apps-project-default-rtdb.firebaseio.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.firebasestorage.app",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389",
        measurementId: "G-X14300RJL4"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    let editID = null;

    // 2. KONFIGURASI PASSWORD
    const PASS_ADMIN = "bukadong821";
    const PASS_PKS = "PKS"; 

    // 3. FUNGSI CEK AKSES (LOGIN)
    function cekAkses() {
        const passInput = document.getElementById('pass-input').value;

        if (passInput === PASS_ADMIN || passInput === PASS_PKS) {
            document.getElementById('login-overlay').style.display = 'none';
            sessionStorage.setItem("akses_komsel", "true");
            tampilkanModal({ 
                judul: "Akses Diberikan", 
                pesan: "Selamat datang, Anda login sebagai " + (passInput === PASS_ADMIN ? "Admin" : "Ketua Komsel"), 
                ikon: "fa-user-shield", 
                warnaIkon: "var(--biru-safir)",
                tipe: "toast" 
            });
        } else {
            tampilkanModal({ 
                judul: "Akses Ditolak", 
                pesan: "Password Salah! Hanya PKS dan Admin yang dapat masuk.", 
                ikon: "fa-circle-xmark", 
                warnaIkon: "var(--merah-notif)" 
            });
        }
    }

    // Jalankan cek status saat load halaman
    if (sessionStorage.getItem("akses_komsel") === "true") {
        document.getElementById('login-overlay').style.display = 'none';
    }

    // 4. FUNGSI PROSES DATA (KIRIM/EDIT) - VERSI PROTEKSI KETAT
    async function prosesData() {
        // --- PROTEKSI KETAT DI MULAI DI SINI ---
        const isLogin = sessionStorage.getItem("akses_komsel");
        
        if (isLogin !== "true") {
            // Jika belum login atau mencoba bypass, paksa munculkan overlay password
            document.getElementById('login-overlay').style.display = 'flex';
            tampilkanModal({ 
                judul: "Akses Terkunci", 
                pesan: "Silakan masukkan password terlebih dahulu untuk mengirim data.", 
                ikon: "fa-lock", 
                warnaIkon: "var(--merah-notif)" 
            });
            return; // Hentikan fungsi agar data tidak terkirim
        }
        // --- PROTEKSI KETAT SELESAI ---

        const kategori = document.getElementById('kategori').value;
        const judul = document.getElementById('judul').value;
        const lokasi = document.getElementById('lokasi').value;
        const detail = document.getElementById('detail').value;

        if(!judul || !detail) { 
            tampilkanModal({ 
                judul: "Data Tidak Lengkap", 
                pesan: "Harap isi Judul dan Detail informasi kegiatan.", 
                ikon: "fa-triangle-exclamation", 
                warnaIkon: "#f39c12" 
            });
            return; 
        }

        const btn = document.getElementById('btn-submit');
        const btnText = document.getElementById('btn-text');
        btn.disabled = true;
        btnText.innerText = "MENGIRIM...";

        try {
            const dataObj = {
                kategori, judul, lokasi, detail,
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp()
            };

            if (editID) {
                await db.collection("pengumuman_komsel").doc(editID).update(dataObj);
                showCustomNotif("Berhasil Diupdate", "fa-pen-to-square");
            } else {
                dataObj.createdAt = firebase.firestore.FieldValue.serverTimestamp();
                await db.collection("pengumuman_komsel").add(dataObj);
                showCustomNotif("Berhasil Dikirim ke Jemaat", "fa-circle-check");
            }
            resetForm();
        } catch (e) {
            tampilkanModal({ judul: "Gagal Kirim", pesan: e.message, ikon: "fa-bug", warnaIkon: "red" });
        } finally {
            btn.disabled = false;
            btnText.innerText = editID ? "SIMPAN PERUBAHAN" : "KIRIM SEKARANG";
        }
    }

    // 5. FUNGSI HAPUS
    async function hapusInfo(id) {
        tampilkanModal({
            judul: "Konfirmasi Hapus",
            pesan: "Apakah Anda yakin ingin menghapus pengumuman ini? Data yang dihapus tidak bisa dikembalikan.",
            ikon: "fa-trash-can",
            warnaIkon: "#e11d48",
            tipe: "konfirmasi",
            aksiYa: async () => {
                try {
                    await db.collection("pengumuman_komsel").doc(id).delete();
                    showCustomNotif("Data telah dihapus", "fa-trash-can");
                } catch (e) { 
                    tampilkanModal({ judul: "Gagal", pesan: e.message, ikon: "fa-circle-xmark", warnaIkon: "red" });
                }
            }
        });
    }

    // 6. FUNGSI UI (MODAL, ACCORDION, RESET, LOAD)
    function tampilkanModal({ judul, pesan, ikon, warnaIkon, tipe, aksiYa }) {
        const modal = document.getElementById('custom-modal');
        const mTitle = document.getElementById('modal-title');
        const mMsg = document.getElementById('modal-msg');
        const mIcon = document.getElementById('modal-icon');
        const mButtons = document.getElementById('modal-buttons');

        mTitle.innerText = judul;
        mMsg.innerText = pesan;
        mIcon.className = "fa-solid " + (ikon || "fa-circle-info");
        mIcon.style.color = warnaIkon || "var(--biru-tua)";
        mButtons.innerHTML = "";

        if (tipe === "konfirmasi") {
            mButtons.innerHTML += `<button onclick="tutupModal()" style="background:#eee; color:#333; border:none; padding:12px 20px; border-radius:10px; font-weight:bold; flex:1;">BATAL</button>`;
            const btnYa = document.createElement("button");
            btnYa.innerText = "YA, LANJUTKAN";
            btnYa.style = "background:var(--merah-notif); color:white; border:none; padding:12px 20px; border-radius:10px; font-weight:bold; flex:1;";
            btnYa.onclick = () => { aksiYa(); tutupModal(); };
            mButtons.appendChild(btnYa);
        } else {
            mButtons.innerHTML += `<button onclick="tutupModal()" style="background:var(--biru-tua); color:white; border:none; padding:12px 25px; border-radius:10px; font-weight:bold; width:100%;">OKE</button>`;
            if(tipe === "toast") setTimeout(tutupModal, 2500);
        }
        modal.style.display = 'flex';
    }

    function tutupModal() { document.getElementById('custom-modal').style.display = 'none'; }

    function showCustomNotif(m, i) {
        tampilkanModal({ judul: "Selesai", pesan: m, ikon: i || "fa-circle-check", warnaIkon: "var(--hijau-zamrud)", tipe: "toast" });
    }

    function resetForm() {
        editID = null;
        document.getElementById('judul').value = "";
        document.getElementById('lokasi').value = "";
        document.getElementById('detail').value = "";
        document.getElementById('form-title').innerText = "Info Kegiatan Baru";
        document.getElementById('btn-text').innerText = "KIRIM SEKARANG";
        document.getElementById('btn-submit').style.background = "var(--merah-notif)";
        document.getElementById('btn-cancel-edit').style.display = "none";
    }

    function loadHistory() {
        db.collection("pengumuman_komsel").orderBy("lastUpdate", "desc").limit(15).onSnapshot((snap) => {
            const listDiv = document.getElementById('list-pengumuman');
            if (snap.empty) {
                listDiv.innerHTML = "<p style='text-align:center;'>Belum ada riwayat.</p>";
                return;
            }
            listDiv.innerHTML = "";
            snap.forEach((doc) => {
                const d = doc.data();
                const t = d.lastUpdate ? d.lastUpdate.toDate().toLocaleString('id-ID') : 'Baru saja';
                const safeDetail = d.detail.replace(/`/g, '\\`');
                
                listDiv.innerHTML += `
                    <div class="accordion-item">
                        <div class="accordion-header" onclick="toggleAccordion(this)">
                            <h4>[${d.kategori}] ${d.judul}</h4>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </div>
                        <div class="accordion-content">
                            <p><strong><i class="fa-solid fa-location-dot"></i></strong> ${d.lokasi || '-'}</p>
                            <p style="white-space: pre-wrap;">${d.detail}</p>
                            <span class="timestamp"><i class="fa-regular fa-clock"></i> ${t}</span>
                            <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                            <div style="display: flex; gap: 20px; justify-content: flex-end;">
                                <span style="cursor:pointer; font-size: 13px;" onclick="isiDataEdit('${doc.id}', '${d.kategori}', '${d.judul}', '${d.lokasi}', \`${safeDetail}\`)">
                                    <i class="fa-solid fa-pen-to-square"></i> Edit
                                </span>
                                <span style="cursor:pointer; font-size: 13px; color:red;" onclick="hapusInfo('${doc.id}')">
                                    <i class="fa-solid fa-trash"></i> Hapus
                                </span>
                            </div>
                        </div>
                    </div>`;
            });
        });
    }

    function toggleAccordion(header) {
        header.nextElementSibling.classList.toggle('active');
        header.querySelector('.chevron').classList.toggle('rotate');
    }

    function isiDataEdit(id, kat, jud, lok, det) {
        editID = id;
        document.getElementById('kategori').value = kat;
        document.getElementById('judul').value = jud;
        document.getElementById('lokasi').value = lok;
        document.getElementById('detail').value = det;
        document.getElementById('form-title').innerText = "Edit Informasi";
        document.getElementById('btn-text').innerText = "SIMPAN PERUBAHAN";
        document.getElementById('btn-submit').style.background = "var(--biru-safir)";
        document.getElementById('btn-cancel-edit').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    loadHistory();
</script>
</body>
</html>
