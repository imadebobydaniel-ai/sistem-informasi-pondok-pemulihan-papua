<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Millionaire Alkitab - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --biru-tua: #003366; --emas: #D4AF37; --bg: #001f3f; --putih: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: white; overflow: hidden; height: 100vh; }

        .header-game { 
            background: var(--biru-tua); padding: 10px; display: flex; align-items: center; 
            border-bottom: 3px solid var(--emas); height: 50px; box-sizing: border-box;
        }
        .btn-back { color: white; font-size: 18px; text-decoration: none; z-index: 10; }
        .header-title { flex: 1; text-align: center; font-weight: bold; font-size: 14px; letter-spacing: 1px; }

        .game-container { 
            padding: 15px; text-align: center; max-width: 500px; margin: auto; 
            height: calc(100vh - 50px); display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box;
        }

        .timer-container {
            position: relative; width: 80px; height: 80px; margin: 0 auto;
            display: flex; align-items: center; justify-content: center;
        }
        .timer-svg { transform: rotate(-90deg); width: 80px; height: 80px; }
        .timer-circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 6; }
        .timer-circle-progress {
            fill: none; stroke: #ff4d4d; stroke-width: 6; stroke-linecap: round;
            stroke-dasharray: 251; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear;
        }
        .timer-text { position: absolute; font-size: 20px; font-weight: bold; color: #ff4d4d; }

        .prize-level { color: var(--emas); font-weight: bold; font-size: 14px; margin: 5px 0; }
        .question-box { 
            background: rgba(0, 51, 102, 0.8); border: 2px solid var(--emas); padding: 15px; 
            border-radius: 30px 0 30px 0; font-size: 15px; min-height: 70px; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-answer { 
            background: transparent; border: 1px solid var(--emas); color: white; padding: 10px; 
            border-radius: 20px; cursor: pointer; font-size: 12px; transition: 0.3s; text-align: left;
            min-height: 45px;
        }
        .btn-answer.correct { background: #28a745 !important; border-color: white; }
        .btn-answer.wrong { background: #d9534f !important; border-color: white; }
        .btn-answer.hidden { visibility: hidden; }

        .lifelines-container { display: flex; justify-content: center; gap: 15px; margin: 10px 0; }
        .btn-lifeline {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--emas);
            background: var(--biru-tua); color: var(--emas); font-size: 11px;
            cursor: pointer; display: inline-flex; align-items: center;
            justify-content: center; font-weight: bold; padding: 0;
            overflow: hidden; box-sizing: border-box;
        }
        .btn-lifeline.used { opacity: 0.3; cursor: default; }

        #leaderboard-overlay { 
            display: none; position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 55vh; background: white; border-radius: 25px 25px 0 0;
            z-index: 5000; overflow-y: auto; padding: 15px; box-sizing: border-box;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
        }
        .rank-card { background: #f8f9fa; border-radius: 12px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid #ddd; }
        .rank-numb { font-weight: bold; color: var(--biru-tua); width: 25px; font-size: 14px;}
        .rank-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--emas); }
        .rank-info { flex: 1; color: #333; text-align: left; }
        .rank-name { margin: 0; font-size: 13px; font-weight: bold; }
        .rank-score { font-weight: bold; color: #28a745; font-size: 13px; }

        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 6000; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box;}
        .start-box { background: var(--biru-tua); border: 2px solid var(--emas); padding: 25px; border-radius: 20px; width: 100%; max-width: 350px; }
        .notif-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 7000; align-items: center; justify-content: center; padding: 20px; }
        
        #start-btn-container button { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="start-box">
        <h2 style="color:var(--emas)">SYALOM!</h2>
        <p>Uji pengetahuan Alkitab Anda dalam 3 Menit (50 Soal).</p>
        <div style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <button onclick="startGame()" style="background:#28a745; color:white; padding:10px 25px; border:none; border-radius:20px; font-weight:bold; cursor:pointer;">SIAP</button>
            <button onclick="location.href='menu.html'" style="background:#d9534f; color:white; padding:10px 25px; border:none; border-radius:20px; font-weight:bold; cursor:pointer;">TIDAK</button>
        </div>
    </div>
</div>

<div id="custom-notif" class="notif-overlay">
    <div class="start-box">
        <div id="notif-icon" style="font-size: 40px;"></div>
        <h3 id="notif-title">INFO</h3>
        <p id="notif-message" style="font-size: 14px;"></p>
        <button onclick="closeNotif()" style="background:var(--emas); padding:10px 25px; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">OKE</button>
    </div>
</div>

<div id="leaderboard-overlay">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="color: var(--biru-tua); margin:0; font-size: 16px;"><i class="fa-solid fa-trophy"></i> Peringkat Teratas</h3>
        <i class="fa-solid fa-circle-xmark" style="color:#d9534f; font-size: 24px; cursor:pointer;" onclick="toggleRank()"></i>
    </div>
    <div id="rank-list"></div>
</div>

<div class="header-game">
    <a href="menu.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i></a>
    <div class="header-title">MILLIONAIRE ALKITAB</div>
</div>

<div class="game-container">
    <div id="start-btn-container" style="margin-bottom: 5px;">
        <button onclick="realStart()" style="background:var(--emas); color:var(--biru-tua); padding:12px 30px; border:none; border-radius:25px; font-weight:bold; font-size: 16px; cursor:pointer;">
            <i class="fa-solid fa-play"></i> MULAI SEKARANG
        </button>
    </div>

    <div class="timer-container">
        <svg class="timer-svg">
            <circle class="timer-circle-bg" cx="40" cy="40" r="35"></circle>
            <circle id="progress" class="timer-circle-progress" cx="40" cy="40" r="35"></circle>
        </svg>
        <div id="timer-text" class="timer-text">180</div>
    </div>

    <div class="prize-level" id="level-display">Level 1 - Poin: 0</div>
    <div class="question-box" id="question-text">Memuat Soal...</div>

    <div class="answers-grid" id="answers-container"></div>

    <div class="lifelines-container">
        <button id="ll-5050" class="btn-lifeline" onclick="use5050()" title="50:50">50:50</button>
        <button id="ll-phone" class="btn-lifeline" onclick="usePhone()" title="Tanya Teman"><i class="fa-solid fa-phone"></i></button>
        <button id="ll-audience" class="btn-lifeline" onclick="useAudience()" title="Tanya Penonton"><i class="fa-solid fa-users"></i></button>
    </div>

    <div style="margin-bottom: 10px;">
        <button onclick="toggleRank()" style="background:var(--emas); color:var(--biru-tua); border:none; padding:8px 15px; border-radius:8px; font-weight:bold; font-size: 12px; cursor:pointer;"><i class="fa-solid fa-trophy"></i> LIHAT RANKING</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- INISIALISASI AUDIO ---
    const soundBg = new Audio('sounds/background_soal.mp3');
    const soundCorrect = new Audio('sounds/jawaban_benar.mp3');
    const soundWrong = new Audio('sounds/jawaban_salah.mp3');
    const soundTimer = new Audio('sounds/timer_tick.mp3');
    const soundWin = new Audio('sounds/pemenang.mp3');

    soundBg.loop = true;
    soundBg.volume = 0.4;
    soundTimer.loop = true;
    soundTimer.volume = 0.6;

    // --- DAFTAR 50 SOAL ALKITAB ---
    const quizRawData = [
        { q: "Siapa raja pertama bangsa Israel?", a: ["Daud", "Saul", "Salomo", "Yosua"], c: 1 },
        { q: "Apa arti nama 'Imanuel'?", a: ["Allah Mahakuasa", "Tuhan Raja kami", "Allah menyertai kita", "Gembala Baik"], c: 2 },
        { q: "Siapa yang membelah Laut Merah?", a: ["Musa", "Yosua", "Harun", "Abraham"], c: 0 },
        { q: "Berapa hari Allah menciptakan alam semesta?", a: ["5 Hari", "7 Hari", "6 Hari", "40 Hari"], c: 2 },
        { q: "Siapa murid yang mengkhianati Yesus?", a: ["Petrus", "Yohanes", "Yudas Iskariot", "Tomas"], c: 2 },
        { q: "Dimana Yesus dilahirkan?", a: ["Nazaret", "Yerusalem", "Betlehem", "Mesir"], c: 2 },
        { q: "Siapa manusia pertama yang diciptakan Allah?", a: ["Habel", "Adam", "Set", "Nuh"], c: 1 },
        { q: "Apa tanda perjanjian Allah dengan Nuh?", a: ["Pelangi", "Awan", "Merpati", "Matahari"], c: 0 },
        { q: "Kitab apakah yang pertama dalam Alkitab?", a: ["Keluaran", "Imamat", "Kejadian", "Mazmur"], c: 2 },
        { q: "Siapa pemuda yang mengalahkan Goliat?", a: ["Salomo", "Daud", "Saul", "Simson"], c: 1 },
        { q: "Apa nama sungai tempat Yesus dibaptis?", a: ["Sungai Nil", "Sungai Efrat", "Sungai Yordan", "Sungai Tigris"], c: 2 },
        { q: "Siapa yang membaptis Yesus?", a: ["Petrus", "Yohanes Pembaptis", "Yakobus", "Paulus"], c: 1 },
        { q: "Berapa jumlah murid Yesus?", a: ["10", "12", "7", "14"], c: 1 },
        { q: "Siapa orang yang paling sabar dalam Alkitab?", a: ["Ayub", "Musa", "Abraham", "Ishak"], c: 0 },
        { q: "Siapa yang membangun Bahtera besar?", a: ["Nuh", "Lot", "Enokh", "Metusalah"], c: 0 },
        { q: "Apa bunyi hukum Tuhan yang pertama?", a: ["Jangan Mencuri", "Hormatilah Ayah Ibumu", "Jangan Ada Allah Lain", "Jangan Berzinah"], c: 2 },
        { q: "Siapa istri pertama Ishak?", a: ["Lea", "Ribka", "Rahel", "Sara"], c: 1 },
        { q: "Siapa yang menggantikan Musa memimpin Israel?", a: ["Kaleb", "Yosua", "Gideon", "Samuel"], c: 1 },
        { q: "Apa makanan yang turun dari langit untuk Israel?", a: ["Madu", "Manna", "Roti", "Daging"], c: 1 },
        { q: "Berapa kali Petrus menyangkal Yesus?", a: ["1 Kali", "2 Kali", "3 Kali", "7 Kali"], c: 2 },
        { q: "Siapa yang dijual saudara-saudaranya ke Mesir?", a: ["Benyamin", "Yusuf", "Ruben", "Efraim"], c: 1 },
        { q: "Siapa hakim yang sangat kuat rambutnya?", a: ["Gideon", "Simson", "Samuel", "Barak"], c: 1 },
        { q: "Siapa ibu Tuhan Yesus?", a: ["Elisabet", "Maria", "Marta", "Magdalena"], c: 1 },
        { q: "Apa mujizat pertama Tuhan Yesus?", a: ["Menyembuhkan Buta", "Air jadi Anggur", "Membangkitkan Lazarus", "Berjalan di Air"], c: 1 },
        { q: "Apa nama kota yang runtuh temboknya?", a: ["Yerikho", "Ninive", "Sodom", "Gomora"], c: 0 },
        { q: "Siapa nabi yang ditelan ikan besar?", a: ["Yesaya", "Yunus", "Yeremia", "Daniel"], c: 1 },
        { q: "Daniel dimasukkan ke dalam gua apa?", a: ["Gua Macan", "Gua Singa", "Gua Beruang", "Gua Ular"], c: 1 },
        { q: "Siapa orang paling kaya dan bijaksana?", a: ["Daud", "Salomo", "Hizkia", "Yosia"], c: 1 },
        { q: "Apa nama tempat Yesus disalibkan?", a: ["Getsemani", "Golgota", "Sinai", "Hermon"], c: 1 },
        { q: "Siapa yang membangkitkan Lazarus?", a: ["Petrus", "Yesus", "Paulus", "Marta"], c: 1 },
        { q: "Siapa penulis Kitab Wahyu?", a: ["Paulus", "Lukas", "Yohanes", "Matius"], c: 2 },
        { q: "Apa nama bahasa asli Perjanjian Lama?", a: ["Yunani", "Ibrani", "Latin", "Arab"], c: 1 },
        { q: "Berapa jumlah kitab dalam Alkitab?", a: ["60", "66", "70", "39"], c: 1 },
        { q: "Siapa yang menulis surat Roma?", a: ["Petrus", "Paulus", "Yakobus", "Yudas"], c: 1 },
        { q: "Apa arti nama 'Musa'?", a: ["Anak Allah", "Diangkat dari Air", "Gembala", "Pembebas"], c: 1 },
        { q: "Siapa mertua Musa?", police: ["Yitro", "Labu", "Potifar", "Firaun"], a: ["Yitro", "Laban", "Potifar", "Imam Eli"], c: 0 },
        { q: "Apa perintah kelima dalam 10 Hukum?", a: ["Jangan Membunuh", "Hormati Orang Tua", "Kuduskan Sabat", "Jangan Mencuri"], c: 1 },
        { q: "Apa nama taman tempat Adam dan Hawa?", a: ["Taman Getsemani", "Taman Eden", "Taman Zaitun", "Taman Firdaus"], c: 1 },
        { q: "Apa kitab terakhir Perjanjian Baru?", a: ["Yudas", "Wahyu", "Ibrani", "Maleakhi"], c: 1 },
        { q: "Siapa yang melihat semak duri menyala?", a: ["Abraham", "Musa", "Elias", "Elisabet"], c: 1 },
        { q: "Apa mas kawin Yakub untuk Rahel?", a: ["Emas", "Kerja 7 Tahun", "Ternak", "Tanah"], c: 1 },
        { q: "Siapa yang diangkat ke surga naik kereta api?", a: ["Musa", "Elia", "Enoch", "Samuel"], c: 1 },
        { q: "Yesus memberi makan 5000 orang dengan?", a: ["5 Roti 2 Ikan", "2 Roti 5 Ikan", "7 Roti 1 Ikan", "Manna"], c: 0 },
        { q: "Siapa penguasa Mesir saat zaman Yusuf?", a: ["Herodes", "Firaun", "Nebukadnezar", "Koresh"], c: 1 },
        { q: "Apa arti Golgota?", a: ["Tempat Berdoa", "Tempat Tengkorak", "Bukit Suci", "Kebun Zaitun"], c: 1 },
        { q: "Siapa rasul bagi bangsa kafir?", a: ["Petrus", "Paulus", "Tomas", "Matius"], c: 1 },
        { q: "Zakeus bekerja sebagai apa?", a: ["Nelayan", "Pemungut Cukai", "Tukang Kayu", "Gembala"], c: 1 },
        { q: "Apa buah yang dilarang di Eden?", a: ["Buah Apel", "Buah Pengetahuan", "Buah Anggur", "Buah Ara"], c: 1 },
        { q: "Siapa nabi yang dipanggil saat kecil?", a: ["Samuel", "Yeremia", "Daud", "Salomo"], c: 0 },
        { q: "Apa hukum terutama kedua?", a: ["Kasihilah Tuhan", "Kasihilah Sesama", "Jangan Membunuh", "Berikan Persembahan"], c: 1 }
    ];

    let quizData = [];
    let currentQ = 0;
    let score = 0;
    let totalTime = 180;
    let timerInterval;
    let userData = null;
    let isGameStarted = false;
    let usedLifelines = { f50: false, phone: false, audience: false };

    async function fetchUserData() {
        const email = localStorage.getItem("userEmail");
        if(email) {
            const snap = await db.collection("users").where("email", "==", email).get();
            if (!snap.empty) userData = snap.docs[0].data();
        }
    }

    // Fungsi untuk memutar suara dengan aman (mencegah error browser)
    function playAudio(audio) {
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Autoplay diblokir browser, butuh interaksi user."));
    }

    // Fungsi Mengacak (Shuffle)
    function shuffleArray(arr) { 
        return arr.sort(() => Math.random() - 0.5); 
    }

    function startGame() {
        document.getElementById('start-overlay').style.display = 'none';
        // ACAK SOAL SETIAP KALI MULAI
        quizData = shuffleArray([...quizRawData]);
        loadQuestion(); 
    }

    function realStart() {
        if(isGameStarted) return;
        isGameStarted = true;
        document.getElementById('start-btn-container').style.display = 'none';
        
        // Mulai Audio setelah klik
        playAudio(soundBg);
        playAudio(soundTimer);
        
        startGlobalTimer();
    }

    function startGlobalTimer() {
        const circle = document.getElementById('progress');
        const text = document.getElementById('timer-text');
        timerInterval = setInterval(() => {
            totalTime--;
            text.innerText = totalTime;
            const offset = (totalTime / 180) * 251;
            circle.style.strokeDashoffset = 251 - offset;
            if (totalTime <= 0) {
                clearInterval(timerInterval);
                finishGame();
            }
        }, 1000);
    }

    function loadQuestion() {
        if (currentQ >= quizData.length) { finishGame(); return; }
        const data = quizData[currentQ];
        document.getElementById('level-display').innerText = `Level ${currentQ + 1} - Poin: ${score}`;
        document.getElementById('question-text').innerText = data.q;
        const container = document.getElementById('answers-container');
        container.innerHTML = '';
        
        data.a.forEach((ans, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn-answer';
            btn.id = `ans-${idx}`;
            btn.innerHTML = `<b>${String.fromCharCode(65 + idx)}:</b> ${ans}`;
            btn.onclick = () => {
                if(!isGameStarted) {
                    showNotif("INFO", "Tekan tombol MULAI SEKARANG terlebih dahulu!", "success", null);
                    return;
                }
                checkAnswer(idx, btn);
            };
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        const correct = quizData[currentQ].c;
        soundTimer.pause();

        if(idx === correct) {
            playAudio(soundCorrect);
            btn.classList.add('correct');
            score += 20;
            setTimeout(() => {
                currentQ++;
                if(isGameStarted) playAudio(soundTimer);
                loadQuestion();
            }, 2000);
        } else {
            soundBg.pause();
            playAudio(soundWrong);
            btn.classList.add('wrong');
            clearInterval(timerInterval);
            setTimeout(() => {
                showNotif("GAGAL", `Jawaban Salah. Skor Akhir: ${score}`, "fail", () => location.reload());
            }, 2000);
        }
    }

    async function finishGame() {
        clearInterval(timerInterval);
        soundBg.pause();
        soundTimer.pause();
        playAudio(soundWin);

        if(userData) {
            const ref = db.collection("game_scores").doc(userData.email);
            const doc = await ref.get();
            if(doc.exists) {
                let poinLama = doc.data().skor || 0;
                await ref.update({ skor: poinLama + score, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            } else {
                await ref.set({ nama: userData.nama, email: userData.email, skor: score, foto: userData.foto_profil || "", timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            }
        }
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        showNotif("SELESAI!", `Selamat! Poin ${score} telah diakumulasi.`, "success", () => location.reload());
    }

    function toggleRank() {
        const overlay = document.getElementById('leaderboard-overlay');
        overlay.style.display = (overlay.style.display === 'block') ? 'none' : 'block';
        if(overlay.style.display === 'block') loadLeaderboard();
    }

    function loadLeaderboard() {
        const list = document.getElementById('rank-list');
        list.innerHTML = "<p style='text-align:center; color:#666;'>Mengambil data peringkat...</p>";
        db.collection("game_scores").orderBy("skor", "desc").limit(15).get().then(snap => {
            let html = ""; let rank = 1;
            snap.forEach(doc => {
                const d = doc.data();
                html += `<div class="rank-card"><div class="rank-numb">${rank++}</div><img src="${d.foto || 'https://via.placeholder.com/100'}" class="rank-img"><div class="rank-info"><p class="rank-name">${d.nama}</p></div><div class="rank-score">${d.skor.toLocaleString()} Pt</div></div>`;
            });
            list.innerHTML = html || "<p style='text-align:center; color:#999;'>Belum ada pemain.</p>";
        });
    }

    function showNotif(title, msg, icon, action) {
        window.nextAction = action;
        document.getElementById('notif-title').innerText = title;
        document.getElementById('notif-message').innerText = msg;
        document.getElementById('notif-icon').innerHTML = icon === "success" ? "🏆" : "❌";
        document.getElementById('custom-notif').style.display = 'flex';
    }

    function closeNotif() {
        document.getElementById('custom-notif').style.display = 'none';
        if(window.nextAction) window.nextAction();
    }
    
    // Lifelines
    function use5050() {
        if(!isGameStarted || usedLifelines.f50) return;
        const correct = quizData[currentQ].c;
        let indices = [0,1,2,3].filter(i => i !== correct);
        indices = shuffleArray(indices);
        indices.slice(0, 2).forEach(i => document.getElementById(`ans-${i}`).classList.add('hidden'));
        usedLifelines.f50 = true; document.getElementById('ll-5050').classList.add('used');
    }
    function usePhone() {
        if(!isGameStarted || usedLifelines.phone) return;
        showNotif("TANYA TEMAN", `Sahabat Anda yakin jawabannya adalah ${String.fromCharCode(65 + quizData[currentQ].c)}`, "success", null);
        usedLifelines.phone = true; document.getElementById('ll-phone').classList.add('used');
    }
    function useAudience() {
        if(!isGameStarted || usedLifelines.audience) return;
        showNotif("PENONTON", "85% Penonton memilih jawaban yang benar!", "success", null);
        usedLifelines.audience = true; document.getElementById('ll-audience').classList.add('used');
    }

    window.onload = fetchUserData;
</script>
</body>
</html>
