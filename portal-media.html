<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #1db954; /* Spotify Green Style */
            --bg-dark: #121212;
            --card-bg: rgba(40, 40, 40, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --danger: #e91e63;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .container { max-width: 1100px; margin: auto; }

        /* Header Style */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 15px;
            border-radius: 30px;
            transition: 0.3s;
            background: rgba(255,255,255,0.05);
        }

        .btn-back:hover { color: var(--primary); background: rgba(255,255,255,0.1); }

        /* Card Style */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .card h2, .card h3 {
            margin-top: 0;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 10px; color: var(--text-dim); font-weight: 500; font-size: 14px; }
        
        input, select, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(0,0,0,0.5);
        }

        /* Running Text Section */
        .running-text-box {
            display: flex;
            gap: 12px;
        }
        .btn-update {
            background: var(--primary);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            white-space: nowrap;
            transition: 0.3s;
        }
        .btn-update:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3); }

        .playlist-config {
            background: rgba(255, 193, 7, 0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
            border: 1px solid rgba(255, 193, 7, 0.2);
        }

        .btn-submit {
            background: var(--primary);
            color: black;
            border: none;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-submit:hover { opacity: 0.9; transform: scale(1.01); }

        /* Table Style */
        .table-responsive {
            background: transparent;
            border-radius: 15px;
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { color: var(--text-dim); font-weight: 500; padding: 15px; text-align: left; border-bottom: 1px solid var(--glass-border); }
        td { padding: 18px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        tr:hover { background: rgba(255,255,255,0.03); }

        /* Badges */
        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .badge-gambar { background: #00bcd4; color: black; }
        .badge-video_youtube { background: #ff0000; color: white; }
        .badge-teks { background: #ffffff; color: black; }
        .badge-video_player { background: #9c27b0; color: white; }
        .badge-audio_player { background: #ff9800; color: black; }
        
        /* Action Buttons */
        .btn-action { border: none; background: none; cursor: pointer; font-size: 22px; transition: 0.2s; padding: 5px; }
        .btn-action:hover { transform: scale(1.2); }
        .btn-play { color: var(--primary); }
        .btn-delete { color: var(--danger); }
        
        .btn-nav {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            color: white;
            font-size: 10px;
            transition: 0.2s;
        }
        .btn-nav:hover { background: var(--primary); color: black; }

        input[type="number"] { width: 70px; text-align: center; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; letter-spacing: -1px;">Portal Media</h1>
            <p style="margin:5px 0 0; color:var(--text-dim); font-size: 13px;">Manajemen Berita & Konten Pondok Pemulihan</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>

    <div class="card">
        <h3 style="color: var(--primary);"><i class="fas fa-bullhorn"></i> Pengaturan Running Text</h3>
        <div class="running-text-box">
            <input type="text" id="runningTextInput" placeholder="Tulis pesan pengumuman...">
            <button class="btn-update" onclick="updateRunningText()">UPDATE</button>
        </div>
    </div>

    <div class="card">
        <h3><i class="fa-solid fa-circle-plus"></i> Tambah Konten Baru</h3>
        
        <div class="form-group">
            <label>Judul Konten / Berita</label>
            <input type="text" id="judul" placeholder="Contoh: Kegiatan Ibadah Raya Minggu...">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>Tipe Media</label>
                <select id="tipe_media" onchange="toggleInputFields()">
                    <option value="gambar">Gambar (Poster/Foto)</option>
                    <option value="video_youtube">Video (YouTube Link)</option>
                    <option value="video_player">Video MP4 (URL)</option>
                    <option value="audio_player">Audio (MP3/Podcast)</option>
                    <option value="teks">Text World (Artikel)</option>
                </select>
            </div>
            <div class="form-group">
                <label id="label_url">Link / URL Media</label>
                <input type="text" id="url_media" placeholder="https://...">
            </div>
        </div>

        <div id="input_teks_container" class="form-group" style="display:none;">
            <label>Isi Artikel Lengkap</label>
            <textarea id="isi_artikel" rows="5" placeholder="Tuliskan isi berita di sini..."></textarea>
        </div>

        <div class="form-group">
            <label>Deskripsi Singkat</label>
            <textarea id="deskripsi" rows="2" placeholder="Tuliskan keterangan singkat..."></textarea>
        </div>

        <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit">
            <i class="fa-solid fa-paper-plane"></i> Publikasikan Konten
        </button>
    </div>

    <div class="card">
        <h2><i class="fas fa-list-ul" style="color: var(--primary);"></i> Daftar Konten Terbit</h2>
        
        <div class="playlist-config">
            <div>
                <label>Mode Putar:</label>
                <select id="modePutar" style="width: auto;">
                    <option value="berurutan">Berurutan</option>
                    <option value="acak">Acak (Shuffle)</option>
                    <option value="loop">Loop (Ulangi)</option>
                </select>
            </div>
            <div>
                <label>Default Durasi (Menit):</label>
                <input type="number" id="defaultDurasi" value="10">
            </div>
            <button onclick="saveGlobalConfig()" class="btn-update" style="padding: 10px 20px;">SIMPAN MODE</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>URUTAN</th>
                        <th>JUDUL KONTEN</th>
                        <th>TIPE</th>
                        <th>MENIT</th>
                        <th style="text-align: center;">AKSI</th>
                    </tr>
                </thead>
                <tbody id="mediaList">
                    <tr>
                        <td colspan="5" style="text-align:center; padding: 40px; color: var(--text-dim);">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // Konfigurasi tetap sama (Tidak dirubah)
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    function loadRunningText() {
        db.collection("settings").doc("runningText").onSnapshot((doc) => {
            if (doc.exists) {
                document.getElementById('runningTextInput').value = doc.data().content;
            }
        });
    }

    async function updateRunningText() {
        const text = document.getElementById('runningTextInput').value;
        if (!text) { alert("Teks pengumuman tidak boleh kosong!"); return; }
        try {
            await db.collection("settings").doc("runningText").set({
                content: text,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Running Text Berhasil Diperbarui!");
        } catch (e) { alert("Gagal memperbarui: " + e.message); }
    }

    function toggleInputFields() {
        const tipe = document.getElementById('tipe_media').value;
        const urlContainer = document.getElementById('url_media').parentElement;
        const teksContainer = document.getElementById('input_teks_container');
        const labelUrl = document.getElementById('label_url');
        const inputUrl = document.getElementById('url_media');

        urlContainer.style.display = "block";
        teksContainer.style.display = "none";

        if (tipe === 'gambar') {
            labelUrl.innerText = "Link / URL Gambar";
            inputUrl.placeholder = "https://link-gambar.jpg";
        } else if (tipe === 'video_youtube') {
            labelUrl.innerText = "Link Video YouTube";
            inputUrl.placeholder = "https://www.youtube.com/watch?v=...";
        } else if (tipe === 'video_player') {
            labelUrl.innerText = "URL File Video (MP4)";
            inputUrl.placeholder = "https://server.com/video.mp4";
        } else if (tipe === 'audio_player') {
            labelUrl.innerText = "URL File Audio (MP3)";
            inputUrl.placeholder = "https://server.com/lagu.mp3";
        } else if (tipe === 'teks') {
            urlContainer.style.display = "none";
            teksContainer.style.display = "block";
        }
    }

    async function uploadKePortal() {
        const btn = document.getElementById('btnPublish');
        const judul = document.getElementById('judul').value;
        const tipe = document.getElementById('tipe_media').value;
        let urlValue = document.getElementById('url_media').value;
        const isiArtikel = document.getElementById('isi_artikel').value;
        if(!judul) { alert("Judul harus diisi!"); return; }

        if (tipe === 'video_youtube' && urlValue) {
            let videoId = "";
            if (urlValue.includes('v=')) videoId = urlValue.split('v=')[1].split('&')[0];
            else if (urlValue.includes('youtu.be/')) videoId = urlValue.split('youtu.be/')[1].split('?')[0];
            if (videoId) urlValue = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&playlist=${videoId}&loop=1`;
        }

        btn.disabled = true;
        btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> Memproses...";

        try {
            const snapshot = await db.collection("portal_media").get();
            await db.collection("portal_media").add({
                judul: judul, tipe: tipe, url: urlValue, isi_artikel: isiArtikel,
                deskripsi: document.getElementById('deskripsi').value,
                urutan: snapshot.size + 1,
                durasi: parseInt(document.getElementById('defaultDurasi').value),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            alert("Berhasil dipublikasikan!");
            location.reload();
        } catch (e) { alert("Gagal: " + e.message); btn.disabled = false; }
    }

    async function loadMedia() {
        const list = document.getElementById('mediaList');
        try {
            const snapshot = await db.collection("portal_media").orderBy("urutan", "asc").get();
            list.innerHTML = "";
            if(snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center; color:gray;">Belum ada konten.</td></tr>';
                return;
            }
            snapshot.forEach((doc, index) => {
                const data = doc.data();
                const id = doc.id;
                list.innerHTML += `
                    <tr>
                        <td>
                            <div style="display:flex; align-items:center; gap:5px;">
                                <button class="btn-nav" onclick="pindahUrutan('${id}', -1)"><i class="fas fa-chevron-up"></i></button>
                                <span style="min-width:20px; text-align:center; font-weight:bold;">${data.urutan || index + 1}</span>
                                <button class="btn-nav" onclick="pindahUrutan('${id}', 1)"><i class="fas fa-chevron-down"></i></button>
                            </div>
                        </td>
                        <td><strong>${data.judul}</strong></td>
                        <td><span class="badge badge-${data.tipe}">${data.tipe.replace('_', ' ')}</span></td>
                        <td><input type="number" value="${data.durasi || 10}" onchange="updateDurasi('${id}', this.value)"></td>
                        <td style="text-align: center;">
                            <button class="btn-action btn-play" onclick="playSekarang('${id}')"><i class="fas fa-play-circle"></i></button>
                            <button class="btn-action btn-delete" onclick="deleteMedia('${id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>`;
            });
        } catch (e) { console.error(e); }
    }

    async function playSekarang(id) {
        await db.collection("config").doc("playlist").update({ activeContentId: id, triggerChange: Date.now() });
        alert("Konten segera diputar!");
    }

    async function pindahUrutan(id, arah) {
        const ref = db.collection("portal_media");
        const doc = await ref.doc(id).get();
        const urutanSekarang = doc.data().urutan;
        const urutanBaru = urutanSekarang + arah;
        if (urutanBaru < 1) return;
        const swapQuery = await ref.where("urutan", "==", urutanBaru).get();
        const batch = db.batch();
        if (!swapQuery.empty) batch.update(ref.doc(swapQuery.docs[0].id), { urutan: urutanSekarang });
        batch.update(ref.doc(id), { urutan: urutanBaru });
        await batch.commit();
        loadMedia();
    }

    async function updateDurasi(id, menit) {
        await db.collection("portal_media").doc(id).update({ durasi: parseInt(menit) });
    }

    async function deleteMedia(id) {
        if(confirm("Hapus konten ini?")) {
            await db.collection("portal_media").doc(id).delete();
            loadMedia();
        }
    }

    async function saveGlobalConfig() {
        const mode = document.getElementById('modePutar').value;
        await db.collection("config").doc("playlist").set({ mode: mode }, { merge: true });
        alert("Mode Disimpan!");
    }

    window.onload = () => {
        loadMedia();
        loadRunningText();
    };
</script>
</body>
</html>
