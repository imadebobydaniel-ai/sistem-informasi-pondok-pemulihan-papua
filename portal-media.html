<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1300px; margin: auto; }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .btn-back:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn-submit {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-save-text { background: #334155; color: white; }

        /* Table & List Styles */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-top: 1px solid var(--border); vertical-align: middle; }

        .media-row:hover { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-gambar { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        .badge-video_youtube { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-video_player { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .badge-audio_player { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-teks { background: rgba(148, 163, 184, 0.1); color: var(--secondary); }
        
        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.2s;
            margin-left: 5px;
        }
        .btn-action:hover { background: var(--primary); color: black; border-color: var(--primary); }
        .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .order-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 10px;
        }
        .order-btn:hover { color: var(--primary); }

        .config-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        #statusText { font-weight: bold; }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 22px; letter-spacing: -0.5px;">Portal Media System</h1>
            <p style="margin:5px 0 0; color:var(--text-muted); font-size: 13px;">Pondok Pemulihan Papua • Control Panel</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3><i class="fas fa-bullhorn"></i> Running Text</h3>
                <div class="form-group">
                    <textarea id="runningTextInput" rows="2" placeholder="Tulis pesan pengumuman..."></textarea>
                </div>
                
                <button onclick="setSyncStatus(true)" id="btnSyncOn" class="btn-submit btn-save-text" style="margin-bottom: 10px;">
                    <i class="fa-solid fa-sync"></i> Sync ke Monitor
                </button>
                
                <button onclick="setSyncStatus(false)" id="btnSyncOff" class="btn-submit" style="background: var(--danger); color: white;">
                    <i class="fa-solid fa-power-off"></i> Off Sync
                </button>

                <p style="font-size: 11px; text-align: center; margin-top: 10px; color: var(--text-muted);">
                    Status: <span id="statusText">Mengecek...</span>
                </p>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-circle-plus"></i> Upload Konten</h3>
                <div class="form-group">
                    <label>Judul Berita</label>
                    <input type="text" id="judul" placeholder="Contoh: Ibadah Minggu">
                </div>
                <div class="form-group">
                    <label>Tipe Media</label>
                    <select id="tipe_media" onchange="toggleInputFields()">
                        <option value="gambar">Gambar (Poster/Foto)</option>
                        <option value="video_youtube">Video (YouTube)</option>
                        <option value="video_player">Video MP4 (Direct)</option>
                        <option value="audio_player">Audio (MP3)</option>
                        <option value="teks">Teks Artikel</option>
                    </select>
                </div>
                <div id="input_url_container" class="form-group">
                    <label id="label_url">URL Gambar (Link Direct)</label>
                    <input type="text" id="url_media" placeholder="https://...">
                </div>
                <div id="input_teks_container" class="form-group" style="display:none;">
                    <label>Isi Artikel</label>
                    <textarea id="isi_artikel" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Durasi Tayang (Menit)</label>
                    <input type="number" id="itemDurasi" value="10">
                </div>
                <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Publish Sekarang
                </button>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <h3><i class="fas fa-play-circle"></i> Manajemen Playlist</h3>
                
                <div class="config-bar">
                    <div style="flex:1">
                        <label>Mode Putar</label>
                        <select id="modePutar" style="width: 100%; margin-top:5px;">
                            <option value="berurutan">Berurutan</option>
                            <option value="acak">Acak (Shuffle)</option>
                        </select>
                    </div>
                    <button onclick="saveGlobalConfig()" class="btn-submit" style="width: auto; margin-top: 22px;">Simpan</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th width="100">Urutan</th>
                                <th>Konten</th>
                                <th>Tipe</th>
                                <th width="80">Durasi</th>
                                <th style="text-align: right;">Opsi</th>
                            </tr>
                        </thead>
                        <tbody id="mediaList">
                            <tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Menghubungkan ke database...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    // 2. KONFIGURASI DATABASE
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "pondok-pemulihan-papua.firebaseapp.com",
        projectId: "pondok-pemulihan-papua",
        storageBucket: "pondok-pemulihan-papua.appspot.com",
        messagingSenderId: "935408986877",
        appId: "1:935408986877:web:86f687986877" // Pastikan App ID ini sesuai dengan Console Firebase Anda
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 3. FUNGSI TOGGLE INPUT (Menyesuaikan field saat tipe media diganti)
    function toggleInputFields() {
        const tipe = document.getElementById('tipe_media').value;
        const urlContainer = document.getElementById('input_url_container');
        const teksContainer = document.getElementById('input_teks_container');
        const labelUrl = document.getElementById('label_url');

        if (tipe === 'teks') {
            urlContainer.style.display = 'none';
            teksContainer.style.display = 'block';
        } else {
            urlContainer.style.display = 'block';
            teksContainer.style.display = 'none';
            labelUrl.innerText = tipe === 'video_youtube' ? 'URL YouTube' : 'URL Direct Link';
        }
    }

    // 4. FUNGSI LOAD RUNNING TEXT
    function loadRunningText() {
        db.collection("config").doc("running_text").onSnapshot((doc) => {
            if (doc.exists) {
                const data = doc.data();
                document.getElementById("runningTextInput").value = data.message || "";
                const statusEl = document.getElementById("statusText");
                statusEl.innerText = data.isSyncActive ? "AKTIF (Sync ON)" : "NON-AKTIF";
                statusEl.style.color = data.isSyncActive ? "#22c55e" : "#ef4444";
            }
        });
    }

    // 5. FUNGSI UPDATE RUNNING TEXT
    async function setSyncStatus(status) {
        const txt = document.getElementById("runningTextInput").value;
        try {
            await db.collection("config").doc("running_text").set({
                message: txt,
                isSyncActive: status,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            alert("Status Running Text diperbarui!");
        } catch (e) { alert("Gagal: " + e.message); }
    }

    // 6. FUNGSI UPLOAD KONTEN
    async function uploadKePortal() {
        const btn = document.getElementById("btnPublish");
        btn.disabled = true;
        btn.innerText = "Processing...";

        const data = {
            judul: document.getElementById("judul").value,
            tipe_media: document.getElementById("tipe_media").value,
            url_media: document.getElementById("url_media").value,
            isi_artikel: document.getElementById("isi_artikel").value,
            durasi: parseInt(document.getElementById("itemDurasi").value),
            urutan: Date.now(), // Gunakan timestamp sebagai urutan default
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        try {
            await db.collection("portal_media").add(data);
            alert("Konten Berhasil Di-publish!");
            document.getElementById("judul").value = "";
            document.getElementById("url_media").value = "";
        } catch (e) { alert("Error: " + e.message); }
        
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Publish Sekarang';
    }

    // 7. FUNGSI LOAD PLAYLIST
    function loadMedia() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot((snapshot) => {
            const list = document.getElementById("mediaList");
            list.innerHTML = "";
            if (snapshot.empty) {
                list.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px;">Playlist Kosong</td></tr>';
                return;
            }
            snapshot.forEach((doc) => {
                const item = doc.data();
                list.innerHTML += `
                    <tr class="media-row">
                        <td>${item.urutan}</td>
                        <td><strong>${item.judul}</strong></td>
                        <td><span class="badge badge-${item.tipe_media}">${item.tipe_media}</span></td>
                        <td>${item.durasi}m</td>
                        <td style="text-align: right;">
                            <button onclick="hapusKonten('${doc.id}')" class="btn-action btn-delete">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </td>
                    </tr>`;
            });
        });
    }

    // 8. FUNGSI HAPUS KONTEN
    async function hapusKonten(id) {
        if (confirm("Hapus konten ini?")) {
            await db.collection("portal_media").doc(id).delete();
        }
    }

    // INISIALISASI
    window.onload = () => {
        loadMedia();
        loadRunningText();
    };
</script>
</body>
</html>
