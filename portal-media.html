<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --primary: #38bdf8;
            --secondary: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container { max-width: 1300px; margin: auto; }

        /* Header Styles */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--bg-card);
            padding: 20px 30px;
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .btn-back {
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255,255,255,0.05);
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            border: 1px solid var(--border);
        }

        .btn-back:hover { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Layout Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 25px;
        }

        .card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card h3 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        /* Form Elements */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        .btn-submit {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-save-text { background: #334155; color: white; }

        /* Table & List Styles */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-top: 1px solid var(--border); vertical-align: middle; }

        .media-row:hover { background: rgba(255,255,255,0.02); }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
        }
        .badge-gambar { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        .badge-video_youtube { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .badge-video_player { background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .badge-audio_player { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .badge-teks { background: rgba(148, 163, 184, 0.1); color: var(--secondary); }
        
        .btn-action {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.2s;
            margin-left: 5px;
        }
        .btn-action:hover { background: var(--primary); color: black; border-color: var(--primary); }
        .btn-delete:hover { background: var(--danger); color: white; border-color: var(--danger); }

        .order-btn {
            background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px 10px;
        }
        .order-btn:hover { color: var(--primary); }

        .config-bar {
            display: flex;
            gap: 20px;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        #statusText { font-weight: bold; }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 22px; letter-spacing: -0.5px;">Portal Media System</h1>
            <p style="margin:5px 0 0; color:var(--text-muted); font-size: 13px;">Pondok Pemulihan Papua • Control Panel</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>

    <div class="main-grid">
        <div class="sidebar">
            <div class="card">
                <h3><i class="fas fa-bullhorn"></i> Running Text</h3>
                <div class="form-group">
                    <textarea id="runningTextInput" rows="2" placeholder="Tulis pesan pengumuman..."></textarea>
                </div>
                
                <button onclick="setSyncStatus(true)" id="btnSyncOn" class="btn-submit btn-save-text" style="margin-bottom: 10px;">
                    <i class="fa-solid fa-sync"></i> Sync ke Monitor
                </button>
                
                <button onclick="setSyncStatus(false)" id="btnSyncOff" class="btn-submit" style="background: var(--danger); color: white;">
                    <i class="fa-solid fa-power-off"></i> Off Sync
                </button>

                <p style="font-size: 11px; text-align: center; margin-top: 10px; color: var(--text-muted);">
                    Status: <span id="statusText">Mengecek...</span>
                </p>
            </div>

            <div class="card">
                <h3><i class="fa-solid fa-circle-plus"></i> Upload Konten</h3>
                <div class="form-group">
                    <label>Judul Berita</label>
                    <input type="text" id="judul" placeholder="Contoh: Ibadah Minggu">
                </div>
                <div class="form-group">
                    <label>Tipe Media</label>
                    <select id="tipe_media" onchange="toggleInputFields()">
                        <option value="gambar">Gambar (Poster/Foto)</option>
                        <option value="video_youtube">Video (YouTube)</option>
                        <option value="video_player">Video MP4 (Direct)</option>
                        <option value="audio_player">Audio (MP3)</option>
                        <option value="teks">Teks Artikel</option>
                    </select>
                </div>
                <div id="input_url_container" class="form-group">
                    <label id="label_url">URL Gambar (Link Direct)</label>
                    <input type="text" id="url_media" placeholder="https://...">
                </div>
                <div id="input_teks_container" class="form-group" style="display:none;">
                    <label>Isi Artikel</label>
                    <textarea id="isi_artikel" rows="4"></textarea>
                </div>
                <div class="form-group">
                    <label>Durasi Tayang (Menit)</label>
                    <input type="number" id="itemDurasi" value="10">
                </div>
                <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Publish Sekarang
                </button>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <h3><i class="fas fa-play-circle"></i> Manajemen Playlist</h3>
                
                <div class="config-bar">
                    <div style="flex:1">
                        <label>Mode Putar</label>
                        <select id="modePutar" style="width: 100%; margin-top:5px;">
                            <option value="berurutan">Berurutan</option>
                            <option value="acak">Acak (Shuffle)</option>
                        </select>
                    </div>
                    <button onclick="saveGlobalConfig()" class="btn-submit" style="width: auto; margin-top: 22px;">Simpan</button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th width="100">Urutan</th>
                                <th>Konten</th>
                                <th>Tipe</th>
                                <th width="80">Durasi</th>
                                <th style="text-align: right;">Opsi</th>
                            </tr>
                        </thead>
                        <tbody id="mediaList">
                            <tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Menghubungkan ke database...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// Konfigurasi Firebase
const firebaseConfig = {
    apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
    authDomain: "boby-apps-project.firebaseapp.com",
    projectId: "boby-apps-project",
    storageBucket: "boby-apps-project.appspot.com",
    messagingSenderId: "125984859692",
    appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const db = firebase.firestore();

// 1. FUNGSI TOGGLE INPUT
function toggleInputFields() {
    const tipe = document.getElementById('tipe_media').value;
    const urlContainer = document.getElementById('input_url_container');
    const teksContainer = document.getElementById('input_teks_container');
    const labelUrl = document.getElementById('label_url');

    urlContainer.style.display = tipe === 'teks' ? "none" : "block";
    teksContainer.style.display = tipe === 'teks' ? "block" : "none";

    if (tipe === 'gambar') labelUrl.innerText = "URL Gambar (Link Direct)";
    else if (tipe === 'video_youtube') labelUrl.innerText = "Link YouTube (Video/Shorts)";
    else if (tipe === 'video_player') labelUrl.innerText = "Link Direct MP4";
    else if (tipe === 'audio_player') labelUrl.innerText = "Link Direct MP3";
}

// 2. FUNGSI SINKRONISASI (ON/OFF)
async function setSyncStatus(isActive) {
    const text = document.getElementById('runningTextInput').value;
    if(!text && isActive) return alert("Isi teks running text terlebih dahulu!");

    try {
        await db.collection("config").doc("running_text").set({
            message: text,
            isSyncActive: isActive,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            triggerUpdate: Date.now()
        }, { merge: true });

        alert(isActive ? "Sinkronisasi Aktif!" : "Sinkronisasi Dimatikan.");
    } catch (e) {
        alert("Error: " + e.message);
    }
}

// 3. FUNGSI UPLOAD (DENGAN PERBAIKAN LOGIKA YOUTUBE)
async function uploadKePortal() {
    const btn = document.getElementById('btnPublish');
    const judul = document.getElementById('judul').value;
    const tipe = document.getElementById('tipe_media').value;
    const durasi = parseInt(document.getElementById('itemDurasi').value) || 10;
    let urlValue = document.getElementById('url_media').value.trim();
    const isiTeks = document.getElementById('isi_artikel').value;

    if(!judul) return alert("Judul wajib diisi!");

    // --- LOGIKA PENANGANAN URL ---
    
    // Google Drive Handler
    if (urlValue.includes('drive.google.com')) {
        let fileId = urlValue.split('/d/')[1]?.split('/')[0];
        if (fileId) urlValue = `https://drive.google.com/uc?export=download&id=${fileId}`;
    }

    // YouTube Handler (Support Shorts, Mobile, & Desktop)
    if (tipe === 'video_youtube' && urlValue) {
        let videoId = "";
        if (urlValue.includes('v=')) {
            videoId = urlValue.split('v=')[1].split('&')[0];
        } else if (urlValue.includes('youtu.be/')) {
            videoId = urlValue.split('youtu.be/')[1].split('?')[0];
        } else if (urlValue.includes('shorts/')) {
            videoId = urlValue.split('shorts/')[1].split('?')[0];
        } else if (urlValue.includes('embed/')) {
            videoId = urlValue.split('embed/')[1].split('?')[0];
        }

        if (videoId) {
            // Format Embed agar Autoplay & Mute (Syarat browser agar video jalan otomatis)
            urlValue = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=1&loop=1&playlist=${videoId}&enablejsapi=1`;
        } else {
            return alert("Link YouTube tidak valid!");
        }
    }

    btn.disabled = true;
    btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Processing...";
    
    try {
        const snapshot = await db.collection("portal_media").get();
        await db.collection("portal_media").add({
            judul: judul, 
            tipe: tipe, 
            url: urlValue, 
            isi_artikel: isiTeks,
            urutan: snapshot.size + 1, 
            durasi: durasi,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // Reset Form
        document.getElementById('judul').value = "";
        document.getElementById('url_media').value = "";
        document.getElementById('isi_artikel').value = "";
        alert("Konten berhasil dipublikasikan!");
    } catch (e) { 
        alert("Error: " + e.message); 
    } finally {
        btn.disabled = false;
        btn.innerHTML = "<i class='fa-solid fa-paper-plane'></i> Publish Sekarang"; 
    }
}

// 4. FUNGSI LOAD DAFTAR MEDIA & CONFIG
function loadMedia() {
    // Load Config Realtime
    db.collection("config").doc("running_text").onSnapshot(doc => {
        if(doc.exists) {
            const data = doc.data();
            document.getElementById('runningTextInput').value = data.message || "";
            
            const statusText = document.getElementById('statusText');
            const btnOn = document.getElementById('btnSyncOn');
            const btnOff = document.getElementById('btnSyncOff');

            if(data.isSyncActive) {
                statusText.innerText = "AKTIF (Sync ON)";
                statusText.style.color = "var(--success)";
                btnOn.style.background = "var(--success)";
                btnOn.innerHTML = "<i class='fa-solid fa-sync fa-spin'></i> Sinkron Berjalan...";
                btnOn.style.opacity = "1";
                btnOff.style.opacity = "0.5";
            } else {
                statusText.innerText = "NON-AKTIF (Sync OFF)";
                statusText.style.color = "var(--danger)";
                btnOn.style.background = "#334155";
                btnOn.innerHTML = "<i class='fa-solid fa-sync'></i> Sync ke Monitor";
                btnOn.style.opacity = "0.5";
                btnOff.style.opacity = "1";
            }
        }
    });

    db.collection("config").doc("playlist").onSnapshot(doc => {
        if(doc.exists && doc.data().mode) document.getElementById('modePutar').value = doc.data().mode;
    });

    // Load Playlist Realtime
    db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snapshot => {
        const list = document.getElementById('mediaList');
        list.innerHTML = "";
        
        if(snapshot.empty) {
            list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px; color: var(--text-muted);">Belum ada konten media.</td></tr>`;
            return;
        }

        snapshot.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            list.innerHTML += `
                <tr class="media-row">
                    <td>
                        <div style="display:flex; flex-direction:column; align-items:center;">
                            <button class="order-btn" onclick="pindahUrutan('${id}', -1)"><i class="fas fa-caret-up"></i></button>
                            <span style="font-weight:bold; color:var(--primary)">${data.urutan}</span>
                            <button class="order-btn" onclick="pindahUrutan('${id}', 1)"><i class="fas fa-caret-down"></i></button>
                        </div>
                    </td>
                    <td>
                        <div style="font-weight:600">${data.judul}</div>
                        <div style="font-size:11px; color:var(--text-muted); overflow:hidden; text-overflow:ellipsis; max-width:250px; white-space:nowrap">${data.url || 'Konten Teks/Artikel'}</div>
                    </td>
                    <td><span class="badge badge-${data.tipe}">${data.tipe.replace('_', ' ')}</span></td>
                    <td>${data.durasi}m</td>
                    <td style="text-align:right;">
                        <button class="btn-action" onclick="playSekarang('${id}')" title="Mainkan Sekarang"><i class="fas fa-play"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteMedia('${id}')" title="Hapus"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
        });
    });
}

async function pindahUrutan(id, arah) {
    const ref = db.collection("portal_media");
    const doc = await ref.doc(id).get();
    const urutanSekarang = doc.data().urutan;
    const urutanBaru = urutanSekarang + arah;
    if (urutanBaru < 1) return;

    const swapQuery = await ref.where("urutan", "==", urutanBaru).get();
    const batch = db.batch();
    if (!swapQuery.empty) {
        batch.update(ref.doc(swapQuery.docs[0].id), { urutan: urutanSekarang });
    }
    batch.update(ref.doc(id), { urutan: urutanBaru });
    await batch.commit();
}

async function playSekarang(id) {
    await db.collection("config").doc("playlist").set({ 
        activeContentId: id, forcePlay: Date.now() 
    }, { merge: true });
    alert("Perintah 'Mainkan Sekarang' dikirim.");
}

async function deleteMedia(id) {
    if(confirm("Hapus konten ini dari playlist?")) await db.collection("portal_media").doc(id).delete();
}

async function saveGlobalConfig() {
    const mode = document.getElementById('modePutar').value;
    await db.collection("config").doc("playlist").set({ mode: mode }, { merge: true });
    alert("Konfigurasi disimpan.");
}

window.onload = loadMedia;
</script>
</body>
</html>
