<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e3a8a;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent), radial-gradient(circle at bottom left, #f1f5f9, transparent);
            margin: 0;
            padding: 20px;
            color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-back {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        .card-modern {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            overflow: hidden;
        }

        .card-header-gradient {
            background: linear-gradient(45deg, var(--primary-dark), var(--primary));
            color: white;
            padding: 18px 25px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-body { padding: 25px; }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            background: #fff;
            transition: 0.3s;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .table-responsive { border-radius: 15px; overflow: hidden; background: white; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: left; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .btn-action {
            width: 32px; height: 32px; border-radius: 8px; border: none; 
            cursor: pointer; display: inline-flex; align-items: center; justify-content: center; margin: 0 2px;
        }
        .btn-up { background: #f0fdf4; color: #16a34a; }
        .btn-down { background: #fff7ed; color: #ea580c; }
        .btn-del-sm { background: #fef2f2; color: var(--danger); }
        
        .playlist-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #1e3a8a, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Portal Media</h1>
            <p style="margin:5px 0 0; color:#64748b; font-size: 14px;"><i class="fa-solid fa-layer-group"></i> Smart Content Management System</p>
        </div>
        <a href="admin.html" class="btn-back"><i class="fas fa-arrow-left"></i> Dashboard</a>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient" style="background: #1e293b;">
            <span><i class="fas fa-list-ul"></i> Playlist Konten Aktif</span>
            <div style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 5px 12px; border-radius: 20px;">
                Mode: <span id="currentModeDisplay">Looping</span>
            </div>
        </div>
        <div class="card-body">
            
            <div class="playlist-controls">
                <div style="flex: 1;">
                    <label style="font-size: 12px; font-weight: bold; color: #64748b;">MODE PEMUTARAN</label>
                    <select id="play_mode" onchange="updatePlayMode()" style="padding: 8px; margin-top: 5px;">
                        <option value="looping">Play Looping (Berurutan)</option>
                        <option value="shuffle">Play Shuffle (Acak)</option>
                        <option value="custom">Play Custom (Pilihan)</option>
                        <option value="single">Play Single (Satu kali)</option>
                        <option value="repeat">Play Repeat (Ulang Satu)</option>
                    </select>
                </div>
                <button onclick="deleteSelected()" class="btn-submit" style="background: var(--danger); padding: 10px 15px; font-size: 13px;">
                    <i class="fas fa-trash"></i> Hapus Terpilih
                </button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;"><input type="checkbox" id="checkAll" onclick="toggleSelectAll()"></th>
                            <th style="width: 80px; text-align: center;">Urutan</th>
                            <th>Judul Konten</th>
                            <th>Tipe</th>
                            <th style="width: 100px;">Durasi</th>
                            <th style="text-align: center; width: 150px;">Navigasi & Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mediaList">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let playlistData = [];

    // Load Playlist
    function loadMedia() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snapshot => {
            const list = document.getElementById('mediaList');
            list.innerHTML = "";
            playlistData = [];
            
            snapshot.forEach(doc => {
                const data = doc.data();
                playlistData.push({ id: doc.id, ...data });
                list.innerHTML += `
                    <tr>
                        <td><input type="checkbox" class="item-checkbox" value="${doc.id}"></td>
                        <td style="text-align: center; font-weight: bold; color: var(--primary);">${data.urutan}</td>
                        <td style="font-weight:600;">${data.judul}</td>
                        <td><span style="background:#e0e7ff; color:#4338ca; padding:4px 8px; border-radius:10px; font-size:11px;">${data.tipe}</span></td>
                        <td>${data.durasi}m</td>
                        <td style="text-align:center;">
                            <button onclick="moveItem('${doc.id}', -1)" class="btn-action btn-up"><i class="fas fa-chevron-up"></i></button>
                            <button onclick="moveItem('${doc.id}', 1)" class="btn-action btn-down"><i class="fas fa-chevron-down"></i></button>
                            <button onclick="deleteMedia('${doc.id}')" class="btn-action btn-del-sm"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    // Fitur Check All
    function toggleSelectAll() {
        const isChecked = document.getElementById('checkAll').checked;
        document.querySelectorAll('.item-checkbox').forEach(cb => cb.checked = isChecked);
    }

    // Re-order Logic (Naik/Turun)
    async function moveItem(id, direction) {
        const index = playlistData.findIndex(item => item.id === id);
        const newIndex = index + direction;

        if (newIndex >= 0 && newIndex < playlistData.length) {
            const currentItem = playlistData[index];
            const swappingItem = playlistData[newIndex];

            const batch = db.batch();
            batch.update(db.collection("portal_media").doc(currentItem.id), { urutan: swappingItem.urutan });
            batch.update(db.collection("portal_media").doc(swappingItem.id), { urutan: currentItem.urutan });
            
            await batch.commit();
        }
    }

    // Update Mode Pemutaran ke Firebase
    async function updatePlayMode() {
        const mode = document.getElementById('play_mode').value;
        await db.collection("config").doc("playlist_settings").set({
            mode: mode,
            updatedAt: Date.now()
        }, { merge: true });
        document.getElementById('currentModeDisplay').innerText = mode.toUpperCase();
    }

    // Hapus Satuan
    async function deleteMedia(id) {
        if(confirm("Hapus konten dari playlist?")) {
            await db.collection("portal_media").doc(id).delete();
        }
    }

    // Hapus Terpilih (Bulk Delete)
    async function deleteSelected() {
        const selected = Array.from(document.querySelectorAll('.item-checkbox:checked')).map(cb => cb.value);
        if (selected.length === 0) return alert("Pilih konten yang ingin dihapus!");
        
        if (confirm(`Hapus ${selected.length} konten terpilih?`)) {
            const batch = db.batch();
            selected.forEach(id => {
                batch.delete(db.collection("portal_media").doc(id));
            });
            await batch.commit();
            document.getElementById('checkAll').checked = false;
        }
    }

    window.onload = loadMedia;
</script>
</body>
</html>
