<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Media - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1e3a8a;
            --secondary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-body: #f8fafc;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent), radial-gradient(circle at bottom left, #f1f5f9, transparent);
            margin: 0;
            padding: 20px;
            color: #1e293b;
            min-height: 100vh;
        }

        .container { max-width: 1100px; margin: auto; }

        /* Header Modern */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .btn-back {
            text-decoration: none;
            color: #64748b;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 12px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { color: var(--primary); transform: translateX(-5px); }

        /* Card Modern */
        .card-modern {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card-header-gradient {
            background: linear-gradient(45deg, var(--primary-dark), var(--primary));
            color: white;
            padding: 18px 25px;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-body { padding: 25px; }

        /* Form Styling */
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #475569; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            background: #fff;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); }

        /* Table Design */
        .table-responsive { border-radius: 15px; overflow: hidden; background: white; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #64748b; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }

        .badge {
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
        }
        .badge-active { background: #dcfce7; color: #15803d; }
        .badge-queue { background: #f1f5f9; color: #64748b; }

        .btn-action {
            width: 35px; height: 35px; border-radius: 10px; border: none; 
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-play-sm { background: #eff6ff; color: var(--primary); margin-right: 5px; }
        .btn-play-sm:hover { background: var(--primary); color: white; }
        .btn-del-sm { background: #fef2f2; color: var(--danger); }
        .btn-del-sm:hover { background: var(--danger); color: white; }

        .divider-modern { border: 0; height: 1px; background: linear-gradient(to right, transparent, #e2e8f0, transparent); margin: 25px 0; }

        .status-dot { height: 8px; width: 8px; background-color: #cbd5e1; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-dot.active { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="margin:0; font-size: 26px; font-weight: 800; background: linear-gradient(to right, #1e3a8a, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Portal Media</h1>
            <p style="margin:5px 0 0; color:#64748b; font-size: 14px;"><i class="fa-solid fa-layer-group"></i> Smart Content Management System</p>
        </div>
        <a href="admin.html" class="btn-back">
            <i class="fas fa-arrow-left"></i> Dashboard
        </a>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient" style="background: linear-gradient(45deg, #f59e0b, #fbbf24);">
            <i class="fas fa-bullhorn"></i> Fitur Koleksi & Otomasi Running Text
        </div>
        <div class="card-body">
            <div class="row" style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div style="flex: 2; min-width: 300px;">
                    <label>Input Teks Baru & Koleksi</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="rt_input" placeholder="Tulis pengumuman baru...">
                        <input type="number" id="rt_durasi" placeholder="Detik" style="max-width: 90px;" value="15">
                        <button onclick="saveRunningTextToCollection()" class="btn-submit" style="width: auto; padding: 0 25px;">
                            <i class="fas fa-plus"></i> Simpan
                        </button>
                    </div>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Mode Pemutaran Otomatis</label>
                    <select id="rt_mode" onchange="saveRTConfig()">
                        <option value="looping">Looping (Berurutan)</option>
                        <option value="repeat">Repeat (Ulang Terus)</option>
                        <option value="shuffle">Shuffle (Acak)</option>
                        <option value="solo">Play Solo (Kunci Satu)</option>
                    </select>
                </div>
            </div>

            <hr class="divider-modern">

            <label><i class="fas fa-clock-rotate-left"></i> Riwayat & Antrean Koleksi</label>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">Status</th>
                            <th>Isi Pesan</th>
                            <th style="width: 100px;">Durasi</th>
                            <th style="width: 120px; text-align: center;">Kontrol</th>
                        </tr>
                    </thead>
                    <tbody id="rt_history_list">
                        <tr><td colspan="4" style="text-align:center; padding: 20px;">Memuat riwayat teks...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient">
            <i class="fa-solid fa-circle-plus"></i> Tambah Konten Monitor Utama
        </div>
        <div class="card-body">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label>Judul Konten</label>
                    <input type="text" id="judul" placeholder="Contoh: Ibadah Minggu">
                </div>
                <div class="form-group">
                    <label>Tipe Media</label>
                    <select id="tipe_media" onchange="toggleInputFields()">
                        <option value="gambar">Gambar (Poster/Foto)</option>
                        <option value="video_youtube">Video (YouTube)</option>
                        <option value="video_player">Video MP4 (Direct)</option>
                        <option value="audio_player">Audio (MP3)</option>
                        <option value="teks">Text World (Artikel)</option>
                    </select>
                </div>
            </div>

            <div id="input_url_container" class="form-group" style="margin-bottom: 20px;">
                <label id="label_url">Link / URL Media</label>
                <input type="text" id="url_media" placeholder="https://...">
            </div>

            <div id="input_teks_container" class="form-group" style="display:none; margin-bottom: 20px;">
                <label>Isi Artikel Lengkap</label>
                <textarea id="isi_artikel" rows="4"></textarea>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>Deskripsi Singkat</label>
                <textarea id="deskripsi" rows="2"></textarea>
            </div>

            <button onclick="uploadKePortal()" id="btnPublish" class="btn-submit">
                <i class="fa-solid fa-paper-plane"></i> Publikasikan Konten
            </button>
        </div>
    </div>

    <div class="card-modern">
        <div class="card-header-gradient" style="background: #1e293b;">
            <i class="fas fa-list-ul"></i> Playlist Konten Aktif
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Urutan</th>
                            <th>Judul Konten</th>
                            <th>Tipe</th>
                            <th style="width: 100px;">Durasi</th>
                            <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="mediaList"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // --- LOGIKA KOLEKSI RUNNING TEXT ---
    let runningItems = [];
    let currentRTIndex = 0;

    async function saveRunningTextToCollection() {
        const text = document.getElementById('rt_input').value;
        const durasi = document.getElementById('rt_durasi').value;
        if(!text) return alert("Teks kosong!");

        await db.collection("rt_collection").add({
            text: text,
            durasi: parseInt(durasi),
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            isActive: false
        });
        document.getElementById('rt_input').value = "";
    }

    function loadRTCollection() {
        db.collection("rt_collection").orderBy("timestamp", "desc").onSnapshot(snapshot => {
            const list = document.getElementById('rt_history_list');
            list.innerHTML = "";
            runningItems = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                runningItems.push({ id: doc.id, ...data });
                list.innerHTML += `
                    <tr>
                        <td><span class="status-dot ${data.isActive ? 'active' : ''}"></span> ${data.isActive ? 'Active' : 'Queue'}</td>
                        <td style="font-weight:500;">${data.text}</td>
                        <td>${data.durasi}s</td>
                        <td style="text-align:center;">
                            <button onclick="playRTManual('${doc.id}')" class="btn-action btn-play-sm"><i class="fas fa-play"></i></button>
                            <button onclick="deleteRT('${doc.id}')" class="btn-action btn-del-sm"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    async function playRTManual(id) {
        // Reset semua status isActive di Firebase dulu
        const batch = db.batch();
        runningItems.forEach(item => {
            batch.update(db.collection("rt_collection").doc(item.id), { isActive: false });
        });
        batch.update(db.collection("rt_collection").doc(id), { isActive: true });
        
        // Update display monitor utama (config/running_text)
        const selected = runningItems.find(i => i.id === id);
        batch.set(db.collection("config").doc("running_text"), { pesan: selected.text }, { merge: true });
        
        await batch.commit();
        alert("Teks Aktif!");
    }

    async function deleteRT(id) {
        if(confirm("Hapus dari koleksi?")) await db.collection("rt_collection").doc(id).delete();
    }

    // --- LOGIKA PORTAL MEDIA (DAFTAR KONTEN) ---
    function toggleInputFields() {
        const tipe = document.getElementById('tipe_media').value;
        document.getElementById('input_url_container').style.display = tipe === 'teks' ? "none" : "block";
        document.getElementById('input_teks_container').style.display = tipe === 'teks' ? "block" : "none";
    }

    async function uploadKePortal() {
        const btn = document.getElementById('btnPublish');
        const judul = document.getElementById('judul').value;
        if(!judul) return alert("Judul wajib diisi!");

        btn.disabled = true;
        btn.innerText = "Memproses...";

        await db.collection("portal_media").add({
            judul: judul,
            tipe: document.getElementById('tipe_media').value,
            url: document.getElementById('url_media').value || "",
            isi_artikel: document.getElementById('isi_artikel').value || "",
            deskripsi: document.getElementById('deskripsi').value || "",
            urutan: Date.now(),
            durasi: 10,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        alert("Konten Terbit!");
        location.reload();
    }

    function loadMedia() {
        db.collection("portal_media").orderBy("urutan", "asc").onSnapshot(snapshot => {
            const list = document.getElementById('mediaList');
            list.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `
                    <tr>
                        <td><i class="fas fa-grip-vertical" style="color:#cbd5e1;"></i></td>
                        <td style="font-weight:600;">${data.judul}</td>
                        <td><span class="badge badge- te" style="background:#e0e7ff; color:#4338ca;">${data.tipe}</span></td>
                        <td>${data.durasi}m</td>
                        <td style="text-align:center;">
                            <button onclick="playSekarang('${doc.id}')" class="btn-action btn-play-sm"><i class="fas fa-desktop"></i></button>
                            <button onclick="deleteMedia('${doc.id}')" class="btn-action btn-del-sm"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        });
    }

    async function playSekarang(id) {
        await db.collection("config").doc("playlist").update({ activeContentId: id, triggerChange: Date.now() });
        alert("Menyiapkan pemutaran di monitor...");
    }

    async function deleteMedia(id) {
        if(confirm("Hapus konten?")) await db.collection("portal_media").doc(id).delete();
    }

    window.onload = function() {
        loadRTCollection();
        loadMedia();
    };
</script>
</body>
</html>
