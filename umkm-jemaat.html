<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pendaftaran UMKM Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f8f9fa; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .shop-container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); margin-top: 10px; }
        
        /* Admin Dropdown Style */
        .admin-dropdown-container { position: absolute; top: 15px; left: 15px; z-index: 999; }
        #admin-login-box { 
            display: none; background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.2); width: 200px; margin-top: 10px; 
            border: 1px solid #eee;
        }
        #admin-login-box input { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ddd; font-size: 12px; box-sizing: border-box; }

        .header { text-align: center; margin-bottom: 30px; }
        .header i { font-size: 45px; color: #4CAF50; margin-bottom: 12px; }
        .header h2 { margin: 0; font-size: 22px; color: #2c3e50; }
        .header p { font-size: 14px; color: #95a5a6; margin-top: 5px; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 11px; font-weight: 800; color: #34495e; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid #f1f3f5; font-size: 15px; box-sizing: border-box; background: #f8f9fa; transition: 0.3s ease; }
        .form-group input:focus { border-color: #4CAF50; background: #fff; outline: none; box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.1); }

        /* Preview Logo Area */
        .logo-upload-area { 
            border: 2px dashed #cbd5e0; border-radius: 18px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; background: #fafafa; position: relative;
        }
        .logo-upload-area:hover { border-color: #4CAF50; background: #f0fff4; }
        #logo-preview { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; display: none; margin: 0 auto 10px; border: 3px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .btn-register { 
            width: 100%; padding: 18px; border: none; border-radius: 15px; background: #2c3e50; color: white; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 8px 20px rgba(44, 62, 80, 0.2); margin-top: 10px;
        }
        .btn-register:hover { background: #1a252f; transform: translateY(-2px); }
        .btn-register:active { transform: translateY(0); }

        /* Modal Display Setengah (Modern) */
        #status-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); 
            z-index: 10000; justify-content: center; align-items: flex-end; 
        }
        .modal-content { 
            background: white; width: 100%; max-width: 500px; padding: 35px 25px; border-radius: 30px 30px 0 0; 
            text-align: center; animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .hidden-input { display: none; }
    </style>
</head>
<body>

<div class="admin-dropdown-container">
    <button onclick="toggleAdminPanel()" style="background: none; border: none; color: #ccc; cursor: pointer; font-size: 18px;">
        <i class="fa-solid fa-shield-halved"></i>
    </button>
    
    <div id="admin-login-box">
        <label style="font-size: 10px; font-weight: bold; color: #2c3e50; display: block; margin-bottom: 5px;">PORTAL KONTROL</label>
        <input type="text" id="admin-user" placeholder="Username">
        
        <div style="position: relative;">
            <input type="password" id="admin-pass" placeholder="Password">
            <i class="fa-solid fa-eye" id="toggleEye" onclick="togglePass()" style="position: absolute; right: 10px; top: 12px; font-size: 12px; color: #aaa; cursor: pointer;"></i>
        </div>
        
        <button onclick="loginAdmin()" style="width: 100%; margin-top: 5px; padding: 10px; background: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer;">MASUK ADMIN</button>
    </div>
</div>

<div class="shop-container">
    <div class="header">
        <i class="fa-solid fa-hand-holding-heart"></i>
        <h2>UMKM Jemaat</h2>
        <p>Daftarkan usaha Anda untuk mulai melayani sesama jemaat di Pondok Pemulihan Papua.</p>
    </div>

    <form id="formUmkm">
        <div class="form-group">
            <label>Logo Usaha (Format JPG)</label>
            <div class="logo-upload-area" onclick="document.getElementById('logo-input').click()">
                <img id="logo-preview" src="#" alt="Preview">
                <div id="upload-placeholder">
                    <i class="fa-solid fa-image" style="font-size: 28px; color: #cbd5e0;"></i>
                    <p style="font-size: 13px; color: #7f8c8d; margin-top: 8px;">Pilih Logo JPG</p>
                </div>
                <input type="file" id="logo-input" class="hidden-input" accept="image/jpeg" onchange="previewImage(event)">
            </div>
        </div>

        <div class="form-group">
            <label>Nama Toko / Usaha</label>
            <input type="text" id="nama_toko" placeholder="Masukkan nama usaha Anda" required>
        </div>

        <div class="form-group">
            <label>WhatsApp Penjual</label>
            <input type="tel" id="kontak_toko" placeholder="Contoh: 08123456789" required>
        </div>

        <button type="button" class="btn-register" onclick="prosesDaftarUmkm()">BUKA LAPAK SEKARANG</button>
    </form>
</div>

<div id="status-modal">
    <div class="modal-content">
        <div id="modal-icon-area" style="margin-bottom: 15px;"></div>
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
        <button onclick="tutupModal()" style="width: 100%; padding: 15px; border: none; border-radius: 12px; background: #f1f3f5; font-weight: bold; color: #2c3e50; cursor: pointer;">MENGERTI</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
    // Config Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDU2rk0rIF-sos_Sj7C5IMM9dU8z8p_VJM",
        authDomain: "boby-apps-project.firebaseapp.com",
        projectId: "boby-apps-project",
        storageBucket: "boby-apps-project.appspot.com",
        messagingSenderId: "125984859692",
        appId: "1:125984859692:web:09f75df5d2e4b6e3bcd389"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();
    const auth = firebase.auth();

    // --- LOGIKA SUPER ADMIN ---
    function toggleAdminPanel() {
        const box = document.getElementById('admin-login-box');
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    function togglePass() {
        const p = document.getElementById('admin-pass');
        const eye = document.getElementById('toggleEye');
        if (p.type === "password") {
            p.type = "text";
            eye.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            p.type = "password";
            eye.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    function loginAdmin() {
        const u = document.getElementById('admin-user').value;
        const p = document.getElementById('admin-pass').value;
        
        if(u === "admin" && p === "admin321") {
            sessionStorage.setItem("isAdmin", "true");
            window.location.href = "super-admin.html";
        } else {
            alert("Akses Ditolak! User atau Password salah.");
        }
    }
    // ---------------------------

    function previewImage(event) {
        const reader = new FileReader();
        const file = event.target.files[0];
        
        if (file && file.type === "image/jpeg") {
            reader.onload = function() {
                const output = document.getElementById('logo-preview');
                const placeholder = document.getElementById('upload-placeholder');
                output.src = reader.result;
                output.style.display = 'block';
                placeholder.style.display = 'none';
            };
            reader.readAsDataURL(file);
        } else {
            tampilkanModal("Format Salah", "Mohon upload file dalam format JPG/JPEG.", "warning");
        }
    }

    async function prosesDaftarUmkm() {
        const user = auth.currentUser;
        if(!user) {
            tampilkanModal("Akses Ditolak", "Anda harus masuk ke akun jemaat terlebih dahulu.", "error");
            return;
        }

        const namaToko = document.getElementById("nama_toko").value;
        const kontakToko = document.getElementById("kontak_toko").value;
        const logoFile = document.getElementById("logo-input").files[0];

        if (!namaToko || !kontakToko || !logoFile) {
            tampilkanModal("Data Belum Lengkap", "Lengkapi logo, nama toko, dan nomor WhatsApp.", "warning");
            return;
        }

        const btn = document.querySelector(".btn-register");
        btn.disabled = true; btn.innerText = "Memproses...";

        try {
            const storageRef = storage.ref(`umkm_logos/${user.uid}.jpg`);
            await storageRef.put(logoFile);
            const logoURL = await storageRef.getDownloadURL();

            await db.collection("umkm_stores").doc(user.uid).set({
                uid: user.uid,
                nama_toko: namaToko,
                whatsapp: kontakToko,
                logo: logoURL,
                verified: false,
                tgl_daftar: firebase.firestore.FieldValue.serverTimestamp()
            });

            tampilkanModal("Pendaftaran Berhasil!", "Lapak Anda sedang disiapkan. Menuju portal penjual...", "success");
            setTimeout(() => {
                window.location.href = "dashboard-umkm.html";
            }, 2000);

        } catch (error) {
            btn.disabled = false; btn.innerText = "BUKA LAPAK SEKARANG";
            tampilkanModal("Sistem Sibuk", error.message, "error");
        }
    }

    function tampilkanModal(title, desc, type) {
        const modal = document.getElementById("status-modal");
        const iconArea = document.getElementById("modal-icon-area");
        document.getElementById("modal-title").innerText = title;
        document.getElementById("modal-desc").innerText = desc;
        
        let icon = '<i class="fa-solid fa-circle-check" style="font-size: 60px; color: #4CAF50;"></i>';
        if (type === 'error') icon = '<i class="fa-solid fa-circle-xmark" style="font-size: 60px; color: #e74c3c;"></i>';
        if (type === 'warning') icon = '<i class="fa-solid fa-triangle-exclamation" style="font-size: 60px; color: #f1c40f;"></i>';
        
        iconArea.innerHTML = icon;
        modal.style.display = "flex";
    }

    function tutupModal() {
        document.getElementById("status-modal").style.display = "none";
    }
</script>
</body>
</html>
