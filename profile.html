<div class="reg-form">
    <h2>Pendaftaran Anggota Baru</h2>
    <input type="email" id="reg-email" placeholder="Email Utama">
    <input type="password" id="reg-pass" placeholder="Buat Password">
    <hr>
    <input type="text" id="reg-nama" placeholder="Nama Lengkap Sesuai KTP">
    <textarea id="reg-alamat" placeholder="Alamat Lengkap di Jayapura"></textarea>
    
    <input type="text" id="reg-nohp" placeholder="Nomor HP (WhatsApp)">
    
    <select id="reg-goldar">
        <option value="">Pilih Golongan Darah</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="AB">AB</option>
        <option value="O">O</option>
    </select>

    <select id="reg-komsel">
        <option value="">Pilih Komsel JC</option>
        <option value="JC 1">JC 1</option>
        <option value="JC 2">JC 2</option>
        <option value="JC 3">JC 3</option>
        <option value="JC 4">JC 4</option>
        <option value="JC 5">JC 5</option>
    </select>

    <select id="reg-jabatan">
        <option value="Anggota Komsel">Anggota Komsel</option>
        <option value="Ketua Komsel">Ketua Komsel</option>
    </select>

    <button onclick="prosesDaftar()">Daftar & Simpan Profil</button>
</div>

<script>
async function prosesDaftar() {
    const data = {
        email: document.getElementById("reg-email").value,
        nama: document.getElementById("reg-nama").value,
        alamat: document.getElementById("reg-alamat").value,
        no_hp: document.getElementById("reg-nohp").value,
        gol_darah: document.getElementById("reg-goldar").value,
        komsel: document.getElementById("reg-komsel").value,
        jabatan: document.getElementById("reg-jabatan").value
    };

    try {
        await db.collection("users").add(data);
        alert("Pendaftaran Berhasil!");
        window.location.href = "index.html";
    } catch (e) { alert(e.message); }
}
</script>
